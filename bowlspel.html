<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#e8f4ff">
<title>Bowlspel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{
    width:100%;height:100%;overflow:hidden;position:fixed;
    font-family:'Fredoka',-apple-system,BlinkMacSystemFont,sans-serif;
    background:linear-gradient(180deg,#cce8ff 0%,#e8f4ff 50%,#ffffff 100%);
    color:#2a3142;user-select:none;-webkit-user-select:none;touch-action:none;
  }
  #app{position:fixed;inset:0;overflow:hidden;}

  /* ================ SETUP SCREEN ================ */
  .screen{position:absolute;inset:0;display:none;flex-direction:column;}
  .screen.active{display:flex;}

  #setupScreen{
    background:
      radial-gradient(circle at 20% 10%,rgba(255,255,255,.9) 0%,transparent 40%),
      radial-gradient(circle at 80% 90%,rgba(180,220,255,.7) 0%,transparent 40%),
      linear-gradient(180deg,#cce8ff,#ffffff);
    padding:max(20px,env(safe-area-inset-top)) 20px max(20px,env(safe-area-inset-bottom));
    overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  .logo{
    text-align:center;margin:20px 0 16px;
  }
  .logo h1{
    font-weight:700;font-size:54px;letter-spacing:-2px;line-height:1;
    color:#0066cc;
    text-shadow:
      0 2px 0 #ffffff,
      0 4px 0 rgba(0,102,204,.3),
      0 8px 20px rgba(0,102,204,.25);
    transform:rotate(-2deg);display:inline-block;
  }
  .logo h1 .pin-emoji{display:inline-block;transform:rotate(8deg);}
  .logo p{
    font-weight:500;color:#5a7090;margin-top:8px;font-size:15px;letter-spacing:.5px;
  }

  .panel{
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:2px solid rgba(255,255,255,.9);
    border-radius:24px;padding:20px;margin:0 auto 16px;max-width:420px;width:100%;
    box-shadow:0 8px 32px rgba(0,80,160,.12),inset 0 1px 0 rgba(255,255,255,.9);
  }
  .panel h2{
    font-weight:600;font-size:18px;color:#0066cc;margin-bottom:12px;letter-spacing:.3px;
  }

  .count-row{display:flex;align-items:center;gap:12px;}
  .count-btn{
    width:48px;height:48px;border:none;border-radius:50%;
    background:linear-gradient(180deg,#4fa8ff,#0066cc);
    color:white;font-size:24px;font-weight:600;cursor:pointer;
    box-shadow:0 4px 0 #003d80,0 6px 12px rgba(0,80,160,.3);
    transition:transform .1s,box-shadow .1s;font-family:inherit;
  }
  .count-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #003d80,0 2px 6px rgba(0,80,160,.3);}
  .count-btn:disabled{background:#cccccc;box-shadow:0 4px 0 #999999;opacity:.5;}
  .count-display{
    flex:1;text-align:center;font-size:42px;font-weight:700;color:#0066cc;
    background:linear-gradient(180deg,#f0f8ff,#e0f0ff);
    border-radius:16px;padding:6px;border:2px solid #b8dcff;line-height:1;
  }
  .count-display small{display:block;font-size:11px;color:#5a7090;font-weight:500;margin-top:2px;letter-spacing:.5px;}

  .player-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
  .player-input-row{display:flex;align-items:center;gap:10px;}
  .player-badge{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:white;font-weight:600;font-size:15px;flex-shrink:0;
    box-shadow:inset 0 -3px 0 rgba(0,0,0,.2),0 2px 4px rgba(0,0,0,.1);
  }
  .player-input{
    flex:1;border:2px solid #d8e8f8;background:#f8fbff;
    border-radius:12px;padding:10px 14px;font-size:16px;font-family:inherit;
    color:#2a3142;font-weight:500;outline:none;
    transition:border-color .15s,background .15s;
  }
  .player-input:focus{border-color:#4fa8ff;background:#ffffff;}

  .big-btn{
    display:block;width:100%;max-width:420px;margin:8px auto;
    border:none;border-radius:20px;padding:18px;
    font-family:inherit;font-size:22px;font-weight:600;color:white;cursor:pointer;
    background:linear-gradient(180deg,#ff7a3d,#e54a18);
    box-shadow:0 6px 0 #b03000,0 10px 20px rgba(229,74,24,.35),inset 0 1px 0 rgba(255,255,255,.4);
    letter-spacing:.5px;transition:transform .1s,box-shadow .1s;
  }
  .big-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #b03000,0 4px 10px rgba(229,74,24,.3);}
  .big-btn.secondary{
    background:linear-gradient(180deg,#7fc4ff,#3088dd);
    box-shadow:0 6px 0 #1e5a99,0 10px 20px rgba(48,136,221,.3),inset 0 1px 0 rgba(255,255,255,.4);
  }
  .big-btn.secondary:active{box-shadow:0 2px 0 #1e5a99,0 4px 10px rgba(48,136,221,.3);}

  /* ================ GAME SCREEN ================ */
  #gameScreen{background:#000;}
  #bowlingCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #bowlingCanvas.shake{animation:camShake .5s cubic-bezier(.36,.07,.19,.97);}
  @keyframes camShake{
    0%,100%{transform:translate(0,0);}
    10%{transform:translate(-4px,2px);}
    20%{transform:translate(5px,-3px);}
    30%{transform:translate(-3px,4px);}
    40%{transform:translate(3px,3px);}
    50%{transform:translate(-4px,-2px);}
    60%{transform:translate(4px,1px);}
    70%{transform:translate(-2px,-3px);}
    80%{transform:translate(3px,2px);}
    90%{transform:translate(-1px,1px);}
  }

  /* Scoreboard top-right - classic bowling alley style */
  #scoreboard{
    position:absolute;top:max(10px,env(safe-area-inset-top));right:10px;
    background:linear-gradient(180deg,#1a1a2e 0%,#16213e 100%);
    border:2px solid #ffaa00;border-radius:14px;padding:8px;
    box-shadow:0 4px 16px rgba(0,0,0,.5),inset 0 0 20px rgba(255,170,0,.1);
    font-family:'Fredoka',monospace;color:#ffeb3b;
    min-width:180px;max-width:200px;z-index:10;
    text-shadow:0 0 8px rgba(255,235,59,.6);
  }
  #scoreboard .sb-title{
    text-align:center;font-size:10px;letter-spacing:2px;font-weight:600;
    color:#ffaa00;border-bottom:1px solid rgba(255,170,0,.4);
    padding-bottom:4px;margin-bottom:6px;text-shadow:0 0 6px rgba(255,170,0,.7);
  }
  .score-row{
    display:flex;align-items:center;gap:6px;padding:3px 4px;
    font-size:13px;font-weight:500;border-radius:6px;
    transition:background .2s;
  }
  .score-row.current{
    background:rgba(255,170,0,.18);
    box-shadow:inset 0 0 8px rgba(255,170,0,.2);
    animation:currentPulse 1.5s ease-in-out infinite;
  }
  @keyframes currentPulse{0%,100%{background:rgba(255,170,0,.18);}50%{background:rgba(255,170,0,.32);}}
  .score-row.done{opacity:.7;}
  .sr-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;}
  .sr-frame{
    display:flex;gap:1px;
  }
  .sr-throw{
    width:16px;height:18px;background:rgba(255,255,255,.08);
    border:1px solid rgba(255,170,0,.3);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:600;border-radius:3px;
  }
  .sr-throw.strike{background:rgba(255,50,50,.3);color:#ff6b6b;border-color:#ff6b6b;}
  .sr-throw.spare{background:rgba(100,200,255,.2);color:#7fdfff;border-color:#7fdfff;}
  .sr-total{
    min-width:22px;text-align:center;font-weight:700;font-size:14px;
    background:rgba(255,235,59,.15);border-radius:4px;padding:1px 4px;
    color:#fff;
  }

  /* HUD bottom */
  #hud{
    position:absolute;left:0;right:0;bottom:0;
    padding:12px 16px max(12px,env(safe-area-inset-bottom));
    pointer-events:none;z-index:5;
  }
  #turnIndicator{
    display:inline-block;background:rgba(255,255,255,.95);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border-radius:18px;padding:8px 16px;
    font-weight:600;font-size:15px;color:#0066cc;
    box-shadow:0 4px 12px rgba(0,0,0,.2);margin-bottom:10px;
    border:2px solid rgba(255,255,255,1);
  }
  #turnIndicator .p-color{
    display:inline-block;width:10px;height:10px;border-radius:50%;
    margin-right:6px;vertical-align:middle;
    box-shadow:inset 0 -2px 0 rgba(0,0,0,.2);
  }
  #throwInfo{
    color:#ffffff;text-shadow:0 1px 4px rgba(0,0,0,.8);
    font-size:13px;font-weight:500;padding-left:6px;
  }

  /* Swipe area / throw control */
  #swipeArea{
    position:absolute;left:0;right:0;bottom:0;height:45%;
    z-index:4;touch-action:none;cursor:pointer;
  }
  #aimGuide{
    position:absolute;left:50%;bottom:0;width:6px;height:0;
    background:linear-gradient(180deg,rgba(255,235,0,0),rgba(255,235,0,.8));
    transform:translateX(-50%) rotate(0deg);transform-origin:bottom center;
    pointer-events:none;border-radius:3px;
    box-shadow:0 0 12px rgba(255,235,0,.8);
    opacity:0;transition:opacity .2s;
  }
  #powerBar{
    position:absolute;left:20px;top:20%;width:8px;height:60%;
    background:rgba(255,255,255,.15);border-radius:4px;
    border:1px solid rgba(255,255,255,.3);
    pointer-events:none;opacity:0;transition:opacity .2s;
  }
  #powerFill{
    position:absolute;left:0;right:0;bottom:0;height:0%;
    background:linear-gradient(0deg,#00dd00,#ffff00 50%,#ff3300);
    border-radius:3px;box-shadow:0 0 10px rgba(255,255,0,.6);
    transition:height .05s;
  }
  .controls-active #aimGuide,
  .controls-active #powerBar{opacity:1;}

  #hintBubble{
    position:absolute;left:50%;top:35%;transform:translateX(-50%);
    background:rgba(255,255,255,.95);color:#0066cc;
    padding:12px 22px;border-radius:24px;font-weight:600;font-size:15px;
    box-shadow:0 6px 20px rgba(0,0,0,.25);
    border:2px solid #ffaa00;text-align:center;max-width:80%;
    pointer-events:none;z-index:8;
    animation:hintFloat 2s ease-in-out infinite;
  }
  @keyframes hintFloat{
    0%,100%{transform:translateX(-50%) translateY(0);}
    50%{transform:translateX(-50%) translateY(-6px);}
  }
  #hintBubble.hide{display:none;}

  /* Throw result overlay */
  #throwResult{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    pointer-events:none;z-index:20;opacity:0;
  }
  #throwResult.show{opacity:1;}
  .result-text{
    font-size:72px;font-weight:700;letter-spacing:-2px;
    color:#ffd700;text-shadow:
      0 0 20px rgba(255,215,0,.8),
      4px 4px 0 #ff6b00,
      8px 8px 30px rgba(0,0,0,.5);
    transform:scale(0) rotate(-10deg);
    animation:resultPop .8s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes resultPop{
    0%{transform:scale(0) rotate(-15deg);opacity:0;}
    50%{transform:scale(1.2) rotate(5deg);opacity:1;}
    100%{transform:scale(1) rotate(-3deg);opacity:1;}
  }
  .result-text.strike{
    color:#ff3333;background:linear-gradient(180deg,#ffeb3b,#ff5722);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 20px rgba(255,87,34,.8));
  }
  .result-text.spare{
    color:#00ccff;background:linear-gradient(180deg,#7fdfff,#0088cc);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 20px rgba(0,170,255,.8));
  }

  /* Confetti */
  .confetti{
    position:absolute;width:10px;height:14px;
    top:-20px;border-radius:2px;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall{
    0%{transform:translateY(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(110vh) rotate(720deg);opacity:.6;}
  }

  /* Sparkles */
  .sparkle{
    position:absolute;width:20px;height:20px;
    background:radial-gradient(circle,#ffeb3b 0%,#ffaa00 40%,transparent 70%);
    border-radius:50%;pointer-events:none;
    animation:sparkleAnim 1s ease-out forwards;
  }
  @keyframes sparkleAnim{
    0%{transform:scale(0);opacity:1;}
    50%{transform:scale(2);opacity:1;}
    100%{transform:scale(0);opacity:0;}
  }

  /* Pin counter display */
  #pinIndicator{
    position:absolute;top:max(10px,env(safe-area-inset-top));left:10px;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border-radius:14px;padding:8px 12px;
    border:2px solid #ffaa00;
    box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:10;
    font-weight:600;color:#0066cc;font-size:13px;
    display:flex;align-items:center;gap:8px;
  }
  .pin-grid{display:grid;grid-template-columns:repeat(4,8px);gap:3px;}
  .pin-dot{
    width:8px;height:10px;background:#ddd;border-radius:50% 50% 30% 30%;
    border:1px solid #999;transition:all .3s;
  }
  .pin-dot.standing{background:#fff;border-color:#cc0000;box-shadow:0 0 3px rgba(204,0,0,.3);}
  .pin-dot.fallen{background:#888;opacity:.3;}
  /* Render the diamond shape: row1=4 pins, row2=3, row3=2, row4=1 */
  .pin-grid > div:nth-child(1){grid-column:1;grid-row:1;}
  .pin-grid > div:nth-child(2){grid-column:2;grid-row:1;}
  .pin-grid > div:nth-child(3){grid-column:3;grid-row:1;}
  .pin-grid > div:nth-child(4){grid-column:4;grid-row:1;}
  .pin-grid > div:nth-child(5){grid-column:1/3;grid-row:2;justify-self:end;}
  .pin-grid > div:nth-child(6){grid-column:2/4;grid-row:2;justify-self:center;}
  .pin-grid > div:nth-child(7){grid-column:3/5;grid-row:2;justify-self:start;}
  .pin-grid > div:nth-child(8){grid-column:1/3;grid-row:3;justify-self:end;margin-right:-4px;}
  .pin-grid > div:nth-child(9){grid-column:3/5;grid-row:3;justify-self:start;margin-left:-4px;}
  .pin-grid > div:nth-child(10){grid-column:1/-1;grid-row:4;justify-self:center;}

  /* ================ RESULTS SCREEN ================ */
  #resultsScreen{
    background:
      radial-gradient(circle at 50% 20%,rgba(255,215,0,.2) 0%,transparent 50%),
      linear-gradient(180deg,#1a1a3e,#0a0a1e);
    padding:max(20px,env(safe-area-inset-top)) 20px max(20px,env(safe-area-inset-bottom));
    overflow-y:auto;-webkit-overflow-scrolling:touch;align-items:center;
  }
  .trophy{
    font-size:80px;margin-top:10px;text-align:center;
    animation:trophyBounce 2s ease-in-out infinite;
    filter:drop-shadow(0 0 30px rgba(255,215,0,.8));
  }
  @keyframes trophyBounce{
    0%,100%{transform:translateY(0) scale(1);}
    50%{transform:translateY(-10px) scale(1.05);}
  }
  #resultsScreen h1{
    text-align:center;color:#ffd700;font-size:36px;font-weight:700;
    text-shadow:0 0 20px rgba(255,215,0,.6),2px 2px 0 rgba(0,0,0,.5);
    margin:8px 0 4px;
  }
  #resultsScreen .winner-name{
    text-align:center;color:white;font-size:24px;font-weight:600;margin-bottom:20px;
  }
  .ranking{
    background:rgba(255,255,255,.08);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.2);border-radius:20px;
    padding:14px;margin:0 auto 16px;max-width:420px;width:100%;
  }
  .rank-row{
    display:flex;align-items:center;gap:12px;padding:10px 6px;
    border-bottom:1px solid rgba(255,255,255,.1);color:white;
  }
  .rank-row:last-child{border-bottom:none;}
  .rank-pos{
    width:32px;height:32px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:16px;flex-shrink:0;
  }
  .rank-pos.gold{background:linear-gradient(135deg,#ffeb3b,#ff9800);color:#5a3a00;box-shadow:0 0 16px rgba(255,200,0,.6);}
  .rank-pos.silver{background:linear-gradient(135deg,#e0e0e0,#9e9e9e);color:#333;}
  .rank-pos.bronze{background:linear-gradient(135deg,#d4a574,#8b5a2b);color:#fff;}
  .rank-pos.other{background:rgba(255,255,255,.1);color:#aaa;}
  .rank-name{flex:1;font-weight:600;}
  .rank-score{font-weight:700;font-size:18px;color:#ffeb3b;}
</style>
</head>
<body>
<div id="app">

  <!-- ============ SETUP SCREEN ============ -->
  <div id="setupScreen" class="screen active">
    <div class="logo">
      <h1>BOWL<span class="pin-emoji">🎳</span>SPEL</h1>
      <p>Wii Sports stijl · 2 tot 10 spelers</p>
    </div>

    <div class="panel">
      <h2>AANTAL SPELERS</h2>
      <div class="count-row">
        <button class="count-btn" id="minusBtn">−</button>
        <div class="count-display"><span id="playerCount">2</span><small>SPELERS</small></div>
        <button class="count-btn" id="plusBtn">+</button>
      </div>
    </div>

    <div class="panel">
      <h2>NAMEN</h2>
      <div class="player-list" id="playerList"></div>
    </div>

    <button class="big-btn" id="startBtn">SPELEN! 🎳</button>
  </div>

  <!-- ============ GAME SCREEN ============ -->
  <div id="gameScreen" class="screen">
    <canvas id="bowlingCanvas"></canvas>

    <div id="pinIndicator">
      <div class="pin-grid" id="pinGrid"></div>
      <div><span id="pinsStanding">10</span>/10</div>
    </div>

    <div id="scoreboard">
      <div class="sb-title">🎳 SCORE 🎳</div>
      <div id="scoreRows"></div>
    </div>

    <div id="swipeArea">
      <div id="aimGuide"></div>
      <div id="powerBar"><div id="powerFill"></div></div>
    </div>

    <div id="hintBubble">Veeg omhoog om te gooien<br><small style="font-weight:400">⬆️ richting = mikken · snelheid = kracht</small></div>

    <div id="hud">
      <div id="turnIndicator"><span class="p-color" id="pColor"></span><span id="pName">Speler 1</span> · <span id="throwNum">Worp 1</span></div>
      <div id="throwInfo"></div>
    </div>

    <div id="throwResult"></div>
  </div>

  <!-- ============ RESULTS SCREEN ============ -->
  <div id="resultsScreen" class="screen">
    <div class="trophy">🏆</div>
    <h1>WINNAAR!</h1>
    <div class="winner-name" id="winnerName">—</div>
    <div class="ranking" id="ranking"></div>
    <button class="big-btn" id="playAgainBtn">NOG EEN KEER 🎳</button>
    <button class="big-btn secondary" id="newGameBtn">NIEUW SPEL</button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   BOWLSPEL · Wii Sports stijl · iPhone Safari
   ============================================================ */

// ---------- Player colors (Wii-style bright palette) ----------
const PLAYER_COLORS = [
  '#ff5252','#42a5f5','#66bb6a','#ffb74d','#ab47bc',
  '#26c6da','#ec407a','#9ccc65','#7e57c2','#ffa726'
];

// ---------- State ----------
const state = {
  playerCount: 2,
  players: [],          // {name, color, throws:[], total, frame:{t1,t2,strike,spare}}
  currentPlayer: 0,
  currentThrow: 1,      // 1 or 2
  pinsStanding: [true,true,true,true,true,true,true,true,true,true],
  pinsHitThisThrow: 0,
  isThrowing: false,
  gameOver: false,
};

// ---------- Initialize Setup Screen ----------
function buildPlayerInputs(){
  const list = document.getElementById('playerList');
  list.innerHTML = '';
  for(let i=0;i<state.playerCount;i++){
    const existing = state.players[i] ? state.players[i].name : `Speler ${i+1}`;
    const color = PLAYER_COLORS[i % PLAYER_COLORS.length];
    const row = document.createElement('div');
    row.className = 'player-input-row';
    row.innerHTML = `
      <div class="player-badge" style="background:${color}">${i+1}</div>
      <input class="player-input" type="text" maxlength="14" value="${existing}" data-idx="${i}">
    `;
    list.appendChild(row);
  }
  // Reflect counts
  document.getElementById('playerCount').textContent = state.playerCount;
  document.getElementById('minusBtn').disabled = state.playerCount <= 2;
  document.getElementById('plusBtn').disabled  = state.playerCount >= 10;
}

document.getElementById('minusBtn').addEventListener('click',()=>{
  if(state.playerCount>2){ state.playerCount--; buildPlayerInputs(); }
});
document.getElementById('plusBtn').addEventListener('click',()=>{
  if(state.playerCount<10){ state.playerCount++; buildPlayerInputs(); }
});
document.getElementById('startBtn').addEventListener('click',startGame);
buildPlayerInputs();

// ---------- Start Game ----------
function startGame(){
  // Collect names
  const inputs = document.querySelectorAll('.player-input');
  state.players = [];
  inputs.forEach((inp,i)=>{
    const name = inp.value.trim() || `Speler ${i+1}`;
    state.players.push({
      name,
      color: PLAYER_COLORS[i % PLAYER_COLORS.length],
      frame: {t1:null,t2:null,strike:false,spare:false},
      total: 0,
      done: false,
    });
  });
  state.currentPlayer = 0;
  state.currentThrow = 1;
  state.gameOver = false;
  switchScreen('gameScreen');
  if(!sceneInited) initScene();
  resetPinsAndBall();
  updateScoreboard();
  updateTurnIndicator();
  showHint(true);
}

function switchScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ============================================================
   THREE.JS SCENE
   ============================================================ */
let scene,camera,renderer,clock;
let lane,ball,pins=[],ballStartPos,gutterL,gutterR;
let ballPhysics=null; // when throwing
let sceneInited=false;
let aimArrow=null;
let cameraTarget = new THREE.Vector3(0, 0.4, 8);
let pinsViewUntil = 0;
const DEFAULT_CAM_POS = new THREE.Vector3(0, 1.35, -2.4);
const DEFAULT_CAM_LOOK = new THREE.Vector3(0, 0.5, 10);
const PIN_CAM_POS = new THREE.Vector3(0, 1.2, 14.5);
const PIN_CAM_LOOK = new THREE.Vector3(0, 0.5, 18.5);

function initScene(){
  sceneInited=true;
  const canvas = document.getElementById('bowlingCanvas');
  renderer = new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight,false);

  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a2840);
  scene.fog = new THREE.Fog(0x1a2840, 14, 28);

  // Camera: portrait friendly, behind ball, slightly elevated
  camera = new THREE.PerspectiveCamera(58, window.innerWidth/window.innerHeight, 0.1, 60);
  camera.position.copy(DEFAULT_CAM_POS);
  cameraTarget.copy(DEFAULT_CAM_LOOK);
  camera.lookAt(cameraTarget);

  // Lights
  const ambient = new THREE.AmbientLight(0xffffff, 0.55);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
  dirLight.position.set(2, 8, 3);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 1024;
  dirLight.shadow.mapSize.height = 1024;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 30;
  dirLight.shadow.camera.left = -3;
  dirLight.shadow.camera.right = 3;
  dirLight.shadow.camera.top = 12;
  dirLight.shadow.camera.bottom = -2;
  scene.add(dirLight);

  // Warm spot above pins
  const pinSpot = new THREE.SpotLight(0xfff2cc, 1.2, 12, Math.PI/4, 0.4, 1);
  pinSpot.position.set(0, 6, 18);
  pinSpot.target.position.set(0,0,18.5);
  scene.add(pinSpot);scene.add(pinSpot.target);

  // ----- BOWLING ALLEY ENVIRONMENT -----
  // Floor (dark surrounding)
  const floorGeo = new THREE.PlaneGeometry(40, 40);
  const floorMat = new THREE.MeshStandardMaterial({color:0x0a1428,roughness:.9,metalness:.0});
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2;
  floor.position.y = -0.05;
  floor.receiveShadow = true;
  scene.add(floor);

  // Lane (wood)
  const laneLength = 19;
  const laneWidth = 1.40;
  const laneCanvas = makeLaneTexture();
  const laneTex = new THREE.CanvasTexture(laneCanvas);
  laneTex.wrapS = THREE.RepeatWrapping;
  laneTex.wrapT = THREE.RepeatWrapping;
  const laneMat = new THREE.MeshStandardMaterial({map:laneTex,roughness:.25,metalness:.05});
  lane = new THREE.Mesh(new THREE.PlaneGeometry(laneWidth, laneLength), laneMat);
  lane.rotation.x = -Math.PI/2;
  lane.position.set(0, 0, laneLength/2 - 1);
  lane.receiveShadow = true;
  scene.add(lane);

  // Foul line
  const foulLine = new THREE.Mesh(
    new THREE.PlaneGeometry(laneWidth, 0.04),
    new THREE.MeshBasicMaterial({color:0xcc0000})
  );
  foulLine.rotation.x = -Math.PI/2;
  foulLine.position.set(0, 0.001, 0);
  scene.add(foulLine);

  // Lane arrows (the "dovetail" guides typical of bowling lanes)
  for(let i=0;i<7;i++){
    const arrow = new THREE.Mesh(
      new THREE.ConeGeometry(0.06, 0.20, 3),
      new THREE.MeshBasicMaterial({color:0x4a2a10})
    );
    arrow.rotation.x = -Math.PI/2;
    arrow.rotation.z = Math.PI;
    arrow.position.set((i-3)*0.13, 0.002, 4.0);
    scene.add(arrow);
  }

  // Gutters (left + right)
  const gutterMat = new THREE.MeshStandardMaterial({color:0x1a1a2e, roughness:.5, metalness:.2});
  const gutterGeo = new THREE.BoxGeometry(0.25, 0.04, laneLength);
  gutterL = new THREE.Mesh(gutterGeo, gutterMat);
  gutterR = new THREE.Mesh(gutterGeo, gutterMat);
  gutterL.position.set(-(laneWidth/2 + 0.125), -0.02, laneLength/2 - 1);
  gutterR.position.set( (laneWidth/2 + 0.125), -0.02, laneLength/2 - 1);
  gutterL.receiveShadow = true; gutterR.receiveShadow = true;
  scene.add(gutterL); scene.add(gutterR);

  // Back wall with neon pin-deck area
  const deckBack = new THREE.Mesh(
    new THREE.BoxGeometry(4, 2.5, 0.1),
    new THREE.MeshStandardMaterial({color:0x0a0a1e,roughness:.7,emissive:0x110033,emissiveIntensity:.3})
  );
  deckBack.position.set(0,1.2,laneLength + 0.2);
  scene.add(deckBack);

  // Pin deck (lighter platform)
  const deckGeo = new THREE.PlaneGeometry(laneWidth + 0.5, 1.5);
  const deckMat = new THREE.MeshStandardMaterial({color:0xeeeeee,roughness:.6});
  const deck = new THREE.Mesh(deckGeo, deckMat);
  deck.rotation.x = -Math.PI/2;
  deck.position.set(0, 0.005, laneLength + 0.1);
  deck.receiveShadow = true;
  scene.add(deck);

  // Side walls glow
  const sideMat = new THREE.MeshBasicMaterial({color:0xff3399});
  for(let i=0;i<2;i++){
    const sx = i===0 ? -2 : 2;
    const sw = new THREE.Mesh(
      new THREE.BoxGeometry(0.05, 1.5, laneLength),
      new THREE.MeshStandardMaterial({color:0x220044,emissive:0xff3399,emissiveIntensity:.6})
    );
    sw.position.set(sx, 0.75, laneLength/2 - 1);
    scene.add(sw);
  }

  // ----- PINS -----
  buildPins();

  // ----- BALL -----
  ball = makeBall();
  ballStartPos = new THREE.Vector3(0, 0.105, 0.3);
  ball.position.copy(ballStartPos);
  scene.add(ball);

  // ----- AIM ARROW -----
  aimArrow = new THREE.Group();
  scene.add(aimArrow);
  updateAimArrow(0, 0.35, 0, false);

  clock = new THREE.Clock();
  animate();
  window.addEventListener('resize', onResize);
  setupTouchControls();
}

function makeLaneTexture(){
  const c = document.createElement('canvas');
  c.width = 128; c.height = 1024;
  const ctx = c.getContext('2d');
  // Base wood
  const grad = ctx.createLinearGradient(0,0,128,0);
  grad.addColorStop(0,'#c08a52');
  grad.addColorStop(.5,'#d4a574');
  grad.addColorStop(1,'#a87042');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,128,1024);
  // Wood planks (vertical lines)
  for(let i=1;i<7;i++){
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.fillRect(i*18,0,1,1024);
  }
  // Wood grain - random horizontal streaks
  for(let i=0;i<80;i++){
    ctx.fillStyle = `rgba(80,40,20,${Math.random()*.15})`;
    const y = Math.random()*1024;
    const w = Math.random()*128;
    const x = Math.random()*(128-w);
    ctx.fillRect(x,y,w,1+Math.random()*2);
  }
  // Add dot guides near the foul line area (visible markers)
  ctx.fillStyle = 'rgba(20,10,0,.5)';
  for(let i=0;i<7;i++){
    ctx.beginPath();
    ctx.arc(16 + i*16, 960, 2.5, 0, Math.PI*2);
    ctx.fill();
  }
  return c;
}

function makePinTexture(){
  const c = document.createElement('canvas');
  c.width = 64; c.height = 128;
  const ctx = c.getContext('2d');
  // White
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,64,128);
  // Two red stripes near top (neck)
  ctx.fillStyle = '#e53935';
  ctx.fillRect(0, 22, 64, 4);
  ctx.fillRect(0, 32, 64, 4);
  return c;
}

function makeBall(){
  const group = new THREE.Group();
  // Ball body
  const ballGeo = new THREE.SphereGeometry(0.105, 28, 24);
  const ballMat = new THREE.MeshStandardMaterial({color:0xcc0033, roughness:.25, metalness:.4});
  const sphere = new THREE.Mesh(ballGeo, ballMat);
  sphere.castShadow = true;
  group.add(sphere);
  // Finger holes (just visual hints)
  const holeMat = new THREE.MeshBasicMaterial({color:0x330011});
  for(let i=0;i<3;i++){
    const hole = new THREE.Mesh(new THREE.CircleGeometry(0.012, 12), holeMat);
    const ang = (i/3)*Math.PI*0.4 + 0.5;
    hole.position.set(Math.cos(ang)*0.025, 0.10, Math.sin(ang)*0.025);
    hole.rotation.x = -Math.PI/2;
    group.add(hole);
  }
  return group;
}

function makePin(){
  // Wii-style bowling pin: bottle shape - scaled up for visibility
  const points = [
    [0.000, 0.000],
    [0.040, 0.005],
    [0.054, 0.030],
    [0.057, 0.060],
    [0.048, 0.110],
    [0.035, 0.160],
    [0.034, 0.205],
    [0.040, 0.250],
    [0.046, 0.290],
    [0.028, 0.330],
    [0.020, 0.355],
    [0.014, 0.370],
    [0.000, 0.375],
  ];
  const lathePoints = points.map(p => new THREE.Vector2(p[0], p[1]));
  const pinGeo = new THREE.LatheGeometry(lathePoints, 18);
  const pinTex = new THREE.CanvasTexture(makePinTexture());
  const pinMat = new THREE.MeshStandardMaterial({map:pinTex, roughness:.5, metalness:.1});
  const pin = new THREE.Mesh(pinGeo, pinMat);
  pin.scale.set(1.35, 1.35, 1.35);
  pin.castShadow = true;
  pin.receiveShadow = true;
  return pin;
}

function pinLayoutPositions(){
  // Bowling triangle, head pin closest to bowler (lowest Z in our system means closer to player)
  // We'll place pins around Z = laneLength - 0.8 (head pin)
  const headZ = 18.0;
  const dx = 0.30;    // pin lateral spacing
  const dz = 0.26;    // row spacing (sqrt(3)/2 * dx for equilateral)
  return [
    {x:0, z:headZ},                                            // 1 head
    {x:-dx/2, z:headZ+dz}, {x:dx/2, z:headZ+dz},               // 2,3
    {x:-dx,   z:headZ+2*dz}, {x:0, z:headZ+2*dz}, {x:dx, z:headZ+2*dz}, // 4,5,6
    {x:-1.5*dx, z:headZ+3*dz}, {x:-dx/2, z:headZ+3*dz},
    {x:dx/2, z:headZ+3*dz}, {x:1.5*dx, z:headZ+3*dz},          // 7,8,9,10
  ];
}

function buildPins(){
  pins.forEach(p => scene.remove(p.mesh));
  pins = [];
  const positions = pinLayoutPositions();
  positions.forEach((pos,i)=>{
    const mesh = makePin();
    mesh.position.set(pos.x, 0, pos.z);
    scene.add(mesh);
    pins.push({
      mesh,
      basePos: {x:pos.x, y:0, z:pos.z},
      standing: true,
      falling: false,
      fallVelocity: 0,
      fallAxis: new THREE.Vector3(1,0,0),
      fallAngle: 0,
      fallTarget: Math.PI/2,
      animationDelay: 0,
    });
  });
}

/* ============================================================
   AIM ARROW (Wii-style)
   ============================================================ */
function updateAimArrow(angle, power, spin, active){
  if(!aimArrow) return;
  // Clear children
  while(aimArrow.children.length){
    const c = aimArrow.children[0];
    aimArrow.remove(c);
    if(c.geometry) c.geometry.dispose();
    if(c.material) c.material.dispose();
  }
  const startX = ball.position.x;
  const startZ = ball.position.z + 0.16;
  const len = 2.2 + power * 5.5;
  const points = [];
  const segments = 28;
  for(let i = 0; i <= segments; i++){
    const t = i / segments;
    const z = startZ + t * len;
    // straight component from angle + quadratic from spin
    const x = startX + Math.sin(angle) * t * len + spin * 0.55 * t * t * len;
    points.push(new THREE.Vector3(x, 0.005, z));
  }
  // Color shifts with power: green → yellow → red
  const r = active ? Math.min(255, 80 + power*255) : 255;
  const g = active ? Math.min(255, 220 - power*100) : 200;
  const b = active ? 30 : 80;
  const color = (r<<16)|(g<<8)|b;
  const opacity = active ? 0.85 : 0.30;

  // Outer glow (thicker, more transparent)
  const curve = new THREE.CatmullRomCurve3(points);
  const glowGeo = new THREE.TubeGeometry(curve, segments, 0.055, 8, false);
  const glowMat = new THREE.MeshBasicMaterial({
    color, transparent:true, opacity:opacity*0.4, depthTest:false, depthWrite:false
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.renderOrder = 4;
  aimArrow.add(glow);

  // Core tube
  const tubeGeo = new THREE.TubeGeometry(curve, segments, 0.028, 6, false);
  const tubeMat = new THREE.MeshBasicMaterial({
    color, transparent:true, opacity, depthTest:false, depthWrite:false
  });
  const tube = new THREE.Mesh(tubeGeo, tubeMat);
  tube.renderOrder = 5;
  aimArrow.add(tube);

  // Arrow head (cone) at tip
  const tipPos  = points[points.length-1];
  const tipPrev = points[points.length-4];
  const tipDir  = new THREE.Vector3().subVectors(tipPos, tipPrev).normalize();
  const tipColor = active ? 0xff5722 : 0xffaa00;
  const cone = new THREE.Mesh(
    new THREE.ConeGeometry(0.11, 0.26, 10),
    new THREE.MeshBasicMaterial({
      color: tipColor, transparent:true, opacity, depthTest:false, depthWrite:false
    })
  );
  cone.position.copy(tipPos);
  cone.position.y = 0.07;
  cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), tipDir);
  cone.renderOrder = 6;
  aimArrow.add(cone);
}

function setAimArrowVisible(v){
  if(aimArrow) aimArrow.visible = v;
}

function resetPinsAndBall(resetPinsToStand=true){
  if(resetPinsToStand){
    state.pinsStanding = [true,true,true,true,true,true,true,true,true,true];
    pins.forEach((p,i)=>{
      p.standing = true; p.falling = false;
      p.mesh.position.set(p.basePos.x, p.basePos.y, p.basePos.z);
      p.mesh.rotation.set(0,0,0);
      p.mesh.visible = true;
    });
  } else {
    // Remove only the pins that were knocked down so far this frame
    pins.forEach((p,i)=>{
      if(!state.pinsStanding[i]) p.mesh.visible = false;
    });
  }
  ball.position.copy(ballStartPos);
  ball.rotation.set(0,0,0);
  ballPhysics = null;
  state.isThrowing = false;
  updatePinIndicator();
  // Reset aim arrow
  if(aimArrow){
    setAimArrowVisible(true);
    updateAimArrow(0, 0.35, 0, false);
  }
}

function onResize(){
  if(!renderer) return;
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}

/* ============================================================
   MAIN ANIMATION LOOP
   ============================================================ */
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 1/30);

  // Update ball physics
  if(ballPhysics){
    updateBallPhysics(dt);
  }
  // Update pin fall animations
  for(const pin of pins){
    if(pin.falling){
      pin.fallVelocity += dt * 6.5;
      pin.fallAngle += pin.fallVelocity * dt;
      if(pin.fallAngle > pin.fallTarget){
        pin.fallAngle = pin.fallTarget;
        pin.falling = false;
      }
      const axis = pin.fallAxis;
      pin.mesh.rotation.set(0,0,0);
      pin.mesh.rotateOnWorldAxis(axis, pin.fallAngle);
      pin.mesh.position.y = pin.basePos.y - Math.sin(pin.fallAngle)*0.0;
    }
  }

  // ---- Cinematic camera ----
  updateCamera(dt);

  renderer.render(scene, camera);
}

function updateCamera(dt){
  let targetPos, targetLook, targetFOV;
  const k = Math.min(1, dt * 5.5); // lerp factor

  if(ballPhysics && !ballPhysics.rolledOff){
    // CHASE: follow behind ball, get closer as it travels
    const ballZ = ball.position.z;
    const ballX = ball.position.x;
    // Progressively get lower & closer as ball nears pins
    const progress = Math.min(1, Math.max(0, (ballZ - 0.3) / 17));
    const offsetZ = -2.4 + progress * 0.8;     // -2.4 → -1.6 (closer)
    const offsetY = 1.30 - progress * 0.30;    // 1.30 → 1.0 (lower)
    targetPos = new THREE.Vector3(
      ballX * 0.45,
      offsetY,
      ballZ + offsetZ
    );
    targetLook = new THREE.Vector3(
      ballX * 0.25,
      0.45,
      ballZ + 3.5
    );
    // Zoom in during impact zone (close to pins)
    if(ballZ > 13){
      const t = Math.min(1, (ballZ - 13) / 5);
      targetFOV = 58 - t * 14; // 58 → 44 (zoom in)
    } else {
      targetFOV = 58;
    }
  } else if(performance.now() < pinsViewUntil){
    // PINS VIEW: hold on the pin deck briefly after throw
    targetPos = PIN_CAM_POS;
    targetLook = PIN_CAM_LOOK;
    targetFOV = 42;
  } else {
    // DEFAULT: aiming view from behind ball
    targetPos = DEFAULT_CAM_POS;
    targetLook = DEFAULT_CAM_LOOK;
    targetFOV = 58;
  }

  camera.position.lerp(targetPos, k);
  cameraTarget.lerp(targetLook, k);
  camera.lookAt(cameraTarget);
  if(Math.abs(camera.fov - targetFOV) > 0.05){
    camera.fov += (targetFOV - camera.fov) * k;
    camera.updateProjectionMatrix();
  }
}

/* ============================================================
   BALL PHYSICS
   ============================================================ */
function startBallPhysics(power, aimAngle, spin){
  // power: 0..1 ; aimAngle: radians (small, ~ -0.25..0.25)
  // spin: lateral acceleration -0.5..0.5
  const minSpeed = 7;
  const maxSpeed = 14;
  const speed = minSpeed + power*(maxSpeed-minSpeed);
  ballPhysics = {
    vx: Math.sin(aimAngle)*speed,
    vz: Math.cos(aimAngle)*speed, // positive = down lane
    ax: spin*2.5,
    inGutter: false,
    spinDecay: 0.6,
    timeAlive: 0,
    hasReachedPins: false,
    rolledOff: false,
  };
  state.isThrowing = true;
  state.pinsHitThisThrow = 0;
  showHint(false);
  hideAimGuide();
  setAimArrowVisible(false);
  // Subtle rumble sound
  playRollSound();
}

function updateBallPhysics(dt){
  const p = ballPhysics;
  p.timeAlive += dt;
  // Apply spin (lateral acceleration), decay over time
  p.vx += p.ax * dt;
  p.ax *= (1 - p.spinDecay*dt);
  // Friction
  p.vz *= 0.998;

  // Move ball
  ball.position.x += p.vx * dt;
  ball.position.z += p.vz * dt;

  // Ball rolls: rotation around X axis (lateral axis)
  const rollSpeed = p.vz / 0.105;
  ball.rotation.x += rollSpeed * dt;
  // Slight rotation Z for spin visual
  ball.rotation.z += p.ax * dt * 0.3;

  // Gutter check (lane edges)
  const halfLane = 0.62;
  if(Math.abs(ball.position.x) > halfLane && !p.inGutter){
    p.inGutter = true;
    // Snap to gutter, kill spin/lateral
    const side = Math.sign(ball.position.x);
    ball.position.x = side * (halfLane + 0.14);
    ball.position.y = 0.07; // slightly lower in gutter
    p.vx = 0; p.ax = 0;
    p.vz *= 0.85;
  }

  // Collision with pins (only if not in gutter)
  if(!p.inGutter){
    checkPinCollisions();
  }

  // Ball reached end of lane
  if(ball.position.z > 19 || p.timeAlive > 6 || (p.inGutter && ball.position.z > 18)){
    if(!p.rolledOff){
      p.rolledOff = true;
      finishThrow();
    }
  }
}

function checkPinCollisions(){
  const ballR = 0.105;
  const pinR  = 0.078; // scaled-up pin
  const collisionR = ballR + pinR;
  for(let i=0;i<pins.length;i++){
    const pin = pins[i];
    if(!pin.standing) continue;
    const dx = ball.position.x - pin.mesh.position.x;
    const dz = ball.position.z - pin.mesh.position.z;
    const dist2 = dx*dx + dz*dz;
    if(dist2 < collisionR*collisionR){
      knockPin(i, {dx,dz}, /*chained*/false);
      // Slightly affect ball trajectory
      ballPhysics.vx += dx * 0.4;
      ballPhysics.vz *= 0.97;
    }
  }
}

function knockPin(idx, hitDir, chained){
  const pin = pins[idx];
  if(!pin.standing) return;
  pin.standing = false;
  pin.falling = true;
  state.pinsStanding[idx] = false;
  state.pinsHitThisThrow++;
  playPinSound();
  // Determine fall direction - axis perpendicular to hit direction
  let dirX = hitDir.dx;
  let dirZ = hitDir.dz;
  // Normalize
  const mag = Math.sqrt(dirX*dirX + dirZ*dirZ) || 1;
  dirX /= mag; dirZ /= mag;
  // Rotation axis is (dz, 0, -dx) normalized (perpendicular in XZ)
  pin.fallAxis = new THREE.Vector3(dirZ, 0, -dirX).normalize();
  pin.fallVelocity = chained ? 3.0 : 5.0 + Math.random()*1.5;
  pin.fallAngle = 0;
  pin.fallTarget = Math.PI/2 * (0.95 + Math.random()*0.1);

  updatePinIndicator();

  // Cascade: only chain from ball-hit pins, with directional check
  // Chained pins do NOT trigger further cascades (prevents domino-everything)
  if(!chained){
    setTimeout(()=>cascadePin(idx, dirX, dirZ, 1), 90);
  } else {
    // Very limited secondary cascade for chained pins
    setTimeout(()=>cascadePin(idx, dirX, dirZ, 2), 120);
  }
}

function cascadePin(srcIdx, prevDirX, prevDirZ, depth){
  const src = pins[srcIdx];
  const srcPos = src.basePos;
  for(let j=0;j<pins.length;j++){
    if(j===srcIdx) continue;
    const tgt = pins[j];
    if(!tgt.standing) continue;
    const dx = tgt.basePos.x - srcPos.x;
    const dz = tgt.basePos.z - srcPos.z;
    const d  = Math.sqrt(dx*dx + dz*dz);
    if(d >= 0.32) continue; // only immediate neighbors
    // Normalized direction from source to target
    const nx = dx / d;
    const nz = dz / d;
    // Dot with fall direction: 1 = directly in front, -1 = behind
    const dotProd = nx*prevDirX + nz*prevDirZ;
    let chance = 0;
    if(dotProd > 0.55){
      chance = 0.92;   // directly in front of fall
    } else if(dotProd > 0.15){
      chance = 0.55;   // diagonal forward
    } else if(dotProd > -0.20){
      chance = 0.18;   // sideways
    } else {
      chance = 0.03;   // behind (rare)
    }
    // Depth penalty: cascaded pins propagate less
    if(depth >= 2) chance *= 0.45;
    if(depth >= 3) chance *= 0.30;
    if(Math.random() < chance){
      knockPin(j, {dx,dz}, true);
    }
  }
}

/* ============================================================
   THROW FLOW
   ============================================================ */
function finishThrow(){
  const pinsHit = state.pinsHitThisThrow;
  const player = state.players[state.currentPlayer];
  // Linger on pin area briefly to show the result
  pinsViewUntil = performance.now() + 1500;

  if(state.currentThrow === 1){
    player.frame.t1 = pinsHit;
    if(pinsHit === 10){
      player.frame.strike = true;
      player.total = 10;
      player.done = true;
      celebrate('strike');
      shakeCanvas();
      setTimeout(()=>nextPlayer(), 2000);
    } else {
      // Show throw result then second throw
      showResultText(throwAdjective(pinsHit));
      setTimeout(()=>secondThrow(), 1700);
    }
  } else {
    // Second throw
    player.frame.t2 = pinsHit;
    player.total = (player.frame.t1 || 0) + pinsHit;
    if(player.total === 10){
      player.frame.spare = true;
      celebrate('spare');
      shakeCanvas();
    } else if(player.total === 0){
      showResultText(pick(['Gutter!','Pech!','Helaas!']));
    } else {
      showResultText(throwAdjective(player.total));
    }
    player.done = true;
    setTimeout(()=>nextPlayer(), player.frame.spare ? 2000 : 1700);
  }
  updateScoreboard();
}

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function shakeCanvas(){
  const cnv = document.getElementById('bowlingCanvas');
  cnv.classList.remove('shake');
  // force reflow
  void cnv.offsetWidth;
  cnv.classList.add('shake');
}

function secondThrow(){
  state.currentThrow = 2;
  ball.position.copy(ballStartPos);
  ball.rotation.set(0,0,0);
  ballPhysics = null;
  state.isThrowing = false;
  updateTurnIndicator();
  showHint(true);
  if(aimArrow){
    setAimArrowVisible(true);
    updateAimArrow(0, 0.35, 0, false);
  }
}

function nextPlayer(){
  // Hide hint, reset pins, advance
  showHint(false);
  if(state.currentPlayer < state.players.length - 1){
    state.currentPlayer++;
    state.currentThrow = 1;
    resetPinsAndBall(true);
    updateTurnIndicator();
    updateScoreboard();
    showHint(true);
  } else {
    showFinalResults();
  }
}

function throwAdjective(pins){
  if(pins===0) return pick(['Gutter!','Pech!','Helaas!','Bah!']);
  if(pins<=2) return pick(['Oei...','Hmm','Net niet','Volgende keer beter']);
  if(pins<=4) return pick(['Niet slecht!','Aardig','Ok!','Beetje']);
  if(pins<=6) return pick(['Goed gegooid!','Lekker bezig','Mooi!','Top']);
  if(pins<=8) return pick(['Lekker!','Cool!','Knap!','Wauw!']);
  return pick(['Super!','Bijna strike!','Geweldig!','Wow!']);
}

/* ============================================================
   UI UPDATES
   ============================================================ */
function updateTurnIndicator(){
  const p = state.players[state.currentPlayer];
  document.getElementById('pName').textContent = p.name;
  document.getElementById('pColor').style.background = p.color;
  document.getElementById('throwNum').textContent = `Worp ${state.currentThrow}`;
}

function updateScoreboard(){
  const container = document.getElementById('scoreRows');
  container.innerHTML = '';
  state.players.forEach((p, i)=>{
    const row = document.createElement('div');
    row.className = 'score-row' + (i===state.currentPlayer ? ' current' : '') + (p.done ? ' done' : '');
    let t1 = p.frame.t1 == null ? '·' : (p.frame.strike ? 'X' : p.frame.t1);
    let t2 = '·';
    if(p.frame.t1 != null && !p.frame.strike){
      t2 = p.frame.t2 == null ? '·' : (p.frame.spare ? '/' : p.frame.t2);
    }
    const t1Cls = p.frame.strike ? 'strike' : '';
    const t2Cls = p.frame.spare ? 'spare' : '';
    row.innerHTML = `
      <div class="sr-name" style="color:${p.color}">${escapeHtml(p.name)}</div>
      <div class="sr-frame">
        <div class="sr-throw ${t1Cls}">${t1}</div>
        <div class="sr-throw ${t2Cls}">${t2}</div>
      </div>
      <div class="sr-total">${p.total||0}</div>
    `;
    container.appendChild(row);
  });
}

function updatePinIndicator(){
  // Standing pin count + visual diamond grid
  const grid = document.getElementById('pinGrid');
  if(grid.children.length === 0){
    // Build 10 pin dots in order: row1 (4 back pins 7,8,9,10), row2 (4,5,6), row3(2,3), row4(1 head)
    // We'll render with the head pin at bottom
    // Order in DOM: 7,8,9,10, 4,5,6, 2,3, 1 (matches state index +1)
    const renderOrder = [6,7,8,9, 3,4,5, 1,2, 0]; // state idx of pins 7-10, 4-6, 2-3, 1
    grid.dataset.order = renderOrder.join(',');
    for(let i=0;i<10;i++){
      const d = document.createElement('div');
      d.className = 'pin-dot';
      grid.appendChild(d);
    }
  }
  const order = grid.dataset.order.split(',').map(n=>parseInt(n,10));
  let standing = 0;
  for(let i=0;i<10;i++){
    const stIdx = order[i];
    const dot = grid.children[i];
    if(state.pinsStanding[stIdx]){
      dot.className = 'pin-dot standing';
      standing++;
    } else {
      dot.className = 'pin-dot fallen';
    }
  }
  document.getElementById('pinsStanding').textContent = standing;
}

function showHint(show){
  document.getElementById('hintBubble').classList.toggle('hide', !show);
}

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);}

/* ============================================================
   THROW RESULT / CELEBRATIONS
   ============================================================ */
function showResultText(text, klass=''){
  const el = document.getElementById('throwResult');
  el.innerHTML = `<div class="result-text ${klass}">${text}</div>`;
  el.classList.add('show');
  setTimeout(()=>{
    el.classList.remove('show');
    setTimeout(()=>{ el.innerHTML = ''; }, 200);
  }, 1200);
}

function celebrate(type){
  if(type === 'strike'){
    const txt = pick(['STRIKE!','PERFECT!','AMAZING!','BOOM!']);
    showResultText(txt, 'strike');
    spawnConfetti(140);
    spawnSparkles(24);
    playStrikeSound();
  } else if(type === 'spare'){
    const txt = pick(['SPARE!','NICE!','GAAF!']);
    showResultText(txt, 'spare');
    spawnConfetti(80);
    spawnSparkles(14);
    playSpareSound();
  }
}

function spawnConfetti(count){
  const colors = ['#ff5252','#ffeb3b','#42a5f5','#66bb6a','#ab47bc','#ff9800','#26c6da','#ec407a'];
  for(let i=0;i<count;i++){

function spawnSparkles(count){
  const screen = document.getElementById('gameScreen');
  for(let i=0;i<count;i++){
    const s = document.createElement('div');

/* ============================================================
   SOUND (Web Audio API synthesis)
   ============================================================ */
let audioCtx = null;
function getAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playRollSound(){
  const ctx = getAudio(); if(!ctx) return;
  // Brown-noise burst for rolling rumble
  const bufferSize = ctx.sampleRate * 1.6;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  let last = 0;
  for(let i=0;i<bufferSize;i++){
    const white = Math.random()*2-1;
    last = (last + (0.02 * white)) / 1.02;
    data[i] = last * 8;
  }
  const src = ctx.createBufferSource();
  src.buffer = buffer;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.1);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.4);
  const lowpass = ctx.createBiquadFilter();
  lowpass.type = 'lowpass';
  lowpass.frequency.value = 600;
  src.connect(lowpass).connect(gain).connect(ctx.destination);
  src.start();
}

function playPinSound(){
  const ctx = getAudio(); if(!ctx) return;
  // Short clack
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(800 + Math.random()*300, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.08);
  gain.gain.setValueAtTime(0.0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.005);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.10);
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.12);
}

function playStrikeSound(){
  const ctx = getAudio(); if(!ctx) return;
  // Fanfare: ascending arpeggio
  const notes = [523, 659, 784, 1046, 1318];
  notes.forEach((f, i)=>{
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    const t = ctx.currentTime + i*0.10;
    osc.frequency.setValueAtTime(f, t);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.15, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.4);
  });
}

function playSpareSound(){
  const ctx = getAudio(); if(!ctx) return;
  const notes = [523, 784, 1046];
  notes.forEach((f,i)=>{
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    const t = ctx.currentTime + i*0.10;
    osc.frequency.setValueAtTime(f, t);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.13, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.35);
  });
}

/* ============================================================
   TOUCH CONTROLS
   ============================================================ */
function setupTouchControls(){
  const area = document.getElementById('swipeArea');
  let startX=0, startY=0, startT=0;
  let lastX=0, lastY=0, lastT=0;
  let tracking = false;
  let pathSamples = [];

  const gameScreen = document.getElementById('gameScreen');

  function onStart(e){
    if(state.isThrowing) return;
    const p = getPoint(e);
    if(!p) return;
    tracking = true;
    startX = lastX = p.x;
    startY = lastY = p.y;
    startT = lastT = performance.now();
    pathSamples = [{x:p.x, y:p.y, t:startT}];
    gameScreen.classList.add('controls-active');
    document.getElementById('powerFill').style.height = '0%';
    showHint(false);
    // Show aim arrow active
    setAimArrowVisible(true);
    updateAimArrow(0, 0.35, 0, true);
    // Try to start audio on first interaction
    getAudio();
    e.preventDefault();
  }

  function onMove(e){
    if(!tracking || state.isThrowing) return;
    const p = getPoint(e);
    if(!p) return;
    lastX = p.x; lastY = p.y; lastT = performance.now();
    pathSamples.push({x:lastX, y:lastY, t:lastT});
    if(pathSamples.length > 20) pathSamples.shift();
    // Power preview = vertical distance
    const dy = startY - lastY; // upward swipe positive
    const power = Math.min(1, Math.max(0, dy / (window.innerHeight*0.30)));
    document.getElementById('powerFill').style.height = (power*100) + '%';

    // Direction from horizontal drag (matches throw mapping)
    const dx = lastX - startX;
    const aimAngle = Math.max(-0.14, Math.min(0.14, (dx / window.innerWidth) * 0.40));

    // Compute live spin from path curvature (matches throw mapping)
    let spin = 0;
    if(pathSamples.length >= 4){
      const mid = Math.floor(pathSamples.length/2);
      const h1 = pathSamples[mid].x - pathSamples[0].x;
      const h2 = pathSamples[pathSamples.length-1].x - pathSamples[mid].x;
      const diff = h2 - h1;
      spin = Math.max(-0.35, Math.min(0.35, diff / (window.innerWidth*0.35)));
    }

    // Update 3D aim arrow live
    updateAimArrow(aimAngle, Math.max(0.20, power), spin, true);
    e.preventDefault();
  }

  function onEnd(e){
    if(!tracking) return;
    tracking = false;
    gameScreen.classList.remove('controls-active');

    const dy = startY - lastY;
    const dx = lastX - startX;
    const dt = (lastT - startT)/1000;

    // Compute swipe speed (use last ~150 ms of samples for snap)
    let swipeSpeed = 0;
    if(pathSamples.length >= 2){
      const cutoff = lastT - 200;
      let s0 = pathSamples[0];
      for(const s of pathSamples){ if(s.t >= cutoff){ s0 = s; break; } }
      const sdy = s0.y - lastY; // upward positive
      const sdt = Math.max(0.05, (lastT - s0.t)/1000);
      swipeSpeed = sdy / sdt; // px/s
    }

    // Need a meaningful upward swipe (easier thresholds)
    if(dy < 35 || swipeSpeed < 180){
      // Not a real throw, show hint again
      showHint(true);
      hideAimGuide();
      updateAimArrow(0, 0.35, 0, false);
      return;
    }

    // Map to physics (forgiving)
    // Power: combine swipe speed (px/s) into 0..1
    const power = Math.min(1, Math.max(0.40, swipeSpeed / 1800));
    // Aim angle: horizontal displacement in radians (less sensitive)
    const aimAngle = Math.max(-0.14, Math.min(0.14, (dx / window.innerWidth) * 0.40));
    // Spin: curvature of the path (less sensitive)
    let spin = 0;
    if(pathSamples.length >= 4){
      // Compare first half vs second half of horizontal direction
      const mid = Math.floor(pathSamples.length/2);
      const h1 = pathSamples[mid].x - pathSamples[0].x;
      const h2 = pathSamples[pathSamples.length-1].x - pathSamples[mid].x;
      const diff = h2 - h1;
      spin = Math.max(-0.35, Math.min(0.35, diff / (window.innerWidth*0.35)));
    }
    startBallPhysics(power, aimAngle, spin);
    e.preventDefault();
  }

  function getPoint(e){
    if(e.touches && e.touches.length>0){
      return {x:e.touches[0].clientX, y:e.touches[0].clientY};
    } else if(e.changedTouches && e.changedTouches.length>0){
      return {x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY};
    } else if(e.clientX != null){
      return {x:e.clientX, y:e.clientY};
    }
    return null;
  }

  area.addEventListener('touchstart', onStart, {passive:false});
  area.addEventListener('touchmove',  onMove,  {passive:false});
  area.addEventListener('touchend',   onEnd,   {passive:false});
  area.addEventListener('touchcancel',onEnd,   {passive:false});
  // Desktop fallback
  area.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onEnd);
}

function hideAimGuide(){
  const guide = document.getElementById('aimGuide');
  guide.style.height = '0px';
  document.getElementById('powerFill').style.height = '0%';
}

/* ============================================================
   FINAL RESULTS
   ============================================================ */
function showFinalResults(){
  state.gameOver = true;
  // Sort by score desc
  const sorted = [...state.players].sort((a,b)=>b.total - a.total);
  const winner = sorted[0];
  document.getElementById('winnerName').textContent = winner.name + ' · ' + winner.total + ' punten';

  const rank = document.getElementById('ranking');
  rank.innerHTML = '';
  sorted.forEach((p, i)=>{
    let cls = 'other';
    if(i===0) cls='gold'; else if(i===1) cls='silver'; else if(i===2) cls='bronze';
    const label = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : (i+1);
    let extra = '';
    if(p.frame.strike) extra = ' · ⚡ STRIKE';
    else if(p.frame.spare) extra = ' · ✨ SPARE';
    const row = document.createElement('div');
    row.className = 'rank-row';
    row.innerHTML = `
      <div class="rank-pos ${cls}">${label}</div>
      <div class="rank-name" style="color:${p.color}">${escapeHtml(p.name)}<div style="font-size:11px;color:#aaa;font-weight:400">${extra}</div></div>
      <div class="rank-score">${p.total}</div>
    `;
    rank.appendChild(row);
  });

  switchScreen('resultsScreen');
  // Celebrate winner
  spawnConfetti(140);
  setTimeout(()=>playStrikeSound(), 200);

  // ── Drank Eiland integration ── send the winner back to the parent.
  if (window.parent && window.parent !== window) {
    try {
      window.parent.postMessage({
        type: 'bowl-result',
        winner: winner.name,
        winnerScore: winner.total,
        ranking: sorted.map(p => ({ name: p.name, score: p.total,
          strike: p.frame.strike, spare: p.frame.spare })),
      }, '*');
    } catch(_) {}
  }
}

document.getElementById('playAgainBtn').addEventListener('click', ()=>{
  // Same players, reset
  state.players.forEach(p=>{
    p.frame = {t1:null,t2:null,strike:false,spare:false};
    p.total = 0; p.done = false;
  });
  state.currentPlayer = 0;
  state.currentThrow = 1;
  state.gameOver = false;
  switchScreen('gameScreen');
  resetPinsAndBall(true);
  updateScoreboard();
  updateTurnIndicator();
  showHint(true);
});

document.getElementById('newGameBtn').addEventListener('click', ()=>{
  switchScreen('setupScreen');
  buildPlayerInputs();
});

// ── Drank Eiland integration ──
// When opened as an iframe, the parent will postMessage a 'bowl-init' with
// the player list. We bypass the setup screen and start straight into
// the game. Also expose a 'bowl-skip' to abort.
window.addEventListener('message', (e) => {
  if (e.data?.type === 'bowl-init' && Array.isArray(e.data.players)) {
    state.players = e.data.players.map((p, i) => ({
      name: p.name,
      color: p.color || PLAYER_COLORS[i % PLAYER_COLORS.length],
      frame: {t1:null, t2:null, strike:false, spare:false},
      total: 0,
      done: false,
    }));
    state.playerCount = state.players.length;
    state.currentPlayer = 0;
    state.currentThrow = 1;
    state.gameOver = false;
    switchScreen('gameScreen');
    if (!sceneInited) initScene();
    resetPinsAndBall();
    updateScoreboard();
    updateTurnIndicator();
    showHint(true);
  }
  if (e.data?.type === 'bowl-skip') {
    // Forfeit — send back whoever is currently leading (or first player if
    // nobody has scored yet)
    const ranked = [...state.players].sort((a,b)=>(b.total||0)-(a.total||0));
    const winner = ranked[0] || { name: 'niemand', total: 0 };
    if (window.parent && window.parent !== window) {
      try {
        window.parent.postMessage({
          type: 'bowl-result',
          winner: winner.name,
          winnerScore: winner.total || 0,
          ranking: ranked.map(p => ({ name: p.name, score: p.total||0 })),
          skipped: true,
        }, '*');
      } catch(_) {}
    }
  }
});

// Announce hello so parent knows we're ready
if (window.parent && window.parent !== window) {
  try { window.parent.postMessage({ type: 'bowl-hello' }, '*'); } catch(_) {}
}

// Prevent iOS double-tap zoom on buttons
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('touchmove', e=>{
  if(e.target.closest('input')) return;
  e.preventDefault();
}, {passive:false});
