}

// ── Chwazi finger chooser — picks a random player among those who put a finger down ──
function playChwazi({ title = 'Iemand drinkt!', subtitle = 'Alle spelers leggen één vinger op het scherm', drinks = 3 } = {}) {
    return new Promise(resolve => {
        const players = G.players;
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'chwazi-back' });
        const head = el('div', { className: 'chwazi-head' });
        head.append(
            el('h2', {}, title),
            el('div', { className: 'sub' }, subtitle)
        );
        const stage = el('div', { className: 'chwazi-stage' });
        const hint = el('div', { className: 'chwazi-hint' });
        hint.append(
            el('span', { className: 'big' }, '👆 Vingers op het scherm'),
            el('span', { className: 'small' }, `Iedere speler legt één vinger neer. Wacht tot er een wordt gekozen.`)
        );
        stage.append(hint);
        const result = el('div', { className: 'chwazi-result' });
        stage.append(result);
        const status = el('div', { className: 'chwazi-status' }, `0 / ${players.length} vingers`);
        const foot = el('div', { className: 'chwazi-foot' });
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        const pickNowBtn = el('button', { className: 'btn-pill gold', type: 'button' }, 'Kies nu');
        foot.append(skipBtn, pickNowBtn);
        back.append(head, stage, status, foot);
        ui.append(back);

        const fingers = new Map(); // id -> { el, x, y, playerIdx }
        let locked = false;
        let pickTimer = null;

        function rect() { return stage.getBoundingClientRect(); }

        function addFinger(id, clientX, clientY) {
            if (locked) return;
            if (fingers.size >= players.length) return;
            const r = rect();
            const x = clientX - r.left, y = clientY - r.top;
            const playerIdx = fingers.size; // order of touch = order of player
            const p = players[playerIdx];
            const f = el('div', { className: 'chwazi-finger' });
            f.style.setProperty('--ring', p.color.css);
            f.style.setProperty('--fill', p.color.css);
            f.style.left = x + 'px';
            f.style.top  = y + 'px';
            f.append(
                el('div', { className: 'ring' }),
                el('div', { className: 'fill' }),
                el('div', { className: 'label' }, String(playerIdx + 1))
            );
            stage.append(f);
            requestAnimationFrame(() => f.classList.add('in'));
            fingers.set(id, { el: f, x, y, playerIdx });
            updateStatus();
            schedulePick();
        }
        function moveFinger(id, clientX, clientY) {
            const f = fingers.get(id);
            if (!f || locked) return;
            const r = rect();
            f.x = clientX - r.left; f.y = clientY - r.top;
            f.el.style.left = f.x + 'px';
            f.el.style.top  = f.y + 'px';
        }
        function removeFinger(id) {
            const f = fingers.get(id);
            if (!f) return;
            if (locked) return; // keep visuals after pick
            f.el.remove();
            fingers.delete(id);
            // re-number remaining fingers to keep order
            [...fingers.values()].forEach((fi, i) => {
                fi.playerIdx = i;
                const p = players[i];
                fi.el.style.setProperty('--ring', p.color.css);
                fi.el.style.setProperty('--fill', p.color.css);
                fi.el.querySelector('.label').textContent = String(i + 1);
            });
            updateStatus();
            schedulePick();
        }
        function updateStatus() {
            hint.classList.toggle('hidden', fingers.size > 0);
            const n = fingers.size, need = players.length;
            if (n === 0) status.textContent = `0 / ${need} vingers`;
            else if (n < need) status.textContent = `${n} / ${need} vingers — wachten…`;
            else status.textContent = `${n} / ${need} vingers — kiezen in 1.5s…`;
        }
        function schedulePick() {
            clearTimeout(pickTimer);
            if (fingers.size === 0 || locked) return;
            const delay = fingers.size >= players.length ? 1500 : 2500;
            pickTimer = setTimeout(doPick, delay);
        }
        function doPick() {
            if (locked || fingers.size === 0) return;
            locked = true;
            const entries = [...fingers.values()];
            const winner = entries[Math.floor(Math.random() * entries.length)];
            entries.forEach(f => {
                if (f === winner) f.el.classList.add('winner');
                else f.el.classList.add('loser');
            });
            const winnerPlayer = players[winner.playerIdx];
            status.textContent = `🎯 Gekozen!`;
            result.style.setProperty('--gloW', winnerPlayer.color.css);
            result.append(
                el('div', { className: 'who', style: { color: winnerPlayer.color.css } }, winnerPlayer.name),
                el('div', { className: 'drinks' }, `drinkt ${drinks} 🍻`)
            );
            requestAnimationFrame(() => result.classList.add('show'));
            pickNowBtn.textContent = 'Verder';
            pickNowBtn.onclick = () => finish(winnerPlayer);
            skipBtn.style.display = 'none';
        }

        // Touch events
        stage.addEventListener('touchstart', e => {
            e.preventDefault();
            [...e.changedTouches].forEach(t => addFinger(t.identifier, t.clientX, t.clientY));
        }, { passive: false });
        stage.addEventListener('touchmove', e => {
            e.preventDefault();
            [...e.changedTouches].forEach(t => moveFinger(t.identifier, t.clientX, t.clientY));
        }, { passive: false });
        stage.addEventListener('touchend', e => {
            e.preventDefault();
            [...e.changedTouches].forEach(t => removeFinger(t.identifier));
        }, { passive: false });
        stage.addEventListener('touchcancel', e => {
            [...e.changedTouches].forEach(t => removeFinger(t.identifier));
        });
        // Mouse fallback for desktop testing — each click adds/removes a finger
        const MOUSE_ID = 'mouse';
        let mouseDown = false;
        stage.addEventListener('mousedown', e => {
            if (locked) return;
            if (fingers.has(MOUSE_ID + fingers.size)) return;
            const id = MOUSE_ID + Date.now();
            stage._lastMouseId = id;
            addFinger(id, e.clientX, e.clientY);
            mouseDown = true;
        });
        stage.addEventListener('mousemove', e => {
            if (!mouseDown || locked) return;
            moveFinger(stage._lastMouseId, e.clientX, e.clientY);
        });
        window.addEventListener('mouseup', () => { mouseDown = false; });

        function finish(winnerPlayer) {
            clearTimeout(pickTimer);
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(winnerPlayer); }, 300);
        }
        skipBtn.addEventListener('click', () => finish(null));
        pickNowBtn.addEventListener('click', () => {
            if (locked) return; // gets reassigned to "Verder" after pick
            if (fingers.size === 0) {
                // simulate one finger in the middle so a player still gets picked
                const r = rect();
                addFinger('auto', r.width / 2, r.height / 2);
                setTimeout(doPick, 400);
            } else {
                doPick();
            }
        });
    });
}

// ── Tappy Bird — pass-the-phone; each player plays once; highest score wins ──
function playTappyBird({ players = G.players, drinks = 2 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'tb-back' });
        const wrap = el('div', { className: 'tb-canvas-wrap' });
        const canvas = el('canvas');
        wrap.append(canvas);
        const hud = el('div', { className: 'tb-hud' });
        const hudName = el('div', { className: 'name' }, '');
        const hudScore = el('div', { className: 'score' }, '0');
        hud.append(hudName, document.createElement('br'), hudScore);
        wrap.append(hud);
        const overlay = el('div', { className: 'tb-overlay show' });
        wrap.append(overlay);
        back.append(wrap);
        ui.append(back);

        const ctx = canvas.getContext('2d');
        let W = 0, H = 0, dpr = window.devicePixelRatio || 1;
        function resize() {
            const r = wrap.getBoundingClientRect();
            W = r.width; H = r.height;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);

        let curIdx = 0;
        const scores = []; // {player, score}

        const state = { bird:{x:0,y:0,vy:0}, pipes:[], time:0, score:0, alive:false, started:false };
        const GRAV = 1700, FLAP = -520, PIPE_W = 64, GAP = 170, PIPE_INT = 1.55, SCROLL = 180;
        let groundOff = 0;

        function resetGame() {
            state.bird.x = W * 0.28; state.bird.y = H * 0.4; state.bird.vy = 0;
            state.pipes.length = 0; state.time = 0; state.score = 0; state.alive = true; state.started = false;
            hudScore.textContent = '0';
        }

        function flap() {
            if (!state.alive) return;
            state.started = true;
            state.bird.vy = FLAP;
        }
        wrap.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
        wrap.addEventListener('mousedown', e => { if (overlay.classList.contains('show')) return; flap(); });

        let last = 0, rafId = null;
        function tick(t) {
            if (!last) last = t;
            const dt = Math.min(50, t - last) / 1000;
            last = t;
            update(dt); draw();
            rafId = requestAnimationFrame(tick);
        }
        function update(dt) {
            if (!state.alive || !state.started) return;
            state.time += dt;
            // bird
            state.bird.vy += GRAV * dt;
            state.bird.y += state.bird.vy * dt;
            // pipes
            if (state.pipes.length === 0 || state.pipes[state.pipes.length-1].x < W - W*0.55) {
                const gapY = 80 + Math.random() * (H - 200 - GAP);
                state.pipes.push({ x: W + 20, gapY, passed: false });
            }
            for (const p of state.pipes) {
                p.x -= SCROLL * dt;
                if (!p.passed && p.x + PIPE_W < state.bird.x) {
                    p.passed = true;
                    state.score++;
                    hudScore.textContent = state.score;
                }
                // collide
                const inX = state.bird.x + 16 > p.x && state.bird.x - 16 < p.x + PIPE_W;
                const inY = state.bird.y - 14 < p.gapY || state.bird.y + 14 > p.gapY + GAP;
                if (inX && inY) die();
            }
            state.pipes = state.pipes.filter(p => p.x + PIPE_W > -10);
            // ground / ceiling
            if (state.bird.y > H - 50) { state.bird.y = H - 50; die(); }
            if (state.bird.y < 0) state.bird.y = 0;
            groundOff = (groundOff + SCROLL * dt) % 24;
        }
        function draw() {
            // sky gradient
            const g = ctx.createLinearGradient(0, 0, 0, H);
            g.addColorStop(0, '#70d6e0'); g.addColorStop(1, '#9ee5b0');
            ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
            // pipes
            for (const p of state.pipes) {
                ctx.fillStyle = '#5cb83a';
                ctx.fillRect(p.x, 0, PIPE_W, p.gapY);
                ctx.fillRect(p.x, p.gapY + GAP, PIPE_W, H - (p.gapY + GAP) - 40);
                ctx.fillStyle = '#3a8c25';
                ctx.fillRect(p.x - 4, p.gapY - 18, PIPE_W + 8, 18);
                ctx.fillRect(p.x - 4, p.gapY + GAP, PIPE_W + 8, 18);
            }
            // ground stripe
            ctx.fillStyle = '#deb887'; ctx.fillRect(0, H - 40, W, 40);
            ctx.fillStyle = '#a87a4a';
            for (let x = -groundOff; x < W; x += 24) ctx.fillRect(x, H - 40, 12, 6);
            // bird
            const p = players[curIdx];
            const angle = Math.max(-0.5, Math.min(1.0, state.bird.vy / 600));
            ctx.save();
            ctx.translate(state.bird.x, state.bird.y);
            ctx.rotate(angle);
            ctx.fillStyle = p.color.css;
            ctx.beginPath(); ctx.ellipse(0, 0, 18, 14, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(7, -4, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(8, -4, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ffaa20';
            ctx.beginPath(); ctx.moveTo(13, 0); ctx.lineTo(22, 1); ctx.lineTo(13, 4); ctx.fill();
            ctx.restore();
        }

        function die() {
            if (!state.alive) return;
            state.alive = false;
            scores.push({ player: players[curIdx], score: state.score });
            setTimeout(showAfter, 700);
        }

        function showStartFor(p) {
            overlay.innerHTML = '';
            overlay.append(
                el('h2', { style: { color: p.color.css } }, `Geef telefoon aan ${p.name}`),
                el('p', {}, 'Tik om te flappen. Ontwijk de buizen — wie het verste komt wint.'),
                el('button', { className: 'btn-pill gold', on: { click: () => {
                    overlay.classList.remove('show');
                    resetGame();
                } } }, '▶ Ik ben er klaar voor'),
            );
            overlay.classList.add('show');
            hudName.textContent = p.name;
            hudName.style.background = p.color.css;
            hudScore.textContent = '0';
        }

        function showAfter() {
            if (curIdx < players.length - 1) {
                curIdx++;
                showStartFor(players[curIdx]);
            } else {
                showFinal();
            }
        }

        function showFinal() {
            const sorted = [...scores].sort((a, b) => b.score - a.score);
            const top = sorted[0].score;
            const losers = sorted.filter(s => s.score < top);
            overlay.innerHTML = '';
            overlay.append(el('h2', {}, '🏆 Eindstand'));
            const board = el('div', { className: 'board' });
            sorted.forEach((s, i) => {
                const row = el('div', { className: 'row' + (s.score === top ? ' win' : ''),
                    style: { '--pcol': s.player.color.css } });
                row.append(
                    el('div', { className: 'dot' }),
                    el('div', { className: 'nm' }, `${i+1}. ${s.player.name}`),
                    el('div', { className: 'sc' }, String(s.score)),
                );
                board.append(row);
            });
            overlay.append(board);
            const ldsc = losers.length === 0 ? 'Iedereen gelijk — proost!' :
                `${losers.map(l => l.player.name).join(', ')} drinkt elk ${drinks} 🍻`;
            overlay.append(el('p', {}, ldsc));
            overlay.append(el('button', { className: 'btn-pill gold',
                on: { click: () => finish(sorted) } }, 'Verder'));
            overlay.classList.add('show');
        }

        function finish(sorted) {
            cancelAnimationFrame(rafId);
            window.removeEventListener('resize', resize);
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(sorted); }, 300);
        }

        rafId = requestAnimationFrame(tick);
        showStartFor(players[curIdx]);
    });
}

// ── Volcano Hop — secretly pick a platform; wrong = lightning, last standing wins ──
function playVolcanoHop({ players = G.players, drinks = 2 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'vh-back' });
        const header = el('div', { className: 'vh-header' });
        const title = el('div', { className: 'vh-title' }, '🌋 Volcano Hop');
        const sub = el('div', { className: 'vh-sub' }, 'Kies stiekem een platform');
        const chips = el('div', { className: 'vh-survivors' });
        header.append(title, sub, chips);
        const stage = el('div', { className: 'vh-stage' });
        const plats = el('div', { className: 'vh-platforms' });
        const tokens = el('div', { className: 'vh-tokens' });
        const cloud = el('div', { className: 'vh-cloud' });
        stage.append(plats, tokens, cloud);
        const actions = el('div', { className: 'vh-actions' });
        back.append(header, stage, actions);
        ui.append(back);

        let alive = [...players];
        const eliminated = [];
        let round = 0;

        function renderChips(currentP = null) {
            chips.innerHTML = '';
            for (const p of players) {
                const out = !alive.includes(p);
                const cur = p === currentP;
                const c = el('div', { className: 'vh-chip' + (out ? ' out' : '') + (cur ? ' cur' : ''),
                    style: { '--pcol': p.color.css } });
                c.append(el('div', { className: 'dot' }), document.createTextNode(p.name));
                chips.append(c);
            }
        }

        function clear() { plats.innerHTML = ''; tokens.innerHTML = ''; actions.innerHTML = ''; cloud.className = 'vh-cloud'; }

        function showPassScreen(text, sub2, btnLabel, onGo) {
            const pass = el('div', { className: 'vh-pass' });
            pass.append(
                el('h2', {}, text),
                el('p', {}, sub2 || ''),
                el('button', { className: 'btn-pill gold', on: { click: () => { pass.remove(); onGo(); } },
                    style: { minHeight: '52px', padding: '0 26px', borderRadius: '999px',
                        background: 'linear-gradient(180deg,#ffd54a,#ff9a1a)', color: '#2a1a00',
                        border: '1px solid rgba(255,215,80,0.6)', boxShadow: '0 4px 0 #b56a00',
                        fontWeight: '800', fontSize: '16px', cursor: 'pointer' } }, btnLabel || 'OK'),
            );
            stage.append(pass);
        }

        async function playRound() {
            round++;
            clear();
            const platCount = Math.max(2, Math.min(5, alive.length + 1));
            const safeIdx = Math.floor(Math.random() * platCount);
            const picks = new Map(); // player → platIdx

            // build platforms
            const platEls = [];
            for (let i = 0; i < platCount; i++) {
                const pl = el('div', { className: 'vh-plat' }, String(i + 1));
                pl.dataset.idx = i;
                plats.append(pl);
                platEls.push(pl);
            }

            sub.textContent = `Ronde ${round} — ${alive.length} spelers, ${platCount} platforms`;
            renderChips();

            // pass-and-pick for each alive player
            for (let pi = 0; pi < alive.length; pi++) {
                const p = alive[pi];
                await new Promise(r => {
                    showPassScreen(`Geef telefoon aan ${p.name}`,
                        'Kies stiekem 1 platform. Anderen mogen niet zien!',
                        'Ik ben er klaar voor', r);
                });
                renderChips(p);
                sub.textContent = `${p.name} kiest een platform…`;
                // wire clicks
                let picked = null;
                await new Promise(r => {
                    const onClick = (e) => {
                        const t = e.target.closest('.vh-plat');
                        if (!t) return;
                        const idx = +t.dataset.idx;
                        platEls.forEach(x => { x.classList.remove('picked'); x.style.setProperty('--pcol', p.color.css); });
                        t.classList.add('picked');
                        picked = idx;
                        confirmBtn.disabled = false;
                    };
                    plats.addEventListener('click', onClick);
                    const confirmBtn = el('button', { className: 'btn-pill gold',
                        on: { click: () => { plats.removeEventListener('click', onClick); actions.innerHTML = ''; r(); } } }, 'Bevestig');
                    confirmBtn.disabled = true;
                    actions.innerHTML = ''; actions.append(confirmBtn);
                });
                picks.set(p, picked);
                // hide pick before next player
                platEls.forEach(x => x.classList.remove('picked'));
            }

            // reveal
            await new Promise(r => {
                showPassScreen('Iedereen heeft gekozen!', 'Tijd voor de waarheid — welk platform is veilig?',
                    '🌋 Onthul!', r);
            });
            sub.textContent = 'Onthullen…';
            renderChips();

            // place tokens on chosen platforms
            for (const [p, idx] of picks) {
                const platRect = platEls[idx].getBoundingClientRect();
                const stageRect = stage.getBoundingClientRect();
                const tk = el('div', { className: 'vh-token',
                    style: { '--pcol': p.color.css,
                        left: (platRect.left - stageRect.left + platRect.width/2) + 'px',
                        top:  (platRect.top  - stageRect.top  + platRect.height/2 - 28) + 'px' } },
                    p.name.charAt(0).toUpperCase());
                tk.dataset.player = p.colorIdx;
                tokens.append(tk);
            }
            await sleep(700);

            // reveal: safe platform glows, others crumble
            platEls[safeIdx].classList.add('safe');
            const losers = [];
            const survivors = [];
            for (const [p, idx] of picks) {
                if (idx === safeIdx) survivors.push(p);
                else losers.push(p);
            }
            for (let i = 0; i < platEls.length; i++) {
                if (i !== safeIdx) platEls[i].classList.add('crumble');
            }
            // fall tokens that picked wrong
            if (losers.length) {
                cloud.classList.add('show');
                await sleep(350);
                for (const tk of tokens.querySelectorAll('.vh-token')) {
                    const cIdx = +tk.dataset.player;
                    const p = players.find(x => x.colorIdx === cIdx);
                    if (losers.includes(p)) tk.classList.add('fall');
                }
                await sleep(400);
                cloud.classList.add('zap');
                await sleep(700);
            } else {
                await sleep(600);
            }

            // update alive list
            for (const p of losers) {
                if (!eliminated.includes(p)) eliminated.push(p);
            }
            alive = survivors;

            // show round result
            await new Promise(r => {
                const labelTxt = losers.length === 0
                    ? `Iedereen veilig! Door naar ronde ${round + 1}`
                    : (losers.length === alive.length + losers.length
                        ? `Alles fout! Iedereen drinkt ${drinks} 🍻`
                        : `${losers.map(p => p.name).join(', ')} valt → drinkt ${drinks} 🍻`);
                showPassScreen(losers.length === 0 ? '🎉 Allemaal goed!' : '⚡ KZZZAP!', labelTxt,
                    alive.length <= 1 ? '🏆 Eindstand' : '▶ Volgende ronde', r);
            });
        }

        function showFinal() {
            clear();
            renderChips();
            const winner = alive[0];
            const board = el('div', { style: { padding: '20px', display: 'flex',
                flexDirection: 'column', alignItems: 'center', gap: '16px' } });
            if (winner) {
                board.append(
                    el('div', { style: { fontSize: '60px' } }, '🏆'),
                    el('div', { style: { fontSize: '28px', fontWeight: '900', color: winner.color.css,
                        textShadow: '0 2px 0 #000, 0 0 20px ' + winner.color.css } }, `${winner.name} wint!`),
                    el('div', { style: { fontSize: '16px', opacity: 0.85, textAlign: 'center', maxWidth: '280px' } },
                        `${eliminated.map(p => p.name).join(', ')} drinkt elk ${drinks} 🍻`),
                );
            } else {
                board.append(
                    el('div', { style: { fontSize: '60px' } }, '🌋'),
                    el('div', { style: { fontSize: '24px', fontWeight: '900' } }, 'Geen winnaar!'),
                    el('div', { style: { fontSize: '16px', opacity: 0.85, textAlign: 'center', maxWidth: '280px' } },
                        `Iedereen viel. Iedereen drinkt ${drinks} 🍻 extra`),
                );
            }
            stage.append(board);
            const finishBtn = el('button', { className: 'btn-pill gold',
                on: { click: () => {
                    back.style.transition = 'opacity 0.3s ease';
                    back.style.opacity = '0';
                    setTimeout(() => { back.remove(); resolve(winner || null); }, 300);
                } } }, 'Verder');
            actions.innerHTML = ''; actions.append(finishBtn);
        }

        async function loop() {
            while (alive.length > 1) {
                await playRound();
                if (alive.length === 0) break;
            }
            showFinal();
        }

        const sleep = ms => new Promise(r => setTimeout(r, ms));
        loop();
    });
}

// ── Paddle Duel — 1v1 split-screen pong, first to 3 points wins ──
function playPaddleDuel({ playerA, playerB, targetScore = 3, drinks = 4 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'pd-back' });
        back.style.setProperty('--colA', playerA.color.css);
        back.style.setProperty('--colB', playerB.color.css);

        const wrap = el('div', { className: 'pd-canvas-wrap' });
        const canvas = el('canvas');
        wrap.append(canvas);

        const lblTop = el('div', { className: 'pd-half-label top', style: { '--col': playerA.color.css } }, playerA.name);
        const lblBot = el('div', { className: 'pd-half-label bot', style: { '--col': playerB.color.css } }, playerB.name);
        const score = el('div', { className: 'pd-score' });
        const scoreTop = el('div', { className: 'num top', style: { '--colA': playerA.color.css } }, '0');
        const scoreBot = el('div', { className: 'num bot', style: { '--colB': playerB.color.css } }, '0');
        score.append(scoreTop, el('div', { className: 'dash' }, '·'), scoreBot);
        wrap.append(lblTop, lblBot, score);

        const overlay = el('div', { className: 'pd-overlay show' });
        const oTitle = el('h2', {}, 'Paddle Duel');
        const oText = el('p', {}, `${playerA.name} (boven) vs ${playerB.name} (onder). Sleep in je helft om te bewegen. Eerste bij ${targetScore} wint.`);
        const oBtn = el('button', { className: 'btn-pill gold' }, '▶ Start');
        const oSkip = el('button', { className: 'btn-pill' }, 'Skip');
        overlay.append(oTitle, oText, oBtn, oSkip);
        wrap.append(overlay);

        back.append(wrap);
        ui.append(back);

        const ctx = canvas.getContext('2d');
        let W = 0, H = 0, dpr = window.devicePixelRatio || 1;
        function resize() {
            const r = wrap.getBoundingClientRect();
            W = r.width; H = r.height;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);

        // Game state
        const PAD_W = 0.22, PAD_H = 14, BALL_R = 8;
        const state = {
            padA: 0.5, padB: 0.5, // x positions 0..1
            ballX: 0, ballY: 0, vx: 0, vy: 0,
            scoreA: 0, scoreB: 0,
            running: false, finished: false,
        };

        function resetBall(dir) {
            state.ballX = W / 2;
            state.ballY = H / 2;
            const ang = (Math.random() - 0.5) * 0.6 + (dir > 0 ? Math.PI / 2 : -Math.PI / 2);
            const sp = Math.min(W, H) * 0.55 / 1000; // px per ms baseline
            // We use px/sec in update loop. sp = 0.55 * dim per sec
            const speed = Math.min(W, H) * 0.55;
            state.vx = Math.cos(ang) * speed;
            state.vy = Math.sin(ang) * speed;
        }

        // Touch handling: split screen in half
        const padTouch = { A: null, B: null }; // touchId per side
        function getRect() { return wrap.getBoundingClientRect(); }
        wrap.addEventListener('touchstart', e => {
            const r = getRect();
            for (const t of e.changedTouches) {
                const y = t.clientY - r.top;
                if (y < H / 2 && padTouch.A === null) {
                    padTouch.A = t.identifier;
                    state.padA = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (t.clientX - r.left) / W));
                } else if (y >= H / 2 && padTouch.B === null) {
                    padTouch.B = t.identifier;
                    state.padB = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (t.clientX - r.left) / W));
                }
            }
            e.preventDefault();
        }, { passive: false });
        wrap.addEventListener('touchmove', e => {
            const r = getRect();
            for (const t of e.changedTouches) {
                const x = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (t.clientX - r.left) / W));
                if (t.identifier === padTouch.A) state.padA = x;
                else if (t.identifier === padTouch.B) state.padB = x;
            }
            e.preventDefault();
        }, { passive: false });
        wrap.addEventListener('touchend', e => {
            for (const t of e.changedTouches) {
                if (t.identifier === padTouch.A) padTouch.A = null;
                if (t.identifier === padTouch.B) padTouch.B = null;
            }
            e.preventDefault();
        }, { passive: false });
        // Mouse fallback (desktop test) — drag in respective half
        let mouseDown = false, mouseSide = null;
        wrap.addEventListener('mousedown', e => {
            const r = getRect();
            const y = e.clientY - r.top;
            mouseSide = y < H / 2 ? 'A' : 'B';
            mouseDown = true;
            const x = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (e.clientX - r.left) / W));
            if (mouseSide === 'A') state.padA = x; else state.padB = x;
        });
        wrap.addEventListener('mousemove', e => {
            if (!mouseDown) return;
            const r = getRect();
            const x = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (e.clientX - r.left) / W));
            if (mouseSide === 'A') state.padA = x; else state.padB = x;
        });
        window.addEventListener('mouseup', () => { mouseDown = false; });

        let last = 0, rafId = null;
        function tick(t) {
            if (!last) last = t;
            const dt = Math.min(50, t - last) / 1000;
            last = t;
            if (state.running && !state.finished) update(dt);
            draw();
            rafId = requestAnimationFrame(tick);
        }
        function update(dt) {
            state.ballX += state.vx * dt;
            state.ballY += state.vy * dt;
            // wall bounce
            if (state.ballX < BALL_R) { state.ballX = BALL_R; state.vx = Math.abs(state.vx); }
            if (state.ballX > W - BALL_R) { state.ballX = W - BALL_R; state.vx = -Math.abs(state.vx); }

            const padAx = state.padA * W;
            const padBx = state.padB * W;
            const padHalfW = (PAD_W * W) / 2;
            const PAD_Y_TOP = 28;
            const PAD_Y_BOT = H - 28;

            // top paddle (A) — when ball moving up
            if (state.vy < 0 && state.ballY - BALL_R <= PAD_Y_TOP + PAD_H/2 && state.ballY > PAD_Y_TOP - PAD_H) {
                if (Math.abs(state.ballX - padAx) <= padHalfW + BALL_R) {
                    state.ballY = PAD_Y_TOP + PAD_H/2 + BALL_R;
                    state.vy = Math.abs(state.vy) * 1.06;
                    state.vx += (state.ballX - padAx) / padHalfW * 120;
                }
            }
            // bottom paddle (B)
            if (state.vy > 0 && state.ballY + BALL_R >= PAD_Y_BOT - PAD_H/2 && state.ballY < PAD_Y_BOT + PAD_H) {
                if (Math.abs(state.ballX - padBx) <= padHalfW + BALL_R) {
                    state.ballY = PAD_Y_BOT - PAD_H/2 - BALL_R;
                    state.vy = -Math.abs(state.vy) * 1.06;
                    state.vx += (state.ballX - padBx) / padHalfW * 120;
                }
            }

            // out of bounds
            if (state.ballY < -20) {
                state.scoreB++;
                scoreBot.textContent = state.scoreB;
                if (state.scoreB >= targetScore) endGame(playerB, playerA);
                else resetBall(1);
            } else if (state.ballY > H + 20) {
                state.scoreA++;
                scoreTop.textContent = state.scoreA;
                if (state.scoreA >= targetScore) endGame(playerA, playerB);
                else resetBall(-1);
            }
        }
        function draw() {
            ctx.clearRect(0, 0, W, H);
            // centre line
            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 10]);
            ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
            ctx.setLineDash([]);
            // paddles
            const padHalfW = (PAD_W * W) / 2;
            ctx.fillStyle = playerA.color.css;
            ctx.shadowColor = playerA.color.css; ctx.shadowBlur = 16;
            roundRect(state.padA * W - padHalfW, 28 - PAD_H/2, padHalfW * 2, PAD_H, 6); ctx.fill();
            ctx.fillStyle = playerB.color.css;
            ctx.shadowColor = playerB.color.css;
            roundRect(state.padB * W - padHalfW, H - 28 - PAD_H/2, padHalfW * 2, PAD_H, 6); ctx.fill();
            ctx.shadowBlur = 0;
            // ball
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff'; ctx.shadowBlur = 18;
            ctx.beginPath(); ctx.arc(state.ballX, state.ballY, BALL_R, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }
        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        function endGame(winner, loser) {
            state.finished = true;
            state.running = false;
            overlay.innerHTML = '';
            overlay.append(
                el('h2', { style: { color: winner.color.css } }, `🏆 ${winner.name} wint!`),
                el('p', {}, `${loser.name} drinkt ${drinks} 🍻`),
                el('button', { className: 'btn-pill gold', on: { click: () => finish(loser) } }, 'Verder'),
            );
            overlay.classList.add('show');
        }
        function finish(loser) {
            cancelAnimationFrame(rafId);
            window.removeEventListener('resize', resize);
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(loser); }, 300);
        }

        oBtn.addEventListener('click', () => {
            overlay.classList.remove('show');
            resetBall(Math.random() < 0.5 ? 1 : -1);
            state.running = true;
        });
        oSkip.addEventListener('click', () => finish(null));

        rafId = requestAnimationFrame(tick);
    });
}

// ── Krokodil — Crocodile Dentist: tap teeth, one is "zere tand", chomp = af ──
function playKrokodil({ playerA, playerB, drinks = 4, teethCount = 18 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'kroko-back' });

        const head = el('div', { className: 'kroko-head' });
        const title = el('h2', {}, '🐊 Krokodil met kiespijn');
        const turnBox = el('div', { className: 'kroko-turn' });
        const turnLbl = el('span', { className: 'lbl' }, 'Beurt:');
        const turnDot = el('span', { className: 'dot' });
        const turnName = el('span', { className: 'name' });
        turnBox.append(turnLbl, turnDot, turnName);
        head.append(title, turnBox);

        const stage = el('div', { className: 'kroko-stage' });
        const croc = el('div', { className: 'kroko-croc' });
        const nose = el('div', { className: 'kroko-nose' });
        nose.append(el('span'), el('span'));
        const mouth = el('div', { className: 'kroko-mouth' });
        const teethWrap = el('div', { className: 'kroko-teeth' });
        mouth.append(teethWrap);
        croc.append(nose, mouth);
        stage.append(croc);

        const biteIdx = Math.floor(Math.random() * teethCount);
        const teeth = [];

        // Place teeth around an ellipse inside the mouth.
        // rx/ry in percent of the mouth element. We place each tooth at
        // (50% + rx*cos(a), 50% + ry*sin(a)), with transform-origin at the
        // outer end so the tooth points inward.
        for (let i = 0; i < teethCount; i++) {
            const a = (i / teethCount) * Math.PI * 2 - Math.PI / 2; // top-first
            const rx = 44, ry = 47;
            const x = 50 + rx * Math.cos(a);
            const y = 50 + ry * Math.sin(a);
            const rotDeg = (a * 180 / Math.PI) + 90; // tooth tip points to centre
            const t = el('div', { className: 'tooth' });
            const pos = `translate(-50%, 0) rotate(${rotDeg}deg)`;
            t.style.left = x + '%';
            t.style.top  = y + '%';
            t.style.setProperty('--pos', pos);
            t.style.transform = pos;
            t.addEventListener('click', () => tapTooth(i));
            teethWrap.append(t);
            teeth.push(t);
        }

        let turn = 0; // 0 = A, 1 = B
        let locked = false;

        function curPlayer() { return turn === 0 ? playerA : playerB; }
        function updateTurn() {
            const p = curPlayer();
            turnBox.style.setProperty('--pcol', p.color.css);
            turnName.textContent = p.name;
            passBtn.disabled = false;
            passBtn.textContent = '➡️ Volgende speler';
        }

        function tapTooth(idx) {
            if (locked) return;
            const t = teeth[idx];
            if (t.classList.contains('pressed') || t.classList.contains('bite')) return;
            if (idx === biteIdx) {
                locked = true;
                t.classList.add('bite');
                setTimeout(() => {
                    mouth.classList.add('chomp');
                    croc.classList.add('chomping');
                }, 200);
                const loser = curPlayer();
                setTimeout(() => showResult(loser), 1300);
            } else {
                t.classList.add('pressed');
                // current player keeps going; they pass with the button
            }
        }

        const foot = el('div', { className: 'kroko-foot' });
        const passBtn = el('button', { className: 'btn-pill gold', type: 'button' }, '➡️ Volgende speler');
        passBtn.addEventListener('click', () => {
            if (locked) return;
            turn = 1 - turn;
            updateTurn();
        });
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        skipBtn.addEventListener('click', () => finish(null));
        foot.append(passBtn, skipBtn);

        const result = el('div', { className: 'kroko-result' });
        function showResult(loser) {
            result.append(
                el('div', { className: 'chomp' }, 'AU! 🐊'),
                el('div', { className: 'who', style: { color: loser.color.css } }, `${loser.name} drukte de zere tand!`),
                el('div', { className: 'drinks' }, `Drink ${drinks} 🍻`),
                el('button', { className: 'btn-pill gold', type: 'button',
                    style: { marginTop: '14px' },
                    on: { click: () => finish(loser) } }, 'Verder'),
            );
            result.classList.add('show');
        }
        stage.append(result);

        back.append(head, stage, foot);
        ui.append(back);
        updateTurn();

        function finish(loser) {
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(loser); }, 300);
        }
    });
}

// ── Landing logic ──
async function onLandedOnTile(player) {
    layoutTokensOnTile(player.tileIdx);
    refreshHUD();

    // winner?
    if (player.tileIdx >= TILE_COUNT - 1) {
        G.phase = 'over';
        await showModal({
            emoji: '🏆', title: `${player.name} wint!`,
            body: ['Heeft de top van het Drank Eiland bereikt!', 'Iedereen anders: neem een slok 🍻'],
            actions: [{ label: 'Nieuw spel', value: 'new' }],
        });
        renderSetup();
        // cleanup tokens
        while (tokenGroup.children.length) tokenGroup.remove(tokenGroup.children[0]);
        return;
    }

    // Purple danger tile (every 13th) — Krokodil 1v1 with a random opponent
    if (player.tileIdx > 0 && player.tileIdx % 13 === 0 && G.players.length >= 2) {
        G.phase = 'event';
        const others = G.players.filter(p => p !== player);
        const opp = others[Math.floor(Math.random() * others.length)];
        const go = await showModal({
            emoji: '🐊', title: 'Krokodil 1v1!',
            body: [`${player.name} tegen ${opp.name}.`, 'Druk om de beurt op een tand. Wie de pijnlijke vindt, drinkt 4.'],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (go) {
            const loser = await playKrokodil({ playerA: player, playerB: opp, drinks: 4 });
            if (loser) {
                await showModal({
                    emoji: '🍻', title: `${loser.name} drinkt!`,
                    body: [`Neem 4 flinke slokken. Proost! 🥂`],
                    actions: [{ label: 'OK', value: true }],
                });
            }
        }
    }
    // Yellow event tile (every 9th) — Chwazi finger chooser picks a random victim
    else if (player.tileIdx > 0 && player.tileIdx % 9 === 0) {
        G.phase = 'event';
        const drinks = 3;
        const go = await showModal({
            emoji: '👆', title: 'Iemand drinkt!',
            body: ['Tijd voor Chwazi.', 'Iedereen legt zo een vinger op het scherm — één speler wordt willekeurig gekozen.'],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (go) {
            const winner = await playChwazi({
                title: 'Wie drinkt er?',
                subtitle: `Alle ${G.players.length} spelers leggen één vinger op het scherm`,
                drinks,
            });
            if (winner) {
                await showModal({
                    emoji: '🍻', title: `${winner.name} drinkt!`,
                    body: [`Pak je glas en neem ${drinks} flinke slokken.`, 'Proost! 🥂'],
                    actions: [{ label: 'OK', value: true }],
                });
            }
        }
    }
    // Volcano Hop tile — every 17th tile triggers party elimination
    else if (player.tileIdx > 0 && player.tileIdx % 17 === 0) {
        G.phase = 'event';
        const go = await showModal({
            emoji: '🌋', title: 'Volcano Hop!',
            body: ['Iedereen kiest stiekem een platform.', 'Fout = lava + ⚡, laatste man wint.'],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (go) await playVolcanoHop({ players: G.players, drinks: 2 });
    }
    // Tappy Bird tile — every 11th tile triggers pass-and-play flappy bird
    else if (player.tileIdx > 0 && player.tileIdx % 11 === 0) {
        G.phase = 'event';
        const go = await showModal({
            emoji: '🐦', title: 'Tappy Bird!',
            body: ['Iedereen speelt één potje, geef de telefoon door.', 'Wie het verst komt wint — anderen drinken 2.'],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (go) await playTappyBird({ players: G.players, drinks: 2 });
    }
    // Paddle Duel — every 7th tile triggers 1v1 vs random
    else if (player.tileIdx > 0 && player.tileIdx % 7 === 0 && G.players.length >= 2) {
        G.phase = 'event';
        const others = G.players.filter(p => p !== player);
        const opp = others[Math.floor(Math.random() * others.length)];
        const go = await showModal({
            emoji: '🏓', title: 'Paddle Duel!',
            body: [`${player.name} tegen ${opp.name}.`, 'Sleep in je helft. Eerste bij 3 punten wint, verliezer drinkt 4.'],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (go) {
            const loser = await playPaddleDuel({ playerA: player, playerB: opp, drinks: 4 });
            if (loser) {
                await showModal({
                    emoji: '🍻', title: `${loser.name} drinkt!`,
                    body: [`Neem 4 flinke slokken. Proost! 🥂`],
                    actions: [{ label: 'OK', value: true }],
                });
            }
        }
    }

    // next player
    G.turnIdx = (G.turnIdx + 1) % G.players.length;
    if (G.turnIdx === 0) G.round++;
    G.phase = 'idle';
    refreshHUD();
    // un-disable dice
    const btn = document.getElementById('dice-btn');
    if (btn) { btn.disabled = false; btn.textContent = '🎲'; }
}

// ── Per-frame token idle bob (called from inside animate via hook) ──
const _gameHook = (time) => {
    for (const p of G.players) {
        if (p._animating) continue;
        const isCurrent = p === G.players[G.turnIdx] && G.phase === 'idle';
        const bob = Math.sin(time * 2.5 + p.colorIdx) * 0.05 + (isCurrent ? 0.15 + Math.abs(Math.sin(time*3))*0.1 : 0);
        if (p._restTarget) {
            p.token.position.x = p._restTarget.x;
            p.token.position.z = p._restTarget.z;
            p.token.position.y = p._restTarget.y + bob;
        }
        p.token.rotation.y = time * 0.6 + p.colorIdx;
    }
};
window.__deGameHook = _gameHook;

// boot the setup screen once the page is ready
renderSetup();

// start render loop + hide splash
animate();
requestAnimationFrame(() => {
    setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
    }, 200);
});

</script>
</body>
