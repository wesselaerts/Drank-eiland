                vx: -Math.cos(aimAngle) * speed,
                vz: -Math.sin(aimAngle) * speed,
                az: -spin * 2.5,             // negatief: drag rechts → curve naar -Z
                spinDecay: 0.6,
                inGutter: false,
                timeAlive: 0,
                rolledOff: false,
            };
            phase = 'rolling';
            phaseT = 0;
            rollStartTime = performance.now() / 1000;
            setTip('');
        }
        tbHit.addEventListener('touchstart', e => {
            e.preventDefault();
            const t = e.changedTouches[0];
            if (t) onDragStart(t.clientX, t.clientY, t.identifier);
        }, { passive: false });
        tbHit.addEventListener('touchmove', e => {
            e.preventDefault();
            for (const t of e.changedTouches) {
                if (t.identifier === drag.id) {
                    onDragMove(t.clientX, t.clientY); break;
                }
            }
        }, { passive: false });
        tbHit.addEventListener('touchend', e => { e.preventDefault(); onDragEnd(); },
            { passive: false });
        tbHit.addEventListener('touchcancel', () => onDragEnd());
        tbHit.addEventListener('mousedown', e => onDragStart(e.clientX, e.clientY, -1));
        tbHit.addEventListener('mousemove', e => onDragMove(e.clientX, e.clientY));
        tbHit.addEventListener('mouseup', () => onDragEnd());
        tbHit.addEventListener('mouseleave', () => onDragEnd());

        // ════════════════════════════════════════════════════════
        //  J. WATER SPLASH effect
        // ════════════════════════════════════════════════════════
        // Drie expanderende witte ringen op het water-niveau als
        // visuele "plons" wanneer de bal in zee terecht komt.
        const splashRings = [];
        function createSplash(x, z) {
            for (let i = 0; i < 3; i++) {
                const ringGeo = new THREE.RingGeometry(0.1, 0.18, 24);
                const ringMat = new THREE.MeshBasicMaterial({
                    color: 0xffffff, transparent: true, opacity: 0.85,
                    side: THREE.DoubleSide });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = -Math.PI / 2;
                ring.position.set(x, WATER_Y + 0.06, z);
                ring.userData.startT = performance.now() / 1000;
                ring.userData.delay = i * 0.12;
                scene.add(ring);
                splashRings.push(ring);
            }
        }
        function updateSplashRings(t) {
            for (let i = splashRings.length - 1; i >= 0; i--) {
                const r = splashRings[i];
                const elapsed = (t - r.userData.startT) - r.userData.delay;
                if (elapsed < 0) continue;
                if (elapsed > 1.6) {
                    scene.remove(r);
                    r.geometry.dispose(); r.material.dispose();
                    splashRings.splice(i, 1);
                    continue;
                }
                const s = 1 + elapsed * 5;
                r.scale.set(s, s, s);
                r.material.opacity = Math.max(0, 0.85 * (1 - elapsed / 1.6));
            }
        }

        // ════════════════════════════════════════════════════════
        //  K. ANIMATIE-HOOK
        // ════════════════════════════════════════════════════════
        function disposeMesh(m) {
            if (!m) return;
            m.geometry && m.geometry.dispose && m.geometry.dispose();
            if (m.material) {
                const ms = Array.isArray(m.material) ? m.material : [m.material];
                for (const mat of ms) mat.dispose && mat.dispose();
            }
        }
        function disposeGroup(g) { g.traverse(o => disposeMesh(o)); }

        const PREV_HOOK = window.__deGameHook;
        let lastT = 0;
        window.__deGameHook = (time) => {
            const dt = lastT ? Math.min(0.05, time - lastT) : 0;
            lastT = time;
            phaseT += dt;
            // Splash-ring updates
            updateSplashRings(time);
            // Camera tracking — afhankelijk van fase
            //   1. Entry-lerp: gewone smooth lerp van startpositie naar
            //      CAM_BOWL (gebruikt camLerpT zoals voorheen).
            //   2. Rolling: camera VOLGT de bal — positie en target
            //      lerpen elke frame naar de bal-relatieve positie.
            //      Lerp-rate is dt * 3.0 zoals in de oude app.
            //   3. Result_wait: korte zoom op pin-cam zodat impact
            //      duidelijk wordt, dan terug naar CAM_BOWL voor
            //      volgende worp.
            if (camLerpT < 1) {
                camLerpT = Math.min(1, camLerpT + dt / camLerpDur);
                const k = camLerpT;
                // Ease-out cubic — snelle start, soepele aankomst
                // zonder "stop-dan-spring" gevoel dat ease-in-out gaf.
                const e = 1 - Math.pow(1 - k, 3);
                camera.position.lerpVectors(camFrom.pos, CAM_BOWL.pos, e);
                controls.target.lerpVectors(camFrom.tgt, CAM_BOWL.tgt, e);
                camera.lookAt(controls.target);
            } else if (phase === 'rolling' && ball) {
                // Volg de bal met soepele lerp. Camera Z blijft vast op
                // BOWL.cz zodat we niet zigzaggen als de bal curveert.
                const targetPos = camPosForBall(ball.position.x);
                const targetTgt = camTgtForBall(ball.position.x);
                const k = Math.min(1, dt * 3.0);
                camera.position.lerp(targetPos, k);
                controls.target.lerp(targetTgt, k);
                camera.lookAt(controls.target);
            } else if (phase === 'result_wait' || phase === 'result') {
                // Houd camera ongeveer waar 'ie nu is — lerp licht naar
                // pin-cam zodat impact-shot zichtbaar wordt
                const k = Math.min(1, dt * 1.8);
                camera.position.lerp(CAM_PIN.pos, k);
                controls.target.lerp(CAM_PIN.tgt, k);
                camera.lookAt(controls.target);
            }
            // Bal rolling fysica + gutters + water-val
            if ((phase === 'rolling' || phase === 'result_wait') && ball &&
                ballPhysics) {
                const p = ballPhysics;
                p.timeAlive += dt;
                // Apply lateral spin acceleration (decays over time)
                p.vz += p.az * dt;
                p.az *= (1 - p.spinDecay * dt);
                // Forward friction
                p.vx *= 0.998;
                // Horizontale beweging
                ball.position.x += p.vx * dt;
                ball.position.z += p.vz * dt;
                // Bepaal grond onder bal
                const zAbs = Math.abs(ball.position.z - BOWL.cz);
                const onAlleyX = ball.position.x > ALLEY_FAR_X - 0.5 &&
                                 ball.position.x < ALLEY_NEAR_X + 0.5;
                const onAlleyZ = zAbs < BOWL.alleyW / 2;
                const onGutterZ = !onAlleyZ && zAbs < BOWL.alleyW / 2 + GUTTER_W;
                let groundY = null;
                if (onAlleyX && onAlleyZ) {
                    groundY = ALLEY_TOP_Y;
                } else if (onAlleyX && onGutterZ) {
                    groundY = GUTTER_TOP_Y;
                    if (!p.inGutter) {
                        // Eerst in gutter terechtgekomen: snap naar
                        // gutter-center, dood lateraal momentum
                        p.inGutter = true;
                        const side = Math.sign(ball.position.z - BOWL.cz) || 1;
                        ball.position.z = BOWL.cz + side *
                            (BOWL.alleyW / 2 + GUTTER_W / 2);
                        p.vz = 0; p.az = 0;
                        p.vx *= 0.92;
                    }
                } else {
                    // Op zand of in zee. Eiland is bredere ellips
                    // geworden (van x ≈ cx-19 tot cx+21).
                    const dx = ball.position.x - (BOWL.cx + 1);
                    const dz = ball.position.z;
                    const onSand = (dx / 20) ** 2 + (dz / 8.5) ** 2 < 1.0;
                    if (onSand) groundY = SAND_TOP_Y;
                }
                // Verticale fysica (vallen in zee)
                if (groundY !== null) {
                    ball.position.y = groundY + BALL_R;
                    if (ballPhysics.vy !== undefined) ballPhysics.vy = 0;
                } else {
                    if (ballPhysics.vy === undefined) ballPhysics.vy = 0;
                    ballPhysics.vy += GRAVITY * dt;
                    ball.position.y += ballPhysics.vy * dt;
                    if (ball.position.y < WATER_Y + BALL_R && !splashed) {
                        splashed = true;
                        createSplash(ball.position.x, ball.position.z);
                        ball.position.y = WATER_Y + BALL_R;
                        p.vx *= 0.2; p.vz *= 0.2; ballPhysics.vy = 0;
                        waterStopT = phaseT;
                    }
                    if (splashed) {
                        ball.position.y = WATER_Y + BALL_R;
                        ballPhysics.vy = 0;
                    }
                }
                // Roll-rotatie — rol om Z-as voor X-beweging,
                // X-as voor Z-beweging. Visueel correct rollen.
                if (groundY !== null) {
                    ball.rotation.z += (-p.vx) * dt / BALL_R;
                    ball.rotation.x += p.vz * dt / BALL_R;
                }
                // Pin-collision (alleen op alley)
                if (groundY === ALLEY_TOP_Y && !p.inGutter) {
                    const tNow = performance.now() / 1000;
                    for (let i = 0; i < bowlingPins.length; i++) {
                        const pin = bowlingPins[i];
                        if (pin.userData.fallen) continue;
                        const pdx = pin.position.x - ball.position.x;
                        const pdz = pin.position.z - ball.position.z;
                        if (Math.hypot(pdx, pdz) < KNOCK_R) {
                            knockDownPin(pin, ball.position.clone(), tNow);
                            // Lichte invloed op bal-trajectorie
                            p.vz += pdz * 0.4;
                            p.vx *= 0.97;
                        }
                    }
                }
                // Score + indicator live updaten
                const standing = bowlingPins.filter(pp => !pp.userData.fallen).length;
                scoreVal.textContent = String(10 - standing);
                updatePinIndicator();
                // End-of-run condities
                const ballStopped = Math.hypot(p.vx, p.vz) < 0.5;
                const wellPastPins = ball.position.x < ALLEY_FAR_X - 2;
                const inWaterAndStopped = splashed && (phaseT - waterStopT > 1.2);
                const tooLongFlying = p.timeAlive > 7;
                if (phase === 'rolling' && (ballStopped || wellPastPins ||
                    inWaterAndStopped || tooLongFlying)) {
                    phase = 'result_wait';
                    setTimeout(() => endRunWithScore(), 900);
                }
            }
            // Pin-val animaties (rotation lerp over 0.6s)
            for (const pin of bowlingPins) {
                if (!pin.userData.fallen) continue;
                pin.userData.fallProgress = pin.userData.fallProgress || 0;
                if (pin.userData.fallProgress < 1) {
                    pin.userData.fallProgress += dt / 0.55;
                    const t01 = Math.min(1, pin.userData.fallProgress);
                    // Ease-out
                    const e = 1 - Math.pow(1 - t01, 3);
                    const ang = (Math.PI / 2) * e;     // 0 → 90 graden
                    pin.quaternion.setFromAxisAngle(pin.userData.fallAxis, ang);
                    // Ook iets omlaag verschuiven zodat het er op de baan ligt
                    pin.position.y = pin.userData.basePos.y - 0.05 * e;
                }
            }
        };

        // ════════════════════════════════════════════════════════
        //  K. CLEANUP
        // ════════════════════════════════════════════════════════
        async function finish(sorted) {
            if (phase === 'done') return;
            phase = 'done';
            window.__deGameHook = PREV_HOOK;
            // Bal opruimen
            if (ball) { scene.remove(ball); disposeGroup(ball); ball = null; }
            // Aim arrow opruimen
            if (aimArrow) {
                while (aimArrow.children.length) {
                    const c = aimArrow.children[0];
                    aimArrow.remove(c);
                    if (c.geometry) c.geometry.dispose();
                    if (c.material) c.material.dispose();
                }
                scene.remove(aimArrow);
            }
            // Splash-rings opruimen
            for (const r of splashRings) {
                scene.remove(r);
                r.geometry.dispose(); r.material.dispose();
            }
            splashRings.length = 0;
            // Pinnen reset (zodat ze permanent staan)
            resetPins();
            // Verberg het bowling-apparatus zodat het eiland leeg
            // achterblijft en herbruikbaar is voor andere minigames
            if (bowlingApparatus) bowlingApparatus.visible = false;
            // Camera herstellen
            camera.fov = savedCam.fov;
            camera.position.copy(savedCam.pos);
            camera.updateProjectionMatrix();
            controls.target.copy(savedCam.target);
            controls.autoRotate = savedCam.autoRotate;
            controls.enabled = savedCam.enabled;
            camera.lookAt(controls.target);
            tbBack.remove();
            restoreMinigameChrome(hiddenChrome);
            // Resultaat-modal (consistent met andere minigames)
            if (sorted && sorted.length > 0) {
                const winner = sorted[0].player;
                const losers = sorted.slice(1).filter(s => s.score < sorted[0].score);
                const loserNames = losers.map(l => l.player.name).join(', ');
                await showModal({ emoji: '🎳',
                    title: `${winner.name} wint Bowlspel!`,
                    body: [
                        `Score: ${sorted[0].score} pinnen`,
                        loserNames ?
                            `${loserNames} drink${losers.length === 1 ? 't' : 'en'} ${drinks} 🍻` : '',
                        `${winner.name} krijgt 1 × gouden bonus-dobbelsteen 🎲💛`,
                    ].filter(Boolean),
                    actions: [{ label: 'Klaar', value: true }] });
                resolveOuter({ winner, score: sorted[0].score, ranking: sorted });
            } else {
                resolveOuter(null);
            }
        }

        // Start eerste speler
        startRunFor(0);
    });
}


/* ============================================================
   playConnectFourIframe — Vier op een Rij (iframe, LEGACY backup)
   ============================================================
   Oude iframe-based versie. Niet meer aangeroepen — de nieuwe 3D-in-
   scene versie hieronder (`playConnectFour`) zet het vlot met bord
   midden in de eiland-scene, net als raft battle. Behoud als safety-
   net mocht de 3D versie issues geven.
   ============================================================ */
function playConnectFourIframe({ playerA, playerB, drinks = 4 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        // Verberg al het bord-game UI rommel + home-overlay
        const hiddenChrome = hideMinigameChrome();
        const back = el('div', { className: 'cf-back' });

        const header = el('div', { className: 'cf-header' });
        const titleEl = el('div', { className: 'ttl' }, '🟡 Vier op een Rij');
        const vs = el('div', { className: 'cf-vs' });
        const chipA = el('div', { className: 'chip', style: { '--pcol': playerA.color.css } });
        chipA.append(el('div', { className: 'dot' }), document.createTextNode(playerA.name));
        const xLbl = el('span', { className: 'x' }, 'vs');
        const chipB = el('div', { className: 'chip', style: { '--pcol': playerB.color.css } });
        chipB.append(el('div', { className: 'dot' }), document.createTextNode(playerB.name));
        vs.append(chipA, xLbl, chipB);
        header.append(titleEl, vs);

        const wrap = el('div', { className: 'cf-canvas-wrap' });
        const iframe = el('iframe', { scrolling: 'no' });
        wrap.append(iframe);

        // Compose: iframe (full-screen) + header (floating top)
        back.append(wrap, header);

        let done = false;
        async function finish(winner, isDraw = false) {
            if (done) return;
            done = true;
            window.removeEventListener('message', onMsg);
            back.remove();
            restoreMinigameChrome(hiddenChrome);
            if (isDraw) {
                await showModal({ emoji: '🤝', title: 'Gelijkspel!',
                    body: ['Niemand drinkt — de goden zijn vandaag neutraal.'],
                    actions: [{ label: 'OK', value: true }] });
                resolve(null);
                return;
            }
            if (winner) {
                const loser = winner === playerA ? playerB : playerA;
                await showModal({ emoji: '🟡',
                    title: `${winner.name} heeft 4 op een rij!`,
                    body: [`${loser.name} drinkt ${drinks} 🍻`,
                        `${winner.name} krijgt 1 × gouden bonus-dobbelsteen 🎲💛`],
                    actions: [{ label: 'Klaar', value: true }] });
            }
            resolve(winner || null);
        }

        // Floating Skip pill. Tap → ask iframe + fallback null. Long-press → manual winner.
        const skip = makeMinigameSkip({
            onSkip: () => {
                try { iframe.contentWindow.postMessage({ type: 'cf-skip' }, '*'); } catch(_){}
                setTimeout(() => { if (!done) finish(null); }, 600);
            },
            winners: [
                { label: playerA.name, color: playerA.color.css, onPick: () => finish(playerA) },
                { label: playerB.name, color: playerB.color.css, onPick: () => finish(playerB) },
            ],
        });
        back.append(skip);

        function showKnockout(winner, isDraw = false) {
            if (done) return;
            const ko = el('div', { className: 'cf-ko',
                style: { '--pcol': isDraw ? '#aaa' : winner.color.css } });
            ko.append(
                el('h2', {}, isDraw ? '🤝 Gelijkspel!' : `🟡 ${winner.name} wint!`),
                el('p', {}, isDraw ? 'Niemand drinkt' : `${(winner === playerA ? playerB : playerA).name} drinkt ${drinks} 🍻`),
                el('button', { className: 'btn-pill', type: 'button',
                    on: { click: () => finish(winner, isDraw) } }, 'Verder'),
            );
            wrap.append(ko);
            setTimeout(() => finish(winner, isDraw), 5000);
        }

        function sendInit() {
            try {
                iframe.contentWindow.postMessage({
                    type: 'cf-init',
                    playerA: { name: playerA.name, color: playerA.color.css },
                    playerB: { name: playerB.name, color: playerB.color.css },
                }, '*');
            } catch (e) { /* ignore */ }
        }

        function onMsg(ev) {
            if (ev.source !== iframe.contentWindow) return;
            const d = ev && ev.data;
            if (!d || typeof d !== 'object') return;
            if (d.type === 'cf-hello') { sendInit(); return; }
            if (d.type === 'cf-result') {
                if (d.winner === 0) {
                    setTimeout(() => showKnockout(null, true), 1200);
                } else {
                    const winner = d.winner === 1 ? playerA : playerB;
                    setTimeout(() => showKnockout(winner), 1500);
                }
            }
        }
        window.addEventListener('message', onMsg);
        iframe.addEventListener('load', sendInit);

        ui.append(back);
        iframe.src = 'vier-op-een-rij.html';
    });
}


/* ════════════════════════════════════════════════════════════════════
   playConnectFour — 3D in-scene Vier op een Rij (PHASED)
   ════════════════════════════════════════════════════════════════════
   Volledig in de Three.js bord-game scene, vlak voor de vulkaan. Een
   vlot drijft op het water met daarop een verticaal 6×7 bord — net
   als raft battle. Spelers tikken op een kolom om hun schijf erin te
   laten vallen.

     INTRO  (~700ms)  camera glijdt naar overview
     OVERVIEW         beide spelers + bord zichtbaar; "Tap to start"
     PLAY_INTRO       inzoomen op het bord (face-on)
     PLAYING          tap op kolom → schijf valt
     DROPPING         animatie ~550ms
     RESULT_CHECK     win? draw? anders volgende speler
     GAMEOVER         winnaar-overlay + drink opdracht

   Touch: tap ergens in een kolom → schijf valt in die kolom.
   Raycast bepaalt welke kolom geraakt werd via onzichtbare hit-boxes
   die de hoogte van elke kolom afdekken.
   ════════════════════════════════════════════════════════════════════ */
function playConnectFour({ playerA, playerB, drinks = 4 } = {}) {
    return new Promise(resolveOuter => {
        // ════════════════════════════════════════════════════════
        //  A. SETUP
        // ════════════════════════════════════════════════════════
        const uiRoot = document.getElementById('game-ui');
        const hiddenChrome = hideMinigameChrome();
        const savedCam = {
            pos: camera.position.clone(),
            fov: camera.fov,
            target: controls.target.clone(),
            autoRotate: controls.autoRotate,
            enabled: controls.enabled,
        };
        controls.autoRotate = false;
        controls.enabled = false;
        camera.fov = 60;
        camera.updateProjectionMatrix();

        // ════════════════════════════════════════════════════════
        //  B. CONSTANTEN
        // ════════════════════════════════════════════════════════
        const ROWS = 6, COLS = 7;
        const CELL = 0.55;
        const PITCH = 0.62;
        const BOARD_W = COLS * PITCH; // 4.34
        const BOARD_H = ROWS * PITCH; // 3.72
        const FRAME_T = 0.22;
        const BOARD_BASE_Y = 1.10;
        const RAFT_Z = 24;

        // ════════════════════════════════════════════════════════
        //  C. VLOT BOUWEN
        // ════════════════════════════════════════════════════════
        function makeConnectRaft() {
            const grp = new THREE.Group();
            const RAFT_W = BOARD_W + 2.5;
            const RAFT_D = 3.2;
            for (let i = -2; i <= 2; i++) {
                const log = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.32, 0.32, RAFT_W, 10),
                    MAT.wood);
                log.rotation.z = Math.PI / 2;
                log.position.set(0, 0.32, i * 0.68);
                log.castShadow = log.receiveShadow = true;
                grp.add(log);
            }
            const deck = new THREE.Mesh(
                new THREE.BoxGeometry(RAFT_W, 0.12, RAFT_D), MAT.woodLight);
            deck.position.y = 0.62;
            deck.castShadow = deck.receiveShadow = true;
            grp.add(deck);
            // Twee dikke palen die het bord 'vasthouden'
            for (const x of [-(BOARD_W/2 + FRAME_T/2 + 0.1),
                              (BOARD_W/2 + FRAME_T/2 + 0.1)]) {
                const post = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.18, 0.20, BOARD_BASE_Y, 10),
                    MAT.wood);
                post.position.set(x, 0.62 + BOARD_BASE_Y/2, 0);
                post.castShadow = true;
                grp.add(post);
            }
            return grp;
        }
        const raft = makeConnectRaft();
        raft.position.set(0, 0, RAFT_Z);
        scene.add(raft);

        // ════════════════════════════════════════════════════════
        //  D. CONNECT-4 BORD BOUWEN
        // ════════════════════════════════════════════════════════
        function makeBoard() {
            const grp = new THREE.Group();
            // ECHT GLAS — bijna helemaal doorzichtig, geen blauwe tint
            // meer. Heel lichte cyaan emissive geeft de typische glas-
            // glans, opacity 0.15 zorgt dat je de vulkaan + zee dóór
            // het bord heen ziet zoals door een schoon raam. De houten
            // omlijsting eromheen blijft solide hout — die geeft de
            // structuur van het bord aan, zodat het niet onzichtbaar
            // wordt ondanks de helderheid.
            const frameMat = new THREE.MeshToonMaterial({
                color: 0xffffff, gradientMap: toon,
                emissive: 0xb3e5fc, emissiveIntensity: 0.18,
                transparent: true,
                opacity: 0.28,         // iets dichter dan voorheen
                side: THREE.DoubleSide,
                depthWrite: false,
            });
            const backMat = new THREE.MeshToonMaterial({
                color: 0xffffff, gradientMap: toon,
                emissive: 0xb3e5fc, emissiveIntensity: 0.08,
                transparent: true,
                opacity: 0.16,
                side: THREE.DoubleSide,
                depthWrite: false,
            });
            // Achter-paneel (donkerder, iets minder doorschijnend)
            const backPanel = new THREE.Mesh(
                new THREE.BoxGeometry(BOARD_W, BOARD_H, 0.06), backMat);
            backPanel.position.set(0, BOARD_H/2, -0.10);
            backPanel.receiveShadow = true;
            backPanel.renderOrder = 1;
            grp.add(backPanel);
            // Voor-paneel met echte ronde gaten via ExtrudeGeometry
            const shape = new THREE.Shape();
            const w2 = BOARD_W / 2, h2 = BOARD_H / 2;
            shape.moveTo(-w2, -h2);
            shape.lineTo( w2, -h2);
            shape.lineTo( w2,  h2);
            shape.lineTo(-w2,  h2);
            shape.lineTo(-w2, -h2);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cx = (c - (COLS - 1) / 2) * PITCH;
                    const cy = (r + 0.5) * PITCH - h2;     // shape coord: y=0 = midden
                    const hole = new THREE.Path();
                    hole.absarc(cx, cy, CELL / 2 - 0.03, 0, Math.PI * 2, true);
                    shape.holes.push(hole);
                }
            }
            const frontGeo = new THREE.ExtrudeGeometry(shape, {
                depth: 0.08, bevelEnabled: false });
            const front = new THREE.Mesh(frontGeo, frameMat);
            // Front-paneel staat NET vóór het midden (z=0.04) zodat
            // schijven (op z=0, dikte 0.10) goed tussen het voor- en
            // achter-paneel zichtbaar zijn door de gaten.
            front.position.set(0, BOARD_H/2, 0.04);
            front.castShadow = true; front.receiveShadow = true;
            front.renderOrder = 2;
            grp.add(front);

            // Cyaan rand-ringen rond elk gat zodat je de slots duidelijk
            // ziet ondanks het heldere glas. Ringen staan op z=0.13 (net
            // vóór het voor-paneel) en zijn opaque-cyaan met glow.
            const ringMat = new THREE.MeshToonMaterial({
                color: 0xe1f5fe, gradientMap: toon,
                emissive: 0x4fc3f7, emissiveIntensity: 0.50,
            });
            const ringGeo = new THREE.TorusGeometry(
                CELL / 2 - 0.03,    // zelfde straal als het gat
                0.018,              // dunne ring
                6, 24);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.position.set(
                        (c - (COLS - 1) / 2) * PITCH,
                        (r + 0.5) * PITCH,
                        0.13);
                    ring.renderOrder = 3;
                    grp.add(ring);
                }
            }
            // Houten omlijsting (rails)
            const railMat = new THREE.MeshToonMaterial({
                color: 0xd4a85a, gradientMap: toon });
            for (const yy of [-FRAME_T/2, BOARD_H + FRAME_T/2]) {
                const r = new THREE.Mesh(
                    new THREE.BoxGeometry(BOARD_W + 2*FRAME_T, FRAME_T, FRAME_T*1.4),
                    railMat);
                r.position.set(0, yy, 0.05);
                r.castShadow = true;
                grp.add(r);
            }
            for (const xx of [-(BOARD_W/2 + FRAME_T/2), BOARD_W/2 + FRAME_T/2]) {
                const r = new THREE.Mesh(
                    new THREE.BoxGeometry(FRAME_T, BOARD_H, FRAME_T*1.4), railMat);
                r.position.set(xx, BOARD_H/2, 0.05);
                r.castShadow = true;
                grp.add(r);
            }
            return grp;
        }
        const board = makeBoard();
        board.position.set(0, BOARD_BASE_Y, 0);
        raft.add(board);

        // Kolom hit-boxen (onzichtbaar) voor raycast
        const columnHits = [];
        for (let c = 0; c < COLS; c++) {
            const hb = new THREE.Mesh(
                new THREE.BoxGeometry(PITCH, BOARD_H + 1.5, 0.40),
                new THREE.MeshBasicMaterial({ visible: false }));
            hb.position.set(
                (c - (COLS - 1) / 2) * PITCH,
                BOARD_BASE_Y + BOARD_H / 2 + 0.5,
                0.1);
            hb.userData.col = c;
            raft.add(hb);
            columnHits.push(hb);
        }

        // ════════════════════════════════════════════════════════
        //  E. AVATARS OP HET VLOT
        // ════════════════════════════════════════════════════════
        const tokenA = makePlayerAvatarToken(playerA.color.hex, playerA.avatar || null);
        tokenGroup.remove(tokenA); raft.add(tokenA);
        tokenA.position.set(-BOARD_W/2 - 1.2, 0.7, 0.4);
        tokenA.scale.setScalar(0.95);
        tokenA.rotation.y = Math.PI / 2;
        if (tokenA.userData.headGroup) tokenA.userData.headGroup.rotation.x = -0.22;
        const tokenB = makePlayerAvatarToken(playerB.color.hex, playerB.avatar || null);
        tokenGroup.remove(tokenB); raft.add(tokenB);
        tokenB.position.set( BOARD_W/2 + 1.2, 0.7, 0.4);
        tokenB.scale.setScalar(0.95);
        tokenB.rotation.y = -Math.PI / 2;
        if (tokenB.userData.headGroup) tokenB.userData.headGroup.rotation.x = -0.22;

        // ════════════════════════════════════════════════════════
        //  F. STATE
        // ════════════════════════════════════════════════════════
        const players = {
            A: { ...playerA, key: 'A' },
            B: { ...playerB, key: 'B' },
        };
        let grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        let current = Math.random() < 0.5 ? 'A' : 'B';
        let phase = 'intro';
        let phaseT = 0;
        let dropAnim = null;
        let finished = false;
        const placedDiscs = [];

        // ════════════════════════════════════════════════════════
        //  G. CAMERAS
        // ════════════════════════════════════════════════════════
        const CAM_WIDE = {
            pos: new THREE.Vector3(0, 14, 52),
            tgt: new THREE.Vector3(0, 3, RAFT_Z),
        };
        // Speel-camera: face-on op het bord vanaf +Z
        const CAM_PLAY = {
            pos: new THREE.Vector3(0, 3.0, RAFT_Z + 11),
            tgt: new THREE.Vector3(0, 3.0, RAFT_Z),
        };
        const camFrom = { pos: camera.position.clone(), tgt: controls.target.clone() };
        let camTo = CAM_WIDE;
        let camLerpT = 0;
        let camLerpDur = 0.7;
        function setCameraTarget(to, durationSec) {
            camFrom.pos.copy(camera.position);
            camFrom.tgt.copy(controls.target);
            camTo = to;
            camLerpDur = durationSec;
            camLerpT = 0;
        }

        // ════════════════════════════════════════════════════════
        //  H. HUD
        // ════════════════════════════════════════════════════════
        const cfBack = el('div', { className: 'rb3-back' });
        const cfHit  = el('div', { className: 'rb3-hit' });
        cfBack.append(cfHit);
        const top = el('div', { className: 'rb3-top' });
        const chipA = el('div', { className: 'rb3-chip',
            style: { '--pcol': playerA.color.css } });
        const dotA = el('div', { className: 'dot',
            style: { background: playerA.color.css,
                     boxShadow: '0 0 8px ' + playerA.color.css } });
        chipA.append(dotA, el('div', {}, playerA.name));
        const vsLbl = el('div', { className: 'rb3-wind' }, '🟡 4 op een Rij');
        const chipB = el('div', { className: 'rb3-chip',
            style: { '--pcol': playerB.color.css } });
        const dotB = el('div', { className: 'dot',
            style: { background: playerB.color.css,
                     boxShadow: '0 0 8px ' + playerB.color.css } });
        chipB.append(dotB, el('div', {}, playerB.name));
        const rowAB = el('div', {
            style: { display: 'flex', gap: '10px', alignItems: 'center' }
        }, [chipA, vsLbl, chipB]);
        top.append(rowAB);
        const banner = el('div', { className: 'rb3-banner',
            style: { display: 'none' } });
        const bot = el('div', { className: 'rb3-bot' });
        const turnBox = el('div', { className: 'rb3-turn',
            style: { '--pcol': playerA.color.css } });
        turnBox.append(
            el('div', { className: 'lbl' }, 'AAN DE BEURT'),
            el('div', { className: 'nm' }, ''));
        const turnName = turnBox.children[1];
        const tip = el('div', { className: 'rb3-tip' }, '');
        bot.append(turnBox, tip);
        const toast = el('div', { className: 'rb3-toast',
            style: { display: 'none' } });
        const skipBtn = makeMinigameSkip({
            onSkip: () => finish(null, true),
            winners: [
                { label: playerA.name, color: playerA.color.css,
                    onPick: () => finish(playerA) },
                { label: playerB.name, color: playerB.color.css,
                    onPick: () => finish(playerB) },
            ],
        });
        skipBtn.classList.add('rb3-skip');
        const flash = el('div', { className: 'rb3-flash' });
        cfBack.append(top, banner, bot, toast, skipBtn, flash);
        uiRoot.append(cfBack);

        function highlightCurrent() {
            const cur = players[current];
            chipA.style.opacity = current === 'A' ? '1' : '0.55';
            chipB.style.opacity = current === 'B' ? '1' : '0.55';
            turnBox.style.setProperty('--pcol', cur.color.css);
            turnName.textContent = cur.name;
            turnName.style.color = cur.color.css;
        }
        function setBanner(text, color) {
            if (!text) { banner.style.display = 'none'; return; }
            banner.style.display = 'block';
            banner.style.setProperty('--pcol', color || '#ffd54a');
            banner.innerHTML = text;
        }
        function setTip(text) { tip.textContent = text || ''; }
        function showToast(html, ms = 1400, color = '#ffd54a') {
            toast.innerHTML = html;
            toast.style.setProperty('--pcol', color);
            toast.style.display = 'block';
            clearTimeout(toast._t);
            toast._t = setTimeout(() => toast.style.display = 'none', ms);
        }
        highlightCurrent();

        // ════════════════════════════════════════════════════════
        //  I. INPUT
        // ════════════════════════════════════════════════════════
        const raycaster = new THREE.Raycaster();
        const ndc = new THREE.Vector2();
        function pickColumn(clientX, clientY) {
            ndc.x = (clientX / window.innerWidth) * 2 - 1;
            ndc.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(ndc, camera);
            raft.updateMatrixWorld(true);
            const hits = raycaster.intersectObjects(columnHits);
            if (hits.length === 0) return -1;
            return hits[0].object.userData.col;
        }
        function onTap(clientX, clientY) {
            if (finished) return;
            if (phase === 'overview') {
                phase = 'play_intro';
                phaseT = 0;
                setCameraTarget(CAM_PLAY, 0.7);
                setBanner('', '');
                setTip('Tik op een kolom om je schijf te laten vallen');
                return;
            }
            if (phase === 'playing') {
                const col = pickColumn(clientX, clientY);
                if (col < 0) return;
                let row = -1;
                for (let r = 0; r < ROWS; r++) {
                    if (grid[r][col] === 0) { row = r; break; }
                }
                if (row < 0) {
                    showToast('Kolom vol!', 700, '#ffd54a');
                    return;
                }
                dropDisc(col, row);
            }
        }
        cfHit.addEventListener('touchstart', e => {
            e.preventDefault();
            const t = e.changedTouches[0];
            if (t) onTap(t.clientX, t.clientY);
        }, { passive: false });
        cfHit.addEventListener('click', e => {
            onTap(e.clientX, e.clientY);
        });

        // ════════════════════════════════════════════════════════
        //  J. SCHIJF
        // ════════════════════════════════════════════════════════
        function makeDisc(colorHex) {
            const mat = new THREE.MeshToonMaterial({
                color: colorHex, gradientMap: toon,
                emissive: colorHex, emissiveIntensity: 0.25 });
            const disc = new THREE.Mesh(
                new THREE.CylinderGeometry(CELL/2 - 0.04, CELL/2 - 0.04, 0.10, 18),
                mat);
            disc.rotation.x = Math.PI / 2;
            disc.castShadow = true;
            const outlineMat = new THREE.MeshBasicMaterial({
                color: 0xffffff, side: THREE.BackSide });
            const out = new THREE.Mesh(disc.geometry, outlineMat);
            out.scale.setScalar(1.10);
            disc.add(out);
            return disc;
        }
        function dropDisc(col, row) {
            const cur = players[current];
            const disc = makeDisc(cur.color.hex);
            const cellX = (col - (COLS - 1) / 2) * PITCH;
            const cellY_end = (row + 0.5) * PITCH;
            const cellY_start = BOARD_H + 0.6;
            board.add(disc);
            // Schijf zit op z=0, precies tussen achter-paneel (z<-0.07)
            // en voor-paneel (z>0.04) — door het transparante plexi en
            // door de echte gaten in het voor-paneel duidelijk te zien.
            disc.position.set(cellX, cellY_start, 0);
            disc.renderOrder = 0;        // schijven eerst (zijn opaque)
            dropAnim = {
                mesh: disc, col, row,
                yStart: cellY_start, yEnd: cellY_end,
                t: 0, dur: 0.55,
            };
            phase = 'dropping';
            phaseT = 0;
            placedDiscs.push(disc);
        }
        function finishDrop() {
            grid[dropAnim.row][dropAnim.col] = current === 'A' ? 1 : 2;
            const win = checkWin(dropAnim.row, dropAnim.col);
            const cur = players[current];
            dropAnim = null;
            if (win) {
                phase = 'gameover';
                phaseT = 0;
                highlightWin(win);
                setBanner(`🏆 ${cur.name} WINT!`, cur.color.css);
                showToast('4 op een rij!', 2400, cur.color.css);
                flash.classList.add('show');
                setTimeout(() => flash.classList.remove('show'), 350);
                showKO(cur);
                return;
            }
            if (isBoardFull()) {
                phase = 'gameover';
                phaseT = 0;
                setBanner('🤝 GELIJKSPEL', '#aaaaaa');
                showToast('Bord vol — gelijkspel', 2000, '#aaaaaa');
                setTimeout(() => finish(null, true), 2200);
                return;
            }
            nextTurn();
        }
        function nextTurn() {
            current = current === 'A' ? 'B' : 'A';
            highlightCurrent();
            phase = 'playing';
            phaseT = 0;
            setTip('Tik op een kolom om je schijf te laten vallen');
        }

        // ════════════════════════════════════════════════════════
        //  K. WIN-DETECTIE
        // ════════════════════════════════════════════════════════
        function checkWin(row, col) {
            const cell = grid[row][col];
            if (!cell) return null;
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for (const [dr, dc] of dirs) {
                const cells = [[row, col]];
                let r = row + dr, c = col + dc;
                while (r>=0 && r<ROWS && c>=0 && c<COLS && grid[r][c] === cell) {
                    cells.push([r, c]); r += dr; c += dc;
                }
                r = row - dr; c = col - dc;
                while (r>=0 && r<ROWS && c>=0 && c<COLS && grid[r][c] === cell) {
                    cells.unshift([r, c]); r -= dr; c -= dc;
                }
                if (cells.length >= 4) return { cells };
            }
            return null;
        }
        function isBoardFull() {
            return grid.every(row => row.every(c => c !== 0));
        }
        function highlightWin(win) {
            for (const [r, c] of win.cells) {
                for (const d of placedDiscs) {
                    const cx = (c - (COLS - 1) / 2) * PITCH;
                    const cy = (r + 0.5) * PITCH;
                    if (Math.abs(d.position.x - cx) < 0.1 &&
                        Math.abs(d.position.y - cy) < 0.1) {
                        if (d.material && d.material.emissive) {
                            d.material.emissiveIntensity = 0.9;
                            d.userData.winGlow = true;
                        }
                        break;
                    }
                }
            }
        }
        function showKO(winner) {
            const ko = el('div', { className: 'rb3-ko',
                style: { '--pcol': winner.color.css } });
            const loser = winner === players.A ? playerB : playerA;
            ko.append(
                el('h2', {}, `🏆 ${winner.name} wint!`),
                el('p', {}, `${loser.name} drinkt ${drinks} 🍻`),
                el('p', { style: { fontSize: '13px', opacity: '0.85' } },
                    `${winner.name} krijgt +1 gouden dobbelsteen 🎲💛`),
                el('button', { className: 'btn-pill', type: 'button',
                    on: { click: () => finish(winner) } }, 'Verder'),
            );
            cfBack.append(ko);
            setTimeout(() => finish(winner), 6000);
        }

        // ════════════════════════════════════════════════════════
        //  L. ANIMATIE-HOOK
        // ════════════════════════════════════════════════════════
        const PREV_HOOK = window.__deGameHook;
        let lastT = 0;
        window.__deGameHook = (time) => {
            const dt = lastT ? Math.min(0.05, time - lastT) : 0;
            lastT = time;
            phaseT += dt;
            // Camera lerp
            if (camLerpT < 1) {
                camLerpT = Math.min(1, camLerpT + dt / camLerpDur);
                const k = camLerpT;
                const e = k < 0.5 ? 4*k*k*k : 1 - Math.pow(-2*k+2, 3) / 2;
                camera.position.lerpVectors(camFrom.pos, camTo.pos, e);
                controls.target.lerpVectors(camFrom.tgt, camTo.tgt, e);
            } else {
                camera.position.copy(camTo.pos);
                controls.target.copy(camTo.tgt);
            }
            camera.lookAt(controls.target);
            // Vlot deint
            // Vlot blijft helemaal stil — anders deint het hele beeld
            // (incl. de schijven en het bord), wat heel snel misselijk-
            // makend werkt bij een face-on close-up camera. Het vlot
            // staat geparkeerd voor de vulkaan, niet op open zee.
            // (De golven en boot-bewegingen die de echte zee suggereren
            // doet het water-shader + de wolken zelf al, dat is genoeg.)
            // Win-glow pulse
            for (const d of placedDiscs) {
                if (d.userData.winGlow && d.material && d.material.emissive) {
                    d.material.emissiveIntensity = 0.5 + 0.5 * Math.sin(time * 4);
                }
            }
            // Fase-overgangen
            if (phase === 'intro' && phaseT >= 0.7) {
                phase = 'overview';
                phaseT = 0;
                setBanner(`<small>4 OP EEN RIJ</small><br>${players[current].name} begint`,
                    players[current].color.css);
                setTip('Tik op het scherm om te starten');
            }
            else if (phase === 'play_intro' && phaseT >= 0.7) {
                phase = 'playing';
                phaseT = 0;
                setTip('Tik op een kolom om je schijf te laten vallen');
            }
            // Drop-animatie
            if (phase === 'dropping' && dropAnim) {
                dropAnim.t = Math.min(1, dropAnim.t + dt / dropAnim.dur);
                const k = dropAnim.t;
                const eased = k * k;     // accelereer naar beneden
                dropAnim.mesh.position.y =
                    dropAnim.yStart + (dropAnim.yEnd - dropAnim.yStart) * eased;
                if (dropAnim.t >= 1) {
                    dropAnim.mesh.position.y = dropAnim.yEnd;
                    finishDrop();
                }
            }
        };

        // Kick-off
        setBanner(`<small>4 OP EEN RIJ</small><br>${players[current].name} begint`,
            players[current].color.css);
        setTip('Tik op het scherm om te starten');
        setCameraTarget(CAM_WIDE, 0.7);

        // ════════════════════════════════════════════════════════
        //  M. CLEANUP
        // ════════════════════════════════════════════════════════
        function disposeMesh(m) {
            if (!m) return;
            m.geometry && m.geometry.dispose && m.geometry.dispose();
            if (m.material) {
                const ms = Array.isArray(m.material) ? m.material : [m.material];
                for (const mat of ms) mat.dispose && mat.dispose();
            }
        }
        function disposeGroup(g) { g.traverse(o => disposeMesh(o)); }
        async function finish(winner, isDraw = false) {
            if (finished) return;
            finished = true;
            window.__deGameHook = PREV_HOOK;
            scene.remove(raft); disposeGroup(raft);
            camera.fov = savedCam.fov;
            camera.position.copy(savedCam.pos);
            camera.updateProjectionMatrix();
            controls.target.copy(savedCam.target);
            controls.autoRotate = savedCam.autoRotate;
            controls.enabled = savedCam.enabled;
            camera.lookAt(controls.target);
            cfBack.remove();
            restoreMinigameChrome(hiddenChrome);
            if (isDraw && !winner) {
                await showModal({ emoji: '🤝', title: 'Gelijkspel!',
                    body: ['Niemand drinkt — bord vol.'],
                    actions: [{ label: 'OK', value: true }] });
                resolveOuter(null);
                return;
            }
            if (winner) {
                const loser = winner === playerA ? playerB : playerA;
                await showModal({ emoji: '🟡',
                    title: `${winner.name} heeft 4 op een rij!`,
                    body: [`${loser.name} drinkt ${drinks} 🍻`,
                        `${winner.name} krijgt 1 × gouden bonus-dobbelsteen 🎲💛`],
                    actions: [{ label: 'Klaar', value: true }] });
            }
            resolveOuter(winner || null);
        }
    });
}



// ── Pip layouts for each die face ──
const PIP_LAYOUTS = {
    1: [[50,50]],
    2: [[25,25],[75,75]],
    3: [[25,25],[50,50],[75,75]],
    4: [[25,25],[75,25],[25,75],[75,75]],
    5: [[25,25],[75,25],[50,50],[25,75],[75,75]],
    6: [[25,25],[75,25],[25,50],[75,50],[25,75],[75,75]],
};
// rotations that bring each face to the front (Z+)
const FACE_ROT = {
    1: [0, 0],         // f1 already at +Z
    6: [0, 180],       // f6 at -Z → rotate 180 around Y
    2: [0, -90],       // f2 at +X → rotate -90 around Y
    5: [0, 90],        // f5 at -X → rotate +90 around Y
    3: [-90, 0],       // f3 at +Y → rotate -90 around X
    4: [90, 0],        // f4 at -Y → rotate +90 around X
};
function makeDie3D(goldClass = false) {
    const die = el('div', { className: 'die3d' + (goldClass ? ' gold' : '') });
    for (let f = 1; f <= 6; f++) {
        const face = el('div', { className: 'face f' + f });
        for (const [x, y] of PIP_LAYOUTS[f]) {
            face.append(el('div', { className: 'pip', style: { left: x + '%', top: y + '%' } }));
        }
        die.append(face);
    }
    return die;
}
function spinDieTo(die, value, extraSpins = 4) {
    const [rx, ry] = FACE_ROT[value];
    const rxTotal = rx + 360 * extraSpins;
    const ryTotal = ry + 360 * (extraSpins + 1);
    // Two rAFs: first lets the browser register the starting transform,
    // then we set the final one so the CSS transition actually animates.
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            die.style.transform = `rotateX(${rxTotal}deg) rotateY(${ryTotal}deg)`;
        });
    });
}

// ── Dice roll using the aurum-dice physics iframe overlay ──
// The iframe is loaded fresh for each roll so its scene is cleanly disposed.
// Communication is via postMessage:
//   iframe → host:  'dice-ready', 'dice-result', 'dice-dismiss'
//   host  → iframe: 'dice-init', 'dice-roll'
function onRollDice() {
    if (G.phase !== 'idle') return;
    const player = G.players[G.turnIdx];

    // Skull-pit: skip a turn if player was punished
    if (player.skipNextTurn) {
        player.skipNextTurn = false;
        G.phase = 'event';
        showStamp({
            emoji: '🌋', big: 'IN DE VULKAAN!',
            sub: `${player.name} slaat deze beurt over`,
            palette: 'lava',
        }).then(async () => {
            advanceTurn();
            await maybeRunAllPlayerRoundGame();
            G.phase = 'idle';
            refreshHUD();
            // Schnaps could still call after a skip-turn
            await maybeFireSchnapsCall();
            const btn = document.getElementById('dice-btn');
            if (btn) { btn.disabled = false; btn.textContent = '🎲'; }
        });
        return;
    }

    G.phase = 'rolling';
    const btn = document.getElementById('dice-btn');
    btn.disabled = true;
    const useBonus = (player.bonusDice || 0) > 0;
    const diceCount = useBonus ? 2 : 1;

    // ── Gevangenis POV: zoom camera in op Banana Brig zodat je de pawn
    //    in de kooi ziet terwijl 'ie probeert te ontsnappen. De dice-
    //    iframe is semi-transparant, dus de jail-view is zichtbaar
    //    áchter de dobbelstenen — extra dramatisch. Saved-state wordt
    //    in finish() gerestored (lerp terug naar bord). ─────────────
    let savedCamForJail = null;
    if (player.inPrison) {
        savedCamForJail = {
            pos: camera.position.clone(),
            tgt: controls.target.clone(),
            autoRotate: controls.autoRotate,
        };
        controls.autoRotate = false;
        // Fire-and-forget: zoomt parallel met iframe-setup
        zoomCameraToJail(500);
    }

    // Build the iframe overlay (semi-transparent table, host page peeks through)
    const back = el('div', { className: 'dice-iframe-back' });
    const headerBar = el('div', { className: 'dice-iframe-header' });
    const turnPill = el('div', { className: 'dice-iframe-pill', style: {
        '--pcol': player.color.css,
    }});
    turnPill.append(
        el('div', { className: 'dot' }),
        document.createTextNode(`${player.name} gooit${useBonus ? ' (met bonus 🎲💛)' : ''}`),
    );
    headerBar.append(turnPill);

    const iframe = el('iframe', {
        className: 'dice-iframe',
        allow: 'autoplay',
        scrolling: 'no',
    });
    // The iframe needs a transparent background — we set it via the `allow*`
    // attributes and via CSS on the iframe element below.
    back.append(headerBar, iframe);
    document.body.append(back);

    let done = false;
    let result = null;  // { total, values, doubles }

    function send(msg) {
        try { iframe.contentWindow.postMessage(msg, '*'); } catch(e) {}
    }

    function onMsg(ev) {
        if (ev.source !== iframe.contentWindow) return;
        const d = ev.data;
        if (!d || typeof d !== 'object') return;
        if (d.type === 'dice-ready') {
            // tell the iframe to set up the right number of dice for this roll
            send({
                type: 'dice-init',
                count: diceCount,
                hasGoldDie: useBonus,
                playerName: player.name,
            });
            // a beat for the dice to settle into idle pose, then roll
            setTimeout(() => send({ type: 'dice-roll' }), 350);
        } else if (d.type === 'dice-result') {
            result = d;
            // consume the bonus die after the roll
            if (useBonus && (player.bonusDice || 0) > 0) {
                player.bonusDice--;
                refreshHUD();
            }
            // mark doubles for the extra-roll logic later
            if (d.doubles) player.extraRoll = true;
        } else if (d.type === 'dice-dismiss') {
            finish();
        }
    }
    window.addEventListener('message', onMsg);

    async function finish() {
        if (done) return;
        done = true;
        window.removeEventListener('message', onMsg);

        // If somehow no result came back, fall back to a random roll
        if (!result) {
            const v1 = 1 + Math.floor(Math.random() * 6);
            const v2 = useBonus ? 1 + Math.floor(Math.random() * 6) : 0;
            result = { total: v1 + v2, values: useBonus ? [v1, v2] : [v1], doubles: useBonus && v1 === v2 };
            if (useBonus && (player.bonusDice || 0) > 0) { player.bonusDice--; refreshHUD(); }
            if (result.doubles) player.extraRoll = true;
        }

        let total = result.total;
        let eruptPenalty = 0;
        if (G.volcanoActive > 0) {
            eruptPenalty = 1;
            total = Math.max(1, total - 1);
        }

        // fade the iframe out
        back.style.transition = 'opacity 0.3s ease';
        back.style.opacity = '0';
        setTimeout(() => back.remove(), 300);

        // Show a short eruption-penalty stamp if applicable (click-to-continue)
        if (eruptPenalty) {
            await showStamp({
                emoji: '🌋', big: `−1 door uitbarsting`,
                sub: `Worp was ${result.total}, na vulkaan-straf: ${total}`,
                palette: 'lava',
            });
        }

        // ─── PRISON CHECK ───────────────────────────────────────────────
        // Als de speler vastzit in Banana Brig: minimaal 4 gooien om uit te
        // breken. Lager = nóg een ronde vast, met een kleine drinkstraf.
        // Hoog genoeg = ontsnapping én normaal bewegen vanaf de verbannings-
        // tegel met het aantal ogen.
        if (player.inPrison) {
            if (total >= 4) {
                player.inPrison = false;
                refreshHUD();
                screenShake(350);
                if (navigator.vibrate) {
                    try { navigator.vibrate([60, 30, 80, 30, 120]); } catch (e) {}
                }
                await showStamp({
                    emoji: '🍌🔓', big: 'ONTSNAPT!',
                    sub: `${player.name} gooit ${total} en breekt uit Banana Brig!`,
                    palette: 'gold',
                });
                // Animeer pawn FYSIEK uit de kooi terug naar de skull-tegel
                // (waar 'ie verbannen werd), zodat moveTokenAlong vanaf daar
                // normaal kan rollen.
                await animateTokenFromJail(player, 750, 2.2);
                // Camera terug naar bord-overzicht
                if (savedCamForJail) {
                    await lerpCameraTo(savedCamForJail.pos, savedCamForJail.tgt, 600);
                    controls.autoRotate = savedCamForJail.autoRotate;
                }
                // Vervolg normaal: bewegen + onLandedOnTile
                G.phase = 'moving';
                moveTokenAlong(player, total, () => onLandedOnTile(player));
            } else {
                // Te laag → blijft vast, drinkt een beetje, beurt voorbij
                const d = slokken(2);
                await showStamp({
                    emoji: '🐒🚫', big: 'BEWAKERS!',
                    sub: `${player.name} gooide ${total} — te laag, blijft vast. Drinkt ${d} 🍻`,
                    palette: 'dark',
                });
                // Camera terug naar bord-overzicht voor de volgende speler
                if (savedCamForJail) {
                    await lerpCameraTo(savedCamForJail.pos, savedCamForJail.tgt, 600);
                    controls.autoRotate = savedCamForJail.autoRotate;
                }
                // Beurt eindigt zonder beweging
                advanceTurn();
                await maybeRunAllPlayerRoundGame();
                G.phase = 'idle';
                refreshHUD();
                await maybeFireSchnapsCall();
                const btn2 = document.getElementById('dice-btn');
                if (btn2) { btn2.disabled = false; btn2.textContent = '🎲'; }
            }
            return;
        }

        G.phase = 'moving';
        moveTokenAlong(player, total, () => onLandedOnTile(player));
    }

    iframe.src = 'dice-overlay.html';
}

// ── Schnaps trigger check — called after every turn advance ──
// Checks whether the current absolute turn-number is in G.schnapsCallTurns
// and if so opens the Schnaps call screen for the player whose turn is
// about to start. Returns a Promise that resolves once the call is over
// (or immediately if no call was scheduled).
//
// IMPORTANT: this is never called during a minigame because both call
// sites guard with `G.phase === 'idle'`. Minigames set phase to 'event'
// and only return to 'idle' after onLandedOnTile finishes — by which
// point any tile-event-triggered minigame is already wrapped up.
async function maybeFireSchnapsCall() {
    if (G.phase !== 'idle') return;
    if (!Array.isArray(G.schnapsCallTurns) || !G.schnapsCallTurns.length) return;
    const turnNum = (G.round - 1) * G.players.length + G.turnIdx;
    if (!G.schnapsCallTurns.includes(turnNum)) return;
    // remove so it can't re-trigger on the same turn
    G.schnapsCallTurns = G.schnapsCallTurns.filter(t => t !== turnNum);
    const target = G.players[G.turnIdx];
    if (!target) return;
    G.phase = 'event';
    await playSchnapsCall({ player: target, mode: 'game' });
    G.phase = 'idle';
    refreshHUD();
}

// Helper used by skip-turn path and end of onLandedOnTile
function advanceTurn() {
    G.turnIdx = (G.turnIdx + 1) % G.players.length;
    if (G.turnIdx === 0) {
        G.round++;
        if (G.volcanoActive > 0) G.volcanoActive--;
        updateVolcanoBanner();
    }
}

// ════════════════════════════════════════════════════════════════
//  ROUND-END ALL-PLAYER MINIGAME TRIGGER
// ════════════════════════════════════════════════════════════════
//  Alle-spelers minigames (volcano, tappy, bowling, lavasteen, etc.)
//  worden niet meer getriggerd door een tile op het bord. In plaats
//  daarvan vuren ze automatisch aan het einde van een ronde-blok,
//  zodat het tempo onafhankelijk van het aantal spelers vergelijk-
//  baar blijft: ongeveer 8 individuele beurten per groeps-minigame.
//
//    Spelers   Rondes tussen minigames   Beurten tussen
//      8                1                       8
//      4                2                       8
//      2                4                       8
//      3                3                       9
//      5/6/7            2                       10-14
//
//  Anti-repeat shuffled pool: alle 7 minigames worden in willekeur-
//  ige volgorde afgewerkt voor er een herhaling komt.
// ════════════════════════════════════════════════════════════════
async function maybeRunAllPlayerRoundGame() {
    if (G.players.length < 2) return;
    // Alleen triggeren wanneer de ronde NET is gewikkeld
    // (advanceTurn heeft G.turnIdx naar 0 gerold).
    if (G.turnIdx !== 0) return;
    if (G._roundsSinceAllPlayer === undefined) G._roundsSinceAllPlayer = 0;
    G._roundsSinceAllPlayer++;
    const threshold = Math.max(1, Math.ceil(8 / G.players.length));
    if (G._roundsSinceAllPlayer < threshold) return;
    G._roundsSinceAllPlayer = 0;

    G.phase = 'event';
    refreshHUD();
    await showStamp({
        emoji: '🎉', big: 'GROEPSMINIGAME!',
        sub: 'Iedereen doet mee — draai aan het rad!',
        palette: 'gold', auto: true, duration: 1400,
    });

    // Spin het Mystery Wheel op bowl-eiland, maar met ALLEEN de
    // groeps-minigames erop. Het rad bepaalt visueel welk spel
    // we doen — geen anti-repeat pool meer, gewoon willekeurig
    // (wheel-randomness is onderdeel van het tafereel).
    const id = await playMysteryWheel({
        options:  ALL_PLAYER_WHEEL_OPTIONS,
        title:    '🎡 Groeps-Rad',
        subtitle: 'Welk spel doen we met z\'n allen?',
    });
    if (!id) {
        // Wheel skip/abort — geen minigame
        G.phase = 'idle';
        return;
    }

    // De dispatcher heeft een 'player' param nodig maar voor all-player
    // games doet 't er niet toe wie — gebruik de eerste in de lijst.
    await runMinigameOnTile(id, G.players[0]);
    G.phase = 'idle';
}

function updateVolcanoBanner() {
    let banner = document.getElementById('vol-banner');
    if (G.volcanoActive > 0) {
        if (!banner) {
            banner = el('div', { id: 'vol-banner', className: 'vol-banner' });
            ui.append(banner);
        }
        banner.textContent = `🌋 VULKAAN UITBARSTING (${G.volcanoActive} ronde${G.volcanoActive > 1 ? 's' : ''})`;
    } else if (banner) {
        banner.remove();
    }
}

// ── Chwazi finger chooser — picks a random player among those who put a finger down ──
function playChwazi({ title = 'Iemand drinkt!', subtitle = 'Iedereen legt één vinger op het scherm', drinks = 3 } = {}) {
    return new Promise(resolve => {
        const players = G.players;
        const ui = document.getElementById('game-ui');
        // ── 3D SCENE INTEGRATIE (zoals paddle-duel) ──────────────
        // Top-down vulkaan-zicht achter de transparante overlay.
        const hiddenChrome = hideMinigameChrome();
        const savedCam = {
            pos: camera.position.clone(),
            fov: camera.fov,
            target: controls.target.clone(),
            autoRotate: controls.autoRotate,
            enabled: controls.enabled,
        };
        controls.autoRotate = false;
        controls.enabled = false;
        camera.fov = 55;
        camera.updateProjectionMatrix();
        const TOP_CAM_POS = new THREE.Vector3(0, 95, 28);
        const TOP_CAM_TGT = new THREE.Vector3(0, 0, 0);
        const camFrom = { pos: camera.position.clone(), tgt: controls.target.clone() };
        const camTo = { pos: TOP_CAM_POS, tgt: TOP_CAM_TGT };
        let camLerpT = 0;
        const camLerpDur = 0.9;
        const PREV_HOOK = window.__deGameHook;
        window.__deGameHook = (time) => {
            if (camLerpT < 1) {
                const dt = 0.016;
                camLerpT = Math.min(1, camLerpT + dt / camLerpDur);
                const k = camLerpT;
                const e = k < 0.5 ? 4*k*k*k : 1 - Math.pow(-2*k+2, 3) / 2;
                camera.position.lerpVectors(camFrom.pos, camTo.pos, e);
                controls.target.lerpVectors(camFrom.tgt, camTo.tgt, e);
            } else {
                camera.position.copy(camTo.pos);
                controls.target.copy(camTo.tgt);
            }
            camera.lookAt(controls.target);
        };

        const back = el('div', { className: 'chwazi-back' });
        const head = el('div', { className: 'chwazi-head' });
        head.append(
            el('h2', {}, title),
            el('div', { className: 'sub' }, subtitle)
        );
        const stage = el('div', { className: 'chwazi-stage' });
        const hint = el('div', { className: 'chwazi-hint' });
        hint.append(
            el('span', { className: 'big' }, '👆 Vingers op het scherm'),
            el('span', { className: 'small' }, `Iedereen die meedoet legt een vinger op het scherm. Eén blijft staan — die persoon drinkt.`)
        );
        stage.append(hint);
        const result = el('div', { className: 'chwazi-result' });
        stage.append(result);
        const status = el('div', { className: 'chwazi-status' }, `Wachten op vingers…`);
        const foot = el('div', { className: 'chwazi-foot' });
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        const pickNowBtn = el('button', { className: 'btn-pill gold', type: 'button' }, 'Kies nu');
        foot.append(skipBtn, pickNowBtn);
        back.append(head, stage, status, foot);
        ui.append(back);

        const fingers = new Map(); // id -> { el, x, y, playerIdx }
        let locked = false;
        let pickTimer = null;

        function rect() { return stage.getBoundingClientRect(); }

        function addFinger(id, clientX, clientY) {
            if (locked) return;
            // Geen player-mapping meer: iedere vinger is gewoon een
            // vinger, geen nummer of speler-koppeling. Cap op 10
            // tegelijk om het visueel beheersbaar te houden.
            if (fingers.size >= 10) return;
            const r = rect();
            const x = clientX - r.left, y = clientY - r.top;
            const f = el('div', { className: 'chwazi-finger' });
            // Vaste accent-kleur (goud, past bij Drank-Eiland thema)
            // — vingers zijn neutraal, identiteit zit bij de persoon
            // die zijn vinger op het scherm houdt.
            f.style.setProperty('--ring', '#ffd54a');
            f.style.setProperty('--fill', '#ffaa3a');
            f.style.left = x + 'px';
            f.style.top  = y + 'px';
            f.append(
                el('div', { className: 'ring' }),
                el('div', { className: 'fill' }),
                // GEEN nummer-label meer
            );
            stage.append(f);
            requestAnimationFrame(() => f.classList.add('in'));
            fingers.set(id, { el: f, x, y });
            updateStatus();
            schedulePick();
        }
        function moveFinger(id, clientX, clientY) {
            const f = fingers.get(id);
            if (!f || locked) return;
            const r = rect();
            f.x = clientX - r.left; f.y = clientY - r.top;
            f.el.style.left = f.x + 'px';
            f.el.style.top  = f.y + 'px';
        }
        function removeFinger(id) {
            const f = fingers.get(id);
            if (!f) return;
            if (locked) return; // keep visuals after pick
            f.el.remove();
            fingers.delete(id);
            updateStatus();
            schedulePick();
        }
        function updateStatus() {
            hint.classList.toggle('hidden', fingers.size > 0);
            const n = fingers.size;
            if (n === 0) status.textContent = `Wachten op vingers…`;
            else if (n === 1) status.textContent = `1 vinger — wachten op meer…`;
            else status.textContent = `${n} vingers — kiezen in 1.5s…`;
        }
        function schedulePick() {
            clearTimeout(pickTimer);
            if (fingers.size === 0 || locked) return;
            // Pick na 1.5s als er ≥2 vingers zijn (minstens 2 doet mee).
            // Bij maar 1 vinger wachten we 3s — geeft anderen tijd.
            const delay = fingers.size >= 2 ? 1500 : 3000;
            pickTimer = setTimeout(doPick, delay);
        }
        function doPick() {
            if (locked || fingers.size === 0) return;
            locked = true;
            const entries = [...fingers.values()];
            const winner = entries[Math.floor(Math.random() * entries.length)];
            entries.forEach(f => {
                if (f === winner) f.el.classList.add('winner');
                else f.el.classList.add('loser');
            });
            status.textContent = `🎯 Deze persoon drinkt!`;
            // GEEN naam in result-overlay — alleen de instructie.
            // De winnaar herkent zichzelf doordat zijn/haar vinger
            // groot oplicht en de anderen wegfaden.
            result.style.setProperty('--gloW', '#ffd54a');
            result.append(
                el('div', { className: 'who', style: { color: '#ffd54a' } },
                    'Deze persoon'),
                el('div', { className: 'drinks' }, `drinkt ${drinks} 🍻`)
            );
            requestAnimationFrame(() => result.classList.add('show'));
            pickNowBtn.textContent = 'Verder';
            // Resolve met sentinel-object zodat caller weet dat iemand is
            // gekozen, maar zonder naam. Caller toont generieke tekst.
            pickNowBtn.onclick = () => finish({ anonymous: true, drinks });
            skipBtn.style.display = 'none';
        }

        // Touch events
        stage.addEventListener('touchstart', e => {
            e.preventDefault();
            [...e.changedTouches].forEach(t => addFinger(t.identifier, t.clientX, t.clientY));
        }, { passive: false });
        stage.addEventListener('touchmove', e => {
            e.preventDefault();
            [...e.changedTouches].forEach(t => moveFinger(t.identifier, t.clientX, t.clientY));
        }, { passive: false });
        stage.addEventListener('touchend', e => {
            e.preventDefault();
            [...e.changedTouches].forEach(t => removeFinger(t.identifier));
        }, { passive: false });
        stage.addEventListener('touchcancel', e => {
            [...e.changedTouches].forEach(t => removeFinger(t.identifier));
        });
        // Mouse fallback for desktop testing — each click adds/removes a finger
        const MOUSE_ID = 'mouse';
        let mouseDown = false;
        stage.addEventListener('mousedown', e => {
            if (locked) return;
            if (fingers.has(MOUSE_ID + fingers.size)) return;
            const id = MOUSE_ID + Date.now();
            stage._lastMouseId = id;
            addFinger(id, e.clientX, e.clientY);
            mouseDown = true;
        });
        stage.addEventListener('mousemove', e => {
            if (!mouseDown || locked) return;
            moveFinger(stage._lastMouseId, e.clientX, e.clientY);
        });
        window.addEventListener('mouseup', () => { mouseDown = false; });

        function finish(winnerPlayer) {
            clearTimeout(pickTimer);
            // Camera + chrome herstellen
            window.__deGameHook = PREV_HOOK;
            camera.fov = savedCam.fov;
            camera.position.copy(savedCam.pos);
            camera.updateProjectionMatrix();
            controls.target.copy(savedCam.target);
            controls.autoRotate = savedCam.autoRotate;
            controls.enabled = savedCam.enabled;
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => {
                back.remove();
                restoreMinigameChrome(hiddenChrome);
                resolve(winnerPlayer);
            }, 300);
        }
        skipBtn.addEventListener('click', () => finish(null));
        pickNowBtn.addEventListener('click', () => {
            if (locked) return; // gets reassigned to "Verder" after pick
            if (fingers.size === 0) {
                // simulate one finger in the middle so a player still gets picked
                const r = rect();
                addFinger('auto', r.width / 2, r.height / 2);
                setTimeout(doPick, 400);
            } else {
                doPick();
            }
        });
    });
}

// ── Tappy Bird — pass-the-phone; each player plays once; highest score wins ──
// LEGACY 2D canvas-versie van Tappy Bird. Niet meer aangeroepen — de
// nieuwe 3D in-scene variant hieronder neemt de plek over. Behouden
// als safety-net mocht de 3D versie issues geven.
function playTappyBirdLegacy({ players = G.players, drinks = 2 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'tb-back' });
        const wrap = el('div', { className: 'tb-canvas-wrap' });
        const canvas = el('canvas');
        wrap.append(canvas);
        const hud = el('div', { className: 'tb-hud' });
        const hudName = el('div', { className: 'name' }, '');
        const hudScore = el('div', { className: 'score' }, '0');
        hud.append(hudName, document.createElement('br'), hudScore);
        wrap.append(hud);
        const overlay = el('div', { className: 'tb-overlay show' });
        wrap.append(overlay);
        back.append(wrap);
        ui.append(back);

        const ctx = canvas.getContext('2d');
        let W = 0, H = 0, dpr = window.devicePixelRatio || 1;
        function resize() {
            const r = wrap.getBoundingClientRect();
            W = r.width; H = r.height;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);

        let curIdx = 0;
        const scores = []; // {player, score}

        const state = { bird:{x:0,y:0,vy:0}, pipes:[], time:0, score:0, alive:false, started:false };
        const GRAV = 1700, FLAP = -520, PIPE_W = 64, GAP = 170, PIPE_INT = 1.55, SCROLL = 180;
        let groundOff = 0;

        function resetGame() {
            state.bird.x = W * 0.28; state.bird.y = H * 0.4; state.bird.vy = 0;
            state.pipes.length = 0; state.time = 0; state.score = 0; state.alive = true; state.started = false;
            hudScore.textContent = '0';
        }

        function flap() {
            if (!state.alive) return;
            state.started = true;
            state.bird.vy = FLAP;
        }
        // IMPORTANT: attach to canvas (not wrap) so taps on the overlay's
        // Start button don't get e.preventDefault()'d before iOS can
        // synthesize their click event. (This was the iPhone Safari bug.)
        canvas.addEventListener('touchstart', e => {
            if (overlay.classList.contains('show')) return; // let the button handle the tap
            e.preventDefault();
            flap();
        }, { passive: false });
        canvas.addEventListener('mousedown', e => { if (overlay.classList.contains('show')) return; flap(); });

        let last = 0, rafId = null;
        function tick(t) {
            if (!last) last = t;
            const dt = Math.min(50, t - last) / 1000;
            last = t;
            update(dt); draw();
            rafId = requestAnimationFrame(tick);
        }
        function update(dt) {
            if (!state.alive || !state.started) return;
            state.time += dt;
            // bird
            state.bird.vy += GRAV * dt;
            state.bird.y += state.bird.vy * dt;
            // pipes
            if (state.pipes.length === 0 || state.pipes[state.pipes.length-1].x < W - W*0.55) {
                const gapY = 80 + Math.random() * (H - 200 - GAP);
                state.pipes.push({ x: W + 20, gapY, passed: false });
            }
            for (const p of state.pipes) {
                p.x -= SCROLL * dt;
                if (!p.passed && p.x + PIPE_W < state.bird.x) {
                    p.passed = true;
                    state.score++;
                    hudScore.textContent = state.score;
                }
                // collide
                const inX = state.bird.x + 16 > p.x && state.bird.x - 16 < p.x + PIPE_W;
                const inY = state.bird.y - 14 < p.gapY || state.bird.y + 14 > p.gapY + GAP;
                if (inX && inY) die();
            }
            state.pipes = state.pipes.filter(p => p.x + PIPE_W > -10);
            // ground / ceiling
            if (state.bird.y > H - 50) { state.bird.y = H - 50; die(); }
            if (state.bird.y < 0) state.bird.y = 0;
            groundOff = (groundOff + SCROLL * dt) % 24;
        }
        function draw() {
            // sky gradient
            const g = ctx.createLinearGradient(0, 0, 0, H);
            g.addColorStop(0, '#70d6e0'); g.addColorStop(1, '#9ee5b0');
            ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
            // pipes
            for (const p of state.pipes) {
                ctx.fillStyle = '#5cb83a';
                ctx.fillRect(p.x, 0, PIPE_W, p.gapY);
                ctx.fillRect(p.x, p.gapY + GAP, PIPE_W, H - (p.gapY + GAP) - 40);
                ctx.fillStyle = '#3a8c25';
                ctx.fillRect(p.x - 4, p.gapY - 18, PIPE_W + 8, 18);
                ctx.fillRect(p.x - 4, p.gapY + GAP, PIPE_W + 8, 18);
            }
            // ground stripe
            ctx.fillStyle = '#deb887'; ctx.fillRect(0, H - 40, W, 40);
            ctx.fillStyle = '#a87a4a';
            for (let x = -groundOff; x < W; x += 24) ctx.fillRect(x, H - 40, 12, 6);
            // bird
            const p = players[curIdx];
            const angle = Math.max(-0.5, Math.min(1.0, state.bird.vy / 600));
            ctx.save();
            ctx.translate(state.bird.x, state.bird.y);
            ctx.rotate(angle);
            ctx.fillStyle = p.color.css;
            ctx.beginPath(); ctx.ellipse(0, 0, 18, 14, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(7, -4, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(8, -4, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ffaa20';
            ctx.beginPath(); ctx.moveTo(13, 0); ctx.lineTo(22, 1); ctx.lineTo(13, 4); ctx.fill();
            ctx.restore();
        }

        function die() {
            if (!state.alive) return;
            state.alive = false;
            scores.push({ player: players[curIdx], score: state.score });
            setTimeout(showAfter, 700);
        }

        function showStartFor(p) {
            overlay.innerHTML = '';
            overlay.append(
                el('h2', { style: { color: p.color.css } }, `Geef telefoon aan ${p.name}`),
                el('p', {}, 'Tik om te flappen. Ontwijk de buizen — wie het verste komt wint.'),
                el('button', { className: 'btn-pill gold', on: { click: () => {
                    overlay.classList.remove('show');
                    resetGame();
                } } }, '▶ Ik ben er klaar voor'),
            );
            overlay.classList.add('show');
            hudName.textContent = p.name;
            hudName.style.background = p.color.css;
            hudScore.textContent = '0';
        }

        function showAfter() {
            if (curIdx < players.length - 1) {
                curIdx++;
                showStartFor(players[curIdx]);
            } else {
                showFinal();
            }
        }

        function showFinal() {
            const sorted = [...scores].sort((a, b) => b.score - a.score);
            const top = sorted[0].score;
            const losers = sorted.filter(s => s.score < top);
            overlay.innerHTML = '';
            overlay.append(el('h2', {}, '🏆 Eindstand'));
            const board = el('div', { className: 'board' });
            sorted.forEach((s, i) => {
