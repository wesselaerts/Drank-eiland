                // (was: `bar.style.display = 'none'` in v2.x with the manual bar).
                return;
            }
            if (d.type !== 'raft-knockout' && d.type !== 'knockout' && d.type !== 'raft:gameover') return;
            let winner = null;
            if (d.winner === 'A' || d.winner === 'a' || d.winner === 1) winner = playerA;
            else if (d.winner === 'B' || d.winner === 'b' || d.winner === 2) winner = playerB;
            else if (d.winnerName) {
                if (d.winnerName === playerA.name) winner = playerA;
                else if (d.winnerName === playerB.name) winner = playerB;
            }
            if (!winner) winner = Math.random() < 0.5 ? playerA : playerB; // fallback
            // Let the in-game celebration play for ~1.8s before our KO
            // overlay covers it (confetti, "X wins!" text, etc).
            setTimeout(() => showKnockout(winner), 1800);
        }
        window.addEventListener('message', onMsg);

        iframe.addEventListener('load', sendInit);

        // Everything is wired up — now mount the iframe and start loading.
        ui.append(back);
        iframe.src = 'raftwar.html';
    });
}


/* ════════════════════════════════════════════════════════════════════
   playRaftBattle — 3D in-scene Raft Battle (PHASED, MOBIEL-FIRST)
   ════════════════════════════════════════════════════════════════════
   Volledig in de Three.js bord-game scene. Geen iframe. Klassieke
   artillery-flow (Pocket Tanks / Hills of Steel / Worms-stijl):

     INTRO  (~700ms)  camera glijdt vanaf bord-game pos naar wide-shot
     STUDY  (wacht)    overzicht — beide vlotten + wind zichtbaar
                       "TAP TO CONTINUE" → ga naar aim
     AIM    (wacht)    camera zoomt achter huidige speler
                       drag op het scherm = mik + power preview
                       loslaten = vuren
     FIRE   (~400ms)   camera glijdt terug naar wide-shot
     FLY    (physics)  kogel volgt zwaartekracht + wind, max 3× over
                       water stuiteren, raakt het andere vlot of niet
     RESULT (~1500ms)  korte HIT/MISS toast
     → terug naar STUDY met andere speler aan beurt
     GAMEOVER          winnaar-overlay, dan resolve

   Camera-posities zijn fixed (geen orbit). Touch input via één enkele
   handler op een fullscreen overlay-div, zodat OrbitControls helemaal
   nergens tussen komt.
   ════════════════════════════════════════════════════════════════════ */
function playRaftBattle({ playerA, playerB, drinks = 4, targetHp = 3 } = {}) {
    return new Promise(resolveOuter => {
        // ════════════════════════════════════════════════════════
        //  A. SETUP — bord-game chrome verbergen, camera bewaren
        // ════════════════════════════════════════════════════════
        const uiRoot = document.getElementById('game-ui');
        // Verberg al het bord-game UI rommel (home-knop, top-bar,
        // mini-map, hud-card, dobbelsteen) + de home-scherm overlay
        const hiddenChrome = hideMinigameChrome();
        // Camera/controls snapshot
        const savedCam = {
            pos: camera.position.clone(),
            fov: camera.fov,
            target: controls.target.clone(),
            autoRotate: controls.autoRotate,
            enabled: controls.enabled,
        };
        controls.autoRotate = false;
        controls.enabled = false;
        camera.fov = 68;          // breder dan default 42 zodat beide
        // boten in een portrait-scherm naast elkaar passen
        camera.updateProjectionMatrix();

        // ════════════════════════════════════════════════════════
        //  B. RAFT FABRIEK + PLAATSING
        // ════════════════════════════════════════════════════════
        function makeRaft(colorHex) {
            const grp = new THREE.Group();
            const colMat = new THREE.MeshToonMaterial({
                color: colorHex, gradientMap: toon,
                emissive: colorHex, emissiveIntensity: 0.18 });
            // 3 logs
            for (let i = -1; i <= 1; i++) {
                const log = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.32, 0.32, 4.5, 10), MAT.wood);
                log.rotation.z = Math.PI / 2;
                log.position.set(0, 0.32, i * 0.8);
                log.castShadow = log.receiveShadow = true;
                grp.add(log);
            }
            // Dek
            const deck = new THREE.Mesh(
                new THREE.BoxGeometry(4.6, 0.12, 2.6), MAT.woodLight);
            deck.position.y = 0.62;
            deck.castShadow = deck.receiveShadow = true;
            grp.add(deck);
            // Mast + zeil
            const mast = new THREE.Mesh(
                new THREE.CylinderGeometry(0.08, 0.08, 3.6, 8), MAT.wood);
            mast.position.set(-0.4, 2.45, 0); mast.castShadow = true;
            grp.add(mast);
            const sailShape = new THREE.Shape();
            sailShape.moveTo(0, 0); sailShape.lineTo(1.7, 0);
            sailShape.lineTo(0, 2.2); sailShape.lineTo(0, 0);
            const sailMat = new THREE.MeshToonMaterial({
                color: colorHex, gradientMap: toon,
                side: THREE.DoubleSide, transparent: true, opacity: 0.95 });
            const sail = new THREE.Mesh(new THREE.ShapeGeometry(sailShape), sailMat);
            sail.position.set(-0.4, 1.30, 0.01); grp.add(sail);
            // Kanon
            const cBase = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.25, 0.7), colMat);
            cBase.position.set(1.3, 0.82, 0); cBase.castShadow = true;
            grp.add(cBase);
            const barrel = new THREE.Mesh(
                new THREE.CylinderGeometry(0.18, 0.22, 1.1, 14),
                new THREE.MeshToonMaterial({ color: 0x222230, gradientMap: toon }));
            barrel.rotation.z = -Math.PI / 2 + 0.20; // standaard iets omhoog
            barrel.position.set(1.85, 1.0, 0);
            barrel.castShadow = true;
            grp.add(barrel);
            grp.userData.barrel = barrel;
            return grp;
        }
        const RAFT_DIST = 16; // half-afstand → 32 units totaal tussen boten
        // Genoeg voor "veel verder uit elkaar dan in 2D" gevoel,
        // maar past nog op een portrait phone-scherm met fov=68.
        const RAFT_Z = 24;
        const raftA = makeRaft(playerA.color.hex);
        raftA.position.set(-RAFT_DIST, 0, RAFT_Z);
        scene.add(raftA);
        const raftB = makeRaft(playerB.color.hex);
        raftB.position.set( RAFT_DIST, 0, RAFT_Z);
        raftB.rotation.y = Math.PI;
        scene.add(raftB);
        // Speler-tokens (avatar) op de boten — flink groter dan op het
        // bordspel (scale 1.3) zodat het gezicht goed te zien is vanaf
        // de aim-camera. We zetten ze iets naast het kanon (x=-0.8 in
        // raft-local) zodat ze niet in de loop staan. Hoofd tilt iets
        // omhoog, zoals _gameHook normaal doet op het bord, zodat ze
        // naar de camera "kijken".
        const tokenA = makePlayerAvatarToken(playerA.color.hex, playerA.avatar || null);
        tokenGroup.remove(tokenA); raftA.add(tokenA);
        tokenA.position.set(-0.8, 0.7, 0); tokenA.scale.setScalar(1.3);
        if (tokenA.userData.headGroup) {
            tokenA.userData.headGroup.rotation.x = -0.30;
        }
        const tokenB = makePlayerAvatarToken(playerB.color.hex, playerB.avatar || null);
        tokenGroup.remove(tokenB); raftB.add(tokenB);
        tokenB.position.set(-0.8, 0.7, 0); tokenB.scale.setScalar(1.3);
        if (tokenB.userData.headGroup) {
            tokenB.userData.headGroup.rotation.x = -0.30;
        }

        // ════════════════════════════════════════════════════════
        //  C. BAL + TRAJECT-PREVIEW
        // ════════════════════════════════════════════════════════
        const ballMesh = new THREE.Mesh(
            new THREE.SphereGeometry(0.32, 14, 12),
            new THREE.MeshToonMaterial({ color: 0x2a2230, gradientMap: toon }));
        ballMesh.castShadow = true; ballMesh.visible = false;
        scene.add(ballMesh);
        // Trail
        const TRAIL_N = 16;
        const trailGeo = new THREE.BufferGeometry();
        trailGeo.setAttribute('position',
            new THREE.BufferAttribute(new Float32Array(TRAIL_N * 3), 3));
        const trail = new THREE.Points(trailGeo, new THREE.PointsMaterial({
            color: 0xfff1a8, size: 0.28, transparent: true, opacity: 0.85,
            depthWrite: false, sizeAttenuation: true }));
        scene.add(trail);
        const trailPts = [];
        // Aim-preview lijn
        const PREV_N = 32;
        const previewGeo = new THREE.BufferGeometry();
        previewGeo.setAttribute('position',
            new THREE.BufferAttribute(new Float32Array(PREV_N * 3), 3));
        const preview = new THREE.Line(previewGeo, new THREE.LineDashedMaterial({
            color: 0xffd54a, dashSize: 0.55, gapSize: 0.35,
            transparent: true, opacity: 0.95, depthTest: false }));
        preview.visible = false; preview.renderOrder = 999;
        scene.add(preview);

        // ════════════════════════════════════════════════════════
        //  D. CAMERA-POSITIES (3 vaste shots, smooth lerp)
        // ════════════════════════════════════════════════════════
        // WIDE: beide boten in beeld + eiland erachter
        // Camera ver genoeg achter en omhoog voor een mooi overview op
        // zowel landscape als portrait phones.
        const CAM_WIDE = {
            pos: new THREE.Vector3(0, 22, 68),
            tgt: new THREE.Vector3(0, 2, RAFT_Z),
        };
        // SIDE-AIM cameras: ECHT gezoomd zij-aanzicht op de huidige
        // speler. Het focus-punt is iets verder naar de boot en lager
        // (y=2 i.p.v. 3) zodat de hele boot inclusief het kanon mooi
        // in het midden-linker (resp. midden-rechter) deel van het
        // scherm komt te staan — boven de power-meter en turn-box.
        //
        // Berekening voor iPhone 17 Pro portrait (aspect ≈ 0.46):
        //   boat A: x=-20%, y=-18% (vol in beeld, links-onder)
        //   cannon: x=+18%, y=-9%  (vrijwel in scherm-midden)
        //   trajectory peak: off-screen rechts (mik op gevoel ✓)
        //
        // Na het schieten neemt de cinematische kogel-volg-camera het
        // over en zie je het hele traject + landing.
        const CAM_AIM_A = {
            pos: new THREE.Vector3(-17, 7, 38),
            tgt: new THREE.Vector3(-15, 2, RAFT_Z),
        };
        const CAM_AIM_B = {
            pos: new THREE.Vector3( 17, 7, 38),
            tgt: new THREE.Vector3( 15, 2, RAFT_Z),
        };
        const camFrom = { pos: camera.position.clone(), tgt: controls.target.clone() };
        // Snapshot van camera-positie wanneer een schot wordt gelost,
        // gebruikt door de kogel-volg-camera om soepel vanuit het
        // zij-aanzicht naar de bal-tracking shot over te gaan.
        const fireCamFrom = { pos: camera.position.clone(), tgt: controls.target.clone() };
        let camTo = CAM_WIDE;
        let camLerpT = 0;   // 0..1; 1 = aangekomen
        let camLerpDur = 0.7;

        function setCameraTarget(to, durationSec) {
            camFrom.pos.copy(camera.position);
            camFrom.tgt.copy(controls.target);
            camTo = to;
            camLerpDur = durationSec;
            camLerpT = 0;
        }

        // ════════════════════════════════════════════════════════
        //  E. STATE
        // ════════════════════════════════════════════════════════
        const players = {
            A: { ...playerA, raft: raftA, hp: targetHp },
            B: { ...playerB, raft: raftB, hp: targetHp },
        };
        let current = Math.random() < 0.5 ? 'A' : 'B';
        let wind = randomWind();
        let phase = 'intro';
        let phaseT = 0;             // tijd in huidige fase
        let lastShot = null;        // { hit:bool, knockout:bool }
        let ball = null;            // {vel:Vector3, waterBounces}
        let finished = false;

        function randomWind() {
            // Iets agressievere wind dan voorheen: rangee 0.9 – 2.8
            // sterk genoeg om compensatie te eisen.
            if (Math.random() < 0.20) return 0;   // 20% windstil
            return (Math.random() < 0.5 ? -1 : 1) * (0.9 + Math.random() * 1.9);
        }

        // ════════════════════════════════════════════════════════
        //  F. HUD-OVERLAY (DOM)
        // ════════════════════════════════════════════════════════
        const back = el('div', { className: 'rb3-back' });
        const hit  = el('div', { className: 'rb3-hit' });
        back.append(hit);
        // Top-bar: HP A | wind | HP B
        const top = el('div', { className: 'rb3-top' });
        const chipA = el('div', { className: 'rb3-chip',
            style: { '--pcol': playerA.color.css } });
        const dotA = el('div', { className: 'dot',
            style: { background: playerA.color.css,
                     boxShadow: '0 0 8px ' + playerA.color.css } });
        const nmA  = el('div', {}, playerA.name);
        const hpA  = el('div', { className: 'hp' });
        chipA.append(dotA, nmA, hpA);
        const windEl = el('div', { className: 'rb3-wind' });
        const chipB = el('div', { className: 'rb3-chip',
            style: { '--pcol': playerB.color.css } });
        const dotB = el('div', { className: 'dot',
            style: { background: playerB.color.css,
                     boxShadow: '0 0 8px ' + playerB.color.css } });
        const nmB  = el('div', {}, playerB.name);
        const hpB  = el('div', { className: 'hp' });
        chipB.append(dotB, nmB, hpB);
        const rowAB = el('div', {
            style: { display: 'flex', gap: '10px', alignItems: 'center' }
        }, [chipA, windEl, chipB]);
        top.append(rowAB);
        // Center banner — fase-specifieke instructie
        const banner = el('div', { className: 'rb3-banner',
            style: { display: 'none' } });
        // Bottom: huidige speler + tip
        const bot = el('div', { className: 'rb3-bot' });
        const turnBox = el('div', { className: 'rb3-turn',
            style: { '--pcol': playerA.color.css } });
        const turnLbl  = el('div', { className: 'lbl' }, 'AAN DE BEURT');
        const turnName = el('div', { className: 'nm' }, '');
        turnBox.append(turnLbl, turnName);
        const tip = el('div', { className: 'rb3-tip' }, '');
        bot.append(turnBox, tip);
        // Aim-marker (volgt vinger)
        const aimMark = el('div', { className: 'rb3-aim',
            style: { display: 'none' } }, '🎯');
        // Result toast
        const toast = el('div', { className: 'rb3-toast',
            style: { display: 'none' } });
        // Skip-pill (long-press → manual winner)
        const skip = makeMinigameSkip({
            onSkip: () => finish(null),
            winners: [
                { label: playerA.name, color: playerA.color.css,
                    onPick: () => finish(playerA) },
                { label: playerB.name, color: playerB.color.css,
                    onPick: () => finish(playerB) },
            ],
        });
        skip.classList.add('rb3-skip');
        // Power-meter (alleen tijdens AIM zichtbaar). Maakt zonder
        // zicht op de tegenstander toch duidelijk hoe hard je gaat
        // schieten: groen=zacht, geel=gemiddeld, rood=max.
        const pwrBox = el('div', { className: 'rb3-pwr' });
        const pwrBar = el('div', { className: 'bar' });
        const pwrMeter = el('div', { className: 'meter' }, pwrBar);
        const pwrLbl = el('div', { className: 'lbl' }, 'POWER');
        pwrBox.append(pwrMeter, pwrLbl);
        // Flash + KO-overlay containers
        const flash = el('div', { className: 'rb3-flash' });
        back.append(top, banner, bot, aimMark, toast, skip, pwrBox, flash);
        uiRoot.append(back);

        function renderHP(node, hp) {
            clear(node);
            for (let i = 0; i < targetHp; i++) {
                node.append(el('span',
                    { className: 'heart' + (i < hp ? '' : ' gone') }, '❤️'));
            }
        }
        function renderHUD() {
            const cur = players[current];
            renderHP(hpA, players.A.hp);
            renderHP(hpB, players.B.hp);
            // Wind
            const w = Math.abs(wind);
            if (w < 0.1) {
                windEl.innerHTML = '💨 <b>STIL</b>';
            } else {
                const arrow = wind > 0 ? '➡️' : '⬅️';
                const lbl = w > 1.7 ? 'STERK' : w > 1.0 ? 'MATIG' : 'ZWAK';
                windEl.innerHTML = `💨 <b>${lbl}</b><span class="arrow">${arrow}</span>`;
            }
            turnBox.style.setProperty('--pcol', cur.color.css);
            turnName.textContent = cur.name;
            turnName.style.color = cur.color.css;
        }
        function setBanner(text, color) {
            if (!text) { banner.style.display = 'none'; return; }
            banner.style.display = 'block';
            banner.style.setProperty('--pcol', color || '#ffd54a');
            banner.innerHTML = text;
        }
        function setTip(text) { tip.textContent = text || ''; }
        function showToast(html, ms = 1400, color = '#ffd54a') {
            toast.innerHTML = html;
            toast.style.setProperty('--pcol', color);
            toast.style.display = 'block';
            clearTimeout(toast._t);
            toast._t = setTimeout(() => toast.style.display = 'none', ms);
        }
        renderHUD();

        // ════════════════════════════════════════════════════════
        //  G. AIM / INPUT
        // ════════════════════════════════════════════════════════
        const drag = { active: false, sx: 0, sy: 0, x: 0, y: 0, id: null };
        function aimVector() {
            // Sleep richting waarheen je wil schieten. De drag-vector is
            // ONBEGRENSD — je vinger mag van het scherm af glijden, de
            // delta vanaf start blijft tellen. Dat is exact zoals in
            // raftwar 2D, en past op een phone-scherm.
            const dx = drag.x - drag.sx;     // pixels (rechts positief)
            const dy = drag.y - drag.sy;     // pixels (omlaag positief in DOM)
            const mag = Math.hypot(dx, dy);
            if (mag < 12) return null;       // dead-zone
            // POWER curve — kanon mag flink hard schieten. Op iPhone met
            // 844px hoogte kun je tot ~600px slepen voor max power.
            const POWER_PER_PX = 0.062;
            const MIN_P = 8, MAX_P = 32;
            const power = Math.min(MAX_P, Math.max(MIN_P, mag * POWER_PER_PX));
            const sign = current === 'A' ? 1 : -1;
            // Sleep-richting bepaalt hoek 1-op-1 (geen gekoppelde clamps
            // meer): pure horizontale sleep = echt platte schot, diagonale
            // sleep = boog, verticale sleep = recht omhoog. Hierdoor kun
            // je bij max power gewoon LAAG mikken voor een snelle directe
            // schot, of bij weinig power HOOG voor een mortier-boog.
            let fwd = (dx * sign) / mag;
            let up  = (-dy) / mag;
            // Niet achteruit en niet de grond in schieten — maar 0 is
            // toegestaan (echt platte resp. recht-omhoog schot).
            if (fwd < 0) fwd = 0;
            if (up  < 0) up  = 0;
            if (fwd === 0 && up === 0) up = 0.1;   // edge-case
            const len = Math.hypot(fwd, up);
            fwd /= len; up /= len;
            return {
                vx: sign * fwd * power,
                vy: up * power,
                vz: 0,
                power,
                vAng: Math.atan2(up, fwd),
            };
        }
        const GRAVITY = -9.81;
        function updatePreviewAndCannon() {
            const aim = aimVector();
            const cur = players[current];
            const barrel = cur.raft.userData.barrel;
            if (barrel) {
                if (aim && phase === 'aiming') {
                    barrel.rotation.z = -Math.PI / 2 + aim.vAng;
                } else {
                    barrel.rotation.z = -Math.PI / 2 + 0.20;
                }
            }
            // Power-meter — visueel feedback hoe hard je gaat schieten.
            // Gebruikt min/max constants uit aimVector zodat ze synchroon
            // blijven.
            if (aim && phase === 'aiming') {
                const MIN_P = 8, MAX_P = 32;
                const pct = Math.max(0, Math.min(1, (aim.power - MIN_P) / (MAX_P - MIN_P)));
                pwrBar.style.transform = `scaleX(${pct})`;
                pwrBox.classList.add('show');
                // Label-tekst geeft kwalitatieve hint
                pwrLbl.textContent = pct < 0.33 ? 'ZACHT' :
                                     pct < 0.67 ? 'GEMIDDELD' : 'MAX POWER';
            } else if (phase !== 'aiming' || !drag.active) {
                pwrBox.classList.remove('show');
            }
            if (!aim || phase !== 'aiming') {
                preview.visible = false;
                return;
            }
            // Simuleer fysica voor preview, vanaf de échte kanon-tip
            // (zelfde berekening als fireBall) zodat de gestippelde lijn
            // exact uit het uiteinde van de loop komt — ook bij hoog of
            // laag mikken.
            cur.raft.updateMatrixWorld(true);
            const pos = new THREE.Vector3(0, 0.55, 0)
                .applyMatrix4(barrel.matrixWorld);
            const vel = new THREE.Vector3(aim.vx, aim.vy, aim.vz);
            const positions = preview.geometry.attributes.position.array;
            const dt = 0.06;
            for (let i = 0; i < PREV_N; i++) {
                positions[i*3]     = pos.x;
                positions[i*3 + 1] = pos.y;
                positions[i*3 + 2] = pos.z;
                vel.y += GRAVITY * dt;
                vel.x += wind * dt;
                pos.addScaledVector(vel, dt);
                if (pos.y < 0.1) pos.y = 0.1;
            }
            preview.geometry.attributes.position.needsUpdate = true;
            preview.visible = true;
            preview.computeLineDistances();
        }
        // Pointer-handlers (eenvoudig, robuust, werkt op alle phones)
        function onPointerDown(clientX, clientY, id) {
            if (finished) return;
            // STUDY: tap → ga naar aim
            if (phase === 'study') {
                phase = 'aim_intro';
                phaseT = 0;
                const target = current === 'A' ? CAM_AIM_A : CAM_AIM_B;
                setCameraTarget(target, 0.6);
                setBanner('', '');
                setTip('Sleep om te mikken — laat los om te schieten');
                return;
            }
            // RESULT: tap → volgende beurt
            if (phase === 'result') {
                advanceToNext();
                return;
            }
            // AIMING: start drag
            if (phase === 'aiming') {
                drag.active = true; drag.id = id;
                drag.sx = drag.x = clientX;
                drag.sy = drag.y = clientY;
                aimMark.style.display = 'flex';
                aimMark.style.left = clientX + 'px';
                aimMark.style.top = clientY + 'px';
                updatePreviewAndCannon();
            }
        }
        function onPointerMove(clientX, clientY) {
            if (!drag.active) return;
            drag.x = clientX; drag.y = clientY;
            aimMark.style.left = clientX + 'px';
            aimMark.style.top = clientY + 'px';
            updatePreviewAndCannon();
        }
        function onPointerUp() {
            if (!drag.active) return;
            drag.active = false;
            aimMark.style.display = 'none';
            preview.visible = false;
            if (phase !== 'aiming') return;
            const aim = aimVector();
            if (aim) {
                fireBall(aim);
            } else {
                // te kort gesleept, kanon terug naar rust
                updatePreviewAndCannon();
            }
        }
        // Touch + mouse listeners op de hit-laag
        hit.addEventListener('touchstart', e => {
            e.preventDefault();
            const t = e.changedTouches[0];
            if (t) onPointerDown(t.clientX, t.clientY, t.identifier);
        }, { passive: false });
        hit.addEventListener('touchmove', e => {
            e.preventDefault();
            for (const t of e.changedTouches) {
                if (t.identifier === drag.id) {
                    onPointerMove(t.clientX, t.clientY); break;
                }
            }
        }, { passive: false });
        const touchEnd = e => {
            for (const t of e.changedTouches) {
                if (t.identifier === drag.id) { onPointerUp(); break; }
            }
            // ook tap zonder drag: handle als down+up op zelfde plek
            if (!drag.active && e.changedTouches[0] && phase !== 'aiming') {
                onPointerDown(e.changedTouches[0].clientX,
                    e.changedTouches[0].clientY,
                    e.changedTouches[0].identifier);
            }
            e.preventDefault();
        };
        hit.addEventListener('touchend', touchEnd, { passive: false });
        hit.addEventListener('touchcancel', () => onPointerUp());
        let mouseDown = false;
        hit.addEventListener('mousedown', e => {
            mouseDown = true;
            onPointerDown(e.clientX, e.clientY, -1);
        });
        hit.addEventListener('mousemove', e => {
            if (mouseDown) onPointerMove(e.clientX, e.clientY);
        });
        window.addEventListener('mouseup', () => {
            if (mouseDown) { mouseDown = false; onPointerUp(); }
        });

        // ════════════════════════════════════════════════════════
        //  H. SCHIETEN, FYSICA, HIT-DETECTIE
        // ════════════════════════════════════════════════════════
        function fireBall(aim) {
            const cur = players[current];
            const barrel = cur.raft.userData.barrel;
            // Bal spawnt op de échte tip van het kanon — niet meer op
            // een hardcoded offset. De barrel-cylinder heeft lengte 1.1
            // langs zijn lokale Y-as, dus de tip ligt op (0, 0.55, 0)
            // in barrel-local. Door dit via barrel.matrixWorld te
            // transformeren krijgen we de wereld-positie incl. de
            // huidige aim-rotatie + raft-bob + raft-rotation.
            cur.raft.updateMatrixWorld(true);
            const tip = new THREE.Vector3(0, 0.55, 0)
                .applyMatrix4(barrel.matrixWorld);
            ballMesh.position.copy(tip);
            ballMesh.visible = true;
            trailPts.length = 0;
            ball = {
                vel: new THREE.Vector3(aim.vx, aim.vy, aim.vz),
                waterBounces: 0,
            };
            phase = 'fire';     // korte transitie naar kogel-cam
            phaseT = 0;
            // Snapshot huidige (aim) camera-positie zodat de fire-fase
            // er soepel uit kan lerpen naar de kogel-volg-camera.
            fireCamFrom.pos.copy(camera.position);
            fireCamFrom.tgt.copy(controls.target);
            setBanner('', '');
            setTip('');
            // Kanon-recoil — beide rafts hebben de loop op raft-local +X
            // (raft B is gespiegeld via rotation.y=π), dus de recoil moet
            // ALTIJD raft-local -X richting zijn. De oude code deed dat
            // voor raft B verkeerd (recoil ging richting de tegenstander).
            if (barrel) {
                barrel.position.x -= 0.4;
                setTimeout(() => barrel.position.x += 0.4, 200);
            }
        }
        function checkBallPhysics(dt, time) {
            if (!ball) return;
            ball.vel.y += GRAVITY * dt;
            ball.vel.x += wind * dt;
            ballMesh.position.addScaledVector(ball.vel, dt);
            ballMesh.rotation.x += dt * 6;
            ballMesh.rotation.z += dt * 4;
            // Trail
            trailPts.unshift({ x: ballMesh.position.x, y: ballMesh.position.y, z: ballMesh.position.z });
            if (trailPts.length > TRAIL_N) trailPts.length = TRAIL_N;
            const tarr = trail.geometry.attributes.position.array;
            for (let i = 0; i < TRAIL_N; i++) {
                const p = trailPts[i];
                if (p) { tarr[i*3]=p.x; tarr[i*3+1]=p.y; tarr[i*3+2]=p.z; }
                else   { tarr[i*3]=tarr[i*3+1]=tarr[i*3+2]=9999; }
            }
            trail.geometry.attributes.position.needsUpdate = true;
            // Water-bounce — max 1 keer skippen, dan zinkt-ie. Maakt
            // het flink moeilijker: je moet bijna direct raken,
            // ricochet over het water is een laatste kans, niet een
            // makkelijke optie.
            const WATER_Y = 0.1;
            if (ballMesh.position.y <= WATER_Y && ball.vel.y < 0) {
                if (Math.abs(ball.vel.y) > 2.5 && ball.waterBounces < 1) {
                    ballMesh.position.y = WATER_Y + 0.02;
                    ball.vel.y = -ball.vel.y * 0.50;
                    ball.vel.x *= 0.78; ball.vel.z *= 0.78;
                    ball.waterBounces++;
                    return;
                }
                // Echte plons → miss
                endShot(false);
                return;
            }
            // Out-of-bounds
            if (Math.abs(ballMesh.position.x) > 80 ||
                Math.abs(ballMesh.position.z) > 80 ||
                ballMesh.position.y < -5) {
                endShot(false);
                return;
            }
            // Hit-test op vijand — krappere hitbox dan voorheen, voor
            // meer precisie. Vlot is ~4.6 wide en ~2.6 deep, hitbox
            // is nu 2.0 x 1.4 x 1.5 (vroeger 2.5 x 1.6 x 2.4).
            const oppKey = current === 'A' ? 'B' : 'A';
            const opp = players[oppKey];
            const dx = ballMesh.position.x - opp.raft.position.x;
            const dy = ballMesh.position.y - (opp.raft.position.y + 1.0);
            const dz = ballMesh.position.z - opp.raft.position.z;
            if (Math.abs(dx) < 2.0 && Math.abs(dz) < 1.4 &&
                dy > -0.4 && dy < 1.5) {
                opp.hp = Math.max(0, opp.hp - 1);
                flash.classList.add('show');
                setTimeout(() => flash.classList.remove('show'), 350);
                renderHUD();
                endShot(true, oppKey, opp.hp <= 0);
            }
        }
        function endShot(wasHit, oppKey, knockout) {
            if (phase === 'result' || phase === 'gameover') return;
            ballMesh.visible = false;
            ball = null;
            lastShot = { hit: wasHit, knockout };
            // Camera glijdt soepel terug naar overview na de inslag
            setCameraTarget(CAM_WIDE, 0.6);
            if (knockout) {
                phase = 'gameover';
                phaseT = 0;
                const winner = (oppKey === 'A') ? playerB : playerA;
                setBanner(`🏴‍☠️ ${winner.name} WINT!`, winner.color.css);
                showToast('KNOCK-OUT!', 2200, '#ff5050');
                showKO(winner);
                return;
            }
            phase = 'result';
            phaseT = 0;
            const cur = players[current];
            if (wasHit) {
                showToast(`💥 RAAK! ${cur.name} mikt goed`, 1600, cur.color.css);
            } else {
                showToast('💦 plons — gemist', 1400, '#7fc6ff');
            }
            setTip('Tik om door te gaan');
        }
        function advanceToNext() {
            // Reset kannonnen
            for (const k of ['A', 'B']) {
                const b = players[k].raft.userData.barrel;
                if (b) b.rotation.z = -Math.PI / 2 + 0.20;
            }
            current = current === 'A' ? 'B' : 'A';
            wind = randomWind();
            renderHUD();
            phase = 'study';
            phaseT = 0;
            setCameraTarget(CAM_WIDE, 0.55);
            setBanner(`<small>BEURT</small><br>${players[current].name}`,
                players[current].color.css);
            setTip('Tik op het scherm om in te zoomen');
        }
        function showKO(winner) {
            // Volledig KO-scherm met "Verder" knop
            const ko = el('div', { className: 'rb3-ko',
                style: { '--pcol': winner.color.css } });
            const loser = winner === playerA ? playerB : playerA;
            ko.append(
                el('h2', {}, `🏴‍☠️ ${winner.name} wint!`),
                el('p', {}, `${loser.name} drinkt ${drinks} 🍻`),
                el('p', { style: { fontSize: '13px', opacity: '0.85' } },
                    `${winner.name} krijgt +1 gouden dobbelsteen 🎲💛`),
                el('button', { className: 'btn-pill', type: 'button',
                    on: { click: () => finish(winner) } }, 'Verder'),
            );
            back.append(ko);
            // Auto-advance na 6s
            setTimeout(() => finish(winner), 6000);
        }

        // ════════════════════════════════════════════════════════
        //  I. ANIMATIE-HOOK (per-frame)
        // ════════════════════════════════════════════════════════
        const PREV_HOOK = window.__deGameHook;
        let lastT = 0;
        window.__deGameHook = (time) => {
            const dt = lastT ? Math.min(0.05, time - lastT) : 0;
            lastT = time;
            phaseT += dt;
            // ── Camera ──────────────────────────────────────────
            // FIRE / FLYING: cinematische "ball-cam" die de kanonkogel
            //   door de lucht volgt. Tijdens 'fire' lerp soepel vanuit
            //   het zij-aanzicht naar de volg-positie; tijdens 'flying'
            //   pure realtime follow.
            // Andere fases: normale lerp van CAM_WIDE / CAM_AIM_X.
            if ((phase === 'fire' || phase === 'flying') && ball) {
                const ballPos = ballMesh.position;
                // Zij-aanzicht volg-positie: camera 4-6 units boven de
                // bal, 18 units aan de +Z kant. Look-doel iets vóór de
                // bal in de schiet-richting → gevoel van vaart.
                const sign = current === 'A' ? 1 : -1;
                const wantPos = new THREE.Vector3(
                    ballPos.x,
                    Math.max(7, ballPos.y + 5),
                    ballPos.z + 18
                );
                const wantTgt = new THREE.Vector3(
                    ballPos.x + sign * 3,
                    ballPos.y - 0.5,
                    ballPos.z
                );
                if (phase === 'fire') {
                    // 0.4s soepele transitie van zij-aanzicht naar ball-cam
                    const t = Math.min(1, phaseT / 0.4);
                    const e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2;
                    camera.position.lerpVectors(fireCamFrom.pos, wantPos, e);
                    controls.target.lerpVectors(fireCamFrom.tgt, wantTgt, e);
                } else {
                    // Pure follow tijdens vlucht
                    camera.position.copy(wantPos);
                    controls.target.copy(wantTgt);
                }
                camera.lookAt(controls.target);
                // Bewaar deze positie als startpunt voor de volgende
                // lerp (overview), zodat de overgang na de landing
                // soepel verloopt.
                camFrom.pos.copy(camera.position);
                camFrom.tgt.copy(controls.target);
                camLerpT = 1;   // markeer dat we de lerp nu controleren
            } else if (camLerpT < 1) {
                camLerpT = Math.min(1, camLerpT + dt / camLerpDur);
                const k = camLerpT;
                // Ease-in-out cubic
                const e = k < 0.5 ? 4*k*k*k : 1 - Math.pow(-2*k+2, 3) / 2;
                camera.position.lerpVectors(camFrom.pos, camTo.pos, e);
                controls.target.lerpVectors(camFrom.tgt, camTo.tgt, e);
                camera.lookAt(controls.target);
            } else {
                camera.position.copy(camTo.pos);
                controls.target.copy(camTo.tgt);
                camera.lookAt(controls.target);
            }
            // ── Raft-bob ────────────────────────────────────────
            raftA.position.y = Math.sin(time * 1.3 + 0.2) * 0.16 - 0.05;
            raftA.rotation.z = Math.sin(time * 1.5) * 0.04;
            raftA.rotation.x = Math.sin(time * 1.1 + 0.3) * 0.03;
            raftB.position.y = Math.sin(time * 1.3 + 1.4) * 0.16 - 0.05;
            raftB.rotation.z = Math.sin(time * 1.5 + 1.0) * 0.04;
            raftB.rotation.x = Math.sin(time * 1.1 + 1.6) * 0.03;
            // ── Fase-overgangen op timer-basis ──────────────────
            if (phase === 'intro' && phaseT >= 0.7) {
                phase = 'study';
                phaseT = 0;
                setBanner(`<small>BEURT</small><br>${players[current].name}`,
                    players[current].color.css);
                setTip('Tik op het scherm om in te zoomen');
            }
            else if (phase === 'aim_intro' && phaseT >= 0.6) {
                phase = 'aiming';
                phaseT = 0;
                setBanner('', '');
                setTip('Sleep om te mikken — laat los om te schieten');
            }
            else if (phase === 'fire' && phaseT >= 0.4) {
                phase = 'flying';
                phaseT = 0;
            }
            // ── Bal-fysica tijdens flying ───────────────────────
            if (phase === 'flying') checkBallPhysics(dt, time);
            // ── Vlam-flash easing ───────────────────────────────
            // (CSS doet 't via class toggle, niets te doen hier)
        };

        // Start de game door de eerste camera-glide te plannen
        setBanner(`<small>BEURT</small><br>${players[current].name}`,
            players[current].color.css);
        setTip('Tik op het scherm om in te zoomen');
        setCameraTarget(CAM_WIDE, 0.7);

        // ════════════════════════════════════════════════════════
        //  J. CLEANUP
        // ════════════════════════════════════════════════════════
        function disposeMesh(m) {
            if (!m) return;
            m.geometry && m.geometry.dispose && m.geometry.dispose();
            if (m.material) {
                const ms = Array.isArray(m.material) ? m.material : [m.material];
                for (const mat of ms) mat.dispose && mat.dispose();
            }
        }
        function disposeGroup(g) { g.traverse(o => disposeMesh(o)); }
        async function finish(winner) {
            if (finished) return;
            finished = true;
            window.__deGameHook = PREV_HOOK;
            // 3D opruimen
            scene.remove(raftA); disposeGroup(raftA);
            scene.remove(raftB); disposeGroup(raftB);
            scene.remove(ballMesh); disposeMesh(ballMesh);
            scene.remove(trail); disposeMesh(trail);
            scene.remove(preview); disposeMesh(preview);
            // Camera + controls herstellen
            camera.fov = savedCam.fov;
            camera.position.copy(savedCam.pos);
            camera.updateProjectionMatrix();
            controls.target.copy(savedCam.target);
            controls.autoRotate = savedCam.autoRotate;
            controls.enabled = savedCam.enabled;
            camera.lookAt(controls.target);
            // HUD weg
            back.remove();
            // Bord-game chrome weer terug
            restoreMinigameChrome(hiddenChrome);
            // Resultaat-modal
            if (winner) {
                const loser = winner === playerA ? playerB : playerA;
                await showModal({ emoji: '🏴‍☠️',
                    title: `${winner.name} wint Raft Battle!`,
                    body: [`${loser.name} drinkt ${drinks} 🍻`,
                        `${winner.name} krijgt 1 × gouden bonus-dobbelsteen 🎲💛`],
                    actions: [{ label: 'Klaar', value: true }] });
            }
            resolveOuter(winner || null);
        }
    });
}


/* ============================================================
   playBowling — Bowlspel (iframe)
   ============================================================
   Loads bowlspel.html as an iframe and lets every current player
   throw a single frame. The iframe's setup screen is bypassed via
   a 'bowl-init' postMessage. When all players have played, the
   iframe sends 'bowl-result' with the ranked scores. Highest score
   wins; losers drink.
   Returns: { winner: <player>, score: <number>, ranking: [...] }
   ============================================================ */
// LEGACY iframe-versie van Bowling. Niet meer aangeroepen — de nieuwe
// 3D in-scene variant hieronder neemt de plek over. Behouden als
// safety-net mocht de 3D versie issues geven.
function playBowlingLegacy({ players, drinks = 4 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        // Verberg al het bord-game UI rommel (home, top-bar, mini-map,
        // hud-card) + home-overlay. Het bowling-scoreboard binnen de
        // iframe toont alle spelers + huidige beurt al duidelijk — we
        // hoeven daar geen parent-header overheen te leggen.
        const hiddenChrome = hideMinigameChrome();
        const back = el('div', { className: 'bw-back' });

        // (Geen header meer — de bowling-scoreboard binnen de iframe
        // toont alle spelers + wie aan de beurt is al. Een floating
        // skip-pil rechtsboven is voldoende voor parent-controle.)

        const wrap = el('div', { className: 'bw-canvas-wrap' });
        const iframe = el('iframe', {
            allow: 'accelerometer; gyroscope; autoplay',
            scrolling: 'no' });
        wrap.append(iframe);

        back.append(wrap);

        let done = false;
        async function finish(winner, winnerScore) {
            if (done) return;
            done = true;
            window.removeEventListener('message', onMsg);
            back.remove();
            restoreMinigameChrome(hiddenChrome);
            if (winner) {
                const losers = players.filter(p => p !== winner);
                const loserNames = losers.map(p => p.name).join(', ');
                await showModal({ emoji: '🎳',
                    title: `${winner.name} wint Bowlspel!`,
                    body: [
                        winnerScore != null ? `Score: ${winnerScore} punten` : '',
                        `${loserNames} drink${losers.length === 1 ? 't' : 'en'} ${drinks} 🍻`,
                        `${winner.name} krijgt 1 × gouden bonus-dobbelsteen 🎲💛`,
                    ].filter(Boolean),
                    actions: [{ label: 'Klaar', value: true }] });
            }
            resolve(winner ? { winner, score: winnerScore || 0 } : null);
        }

        // Floating Skip pill. Tap → ask iframe for current leader, fallback null.
        // Long-press → manual winner popup with all players.
        const skip = makeMinigameSkip({
            onSkip: () => {
                try { iframe.contentWindow.postMessage({ type: 'bowl-skip' }, '*'); } catch(_){}
                // Hard timeout — if the iframe doesn't respond, just resolve null
                setTimeout(() => { if (!done) finish(null, 0); }, 600);
            },
            winners: players.map(p => ({
                label: p.name, color: p.color.css, onPick: () => finish(p, 0),
            })),
        });
        back.append(skip);

        function showKnockout(winner, score, ranking) {
            if (done) return;
            const ko = el('div', { className: 'bw-ko',
                style: { '--pcol': winner.color.css } });
            const lines = [
                el('h2', {}, `🏆 ${winner.name} wint!`),
                el('p', {}, `${score} punten`),
            ];
            // Show top 3 ranking inline
            if (ranking && ranking.length) {
                const top = ranking.slice(0, 3).map((r, i) =>
                    `${['🥇','🥈','🥉'][i]} ${r.name} (${r.score})`).join('   ');
                lines.push(el('p', { style: { fontSize: '13px', opacity: 0.75 } }, top));
            }
            lines.push(el('button', { className: 'btn-pill', type: 'button',
                on: { click: () => finish(winner, score) } }, 'Verder'));
            ko.append(...lines);
            wrap.append(ko);
            // Auto-advance after 6s if nobody taps
            setTimeout(() => finish(winner, score), 6000);
        }

        function sendInit() {
            try {
                iframe.contentWindow.postMessage({
                    type: 'bowl-init',
                    players: players.map(p => ({ name: p.name, color: p.color.css })),
                }, '*');
            } catch (e) { /* cross-origin — ignore */ }
        }

        function onMsg(ev) {
            if (ev.source !== iframe.contentWindow) return;
            const d = ev && ev.data;
            if (!d || typeof d !== 'object') return;
            if (d.type === 'bowl-hello') { sendInit(); return; }
            if (d.type === 'bowl-result') {
                // Find the matching player object
                let winner = players.find(p => p.name === d.winner);
                if (!winner) winner = players[0];
                setTimeout(() => showKnockout(winner, d.winnerScore || 0, d.ranking), 1500);
            }
        }
        window.addEventListener('message', onMsg);
        iframe.addEventListener('load', sendInit);

        ui.append(back);
        iframe.src = 'bowlspel.html';
    });
}


/* ════════════════════════════════════════════════════════════════════
   playBowling — 3D in-scene bowling op het tropische strand
   ════════════════════════════════════════════════════════════════════
   De camera vliegt naar het permanente bowling-strand aan de oostkant
   van de hoofdkaart. Een coconut-bal verschijnt vóór de 10 staande
   pinnen. Speler sleept om te mikken + power, laat los om te werpen.
   Bal rolt, pinnen vallen om (met chain-reactie). Score = #pinnen down.

     INTRO          camera glijdt naar bowling-shot
     READY          banner: "BEURT — [naam]" + tip "Sleep om te werpen"
     AIMING         speler sleept ergens op het scherm
     ROLLING        bal vliegt richting pinnen, collision-check
     RESULT         score-toast, pinnen reset, volgende speler
     GAMEOVER       eindstand + drink-opdracht
   ════════════════════════════════════════════════════════════════════ */
function playBowling({ players, drinks = 4 } = {}) {
    return new Promise(resolveOuter => {
        // ════════════════════════════════════════════════════════
        //  A. SETUP
        // ════════════════════════════════════════════════════════
        const uiRoot = document.getElementById('game-ui');
        const hiddenChrome = hideMinigameChrome();
        const savedCam = {
            pos: camera.position.clone(),
            fov: camera.fov,
            target: controls.target.clone(),
            autoRotate: controls.autoRotate,
            enabled: controls.enabled,
        };
        controls.autoRotate = false;
        controls.enabled = false;
        camera.fov = 60;
        camera.updateProjectionMatrix();
        // Toon de baan + gutters + pinnen — die zijn normaal verborgen
        // zodat het eiland leeg is voor andere minigames.
        if (bowlingApparatus) bowlingApparatus.visible = true;

        // ════════════════════════════════════════════════════════
        //  B. CONSTANTEN
        // ════════════════════════════════════════════════════════
        // Speler werpt vanaf OOST (hoge X) naar WEST (lage X), zodat
        // het vulkaan-eiland in de verte zichtbaar is achter de pinnen.
        const ALLEY_NEAR_X = BOWL.cx + BOWL.alleyL / 2;     // speler-kant (oost)
        const ALLEY_FAR_X  = BOWL.cx - BOWL.alleyL / 2;     // pin-kant (west)
        const BALL_START_X = ALLEY_NEAR_X - 1.5;
        const ALLEY_TOP_Y  = BOWL.alleyTopY;                // 1.25
        const GUTTER_TOP_Y = BOWL.gutterTopY;               // 1.10
        const SAND_TOP_Y   = BOWL.sandTopY;                 // 1.05
        const WATER_Y      = BOWL.waterY;                   // 0.05
        const BALL_R       = BOWL.ballRad;
        const PIN_R        = BOWL.pinRad;
        const KNOCK_R      = BALL_R + PIN_R + 0.05;
        const CHAIN_R      = PIN_R * 2.4;
        const GUTTER_W     = BOWL.gutterW;
        const ROLL_FRICT   = 0.992;
        const GUTTER_FRICT = 0.96;                          // meer wrijving in gutter
        const GRAVITY      = -16;                           // m/s² (cartoony)
        const MIN_POWER    = 6.0;
        const MAX_POWER    = 18.0;
        const DRAG_FOR_MAX = 220;

        // ════════════════════════════════════════════════════════
        //  C. CAMERA — vanaf oost kijken, VOLGT de bal tijdens roll
        // ════════════════════════════════════════════════════════
        //   Camera-tuning: dichter bij de bal zodat er geen "spring
        //   naar achteren" gevoel meer is. Camera staat nu vrijwel
        //   op de bal-positie (over-the-shoulder), lage hoek, kijkt
        //   ver vooruit naar pinnen.
        const CAM_OFFSET = {
            posOffX: 1.5,            // bijna op de bal (was 3.5)
            posY: 3.0,               // lager (was 3.4)
            posZ: 0,
            tgtOffX: -14,            // verder vooruit kijken (was -11)
            tgtY: 1.5,               // lager target (was 1.9)
            tgtZ: 0,
        };
        function camPosForBall(bx) {
            return new THREE.Vector3(bx + CAM_OFFSET.posOffX,
                CAM_OFFSET.posY, BOWL.cz + CAM_OFFSET.posZ);
        }
        function camTgtForBall(bx) {
            return new THREE.Vector3(bx + CAM_OFFSET.tgtOffX,
                CAM_OFFSET.tgtY, BOWL.cz + CAM_OFFSET.tgtZ);
        }
        // Initiële camera-target: achter ball-start positie
        const CAM_BOWL = {
            pos: camPosForBall(BALL_START_X),
            tgt: camTgtForBall(BALL_START_X),
        };
        // Tweede target: pin-cam (zoom voorbij waar de bal eindigt
        // om de impact mooi te tonen)
        const CAM_PIN = {
            pos: new THREE.Vector3(ALLEY_FAR_X + 4.5, 3.5, BOWL.cz + 0.4),
            tgt: new THREE.Vector3(ALLEY_FAR_X - 1, 1.5, BOWL.cz),
        };
        const camFrom = { pos: camera.position.clone(), tgt: controls.target.clone() };
        let camLerpT = 0;
        const camLerpDur = 0.9;

        // ════════════════════════════════════════════════════════
        //  D. COCONUT BAL
        // ════════════════════════════════════════════════════════
        function makeCoconutBall(playerColor) {
            const grp = new THREE.Group();
            const ballMat = new THREE.MeshToonMaterial({
                color: 0x6d4c2a, gradientMap: toon,
                emissive: 0x2a1a08, emissiveIntensity: 0.05,
            });
            const ball = new THREE.Mesh(
                new THREE.SphereGeometry(BALL_R, 18, 14), ballMat);
            ball.castShadow = true;
            grp.add(ball);
            // Speler-kleur ring rond de bal
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(BALL_R + 0.005, 0.04, 6, 24),
                new THREE.MeshToonMaterial({
                    color: playerColor.hex, gradientMap: toon,
                    emissive: playerColor.hex, emissiveIntensity: 0.5 }));
            ring.rotation.x = Math.PI / 2;
            grp.add(ring);
            grp.userData.ring = ring;
            return grp;
        }

        // ════════════════════════════════════════════════════════
        //  E. STATE
        // ════════════════════════════════════════════════════════
        let curIdx = 0;
        const scores = [];                  // [{ player, score }]
        let ball = null;
        let phase = 'intro';                // intro|ready|aiming|rolling|result|gameover|done
        let phaseT = 0;
        let alive = true;
        // Bal-fysica
        const ballVel = new THREE.Vector3();
        const fallenPinsThisRound = new Set();
        let rollStartTime = 0;
        let splashed = false;
        let waterStopT = 0;
        // ── Aim-arrow 3D mesh (live preview tijdens drag) ──
        let aimArrow = new THREE.Group();
        aimArrow.visible = false;
        scene.add(aimArrow);
        // ── Drag-state met path-tracking voor sweep/spin ──
        const drag = {
            active: false,
            sx: 0, sy: 0,             // start touch
            cx: 0, cy: 0,             // huidige touch
            samples: [],              // [{x, y, t}, ...] voor curvature
            startT: 0, lastT: 0,
            id: null,
        };
        // ── Ball physics (uitgebreid met spin/lateral accel) ──
        let ballPhysics = null;       // null = niet aan het rollen
        // ── Frame-state voor 2 worpen per speler ─────────────
        // Iedere speler krijgt 2 worpen ("een frame"). Bij een strike
        // (10 pinnen om in worp 1) vervalt worp 2. De score is het
        // aantal pinnen omgekiept aan het einde van het frame (0-10).
        let throwNum = 1;             // 1 of 2 binnen huidige frame
        let pinsDownAfterThrow1 = 0;  // tussen worp 1 en 2 onthouden

        // ════════════════════════════════════════════════════════
        //  F. HUD
        // ════════════════════════════════════════════════════════
        const tbBack = el('div', { className: 'rb3-back' });
        const tbHit  = el('div', { className: 'rb3-hit' });
        tbBack.append(tbHit);
        const topBar = el('div', { className: 'rb3-top' });
        const titleChip = el('div', { className: 'rb3-wind' }, '🎳 Bowling');
        const playerChip = el('div', { className: 'rb3-chip' });
        const playerDot = el('div', { className: 'dot' });
        const playerName = el('div', {}, '');
        playerChip.append(playerDot, playerName);
        const scoreChip = el('div', { className: 'rb3-chip',
            style: { '--pcol': '#ffd54a' } });
        scoreChip.append(el('div', {}, 'Score'),
            el('div', { style: { fontSize: '18px', marginLeft: '6px' } }, '0'));
        const scoreVal = scoreChip.children[1];
        const rowTop = el('div', {
            style: { display: 'flex', gap: '10px', alignItems: 'center' }
        }, [playerChip, titleChip, scoreChip]);
        topBar.append(rowTop);
        const banner = el('div', { className: 'rb3-banner',
            style: { display: 'none' } });
        const botBar = el('div', { className: 'rb3-bot' });
        const tip = el('div', { className: 'rb3-tip' }, '');
        botBar.append(tip);
        const toast = el('div', { className: 'rb3-toast',
            style: { display: 'none' } });
        // Power-meter aan onderkant
        const power = el('div', { className: 'rb3-pwr', style: { display: 'none' } });
        const powerBar = el('div', { className: 'bar' });
        const powerLbl = el('div', { className: 'lbl' }, 'POWER');
        power.append(powerBar, powerLbl);

        // Pin-indicator linksboven — diamond met 10 dots
        const pinGrid = el('div', { className: 'rb3-pingrid' });
        const pinLbl = el('div', { className: 'lbl' }, 'Pinnen');
        const pinCount = el('div', { className: 'count' }, '10');
        // Visueel diamond: 4 rijen, van back row (4 pins, top) naar
        // head pin (1, bottom). Standing/fallen-classes worden vanuit
        // updatePinIndicator() gezet aan de hand van pin-userdata.
        // Mapping: visual row → pin array indices
        //   Row 1 (top, back row):  pins 7,8,9,10 → indices 6,7,8,9
        //   Row 2:                  pins 4,5,6     → indices 3,4,5
        //   Row 3:                  pins 2,3       → indices 1,2
        //   Row 4 (bottom, head):   pin 1          → index 0
        const PIN_GRID_ORDER = [
            [6, 7, 8, 9],   // row 1
            [3, 4, 5],      // row 2
            [1, 2],         // row 3
            [0],            // row 4
        ];
        const pinDots = [];
        for (let r = 0; r < 4; r++) {
            const row = el('div', { className: 'row r' + (r+1) });
            for (let c = 0; c < PIN_GRID_ORDER[r].length; c++) {
                const dot = el('div', { className: 'dot standing' });
                row.append(dot);
                pinDots[PIN_GRID_ORDER[r][c]] = dot;
            }
            pinGrid.append(row);
        }
        // structuur top→bottom: lbl, count, rows (al toegevoegd)
        pinGrid.prepend(pinLbl, pinCount);

        // Result-text overlay voor STRIKE!, etc.
        const resultText = el('div', { className: 'rb3-result' });
        resultText.append(el('div', { className: 'txt' }));

        const skipBtn = makeMinigameSkip({
            onSkip: () => finish(null),
            winners: players.map(p => ({
                label: p.name, color: p.color.css,
                onPick: () => {
                    const sorted = players.map(pp => ({
                        player: pp, score: pp === p ? 10 : 0 }));
                    finish(sorted);
                },
            })),
        });
        skipBtn.classList.add('rb3-skip');
        const flash = el('div', { className: 'rb3-flash' });
        tbBack.append(topBar, banner, botBar, toast, power,
            pinGrid, resultText, skipBtn, flash);
        uiRoot.append(tbBack);

        function updatePinIndicator() {
            let standing = 0;
            for (let i = 0; i < bowlingPins.length; i++) {
                const pin = bowlingPins[i];
                const dot = pinDots[i];
                if (!dot) continue;
                if (pin.userData.fallen) {
                    dot.classList.remove('standing');
                    dot.classList.add('fallen');
                } else {
                    dot.classList.add('standing');
                    dot.classList.remove('fallen');
                    standing++;
                }
            }
            pinCount.textContent = String(standing);
        }
        function showResultText(text, klass = '') {
            const txt = resultText.querySelector('.txt');
            txt.textContent = text;
            resultText.className = 'rb3-result ' + klass;
            requestAnimationFrame(() => resultText.classList.add('show'));
            clearTimeout(resultText._t);
            resultText._t = setTimeout(() => {
                resultText.classList.remove('show');
            }, 1400);
        }
        function spawnConfetti(count) {
            const colors = ['#ff5252','#ffeb3b','#42a5f5','#66bb6a',
                            '#ab47bc','#ff9800','#26c6da','#ec407a'];
            for (let i = 0; i < count; i++) {
                const c = el('div', { className: 'rb3-confetti' });
                c.style.left = (Math.random() * 100) + '%';
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.animationDuration = (1.6 + Math.random() * 1.4) + 's';
                c.style.animationDelay = (Math.random() * 0.4) + 's';
                c.style.transform = `rotate(${Math.random()*360}deg)`;
                tbBack.append(c);
                setTimeout(() => c.remove(), 3500);
            }
        }

        function updatePlayerChip() {
            const p = players[curIdx];
            playerChip.style.setProperty('--pcol', p.color.css);
            playerDot.style.background = p.color.css;
            playerDot.style.boxShadow = '0 0 8px ' + p.color.css;
            playerName.textContent = p.name;
        }
        function setBanner(text, color) {
            if (!text) { banner.style.display = 'none'; return; }
            banner.style.display = 'block';
            banner.style.setProperty('--pcol', color || '#ffd54a');
            banner.innerHTML = text;
        }
        function setTip(t) { tip.textContent = t || ''; }
        function showToast(html, ms = 1600, color = '#ffd54a') {
            toast.innerHTML = html;
            toast.style.setProperty('--pcol', color);
            toast.style.display = 'block';
            clearTimeout(toast._t);
            toast._t = setTimeout(() => toast.style.display = 'none', ms);
        }

        // ════════════════════════════════════════════════════════
        //  G. PIN-RESET + FALL
        // ════════════════════════════════════════════════════════
        function resetPins() {
            for (const pin of bowlingPins) {
                pin.position.copy(pin.userData.basePos);
                pin.quaternion.copy(pin.userData.baseQuat);
                pin.userData.fallen = false;
                pin.userData.fallProgress = 0;
                pin.userData.fallAxis = null;
                pin.userData.fallTime = 0;
            }
            fallenPinsThisRound.clear();
        }
        function knockDownPin(pin, fromPos, time) {
            if (pin.userData.fallen) return;
            pin.userData.fallen = true;
            pin.userData.fallTime = time;
            // Richting weg van de impact (in xz-vlak)
            const dx = pin.position.x - fromPos.x;
            const dz = pin.position.z - fromPos.z;
            const len = Math.hypot(dx, dz) || 1;
            const fx = dx / len, fz = dz / len;
            // Rotatie-as loodrecht op valrichting (in xz-vlak)
            pin.userData.fallAxis = new THREE.Vector3(fz, 0, -fx).normalize();
            pin.userData.fallDir = { x: fx, z: fz };
            fallenPinsThisRound.add(pin);
            // Directional cascade — alleen pinnen in de val-richting
            // krijgen een hoge kans om mee te vallen. Pinnen erachter
            // hebben een lage kans. Dit voorkomt domino-everything.
            const depth = pin.userData.cascadeDepth || 0;
            setTimeout(() => {
                cascadePin(pin, fx, fz, depth + 1);
            }, depth === 0 ? 90 : 130);
        }
        function cascadePin(srcPin, prevDx, prevDz, depth) {
            if (depth > 2) return;          // max 2 cascade-levels (was 3)
            for (const other of bowlingPins) {
                if (other === srcPin || other.userData.fallen) continue;
                const dx = other.position.x - srcPin.position.x;
                const dz = other.position.z - srcPin.position.z;
                const d = Math.hypot(dx, dz);
                if (d >= CHAIN_R) continue;
                const nx = dx / d, nz = dz / d;
                const dot = nx * prevDx + nz * prevDz;
                // Lagere kansen dan voorheen — moeilijker om
                // strikes/kettingen te krijgen vanaf indirecte hits
                let chance;
                if (dot > 0.55) chance = 0.78;          // was 0.92
                else if (dot > 0.15) chance = 0.32;     // was 0.55
                else if (dot > -0.20) chance = 0.10;    // was 0.18
                else chance = 0.01;                     // was 0.03
                if (depth >= 2) chance *= 0.35;         // was 0.45
                if (Math.random() < chance) {
                    other.userData.cascadeDepth = depth;
                    knockDownPin(other, srcPin.position.clone(),
                        performance.now() / 1000);
                }
            }
        }

        // ════════════════════════════════════════════════════════
        //  H. RUN-LIFECYCLE
        // ════════════════════════════════════════════════════════
        function startRunFor(playerIdx) {
            curIdx = playerIdx;
            const p = players[curIdx];
            updatePlayerChip();
            scoreVal.textContent = '0';
            // Nieuwe speler = nieuw frame, worp 1 met alle pinnen recht
            throwNum = 1;
            pinsDownAfterThrow1 = 0;
            resetPins();
            // Bal opnieuw spawnen in spelerkleur
            if (ball) { scene.remove(ball); disposeGroup(ball); }
            ball = makeCoconutBall(p.color);
            ball.position.set(BALL_START_X, ALLEY_TOP_Y + BALL_R, BOWL.cz);
            scene.add(ball);
            splashed = false;
            waterStopT = 0;
            ballPhysics = null;
            // Reset alle cascade-depth markers
            for (const pin of bowlingPins) {
                pin.userData.cascadeDepth = 0;
                pin.userData.fallProgress = 0;
            }
            updatePinIndicator();
            // Camera naar bowling-shot
            camFrom.pos.copy(camera.position);
            camFrom.tgt.copy(controls.target);
            camLerpT = 0;
            phase = 'ready';
            phaseT = 0;
            alive = true;
            setBanner(`<small>WORP 1 / 2</small><br>${p.name}`, p.color.css);
            setTip('Veeg omhoog om te werpen — bocht voor spin');
        }
        function endRunWithScore() {
            const downCount = bowlingPins.filter(p => p.userData.fallen).length;
            scoreVal.textContent = String(downCount);
            const p = players[curIdx];
            const isGutter = ballPhysics && ballPhysics.inGutter;

            if (throwNum === 1) {
                pinsDownAfterThrow1 = downCount;
                if (downCount === 10) {
                    // STRIKE in worp 1 — frame klaar, geen tweede worp
                    scores.push({ player: p, score: 10 });
                    showResultText('STRIKE!', 'strike');
                    spawnConfetti(140);
                    showToast(`<b>STRIKE!</b><br>10 pinnen 🎯`,
                        1900, p.color.css);
                    phase = 'result';
                    phaseT = 0;
                    setTimeout(() => advanceToNextPlayer(), 2600);
                } else {
                    // Geen strike — speler krijgt worp 2 met restpinnen
                    if (downCount >= 7) {
                        showResultText('GAAF!', '');
                        spawnConfetti(30);
                    } else if (downCount >= 4) {
                        showResultText(downCount + ' DOWN', '');
                    } else if (isGutter) {
                        showResultText('GUTTER!', 'gutter');
                    } else if (downCount === 0) {
                        showResultText('MIS!', 'gutter');
                    } else {
                        showResultText(downCount + ' DOWN', '');
                    }
                    showToast(`Worp 1: ${downCount} pinnen<br>`
                        + `Nog ${10 - downCount} te gaan…`,
                        1800, p.color.css);
                    phase = 'result';
                    phaseT = 0;
                    setTimeout(() => startSecondThrow(), 2300);
                }
            } else {
                // Worp 2 klaar — frame totaal = downCount, naar volgende
                const totalThisFrame = downCount;
                const thisThrowPins = totalThisFrame - pinsDownAfterThrow1;
                scores.push({ player: p, score: totalThisFrame });

                if (totalThisFrame === 10) {
                    // SPARE — alle 10 in 2 worpen
                    showResultText('SPARE!', 'strike');
                    spawnConfetti(60);
                    showToast(`<b>SPARE!</b><br>10 pinnen totaal`,
                        1900, p.color.css);
                } else if (thisThrowPins === 0) {
                    if (isGutter) {
                        showResultText('GUTTER!', 'gutter');
                    } else {
                        showResultText('MIS!', 'gutter');
                    }
                    showToast(`Worp 2: 0 pinnen<br>`
                        + `Totaal: ${totalThisFrame}`,
                        1800, p.color.css);
                } else {
                    showResultText('+' + thisThrowPins, '');
                    showToast(`Worp 2: ${thisThrowPins} pinnen<br>`
                        + `Totaal: ${totalThisFrame}`,
                        1800, p.color.css);
                }
                phase = 'result';
                phaseT = 0;
                setTimeout(() => advanceToNextPlayer(), 2600);
            }
        }
        function startSecondThrow() {
            throwNum = 2;
            const p = players[curIdx];
            // GEEN pinnen reset — gevallen pinnen blijven liggen.
            // Wel: nieuwe bal spawnen in spelerkleur.
            if (ball) { scene.remove(ball); disposeGroup(ball); }
            ball = makeCoconutBall(p.color);
            ball.position.set(BALL_START_X, ALLEY_TOP_Y + BALL_R, BOWL.cz);
            scene.add(ball);
            splashed = false;
            waterStopT = 0;
            ballPhysics = null;
            // Cascade-trackers wel resetten zodat een nieuwe hit
            // schoon begint, maar fallen state blijft
            for (const pin of bowlingPins) {
                pin.userData.cascadeDepth = 0;
            }
            // Camera terug naar start-positie
            camFrom.pos.copy(camera.position);
            camFrom.tgt.copy(controls.target);
            camLerpT = 0;
            phase = 'ready';
            phaseT = 0;
            setBanner(`<small>WORP 2 / 2</small><br>${p.name}`, p.color.css);
            const standing = bowlingPins.filter(pp => !pp.userData.fallen).length;
            setTip(`Mik op de ${standing} overgebleven pin${standing === 1 ? '' : 'nen'}!`);
        }
        function advanceToNextPlayer() {
            if (curIdx < players.length - 1) {
                startRunFor(curIdx + 1);
            } else {
                showFinal();
            }
        }
        function showFinal() {
            phase = 'gameover';
            const sorted = [...scores].sort((a, b) => b.score - a.score);
            const topS = sorted[0].score;
            const winners = sorted.filter(s => s.score === topS);
            const losers = sorted.filter(s => s.score < topS);
            const winnerName = winners.map(w => w.player.name).join(' & ');
            setBanner(`🏆 ${winnerName} wint!`, sorted[0].player.color.css);
            const ko = el('div', { className: 'rb3-ko',
                style: { '--pcol': sorted[0].player.color.css } });
            ko.append(el('h2', {}, '🎳 Eindstand'));
            const list = el('div', {
                style: { display: 'flex', flexDirection: 'column', gap: '8px',
                    margin: '12px 0', width: '100%', maxWidth: '320px' } });
            sorted.forEach((s, i) => {
                const row = el('div', {
                    style: { display: 'flex', alignItems: 'center', gap: '10px',
                        padding: '8px 12px', borderRadius: '12px',
                        background: 'rgba(255,255,255,0.10)',
                        border: '2px solid ' + s.player.color.css,
                        opacity: s.score === topS ? '1' : '0.7' } });
                row.append(
                    el('div', { style: { width: '12px', height: '12px',
                        borderRadius: '50%', background: s.player.color.css } }),
                    el('div', { style: { flex: '1', fontWeight: '800' } },
                        `${i+1}. ${s.player.name}`),
                    el('div', { style: { fontSize: '20px', fontWeight: '900',
                        color: s.player.color.css } }, String(s.score)),
                );
                list.append(row);
            });
            ko.append(list);
            const drinkMsg = losers.length === 0 ? 'Iedereen gelijk — proost!' :
                `${losers.map(l => l.player.name).join(', ')} drinkt elk ${drinks} 🍻`;
            ko.append(el('p', {}, drinkMsg));
            ko.append(el('button', { className: 'btn-pill', type: 'button',
                on: { click: () => finish(sorted) } }, 'Verder'));
            tbBack.append(ko);
            setTimeout(() => finish(sorted), 9000);
        }

        // ════════════════════════════════════════════════════════
        //  I. INPUT — sweep met path-tracking (zoals oude bowling)
        // ════════════════════════════════════════════════════════
        // Een drag genereert een PATH van samples. Daaruit halen we:
        //  - power (uit swipe-speed in de laatste 200ms)
        //  - aimAngle (uit horizontale verplaatsing)
        //  - spin (uit verschil in horizontale beweging eerste vs
        //          tweede helft van het pad = curvature)
        // Tijdens het slepen tonen we live in 3D een gekromde tube
        // (aim-arrow) waar de bal naartoe zal gaan.
        function buildAimArrow(power, aimAngle, spin, active) {
            // Clean up oude meshes
            while (aimArrow.children.length) {
                const c = aimArrow.children[0];
                aimArrow.remove(c);
                if (c.geometry) c.geometry.dispose();
                if (c.material) c.material.dispose();
            }
            if (!ball) return;
            const startX = ball.position.x;
            const startZ = ball.position.z;
            const len = 4 + power * 12;
            // Bouw curve-punten — bal beweegt in -X richting, met
            // aim-offset op Z en quadratic spin-curve op Z.
            const points = [];
            const segments = 28;
            for (let i = 0; i <= segments; i++) {
                const t = i / segments;
                const x = startX - t * len;
                // aim: lineair offset; spin: kwadratische curve
                const z = startZ
                    - Math.sin(aimAngle) * t * len
                    - spin * 0.55 * t * t * len;
                points.push(new THREE.Vector3(x, ALLEY_TOP_Y + 0.02, z));
            }
            // Kleur shift met power: groen → geel → rood
            const r = active ? Math.min(255, 80 + power * 255) : 255;
            const g = active ? Math.min(255, 220 - power * 100) : 200;
            const b = active ? 30 : 80;
            const color = (r << 16) | (g << 8) | b;
            const opacity = active ? 0.85 : 0.30;
            const curve = new THREE.CatmullRomCurve3(points);
            // Buitenste glow
            const glow = new THREE.Mesh(
                new THREE.TubeGeometry(curve, segments, 0.055, 8, false),
                new THREE.MeshBasicMaterial({
                    color, transparent: true, opacity: opacity * 0.4,
                    depthTest: false, depthWrite: false }));
            glow.renderOrder = 4;
            aimArrow.add(glow);
            // Binnenste tube
            const tube = new THREE.Mesh(
                new THREE.TubeGeometry(curve, segments, 0.028, 6, false),
                new THREE.MeshBasicMaterial({
                    color, transparent: true, opacity,
                    depthTest: false, depthWrite: false }));
            tube.renderOrder = 5;
            aimArrow.add(tube);
            // Cone aan tip
            const tipPos = points[points.length - 1];
            const tipPrev = points[points.length - 4];
            const tipDir = new THREE.Vector3().subVectors(tipPos, tipPrev).normalize();
            const cone = new THREE.Mesh(
                new THREE.ConeGeometry(0.11, 0.26, 10),
                new THREE.MeshBasicMaterial({
                    color: active ? 0xff5722 : 0xffaa00,
                    transparent: true, opacity,
                    depthTest: false, depthWrite: false }));
            cone.position.copy(tipPos);
            cone.position.y = ALLEY_TOP_Y + 0.10;
            cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), tipDir);
            cone.renderOrder = 6;
            aimArrow.add(cone);
        }
        function computeDragParams() {
            const dy = drag.sy - drag.cy;            // omhoog positief
            const dx = drag.cx - drag.sx;            // rechts positief
            // Power: vertical drag distance (live), 0-1
            const power = Math.min(1, Math.max(0, dy / (window.innerHeight * 0.30)));
            // AimAngle: horizontal drag (small, ~ -0.14..0.14 rad)
            const aimAngle = Math.max(-0.14, Math.min(0.14,
                (dx / window.innerWidth) * 0.40));
            // Spin: path curvature — verschil tussen eerste en tweede
            // helft van horizontale beweging in samples
            let spin = 0;
            if (drag.samples.length >= 4) {
                const mid = Math.floor(drag.samples.length / 2);
                const h1 = drag.samples[mid].x - drag.samples[0].x;
                const h2 = drag.samples[drag.samples.length - 1].x
                    - drag.samples[mid].x;
                const diff = h2 - h1;
                spin = Math.max(-0.35, Math.min(0.35,
                    diff / (window.innerWidth * 0.35)));
            }
            return { power, aimAngle, spin, dy, dx };
        }
        function computeReleaseParams() {
            // Bereken throw-params met swipe-speed (last ~200ms)
            const params = computeDragParams();
            let swipeSpeed = 0;
            if (drag.samples.length >= 2) {
                const cutoff = drag.lastT - 200;
                let s0 = drag.samples[0];
                for (const s of drag.samples) {
                    if (s.t >= cutoff) { s0 = s; break; }
                }
                const sdy = s0.y - drag.cy;
                const sdt = Math.max(0.05, (drag.lastT - s0.t) / 1000);
                swipeSpeed = sdy / sdt;
            }
            // Power op release = combinatie van afgelegde afstand
            // en swipe-snelheid (zoals oude bowling)
            const releasePower = Math.min(1,
                Math.max(0.40, swipeSpeed / 1800));
            return { ...params, power: releasePower, swipeSpeed };
        }
        function updatePowerMeter(power) {
            powerBar.style.transform = `scaleX(${power.toFixed(3)})`;
            powerLbl.textContent = power < 0.35 ? 'ZACHT' :
                                    power < 0.70 ? 'GEMIDDELD' : 'MAX POWER';
        }
        function onDragStart(cx, cy, id) {
            if (phase !== 'ready' && phase !== 'aiming') return;
            drag.active = true; drag.id = id;
            drag.sx = drag.cx = cx;
            drag.sy = drag.cy = cy;
            drag.startT = drag.lastT = performance.now();
            drag.samples = [{ x: cx, y: cy, t: drag.startT }];
            phase = 'aiming';
            setBanner('', '');
            setTip('Veeg omhoog om te werpen — bocht voor spin');
            power.style.display = 'flex';
            aimArrow.visible = true;
            buildAimArrow(0.30, 0, 0, true);
            updatePowerMeter(0);
        }
        function onDragMove(cx, cy) {
            if (!drag.active) return;
            drag.cx = cx; drag.cy = cy;
            drag.lastT = performance.now();
            drag.samples.push({ x: cx, y: cy, t: drag.lastT });
            if (drag.samples.length > 20) drag.samples.shift();
            const params = computeDragParams();
            updatePowerMeter(Math.max(0.20, params.power));
            buildAimArrow(Math.max(0.20, params.power),
                params.aimAngle, params.spin, true);
        }
        function onDragEnd() {
            if (!drag.active) return;
            drag.active = false;
            power.style.display = 'none';
            aimArrow.visible = false;
            if (phase !== 'aiming') return;
            const rel = computeReleaseParams();
            // Vereist een echte upward swipe — anders annuleer
            if (rel.dy < 35 || rel.swipeSpeed < 180) {
                phase = 'ready';
                const p = players[curIdx];
                setBanner(`<small>BEURT</small><br>${p.name}`, p.color.css);
                setTip('Veeg omhoog om te werpen — bocht voor spin');
                return;
            }
            startBallPhysics(rel.power, rel.aimAngle, rel.spin);
        }
        function startBallPhysics(power01, aimAngle, spin) {
            const minSpeed = 8.5;
            const maxSpeed = 15;
            const speed = minSpeed + power01 * (maxSpeed - minSpeed);
            // Bal vliegt langs -X (richting pinnen). aimAngle bepaalt
            // hoek in xz-vlak. spin geeft laterale acceleratie in Z.
            ballPhysics = {
