            // Spin-fysica (na release, voor stop)
            if (spinning && !winnerSettling) {
                angle += angVel * dt;
                const friFac = Math.pow(FRICTION_PER_FRAME, dt * 60);
                angVel *= friFac;
                if (Math.abs(angVel) < STOP_THRESHOLD) {
                    spinning = false;
                    const winIdx = computeWinnerIdx(angle);
                    snapStartAngle  = angle;
                    snapTargetAngle = nearestSegmentCenterAngle(angle, winIdx);
                    snapT = 0;
                    winnerSettling = true;
                }
                if (mysteryWheelSpin) mysteryWheelSpin.rotation.x = angle;
            }

            // Snap-to-center
            if (winnerSettling) {
                snapT = Math.min(1, snapT + dt / SNAP_DUR);
                const k = smoothstep(snapT);
                const a = snapStartAngle + (snapTargetAngle - snapStartAngle) * k;
                if (mysteryWheelSpin) mysteryWheelSpin.rotation.x = a;
                if (snapT >= 1) {
                    winnerSettling = false;
                    angle = snapTargetAngle;
                    announceWinner();
                }
            }
        };

        // ════════════════════════════════════════════════════════
        //  H. WINNER-ANNOUNCE — eindbanner met emoji + Start-knop
        // ════════════════════════════════════════════════════════
        function announceWinner() {
            const winIdx = computeWinnerIdx(angle);
            const opt = options[winIdx];
            result.style.setProperty('--glo', opt.color);
            clear(result);
            result.append(
                el('div', { className: 'ann' }, 'En het wordt…'),
                el('div', { className: 'emo-big' }, opt.emoji),
                el('div', { className: 'pick' }, opt.label),
                el('button', {
                    className: 'btn-pill gold',
                    type: 'button',
                    style: { marginTop: '10px' },
                    on: { click: () => finish(opt.id) },
                }, '▶️ Start!'),
            );
            result.classList.add('show');
        }

        // ════════════════════════════════════════════════════════
        //  I. FINISH — cleanup
        // ════════════════════════════════════════════════════════
        function finish(id) {
            alive = false;
            // Herstel vorige hook (was opgeslagen voor de wheel begon)
            window.__deGameHook = PREV_HOOK;

            stage.removeEventListener('pointerdown', onPointerDown);
            stage.removeEventListener('pointermove', onPointerMove);
            stage.removeEventListener('pointerup',   onPointerUp);
            stage.removeEventListener('pointercancel', onPointerUp);

            if (mysteryStall) mysteryStall.visible = false;

            // Camera + controls herstellen
            camera.fov = savedCam.fov;
            camera.position.copy(savedCam.pos);
            camera.updateProjectionMatrix();
            controls.target.copy(savedCam.target);
            controls.autoRotate = savedCam.autoRotate;
            controls.enabled = savedCam.enabled;
            controls.enableDamping = savedCam.enableDamping;
            camera.lookAt(controls.target);
            // Sync OrbitControls internal state na manual camera move
            controls.update();

            restoreMinigameChrome(hiddenChrome);

            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(id); }, 300);
        }
    });
}

/* ============================================================
   Minigame 1 — Vulkaan Roulette
   ============================================================
   Solo gambling minigame. Flow:
     1. Player rolls a virtual 1-6 die (the "bet").
     2. Player picks Red, Black or Gold.
     3. Wheel spins and lands on a colour.
     4. Win:  +diceValue tiles forward (Gold pays ×3) + drink 1 (lucky tax).
        Loss: −diceValue tiles back + drink slokken(diceValue).
   Returns: { won: bool, color: 'red'|'black'|'gold', pick: ..., bet: 1-6,
              steps: number (signed, ±), drinks: number }
   ============================================================ */
function playVulcanoRoulette({ player, drinks = null } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'vr-back' });
        if (player?.color?.css) back.style.setProperty('--pcol', player.color.css);

        // Header
        const header = el('div', { className: 'vr-header' });
        const title = el('div', { className: 'vr-title' }, '🎰 Vulkaan Roulette');
        const sub = el('div', { className: 'vr-sub' }, 'Gooi de inzet, kies je kleur, laat de Vulkaangod beslissen!');
        const who = el('div', { className: 'vr-who' });
        who.append(
            el('span', { className: 'dot' }),
            el('span', { className: 'nm' }, player?.name || 'Speler'),
        );
        header.append(title, sub, who);

        const stage = el('div', { className: 'vr-stage' });
        const foot = el('div', { className: 'vr-foot' });
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        skipBtn.addEventListener('click', () => finish(null));
        foot.append(skipBtn);
        back.append(header, stage, foot);
        ui.append(back);

        // ── Phase 1: roll the bet die ──
        const betbox = el('div', { className: 'vr-betbox' });
        const betLbl = el('div', { className: 'lbl' }, 'Tik om de inzet te gooien');
        const die = el('div', { className: 'vr-die' }, '?');
        const rollBtn = el('button', { className: 'btn-pill gold', type: 'button' }, '🎲 Gooi de inzet');
        betbox.append(betLbl, die, rollBtn);
        stage.append(betbox);

        let bet = 0;
        let rolling = false;
        rollBtn.addEventListener('click', () => {
            if (rolling || bet) return;
            rolling = true;
            rollBtn.disabled = true;
            die.classList.add('rolling');
            let ticks = 0;
            const fakeRoll = setInterval(() => {
                die.textContent = String(1 + Math.floor(Math.random() * 6));
                ticks++;
                if (ticks > 18) {
                    clearInterval(fakeRoll);
                    bet = 1 + Math.floor(Math.random() * 6);
                    die.classList.remove('rolling');
                    die.textContent = String(bet);
                    setTimeout(() => phasePick(), 600);
                }
            }, 70);
        });

        function phasePick() {
            // Phase 2 — pick a colour. Keep the die visible (it's the bet).
            clear(stage);
            const pickbox = el('div', { className: 'vr-betbox' });
            pickbox.append(
                el('div', { className: 'lbl' }, `Inzet: ${bet} • Kies je kleur`),
                die,
            );
            const picks = el('div', { className: 'vr-picks' });
            const mkPick = (cls, emoji, lbl, odd) => {
                const b = el('button', { className: `vr-pick ${cls}`, type: 'button' });
                b.append(
                    el('div', { className: 'e' }, emoji),
                    el('div', { className: 't' }, lbl),
                    el('div', { className: 'o' }, odd),
                );
                b.addEventListener('click', () => phaseSpin(cls));
                return b;
            };
            picks.append(
                mkPick('red',   '🔴', 'Rood',  '×1'),
                mkPick('black', '⚫', 'Zwart', '×1'),
                mkPick('gold',  '🟡', 'Goud',  '×3'),
            );
            pickbox.append(picks);
            stage.append(pickbox);
        }

        function phaseSpin(pickColor) {
            // Phase 3 — build the wheel and spin.
            // 16-segment wheel: 7 red, 7 black, 2 gold (≈ 12.5% gold chance, 43.75% red, 43.75% black)
            clear(stage);
            const wrap = el('div', { className: 'vr-wheel-wrap' });
            const pointer = el('div', { className: 'vr-wpointer' });
            const wheel = el('div', { className: 'vr-wheel' });
            const hub = el('div', { className: 'vr-hub' }, '🌋');

            // Pattern: r b r b r b r g r b r b r b r g (16 segments)
            const segs = [];
            const pattern = ['red','black','red','black','red','black','red','gold',
                             'red','black','red','black','red','black','red','gold'];
            const colorMap = { red: '#c81030', black: '#1a1a1a', gold: '#ffaa1a' };
            const N = pattern.length;
            const segAngle = 360 / N;
            const stops = pattern.map((c, i) =>
                `${colorMap[c]} ${i * segAngle}deg ${(i + 1) * segAngle}deg`).join(', ');
            wheel.style.background = `conic-gradient(${stops})`;

            for (let i = 0; i < N; i++) {
                const s = el('div', { className: 'vr-wseg' });
                s.style.transform = `rotate(${i * segAngle + segAngle / 2}deg)`;
                const lab = pattern[i] === 'gold' ? '★' : (pattern[i] === 'red' ? '◆' : '◇');
                s.append(el('div', { className: 'lab' }, lab));
                wheel.append(s);
                segs.push(pattern[i]);
            }
            wrap.append(pointer, wheel, hub);
            stage.append(wrap);

            // Pick a random segment.
            const winIdx = Math.floor(Math.random() * N);
            const winColor = segs[winIdx];
            const winCentre = winIdx * segAngle + segAngle / 2;
            const jitter = (Math.random() - 0.5) * (segAngle * 0.55);
            const finalRot = 6 * 360 - winCentre + jitter;
            // Apply rotation on next frame so the transition fires.
            requestAnimationFrame(() => {
                wheel.style.transform = `rotate(${finalRot}deg)`;
            });

            wheel.addEventListener('transitionend', function done() {
                wheel.removeEventListener('transitionend', done);
                phaseResult(pickColor, winColor);
            }, { once: true });
        }

        function phaseResult(pickColor, winColor) {
            const res = el('div', { className: 'vr-result show' });
            let won = false;
            let steps = 0;
            let drinkN = 0;
            let bigTxt = '';
            let subTxt = '';
            let glo = '#ff7a1f';

            if (pickColor === winColor) {
                won = true;
                if (winColor === 'gold') {
                    steps = bet * 3;
                    drinkN = drinks ?? slokken(1);
                    bigTxt = `🌟 GOUD! +${steps}`;
                    subTxt = `${player.name} schiet ${steps} tegels vooruit! Iedereen anders drinkt ${slokken(2)} 🍻`;
                    glo = '#ffd54a';
                } else {
                    steps = bet;
                    drinkN = drinks ?? slokken(1);
                    bigTxt = `🎉 WINST! +${steps}`;
                    subTxt = `${player.name} mag ${steps} tegels vooruit. Lucky tax: drink ${drinkN} 🍻`;
                    glo = winColor === 'red' ? '#ff3a3a' : '#ffd54a';
                }
            } else {
                won = false;
                steps = -bet;
                drinkN = drinks ?? slokken(bet);
                bigTxt = `💥 VERLIES! ${steps}`;
                subTxt = `${player.name} valt ${bet} tegels terug en drinkt ${drinkN} 🍻`;
                glo = '#ff3a3a';
            }

            res.style.setProperty('--glo', glo);
            res.append(
                el('div', { className: 'big' }, bigTxt),
                el('div', { className: 'sub' }, subTxt),
                el('div', { className: 'sub', style: { fontSize: '13px', opacity: '0.7' } },
                    `(Inzet ${bet} • Gekozen ${pickColor === 'red' ? 'Rood' : pickColor === 'black' ? 'Zwart' : 'Goud'} • Bal ${winColor === 'red' ? 'Rood' : winColor === 'black' ? 'Zwart' : 'Goud'})`),
                el('button', { className: 'btn-pill gold', type: 'button',
                    style: { marginTop: '12px' },
                    on: { click: () => finish({ won, color: winColor, pick: pickColor, bet, steps, drinks: drinkN }) } },
                    'Verder'),
            );
            back.append(res);
        }

        function finish(payload) {
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(payload); }, 300);
        }
    });
}

/* ============================================================
   Minigame 2 — Blackjack van de Goden
   ============================================================
   Player (current) vs. the Vulkaan God (computer dealer).
   Standard 21-rules: Aces count as 1 or 11 (auto-best),
   face cards = 10, dealer hits until 17 (stands on soft 17).
   Returns: { won: bool, tie: bool, playerVal, dealerVal, drinks }
   ============================================================ */
function playGodBlackjack({ player, drinks = null } = {}) {
    return new Promise(resolve => {
        // ── Card deck ──
        const SUITS = [
            { s: '♠', red: false }, { s: '♣', red: false },
            { s: '♥', red: true  }, { s: '♦', red: true  },
        ];
        const RANKS = [
            { r: 'A', v: 11 }, { r: '2', v: 2 }, { r: '3', v: 3 }, { r: '4', v: 4 },
            { r: '5', v: 5 }, { r: '6', v: 6 }, { r: '7', v: 7 }, { r: '8', v: 8 },
            { r: '9', v: 9 }, { r: '10', v: 10 }, { r: 'J', v: 10 },
            { r: 'Q', v: 10 }, { r: 'K', v: 10 },
        ];

        function buildDeck() {
            const d = [];
            for (const s of SUITS) for (const r of RANKS) d.push({ ...s, ...r });
            // Fisher-Yates shuffle
            for (let i = d.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [d[i], d[j]] = [d[j], d[i]];
            }
            return d;
        }

        function handValue(hand) {
            // Sum, then demote aces from 11→1 while bust.
            let total = hand.reduce((s, c) => s + c.v, 0);
            let aces = hand.filter(c => c.r === 'A').length;
            while (total > 21 && aces > 0) { total -= 10; aces--; }
            return total;
        }
        function isBlackjack(hand) {
            return hand.length === 2 && handValue(hand) === 21;
        }

        const deck = buildDeck();
        const draw = () => deck.pop();
        const playerHand = [draw(), draw()];
        const dealerHand = [draw(), draw()];
        let playerStood = false;
        let dealerRevealed = false;
        let gameOver = false;

        // ── UI ──
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'bj-back' });
        if (player?.color?.css) back.style.setProperty('--pcol', player.color.css);

        const header = el('div', { className: 'bj-header' });
        header.append(
            el('div', { className: 'bj-title' }, '🃏 Blackjack van de Goden'),
            el('div', { className: 'bj-sub' }, 'Zo dicht mogelijk bij 21, niet eroverheen'),
        );

        const stage = el('div', { className: 'bj-stage' });

        // Dealer (god) side — top
        const godSide = el('div', { className: 'bj-side god' });
        const godName = el('div', { className: 'bj-name god' }, '🌋 Vulkaan God');
        const godHand = el('div', { className: 'bj-hand' });
        const godVal = el('div', { className: 'bj-val' }, '—');
        godSide.append(godName, godHand, godVal);

        // Player side — bottom
        const youSide = el('div', { className: 'bj-side you' });
        const youName = el('div', { className: 'bj-name you' }, player?.name || 'Speler');
        const youHand = el('div', { className: 'bj-hand' });
        const youVal = el('div', { className: 'bj-val' }, '—');
        youSide.append(youName, youHand, youVal);

        stage.append(godSide, youSide);

        // Vulkaan-god's hand — verschijnt boven het bord, "gooit"
        // de kaarten uit elke keer als er een nieuwe wordt gedeald.
        const godHand2 = el('div', { className: 'bj-godhand' }, '🤚');
        stage.append(godHand2);
        function flickGodHand() {
            godHand2.classList.remove('deal');
            void godHand2.offsetWidth;     // force reflow
            godHand2.classList.add('deal');
        }

        // Foot — hit/stand
        const foot = el('div', { className: 'bj-foot' });
        const hitBtn = el('button', { className: 'btn-pill gold', type: 'button' }, '🎴 Hit');
        const standBtn = el('button', { className: 'btn-pill red', type: 'button' }, '✋ Stand');
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        foot.append(hitBtn, standBtn, skipBtn);
        back.append(header, stage, foot);
        ui.append(back);

        // ── Render ──
        function renderCard(c, hidden = false) {
            const div = el('div', { className: 'bj-card' + (hidden ? ' back' : (c.red ? ' red' : '')) });
            if (!hidden) {
                div.append(
                    el('div', { className: 'tl' }, [
                        document.createTextNode(c.r),
                        el('span', { className: 's' }, c.s),
                    ]),
                    el('div', { className: 'ctr' }, c.s),
                );
            }
            return div;
        }
        function render() {
            // Dealer
            clear(godHand);
            dealerHand.forEach((c, i) => {
                const hidden = !dealerRevealed && i === 1;
                godHand.append(renderCard(c, hidden));
            });
            const dv = dealerRevealed ? handValue(dealerHand) : dealerHand[0].v;
            godVal.textContent = dealerRevealed ? String(dv) : `${dv} + ?`;
            godVal.className = 'bj-val';
            if (dealerRevealed && dv > 21) godVal.classList.add('bust');
            if (dealerRevealed && isBlackjack(dealerHand)) godVal.classList.add('bj');

            // Player
            clear(youHand);
            playerHand.forEach(c => youHand.append(renderCard(c)));
            const pv = handValue(playerHand);
            youVal.textContent = String(pv);
            youVal.className = 'bj-val';
            if (pv > 21) youVal.classList.add('bust');
            if (isBlackjack(playerHand)) youVal.classList.add('bj');
        }
        render();
        flickGodHand();    // initiële uitdeel-animatie

        // ── Game flow ──
        function checkBust() {
            if (handValue(playerHand) > 21) {
                playerStood = true;
                hitBtn.disabled = true; standBtn.disabled = true;
                setTimeout(() => endGame(), 600);
                return true;
            }
            return false;
        }

        hitBtn.addEventListener('click', () => {
            if (gameOver || playerStood) return;
            playerHand.push(draw());
            flickGodHand();
            render();
            if (handValue(playerHand) >= 21) {
                if (!checkBust()) {
                    playerStood = true;
                    hitBtn.disabled = true; standBtn.disabled = true;
                    setTimeout(() => endGame(), 500);
                }
            }
        });
        standBtn.addEventListener('click', () => {
            if (gameOver || playerStood) return;
            playerStood = true;
            hitBtn.disabled = true; standBtn.disabled = true;
            endGame();
        });
        skipBtn.addEventListener('click', () => finish(null));

        // Edge case: opening blackjack
        if (isBlackjack(playerHand)) {
            playerStood = true;
            hitBtn.disabled = true; standBtn.disabled = true;
            setTimeout(() => endGame(), 700);
        }

        function endGame() {
            if (gameOver) return;
            // Reveal dealer's hole card with a beat
            dealerRevealed = true;
            render();
            // Dealer hits until ≥ 17 (stand on soft 17)
            function dealerStep() {
                const dv = handValue(dealerHand);
                if (dv < 17 && handValue(playerHand) <= 21) {
                    setTimeout(() => {
                        dealerHand.push(draw());
                        flickGodHand();
                        render();
                        dealerStep();
                    }, 500);
                } else {
                    setTimeout(() => decide(), 600);
                }
            }
            dealerStep();
        }

        function decide() {
            gameOver = true;
            const pv = handValue(playerHand);
            const dv = handValue(dealerHand);
            let outcome, bigTxt, subTxt, glo;

            // Player bust → loss
            if (pv > 21) {
                outcome = 'lose';
                bigTxt = '💥 BUST!';
                subTxt = `${player.name} schoot voorbij 21 (${pv}). De goden lachen.`;
                glo = '#ff3a3a';
            }
            // Dealer bust → win
            else if (dv > 21) {
                outcome = 'win';
                bigTxt = '🔥 DE GOD BUSTE!';
                subTxt = `Vulkaan God ging te ver (${dv}). ${player.name} wint!`;
                glo = '#ffd54a';
            }
            // Both 21 → could be tie or one blackjack
            else if (pv === dv) {
                outcome = 'tie';
                bigTxt = '🤝 GELIJK';
                subTxt = `Beiden ${pv}. De Vulkaangod schenkt vrede — niets gebeurt.`;
                glo = '#9fa3aa';
            }
            else if (pv > dv) {
                outcome = 'win';
                bigTxt = '🏆 WINST!';
                subTxt = `${pv} > ${dv}. ${player.name} verslaat de Vulkaangod!`;
                glo = '#ffd54a';
            }
            else {
                outcome = 'lose';
                bigTxt = '⚡ VERLIES';
                subTxt = `${pv} < ${dv}. De Vulkaangod wint.`;
                glo = '#ff3a3a';
            }

            const drinkN = drinks ?? slokken(4);
            const res = el('div', { className: 'bj-result show' });
            res.style.setProperty('--glo', glo);
            res.append(
                el('div', { className: 'big' }, bigTxt),
                el('div', { className: 'sub' }, subTxt),
                el('div', { className: 'sub', style: { fontSize: '14px', opacity: '0.78' } },
                    outcome === 'tie'
                        ? 'Geen straf, geen beloning.'
                        : (outcome === 'win'
                            ? `Kies straks een slachtoffer: ${drinkN} slokken + ${knockBy(3)} tegels achteruit.`
                            : `${player.name} drinkt zelf ${drinkN} 🍻 en valt ${knockBy(3)} tegels terug.`)),
                el('button', { className: 'btn-pill gold', type: 'button',
                    style: { marginTop: '10px' },
                    on: { click: () => finish({
                        won: outcome === 'win', tie: outcome === 'tie',
                        playerVal: pv, dealerVal: dv, drinks: drinkN,
                    }) } }, 'Verder'),
            );
            back.append(res);
        }

        function finish(payload) {
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(payload); }, 300);
        }
    });
}

/* ============================================================
   Minigame 3 — Hoofdsteden Vuurdoop
   ============================================================

              country: string, expected: string, given: string,
              drinks: number }
   ============================================================ */
const CAPITALS = [

    // Bekende landen eerst, dan iets minder bekende.
    { country: 'Frankrijk',       answers: ['Parijs', 'Paris'] },

    { country: 'Verenigd Koninkrijk', answers: ['Londen', 'London'] },
    { country: 'Ierland',         answers: ['Dublin'] },
    { country: 'België',          answers: ['Brussel', 'Brussels', 'Bruxelles'] },
    { country: 'Nederland',       answers: ['Amsterdam'] },
    { country: 'Luxemburg',       answers: ['Luxemburg', 'Luxembourg'] },
    { country: 'Denemarken',      answers: ['Kopenhagen', 'Copenhagen', 'København'] },
    { country: 'Noorwegen',       answers: ['Oslo'] },
    { country: 'Zweden',          answers: ['Stockholm'] },
    { country: 'Finland',         answers: ['Helsinki'] },
    { country: 'IJsland',         answers: ['Reykjavik', 'Reykjavík'] },
    { country: 'Oostenrijk',      answers: ['Wenen', 'Vienna', 'Wien'] },
    { country: 'Zwitserland',     answers: ['Bern', 'Berne'] },
    { country: 'Polen',           answers: ['Warschau', 'Warsaw', 'Warszawa'] },
    { country: 'Tsjechië',        answers: ['Praag', 'Prague', 'Praha'] },
    { country: 'Hongarije',       answers: ['Boedapest', 'Budapest'] },
    { country: 'Griekenland',     answers: ['Athene', 'Athens', 'Athína'] },
    { country: 'Roemenië',        answers: ['Boekarest', 'Bucharest', 'București'] },
    { country: 'Bulgarije',       answers: ['Sofia'] },
    { country: 'Kroatië',         answers: ['Zagreb'] },
    { country: 'Slovenië',        answers: ['Ljubljana'] },
    { country: 'Slowakije',       answers: ['Bratislava'] },
    { country: 'Servië',          answers: ['Belgrado', 'Belgrade', 'Beograd'] },
    { country: 'Estland',         answers: ['Tallinn'] },
    { country: 'Letland',         answers: ['Riga'] },
    { country: 'Litouwen',        answers: ['Vilnius'] },
    { country: 'Oekraïne',        answers: ['Kiev', 'Kyiv', 'Kyjiv'] },
    { country: 'Albanië',         answers: ['Tirana'] },
    { country: 'Malta',           answers: ['Valletta'] },
    { country: 'Cyprus',          answers: ['Nicosia', 'Lefkosia'] },
];

function playHoofdsteden({ player, drinks = null, timeMs = 12000 } = {}) {
    return new Promise(resolve => {
        const item = CAPITALS[Math.floor(Math.random() * CAPITALS.length)];

        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'hf-back' });
        if (player?.color?.css) back.style.setProperty('--pcol', player.color.css);

        const header = el('div', { className: 'hf-header' });
        header.append(
            el('div', { className: 'hf-title' }, '🏙️ Europese Hoofdsteden'),
            el('div', { className: 'hf-sub' }, 'Typ de juiste hoofdstad voor de timer afloopt!'),
            (() => {
                const w = el('div', { className: 'hf-who' });
                w.append(
                    el('span', { className: 'dot' }),
                    el('span', { className: 'nm' }, player?.name || 'Speler'),
                );
                return w;
            })(),
        );

        const bar = el('div', { className: 'hf-timer-bar' });
        const fill = el('div', { className: 'hf-timer-fill' });
        bar.append(fill);

        const stage = el('div', { className: 'hf-stage' });
        const prompt = el('div', { className: 'hf-prompt' });
        prompt.append(
            el('div', { className: 'lbl' }, 'Hoofdstad van:'),
            el('div', { className: 'country' }, item.country),
        );

        const row = el('div', { className: 'hf-input-row' });
        const input = el('input', {
            className: 'hf-input', type: 'text', placeholder: 'Typ je antwoord…',
            autocomplete: 'off', autocorrect: 'off', autocapitalize: 'words', spellcheck: false,
        });
        const goBtn = el('button', { className: 'hf-go', type: 'button' }, '▶');
        row.append(input, goBtn);
        stage.append(prompt, row);

        const foot = el('div', { className: 'hf-foot' });
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        foot.append(skipBtn);

        back.append(header, bar, stage, foot);
        ui.append(back);

        // Focus the input after a beat so iOS opens the keyboard
        setTimeout(() => input.focus(), 250);

        // ── Timer ──
        let startTs = performance.now();
        let done = false;
        let rafId = null;
        function tick(now) {
            const elapsed = now - startTs;
            const left = Math.max(0, timeMs - elapsed);
            const pct = left / timeMs;
            fill.style.transform = `scaleX(${pct.toFixed(4)})`;
            if (left <= 0) {
                judge(true); // timeout
                return;
            }
            rafId = requestAnimationFrame(tick);
        }
        rafId = requestAnimationFrame(tick);

        // ── Comparison ──
        function normalise(s) {
            // case-insensitive, ignore leading/trailing whitespace and accents
            return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                    .toLowerCase().trim().replace(/\s+/g, ' ');
        }
        function isCorrect(given) {
            const g = normalise(given);
            if (!g) return false;
            return item.answers.some(a => normalise(a) === g);
        }

        function submit() {
            if (done) return;
            judge(false);
        }
        function judge(timeout) {
            if (done) return;
            done = true;
            if (rafId) cancelAnimationFrame(rafId);
            const given = input.value;
            const correct = !timeout && isCorrect(given);

            const drinkN = drinks ?? (correct ? slokken(1) : slokken(2));
            let bigTxt, subTxt, glo;
            if (correct) {
                bigTxt = '🎯 GOED!';
                subTxt = `${player.name} verdient +${knockBy(3)} tegels • drink ${drinkN} (lucky tax) 🍻`;
                glo = '#5cff7a';
            } else if (timeout) {
                bigTxt = '⏰ TE LAAT!';
                subTxt = `${player.name} valt ${knockBy(2)} tegels terug en drinkt ${drinkN} 🍻`;
                glo = '#ff7a1f';
            } else {
                bigTxt = '❌ FOUT!';
                subTxt = `${player.name} valt ${knockBy(2)} tegels terug en drinkt ${drinkN} 🍻`;
                glo = '#ff3a3a';
            }

            const res = el('div', { className: 'hf-result show' });
            res.style.setProperty('--glo', glo);
            res.append(
                el('div', { className: 'big' }, bigTxt),
                el('div', { className: 'sub' }, subTxt),
                el('div', { className: 'answer' },
                    `Juist antwoord: ${item.answers[0]}` + (given ? ` — jij typte: "${given}"` : '')),
                el('button', { className: 'btn-pill gold', type: 'button',
                    style: { marginTop: '12px' },
                    on: { click: () => finish({
                        won: correct, correct, timeout,
                        country: item.country, expected: item.answers[0], given,
                        drinks: drinkN,
                    }) } }, 'Verder'),
            );
            back.append(res);
        }

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); submit(); }
        });
        goBtn.addEventListener('click', submit);
        skipBtn.addEventListener('click', () => {
            done = true;
            if (rafId) cancelAnimationFrame(rafId);
            finish(null);
        });

        function finish(payload) {
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(payload); }, 300);
        }
    });
}

/* ============================================================
   runMinigameOnTile(id, player)
   ============================================================
   Shared dispatcher used by the 'mystery' tile (and by the legacy
   per-minigame tile types). Handles opponent picking, drink scaling,
   bonus-die rewards, and the final result modal.
   ============================================================ */
async function runMinigameOnTile(id, player) {
    const others = G.players.filter(p => p !== player);
    // ── Opponent picker met anti-repeat shuffle ────────────────
    // Math.random voelt voor mensen vaak "patroon-achtig" omdat
    // dezelfde tegenstander meerdere keren achter elkaar gekozen
    // kan worden. We houden per speler een geshuffelde POOL bij
    // die we afwerken voor we herschudden. Dat garandeert dat
    // iedere mogelijke tegenstander aan bod komt voor een herhaling,
    // en we swappen de eerste twee als de vorige opp opnieuw vooraan
    // staat — dat voorkomt back-to-back zelfde tegenstander.
    if (!G._oppPool) G._oppPool = {};
    if (!G._lastOpp) G._lastOpp = {};
    const pickOpp = () => {
        const pid = player.id || player.name;
        let pool = G._oppPool[pid];
        // Refill: pool leeg, of de pool bestaat uit andere spelers
        // dan others (kan gebeuren als speler-lijst is veranderd)
        const needsRefill = !pool || pool.length === 0 ||
            !pool.every(p => others.includes(p));
        if (needsRefill) {
            pool = others.slice();
            // Fisher-Yates shuffle
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            // Anti-repeat: als pool[0] == lastOpp en we hebben ≥2 opties,
            // swap met pool[1]
            if (pool.length > 1 && G._lastOpp[pid] &&
                pool[0] === G._lastOpp[pid]) {
                [pool[0], pool[1]] = [pool[1], pool[0]];
            }
            G._oppPool[pid] = pool;
        }
        const opp = pool.shift();
        G._lastOpp[pid] = opp;
        return opp;
    };

    if (id === 'krokodil' && G.players.length >= 2) {
        const opp = pickOpp();
        const d = slokken(4);
        const go = await showModal({
            emoji: '🐊', title: 'Krokodil 1v1!',

        if (!go) return;
        const loser = await playKrokodil({ playerA: player, playerB: opp, drinks: d });
        if (loser) {
            const winner = loser === player ? opp : player;
            winner.bonusDice = (winner.bonusDice || 0) + 1;
            refreshHUD();
            await showModal({
                emoji: '🍻', title: `${loser.name} drinkt!`,
                body: [`Neem ${d} flinke slokken. Proost! 🥂`,
                       `${winner.name} krijgt 1 × gouden bonus-dobbelsteen 🎲💛`],
                actions: [{ label: 'OK', value: true }],
            });
        }
    }
    else if (id === 'paddle' && G.players.length >= 2) {
        const opp = pickOpp();
        const d = slokken(4);
        const go = await showModal({
            emoji: '🏓', title: 'Paddle Duel!',

        if (loser) {

    else if (id === 'tappy') {

    else if (id === 'tiki') {
        const d = slokken(3);
        const go = await showModal({
            emoji: '🗿', title: 'Tiki Ritme!',
            body: ['Herhaal de volgorde van de Tiki-maskers. Elke ronde komt er één bij.',
                   `Wie het laagste level haalt, drinkt ${d} 🍻.`],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (!go) return;
        await playTikiRitme({ players: G.players, drinks: d });
    }
    else if (id === 'brug') {
        const d = slokken(3);
        const go = await showModal({
            emoji: '⚖️', title: 'Brug Balans!',
            body: ['Houd je telefoon zo recht mogelijk om de brug te overleven.',
                   `Kortste tijd(en) drinken ${d} 🍻.`],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (!go) return;
        await playBrugBalans({ players: G.players, drinks: d });
    }
}

// ── Landing logic ──
async function onLandedOnTile(player) {
    layoutTokensOnTile(player.tileIdx);
    refreshHUD();

    // winner?
    if (player.tileIdx >= TILE_COUNT - 1) {
        G.phase = 'over';
        await showModal({
            emoji: '🏆', title: `${player.name} wint!`,
            body: ['Heeft de top van het Drank Eiland bereikt!', 'Iedereen anders: neem een slok 🍻'],
            actions: [{ label: 'Nieuw spel', value: 'new' }],
        });
        renderSetup();
        // cleanup tokens
        while (tokenGroup.children.length) tokenGroup.remove(tokenGroup.children[0]);
        return;
    }

    const tileType = tileTypes[player.tileIdx];

    // ════════════════════════════════════════════════════════════
    // NEW WII-PARTY-STYLE TILE EVENTS  (use slokken() & knockBy() helpers
    // so the difficulty multipliers automatically apply.)
    // ════════════════════════════════════════════════════════════
    const cfg = DIFFICULTY_CONFIGS[G.difficulty] || DIFFICULTY_CONFIGS.normal;

    // ─── PLUS tile (blue) — small forward boost, drink 1 ───
    if (tileType === 'plus') {
        G.phase = 'event';
        const n = knockBy(2);
        const d = slokken(1);
        await showStamp({
            emoji: '⬆️✨', big: `+${n} VOORUIT!`,
            sub: `${player.name} drinkt ${d} 🍻 (lucky tax)`,
            palette: 'blue',
        });
        await new Promise(r => setTimeout(r, 80));
        await new Promise(r => moveTokenBy(player, +n, r));
        layoutTokensOnTile(player.tileIdx);
        refreshHUD();
        if (player.tileIdx >= TILE_COUNT - 1) return onLandedOnTile(player);
    }
    // ─── MINUS tile (red) — small knockback, drink 2 ───
    else if (tileType === 'minus') {
        G.phase = 'event';
        screenShake(350);
        const n = knockBy(2);
        const d = slokken(2);
        await showStamp({
            emoji: '⬇️💥', big: `−${n} ACHTERUIT!`,
            sub: `${player.name} drinkt ${d} 🍻`,
            palette: 'red',
        });
        await new Promise(r => setTimeout(r, 80));
        await new Promise(r => moveTokenBy(player, -n, r));
        layoutTokensOnTile(player.tileIdx);
        refreshHUD();
    }
    // ─── DRINK tile (green) — cheers with another player ───
    else if (tileType === 'drink' && G.players.length >= 2) {
        G.phase = 'event';
        const d = slokken(1);
        await showStamp({
            emoji: '🍻', big: 'PROOST!',
            sub: 'Kies iemand om mee te klinken',
            palette: 'green', auto: true, duration: 1100,
        });
        const buddy = await pickVictim({
            title: '🍻 Met wie klink je?',
            subtitle: `${player.name} en de gekozen speler drinken samen ${d} slok${d>1?'ken':''}`,
            exclude: [player],
        });
        if (buddy) {
            await showStamp({
                emoji: '🥂', big: `${player.name} & ${buddy.name}`,
                sub: `Drink samen ${d} 🍻 — proost!`,
                palette: 'green',
            });
        }
    }
    // ─── BLUE STATUE — mega jackpot boost, drink 1 ───
    else if (tileType === 'bluestatue') {
        G.phase = 'event';
        const n = knockBy(6);
        const d = slokken(1);
        await showStamp({
            emoji: '🗿💙', big: 'BLAUWE STANDBEELD!',
            sub: `MEGA BOOST: +${n} vooruit • ${player.name} drinkt ${d} 🍻`,
            palette: 'blue',
        });
        await new Promise(r => setTimeout(r, 80));
        await new Promise(r => moveTokenBy(player, +n, r));
        layoutTokensOnTile(player.tileIdx);
        refreshHUD();
        if (player.tileIdx >= TILE_COUNT - 1) return onLandedOnTile(player);
    }
    // ─── RED STATUE — cruel knockback (-6), drink 3.
    //     On Gezellig difficulty: tile is "broken", acts like a minus instead.
    else if (tileType === 'redstatue') {
        G.phase = 'event';
        if (cfg.redStatueEnabled) {
            screenShake(500);
            const n = knockBy(6);
            const d = slokken(3);
            await showStamp({
                emoji: '🗿❤️‍🔥', big: 'RODE STANDBEELD!',
                sub: `BOEM: −${n} achteruit • ${player.name} drinkt ${d} 🍻`,
                palette: 'red',
            });
            await new Promise(r => setTimeout(r, 80));
            await new Promise(r => moveTokenBy(player, -n, r));
        } else {
            // Gezellig: het standbeeld brokkelt af
            const n = knockBy(2);
            await showStamp({
                emoji: '🗿', big: 'AFGEBROKEN',
                sub: `Het standbeeld is brak — alleen −${n} • drink ${slokken(1)} 🍻`,
                palette: 'red',
            });
            await new Promise(r => moveTokenBy(player, -n, r));
        }
        layoutTokensOnTile(player.tileIdx);
        refreshHUD();
    }
    // ─── TORNADO — blow someone else back, they drink ───
    else if (tileType === 'tornado' && G.players.length >= 2) {
        G.phase = 'event';
        const n = knockBy(3);
        const d = slokken(2);
        await showStamp({
            emoji: '🌪️', big: 'TORNADO!',
            sub: `${player.name}: kies een speler om weg te blazen`,
            palette: 'dark', auto: true, duration: 1300,
        });
        const victim = await pickVictim({
            title: '🌪️ Wie wordt weggeblazen?',
            subtitle: `−${n} tegels achteruit + drink ${d} 🍻`,
            exclude: [player],
        });
        if (victim) {
            screenShake(500);
            await showStamp({
                emoji: '💨', big: `${victim.name} → −${n}`,
                sub: `${victim.name} drinkt ${d} 🍻`,
                palette: 'dark',
            });
            await new Promise(r => moveTokenBy(victim, -n, r));
            layoutTokensOnTile(victim.tileIdx);
            refreshHUD();
        }
    }
    // ─── UFO — swap places with another player ───
    else if (tileType === 'ufo' && G.players.length >= 2) {
        G.phase = 'event';
        const d = slokken(1);
        await showStamp({
            emoji: '🛸', big: 'UFO!',
            sub: `${player.name}: kies een speler om mee te wisselen`,
            palette: 'purple', auto: true, duration: 1400,
        });
        const swap = await pickVictim({
            title: '🛸 Met wie wissel je?',
            subtitle: `Beiden drinken ${d} 🍻 voor de schok`,
            exclude: [player],
        });
        if (swap) {
            const pIdx = player.tileIdx, sIdx = swap.tileIdx;
            const pWasJailed = player.inPrison;
            const sWasJailed = swap.inPrison;
            await showStamp({
                emoji: '✨🔁✨', big: `${player.name} ↔ ${swap.name}`,
                sub: `Beiden drinken ${d} 🍻`,
                palette: 'purple',
            });

            // Speciaal geval: precies EEN van de twee zit in de gevangenis.
            // De wisselkaart laat ze letterlijk van plek wisselen — vrije
            // speler komt vast, gevangen speler komt vrij op tegel van
            // de ander. Token-animaties (bogen tussen jail en tile).
            if (pWasJailed !== sWasJailed) {
                const wasJailed = pWasJailed ? player : swap;   // wordt vrij
                const wasFree   = pWasJailed ? swap   : player; // gaat vast

                // Swap inPrison flags
                wasJailed.inPrison = false;
                wasFree.inPrison   = true;
                // Swap tileIdx (zoals normale UFO-swap)
                player.tileIdx = sIdx;
                swap.tileIdx   = pIdx;

                // Beweeg pawns. animateTokenFromJail leest player.tileIdx
                // (nu de nieuwe waarde) → token landt op de juiste tegel.
                await Promise.all([
                    animateTokenFromJail(wasJailed, 800, 2.5),
                    animateTokenToJail(wasFree, 800, 2.5),
                ]);
                refreshHUD();
                // Vrijgekomen speler kan op finish-tegel landen
                if (!player.inPrison && player.tileIdx >= TILE_COUNT - 1) {
                    return onLandedOnTile(player);
                }
            } else {
                // Beide vrij of beide vast → normale tegel-swap
                teleportTokenTo(player, sIdx);
                teleportTokenTo(swap, pIdx);
                refreshHUD();
                if (player.tileIdx >= TILE_COUNT - 1) return onLandedOnTile(player);
            }
        }
    }
    // ─── SKULL — pitchzwarte tegel die je naar Banana Brig verbant
    //              (Gezellig: spookt alleen, klein slokje en klaar)
    else if (tileType === 'skull') {
        G.phase = 'event';

        if (!cfg.skullEnabled) {
            // Gezellig modus: schedel is alleen voor de show
            const d = slokken(2);
            await showStamp({
                emoji: '💀', big: 'BRRR…',
                sub: `Spookachtig! ${player.name} drinkt ${d} 🍻`,
                palette: 'dark',
            });
            refreshHUD();
            return;
        }

        // 1. Drama-buildup: screenshake + telefoon-vibratie + dramatic stamp
        screenShake(800);
        if (navigator.vibrate) {
            try { navigator.vibrate([80, 40, 80, 40, 80, 40, 200, 60, 300]); } catch (e) {}
        }
        await showStamp({
            emoji: '💀🌋', big: 'VERBANNING!',
            sub: `De vulkaan rommelt — ${player.name} wordt verbannen…`,
            palette: 'dark',
        });

        // 2. Camera zwaait uit naar overzichtspositie zodat het rad past
        const savedCamPos = camera.position.clone();
        const wasAutoRotate = controls.autoRotate;
        controls.autoRotate = false;
        await new Promise(r => {
            const camFrom = camera.position.clone();
            const tgtFrom = controls.target.clone();
            const camTo = new THREE.Vector3(40, 38, 40);
            const tgtTo = new THREE.Vector3(0, 6, 0);
            const t0 = performance.now();
            const dur = 700;
            const step = (now) => {
                const k = Math.min(1, (now - t0) / dur);
                const e = k < 0.5 ? 4 * k * k * k : 1 - Math.pow(-2 * k + 2, 3) / 2;
                camera.position.lerpVectors(camFrom, camTo, e);
                controls.target.lerpVectors(tgtFrom, tgtTo, e);
                if (k < 1) requestAnimationFrame(step); else r();
            };
            requestAnimationFrame(step);
        });

        // 3. Camera zoomt direct in op het Banana Brig satelliet-eiland.
        //    (De Tiki Wheel-tussenstap is weggehaald — voor nu is Banana
        //    Brig de enige speelbare straf, het rad voegde alleen ruis toe.)
        //    Positie van Banana Brig satelliet is (4, -19), top y ≈ 2.4.
        const bbX = 4, bbZ = -19, bbY = 2.4;
        await new Promise(r => {
            const camFrom = camera.position.clone();
            const tgtFrom = controls.target.clone();
            const camTo = new THREE.Vector3(bbX + 5, bbY + 8, bbZ + 9);
            const tgtTo = new THREE.Vector3(bbX, bbY + 2, bbZ);
            const t0 = performance.now();
            const dur = 1100;
            const step = (now) => {
                const k = Math.min(1, (now - t0) / dur);
                const e = k < 0.5 ? 4 * k * k * k : 1 - Math.pow(-2 * k + 2, 3) / 2;
                camera.position.lerpVectors(camFrom, camTo, e);
                controls.target.lerpVectors(tgtFrom, tgtTo, e);
                if (k < 1) requestAnimationFrame(step); else r();
            };
            requestAnimationFrame(step);
        });

        // 4. Markeer de speler als gevangen + animeer de pawn fysiek IN
        //    de kooi (zodat je 'm daar echt ziet staan).
        player.inPrison = true;
        await animateTokenToJail(player, 900, 2.5);
        refreshHUD();

        // 5. Stamp: hier zit je vast, gooi 4+ om vrij te komen
        await showStamp({
            emoji: '🍌🔒', big: 'BANANA BRIG',
            sub: `${player.name} zit nu vast — gooi 4 of hoger om uit te breken!`,
            palette: 'gold',
        });

        // 6. Camera zwaait terug naar het bord
        await new Promise(r => {
            const camFrom = camera.position.clone();
            const tgtFrom = controls.target.clone();
            const finalTile = tileWorldPos[player.tileIdx].clone();
            const t0 = performance.now();
            const dur = 900;
            const step = (now) => {
                const k = Math.min(1, (now - t0) / dur);
                const e = k < 0.5 ? 4 * k * k * k : 1 - Math.pow(-2 * k + 2, 3) / 2;
                camera.position.lerpVectors(camFrom, savedCamPos, e);
                controls.target.lerpVectors(tgtFrom, finalTile, e);
                if (k < 1) requestAnimationFrame(step); else r();
            };
            requestAnimationFrame(step);
        });
        controls.autoRotate = wasAutoRotate;

        // 7. 50% kans dat de vulkaan begint uit te barsten (themische bonus
        //    — past mooi bij "De vulkaan rommelt"). 3 rondes lang −1 op alle
        //    worpen, dus ook gevangen spelers hebben het zwaarder om eruit
        //    te komen.
        if (Math.random() < 0.5) {
            G.volcanoActive = 3;
            updateVolcanoBanner();
            await showStamp({
                emoji: '🌋', big: 'UITBARSTING!',
                sub: 'Volgende 3 rondes: vulkaan rommelt — alle worpen −1',
                palette: 'lava',
            });
        }
    }
    // ─── LAVA — drinking penalty + possible knockback during eruption ───
    else if (tileType === 'lava') {
        G.phase = 'event';
        const erupt = G.volcanoActive > 0;
        if (erupt) {
            screenShake(450);
            const n = knockBy(3);
            const d = slokken(2);
            await showStamp({
                emoji: '🔥', big: 'LAVA STRAAL!',
                sub: `${player.name} drinkt ${d} 🍻 • −${n} tegels`,
                palette: 'lava',
            });
            await new Promise(r => moveTokenBy(player, -n, r));
        } else {
            const slip = Math.random() < 0.25;
            if (slip) {
                screenShake(350);
                const d = slokken(1);
                await showStamp({
                    emoji: '🥵', big: 'HEET! −1',
                    sub: `${player.name} drinkt ${d} 🍻 • glijdt 1 terug`,
                    palette: 'lava',
                });
                await new Promise(r => moveTokenBy(player, -1, r));
            } else {
                const d = slokken(1);
                await showStamp({
                    emoji: '♨️', big: 'LAVA',
                    sub: `${player.name} drinkt ${d} 🍻`,
                    palette: 'lava',
                });
            }
            if (Math.random() < cfg.eruptionChance) {
                G.volcanoActive = 3;
                updateVolcanoBanner();
                await showStamp({
                    emoji: '🌋', big: 'UITBARSTING!',
                    sub: '3 rondes: alle worpen −1, lava is dodelijk',
                    palette: 'lava',
                });
            }
        }
        layoutTokensOnTile(player.tileIdx);
        refreshHUD();
    }
    // ─── KROKODIL (legacy tile type — kept in case the board generator is reverted) ───
    else if (tileType === 'krokodil' && G.players.length >= 2) {
        G.phase = 'event';
        await runMinigameOnTile('krokodil', player);
    }
    // ─── CHWAZI — random player drinks ───
    else if (tileType === 'chwazi') {
        G.phase = 'event';
        const d = slokken(3);
        const go = await showModal({
            emoji: '👆', title: 'Iemand drinkt!',
            body: ['Tijd voor Vingers Op.', 'Iedereen legt zo een vinger op het scherm — één wordt willekeurig gekozen.'],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (go) {
            const winner = await playChwazi({
                title: 'Wie drinkt er?',
                subtitle: `Iedereen legt één vinger op het scherm`,
                drinks: d,
            });
            if (winner) {
                await showModal({
                    emoji: '🍻', title: 'Drinken!',
                    body: [`De gekozen persoon neemt ${d} flinke slokken.`,
                           'Proost! 🥂'],
                    actions: [{ label: 'OK', value: true }],
                });
            }
        }
    }
    // ─── MYSTERY — spin the wheel, then play whichever minigame the wheel landed on ───
    else if (tileType === 'mystery') {
        G.phase = 'event';
        await showStamp({
            emoji: '🎡', big: 'MYSTERY!',
            sub: `${player.name} draait aan het rad — wat wordt het?`,
            palette: 'purple', auto: true, duration: 1200,
        });
        // Filter wheel options based on player count: 1v1 games need 2+
        // PLUS: alle-spelers minigames (volcano/tappy/bowling/lavasteen/...)
        // worden NOOIT via de tile-wheel gekozen — die spelen we apart
        // aan het einde van een ronde-blok.
        const playerOk = G.players.length >= 2;
        const options = MYSTERY_OPTIONS.filter(o => {
            if (ALL_PLAYER_GAMES.includes(o.id)) return false;
            if (!playerOk) return ['roulette','blackjack','hoofdsteden'].includes(o.id);
            return true;
        });
        const id = await playMysteryWheel({ options });
        if (id) await runMinigameOnTile(id, player);
    }
    // ─── Legacy minigame tile types — only triggered if the board generator hasn't
    // been updated yet. They route through the same minigame dispatcher.
    else if (tileType === 'volcanoHop') {
        G.phase = 'event';
        await runMinigameOnTile('volcano', player);
    }
    else if (tileType === 'tappy') {
        G.phase = 'event';
        await runMinigameOnTile('tappy', player);
    }
    else if (tileType === 'paddle' && G.players.length >= 2) {
        G.phase = 'event';
        await runMinigameOnTile('paddle', player);
    }

    // Re-check if a previous +tile movement landed someone on a finish tile
    if (player.tileIdx >= TILE_COUNT - 1) {
        return onLandedOnTile(player);
    }

    // ── Turn advance ──
    // Doubles → same player rolls again (no turn advance)
    if (player.extraRoll) {
        player.extraRoll = false;
        // brief notice
        await showStamp({
            emoji: '🎲🎲', big: 'NOG EEN BEURT',
            sub: `${player.name} gooit opnieuw!`,
            palette: 'gold',
        });
    } else {
        advanceTurn();
        await maybeRunAllPlayerRoundGame();
    }
    G.phase = 'idle';
    refreshHUD();

    // ── Schnaps ruft an: random in-game call ──
    // Fires AFTER advanceTurn (so the player it targets is the one whose
    // turn is about to start) and AFTER phase is reset to 'idle' (so the
    // dice button stays disabled while the call screen is open). Never
    // fires during a minigame because we're past that already.
    await maybeFireSchnapsCall();

    // un-disable dice
    const btn = document.getElementById('dice-btn');
    if (btn) { btn.disabled = false; btn.textContent = '🎲'; }
}

// ── Per-frame token idle bob + camera-facing rotation ──
// Heads have a front (+Z local) and a back. We rotate each idle pawn so
// the body — and therefore the face — points roughly at the camera. Plus
// a tiny sway so the pawn doesn't look frozen. Animated pawns (mid-move)
// skip this so directional motion-facing isn't overruled.
// Camera sits high above the board, so we ALSO tilt the head group up
// (X-axis on the head only, body stays vertical) to about 70% of the
// camera's elevation angle. Without this, top-down view shows mostly hair.
const _gameHook = (time) => {
    const cx = camera.position.x;
    const cy = camera.position.y;
    const cz = camera.position.z;
    for (const p of G.players) {
        if (p._animating) continue;
        const isCurrent = p === G.players[G.turnIdx] && G.phase === 'idle';
        const bob = Math.sin(time * 2.5 + p.colorIdx) * 0.05 + (isCurrent ? 0.15 + Math.abs(Math.sin(time*3))*0.1 : 0);
        if (p._restTarget) {
            p.token.position.x = p._restTarget.x;
            p.token.position.z = p._restTarget.z;
            p.token.position.y = p._restTarget.y + bob;
        }

        const dx = cx - p.token.position.x;
        const dz = cz - p.token.position.z;
        const horiz = Math.sqrt(dx*dx + dz*dz);

        // Y-axis: face the camera horizontally + tiny sway (≈ ±4°)
        const baseAngle = Math.atan2(dx, dz);
        const sway = Math.sin(time * 0.8 + p.colorIdx * 1.7) * 0.07;
        p.token.rotation.y = baseAngle + sway;

        // X-axis on HEAD group only: tilt face up toward elevated camera
        const headGroup = p.token.userData.headGroup;
        if (headGroup) {
            const headWorldY = p.token.position.y + 1.50;       // head sits at y=1.5 above token base
            const pitch = Math.atan2(cy - headWorldY, horiz);   // positive when cam above head
            // 70% lookup keeps it expressive without going "eyes on stalks".
            // Min 8° even at flat camera so face is always slightly readable.
            const tilt = Math.max(0.14, pitch * 0.70);
            // Tiny nod for liveliness (≈ ±2°)
            const nod = Math.sin(time * 0.6 + p.colorIdx * 2.3) * 0.035;
            headGroup.rotation.x = -(tilt + nod);                // negative = face up
        }
    }
};
window.__deGameHook = _gameHook;

// boot the setup screen once the page is ready
renderSetup();

// start render loop + hide splash
animate();
requestAnimationFrame(() => {
    setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
    }, 200);
});

</script>
