<style>
    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #87CEEB;
        touch-action: none;
        overscroll-behavior: none;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    canvas { display: block; }

    #ui {
        position: absolute;
        top: max(18px, env(safe-area-inset-top));
        left: max(18px, env(safe-area-inset-left));
        color: white;
        z-index: 10;
        pointer-events: none;
        text-shadow:
            2px 2px 0 #000,
           -2px 2px 0 #000,
            2px -2px 0 #000,
           -2px -2px 0 #000;
    }

    #ui h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0.5px;
    }

    #ui p {
        margin: 4px 0 0;
        font-size: 13px;
        opacity: 0.95;
    }

    #hint {
        position: absolute;
        bottom: max(22px, env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        color: white;
        font-size: 12px;
        z-index: 10;
        pointer-events: none;
        text-shadow: 1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000;
        opacity: 0.85;
        white-space: nowrap;
    }

    #loading {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, #9fd9ff 0%, #4da6ff 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 10px;
        color: white;
        font-size: 18px;
        z-index: 100;
        transition: opacity 0.7s ease;
        text-shadow: 2px 2px 0 rgba(0,0,0,0.35);
    }

    #loading.hidden { opacity: 0; pointer-events: none; }

    /* ───── Game UI ───── */
    #game-ui { position: fixed; inset: 0; pointer-events: none; z-index: 20;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #game-ui > * { pointer-events: auto; }

    .screen { position: fixed; inset: 0; display: flex; align-items: center;
      flex-direction: column; padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(20,40,70,0.78) 0%, rgba(30,15,40,0.85) 100%);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: #fff;
      overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
    /* Spacer pseudo-elements vertically centre the content when it fits, but
       collapse to 0 once the content exceeds the viewport so the user can
       scroll naturally. Without these, fixed + justify-content:center cuts
       off both the top and the bottom of an over-long form on iPhone. */
    .screen::before, .screen::after { content: ""; flex: 1 1 0; min-height: 0; }
    .screen h1 { font-size: 38px; margin: 0 0 6px; letter-spacing: 1px;
      text-shadow: 0 3px 0 #000, 0 0 18px rgba(255,170,40,0.6); }
    .screen .sub { opacity: 0.85; margin-bottom: 22px; font-size: 14px; }
    .tabs { display: flex; gap: 6px; background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
      padding: 4px; width: min(420px, 100%); margin-bottom: 16px; }
    .tabs button { flex: 1; min-height: 42px; border-radius: 999px; border: none;
      background: transparent; color: rgba(255,255,255,0.7); font-weight: 700;
      font-size: 14px; cursor: pointer; transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent; }
    .tabs button.active { background: linear-gradient(180deg, #ffd54a, #ff9a1a);
      color: #1a1010; box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
    .mg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 380px) { .mg-grid { grid-template-columns: 1fr; } }
    .mg-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px; padding: 16px 14px; text-align: center; cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
      -webkit-tap-highlight-color: transparent; position: relative; overflow: hidden; }
    .mg-card:hover, .mg-card:active { background: rgba(255,255,255,0.12); transform: translateY(-2px); }
    .mg-card.locked { opacity: 0.45; cursor: not-allowed; }
    .mg-card.locked:hover, .mg-card.locked:active { transform: none; background: rgba(255,255,255,0.07); }
    .mg-card .emoji { font-size: 40px; margin-bottom: 6px; }
    .mg-card .name { font-weight: 800; font-size: 15px; margin-bottom: 2px; }
    .mg-card .meta { font-size: 11px; opacity: 0.65; letter-spacing: 0.4px; text-transform: uppercase; }
    .mg-card .tag { position: absolute; top: 8px; right: 8px; font-size: 10px;
      padding: 3px 7px; border-radius: 99px; background: rgba(255,255,255,0.15);
      letter-spacing: 0.4px; }
    /* BETA tag: oranje accent zodat experimentele minigames opvallen */
    .mg-card .tag.beta,
    .mg-card .tag:not(.new) { /* fallback voor zonder class — JS zet 'beta' class */ }
    .mg-card .tag[data-beta] {
      background: linear-gradient(180deg, #ffaa3a, #ff7a1a);
      color: #2a1a00; font-weight: 900; box-shadow: 0 2px 6px rgba(255,170,58,0.4); }
    .mg-quick { display: flex; align-items: center; gap: 12px; justify-content: center;
      margin-top: 14px; padding: 12px 14px; background: rgba(0,0,0,0.25);
      border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); }
    .mg-quick .lbl { font-size: 13px; opacity: 0.8; }
    .mg-quick .pcount { display: flex; align-items: center; gap: 8px; }
    .mg-quick .pcount button { width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
      color: #fff; font-weight: 800; font-size: 18px; cursor: pointer;
      -webkit-tap-highlight-color: transparent; }
    .mg-quick .pcount .n { font-weight: 900; font-size: 20px; min-width: 24px; text-align: center; }
    .card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px; padding: 16px; width: min(420px, 100%); margin-bottom: 14px;
      backdrop-filter: blur(4px); }

    /* Difficulty selector grid */
    .diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .diff-card { padding: 12px 10px 10px; border-radius: 14px; cursor: pointer;
      background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.10);
      text-align: center; transition: transform 0.12s ease, background 0.2s ease, border-color 0.2s ease;
      -webkit-tap-highlight-color: transparent; }
    .diff-card:active { transform: scale(0.97); }
    .diff-card.active { background: rgba(255,200,80,0.18);
      border-color: rgba(255,200,80,0.7);
      box-shadow: 0 0 0 1px rgba(255,200,80,0.3), 0 0 18px rgba(255,200,80,0.25); }
    .diff-card .diff-emoji { font-size: 26px; line-height: 1; margin-bottom: 4px; }
    .diff-card .diff-name { font-size: 14px; font-weight: 800; color: #fff; }
    .diff-card .diff-mult { font-size: 11px; opacity: 0.85; font-weight: 700;
      margin-top: 2px; color: #ffd54a; }
    .diff-card .diff-descr { font-size: 10.5px; opacity: 0.65; margin-top: 5px;
      line-height: 1.3; min-height: 26px; }

    .player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .player-row input { flex: 1; min-width: 0; background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
      padding: 10px 12px; color: #fff; font-size: 16px; outline: none; }
    .player-row input:focus { border-color: #ffd54a; }
    .swatch { width: 36px; height: 36px; border-radius: 50%; border: 3px solid #fff;
      box-shadow: 0 2px 0 rgba(0,0,0,0.4); cursor: pointer; flex-shrink: 0; transition: transform .15s; }
    .swatch:active { transform: scale(0.92); }
    .btn-x { background: rgba(255,80,80,0.25); border: 1px solid rgba(255,80,80,0.5);
      color: #fff; width: 32px; height: 32px; border-radius: 50%; font-size: 18px;
      display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

    .btn { background: linear-gradient(180deg, #ffd54a 0%, #ff9a1a 100%);
      color: #1a1010; border: none; padding: 14px 28px; border-radius: 999px;
      font-size: 17px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 0 #b86c00, 0 8px 24px rgba(0,0,0,0.4);
      transition: transform .1s, box-shadow .1s; letter-spacing: 0.5px; }
    .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b86c00, 0 4px 14px rgba(0,0,0,0.4); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.ghost { background: rgba(255,255,255,0.1); color: #fff;
      box-shadow: 0 4px 0 rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); }
    .btn.ghost:active { box-shadow: 0 1px 0 rgba(0,0,0,0.3); }

    /* Mini-map top-right — see how far everyone is */
    #minimap { position: fixed; top: max(60px, calc(env(safe-area-inset-top) + 50px));
      right: max(14px, env(safe-area-inset-right)); z-index: 24;
      width: 150px; padding: 10px 10px 8px;
      background: rgba(15,30,50,0.45); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      color: #fff; pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
    #minimap .mm-title { font-size: 10px; letter-spacing: 1.2px; opacity: 0.7;
      text-transform: uppercase; margin-bottom: 6px; }
    #minimap svg { display: block; width: 100%; height: auto; }
    #minimap .mm-row { display: flex; align-items: center; gap: 6px;
      font-size: 11px; margin-top: 4px; }
    #minimap .mm-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #fff;
      box-shadow: 0 0 6px currentColor; flex-shrink: 0; }
    #minimap .mm-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #minimap .mm-pct { opacity: 0.75; font-variant-numeric: tabular-nums; }

    /* HUD — bottom card with current player + dice button */
    #hud { position: fixed; bottom: max(16px, env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%); z-index: 25;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: none; }
    #hud > * { pointer-events: auto; }
    .player-card { background: rgba(15,30,50,0.85); border: 2px solid #fff;
      border-radius: 18px; padding: 10px 18px; color: #fff;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5); min-width: 200px; }
    .player-card .avatar { width: 38px; height: 38px; border-radius: 50%;
      border: 3px solid #fff; box-shadow: 0 0 14px currentColor; }
    .player-card .name { font-weight: 700; font-size: 18px; }
    .player-card .pos { font-size: 12px; opacity: 0.75; }

    .dice-btn { width: 86px; height: 86px; border-radius: 22px;
      background: linear-gradient(180deg, #fff 0%, #ddd 100%); color: #222;
      font-size: 44px; font-weight: 900; cursor: pointer; border: 4px solid #fff;
      box-shadow: 0 6px 0 rgba(0,0,0,0.4), 0 10px 30px rgba(255,200,50,0.4);
      display: flex; align-items: center; justify-content: center;
      transition: transform .1s; user-select: none; -webkit-user-select: none; }
    .dice-btn { position: relative; }
    .dice-btn:active { transform: translateY(3px); }
    .dice-btn .bonus-dot { position: absolute; top: -6px; right: -6px; width: 28px; height: 28px;
      border-radius: 50%; background: linear-gradient(180deg, #ffd54a, #d99a1a);
      color: #4a2a00; font-size: 14px; font-weight: 900; display: flex;
      align-items: center; justify-content: center; border: 2px solid #fff;
      box-shadow: 0 2px 0 #5a3a00, 0 0 12px #ffd54a; pointer-events: none; }
    .dice-btn.rolling { animation: diceShake 0.08s linear infinite; }
    @keyframes diceShake { 0%,100%{ transform: rotate(-8deg) }
      25% { transform: rotate(8deg) translate(2px,-2px) } 50% { transform: rotate(-6deg) translate(-2px,2px) }
      75% { transform: rotate(10deg) translate(2px,2px) } }

    /* ===== 3D dice overlay (shown when rolling) ===== */
    .dice-overlay { position: fixed; inset: 0; z-index: 70;
      background: radial-gradient(ellipse at 50% 40%, rgba(40,20,60,0.85) 0%, rgba(5,5,15,0.95) 70%);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 28px; padding: 24px; animation: fadeIn .25s ease;
      color: #fff; pointer-events: auto; }
    .dice-overlay .label { font-size: 20px; font-weight: 800; letter-spacing: 0.5px;
      text-shadow: 0 2px 0 #000; text-align: center; }
    .dice-stage { position: relative; perspective: 900px;
      width: 120px; height: 120px;
      display: flex; align-items: center; justify-content: center; }
    .dice-stage.dual { width: 260px; gap: 20px; }
    .dice-total { font-size: 56px; font-weight: 900; letter-spacing: 1px;
      text-shadow: 0 4px 0 #000, 0 0 20px rgba(255,215,80,0.65);
      animation: pop .3s cubic-bezier(.4,1.6,.5,1); color: #ffd54a; }
    .dice-total .gold-part { color: #ffd54a; text-shadow: 0 0 14px #ffd54a; }

    /* The 3D cube itself */
    .die3d { position: relative; width: 100px; height: 100px;
      transform-style: preserve-3d;
      transform: rotateX(-20deg) rotateY(20deg);
      transition: transform 1.4s cubic-bezier(.22,.85,.25,1);
      filter: drop-shadow(0 12px 14px rgba(0,0,0,0.55)); }
    .dice-stage.dual .die3d { width: 90px; height: 90px; }
    .die3d .face { position: absolute; inset: 0;
      background: linear-gradient(160deg, #fafafa 0%, #d4d4d4 60%, #b0b0b0 100%);
      border: 2px solid rgba(0,0,0,0.15); border-radius: 14px;
      box-shadow: inset 0 0 18px rgba(0,0,0,0.18), inset 0 4px 0 rgba(255,255,255,0.6);
      backface-visibility: hidden; }
    .die3d.gold .face {
      background: linear-gradient(160deg, #ffe98a 0%, #ffd54a 50%, #d99a1a 100%);
      border-color: rgba(120,70,0,0.4);
      box-shadow: inset 0 0 22px rgba(170,90,0,0.4), inset 0 4px 0 rgba(255,255,200,0.7); }
    /* Position each face on the cube. Z translation puts it on the right side. */
    .die3d .f1 { transform: translateZ(50px); }                    /* front  */
    .die3d .f6 { transform: rotateY(180deg) translateZ(50px); }    /* back   */
    .die3d .f2 { transform: rotateY( 90deg) translateZ(50px); }    /* right  */
    .die3d .f5 { transform: rotateY(-90deg) translateZ(50px); }    /* left   */
    .die3d .f3 { transform: rotateX( 90deg) translateZ(50px); }    /* top    */
    .die3d .f4 { transform: rotateX(-90deg) translateZ(50px); }    /* bottom */
    .dice-stage.dual .die3d .f1 { transform: translateZ(45px); }
    .dice-stage.dual .die3d .f6 { transform: rotateY(180deg) translateZ(45px); }
    .dice-stage.dual .die3d .f2 { transform: rotateY( 90deg) translateZ(45px); }
    .dice-stage.dual .die3d .f5 { transform: rotateY(-90deg) translateZ(45px); }
    .dice-stage.dual .die3d .f3 { transform: rotateX( 90deg) translateZ(45px); }
    .dice-stage.dual .die3d .f4 { transform: rotateX(-90deg) translateZ(45px); }
    /* Pips (dots) */
    .die3d .pip { position: absolute; width: 16px; height: 16px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #555 0%, #111 70%);
      transform: translate(-50%, -50%);
      box-shadow: inset 0 -2px 2px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.2); }
    .die3d.gold .pip {
      background: radial-gradient(circle at 35% 35%, #5a2a00 0%, #1a0a00 70%); }
    .dice-stage.dual .die3d .pip { width: 14px; height: 14px; }
    /* Brief rolling shake — class is added then removed in next frame as a marker */
    .die3d.rolling { transition: none; }

    /* ===== 3D Raft Battle (rb3-*) — overlay HUD on top of the 3D scene =====
       Het 3D raft-battle gevecht speelt zich af IN de bord-game scene
       zelf (zelfde camera, water, eiland), dus we hebben geen iframe
       nodig. We tekenen alleen een HUD-laag over het canvas heen:
       HP-balken, beurt-indicator, wind, en de touch-drag aim/fire knop. */
    .rb3-back { position: fixed; inset: 0; z-index: 22;
        pointer-events: none; /* alleen specifieke kinderen vangen taps */
        color: #fff; user-select: none;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        animation: fadeIn .25s ease; }
    /* Touch-vang-laag: vult het scherm en geeft drag-events door aan de
       game-logica. Géén achtergrond — het 3D-eiland blijft zichtbaar. */
    .rb3-hit { position: absolute; inset: 0; pointer-events: auto;
        touch-action: none; background: transparent; }
    /* Top-bar: tegenstander HP + wind + naam */
    /* Top-bar: HP + naam compact zodat alles met dynamic island past */
    .rb3-top { position: absolute;
        left: max(8px, env(safe-area-inset-left));
        right: max(8px, env(safe-area-inset-right));
        top: calc(env(safe-area-inset-top) + 10px);
        display: flex; flex-direction: column; align-items: center; gap: 6px;
        pointer-events: none; }
    .rb3-chip { display: flex; align-items: center; gap: 6px;
        padding: 5px 11px; border-radius: 999px;
        background: rgba(15,30,50,0.82); border: 2px solid var(--pcol, #fff);
        box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 16px var(--pcol, transparent);
        font-weight: 800; font-size: 13px;
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        pointer-events: none; min-width: 0; }
    .rb3-chip > div:not(.dot):not(.hp) {
        max-width: 22vw; overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap; }
    .rb3-chip .dot { width: 10px; height: 10px; border-radius: 50%;
        background: var(--pcol); box-shadow: 0 0 8px var(--pcol);
        flex-shrink: 0; }
    .rb3-chip .hp { display: inline-flex; gap: 2px; margin-left: 3px; flex-shrink: 0; }
    .rb3-chip .hp .heart { font-size: 12px; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
    .rb3-chip .hp .heart.gone { opacity: 0.25; filter: grayscale(1); }
    .rb3-wind { padding: 4px 11px; border-radius: 999px;
        background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.22);
        font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        pointer-events: none; white-space: nowrap; flex-shrink: 0; }
    .rb3-wind .arrow { display: inline-block; margin: 0 3px; font-size: 14px; }
    /* Bottom-bar: huidige speler + draginstructie + fire-button */
    .rb3-bot { position: absolute;
        left: max(8px, env(safe-area-inset-left));
        right: max(8px, env(safe-area-inset-right));
        bottom: calc(env(safe-area-inset-bottom) + 14px);
        display: flex; flex-direction: column; align-items: center; gap: 8px;
        pointer-events: none; }
    .rb3-turn { display: flex; flex-direction: column; align-items: center; gap: 4px;
        padding: 8px 18px 10px; border-radius: 18px;
        background: rgba(15,30,50,0.82); border: 2px solid var(--pcol, #fff);
        box-shadow: 0 6px 20px rgba(0,0,0,0.55), 0 0 22px var(--pcol, transparent);
        text-align: center;
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        pointer-events: none; }
    .rb3-turn .lbl { font-size: 11px; opacity: 0.65; letter-spacing: 1.2px;
        text-transform: uppercase; }
    .rb3-turn .nm { font-size: 18px; font-weight: 900; color: var(--pcol);
        text-shadow: 0 1px 0 rgba(0,0,0,0.6); }
    .rb3-turn .hp-now { display: inline-flex; gap: 4px; margin-top: 2px; }
    .rb3-turn .hp-now .heart { font-size: 16px; }
    .rb3-turn .hp-now .heart.gone { opacity: 0.25; filter: grayscale(1); }
    .rb3-tip { padding: 4px 12px; border-radius: 999px;
        background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
        font-size: 11px; opacity: 0.85; letter-spacing: 0.3px;
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        pointer-events: none; }
    /* Aim drag-indicator (volgt vinger tijdens slepen) */
    .rb3-aim { position: absolute; pointer-events: none;
        width: 70px; height: 70px; margin: -35px 0 0 -35px;
        border: 3px solid #fff; border-radius: 50%;
        background: rgba(255,215,80,0.15);
        box-shadow: 0 0 22px rgba(255,215,80,0.6), inset 0 0 14px rgba(255,215,80,0.4);
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; font-weight: 900; color: #fff;
        text-shadow: 0 1px 0 #000; }
    .rb3-aim::after { content: ''; position: absolute; inset: -8px;
        border: 2px dashed rgba(255,255,255,0.45); border-radius: 50%;
        animation: rb3spin 3s linear infinite; }
    @keyframes rb3spin { to { transform: rotate(360deg); } }
    /* Knockout-bevestigingsscherm na een hit */
    .rb3-flash { position: absolute; inset: 0; pointer-events: none;
        z-index: 25;
        background: radial-gradient(ellipse at center, rgba(255,80,40,0.55) 0%, rgba(0,0,0,0) 60%);
        opacity: 0; transition: opacity 0.25s ease; }
    .rb3-flash.show { opacity: 1; }
    /* Skip pill */
    .rb3-skip { position: absolute; z-index: 26;
        top: calc(env(safe-area-inset-top) + 12px);
        right: calc(env(safe-area-inset-right) + 10px);
        padding: 7px 13px; border-radius: 999px;
        background: rgba(0,0,0,0.55); color: #fff;
        font-weight: 800; font-size: 12px; letter-spacing: 0.4px;
        border: 1px solid rgba(255,255,255,0.22); cursor: pointer;
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        -webkit-tap-highlight-color: transparent;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4); pointer-events: auto; }
    .rb3-skip:active { transform: translateY(1px); }
    /* KO/winner overlay */
    .rb3-ko { position: absolute; inset: 0; z-index: 27;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 14px; padding: 24px; text-align: center;
        background: radial-gradient(ellipse at center, rgba(0,0,0,0.78), rgba(0,0,0,0.92));
        animation: fadeIn .25s ease; pointer-events: auto; }
    .rb3-ko h2 { margin: 0; font-size: 32px; font-weight: 900;
        text-shadow: 0 3px 0 #000, 0 0 22px var(--pcol); }
    .rb3-ko p { margin: 0; opacity: 0.9; }
    .rb3-ko .btn-pill { min-height: 52px; padding: 0 22px; border-radius: 999px;
        border: 2px solid rgba(255,215,80,0.6); background: linear-gradient(180deg,#ffd54a,#ff9a1a);
        color: #2a1a00; font-weight: 900; font-size: 16px; cursor: pointer;
        box-shadow: 0 4px 0 #b56a00; -webkit-tap-highlight-color: transparent; }

    .rb-back { position: fixed; inset: 0; z-index: 60;
      background:
        radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 30%, rgba(0,0,0,0.55) 100%),
        linear-gradient(180deg, rgba(10,24,48,0.40) 0%, rgba(5,16,34,0.55) 60%, rgba(2,8,18,0.65) 100%);
      color: #fff; animation: fadeIn .25s ease; user-select: none; overflow: hidden; }
    /* ===== Power meter (alleen zichtbaar tijdens AIM-fase) ===== */
    .rb3-pwr { position: absolute; left: 50%;
        transform: translateX(-50%);
        bottom: calc(env(safe-area-inset-bottom) + 110px);
        display: none; flex-direction: column;
        align-items: center; gap: 5px;
        pointer-events: none; z-index: 23; }
    .rb3-pwr.show { display: flex; }
    .rb3-pwr .meter {
        width: min(260px, 60vw); height: 14px;
        background: rgba(0,0,0,0.6);
        border: 2px solid rgba(255,255,255,0.25);
        border-radius: 999px; overflow: hidden;
        box-shadow: 0 2px 12px rgba(0,0,0,0.45); }
    .rb3-pwr .bar {
        height: 100%; width: 100%;
        background: linear-gradient(90deg, #4ade80 0%, #facc15 50%, #f87171 100%);
        transform: scaleX(0); transform-origin: left;
        transition: transform 0.08s linear; }
    .rb3-pwr .lbl {
        font-size: 11px; font-weight: 800;
        letter-spacing: 0.8px; color: #fff;
        opacity: 0.9; text-transform: uppercase;
        text-shadow: 0 1px 0 rgba(0,0,0,0.5); }

    /* ===== Pin-indicator (linksboven) — diamond met 10 dots ===== */
    .rb3-pingrid { position: absolute;
        top: calc(env(safe-area-inset-top) + 60px); left: 12px;
        padding: 10px 12px; border-radius: 14px;
        background: rgba(15,30,50,0.78);
        border: 2px solid rgba(255,255,255,0.20);
        box-shadow: 0 4px 16px rgba(0,0,0,0.45);
        z-index: 22; user-select: none; pointer-events: none; }
    .rb3-pingrid .lbl {
        font-size: 10px; font-weight: 800; opacity: 0.75;
        text-align: center; margin-bottom: 6px;
        letter-spacing: 0.8px; text-transform: uppercase; }
    .rb3-pingrid .count {
        font-size: 20px; font-weight: 900; text-align: center;
        color: #ffd54a; margin-bottom: 8px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    .rb3-pingrid .grid {
        display: grid; grid-template-columns: repeat(4, 14px);
        gap: 3px; justify-content: center; }
    .rb3-pingrid .dot {
        width: 14px; height: 14px; border-radius: 50%;
        background: rgba(255,255,255,0.10);
        border: 1px solid rgba(255,255,255,0.15);
        transition: all 0.25s ease; }
    .rb3-pingrid .dot.standing {
        background: #fff5e0; border-color: #c89a4a;
        box-shadow: 0 0 6px rgba(255,200,100,0.5); }
    .rb3-pingrid .dot.fallen {
        background: rgba(80,40,20,0.4); border-color: rgba(80,40,20,0.6);
        opacity: 0.4; }
    /* Per-rij offsets om de diamond te krijgen */
    .rb3-pingrid .row { display: flex; gap: 3px; justify-content: center;
        margin-bottom: 3px; }
    .rb3-pingrid .row:last-child { margin-bottom: 0; }
    .rb3-pingrid .row.r2 { padding: 0 9px; }   /* 3 pins → indent 1 */
    .rb3-pingrid .row.r3 { padding: 0 18px; }  /* 2 pins → indent 2 */
    .rb3-pingrid .row.r4 { padding: 0 27px; }  /* 1 pin → indent 3 */

    /* ===== Result text (STRIKE!, SPARE!, etc.) ===== */
    .rb3-result { position: absolute; left: 50%; top: 38%;
        transform: translate(-50%, -50%) scale(0.5);
        pointer-events: none; z-index: 28; opacity: 0;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .rb3-result.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    .rb3-result .txt {
        font-size: 56px; font-weight: 900; letter-spacing: 1px;
        background: linear-gradient(180deg, #ffeb3b, #ff8a3a);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7))
                drop-shadow(0 0 24px rgba(255,200,50,0.6));
        text-align: center;
    }
    .rb3-result.strike .txt {
        background: linear-gradient(180deg, #ffeb3b, #ff5722);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7))
                drop-shadow(0 0 30px rgba(255,80,40,0.8));
    }
    .rb3-result.gutter .txt {
        background: linear-gradient(180deg, #aaa, #555);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7));
    }

    /* ===== Confetti — zelfde idee als de oude bowling app ===== */
    .rb3-confetti { position: absolute; top: -20px; width: 12px; height: 18px;
        opacity: 0.95; pointer-events: none; z-index: 24;
        animation: rb3-confetti-fall linear forwards; }
    @keyframes rb3-confetti-fall {
        0%   { transform: translateY(0) rotate(0); opacity: 1; }
        100% { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
    }

    /* ===== Banner (centre): grote fase-specifieke tekst ===== */
    .rb3-banner { position: absolute; left: 50%; top: 38%;
        transform: translate(-50%, -50%);
        padding: 14px 26px; border-radius: 22px;
        background: rgba(15,30,50,0.82); color: #fff;
        border: 3px solid var(--pcol, #ffd54a);
        box-shadow: 0 8px 30px rgba(0,0,0,0.55),
                    0 0 30px var(--pcol, transparent);
        font-weight: 900; font-size: 28px; letter-spacing: 0.5px;
        text-align: center; line-height: 1.1;
        text-shadow: 0 2px 0 rgba(0,0,0,0.5);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        pointer-events: none; animation: rb3bnPop .35s ease; max-width: 80vw; }
    .rb3-banner small { display: block; font-size: 11px;
        letter-spacing: 1.5px; opacity: 0.7;
        text-transform: uppercase; font-weight: 800;
        margin-bottom: 4px; }
    @keyframes rb3bnPop {
        from { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
        to   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
    }
    /* ===== Toast (centre below banner): kort feedback bericht ===== */
    .rb3-toast { position: absolute; left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        padding: 12px 22px; border-radius: 999px;
        background: rgba(15,30,50,0.88); color: #fff;
        border: 2px solid var(--pcol, #ffd54a);
        box-shadow: 0 6px 22px rgba(0,0,0,0.6),
                    0 0 22px var(--pcol, transparent);
        font-weight: 900; font-size: 22px;
        text-shadow: 0 2px 0 rgba(0,0,0,0.5);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        pointer-events: none; animation: rb3bnPop .25s ease;
        white-space: nowrap; z-index: 24; }

    /* ===== Raft Battle wrapper — full-screen iframe with floating chrome (LEGACY) ===== */
    /* Voor de oude iframe-based versie (`playRaftBattleIframe`). De nieuwe
       3D-in-scene versie gebruikt deze chrome niet. */

    .rb-back::before { content: ""; position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,200,90,0.10), transparent 35%),
        radial-gradient(circle at 80% 90%, rgba(80,160,255,0.10), transparent 40%);
      z-index: 0; }
    /* Iframe fills the entire viewport — fully transparent zodat het 3D-
       eiland van de bord-game scene erdoorheen schijnt. */
    .rb-canvas-wrap { position: absolute; inset: 0; z-index: 1; background: transparent; }
    .rb-canvas-wrap iframe { display: block; position: absolute; inset: 0;
      width: 100%; height: 100%; border: 0; background: transparent; }
    /* Floating header overlay — small, semi-transparent, taps pass through except labels */
    .rb-header { position: absolute; top: 0; left: 0; right: 0; z-index: 3;
      padding: max(8px, env(safe-area-inset-top)) 60px 8px 60px;
      display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;
      background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
      pointer-events: none; }
    .rb-header .rb-title { font-size: 14px; font-weight: 900; letter-spacing: 0.6px;
      text-shadow: 0 2px 0 #000, 0 0 10px rgba(255,200,90,0.45);
      display: flex; align-items: center; gap: 6px; pointer-events: auto; }
    .rb-vs { display: flex; align-items: center; gap: 6px; font-weight: 800; font-size: 12px;
      pointer-events: auto; }
    .rb-vs .chip { padding: 3px 8px; border-radius: 999px;
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.18);
      display: flex; align-items: center; gap: 5px; backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px); }
    .rb-vs .chip .dot { width: 9px; height: 9px; border-radius: 50%;
      background: var(--pcol); box-shadow: 0 0 8px var(--pcol); }
    .rb-vs .x { opacity: 0.55; }
    /* Knockout flash when iframe reports a winner */
    .rb-ko { position: absolute; inset: 0; z-index: 5;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; padding: 20px; text-align: center;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.85), rgba(0,0,0,0.95));
      animation: fadeIn .25s ease; pointer-events: auto; }
    .rb-ko h2 { margin: 0; font-size: 30px; font-weight: 900;
      text-shadow: 0 3px 0 #000, 0 0 20px var(--pcol); }
    .rb-ko p  { margin: 0; opacity: 0.9; }
    .rb-ko .btn-pill { min-height: 50px; padding: 0 22px; border-radius: 999px;
      border: 2px solid rgba(255,215,80,0.6); background: linear-gradient(180deg,#ffd54a,#ff9a1a);
      color: #2a1a00; font-weight: 900; font-size: 16px; cursor: pointer;
      box-shadow: 0 4px 0 #b56a00; -webkit-tap-highlight-color: transparent; }

    /* ===== Shared floating skip pill for fullscreen minigame iframes ===== */
    .mg-skip { position: absolute; z-index: 6;
      top: calc(env(safe-area-inset-top) + 6px); right: 10px;
      padding: 7px 13px; border-radius: 999px;
      background: rgba(0,0,0,0.55); color: #fff;
      font-weight: 800; font-size: 12px; letter-spacing: 0.4px;
      border: 1px solid rgba(255,255,255,0.22); cursor: pointer;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    .mg-skip:active { transform: translateY(1px); }
    /* Long-press hint indicator on Skip */
    .mg-skip::before { content: "⋯"; opacity: 0.7; margin-right: 4px; }
    /* Manual-winner popup that appears on long-press Skip */
    .mg-winpop { position: absolute; z-index: 7;
      top: calc(env(safe-area-inset-top) + 50px); right: 10px;
      padding: 10px; border-radius: 14px;
      background: rgba(10,16,32,0.92); border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.55);
      display: flex; flex-direction: column; gap: 8px; min-width: 200px;
      animation: fadeIn .15s ease; }
    .mg-winpop .lbl { font-size: 11px; opacity: 0.7; text-align: center;
      margin-bottom: 2px; }
    .mg-winpop button { padding: 9px 14px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.25); color: #fff; font-weight: 900;
      font-size: 13px; background: var(--pcol, rgba(0,0,0,0.5)); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
    .mg-winpop button:active { transform: translateY(1px); }
    .mg-winpop button.cancel { background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.15); font-weight: 700; }

    /* ===== Bowling (bw-) and Connect-Four (cf-) — fullscreen iframe overlays ===== */
    .bw-back, .cf-back { position: fixed; inset: 0; z-index: 60;
      color: #fff; animation: fadeIn .25s ease; user-select: none; overflow: hidden; }
    .bw-back { background: linear-gradient(180deg, #082238 0%, #04101e 60%, #020812 100%); }
    .cf-back { background: linear-gradient(180deg, #0f1830 0%, #100820 60%, #050414 100%); }
    .bw-header, .cf-header { position: absolute; top: 0; left: 0; right: 0; z-index: 3;
      padding: max(8px, env(safe-area-inset-top)) 60px 8px 60px;
      display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;
      background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
      pointer-events: none; }
    .bw-header .ttl, .cf-header .ttl { font-size: 14px; font-weight: 900; letter-spacing: 0.6px;
      text-shadow: 0 2px 0 #000, 0 0 10px rgba(255,200,90,0.45);
      display: flex; align-items: center; gap: 6px; pointer-events: auto; }
    .bw-vs, .cf-vs { display: flex; align-items: center; gap: 6px; font-weight: 800;
      font-size: 12px; pointer-events: auto; }
    .bw-vs .chip, .cf-vs .chip { padding: 3px 8px; border-radius: 999px;
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.18);
      display: flex; align-items: center; gap: 5px; backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px); }
    .bw-vs .chip .dot, .cf-vs .chip .dot { width: 9px; height: 9px; border-radius: 50%;
      background: var(--pcol); box-shadow: 0 0 8px var(--pcol); }
    .bw-vs .x, .cf-vs .x { opacity: 0.55; }
    .bw-canvas-wrap, .cf-canvas-wrap { position: absolute; inset: 0; z-index: 1; }
    .bw-canvas-wrap iframe, .cf-canvas-wrap iframe { display: block; position: absolute; inset: 0;
      width: 100%; height: 100%; border: 0; }
    .bw-canvas-wrap iframe { background: #082238; }
    .cf-canvas-wrap iframe { background: #0f1830; }
    .bw-ko, .cf-ko { position: absolute; inset: 0; z-index: 5;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; padding: 20px; text-align: center;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.85), rgba(0,0,0,0.95));
      animation: fadeIn .25s ease; pointer-events: auto; }
    .bw-ko h2, .cf-ko h2 { margin: 0; font-size: 30px; font-weight: 900;
      text-shadow: 0 3px 0 #000, 0 0 20px var(--pcol); }
    .bw-ko p, .cf-ko p  { margin: 0; opacity: 0.9; }
    .bw-ko .btn-pill, .cf-ko .btn-pill { min-height: 50px; padding: 0 22px; border-radius: 999px;
      border: 2px solid rgba(255,215,80,0.6); background: linear-gradient(180deg,#ffd54a,#ff9a1a);
      color: #2a1a00; font-weight: 900; font-size: 16px; cursor: pointer;
      box-shadow: 0 4px 0 #b56a00; -webkit-tap-highlight-color: transparent; }

    /* =============================================================
       Schnaps ruft an (sk-) — fake iOS-style incoming-call screen.
       Ported from schnaps-call.html. Used both as a random in-game
       event (with penalties) and as a standalone home-screen toy.
       z-index 9999 → sits OVER everything (dice overlay, minigames,
       modals — even though in practice we never trigger it during
       a minigame).
       ============================================================= */
    #sk-back { position: fixed; inset: 0;
      display: none; flex-direction: column; align-items: center;
      padding-top: max(60px, env(safe-area-inset-top));
      padding-bottom: max(30px, env(safe-area-inset-bottom));
      background: rgba(20, 20, 22, 0.55);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      backdrop-filter: blur(22px) saturate(180%);
      z-index: 9999;
      color: #fff;
      user-select: none; -webkit-user-select: none;
      animation: sk-slideDown 0.4s cubic-bezier(0.2, 0.9, 0.3, 1); }
    #sk-back.visible { display: flex; }
    @keyframes sk-slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }
    .sk-topInfo { margin-top: 70px; text-align: center; width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; }
    .sk-callType { font-size: 17px; opacity: 0.75; font-weight: 400; margin-bottom: 6px; }
    .sk-callerName { font-size: 34px; font-weight: 500; letter-spacing: -0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    .sk-forPlayer { margin-top: 14px; display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 14px; border-radius: 999px;
      background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.18);
      font-size: 13px; font-weight: 600; }
    .sk-forPlayer .dot { width: 10px; height: 10px; border-radius: 50%;
      background: var(--pcol); box-shadow: 0 0 8px var(--pcol); }
    .sk-avatar { width: 110px; height: 110px; margin: 40px auto 0;
      border-radius: 50%; background: rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 64px; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      animation: sk-pulse 1.2s ease-in-out infinite; }
    @keyframes sk-pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }

    /* ===== Volcano eruption banner ===== */

    .chwazi-back { position: fixed; inset: 0; z-index: 60;

    .chwazi-finger { position: absolute; width: 110px; height: 110px; margin-left: -55px; margin-top: -55px;

    /* ─── 1. De Hete Lavasteen ────────────────────────────────── */

    .lava-head { text-align: center; padding: 4px 8px 8px; z-index: 3; }
    .lava-head h2 { margin: 0; font-size: 20px; font-weight: 900; opacity: 0.92;

    .lava-turn { display: flex; align-items: center; justify-content: center; gap: 10px;
      margin: 10px auto; padding: 10px 20px; border-radius: 999px;

      max-width: 90%; }
    .lava-turn .dot { width: 14px; height: 14px; border-radius: 50%;

      justify-content: center; min-height: 0; }
    /* De steen — gloed schaalt met --heat (0..1). Roken via ::before. */
    .lava-rock {
      --heat: 0;
      width: min(60vw, 280px); aspect-ratio: 1; position: relative;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%,
        hsl(calc(50deg - var(--heat) * 50deg), 90%, calc(60% - var(--heat) * 15%)) 0%,
        hsl(calc(30deg - var(--heat) * 30deg), 95%, calc(45% - var(--heat) * 15%)) 35%,
        hsl(calc(15deg - var(--heat) * 15deg), 95%, calc(28% - var(--heat) * 10%)) 70%,
        #2a0a00 100%);
      box-shadow:
        0 0 calc(20px + var(--heat) * 80px) calc(8px + var(--heat) * 30px)
            hsla(calc(30deg - var(--heat) * 30deg), 100%, 55%, calc(0.4 + var(--heat) * 0.5)),
        inset 0 -8px 16px rgba(0,0,0,0.5),
        inset 0 4px 12px rgba(255,200,80,calc(0.2 + var(--heat) * 0.4));
      animation: lava-shake calc(0.5s - var(--heat) * 0.4s) infinite;
      transition: box-shadow 0.4s ease;
    }
    .lava-rock::before {
      content: ''; position: absolute; inset: -20px; pointer-events: none;
      background: radial-gradient(circle at 50% 70%,
        rgba(80,40,20, calc(var(--heat) * 0.5)) 0%, transparent 60%);
      filter: blur(12px); opacity: var(--heat);
    }
    .lava-rock::after {
      content: ''; position: absolute; left: 50%; bottom: 100%;
      width: 60%; height: 80px; transform: translateX(-50%);
      background: radial-gradient(ellipse at 50% 100%,
        rgba(200,200,200,0.4) 0%, rgba(150,150,150,0.2) 30%, transparent 70%);
      filter: blur(8px); opacity: calc(var(--heat) * 0.9);
      animation: smoke-rise 2s ease-out infinite;
    }
    @keyframes lava-shake {
      0%, 100% { transform: translate(0,0) rotate(0); }
      25% { transform: translate(calc(var(--heat) * 4px), calc(var(--heat) * -2px)) rotate(calc(var(--heat) * 1deg)); }
      50% { transform: translate(calc(var(--heat) * -3px), calc(var(--heat) * 3px)) rotate(calc(var(--heat) * -1deg)); }
      75% { transform: translate(calc(var(--heat) * 2px), calc(var(--heat) * -3px)) rotate(calc(var(--heat) * 0.5deg)); }
    }
    @keyframes smoke-rise {
      0% { transform: translate(-50%, 20%) scale(1); opacity: var(--heat); }
      100% { transform: translate(-50%, -30%) scale(1.4); opacity: 0; }
    }
    .lava-tap { position: absolute; left: 50%; bottom: 14%; transform: translateX(-50%);
      padding: 16px 38px; border-radius: 999px; font-weight: 900; font-size: 18px;
      background: linear-gradient(180deg, #ffd54a, #ff9a1a); color: #2a1a00;
      border: 2px solid rgba(255,215,80,0.7); box-shadow: 0 6px 0 #b56a00;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      animation: pulse-grow 1.4s ease-in-out infinite; }
    .lava-tap:active { transform: translateX(-50%) translateY(3px);
      box-shadow: 0 3px 0 #b56a00; }
    @keyframes pulse-grow {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.04); }
    }
    .lava-explosion {
      position: absolute; inset: 0; pointer-events: none; z-index: 10;
      background: radial-gradient(circle at 50% 50%,
        rgba(255,200,50,0.9) 0%, rgba(255,80,0,0.7) 25%, rgba(120,20,0,0.4) 55%, transparent 80%);
      animation: lava-boom 0.7s ease-out forwards;
    }
    @keyframes lava-boom {
      0% { transform: scale(0.2); opacity: 0; }
      30% { opacity: 1; }

    }
    .lava-result { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);

    /* ─── 2. De Kano Race ─────────────────────────────────────── */
    .kano-back { position: fixed; inset: 0; z-index: 60;

        radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 30%, rgba(0,0,0,0.40) 95%),

    /* De kano */
    .kano-boat { position: absolute; left: 50%; bottom: 80px; transform: translateX(-50%);

    .kano-boat::before {

        linear-gradient(180deg, #8b5a2b 0%, #6d4c41 100%);

    .kano-boat::after {

    .kano-taps { position: absolute; top: 50%; right: 14px; transform: translateY(-50%);

    .kano-overlay { position: absolute; inset: 0; display: flex; align-items: center;

    /* ─── 3. Krabben Vangen ───────────────────────────────────── */
    .krab-back { position: fixed; inset: 0; z-index: 60;
      background:
        radial-gradient(ellipse at 50% 80%, #1a6090 0%, #0a3a60 35%, #051a30 100%);

    .krab-back.is3d .krab-stage { background: transparent; box-shadow: none; }

        radial-gradient(ellipse at 50% 100%, #fde08c 0%, #e0b56a 40%, #b88a3a 100%);
      border-radius: 24px; box-shadow: inset 0 6px 24px rgba(0,0,0,0.35);
      overflow: hidden; }
    /* Wat zandkorrel-textuur */
    .krab-stage::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.25) 0%, transparent 1.5%),
        radial-gradient(circle at 60% 50%, rgba(0,0,0,0.10) 0%, transparent 1%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.20) 0%, transparent 1.2%),
        radial-gradient(circle at 30% 70%, rgba(0,0,0,0.12) 0%, transparent 1.4%),

      background: radial-gradient(ellipse at 50% 40%, #2a1a00 0%, #5a3a1a 60%, #8a6a3a 100%);

    .krab-dust { position: absolute; pointer-events: none; transform: translate(-50%, -50%);

      background: radial-gradient(circle, rgba(255,240,210,0.7) 0%, transparent 70%);

    /* Floating roll number animation */

    /* =============================================================
       Mystery Wheel 3D (mw-) — universal minigame picker
       =============================================================
       Het rad zelf is een echt 3D object in de bordspel-scène, op

    .mw-back { position: fixed; inset: 0; z-index: 60; overflow: hidden;

        linear-gradient(180deg, rgba(5,8,32,0.50) 0%, rgba(5,8,32,0.05) 22%, rgba(5,8,32,0.05) 78%, rgba(5,8,32,0.55) 100%); }

<script type="importmap">
{

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'OrbitControls';

// ════════════════════════════════════════════════════════════
//  PORTRAIT-ONLY GUARD
// ════════════════════════════════════════════════════════════
const portraitGuardEl = document.getElementById('portrait-guard');
function checkOrientation() {
    if (!portraitGuardEl) return;
    const isLandscape = window.innerWidth > window.innerHeight;
    const isMobileSize = Math.min(window.innerWidth, window.innerHeight) < 720;
    if (isLandscape && isMobileSize) portraitGuardEl.classList.add('show');
    else portraitGuardEl.classList.remove('show');
}
window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', checkOrientation);
checkOrientation();

/* ============================================================
   VOLKAAN EILAND — Wii Party stijl
   ============================================================
   Architectuur (van groot naar klein):
     1.  Renderer / Camera / Controls
     2.  Toon-shading helpers (gradient ramp + zwarte outlines)
     3.  Gedeelde materialen & geometrieën
     4.  Water laag (diep + ondiep + foam ringen + sparkles)
     5.  Eilanden (hoofdeiland + satellieten, deformed cylinders)
     6.  Vulkaan (cone + crater + lava + scheuren + rook)
     7.  Houten bruggen tussen eilanden
     8.  Bordspel pad (Catmull-Rom curve, 6 kleur-typen)
     9.  Decoratie (palmen, bushes, bloemen, gras, tiki, rotsen)
    10.  Atmosphere (wolken, vogels, pollen, zon glow)
    11.  Animatie loop (camera idle-rotate, water, lava, vlammen)
   ============================================================ */


/* ─────────────────────────────────────────────
   1. SCENE / RENDERER / CAMERA / CONTROLS
   ───────────────────────────────────────────── */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fd9ff);
scene.fog = new THREE.Fog(0xbfe6ff, 55, 140);

const camera = new THREE.PerspectiveCamera(
    42,
    window.innerWidth / window.innerHeight,
    0.1,
    400
);
camera.position.set(34, 26, 34);

const renderer = new THREE.WebGLRenderer({
    antialias: true,
    powerPreference: "high-performance"
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.055;                    // was 0.08 — meer glide, minder stug
controls.minDistance = 22;
controls.maxDistance = 70;
controls.maxPolarAngle = Math.PI / 2.1;            // never below water
controls.minPolarAngle = Math.PI / 6;
controls.target.set(0, 8, 0);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.22;                   // was 0.35 — rustiger panoramic drift
controls.rotateSpeed = 0.75;                       // iets gevoeliger sleep-respons
controls.zoomSpeed = 0.85;                         // soepelere zoom

// pause auto-rotate while the user is interacting, resume after idle
let idleTimer = null;
controls.addEventListener('start', () => {
    controls.autoRotate = false;
    if (idleTimer) clearTimeout(idleTimer);
});
controls.addEventListener('end', () => {
    if (idleTimer) clearTimeout(idleTimer);
    idleTimer = setTimeout(() => controls.autoRotate = true, 4500);   // was 4000
});

function makeToonGradient() {
    // 5 stops → chunky cell-shaded look
    const colors = new Uint8Array([55, 130, 195, 230, 255]);
    const t = new THREE.DataTexture(colors, colors.length, 1, THREE.RedFormat);
    t.needsUpdate = true;
    return t;
}
const toon = makeToonGradient();

// Inverse-hull outline trick: duplicate mesh, scale slightly larger, render backfaces in black.
function addOutline(mesh, scale = 1.05, color = 0x101820) {
    const outline = new THREE.Mesh(
        mesh.geometry,
        new THREE.MeshBasicMaterial({ color, side: THREE.BackSide })
    );
    outline.scale.multiplyScalar(scale);
    outline.renderOrder = -1;
    mesh.add(outline);
    return outline;
}

// deform a cylinder geometry radially using stable angular noise → chunky natural silhouette
function deformCylinder(geo, amount = 0.5) {
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const z = pos.getZ(i);
        const r = Math.sqrt(x * x + z * z);
        if (r > 0.1) {
            const a = Math.atan2(z, x);
            const n = (Math.sin(a * 3) * 0.5 + Math.cos(a * 5) * 0.3 + Math.sin(a * 7 + 1.2) * 0.2);
            const newR = r + n * amount;
            pos.setX(i, Math.cos(a) * newR);
            pos.setZ(i, Math.sin(a) * newR);
        }
    }
    geo.computeVertexNormals();
    return geo;
}

// foam ring around an island (semi-transparent white)
function addFoamRing(parent, innerR, outerR, segments = 48) {
    const ring = new THREE.Mesh(
        new THREE.RingGeometry(innerR, outerR, segments),
        MAT.foam.clone()
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.12;
    parent.add(ring);
    return ring;
}

function makeSatelliteIsland(x, z, radiusScale = 1, rotation = 0) {
    const g = new THREE.Group();
    g.position.set(x, 0, z);
    g.rotation.y = rotation;
    scene.add(g);

    const baseR1 = 3.5 * radiusScale;
    const baseR2 = 5.0 * radiusScale;

    // underwater base
    const b = new THREE.Mesh(
        deformCylinder(new THREE.CylinderGeometry(baseR1 + 0.5, baseR2, 3, 16), 0.6),
        MAT.cliffDark
    );
    b.position.y = -1.2;
    g.add(b);

    // beach
    const bch = new THREE.Mesh(
        deformCylinder(new THREE.CylinderGeometry(baseR1 - 0.3, baseR1 + 0.2, 1.0, 16), 0.4),
        MAT.sand
    );
    bch.position.y = 0.55;
    bch.castShadow = true;
    bch.receiveShadow = true;
    g.add(bch);
    addOutline(bch, 1.015);

    // grass top
    const gr = new THREE.Mesh(
        deformCylinder(new THREE.CylinderGeometry(baseR1 - 1.2, baseR1 - 0.3, 1.4, 14), 0.35),
        MAT.grass
    );
    gr.position.y = 1.7;
    gr.castShadow = true;
    gr.receiveShadow = true;
    g.add(gr);
    addOutline(gr, 1.018);

    // little secondary bump for character
    const bump = new THREE.Mesh(
        deformCylinder(new THREE.CylinderGeometry(baseR1 * 0.4, baseR1 * 0.55, 0.9, 12), 0.25),
        MAT.grassDark
    );
    bump.position.set((Math.random()-0.5) * 1.2, 2.6, (Math.random()-0.5) * 1.2);
    g.add(bump);

    // foam ring
    animatedFoam.push(addFoamRing(g, baseR1 - 0.2, baseR1 + 1.0, 32));

    return { group: g, x, z, radius: baseR1, topY: 2.4 };
}

(function buildBananaBrig() {

    const baseY = 2.4;             // top van het gras-eiland (zie return van makeSatelliteIsland)

    if (g.children.length > 3) {
        const bump = g.children[3];
        g.remove(bump);
        if (bump.geometry) bump.geometry.dispose();
    }

    // ── Materialen ── (Wii-toon, gradient ramp, met outlines)
    const matBamboo      = new THREE.MeshToonMaterial({ color: 0xd4a86a, gradientMap: toon,
                                                          emissive: 0x6d4c2a, emissiveIntensity: 0.06 });
    const matBambooDark  = new THREE.MeshToonMaterial({ color: 0x8a5e2f, gradientMap: toon });
    const matThatch      = new THREE.MeshToonMaterial({ color: 0xc89a4a, gradientMap: toon });
    const matThatchDark  = new THREE.MeshToonMaterial({ color: 0x8a682a, gradientMap: toon });
    const matBanana      = new THREE.MeshToonMaterial({ color: 0xffd84a, gradientMap: toon,
                                                          emissive: 0xffaa00, emissiveIntensity: 0.18 });

    const matApeEye      = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const matLockGold    = new THREE.MeshToonMaterial({ color: 0xffd54a, gradientMap: toon,
                                                          emissive: 0xc8881a, emissiveIntensity: 0.4 });
    const matPlank       = new THREE.MeshToonMaterial({ color: 0x8a5a30, gradientMap: toon });
    const matStone       = new THREE.MeshToonMaterial({ color: 0x6a6068, gradientMap: toon });

    // ── 1. Stenen plateau onder de kooi (om hoogteverschil te verbergen)
    const plateau = new THREE.Mesh(
        deformCylinder(new THREE.CylinderGeometry(2.0, 2.2, 0.45, 14), 0.25),
        matStone);
    plateau.position.set(cx, baseY + 0.25, cz);
    plateau.castShadow = true; plateau.receiveShadow = true;
    g.add(plateau);
    addOutline(plateau, 1.015);

    // ── 2. De Kooi (bamboe-tralies in cirkel + ringen onder/boven) ──
    const cage = new THREE.Group();
    cage.position.set(cx, baseY + 0.45, cz);
    g.add(cage);

    const BAR_COUNT = 18;            // dichter: 18 tralies (was 10)
    const BAR_RADIUS = 1.55;
    const BAR_HEIGHT = 2.4;
    const BAR_THICKNESS = 0.11;      // dikker (was 0.085)
    // Tralies, met een klein gat ervoor (de "deur" — alleen 1 traliel overslaan)
    // Lokaal +Z is richting hoofdeiland — daar zit de deur-opening
    for (let i = 0; i < BAR_COUNT; i++) {
        const a = (Math.PI * 2 / BAR_COUNT) * i;
        // Skip alleen de centrale voor-traliel (smalle deur-opening)
        if (i === 0) continue;
        const bar = new THREE.Mesh(
            new THREE.CylinderGeometry(BAR_THICKNESS, BAR_THICKNESS, BAR_HEIGHT, 7),
            matBamboo);
        bar.position.set(Math.cos(a) * BAR_RADIUS, BAR_HEIGHT / 2, Math.sin(a) * BAR_RADIUS);
        bar.castShadow = true;
        cage.add(bar);
        // Bamboe-knopen op elke tralie (4 knopen verticaal, dikker)
        for (let k = 0; k < 4; k++) {
            const knot = new THREE.Mesh(
                new THREE.TorusGeometry(BAR_THICKNESS * 1.35, 0.035, 5, 10),
                matBambooDark);
            knot.rotation.x = Math.PI / 2;
            knot.position.set(bar.position.x, 0.3 + k * 0.6, bar.position.z);
            cage.add(knot);
        }
    }
    // Horizontale bindstrengen op 3 hoogtes — geven het ECHT een kooi-look
    for (const ringY of [0.55, 1.20, 1.85]) {
        const ring = new THREE.Mesh(
            new THREE.TorusGeometry(BAR_RADIUS + 0.04, 0.045, 5, 22, Math.PI * 1.85),
            matBambooDark);
        ring.rotation.x = Math.PI / 2;
        // Rotatie zo dat de opening in de ring samenvalt met de deur-opening (+Z)
        ring.rotation.z = -Math.PI * 0.075;
        ring.position.y = ringY;
        cage.add(ring);
    }
    // Bovenring (volledig, dikker)
    const ringTop = new THREE.Mesh(
        new THREE.TorusGeometry(BAR_RADIUS, 0.11, 6, 22),
        matBambooDark);
    ringTop.rotation.x = Math.PI / 2;
    ringTop.position.y = BAR_HEIGHT;
    ringTop.castShadow = true;
    cage.add(ringTop);
    // Onderring — volledig nu (geen open gat onder)
    const ringBot = new THREE.Mesh(
        new THREE.TorusGeometry(BAR_RADIUS, 0.11, 6, 22),
        matBambooDark);
    ringBot.rotation.x = Math.PI / 2;
    ringBot.position.y = 0.05;
    cage.add(ringBot);

    // ── 3. Rieten dak (kegel op de kooi) ──
    const roof = new THREE.Mesh(
        new THREE.ConeGeometry(BAR_RADIUS + 0.25, 1.3, 12),

    roof.position.y = BAR_HEIGHT + 0.55;
    roof.castShadow = true;

            new THREE.BoxGeometry(0.05, 1.4, 0.05),

        rib.lookAt(0, BAR_HEIGHT + 1.2, 0);
        cage.add(rib);
    }
    // Gouden bol op de top (voor flair)
    const finial = new THREE.Mesh(
        new THREE.SphereGeometry(0.14, 8, 6),
        matLockGold);
    finial.position.y = BAR_HEIGHT + 1.25;
    cage.add(finial);

    // ── 4. Gouden hangslot bij de deuropening ──
    const lockGroup = new THREE.Group();
    lockGroup.position.set(0, 1.0, BAR_RADIUS + 0.18);
    cage.add(lockGroup);
    const lockBody = new THREE.Mesh(
        new THREE.BoxGeometry(0.36, 0.42, 0.18),

    lockBody.castShadow = true;
    lockGroup.add(lockBody);
    addOutline(lockBody, 1.06);
    const lockShackle = new THREE.Mesh(
        new THREE.TorusGeometry(0.13, 0.04, 5, 10, Math.PI),

    lockShackle.position.y = 0.27;

    // ── 5. Banana stash voor de kooi (4 trossen op een hoop) ──
    function makeBananaBunch(x, z, scale = 1, rotY = 0) {
        const bunch = new THREE.Group();
        bunch.position.set(x, baseY + 0.5, z);

function makeCrack(angle, length, startY, segments = 4) {
    const g = new THREE.Group();
    for (let i = 0; i < segments; i++) {
        const t = i / segments;
        // radius interpolates with the cone (top r=1.6, bot r=3.2; cone spans y 5.9 → 12.4)
        const localY = startY - t * length;
        const heightFrac = 1 - (localY - 5.9) / 6.5;  // 0 top, 1 bottom
        const radius = 1.65 + heightFrac * 1.6 + 0.04;
        const seg = new THREE.Mesh(
            new THREE.PlaneGeometry(0.22 + Math.random() * 0.1, length / segments * 1.15),
            crackMat
        );
        const a = angle + (Math.sin(i * 1.7) * 0.06);
        seg.position.set(Math.cos(a) * radius, localY - length / segments / 2, Math.sin(a) * radius);
        seg.lookAt(seg.position.x * 2.2, seg.position.y, seg.position.z * 2.2);
        g.add(seg);
    }
    volcano.add(g);
    return g;
}

function makeBridge(from, to, width = 1.3, withRails = true) {
    const g = new THREE.Group();
    const dir = new THREE.Vector3().subVectors(to, from);
    const len = dir.length();
    const numPlanks = Math.max(3, Math.floor(len / 0.55));

    // central walkway line
    const walkway = new THREE.Mesh(
        new THREE.BoxGeometry(width, 0.18, len),
        MAT.woodLight
    );
    const mid = new THREE.Vector3().lerpVectors(from, to, 0.5);
    walkway.position.copy(mid);
    walkway.lookAt(to.x, mid.y, to.z);
    walkway.castShadow = true;
    walkway.receiveShadow = true;
    g.add(walkway);

    // plank stripes on top (decorative)
    for (let i = 0; i < numPlanks; i++) {
        const t = (i + 0.5) / numPlanks;
        const plank = new THREE.Mesh(
            new THREE.BoxGeometry(width * 1.02, 0.08, 0.35),
            MAT.wood
        );
        const pos = new THREE.Vector3().lerpVectors(from, to, t);
        plank.position.copy(pos);
        plank.position.y += 0.11;
        plank.lookAt(to.x, plank.position.y, to.z);
        g.add(plank);
    }

    // rope-style railings
    if (withRails) {
        const perp = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();
        for (const side of [-1, 1]) {
            const rail = new THREE.Mesh(
                new THREE.CylinderGeometry(0.04, 0.04, len, 6),
                MAT.wood
            );
            rail.position.copy(mid).addScaledVector(perp, side * width / 2);
            rail.position.y += 0.45;
            rail.lookAt(rail.position.x + dir.x, rail.position.y, rail.position.z + dir.z);
            rail.rotateX(Math.PI / 2);
            g.add(rail);
            // little posts every plank
            for (let i = 0; i < numPlanks; i += 2) {
                const t = (i + 0.5) / numPlanks;
                const post = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.05, 0.05, 0.6, 6),
                    MAT.wood
                );
                post.position.copy(new THREE.Vector3().lerpVectors(from, to, t))
                    .addScaledVector(perp, side * width / 2);
                post.position.y += 0.25;
                g.add(post);
            }
        }
    }

    scene.add(g);
    return g;
}

const NUM_TILES = 56;  // re-tuned so tile spacing reads as one step apart
const tiles = [];

// ── Tile type system ── (Wii Party Volcano Island inspired)
//   Special tiles placed at fixed indices for predictability.
//   Filler tiles become +/-/drink action tiles instead of doing nothing.
const SPECIAL_TILES = {
    15: 'bluestatue',   // mid-game jackpot — huge boost
    19: 'tornado',      // pick a victim, blow them back
    23: 'ufo',          // swap places with another player
    30: 'skull',        // 🌋 Volcano Verbanning — sucked to Banana Brig prison
    32: 'bluestatue',   // second jackpot
    37: 'tornado',
    43: 'ufo',
    47: 'redstatue',    // late-game cruel knockback
};

function tileTypeFor(i) {
    if (i === 0)                          return 'start';
    if (i >= NUM_TILES - 6 && i < NUM_TILES - 1) return 'lava';
    if (SPECIAL_TILES[i])                 return SPECIAL_TILES[i];
    // Chwazi stays its own thing — different mechanic (random drinker).
    if (i > 0 && i % 9 === 0)             return 'chwazi';
    // All other minigame tiles (formerly krokodil/paddle/tappy/volcanoHop) now
    // funnel into a single 'mystery' tile that spins a wheel to pick the
    // minigame. The old modulo positions are merged so the board stays varied.
    if (i > 0 && (i % 13 === 0 || i % 11 === 0 || i % 7 === 0 || i % 17 === 0)) return 'mystery';
    // Convert "filler" tiles into action tiles based on a stable hash:
    const r = (Math.sin(i * 9.13) * 0.5 + 0.5);
    if (r < 0.40)                         return 'plus';   // blue → lucky +2
    else if (r < 0.72)                    return 'minus';  // red  → unlucky -2
    else                                  return 'drink';  // green → cheers tile
}

        e1.position.set(-0.10, 0.74, 0.27); tile.add(e1);
        const e2 = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 6), eyeMat);
        e2.position.set( 0.10, 0.74, 0.27); tile.add(e2);
        bobMesh = skullHead;
    }
    else if (type === 'plus' || type === 'minus' || type === 'drink') {
        // Small floating icon sprite (a thin coloured "post" sticking up)
        const isPlus  = type === 'plus';
        const isMinus = type === 'minus';
        const colHex  = isPlus ? 0x9eeaff : isMinus ? 0xffaaaa : 0xc8ffd6;
        const emHex   = isPlus ? 0x4da6ff : isMinus ? 0xff5c5c : 0x5cff7a;
        const postMat = new THREE.MeshToonMaterial({
            color: colHex, gradientMap: toon,
            emissive: emHex, emissiveIntensity: 0.9,
        });
        const post = new THREE.Mesh(new THREE.SphereGeometry(0.18, 10, 8), postMat);
        post.position.y = 0.85;
        tile.add(post);
        bobMesh = post;
    }

    scene.add(tile);
    tiles.push({
        mesh: tile,
        baseY: pos.y,
        phase: i * 0.35,
        baseEmissive: mat.emissiveIntensity,
        bobMesh,           // optional decoration that bobs
        type,
    });
}
