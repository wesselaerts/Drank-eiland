/**
 * Open the full-screen Avatar Creator.
 * @param {object} initial Starting avatar (will be cloned, not mutated)
 * @param {string} title E.g. "Avatar voor Speler 1"
 * @returns {Promise<object|null>} The edited avatar, or null if cancelled
 */
function openAvatarCreator(initial, title = 'Avatar Creator') {
    return new Promise(resolve => {
        // Deep-clone so cancel really discards changes
        const a = JSON.parse(JSON.stringify(initial || defaultAvatar(0)));
        let currentCat = AVATAR_CATEGORIES[0];

        const host = document.getElementById('game-ui');
        const back = el('div', { className: 'av-back' });

        // ── Header
        const head = el('div', { className: 'av-head' });
        head.append(
            el('div', { className: 'av-title' }, title),
            el('button', { className: 'av-close', type: 'button',
                on: { click: () => finish(null) } }, '✕'),
        );

        // ── Big preview
        const preview = el('div', { className: 'av-preview' });
        const previewSVG = el('div', { className: 'av-svg-wrap' });
        preview.append(previewSVG);

        // ── Top-action row: random + reset
        const topActs = el('div', { className: 'av-top-actions' });
        const btnRand = el('button', { className: 'av-action-btn', type: 'button',
            on: { click: () => {
                const rand = randomAvatar();
                // keep outfit close to the player's identity if the original had a fixed outfit
                Object.assign(a, rand);
                refresh();
            } } });
        btnRand.append(el('span', { className: 'e' }, '🎲'), document.createTextNode(' Random'));
        const btnReset = el('button', { className: 'av-action-btn', type: 'button',
            on: { click: () => {
                Object.assign(a, JSON.parse(JSON.stringify(initial || defaultAvatar(0))));
                refresh();
            } } });
        btnReset.append(el('span', { className: 'e' }, '↺'), document.createTextNode(' Reset'));
        topActs.append(btnRand, btnReset);

        // ── Category tab-strip (horizontal scroll)
        const catStrip = el('div', { className: 'av-tabs' });
        for (const cat of AVATAR_CATEGORIES) {
            const tab = el('button', { className: 'av-tab', type: 'button',
                on: { click: () => { currentCat = cat; refresh(); } } });
            tab.append(
                el('div', { className: 'av-tab-emoji' }, cat.emoji),
                el('div', { className: 'av-tab-label' }, cat.label),
            );
            tab.dataset.cat = cat.id;
            catStrip.append(tab);
        }

        // ── Options carousel
        const optWrap = el('div', { className: 'av-options-wrap' });
        const optScroll = el('div', { className: 'av-options' });
        optWrap.append(optScroll);

        // ── Palette (color swatches, shown only when category has palette)
        const paletteWrap = el('div', { className: 'av-palette-wrap' });
        const paletteLabel = el('div', { className: 'av-palette-label' });
        const paletteRow = el('div', { className: 'av-palette' });
        paletteWrap.append(paletteLabel, paletteRow);

        // ── Footer (Cancel / Save)
        const foot = el('div', { className: 'av-foot' });
        const cancel = el('button', { className: 'av-btn ghost', type: 'button',
            on: { click: () => finish(null) } }, '✕  Annuleren');
        const save = el('button', { className: 'av-btn gold', type: 'button',
            on: { click: () => finish(a) } }, '✓  Opslaan');
        foot.append(cancel, save);

        back.append(head, preview, topActs, catStrip, optWrap, paletteWrap, foot);
        host.append(back);

        // ── refresh: re-render preview, options, palette
        function refresh() {
            // preview
            previewSVG.innerHTML = renderAvatarSVG(a, 'full');
            previewSVG.firstChild?.classList?.add('av-bounce');

            // active tab
            for (const t of catStrip.querySelectorAll('.av-tab')) {
                t.classList.toggle('active', t.dataset.cat === currentCat.id);
            }
            // Scroll active tab into view
            const activeTab = catStrip.querySelector('.av-tab.active');
            if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

            // options
            clear(optScroll);
            const currentVal = currentCat.get(a);
            for (const opt of currentCat.options) {
                const card = el('button', { className: 'av-opt' + (opt.value === currentVal ? ' active' : ''), type: 'button',
                    on: { click: () => { currentCat.set(a, opt.value); refresh(); } } });
                // mini preview: clone the avatar and apply just this option
                const mini = JSON.parse(JSON.stringify(a));
                currentCat.set(mini, opt.value);
                card.innerHTML = `<div class="av-opt-thumb">${renderAvatarSVG(mini, 'head')}</div>
                    <div class="av-opt-lbl">${avlbl(opt.value)}</div>`;
                optScroll.append(card);
            }
            // Scroll active option into view
            const activeOpt = optScroll.querySelector('.av-opt.active');
            if (activeOpt) activeOpt.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

            // palette
            if (currentCat.palette) {
                paletteWrap.style.display = '';
                paletteLabel.textContent = currentCat.paletteLabel || 'Kleur';
                clear(paletteRow);
                const curColor = currentCat.getColor(a);
                for (const col of currentCat.palette) {
                    const sw = el('button', { className: 'av-sw' + (col === curColor ? ' active' : ''), type: 'button',
                        on: { click: () => { currentCat.setColor(a, col); refresh(); } } });
                    sw.style.background = col;
                    paletteRow.append(sw);
                }
            } else {
                paletteWrap.style.display = 'none';
            }
        }

        function finish(result) {
            back.style.transition = 'opacity 0.25s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(result); }, 250);
        }

        refresh();
    });
}

/* ═══════════════════════════════════════════════════════════════════════════
   3D BOARD TOKEN — avatar-aware version
   Replaces the all-color cone+sphere with: dark base + colored cone body +
   billboard sprite head rendered from the avatar SVG. Falls back to the
   classic look if `avatar` is null/undefined.
   ═══════════════════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════════════════
   3D AVATAR HEAD — built from THREE.js primitives
   ───────────────────────────────────────────────────────────────────────────
   Geen platte sprite meer. Het hoofd is een 3D bol in huidskleur met dark
   outlines, en alle features (ogen, mond, neus, brauwen, blush, haar,
   accessoires) zijn echte 3D meshes. Past visueel beter in de 3D-scene en
   lost het "vierkante achtergrond" probleem op. Hair-styles zijn gegroepeerd
   in archetypes (short/long/ponytail/buns/etc) zodat we niet voor elke van
   de 20 SVG-stijlen een aparte 3D-build nodig hebben.
   ═══════════════════════════════════════════════════════════════════════════ */

// Hex string → THREE color int
function parseHexColor(hex, fallback = 0xffffff) {
    if (!hex || typeof hex !== 'string') return fallback;
    const h = hex.replace('#', '');
    const n = parseInt(h, 16);
    return Number.isNaN(n) ? fallback : n;
}

// Cached materials per color/type. Otherwise we'd make tons of duplicates.
const _avMatCache = new Map();
function avMat(type, color) {
    const key = type + ':' + color;
    if (_avMatCache.has(key)) return _avMatCache.get(key);
    let m;
    if (type === 'skin') {
        m = new THREE.MeshToonMaterial({ color, gradientMap: toon, emissive: color, emissiveIntensity: 0.10 });
    } else if (type === 'hair') {
        m = new THREE.MeshToonMaterial({ color, gradientMap: toon, emissive: color, emissiveIntensity: 0.05 });
    } else if (type === 'acc') {
        m = new THREE.MeshToonMaterial({ color, gradientMap: toon, emissive: color, emissiveIntensity: 0.20 });
    } else if (type === 'dark') {
        m = new THREE.MeshBasicMaterial({ color: 0x1a1010 });
    } else if (type === 'white') {
        m = new THREE.MeshBasicMaterial({ color: 0xffffff });
    } else if (type === 'outline') {
        m = new THREE.MeshBasicMaterial({ color: 0x1a1010, side: THREE.BackSide });
    } else if (type === 'flat') {
        m = new THREE.MeshBasicMaterial({ color });
    } else {
        m = new THREE.MeshToonMaterial({ color, gradientMap: toon });
    }
    _avMatCache.set(key, m);
    return m;
}

// Add a dark cartoon outline to a mesh (BackSide trick).
function add3DOutline(mesh, scale = 1.07) {
    const out = new THREE.Mesh(mesh.geometry, avMat('outline'));
    out.scale.setScalar(scale);
    mesh.add(out);
    return out;
}

// Non-uniform scale on head sphere for face-shape variety
function applyFaceShapeScale(head, faceShape) {
    switch (faceShape) {
        case 'round':    head.scale.set(1, 1, 1); break;
        case 'oval':     head.scale.set(0.93, 1.08, 1); break;
        case 'long':     head.scale.set(0.88, 1.16, 0.96); break;
        case 'chubby':   head.scale.set(1.14, 0.95, 1.08); break;
        case 'square':   head.scale.set(1.06, 1.00, 1.02); break;
        case 'heart':    head.scale.set(1.10, 1.04, 1.00); break;
        case 'pointed':  head.scale.set(0.96, 1.12, 1.00); break;
        case 'diamond':  head.scale.set(0.88, 1.08, 1.00); break;
        case 'triangle': head.scale.set(1.08, 1.04, 1.00); break;
        case 'narrow':   head.scale.set(0.84, 1.08, 0.94); break;
        case 'wide_jaw': head.scale.set(1.06, 0.98, 1.04); break;
        case 'soft':     head.scale.set(1.02, 1.00, 1.02); break;
        case 'angular':  head.scale.set(1.00, 1.05, 0.94); break;
        case 'baby':     head.scale.set(0.96, 0.94, 0.98); break;
        default:         head.scale.set(1, 1, 1);
    }
}

// ── EYES (3D) ──────────────────────────────────────────────────────────
function addEyes3D(parent, eyes, headR) {
    const shape = eyes?.shape || 'normal';
    const irisColor = parseHexColor(eyes?.color || '#3a2418');
    const xOff = headR * 0.32;
    const y    = headR * 0.15;
    const z    = headR * 0.93;

    // For "closed-like" eyes, just a dark curved line
    const isClosed = ['closed', 'wink', 'sleepy', 'tired', 'cute_lashed'].includes(shape);

    for (const side of [-1, 1]) {
        if (isClosed && (shape !== 'wink' || side === 1)) {
            // a small dark torus arc as a closed eye
            const eye = new THREE.Mesh(
                new THREE.TorusGeometry(0.04, 0.008, 4, 8, Math.PI),
                avMat('dark')
            );
            eye.position.set(side * xOff, y, z);
            eye.rotation.z = shape === 'tired' ? 0 : Math.PI;
            parent.add(eye);
            continue;
        }

        // Standard 3D eye: small white flat sphere + dark pupil
        const isBig = ['big', 'glamour', 'star', 'sparkle'].includes(shape);
        const isDot = shape === 'dot';
        const isSquare = shape === 'square';

        const whiteR = isBig ? 0.058 : 0.045;
        let whiteGeo;
        if (isSquare) {
            whiteGeo = new THREE.BoxGeometry(whiteR * 2, whiteR * 2, whiteR * 0.6);
        } else {
            whiteGeo = new THREE.SphereGeometry(whiteR, 12, 10);
        }
        const white = new THREE.Mesh(whiteGeo, avMat('white'));
        white.position.set(side * xOff, y, z);
        if (!isSquare) white.scale.set(0.8, 1, 0.5);
        parent.add(white);

        // Dark outline around eye-white
        const outline = new THREE.Mesh(whiteGeo, avMat('outline'));
        outline.scale.setScalar(1.18);
        white.add(outline);

        // Pupil
        const pupilR = isBig ? 0.030 : (isDot ? 0.025 : 0.020);
        const pupil = new THREE.Mesh(
            new THREE.SphereGeometry(pupilR, 10, 8),
            avMat('dark')
        );
        pupil.position.set(side * xOff, y, z + 0.014);
        pupil.scale.set(0.7, 1, 0.4);
        parent.add(pupil);

        // For colored eyes, add an iris ring between white and pupil
        if (irisColor !== 0x1a1010 && irisColor !== 0x000000 && !isDot && !isSquare) {
            const iris = new THREE.Mesh(
                new THREE.SphereGeometry(pupilR * 1.6, 10, 8),
                avMat('flat', irisColor)
            );
            iris.position.set(side * xOff, y, z + 0.010);
            iris.scale.set(0.75, 1, 0.35);
            parent.add(iris);
        }

        // Lashes for relevant shapes
        if (['lashed', 'glamour', 'eyeliner'].includes(shape)) {
            const lashGeo = new THREE.BoxGeometry(whiteR * 1.6, 0.008, 0.012);
            const lash = new THREE.Mesh(lashGeo, avMat('dark'));
            lash.position.set(side * xOff, y + whiteR * 0.95, z + 0.015);
            parent.add(lash);
            if (shape === 'glamour') {
                // extra outer lashes
                for (let i = 0; i < 3; i++) {
                    const small = new THREE.Mesh(
                        new THREE.BoxGeometry(0.014, 0.006, 0.008),
                        avMat('dark')
                    );
                    small.position.set(side * (xOff + 0.018 + i*0.008), y + whiteR * 0.8 - i*0.005, z + 0.012);
                    small.rotation.z = side * (0.4 + i*0.2);
                    parent.add(small);
                }
            }
        }
    }
}

// ── BROWS (3D) ─────────────────────────────────────────────────────────
function addBrows3D(parent, brows, headR) {
    const shape = brows?.shape || 'arched';
    if (shape === 'none') return;
    const color = parseHexColor(brows?.color || '#1a1010');
    const xOff = headR * 0.32;
    const y    = headR * 0.42;
    const z    = headR * 0.91;
    const mat  = avMat('flat', color);

    for (const side of [-1, 1]) {
        const len   = (shape === 'thick' || shape === 'surprised') ? 0.13 : 0.11;
        const thick = (shape === 'thick') ? 0.025 : (shape === 'thin') ? 0.010 : 0.018;
        const brow  = new THREE.Mesh(
            new THREE.BoxGeometry(len, thick, 0.012),
            mat
        );
        brow.position.set(side * xOff, y, z);
        if (shape === 'arched' || shape === 'surprised') {
            brow.position.y += 0.02;
            brow.rotation.z = side * -0.1;
        } else if (shape === 'angry') {
            brow.rotation.z = side * 0.35;
        } else if (shape === 'wavy') {
            brow.rotation.z = side * 0.08;
        }
        parent.add(brow);
    }
}

// ── NOSE (3D) ─────────────────────────────────────────────────────────
function addNose3D(parent, noseShape, headR, skinColor) {
    if (!noseShape || noseShape === 'none') return;
    const skinMat = avMat('skin', skinColor);
    const y = headR * -0.05;
    const z = headR * 1.02;
    let geo, scale = [1,1,1];
    switch (noseShape) {
        case 'small':   geo = new THREE.SphereGeometry(0.018, 8, 6); scale = [1,1,0.7]; break;
        case 'button':  geo = new THREE.SphereGeometry(0.028, 10, 8); scale = [1,0.9,0.7]; break;
        case 'wide':    geo = new THREE.SphereGeometry(0.030, 10, 8); scale = [1.4,0.8,0.7]; break;
        case 'long':    geo = new THREE.SphereGeometry(0.028, 10, 8); scale = [0.65,1.6,0.7]; break;
        case 'pointy':  geo = new THREE.ConeGeometry(0.022, 0.05, 8); scale = [1,1,0.7]; break;
        default: return;
    }
    const nose = new THREE.Mesh(geo, skinMat);
    nose.position.set(0, y, z);
    nose.scale.set(...scale);
    if (noseShape === 'pointy') nose.rotation.x = Math.PI / 2;
    parent.add(nose);
    // Subtle dark outline for definition
    const out = new THREE.Mesh(geo, avMat('outline'));
    out.scale.setScalar(1.10);
    nose.add(out);
}

// ── MOUTH (3D) ─────────────────────────────────────────────────────────
function addMouth3D(parent, mouthShape, headR) {
    const y = headR * -0.38;
    const z = headR * 0.92;
    switch (mouthShape) {
        case 'smile':
        case 'soft_smile':
        case 'tooth': {
            const m = new THREE.Mesh(
                new THREE.TorusGeometry(0.058, 0.012, 6, 16, Math.PI),
                avMat('dark')
            );
            m.position.set(0, y + 0.025, z);
            m.rotation.z = Math.PI;
            parent.add(m);
            if (mouthShape === 'tooth') {
                const t = new THREE.Mesh(new THREE.BoxGeometry(0.020, 0.030, 0.010), avMat('white'));
                t.position.set(0, y, z + 0.005);
                parent.add(t);
            }
            return;
        }
        case 'grin': {
            const m = new THREE.Mesh(
                new THREE.TorusGeometry(0.070, 0.014, 6, 18, Math.PI),
                avMat('dark')
            );
            m.position.set(0, y + 0.025, z);
            m.rotation.z = Math.PI;
            parent.add(m);
            // teeth strip
            const t = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.024, 0.012), avMat('white'));
            t.position.set(0, y, z + 0.003);
            parent.add(t);
            return;
        }
        case 'neutral': {
            const m = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.012, 0.010), avMat('dark'));
            m.position.set(0, y, z);
            parent.add(m);
            return;
        }
        case 'open':
        case 'o': {
            const r = mouthShape === 'o' ? 0.025 : 0.035;
            const m = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 10), avMat('flat', 0x5a1822));
            m.position.set(0, y, z);
            m.scale.set(1, 1, 0.5);
            parent.add(m);
            const out = new THREE.Mesh(m.geometry, avMat('outline'));
            out.scale.setScalar(1.15);
            m.add(out);
            return;
        }
        case 'smirk': {
            const m = new THREE.Mesh(
                new THREE.TorusGeometry(0.058, 0.012, 6, 16, Math.PI),
                avMat('dark')
            );
            m.position.set(0, y + 0.020, z);
            m.rotation.z = Math.PI * 0.85;
            parent.add(m);
            return;
        }
        case 'tongue': {
            const m = new THREE.Mesh(
                new THREE.TorusGeometry(0.070, 0.014, 6, 18, Math.PI),
                avMat('dark')
            );
            m.position.set(0, y + 0.025, z);
            m.rotation.z = Math.PI;
            parent.add(m);
            const tongue = new THREE.Mesh(new THREE.SphereGeometry(0.022, 10, 8), avMat('flat', 0xff7a90));
            tongue.position.set(0, y - 0.025, z + 0.012);
            tongue.scale.set(1.2, 0.6, 0.5);
            parent.add(tongue);
            return;
        }
        case 'frown': {
            const m = new THREE.Mesh(
                new THREE.TorusGeometry(0.055, 0.012, 6, 16, Math.PI),
                avMat('dark')
            );
            m.position.set(0, y - 0.020, z);
            // No z-rotation = upper half (default), gives a frown
            parent.add(m);
            return;
        }
        case 'kiss': {
            const m = new THREE.Mesh(new THREE.SphereGeometry(0.022, 10, 8), avMat('flat', 0xff4d70));
            m.position.set(0, y, z);
            m.scale.set(0.7, 1.0, 0.5);
            parent.add(m);
            const out = new THREE.Mesh(m.geometry, avMat('outline'));
            out.scale.setScalar(1.15);
            m.add(out);
            return;
        }
        case 'lips_red':
        case 'lips_pink':
        case 'lips_full': {
            const color = mouthShape === 'lips_red'  ? 0xd92e3a :
                           mouthShape === 'lips_pink' ? 0xff7a9e :
                                                        0xc84a6a;
            const lips = new THREE.Mesh(new THREE.SphereGeometry(0.045, 14, 10), avMat('flat', color));
            lips.position.set(0, y, z);
            lips.scale.set(1.4, 0.7, 0.5);
            parent.add(lips);
            const out = new THREE.Mesh(lips.geometry, avMat('outline'));
            out.scale.setScalar(1.10);
            lips.add(out);
            // Subtle highlight
            const hi = new THREE.Mesh(new THREE.SphereGeometry(0.012, 8, 6), avMat('flat', 0xffc0d0));
            hi.position.set(-0.012, y + 0.008, z + 0.020);
            hi.scale.set(1.3, 0.4, 0.3);
            parent.add(hi);
            return;
        }
        default: {
            // Default = smile
            return addMouth3D(parent, 'smile', headR);
        }
    }
}

// ── BLUSH (3D) ─────────────────────────────────────────────────────────
function addBlush3D(parent, blush, headR) {
    const xOff = headR * 0.6;
    const y    = headR * -0.18;
    const z    = headR * 0.88;
    if (blush === 'freckles') {
        const dotMat = avMat('flat', 0x8a4a20);
        for (const side of [-1, 1]) {
            for (let i = 0; i < 5; i++) {
                const d = new THREE.Mesh(new THREE.SphereGeometry(0.005, 6, 4), dotMat);
                d.position.set(
                    side * (xOff + (Math.random()-0.5) * 0.06),
                    y + (Math.random()-0.5) * 0.08,
                    z + (Math.random()-0.5) * 0.02
                );
                parent.add(d);
            }
        }
        return;
    }
    if (blush === 'stars') {
        const goldMat = avMat('flat', 0xffd54a);
        for (const side of [-1, 1]) {
            const star = new THREE.Mesh(
                new THREE.SphereGeometry(0.018, 8, 6),
                goldMat
            );
            star.position.set(side * xOff, y, z);
            star.scale.set(1, 1, 0.4);
            parent.add(star);
            const out = new THREE.Mesh(star.geometry, avMat('outline'));
            out.scale.setScalar(1.20);
            star.add(out);
        }
        return;
    }
    // Pink/red blush dots
    const color = blush === 'red' ? 0xff5a5a :
                  blush === 'pink' ? 0xff7ab0 :
                                     0xff9ec0;
    for (const side of [-1, 1]) {
        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.038, 10, 8), avMat('flat', color));
        dot.position.set(side * xOff, y, z);
        dot.scale.set(1.2, 0.7, 0.3);
        dot.material = dot.material.clone();
        dot.material.transparent = true;
        dot.material.opacity = 0.75;
        parent.add(dot);
    }
}

// ── HAIR (3D) — archetype dispatcher ─────────────────────────────────
function addHair3D(parent, hair, headR) {
    const style = hair.style;
    const color = parseHexColor(hair.color, 0x5e3a20);
    const mat = avMat('hair', color);

    // Helper: make a hemisphere skullcap on top of the head
    const skullcap = (rScale = 1.08, yOffset = 0.04, thetaLen = Math.PI / 2 + 0.1) => {
        const geo = new THREE.SphereGeometry(headR, 18, 12, 0, Math.PI * 2, 0, thetaLen);
        const cap = new THREE.Mesh(geo, mat);
        cap.scale.setScalar(rScale);
        cap.position.y = yOffset;
        cap.castShadow = true;
        add3DOutline(cap, 1.05);
        parent.add(cap);
        return cap;
    };

    switch (style) {
        case 'short_messy':
        case 'short_neat':
        case 'bowl':
        case 'half_up':
            skullcap(1.10);
            return;
        case 'side_part':
            skullcap(1.10);
            // Asymmetric bump (parting strand)
            const part = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 6), mat);
            part.position.set(-0.06, headR * 0.85, headR * 0.6);
            part.scale.set(1.2, 0.8, 1);
            parent.add(part);
            return;
        case 'long_straight':
        case 'wavy_long':
        case 'side_swept': {
            skullcap(1.10);
            // Long curtain down the sides and back
            const curtain = new THREE.Mesh(
                new THREE.CylinderGeometry(headR * 1.08, headR * 0.95, headR * 1.8, 18, 1, true,
                                            Math.PI * 0.15, Math.PI * 1.7),
                mat
            );
            curtain.position.y = -headR * 0.6;
            curtain.material = mat;
            parent.add(curtain);
            // Add subtle wave for wavy_long
            if (style === 'wavy_long') {
                for (let side of [-1, 1]) {
                    const wave = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 8), mat);
                    wave.position.set(side * headR * 0.85, -headR * 0.4, headR * 0.4);
                    wave.scale.set(0.8, 1.3, 0.8);
                    parent.add(wave);
                }
            }
            // Side swept has front strand
            if (style === 'side_swept') {
                const strand = new THREE.Mesh(new THREE.SphereGeometry(0.07, 10, 8), mat);
                strand.position.set(0.05, headR * 0.6, headR * 0.7);
                strand.scale.set(1.4, 0.7, 1.0);
                strand.rotation.z = -0.4;
                parent.add(strand);
            }
            return;
        }
        case 'ponytail': {
            skullcap(1.10);
            const tail = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 10), mat);
            tail.position.set(0, headR * 0.2, -headR * 1.1);
            tail.scale.set(0.8, 1.6, 0.8);
            parent.add(tail);
            return;
        }
        case 'pigtails': {
            skullcap(1.10);
            for (const side of [-1, 1]) {
                const tail = new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 10), mat);
                tail.position.set(side * headR * 1.08, headR * 0.1, -headR * 0.1);
                tail.scale.set(0.9, 1.5, 0.9);
                parent.add(tail);
            }
            return;
        }
        case 'bun': {
            skullcap(1.10);
            const bun = new THREE.Mesh(new THREE.SphereGeometry(0.085, 14, 10), mat);
            bun.position.set(0, headR * 1.15, 0);
            parent.add(bun);
            return;
        }
        case 'messy_bun': {
            skullcap(1.10);
            const bun = new THREE.Mesh(new THREE.SphereGeometry(0.10, 14, 10), mat);
            bun.position.set(0, headR * 1.15, -headR * 0.1);
            parent.add(bun);
            // loose strands
            for (let i = 0; i < 4; i++) {
                const strand = new THREE.Mesh(new THREE.SphereGeometry(0.024, 8, 6), mat);
                const a = i * Math.PI / 2;
                strand.position.set(
                    Math.cos(a) * 0.11,
                    headR * 1.10 + (i % 2) * 0.02,
                    Math.sin(a) * 0.11
                );
                strand.scale.set(0.7, 1.4, 0.7);
                parent.add(strand);
            }
            return;
        }
        case 'space_buns': {
            skullcap(1.10);
            for (const side of [-1, 1]) {
                const bun = new THREE.Mesh(new THREE.SphereGeometry(0.065, 12, 10), mat);
                bun.position.set(side * headR * 0.7, headR * 1.10, 0);
                parent.add(bun);
            }
            return;
        }
        case 'curly': {
            // Multiple small spheres clustered
            for (let i = 0; i < 16; i++) {
                const ball = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 6), mat);
                const a = (i / 16) * Math.PI * 2;
                const r = headR * (0.92 + Math.random() * 0.15);
                ball.position.set(
                    Math.cos(a) * r * 0.7,
                    headR * 0.6 + Math.cos(a * 1.7) * 0.05,
                    Math.sin(a) * r * 0.7
                );
                parent.add(ball);
            }
            return;
        }
        case 'afro': {
            const afro = new THREE.Mesh(new THREE.SphereGeometry(headR * 1.4, 18, 14), mat);
            afro.position.y = headR * 0.3;
            add3DOutline(afro, 1.04);
            parent.add(afro);
            return;
        }
        case 'mohawk': {
            const strip = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.20, headR * 1.7), mat);
            strip.position.y = headR * 1.05;
            add3DOutline(strip, 1.10);
            parent.add(strip);
            return;
        }
        case 'spiky': {
            skullcap(1.06);
            // Add cone spikes on top
            for (let i = 0; i < 7; i++) {
                const spike = new THREE.Mesh(new THREE.ConeGeometry(0.025, 0.13, 6), mat);
                spike.position.set(
                    (Math.random() - 0.5) * 0.35,
                    headR * 0.95 + 0.05,
                    (Math.random() - 0.5) * 0.30
                );
                spike.rotation.z = (Math.random() - 0.5) * 0.4;
                parent.add(spike);
            }
            return;
        }
        case 'braids': {
            skullcap(1.10);
            for (const side of [-1, 1]) {
                // Long thin braided cylinder on each side
                const braid = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.025, 0.020, headR * 2.0, 8),
                    mat
                );
                braid.position.set(side * headR * 1.0, -headR * 0.7, 0);
                parent.add(braid);
                // 3 bumps on each braid for braid texture
                for (let i = 0; i < 3; i++) {
                    const bump = new THREE.Mesh(new THREE.SphereGeometry(0.030, 8, 6), mat);
                    bump.position.set(side * headR * 1.0, -headR * (0.15 + i * 0.5), 0);
                    parent.add(bump);
                }
            }
            return;
        }
        case 'bob': {
            skullcap(1.10);
            // Medium curtain (shorter than long_straight)
            const curtain = new THREE.Mesh(
                new THREE.CylinderGeometry(headR * 1.08, headR * 0.95, headR * 1.0, 18, 1, true,
                                            Math.PI * 0.15, Math.PI * 1.7),
                mat
            );
            curtain.position.y = -headR * 0.2;
            parent.add(curtain);
            return;
        }
        default:
            // Unknown style → default to short cap
            skullcap(1.10);
            return;
    }
}

// ── ACCESSORIES (3D) ──────────────────────────────────────────────────
function addAccessory3D(parent, accessory, headR) {

        case 'glasses': {
            for (const side of [-1, 1]) {
                const frame = new THREE.Mesh(
                    new THREE.TorusGeometry(0.05, 0.008, 6, 16),
                    avMat('dark')
                );
                frame.position.set(side * headR * 0.35, headR * 0.15, headR * 0.98);
                parent.add(frame);
            }
            // Bridge
            const bridge = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.008, 0.008), avMat('dark'));
            bridge.position.set(0, headR * 0.15, headR * 1.0);
            parent.add(bridge);
            return;
        }
        case 'shades': {
            for (const side of [-1, 1]) {
                const lens = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.07, 0.012), avMat('dark'));
                lens.position.set(side * headR * 0.32, headR * 0.15, headR * 1.0);
                parent.add(lens);
            }
            const bridge = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.012, 0.010), avMat('dark'));
            bridge.position.set(0, headR * 0.15, headR * 1.0);
            parent.add(bridge);
            return;
        }
        case 'cap': {

                new THREE.SphereGeometry(headR * 1.04, 16, 10, 0, Math.PI * 2, 0, Math.PI / 2),
                avMat('acc', 0xd92e3a)
            );
            top.position.y = headR * 0.45;
            add3DOutline(top, 1.04);
            parent.add(top);
            // Brim
            const brim = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.025, 0.18), avMat('acc', 0xd92e3a));
            brim.position.set(0, headR * 0.45, headR * 0.65);
            add3DOutline(brim, 1.06);
            parent.add(brim);

        }
        case 'beanie': {
            const top = new THREE.Mesh(
                new THREE.SphereGeometry(headR * 1.12, 16, 10, 0, Math.PI * 2, 0, Math.PI / 2),

            add3DOutline(top, 1.04);
            parent.add(top);
            // Pompom
            const pom = new THREE.Mesh(new THREE.SphereGeometry(0.045, 12, 10), avMat('acc', 0xffd54a));
            pom.position.y = headR * 1.5;
            add3DOutline(pom, 1.10);
            parent.add(pom);

        }
        case 'crown': {
            const baseRing = new THREE.Mesh(
                new THREE.CylinderGeometry(headR * 1.05, headR * 1.05, 0.08, 18, 1, true),
                avMat('acc', 0xffd54a)
            );
            baseRing.position.y = headR * 0.85;

            // Spikes
            for (let i = 0; i < 5; i++) {
                const a = (i / 5) * Math.PI * 2;
                const spike = new THREE.Mesh(new THREE.ConeGeometry(0.025, 0.08, 4), avMat('acc', 0xffd54a));
                spike.position.set(Math.cos(a) * headR * 1.05, headR * 1.0, Math.sin(a) * headR * 1.05);
                parent.add(spike);

            // Gem in front
            const gem = new THREE.Mesh(new THREE.SphereGeometry(0.025, 10, 8), avMat('flat', 0xd92e3a));

        case 'bandana': {

                new THREE.CylinderGeometry(headR * 1.06, headR * 1.06, 0.10, 20, 1, true),
                avMat('acc', 0xd92e3a)

        }
        case 'headband': {

                new THREE.CylinderGeometry(headR * 1.06, headR * 1.06, 0.05, 20, 1, true),
                avMat('acc', 0xff4d5c)
            );
            band.position.y = headR * 0.65;
            parent.add(band);
            return;
        }
        case 'helmet': {
            const top = new THREE.Mesh(
                new THREE.SphereGeometry(headR * 1.16, 18, 12, 0, Math.PI * 2, 0, Math.PI / 2),
                avMat('acc', 0x3a4a5a)

            add3DOutline(top, 1.04);
            parent.add(top);
            const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.03, 0.03), avMat('acc', 0xffd54a));
            stripe.position.set(0, headR * 0.65, headR * 1.1);

        }
        case 'earrings':
        case 'pearls': {
            const isPearl = accessory === 'pearls';

            for (const side of [-1, 1]) {
                const ear = new THREE.Mesh(new THREE.SphereGeometry(0.022, 10, 8), avMat('flat', c));
                ear.position.set(side * headR * 1.02, -headR * 0.20, 0);
                parent.add(ear);
                if (isPearl) {

                    ear2.position.set(side * headR * 1.04, -headR * 0.40, 0);
                    parent.add(ear2);
                }

        }
        case 'bow': {
            const xPos = -headR * 0.55;
            const yPos = headR * 0.90;
            const zPos = headR * 0.20;
            // Two side loops
            for (const side of [-1, 1]) {
                const loop = new THREE.Mesh(new THREE.SphereGeometry(0.035, 10, 8), avMat('acc', 0xff4d8e));
                loop.position.set(xPos + side * 0.045, yPos, zPos);
                loop.scale.set(1.2, 0.9, 0.6);
                parent.add(loop);
            }
            // Center knot
            const knot = new THREE.Mesh(new THREE.BoxGeometry(0.022, 0.022, 0.022), avMat('acc', 0xff4d8e));
            knot.position.set(xPos, yPos, zPos);
            parent.add(knot);

        }
        case 'flower': {
            const xPos = -headR * 0.55;
            const yPos = headR * 0.88;
            const zPos = headR * 0.30;
            const petalMat = avMat('acc', 0xff5a9e);
            // 5 petals around a center
            for (let i = 0; i < 5; i++) {
                const a = (i / 5) * Math.PI * 2;
                const petal = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 6), petalMat);
                petal.position.set(
                    xPos + Math.cos(a) * 0.025,
                    yPos + Math.sin(a) * 0.025,
                    zPos
                );
                parent.add(petal);
            }
            const center = new THREE.Mesh(new THREE.SphereGeometry(0.015, 8, 6), avMat('acc', 0xffd54a));
            center.position.set(xPos, yPos, zPos + 0.01);
            parent.add(center);
            return;
        }
        case 'bunny_ears': {
            for (const side of [-1, 1]) {
                const ear = new THREE.Mesh(new THREE.SphereGeometry(0.05, 10, 12), avMat('acc', 0xffffff));
                ear.position.set(side * headR * 0.35, headR * 1.40, 0);
                ear.scale.set(0.6, 2.4, 0.5);
                add3DOutline(ear, 1.06);
                parent.add(ear);
                // pink inner
                const inner = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 10), avMat('flat', 0xff9ec0));
                inner.position.set(side * headR * 0.35, headR * 1.40, 0.025);
                inner.scale.set(0.5, 2.2, 0.3);
                parent.add(inner);
            }
            return;
        }
        default: return;
    }
}

/**
 * Build a complete 3D avatar head as a THREE.Group, ready to be positioned
 * on top of a body cone. Returns a Group whose children include the head
 * sphere, eye-meshes, mouth, brows, nose, blush, hair-mesh and any
 * accessory. All centered at the group's local origin.
 */
function build3DAvatarHead(avatar) {
    const g = new THREE.Group();
    if (!avatar) return g;

    const skinColor = parseHexColor(avatar.skin, 0xfbcfa6);
    const headR = 0.34;

    // Main head sphere (with face-shape scaling)
    const head = new THREE.Mesh(
        new THREE.SphereGeometry(headR, 22, 18),
        avMat('skin', skinColor),
    );
    head.castShadow = true;
    applyFaceShapeScale(head, avatar.face);
    g.add(head);

    // Dark outline matching the SVG aesthetic
    const outline = new THREE.Mesh(head.geometry, avMat('outline'));
    outline.scale.copy(head.scale).multiplyScalar(1.06);
    g.add(outline);

    // Features (sit on the front of the sphere)
    addBrows3D(g, avatar.brows, headR);
    addEyes3D(g, avatar.eyes, headR);
    addNose3D(g, avatar.nose, headR, skinColor);
    addMouth3D(g, avatar.mouth, headR);
    addBlush3D(g, avatar.blush, headR);

    // Hair
    if (avatar.hair && avatar.hair.style !== 'bald') {
        addHair3D(g, avatar.hair, headR);
    }

    // Accessory
    if (avatar.accessory && avatar.accessory !== 'none') {
        addAccessory3D(g, avatar.accessory, headR);
    }

    return g;
}

/**
 * Create a 3D pawn. If `avatar` is supplied, builds a full 3D head with
 * separate meshes for eyes/mouth/hair/accessories. Else falls back to the
 * classic simple sphere head in player color.
 * The body cone stays in the player's identity color so minimap/HUD stay
 * visually consistent.
 */
function makePlayerAvatarToken(colorHex, avatar = null) {
    const g = new THREE.Group();
    const colMat   = new THREE.MeshToonMaterial({ color: colorHex, gradientMap: toon, emissive: colorHex, emissiveIntensity: 0.25 });
    const darkMat  = new THREE.MeshToonMaterial({ color: 0x101820, gradientMap: toon });

    // Base disc (dark)
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.5, 0.18, 18), darkMat);
    base.position.y = 0.09; base.castShadow = true; g.add(base);

    // Body cone (in player identity color)
    const body = new THREE.Mesh(new THREE.ConeGeometry(0.36, 1.0, 16), colMat);
    body.position.y = 0.68; body.castShadow = true; g.add(body);

    // White cartoon outline on body
    const outlineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.BackSide });
    const bodyOut = new THREE.Mesh(body.geometry, outlineMat);
    bodyOut.scale.set(1.12, 1.06, 1.12); body.add(bodyOut);

    if (avatar) {
        // Skin-colored neck so head connects to body
        const skinHex = parseHexColor(avatar.skin, 0xfbcfa6);
        const neck = new THREE.Mesh(
            new THREE.CylinderGeometry(0.12, 0.16, 0.12, 12),
            avMat('skin', skinHex),
        );
        neck.position.y = 1.20; neck.castShadow = true;
        g.add(neck);

        // The actual 3D head, built from primitives
        const head = build3DAvatarHead(avatar);
        head.position.y = 1.50;     // sits on top of the body cone
        head.castShadow = true;
        g.add(head);
        g.userData.headGroup = head;
    } else {
        // Classic fallback: spherical head in player color (legacy behaviour)
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 14, 12), colMat);
        head.position.y = 1.32; head.castShadow = true; g.add(head);
        const headOut = new THREE.Mesh(head.geometry, outlineMat);
        headOut.scale.setScalar(1.12); head.add(headOut);
    }

    tokenGroup.add(g);
    return g;
}

/* ═══════════════════════════════════════════════════════════════════════════
   DOM helper for minigames / HUD: render avatar as an HTML/SVG element
   ═══════════════════════════════════════════════════════════════════════════ */
function renderPlayerAvatarDOM(player, size = 64, mode = 'head') {
    const wrap = document.createElement('div');
    wrap.className = 'player-avatar';
    wrap.style.width = wrap.style.height = size + 'px';
    if (player?.avatar) {
        wrap.innerHTML = renderAvatarSVG(player.avatar, mode, `width="${size}" height="${size}"`);
    } else {
        // Fallback dot
        wrap.style.background = player?.color?.css || '#888';
        wrap.style.borderRadius = '50%';
        wrap.style.border = '3px solid #fff';
    }
    return wrap;
}

// ── Modal helper ──
function showModal({ emoji='', title='', body='', actions=[] }) {
    return new Promise(resolve => {
        const back = el('div', { className: 'modal-back' });
        const mod = el('div', { className: 'modal' });
        if (emoji) mod.append(el('div', { className: 'emoji' }, emoji));
        if (title) mod.append(el('h2', {}, title));
        if (body) {
            const lines = [].concat(body);
            for (const l of lines) mod.append(el('p', {}, l));
        }
        const acts = el('div', { className: 'actions' });
        const buttons = actions.length ? actions : [{ label: 'OK', value: true }];
        for (const a of buttons) {
            const b = el('button', {
                className: 'btn' + (a.ghost ? ' ghost' : ''),
                on: { click: () => { back.remove(); resolve(a.value); } }
            }, a.label);
            acts.append(b);
        }
        mod.append(acts);
        back.append(mod);
        ui.append(back);
    });
}

// ── Tile-event "stamp" (Wii Party style POP! announcement) ──
// Default behaviour: requires the user to tap "Verder" to continue, so you can
// pass the phone around the group. Set `auto: true` for quick transition stamps
// that don't require user interaction (e.g. brief lead-ins before another modal).
function showStamp({ emoji='✨', big='', sub='', palette='gold', auto=false, duration=1300 } = {}) {
    return new Promise(resolve => {
        const palettes = {
            gold:   { bg:'#ffd54a', bg2:'#ff9a1a', border:'#b86c00', glow:'rgba(255,200,80,0.6)' },
            green:  { bg:'#a5f0a3', bg2:'#3ec866', border:'#177a3a', glow:'rgba(80,220,120,0.55)' },
            red:    { bg:'#ff8a8a', bg2:'#d92e3a', border:'#7a0a16', glow:'rgba(255,80,90,0.6)' },
            blue:   { bg:'#9eeaff', bg2:'#1d8bff', border:'#0a3a7a', glow:'rgba(70,170,255,0.6)' },
            purple: { bg:'#dcb6ff', bg2:'#9a3aff', border:'#3a0a7a', glow:'rgba(180,90,255,0.6)' },
            dark:   { bg:'#5a5260', bg2:'#22202a', border:'#000', glow:'rgba(50,40,60,0.7)' },
            lava:   { bg:'#ffb060', bg2:'#d92500', border:'#7a1500', glow:'rgba(255,120,40,0.7)' },
        };
        const p = palettes[palette] || palettes.gold;
        const back = el('div', { className: 'tile-stamp-back' + (auto ? '' : ' interactive') });
        const stamp = el('div', { className: 'tile-stamp', style: {
            '--stamp-bg': p.bg, '--stamp-bg2': p.bg2,
            '--stamp-border': p.border, '--stamp-glow': p.glow,
        }});
        if (emoji) stamp.append(el('div', { className: 'emoji' }, emoji));
        if (big)   stamp.append(el('div', { className: 'big' },   big));
        if (sub)   stamp.append(el('div', { className: 'sub' },   sub));

        let done = false;
        const dismiss = () => {
            if (done) return; done = true;
            stamp.classList.add('out');
            setTimeout(() => { back.remove(); resolve(); }, 350);
        };

        if (auto) {
            // legacy auto-dismiss path (used for short transitions only)
            back.append(stamp);
            ui.append(back);
            setTimeout(dismiss, duration);
        } else {
            // Add a Verder button — group passes phone, reads what happened, taps to continue
            const btn = el('button', { className: 'stamp-btn', type: 'button' }, 'Verder →');
            btn.addEventListener('click', dismiss);
            stamp.append(btn);
            // also allow tapping anywhere on the dim backdrop to dismiss
            back.addEventListener('click', (e) => {
                // ignore clicks on the stamp itself (the button handles it)
                if (e.target === back) dismiss();
            });
            back.append(stamp);
            ui.append(back);
        }
    });
}

// ── Victim picker — choose another player ──
function pickVictim({ title='Kies een speler', subtitle='', exclude=[] } = {}) {
    return new Promise(resolve => {
        const back = el('div', { className: 'vp-back' });
        const card = el('div', { className: 'vp-card' });
        card.append(el('h2', {}, title));
        if (subtitle) card.append(el('div', { className: 'sub' }, subtitle));
        const list = el('div', { className: 'vp-list' });
        const candidates = G.players.filter(p => !exclude.includes(p));
        if (candidates.length === 0) {
            // shouldn't happen, but just close
            back.remove(); resolve(null); return;
        }
        for (const p of candidates) {
            const row = el('div', { className: 'vp-row' });
            const dot = el('div', { className: 'dot' });
            dot.style.background = p.color.css;
            dot.style.color      = p.color.css;
            row.append(
                dot,
                el('div', { className: 'nm' }, p.name),
                el('div', { className: 'pos' }, `Tegel ${p.tileIdx}`)
            );
            row.addEventListener('click', () => { back.remove(); resolve(p); });
            list.append(row);
        }
        card.append(list);
        // No cancel for tile events — must choose someone
        back.append(card);
        ui.append(back);
    });
}

// Quick screen-shake on the canvas for big knockback events
function screenShake(ms = 400) {
    const c = document.querySelector('canvas');
    if (!c) return;
    c.classList.add('shake');
    setTimeout(() => c.classList.remove('shake'), ms);
}

// ── Setup screen ──
let SETUP_TAB = 'game';

// ── Persistent player draft ──
// Houd de in de Home-pagina geconfigureerde spelers (naam + kleur) bij in
// een module-level variabele én in localStorage, zodat:
//   1) Spelers niet "verdwijnen" als je terugkeert uit een minigame of het
//      bordspel afbreekt (`goHome()` riep eerder steeds een verse draft op).
//   2) De Minigame-tab dezelfde spelers + aantal kan gebruiken — geen
//      dubbele configuratie meer voor één-tab quick play.
const SETUP_DRAFT_KEY = 'drankEiland.setupDraft.v1';
let SETUP_DRAFT = null;

function _loadSetupDraftFromStorage() {
    try {
        const s = localStorage.getItem(SETUP_DRAFT_KEY);
        if (!s) return null;
        const parsed = JSON.parse(s);
        if (!Array.isArray(parsed) || parsed.length < 2) return null;
        // Sanitize: kleuren mogen niet botsen, namen moeten string zijn.
        const used = new Set();
        return parsed.slice(0, 8).map((p, i) => {
            let c = Number.isInteger(p.colorIdx) ? p.colorIdx : i;
            if (c < 0 || c >= PLAYER_COLORS.length) c = i % PLAYER_COLORS.length;
            while (used.has(c)) c = (c + 1) % PLAYER_COLORS.length;
            used.add(c);
            return {
                name: (typeof p.name === 'string' && p.name.trim()) ? p.name : `Speler ${i + 1}`,
                colorIdx: c,
                avatar: loadAvatarForColor(c),
            };
        });
    } catch (e) { return null; }
}

function saveSetupDraft() {
    if (!SETUP_DRAFT) return;
    try {
        const slim = SETUP_DRAFT.map(p => ({ name: p.name, colorIdx: p.colorIdx }));
        localStorage.setItem(SETUP_DRAFT_KEY, JSON.stringify(slim));
    } catch (e) {}
}

function getSetupDraft() {
    if (!SETUP_DRAFT) {
        SETUP_DRAFT = _loadSetupDraftFromStorage() || [
            { name: 'Speler 1', colorIdx: 0, avatar: loadAvatarForColor(0) },
            { name: 'Speler 2', colorIdx: 1, avatar: loadAvatarForColor(1) },
        ];
    }
    // Refresh avatar refs: ze kunnen geüpdate zijn door de Avatar Creator
    // sinds we ze het laatst lazen.
    for (const p of SETUP_DRAFT) {
        if (!p.avatar) p.avatar = loadAvatarForColor(p.colorIdx);
    }
    return SETUP_DRAFT;
}

function renderSetup() {
    G.phase = 'setup';
    clear(ui);
    const draft = getSetupDraft();

    const screen = el('div', { className: 'screen' });
    const title = el('h1', {}, '🌋 Drank Eiland');
    const sub = el('div', { className: 'sub' }, 'Beklim de vulkaan. Wie eerst boven is, wint.');

    // Tabs
    const tabs = el('div', { className: 'tabs' });
    const tabGame = el('button', { type: 'button' }, '🎮 Spel');
    const tabMG   = el('button', { type: 'button' }, '🎲 Minigames');
    tabs.append(tabGame, tabMG);

    // Panel containers
    const gamePanel = el('div', { style: { width: 'min(420px, 100%)' } });
    const mgPanel   = el('div', { style: { width: 'min(420px, 100%)' } });

    // === Game panel (original setup) ===
    const card = el('div', { className: 'card' });
    function renderGame() {
        clear(card);
        draft.forEach((p, i) => {
            const row = el('div', { className: 'player-row' });
            // ── Avatar thumb (tap to open the Avatar Creator) ──
            const thumb = el('div', { className: 'av-thumb', title: 'Avatar bewerken' });
            thumb.style.color = PLAYER_COLORS[p.colorIdx].css;     // glow color
            thumb.innerHTML = renderAvatarSVG(p.avatar, 'head');
            thumb.addEventListener('click', async () => {
                const updated = await openAvatarCreator(
                    p.avatar,
                    `Avatar voor ${p.name || 'Speler ' + (i+1)}`,
                );
                if (updated) {
                    p.avatar = updated;
                    saveAvatar(p.colorIdx, updated);
                    saveSetupDraft();
                    renderGame();
                }
            });
            // ── Identity color swatch (cycles to next free color) ──
            const sw = el('div', { className: 'swatch' });
            sw.style.background = PLAYER_COLORS[p.colorIdx].css;
            sw.addEventListener('click', () => {
                const taken = new Set(draft.map((q, j) => j !== i ? q.colorIdx : -1));
                let next = (p.colorIdx + 1) % PLAYER_COLORS.length;
                while (taken.has(next)) next = (next + 1) % PLAYER_COLORS.length;
                p.colorIdx = next;
                // Try to load a previously saved avatar for the new color slot,
                // OR keep the current avatar but adopt the new slot's default outfit.
                const saved = loadAvatars()[next];
                p.avatar = saved || p.avatar || defaultAvatar(next);
                saveSetupDraft();
                renderGame();
            });
            const input = el('input', { type: 'text', value: p.name, placeholder: 'Naam',
                on: { input: e => { p.name = e.target.value; saveSetupDraft(); } } });
            row.append(thumb, sw, input);

// ── Standalone minigame launcher (from Minigames tab) ──
async function launchStandaloneMinigame(id) {
    // ── Avatar Creator: standalone, geen fake spelers nodig ──
    // Slot 0 wordt standaard geladen/opgeslagen. Werkt zonder G.players,
    // dus geen stash-dans.
    if (id === 'avatar') {
        const initial = loadAvatarForColor(0);
        const updated = await openAvatarCreator(initial, 'Avatar Creator');
        if (updated) {
            saveAvatar(0, updated);
            await showModal({
                emoji: '🧑‍🎨', title: 'Avatar opgeslagen',
                body: ['Deze avatar wordt automatisch geladen wanneer je kleur 1 kiest in het bordspel.'],
                actions: [{ label: 'Klaar', value: true }],
            });
        }
        renderSetup();
        return;
    }

    // Build players from the persistent setup draft (Game-tab configuratie).
    // Zo gebruikt de minigame-tab dezelfde namen, kleuren en avatars als
    // het bordspel — één keer instellen is genoeg.
    const draft = getSetupDraft();
    const stash = G.players;
    G.players = draft.map((d, i) => ({
        name: d.name || `Speler ${i + 1}`,
        colorIdx: d.colorIdx,
        color: PLAYER_COLORS[d.colorIdx % PLAYER_COLORS.length],
        avatar: d.avatar || loadAvatarForColor(d.colorIdx),
    }));

    if (id === 'chwazi') {
        const winner = await playChwazi({
            title: 'Wie drinkt er?',
            subtitle: 'Iedereen legt één vinger op het scherm',
            drinks: 3,
        });
        if (winner) {
            await showModal({
                emoji: '🍻', title: 'Drinken!',
                body: ['De gekozen persoon neemt 3 flinke slokken.',
                       'Proost! 🥂'],
                actions: [{ label: 'Klaar', value: true }],
            });
        }
    } else if (id === 'krokodil') {
        const a = G.players[0], b = G.players[1];
        const loser = await playKrokodil({ playerA: a, playerB: b, drinks: 4 });
        if (loser) {
            await showModal({
                emoji: '🐊', title: `${loser.name} drinkt!`,
                body: [`Neem 4 slokken. Proost! 🥂`],
                actions: [{ label: 'Klaar', value: true }],
            });
        }
    } else if (id === 'paddle') {
        const a = G.players[0], b = G.players[1];
        const loser = await playPaddleDuel({ playerA: a, playerB: b, drinks: 4 });
        if (loser) {
            await showModal({
                emoji: '🏓', title: `${loser.name} drinkt!`,
                body: [`Neem 4 slokken. Proost! 🥂`],
                actions: [{ label: 'Klaar', value: true }],
            });
        }
    } else if (id === 'flappy') {
        await playTappyBird({ players: G.players, drinks: 2 });
    } else if (id === 'volcano') {
        const w = await playVolcanoHop({ players: G.players, drinks: 2 });
        if (w) { w.bonusDice = (w.bonusDice || 0) + 1; refreshHUD(); }
    } else if (id === 'raft' && G.players.length >= 2) {
        const a = G.players[0], b = G.players[1];
        const winner = await playRaftBattle({ playerA: a, playerB: b, drinks: 4 });
        if (winner) { winner.bonusDice = (winner.bonusDice || 0) + 1; refreshHUD(); }
    } else if (id === 'roulette') {
        await playVulcanoRoulette({ player: G.players[0] });
        // Standalone: no board to move on, no drinks payout — the in-game result
        // screen already explains what would have happened.
    } else if (id === 'blackjack') {
        const res = await playGodBlackjack({ player: G.players[0] });
        if (res && res.won) {
            await showModal({
                emoji: '🏆', title: `${G.players[0].name} versloeg de goden!`,
                body: [`Hand: ${res.playerVal} vs ${res.dealerVal}.`,
                       `In het bordspel zou je een tegenstander ${res.drinks} slokken laten drinken.`],
                actions: [{ label: 'Klaar', value: true }],
            });
        } else if (res && !res.tie) {
            await showModal({
                emoji: '⚡', title: `${G.players[0].name} verloor`,
                body: [`Hand: ${res.playerVal} vs ${res.dealerVal}.`,
                       `In het bordspel zou je zelf ${res.drinks} slokken drinken.`],
                actions: [{ label: 'Klaar', value: true }],
            });
        }
    } else if (id === 'hoofdsteden') {
        const res = await playHoofdsteden({ player: G.players[0] });
        if (res) {
            await showModal({
                emoji: res.won ? '🎯' : (res.timeout ? '⏰' : '❌'),
                title: res.won ? 'Goed gedaan!' : (res.timeout ? 'Te laat!' : 'Fout!'),
                body: [`Hoofdstad van ${res.country}: ${res.expected}.`,
                       res.won ? 'In het bordspel zou je vooruit gegaan zijn.' :
                                 `In het bordspel zou je ${res.drinks} slokken drinken.`],
                actions: [{ label: 'Klaar', value: true }],
            });
        }
    } else if (id === 'bowling') {
        const res = await playBowling({ players: G.players, drinks: 3 });
        if (res && res.winner) {
            res.winner.bonusDice = (res.winner.bonusDice || 0) + 1;
            refreshHUD();
        }
    } else if (id === 'connect4' && G.players.length >= 2) {
        const a = G.players[0], b = G.players[1];
        const winner = await playConnectFour({ playerA: a, playerB: b, drinks: 4 });
        if (winner) {
            winner.bonusDice = (winner.bonusDice || 0) + 1;
            refreshHUD();
        }
    } else if (id === 'mystery' && G.players.length >= 1) {
        // Standalone Mystery Wheel: spin it, then dispatch to the same standalone
        // launcher recursively (after un-doing the stash, so the inner call
        // doesn't re-stash an already-stashed list).
        const pickedId = await playMysteryWheel({});
        if (pickedId) {
            // restore the stash early so the recursive launch can re-stash cleanly
            G.players = stash;
            await launchStandaloneMinigame(pickedId);
            return; // renderSetup already called by inner launch
        }
    } else if (id === 'lavasteen' && G.players.length >= 2) {
        const loser = await playHeteLavasteen({ players: G.players, drinks: 4 });
        if (loser) {
            await showModal({
                emoji: '🌋', title: `${loser.name} drinkt!`,
                body: [`De lavasteen ontplofte in jouw hand. Neem 4 slokken. Proost! 🥂`],
                actions: [{ label: 'Klaar', value: true }],
            });
        }
    } else if (id === 'kano' && G.players.length >= 2) {
        const a = G.players[0], b = G.players[1];
        const loser = await playKanoRace({ playerA: a, playerB: b, drinks: 4 });
        if (loser) {
            await showModal({
                emoji: '🛶', title: `${loser.name} drinkt!`,
                body: [`Te traag aan de peddel. Neem 4 slokken. Proost! 🥂`],
                actions: [{ label: 'Klaar', value: true }],
            });
        }
    } else if (id === 'krabben' && G.players.length >= 1) {
        await playKrabbenVangen({ players: G.players, drinks: 2 });
    } else if (id === 'tiki' && G.players.length >= 1) {
        await playTikiRitme({ players: G.players, drinks: 3 });
    } else if (id === 'brug' && G.players.length >= 1) {
        await playBrugBalans({ players: G.players, drinks: 3 });
    }

    G.players = stash;
    renderSetup();
}

// ── Back to lobby ──
function goHome() {
    // Clean up tokens from the 3D scene
    while (tokenGroup.children.length) tokenGroup.remove(tokenGroup.children[0]);
    // Stop any in-flight animation flags on players
    if (G.players) G.players.forEach(p => { p._animating = false; });
    // Reset game state
    G.players = [];
    G.turnIdx = 0;
    G.round = 1;
    G.phase = 'setup';
    G.volcanoActive = 0;
    G.extraRollPending = false;
    G.schnapsCallTurns = [];
    // remove banner if present
    const b = document.getElementById('vol-banner'); if (b) b.remove();
    // Re-enable camera idle behavior and re-target the start tile
    controls.autoRotate = true;
    if (tileWorldPos[0]) controls.target.set(tileWorldPos[0].x, tileWorldPos[0].y + 1, tileWorldPos[0].z);
    // Render the setup screen
    renderSetup();
}

// ── Start game ──
function startGame(draft) {
    const cfg = DIFFICULTY_CONFIGS[G.difficulty] || DIFFICULTY_CONFIGS.normal;
    // build players
    G.players = draft.map(d => {
        const avatar = d.avatar || loadAvatarForColor(d.colorIdx) || defaultAvatar(d.colorIdx);
        const token = makePlayerAvatarToken(PLAYER_COLORS[d.colorIdx].hex, avatar);
        return {
            name: d.name || PLAYER_COLORS[d.colorIdx].name,
            colorIdx: d.colorIdx,
            color: PLAYER_COLORS[d.colorIdx],
            avatar,
            tileIdx: 0,
            token,
            bonusDice: cfg.startBonusDice || 0,
            extraRoll: false,
            skipNextTurn: false,
            inPrison: false,
        };
    });
    G.turnIdx = 0;
    G.round = 1;
    G.phase = 'idle';
    G.volcanoActive = 0;

    // ── Schnaps ruft an: plan random turn numbers up-front ──
    // We pre-pick the absolute turn-numbers when Schnaps will call so the
    // distribution is even and well-spread across a typical game. The check
    // in onLandedOnTile()'s tail compares against the upcoming turn-number.
    // No two Schnaps calls fire on the same turn.
    const callCount = cfg.schnapsCalls ?? 2;
    G.schnapsCallTurns = [];
    if (callCount > 0) {
        // Spread across turns 4..(4+ callCount*8). Earliest call after 4 turns
        // so the game has settled in; final-window scales with count so
        // berserk's 4 calls actually have room.
        const startT = 4, span = 8 + callCount * 6;
        const pool = [];
        for (let t = startT; t < startT + span; t++) pool.push(t);
        // Fisher-Yates shuffle and pick first N
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        G.schnapsCallTurns = pool.slice(0, callCount).sort((a, b) => a - b);
    }

    // place all tokens on the start
    G.players.forEach(p => layoutTokensOnTile(p.tileIdx));

    // swing the camera around to look at the start tile
    controls.target.set(tileWorldPos[0].x, tileWorldPos[0].y + 1, tileWorldPos[0].z);
    controls.autoRotate = true;

    clear(ui);
    renderHUD();
}

// Build a top-down silhouette of the path with a dot per player.
// Returns an <svg> element. The polyline never changes; only the dots move.
function buildMinimapSVG() {
    // Project all path points from world (x,z) into a 0-100 svg viewBox.
    // Y in svg = -z in world (so north stays at the top).
    const xs = pathPoints.map(p => p.x);
    const zs = pathPoints.map(p => p.z);
    const xMin = Math.min(...xs), xMax = Math.max(...xs);
    const zMin = Math.min(...zs), zMax = Math.max(...zs);
    const pad = 8;
    const sx = v => pad + ((v - xMin) / (xMax - xMin || 1)) * (100 - 2*pad);
    const sy = v => pad + ((v - zMin) / (zMax - zMin || 1)) * (100 - 2*pad);
    window.__mmProject = { sx, sy };

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

    // sample the curve densely so the path looks smooth
    const samples = 80;
    const pts = [];
    for (let i = 0; i <= samples; i++) {
        const p = pathCurve.getPointAt(i / samples);
        pts.push(`${sx(p.x).toFixed(2)},${sy(p.z).toFixed(2)}`);
    }
    // path outline (wider, dark)
    const back = document.createElementNS(svgNS, 'polyline');
    back.setAttribute('points', pts.join(' '));
    back.setAttribute('fill', 'none');
    back.setAttribute('stroke', 'rgba(0,0,0,0.5)');
    back.setAttribute('stroke-width', '5');
    back.setAttribute('stroke-linecap', 'round');
    back.setAttribute('stroke-linejoin', 'round');
    svg.append(back);
    // path main
    const line = document.createElementNS(svgNS, 'polyline');
    line.setAttribute('points', pts.join(' '));
    line.setAttribute('fill', 'none');
    line.setAttribute('stroke', 'rgba(255,255,255,0.55)');
    line.setAttribute('stroke-width', '2.5');
    line.setAttribute('stroke-linecap', 'round');
    line.setAttribute('stroke-linejoin', 'round');
    svg.append(line);

    // start marker
    const start = document.createElementNS(svgNS, 'circle');
    start.setAttribute('cx', sx(pathPoints[0].x));
    start.setAttribute('cy', sy(pathPoints[0].z));
    start.setAttribute('r', 2.6);
    start.setAttribute('fill', '#5cff7a');
    start.setAttribute('stroke', '#fff');
    start.setAttribute('stroke-width', '1');
    svg.append(start);
    // summit marker (gold star)
    const sm = document.createElementNS(svgNS, 'circle');
    sm.setAttribute('cx', sx(summitPos.x));
    sm.setAttribute('cy', sy(summitPos.z));
    sm.setAttribute('r', 3.4);
    sm.setAttribute('fill', '#ffd54a');
    sm.setAttribute('stroke', '#fff');
    sm.setAttribute('stroke-width', '1.2');
    svg.append(sm);

    // player dots (created up front, position updated by refreshMinimap)
    const dotsLayer = document.createElementNS(svgNS, 'g');
    dotsLayer.setAttribute('id', 'mm-dots');
    svg.append(dotsLayer);

    return svg;
}

function refreshMinimap() {
    const proj = window.__mmProject;
    const dots = document.getElementById('mm-dots');
    const list = document.getElementById('mm-list');
    if (!proj || !dots) return;
    while (dots.firstChild) dots.removeChild(dots.firstChild);
    while (list && list.firstChild) list.removeChild(list.firstChild);

    const svgNS = 'http://www.w3.org/2000/svg';
    // sort by progress descending so leader is at top of the list
    const ranked = G.players
        .map((p, i) => ({ p, i }))
        .sort((a, b) => b.p.tileIdx - a.p.tileIdx);

    // group players sharing a tile so dots don't perfectly stack
    const byTile = new Map();
    for (const { p, i } of ranked) {
        if (!byTile.has(p.tileIdx)) byTile.set(p.tileIdx, []);
        byTile.get(p.tileIdx).push({ p, i });
    }
    for (const [tileIdx, group] of byTile) {
        const tilePoint = tileWorldPos[tileIdx];
        const cx = proj.sx(tilePoint.x);
        const cy = proj.sy(tilePoint.z);
        group.forEach(({ p }, k) => {
            const a = (k / Math.max(1, group.length)) * Math.PI * 2;
            const r = group.length > 1 ? 3 : 0;
            const isCurrent = p === G.players[G.turnIdx];

            const ring = document.createElementNS(svgNS, 'circle');
            ring.setAttribute('cx', cx + Math.cos(a) * r);
            ring.setAttribute('cy', cy + Math.sin(a) * r);
            ring.setAttribute('r', isCurrent ? 4.2 : 3.2);
            ring.setAttribute('fill', p.color.css);
            ring.setAttribute('stroke', '#fff');
            ring.setAttribute('stroke-width', isCurrent ? 1.6 : 1.2);
            if (isCurrent) {
                const pulse = document.createElementNS(svgNS, 'animate');
                pulse.setAttribute('attributeName', 'r');
                pulse.setAttribute('values', '4.2;5.4;4.2');
                pulse.setAttribute('dur', '1.2s');
                pulse.setAttribute('repeatCount', 'indefinite');
                ring.append(pulse);
            }
            dots.append(ring);
        });
    }

    // legend list
    if (list) {
        for (const { p } of ranked) {
            const row = el('div', { className: 'mm-row' });
            const dot = el('div', { className: 'mm-dot' });
            dot.style.background = p.color.css;
            dot.style.color = p.color.css;
            const pct = Math.round((p.tileIdx / (TILE_COUNT - 1)) * 100);
            row.append(
                dot,
                el('div', { className: 'mm-name' }, p.name),
                el('div', { className: 'mm-pct' }, `${pct}%`),
            );
            list.append(row);
        }
    }
}

/* ============================================================
   hideMinigameChrome / restoreMinigameChrome
   ============================================================
   Tijdens een minigame willen we al het bord-game UI rommel
   verstoppen: home-knop, top-bar (titel+ronde), mini-map (rechts-
   boven), en de bottom-hud (speler-kaart + dobbelsteen). Plus de
   home-scherm overlay (.screen) op de minigame-tab.

   Zonder dit hangt er bv. een dobbelsteen-icoon midden over een
   raft-battle of bowling-scoreboard heen — niet wat we willen.

   Returns een array met {el, prev} entries die je aan
   restoreMinigameChrome doorgeeft als de minigame klaar is.
   ============================================================ */
function hideMinigameChrome() {
    const hidden = [];
    // Bord-game chrome
    for (const id of ['home-btn', 'top-bar', 'minimap', 'hud']) {
        const e = document.getElementById(id);
        if (e) {
            hidden.push({ el: e, prev: e.style.display });
            e.style.display = 'none';
        }
    }
    // Home-scherm overlay (alleen actief op de minigame-tab)
    document.querySelectorAll('#game-ui > .screen').forEach(s => {
        hidden.push({ el: s, prev: s.style.display });
        s.style.display = 'none';
    });
    return hidden;
}
function restoreMinigameChrome(hidden) {
    if (!hidden) return;
    for (const h of hidden) {
        if (h.el && h.el.style) h.el.style.display = h.prev;
    }
}

function refreshHUD() {
    const cur = G.players[G.turnIdx];
    if (!cur) return;
    const card = document.getElementById('cur-player');
    clear(card);
    // The player-card .avatar dot stays as the identity-color ring + glow,
    // but its inner content is now the chibi avatar face (if any).
    const av = el('div', { className: 'avatar' });
    av.style.color = cur.color.css;       // glow via currentColor
    if (cur.avatar) {
        av.style.background = 'rgba(0,0,0,0.25)';
        av.style.overflow = 'hidden';
        av.innerHTML = renderAvatarSVG(cur.avatar, 'head', 'width="100%" height="100%"');
        // Bump the SVG so the head fills the circle nicely
        const svg = av.firstChild;
        if (svg && svg.style) {
            svg.style.width  = '140%';
            svg.style.height = '140%';
            svg.style.marginTop = '4px';
        }
    } else {
        av.style.background = cur.color.css;
    }
    const txt = el('div');
    txt.append(
        el('div', { className: 'name' }, cur.name),
        el('div', { className: 'pos' }, `Tegel ${cur.tileIdx} / ${TILE_COUNT - 1}`),
    );
    card.append(av, txt);
    document.getElementById('round-pill').textContent = `Ronde ${G.round}`;
    refreshMinimap();
}

/**
 * Build a floating "Skip" pill for fullscreen iframe minigames.
 * Tap = exit minigame (no winner). Long-press (≥600ms) = open a tiny
 * popup with manual winner buttons (used as backup when the iframe's
 * own auto-detection fails or you want to override).
 *
 * @param {object} opts
 * @param {function(): void} opts.onSkip - called on tap (no winner)
 * @param {Array<{label:string,color:string,onPick:function():void}>} [opts.winners]
 * @returns {HTMLButtonElement}
 */
function makeMinigameSkip({ onSkip, winners }) {
    const skip = el('button', { className: 'mg-skip', type: 'button' }, 'Skip');
    let pressTimer = null;
    let usedLongPress = false;
    let popup = null;

    function closePopup() {
        if (popup) { popup.remove(); popup = null; }
    }
    function openPopup() {
        if (popup) return;
        usedLongPress = true;
        popup = el('div', { className: 'mg-winpop' });
        popup.append(el('div', { className: 'lbl' }, 'Wie heeft gewonnen?'));
        for (const w of (winners || [])) {
            const btn = el('button', { type: 'button',
                style: { background: w.color, borderColor: w.color } }, w.label);
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                closePopup();
                w.onPick();
            });
            popup.append(btn);
        }
        const cancel = el('button', { className: 'cancel', type: 'button' }, 'Annuleren');
        cancel.addEventListener('click', (e) => { e.stopPropagation(); closePopup(); });
        popup.append(cancel);
        skip.parentNode.append(popup);
    }
    function start() {
        usedLongPress = false;
        if (winners && winners.length) {
            pressTimer = setTimeout(openPopup, 600);
        }
    }
    function end() {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        if (!usedLongPress && !popup) onSkip();
    }
    function cancel() {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    }
    skip.addEventListener('pointerdown', start);
    skip.addEventListener('pointerup', end);
    skip.addEventListener('pointercancel', cancel);
    skip.addEventListener('pointerleave', cancel);
    return skip;
}

// BACKUP: oude iframe-based Raft Battle. Wordt niet meer aangeroepen, maar
// blijft staan voor het geval de nieuwe 3D versie hieronder issues geeft —
// dan kun je gewoon `playRaftBattle` aanroepen vanaf deze functie en het
// werkt direct weer.
function playRaftBattleIframe({ playerA, playerB, drinks = 4 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');

        // ── Home-scherm overlay verbergen ──────────────────────
        // De minigame-tab zet een semi-transparante .screen-overlay
        // over de 3D scene. Tijdens de battle willen we 'm verstoppen
        // zodat het eiland duidelijk zichtbaar is achter de transparante
        // iframe. In finish() weer terugzetten.
        const hiddenScreens = [];
        document.querySelectorAll('#game-ui > .screen').forEach(s => {
            hiddenScreens.push({ el: s, prevDisplay: s.style.display });
            s.style.display = 'none';
        });

        const back = el('div', { className: 'rb-back' });

        // Floating header overlay with title + VS chips matching player colors
        const header = el('div', { className: 'rb-header' });
        const titleEl = el('div', { className: 'rb-title' }, '🏴‍☠️ Raft Battle');
        const vs = el('div', { className: 'rb-vs' });
        const chipA = el('div', { className: 'chip', style: { '--pcol': playerA.color.css } });
        chipA.append(el('div', { className: 'dot' }), document.createTextNode(playerA.name));
        const xLbl = el('span', { className: 'x' }, 'vs');
        const chipB = el('div', { className: 'chip', style: { '--pcol': playerB.color.css } });
        chipB.append(el('div', { className: 'dot' }), document.createTextNode(playerB.name));
        vs.append(chipA, xLbl, chipB);
        header.append(titleEl, vs);

        // Iframe canvas fills the screen
        const wrap = el('div', { className: 'rb-canvas-wrap' });
        const iframe = el('iframe', {
            allow: 'accelerometer; gyroscope; autoplay',
            scrolling: 'no' });
        wrap.append(iframe);

        // Compose: iframe (full-screen) + header (floating top) + skip (floating top-right)
        back.append(wrap, header);

        let done = false;
        async function finish(winner) {
            if (done) return;
            done = true;
            window.removeEventListener('message', onMsg);
            back.remove();
            // Home-scherm overlay weer tonen
            for (const h of hiddenScreens) {
                h.el.style.display = h.prevDisplay;
            }
            if (winner) {
                const loser = winner === playerA ? playerB : playerA;
                await showModal({ emoji: '🏴‍☠️',
                    title: `${winner.name} wint Raft Battle!`,
                    body: [`${loser.name} drinkt ${drinks} 🍻`,
                        `${winner.name} krijgt 1 × gouden bonus-dobbelsteen 🎲💛`],
                    actions: [{ label: 'Klaar', value: true }] });
            }
            resolve(winner || null);
        }

        // Floating Skip pill. Tap → no winner. Long-press → manual winner popup.
        const skip = makeMinigameSkip({
            onSkip: () => finish(null),
            winners: [
                { label: playerA.name, color: playerA.color.css, onPick: () => finish(playerA) },
                { label: playerB.name, color: playerB.color.css, onPick: () => finish(playerB) },
            ],
        });
        back.append(skip);

        // Show a knock-out overlay on top of the iframe when the iframe
        // reports a winner. Auto-resolves after a short delay if the user
        // doesn't tap "Verder".
        function showKnockout(winner) {
            if (done) return;
            const ko = el('div', { className: 'rb-ko',
                style: { '--pcol': winner.color.css } });
            ko.append(
                el('h2', {}, `🥊 KNOCK-OUT! ${winner.name} wint!`),
                el('p', {}, `${(winner === playerA ? playerB : playerA).name} drinkt ${drinks} 🍻`),
                el('button', { className: 'btn-pill', type: 'button',
                    on: { click: () => finish(winner) } }, 'Verder'),
            );
            wrap.append(ko);
            // Auto-advance after 5s in case nobody taps
            setTimeout(() => finish(winner), 5000);
        }

        // Send the player config to the iframe. We do this both on load
        // and whenever the iframe says "hello", so the timing always works.
        // Naast naam+kleur sturen we ook de SVG-XML van het bord-game
        // avatar mee. De iframe rendert dat als hoofd van het bootje-poppetje
        // i.p.v. het generieke "oranje mannetje". Zo verschijnen exact
        // dezelfde poppetjes als op het bord op de boten.
        function _avatarSVG(p) {
            try {
                if (!p || !p.avatar) return null;
                // 'square' mode → mooi vierkant kader met head + bovenlijf,
                // past goed binnen de cirkel die de iframe eromheen tekent.
                return renderAvatarSVG(p.avatar, 'square');
            } catch (e) { return null; }
        }
        function sendInit() {
            try {
                iframe.contentWindow.postMessage({
                    type: 'raft-init',
                    playerA: {
                        name: playerA.name,
                        color: playerA.color.css,
                        avatarSVG: _avatarSVG(playerA),
                    },
                    playerB: {
                        name: playerB.name,
                        color: playerB.color.css,
                        avatarSVG: _avatarSVG(playerB),
                    },
                }, '*');
            } catch (e) { /* cross-origin — ignore */ }
        }

        // Listen for messages from the iframe game.
        //   raft-hello   → the iframe just loaded; (re-)send init
        //   raft-ready   → the iframe got our config; we can trust it,
        //                  so hide the manual "Wie heeft gewonnen?" bar
        //   raft-knockout→ somebody lost all their hearts. Pause briefly
        //                  so the iframe's win animation plays, then
        //                  show our own KO overlay on top.
        function onMsg(ev) {
            if (ev.source !== iframe.contentWindow) return; // ignore other frames
            const d = ev && ev.data;
            if (!d || typeof d !== 'object') return;
            if (d.type === 'raft-hello') { sendInit(); return; }
            if (d.type === 'raft-ready') {
                // iframe confirmed it received our init. No bar to hide anymore
