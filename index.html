                el('div', { className: 'sub' }, subTxt),
                el('div', { className: 'sub', style: { fontSize: '14px', opacity: '0.78' } },
                    outcome === 'tie'
                        ? 'Geen straf, geen beloning.'
                        : (outcome === 'win'
                            ? `Kies straks een slachtoffer: ${drinkN} slokken + ${knockBy(3)} tegels achteruit.`
                            : `${player.name} drinkt zelf ${drinkN} 🍻 en valt ${knockBy(3)} tegels terug.`)),
                el('button', { className: 'btn-pill gold', type: 'button',
                    style: { marginTop: '10px' },
                    on: { click: () => finish({
                        won: outcome === 'win', tie: outcome === 'tie',
                        playerVal: pv, dealerVal: dv, drinks: drinkN,
                    }) } }, 'Verder'),
            );
            back.append(res);
        }

        function finish(payload) {
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(payload); }, 300);
        }
    });
}

/* ============================================================
   Minigame 3 — Hoofdsteden Vuurdoop
   ============================================================
   Trivia under time pressure: type the capital of a random
   country before the timer runs out.
   Returns: { won: bool, correct: bool, timeout: bool,
              country: string, expected: string, given: string,
              drinks: number }
   ============================================================ */
const CAPITALS = [
    // Country → array of accepted answers (first is canonical).
    { country: 'Mongolië',     answers: ['Ulaanbaatar', 'Ulan Bator'] },
    { country: 'Kazachstan',   answers: ['Astana', 'Nur-Sultan'] },
    { country: 'Bhutan',       answers: ['Thimphu'] },
    { country: 'Eritrea',      answers: ['Asmara'] },
    { country: 'Vanuatu',      answers: ['Port Vila'] },
    { country: 'Sri Lanka',    answers: ['Sri Jayawardenepura Kotte', 'Colombo', 'Kotte'] },
    { country: 'Suriname',     answers: ['Paramaribo'] },
    { country: 'Burkina Faso', answers: ['Ouagadougou'] },
    { country: 'Madagaskar',   answers: ['Antananarivo'] },
    { country: 'Kirgizië',     answers: ['Bisjkek', 'Bishkek'] },
    { country: 'Botswana',     answers: ['Gaborone'] },
    { country: 'Brunei',       answers: ['Bandar Seri Begawan'] },
    { country: 'Tadzjikistan', answers: ['Doesjanbe', 'Dushanbe'] },
    { country: 'Oezbekistan',  answers: ['Tasjkent', 'Tashkent'] },
    { country: 'Azerbeidzjan', answers: ['Bakoe', 'Baku'] },
    { country: 'Tsjaad',       answers: ['Ndjamena', "N'Djamena"] },
    { country: 'Djibouti',     answers: ['Djibouti'] },
    { country: 'Lesotho',      answers: ['Maseru'] },
    { country: 'Bahrein',      answers: ['Manama'] },
    { country: 'Litouwen',     answers: ['Vilnius'] },
];

function playHoofdsteden({ player, drinks = null, timeMs = 12000 } = {}) {
    return new Promise(resolve => {
        const item = CAPITALS[Math.floor(Math.random() * CAPITALS.length)];

        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'hf-back' });
        if (player?.color?.css) back.style.setProperty('--pcol', player.color.css);

        const header = el('div', { className: 'hf-header' });
        header.append(
            el('div', { className: 'hf-title' }, '🏙️ Hoofdsteden Vuurdoop'),
            el('div', { className: 'hf-sub' }, 'Typ de juiste hoofdstad voor de timer afloopt!'),
            (() => {
                const w = el('div', { className: 'hf-who' });
                w.append(
                    el('span', { className: 'dot' }),
                    el('span', { className: 'nm' }, player?.name || 'Speler'),
                );
                return w;
            })(),
        );

        const bar = el('div', { className: 'hf-timer-bar' });
        const fill = el('div', { className: 'hf-timer-fill' });
        bar.append(fill);

        const stage = el('div', { className: 'hf-stage' });
        const prompt = el('div', { className: 'hf-prompt' });
        prompt.append(
            el('div', { className: 'lbl' }, 'Hoofdstad van:'),
            el('div', { className: 'country' }, item.country),
        );

        const row = el('div', { className: 'hf-input-row' });
        const input = el('input', {
            className: 'hf-input', type: 'text', placeholder: 'Typ je antwoord…',
            autocomplete: 'off', autocorrect: 'off', autocapitalize: 'words', spellcheck: false,
        });
        const goBtn = el('button', { className: 'hf-go', type: 'button' }, '▶');
        row.append(input, goBtn);
        stage.append(prompt, row);

        const foot = el('div', { className: 'hf-foot' });
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        foot.append(skipBtn);

        back.append(header, bar, stage, foot);
        ui.append(back);

        // Focus the input after a beat so iOS opens the keyboard
        setTimeout(() => input.focus(), 250);

        // ── Timer ──
        let startTs = performance.now();
        let done = false;
        let rafId = null;
        function tick(now) {
            const elapsed = now - startTs;
            const left = Math.max(0, timeMs - elapsed);
            const pct = left / timeMs;
            fill.style.transform = `scaleX(${pct.toFixed(4)})`;
            if (left <= 0) {
                judge(true); // timeout
                return;
            }
            rafId = requestAnimationFrame(tick);
        }
        rafId = requestAnimationFrame(tick);

        // ── Comparison ──
        function normalise(s) {
            // case-insensitive, ignore leading/trailing whitespace and accents
            return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                    .toLowerCase().trim().replace(/\s+/g, ' ');
        }
        function isCorrect(given) {
            const g = normalise(given);
            if (!g) return false;
            return item.answers.some(a => normalise(a) === g);
        }

        function submit() {
            if (done) return;
            judge(false);
        }
        function judge(timeout) {
            if (done) return;
            done = true;
            if (rafId) cancelAnimationFrame(rafId);
            const given = input.value;
            const correct = !timeout && isCorrect(given);

            const drinkN = drinks ?? (correct ? slokken(1) : slokken(2));
            let bigTxt, subTxt, glo;
            if (correct) {
                bigTxt = '🎯 GOED!';
                subTxt = `${player.name} verdient +${knockBy(3)} tegels • drink ${drinkN} (lucky tax) 🍻`;
                glo = '#5cff7a';
            } else if (timeout) {
                bigTxt = '⏰ TE LAAT!';
                subTxt = `${player.name} valt ${knockBy(2)} tegels terug en drinkt ${drinkN} 🍻`;
                glo = '#ff7a1f';
            } else {
                bigTxt = '❌ FOUT!';
                subTxt = `${player.name} valt ${knockBy(2)} tegels terug en drinkt ${drinkN} 🍻`;
                glo = '#ff3a3a';
            }

            const res = el('div', { className: 'hf-result show' });
            res.style.setProperty('--glo', glo);
            res.append(
                el('div', { className: 'big' }, bigTxt),
                el('div', { className: 'sub' }, subTxt),
                el('div', { className: 'answer' },
                    `Juist antwoord: ${item.answers[0]}` + (given ? ` — jij typte: "${given}"` : '')),
                el('button', { className: 'btn-pill gold', type: 'button',
                    style: { marginTop: '12px' },
                    on: { click: () => finish({
                        won: correct, correct, timeout,
                        country: item.country, expected: item.answers[0], given,
                        drinks: drinkN,
                    }) } }, 'Verder'),
            );
            back.append(res);
        }

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); submit(); }
        });
        goBtn.addEventListener('click', submit);
        skipBtn.addEventListener('click', () => {
            done = true;
            if (rafId) cancelAnimationFrame(rafId);
            finish(null);
        });

        function finish(payload) {
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(payload); }, 300);
        }
    });
}

/* ============================================================
   runMinigameOnTile(id, player)
   ============================================================
   Shared dispatcher used by the 'mystery' tile (and by the legacy
   per-minigame tile types). Handles opponent picking, drink scaling,
   bonus-die rewards, and the final result modal.
   ============================================================ */
async function runMinigameOnTile(id, player) {
    const others = G.players.filter(p => p !== player);
    const pickOpp = () => others[Math.floor(Math.random() * others.length)];

    if (id === 'krokodil' && G.players.length >= 2) {
        const opp = pickOpp();
        const d = slokken(4);
        const go = await showModal({
            emoji: '🐊', title: 'Krokodil 1v1!',
            body: [`${player.name} tegen ${opp.name}.`,
                   `Druk om de beurt op een tand. Wie de pijnlijke vindt, drinkt ${d}.`],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (!go) return;
        const loser = await playKrokodil({ playerA: player, playerB: opp, drinks: d });
        if (loser) {
            const winner = loser === player ? opp : player;
            winner.bonusDice = (winner.bonusDice || 0) + 1;
            refreshHUD();
            await showModal({
                emoji: '🍻', title: `${loser.name} drinkt!`,
                body: [`Neem ${d} flinke slokken. Proost! 🥂`,
                       `${winner.name} krijgt 1 × gouden bonus-dobbelsteen 🎲💛`],
                actions: [{ label: 'OK', value: true }],
            });
        }
    }
    else if (id === 'paddle' && G.players.length >= 2) {
        const opp = pickOpp();
        const d = slokken(4);
        const go = await showModal({
            emoji: '🏓', title: 'Paddle Duel!',
            body: [`${player.name} tegen ${opp.name}.`,
                   `Sleep in je helft. Eerste bij 3 punten wint, verliezer drinkt ${d}.`],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (!go) return;
        const loser = await playPaddleDuel({ playerA: player, playerB: opp, drinks: d });
        if (loser) {
            const winner = loser === player ? opp : player;
            winner.bonusDice = (winner.bonusDice || 0) + 1;
            refreshHUD();
            await showModal({
                emoji: '🍻', title: `${loser.name} drinkt!`,
                body: [`Neem ${d} flinke slokken. Proost! 🥂`,
                       `${winner.name} krijgt 1 × gouden bonus-dobbelsteen 🎲💛`],
                actions: [{ label: 'OK', value: true }],
            });
        }
    }
    else if (id === 'tappy') {
        const d = slokken(2);
        const go = await showModal({
            emoji: '🐦', title: 'Tappy Bird!',
            body: ['Iedereen speelt één potje, geef de telefoon door.',
                   `Wie het verst komt wint — anderen drinken ${d}.`],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (!go) return;
        const w = await playTappyBird({ players: G.players, drinks: d });
        if (w) {
            w.bonusDice = (w.bonusDice || 0) + 1;
            refreshHUD();
            await showStamp({
                emoji: '🎲💛', big: `${w.name} krijgt bonus!`,
                sub: '1 × gouden bonus-dobbelsteen', palette: 'gold',
            });
        }
    }
    else if (id === 'volcano') {
        const d = slokken(2);
        const go = await showModal({
            emoji: '🌋', title: 'Volcano Hop!',
            body: ['Iedereen kiest stiekem een platform.', 'Fout = lava + ⚡, laatste man wint.'],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (!go) return;
        const w = await playVolcanoHop({ players: G.players, drinks: d });
        if (w) {
            w.bonusDice = (w.bonusDice || 0) + 1;
            refreshHUD();
            await showStamp({
                emoji: '🎲💛', big: `${w.name} krijgt bonus!`,
                sub: '1 × gouden bonus-dobbelsteen — gebruik op je volgende worp',
                palette: 'gold',
            });
        }
    }
    else if (id === 'raft' && G.players.length >= 2) {
        const opp = pickOpp();
        const d = slokken(4);
        const go = await showModal({
            emoji: '🏴‍☠️', title: 'Raft Battle!',
            body: [`${player.name} tegen ${opp.name}.`,
                   `Knock je tegenstander van het vlot. Verliezer drinkt ${d}.`],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (!go) return;
        const winner = await playRaftBattle({ playerA: player, playerB: opp, drinks: d });
        if (winner) {
            const loser = winner === player ? opp : player;
            winner.bonusDice = (winner.bonusDice || 0) + 1;
            refreshHUD();
            await showModal({
                emoji: '🍻', title: `${loser.name} drinkt!`,
                body: [`Neem ${d} flinke slokken. Proost! 🥂`,
                       `${winner.name} krijgt 1 × gouden bonus-dobbelsteen 🎲💛`],
                actions: [{ label: 'OK', value: true }],
            });
        }
    }
    else if (id === 'roulette') {
        const res = await playVulcanoRoulette({ player });
        if (!res) return;
        // Apply the steps movement (signed) — no events on knockback steps
        if (res.steps !== 0) {
            await new Promise(r => moveTokenBy(player, res.steps, r));
            layoutTokensOnTile(player.tileIdx);
        }
        // Gold win is so juicy that we also reward a bonus die
        if (res.won && res.color === 'gold') {
            player.bonusDice = (player.bonusDice || 0) + 1;
            await showStamp({
                emoji: '🎲💛', big: 'JACKPOT BONUS!',
                sub: `${player.name} krijgt ook een gouden dobbelsteen`,
                palette: 'gold',
            });
        }
        refreshHUD();
    }
    else if (id === 'blackjack') {
        const res = await playGodBlackjack({ player });
        if (!res) return;
        if (res.won) {
            // Pick a victim to punish
            await showStamp({
                emoji: '⚡', big: 'STRAF UITDELEN',
                sub: `${player.name} kiest een slachtoffer`,
                palette: 'gold', auto: true, duration: 1100,
            });
            const victim = G.players.length >= 2 ? await pickVictim({
                title: '⚡ Wie moet de straf incasseren?',
                subtitle: `Drink ${res.drinks} 🍻 • ${knockBy(3)} tegels achteruit`,
                exclude: [player],
            }) : null;
            if (victim) {
                screenShake(450);
                await showStamp({
                    emoji: '⚡', big: `${victim.name} →`,
                    sub: `Drink ${res.drinks} 🍻 + ${knockBy(3)} tegels achteruit`,
                    palette: 'red',
                });
                await new Promise(r => moveTokenBy(victim, -knockBy(3), r));
                layoutTokensOnTile(victim.tileIdx);
            }
            // Winner gets a bonus die for beating the gods
            player.bonusDice = (player.bonusDice || 0) + 1;
        } else if (!res.tie) {
            // Player loses — self-punishment
            screenShake(450);
            await new Promise(r => moveTokenBy(player, -knockBy(3), r));
            layoutTokensOnTile(player.tileIdx);
            await showStamp({
                emoji: '🍻', big: `${player.name} drinkt ${res.drinks}`,
                sub: `${knockBy(3)} tegels achteruit. De goden zijn streng.`,
                palette: 'red',
            });
        }
        refreshHUD();
    }
    else if (id === 'hoofdsteden') {
        const res = await playHoofdsteden({ player });
        if (!res) return;
        if (res.won) {
            const stepsFwd = knockBy(3);
            await new Promise(r => moveTokenBy(player, +stepsFwd, r));
            layoutTokensOnTile(player.tileIdx);
            player.bonusDice = (player.bonusDice || 0) + 1;
            await showStamp({
                emoji: '🎲💛', big: 'KENNIS = MACHT',
                sub: `+${stepsFwd} tegels • bonus-dobbelsteen voor ${player.name}`,
                palette: 'gold',
            });
        } else {
            screenShake(350);
            const stepsBack = knockBy(2);
            await new Promise(r => moveTokenBy(player, -stepsBack, r));
            layoutTokensOnTile(player.tileIdx);
            await showStamp({
                emoji: '📚', big: `−${stepsBack} TEGELS`,
                sub: `${player.name} moet bijspijkeren — drink ${res.drinks} 🍻`,
                palette: 'red',
            });
        }
        refreshHUD();
    }
    else if (id === 'bowling') {
        const d = slokken(3);
        const go = await showModal({
            emoji: '🎳', title: 'Bowlspel!',
            body: ['Iedereen gooit één frame. Hoogste score wint.',
                   `Verliezers drinken ${d} 🍻 — winnaar krijgt een bonus-dobbelsteen.`],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (!go) return;
        const res = await playBowling({ players: G.players, drinks: d });
        if (res && res.winner) {
            res.winner.bonusDice = (res.winner.bonusDice || 0) + 1;
            refreshHUD();
        }
    }
    else if (id === 'connect4' && G.players.length >= 2) {
        const opp = pickOpp();
        const d = slokken(4);
        const go = await showModal({
            emoji: '🟡', title: 'Vier op een Rij!',
            body: [`${player.name} tegen ${opp.name}.`,
                   `Tik op een kolom om je schijf te laten vallen. Eerste met 4 op een rij wint, verliezer drinkt ${d}.`],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (!go) return;
        const winner = await playConnectFour({ playerA: player, playerB: opp, drinks: d });
        if (winner) {
            winner.bonusDice = (winner.bonusDice || 0) + 1;
            refreshHUD();
        }
    }
}

// ── Landing logic ──
async function onLandedOnTile(player) {
    layoutTokensOnTile(player.tileIdx);
    refreshHUD();

    // winner?
    if (player.tileIdx >= TILE_COUNT - 1) {
        G.phase = 'over';
        await showModal({
            emoji: '🏆', title: `${player.name} wint!`,
            body: ['Heeft de top van het Drank Eiland bereikt!', 'Iedereen anders: neem een slok 🍻'],
            actions: [{ label: 'Nieuw spel', value: 'new' }],
        });
        renderSetup();
        // cleanup tokens
        while (tokenGroup.children.length) tokenGroup.remove(tokenGroup.children[0]);
        return;
    }

    const tileType = tileTypes[player.tileIdx];

    // ════════════════════════════════════════════════════════════
    // NEW WII-PARTY-STYLE TILE EVENTS  (use slokken() & knockBy() helpers
    // so the difficulty multipliers automatically apply.)
    // ════════════════════════════════════════════════════════════
    const cfg = DIFFICULTY_CONFIGS[G.difficulty] || DIFFICULTY_CONFIGS.normal;

    // ─── PLUS tile (blue) — small forward boost, drink 1 ───
    if (tileType === 'plus') {
        G.phase = 'event';
        const n = knockBy(2);
        const d = slokken(1);
        await showStamp({
            emoji: '⬆️✨', big: `+${n} VOORUIT!`,
            sub: `${player.name} drinkt ${d} 🍻 (lucky tax)`,
            palette: 'blue',
        });
        await new Promise(r => setTimeout(r, 80));
        await new Promise(r => moveTokenBy(player, +n, r));
        layoutTokensOnTile(player.tileIdx);
        refreshHUD();
        if (player.tileIdx >= TILE_COUNT - 1) return onLandedOnTile(player);
    }
    // ─── MINUS tile (red) — small knockback, drink 2 ───
    else if (tileType === 'minus') {
        G.phase = 'event';
        screenShake(350);
        const n = knockBy(2);
        const d = slokken(2);
        await showStamp({
            emoji: '⬇️💥', big: `−${n} ACHTERUIT!`,
            sub: `${player.name} drinkt ${d} 🍻`,
            palette: 'red',
        });
        await new Promise(r => setTimeout(r, 80));
        await new Promise(r => moveTokenBy(player, -n, r));
        layoutTokensOnTile(player.tileIdx);
        refreshHUD();
    }
    // ─── DRINK tile (green) — cheers with another player ───
    else if (tileType === 'drink' && G.players.length >= 2) {
        G.phase = 'event';
        const d = slokken(1);
        await showStamp({
            emoji: '🍻', big: 'PROOST!',
            sub: 'Kies iemand om mee te klinken',
            palette: 'green', auto: true, duration: 1100,
        });
        const buddy = await pickVictim({
            title: '🍻 Met wie klink je?',
            subtitle: `${player.name} en de gekozen speler drinken samen ${d} slok${d>1?'ken':''}`,
            exclude: [player],
        });
        if (buddy) {
            await showStamp({
                emoji: '🥂', big: `${player.name} & ${buddy.name}`,
                sub: `Drink samen ${d} 🍻 — proost!`,
                palette: 'green',
            });
        }
    }
    // ─── BLUE STATUE — mega jackpot boost, drink 1 ───
    else if (tileType === 'bluestatue') {
        G.phase = 'event';
        const n = knockBy(6);
        const d = slokken(1);
        await showStamp({
            emoji: '🗿💙', big: 'BLAUWE STANDBEELD!',
            sub: `MEGA BOOST: +${n} vooruit • ${player.name} drinkt ${d} 🍻`,
            palette: 'blue',
        });
        await new Promise(r => setTimeout(r, 80));
        await new Promise(r => moveTokenBy(player, +n, r));
        layoutTokensOnTile(player.tileIdx);
        refreshHUD();
        if (player.tileIdx >= TILE_COUNT - 1) return onLandedOnTile(player);
    }
    // ─── RED STATUE — cruel knockback (-6), drink 3.
    //     On Gezellig difficulty: tile is "broken", acts like a minus instead.
    else if (tileType === 'redstatue') {
        G.phase = 'event';
        if (cfg.redStatueEnabled) {
            screenShake(500);
            const n = knockBy(6);
            const d = slokken(3);
            await showStamp({
                emoji: '🗿❤️‍🔥', big: 'RODE STANDBEELD!',
                sub: `BOEM: −${n} achteruit • ${player.name} drinkt ${d} 🍻`,
                palette: 'red',
            });
            await new Promise(r => setTimeout(r, 80));
            await new Promise(r => moveTokenBy(player, -n, r));
        } else {
            // Gezellig: het standbeeld brokkelt af
            const n = knockBy(2);
            await showStamp({
                emoji: '🗿', big: 'AFGEBROKEN',
                sub: `Het standbeeld is brak — alleen −${n} • drink ${slokken(1)} 🍻`,
                palette: 'red',
            });
            await new Promise(r => moveTokenBy(player, -n, r));
        }
        layoutTokensOnTile(player.tileIdx);
        refreshHUD();
    }
    // ─── TORNADO — blow someone else back, they drink ───
    else if (tileType === 'tornado' && G.players.length >= 2) {
        G.phase = 'event';
        const n = knockBy(3);
        const d = slokken(2);
        await showStamp({
            emoji: '🌪️', big: 'TORNADO!',
            sub: `${player.name}: kies een speler om weg te blazen`,
            palette: 'dark', auto: true, duration: 1300,
        });
        const victim = await pickVictim({
            title: '🌪️ Wie wordt weggeblazen?',
            subtitle: `−${n} tegels achteruit + drink ${d} 🍻`,
            exclude: [player],
        });
        if (victim) {
            screenShake(500);
            await showStamp({
                emoji: '💨', big: `${victim.name} → −${n}`,
                sub: `${victim.name} drinkt ${d} 🍻`,
                palette: 'dark',
            });
            await new Promise(r => moveTokenBy(victim, -n, r));
            layoutTokensOnTile(victim.tileIdx);
            refreshHUD();
        }
    }
    // ─── UFO — swap places with another player ───
    else if (tileType === 'ufo' && G.players.length >= 2) {
        G.phase = 'event';
        const d = slokken(1);
        await showStamp({
            emoji: '🛸', big: 'UFO!',
            sub: `${player.name}: kies een speler om mee te wisselen`,
            palette: 'purple', auto: true, duration: 1400,
        });
        const swap = await pickVictim({
            title: '🛸 Met wie wissel je?',
            subtitle: `Beiden drinken ${d} 🍻 voor de schok`,
            exclude: [player],
        });
        if (swap) {
            const pIdx = player.tileIdx, sIdx = swap.tileIdx;
            await showStamp({
                emoji: '✨🔁✨', big: `${player.name} ↔ ${swap.name}`,
                sub: `Beiden drinken ${d} 🍻`,
                palette: 'purple',
            });
            teleportTokenTo(player, sIdx);
            teleportTokenTo(swap, pIdx);
            refreshHUD();
            if (player.tileIdx >= TILE_COUNT - 1) return onLandedOnTile(player);
        }
    }
    // ─── SKULL — fall into the volcano (Gezellig: gets disabled, acts like drink tile)
    else if (tileType === 'skull') {
        G.phase = 'event';
        if (cfg.skullEnabled) {
            screenShake(600);
            const d = slokken(4);
            await showStamp({
                emoji: '💀🌋', big: 'IN DE VULKAAN!',
                sub: `${player.name} drinkt ${d} 🍻 • slaat 1 beurt over`,
                palette: 'lava',
            });
            player.skipNextTurn = true;
            await new Promise(r => moveTokenBy(player, -1, r));
            layoutTokensOnTile(player.tileIdx);
            refreshHUD();
            if (Math.random() < 0.5) {
                G.volcanoActive = 3;
                updateVolcanoBanner();
                await showStamp({
                    emoji: '🌋', big: 'UITBARSTING!',
                    sub: 'Volgende 3 rondes: vulkaan rommelt — alle worpen −1',
                    palette: 'lava',
                });
            }
        } else {
            // Gezellig: schedel is alleen voor de show
            const d = slokken(2);
            await showStamp({
                emoji: '💀', big: 'BRRR…',
                sub: `Spookachtig! ${player.name} drinkt ${d} 🍻`,
                palette: 'dark',
            });
            refreshHUD();
        }
    }
    // ─── LAVA — drinking penalty + possible knockback during eruption ───
    else if (tileType === 'lava') {
        G.phase = 'event';
        const erupt = G.volcanoActive > 0;
        if (erupt) {
            screenShake(450);
            const n = knockBy(3);
            const d = slokken(2);
            await showStamp({
                emoji: '🔥', big: 'LAVA STRAAL!',
                sub: `${player.name} drinkt ${d} 🍻 • −${n} tegels`,
                palette: 'lava',
            });
            await new Promise(r => moveTokenBy(player, -n, r));
        } else {
            const slip = Math.random() < 0.25;
            if (slip) {
                screenShake(350);
                const d = slokken(1);
                await showStamp({
                    emoji: '🥵', big: 'HEET! −1',
                    sub: `${player.name} drinkt ${d} 🍻 • glijdt 1 terug`,
                    palette: 'lava',
                });
                await new Promise(r => moveTokenBy(player, -1, r));
            } else {
                const d = slokken(1);
                await showStamp({
                    emoji: '♨️', big: 'LAVA',
                    sub: `${player.name} drinkt ${d} 🍻`,
                    palette: 'lava',
                });
            }
            if (Math.random() < cfg.eruptionChance) {
                G.volcanoActive = 3;
                updateVolcanoBanner();
                await showStamp({
                    emoji: '🌋', big: 'UITBARSTING!',
                    sub: '3 rondes: alle worpen −1, lava is dodelijk',
                    palette: 'lava',
                });
            }
        }
        layoutTokensOnTile(player.tileIdx);
        refreshHUD();
    }
    // ─── KROKODIL (legacy tile type — kept in case the board generator is reverted) ───
    else if (tileType === 'krokodil' && G.players.length >= 2) {
        G.phase = 'event';
        await runMinigameOnTile('krokodil', player);
    }
    // ─── CHWAZI — random player drinks ───
    else if (tileType === 'chwazi') {
        G.phase = 'event';
        const d = slokken(3);
        const go = await showModal({
            emoji: '👆', title: 'Iemand drinkt!',
            body: ['Tijd voor Chwazi.', 'Iedereen legt zo een vinger op het scherm — één speler wordt willekeurig gekozen.'],
            actions: [{ label: 'Start', value: true }, { label: 'Skip', value: false }],
        });
        if (go) {
            const winner = await playChwazi({
                title: 'Wie drinkt er?',
                subtitle: `Alle ${G.players.length} spelers leggen één vinger op het scherm`,
                drinks: d,
            });
            if (winner) {
                await showModal({
                    emoji: '🍻', title: `${winner.name} drinkt!`,
                    body: [`Pak je glas en neem ${d} flinke slokken.`, 'Proost! 🥂'],
                    actions: [{ label: 'OK', value: true }],
                });
            }
        }
    }
    // ─── MYSTERY — spin the wheel, then play whichever minigame the wheel landed on ───
    else if (tileType === 'mystery') {
        G.phase = 'event';
        await showStamp({
            emoji: '🎡', big: 'MYSTERY!',
            sub: `${player.name} draait aan het rad — wat wordt het?`,
            palette: 'purple', auto: true, duration: 1200,
        });
        // Filter wheel options based on player count: 1v1 games need 2+
        const playerOk = G.players.length >= 2;
        const options = MYSTERY_OPTIONS.filter(o => {
            if (!playerOk) return ['roulette','blackjack','hoofdsteden'].includes(o.id);
            return true;
        });
        const id = await playMysteryWheel({ options });
        if (id) await runMinigameOnTile(id, player);
    }
    // ─── Legacy minigame tile types — only triggered if the board generator hasn't
    // been updated yet. They route through the same minigame dispatcher.
    else if (tileType === 'volcanoHop') {
        G.phase = 'event';
        await runMinigameOnTile('volcano', player);
    }
    else if (tileType === 'tappy') {
        G.phase = 'event';
        await runMinigameOnTile('tappy', player);
    }
    else if (tileType === 'paddle' && G.players.length >= 2) {
        G.phase = 'event';
        await runMinigameOnTile('paddle', player);
    }

    // Re-check if a previous +tile movement landed someone on a finish tile
    if (player.tileIdx >= TILE_COUNT - 1) {
        return onLandedOnTile(player);
    }

    // ── Turn advance ──
    // Doubles → same player rolls again (no turn advance)
    if (player.extraRoll) {
        player.extraRoll = false;
        // brief notice
        await showStamp({
            emoji: '🎲🎲', big: 'NOG EEN BEURT',
            sub: `${player.name} gooit opnieuw!`,
            palette: 'gold',
        });
    } else {
        advanceTurn();
    }
    G.phase = 'idle';
    refreshHUD();

    // ── Schnaps ruft an: random in-game call ──
    // Fires AFTER advanceTurn (so the player it targets is the one whose
    // turn is about to start) and AFTER phase is reset to 'idle' (so the
    // dice button stays disabled while the call screen is open). Never
    // fires during a minigame because we're past that already.
    await maybeFireSchnapsCall();

    // un-disable dice
    const btn = document.getElementById('dice-btn');
    if (btn) { btn.disabled = false; btn.textContent = '🎲'; }
}

// ── Per-frame token idle bob (called from inside animate via hook) ──
const _gameHook = (time) => {
    for (const p of G.players) {
        if (p._animating) continue;
        const isCurrent = p === G.players[G.turnIdx] && G.phase === 'idle';
        const bob = Math.sin(time * 2.5 + p.colorIdx) * 0.05 + (isCurrent ? 0.15 + Math.abs(Math.sin(time*3))*0.1 : 0);
        if (p._restTarget) {
            p.token.position.x = p._restTarget.x;
            p.token.position.z = p._restTarget.z;
            p.token.position.y = p._restTarget.y + bob;
        }
        p.token.rotation.y = time * 0.6 + p.colorIdx;
    }
};
window.__deGameHook = _gameHook;

// boot the setup screen once the page is ready
renderSetup();

// start render loop + hide splash
animate();
requestAnimationFrame(() => {
    setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
    }, 200);
});

</script>
</body>
</html>
