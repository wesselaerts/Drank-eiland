<style>
    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #87CEEB;
        touch-action: none;
        overscroll-behavior: none;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    canvas { display: block; }

    #ui {
        position: absolute;
        top: max(18px, env(safe-area-inset-top));
        left: max(18px, env(safe-area-inset-left));
        color: white;
        z-index: 10;
        pointer-events: none;
        text-shadow:
            2px 2px 0 #000,
           -2px 2px 0 #000,
            2px -2px 0 #000,
           -2px -2px 0 #000;
    }

    #ui h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0.5px;
    }

    #ui p {
        margin: 4px 0 0;
        font-size: 13px;
        opacity: 0.95;
    }

    #hint {
        position: absolute;
        bottom: max(22px, env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        color: white;
        font-size: 12px;
        z-index: 10;
        pointer-events: none;
        text-shadow: 1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000;
        opacity: 0.85;
        white-space: nowrap;
    }

    #loading {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, #9fd9ff 0%, #4da6ff 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 10px;
        color: white;
        font-size: 18px;
        z-index: 100;
        transition: opacity 0.7s ease;
        text-shadow: 2px 2px 0 rgba(0,0,0,0.35);
    }

    #loading.hidden { opacity: 0; pointer-events: none; }

    /* ───── Game UI ───── */
    #game-ui { position: fixed; inset: 0; pointer-events: none; z-index: 20;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #game-ui > * { pointer-events: auto; }

    .screen { position: fixed; inset: 0; display: flex; align-items: center;
      flex-direction: column; padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(20,40,70,0.78) 0%, rgba(30,15,40,0.85) 100%);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: #fff;
      overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
    /* Spacer pseudo-elements vertically centre the content when it fits, but
       collapse to 0 once the content exceeds the viewport so the user can
       scroll naturally. Without these, fixed + justify-content:center cuts
       off both the top and the bottom of an over-long form on iPhone. */
    .screen::before, .screen::after { content: ""; flex: 1 1 0; min-height: 0; }
    .screen h1 { font-size: 38px; margin: 0 0 6px; letter-spacing: 1px;
      text-shadow: 0 3px 0 #000, 0 0 18px rgba(255,170,40,0.6); }
    .screen .sub { opacity: 0.85; margin-bottom: 22px; font-size: 14px; }
    .tabs { display: flex; gap: 6px; background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
      padding: 4px; width: min(420px, 100%); margin-bottom: 16px; }
    .tabs button { flex: 1; min-height: 42px; border-radius: 999px; border: none;
      background: transparent; color: rgba(255,255,255,0.7); font-weight: 700;
      font-size: 14px; cursor: pointer; transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent; }
    .tabs button.active { background: linear-gradient(180deg, #ffd54a, #ff9a1a);
      color: #1a1010; box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
    .mg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 380px) { .mg-grid { grid-template-columns: 1fr; } }
    .mg-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px; padding: 16px 14px; text-align: center; cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
      -webkit-tap-highlight-color: transparent; position: relative; overflow: hidden; }
    .mg-card:hover, .mg-card:active { background: rgba(255,255,255,0.12); transform: translateY(-2px); }
    .mg-card.locked { opacity: 0.45; cursor: not-allowed; }
    .mg-card.locked:hover, .mg-card.locked:active { transform: none; background: rgba(255,255,255,0.07); }
    .mg-card .emoji { font-size: 40px; margin-bottom: 6px; }
    .mg-card .name { font-weight: 800; font-size: 15px; margin-bottom: 2px; }
    .mg-card .meta { font-size: 11px; opacity: 0.65; letter-spacing: 0.4px; text-transform: uppercase; }
    .mg-card .tag { position: absolute; top: 8px; right: 8px; font-size: 10px;
      padding: 3px 7px; border-radius: 99px; background: rgba(255,255,255,0.15);
      letter-spacing: 0.4px; }
    .mg-quick { display: flex; align-items: center; gap: 12px; justify-content: center;
      margin-top: 14px; padding: 12px 14px; background: rgba(0,0,0,0.25);
      border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); }
    .mg-quick .lbl { font-size: 13px; opacity: 0.8; }
    .mg-quick .pcount { display: flex; align-items: center; gap: 8px; }
    .mg-quick .pcount button { width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
      color: #fff; font-weight: 800; font-size: 18px; cursor: pointer;
      -webkit-tap-highlight-color: transparent; }
    .mg-quick .pcount .n { font-weight: 900; font-size: 20px; min-width: 24px; text-align: center; }
    .card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px; padding: 16px; width: min(420px, 100%); margin-bottom: 14px;
      backdrop-filter: blur(4px); }

    /* Difficulty selector grid */
    .diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .diff-card { padding: 12px 10px 10px; border-radius: 14px; cursor: pointer;
      background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.10);
      text-align: center; transition: transform 0.12s ease, background 0.2s ease, border-color 0.2s ease;
      -webkit-tap-highlight-color: transparent; }
    .diff-card:active { transform: scale(0.97); }
    .diff-card.active { background: rgba(255,200,80,0.18);
      border-color: rgba(255,200,80,0.7);
      box-shadow: 0 0 0 1px rgba(255,200,80,0.3), 0 0 18px rgba(255,200,80,0.25); }
    .diff-card .diff-emoji { font-size: 26px; line-height: 1; margin-bottom: 4px; }
    .diff-card .diff-name { font-size: 14px; font-weight: 800; color: #fff; }
    .diff-card .diff-mult { font-size: 11px; opacity: 0.85; font-weight: 700;
      margin-top: 2px; color: #ffd54a; }
    .diff-card .diff-descr { font-size: 10.5px; opacity: 0.65; margin-top: 5px;
      line-height: 1.3; min-height: 26px; }

    .player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .player-row input { flex: 1; min-width: 0; background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
      padding: 10px 12px; color: #fff; font-size: 16px; outline: none; }
    .player-row input:focus { border-color: #ffd54a; }
    .swatch { width: 36px; height: 36px; border-radius: 50%; border: 3px solid #fff;
      box-shadow: 0 2px 0 rgba(0,0,0,0.4); cursor: pointer; flex-shrink: 0; transition: transform .15s; }
    .swatch:active { transform: scale(0.92); }
    .btn-x { background: rgba(255,80,80,0.25); border: 1px solid rgba(255,80,80,0.5);
      color: #fff; width: 32px; height: 32px; border-radius: 50%; font-size: 18px;
      display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

    .btn { background: linear-gradient(180deg, #ffd54a 0%, #ff9a1a 100%);
      color: #1a1010; border: none; padding: 14px 28px; border-radius: 999px;
      font-size: 17px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 0 #b86c00, 0 8px 24px rgba(0,0,0,0.4);
      transition: transform .1s, box-shadow .1s; letter-spacing: 0.5px; }
    .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b86c00, 0 4px 14px rgba(0,0,0,0.4); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.ghost { background: rgba(255,255,255,0.1); color: #fff;
      box-shadow: 0 4px 0 rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); }
    .btn.ghost:active { box-shadow: 0 1px 0 rgba(0,0,0,0.3); }

    /* Mini-map top-right — see how far everyone is */
    #minimap { position: fixed; top: max(60px, calc(env(safe-area-inset-top) + 50px));
      right: max(14px, env(safe-area-inset-right)); z-index: 24;
      width: 150px; padding: 10px 10px 8px;
      background: rgba(15,30,50,0.45); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      color: #fff; pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
    #minimap .mm-title { font-size: 10px; letter-spacing: 1.2px; opacity: 0.7;
      text-transform: uppercase; margin-bottom: 6px; }
    #minimap svg { display: block; width: 100%; height: auto; }
    #minimap .mm-row { display: flex; align-items: center; gap: 6px;
      font-size: 11px; margin-top: 4px; }
    #minimap .mm-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #fff;
      box-shadow: 0 0 6px currentColor; flex-shrink: 0; }
    #minimap .mm-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #minimap .mm-pct { opacity: 0.75; font-variant-numeric: tabular-nums; }

    /* HUD — bottom card with current player + dice button */
    #hud { position: fixed; bottom: max(16px, env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%); z-index: 25;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: none; }
    #hud > * { pointer-events: auto; }
    .player-card { background: rgba(15,30,50,0.85); border: 2px solid #fff;
      border-radius: 18px; padding: 10px 18px; color: #fff;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5); min-width: 200px; }
    .player-card .avatar { width: 38px; height: 38px; border-radius: 50%;
      border: 3px solid #fff; box-shadow: 0 0 14px currentColor; }
    .player-card .name { font-weight: 700; font-size: 18px; }
    .player-card .pos { font-size: 12px; opacity: 0.75; }

    .dice-btn { width: 86px; height: 86px; border-radius: 22px;
      background: linear-gradient(180deg, #fff 0%, #ddd 100%); color: #222;
      font-size: 44px; font-weight: 900; cursor: pointer; border: 4px solid #fff;
      box-shadow: 0 6px 0 rgba(0,0,0,0.4), 0 10px 30px rgba(255,200,50,0.4);
      display: flex; align-items: center; justify-content: center;
      transition: transform .1s; user-select: none; -webkit-user-select: none; }
    .dice-btn { position: relative; }
    .dice-btn:active { transform: translateY(3px); }
    .dice-btn .bonus-dot { position: absolute; top: -6px; right: -6px; width: 28px; height: 28px;
      border-radius: 50%; background: linear-gradient(180deg, #ffd54a, #d99a1a);
      color: #4a2a00; font-size: 14px; font-weight: 900; display: flex;
      align-items: center; justify-content: center; border: 2px solid #fff;
      box-shadow: 0 2px 0 #5a3a00, 0 0 12px #ffd54a; pointer-events: none; }
    .dice-btn.rolling { animation: diceShake 0.08s linear infinite; }
    @keyframes diceShake { 0%,100%{ transform: rotate(-8deg) }
      25% { transform: rotate(8deg) translate(2px,-2px) } 50% { transform: rotate(-6deg) translate(-2px,2px) }
      75% { transform: rotate(10deg) translate(2px,2px) } }

    /* ===== 3D dice overlay (shown when rolling) ===== */
    .dice-overlay { position: fixed; inset: 0; z-index: 70;
      background: radial-gradient(ellipse at 50% 40%, rgba(40,20,60,0.85) 0%, rgba(5,5,15,0.95) 70%);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 28px; padding: 24px; animation: fadeIn .25s ease;
      color: #fff; pointer-events: auto; }
    .dice-overlay .label { font-size: 20px; font-weight: 800; letter-spacing: 0.5px;
      text-shadow: 0 2px 0 #000; text-align: center; }
    .dice-stage { position: relative; perspective: 900px;
      width: 120px; height: 120px;
      display: flex; align-items: center; justify-content: center; }
    .dice-stage.dual { width: 260px; gap: 20px; }
    .dice-total { font-size: 56px; font-weight: 900; letter-spacing: 1px;
      text-shadow: 0 4px 0 #000, 0 0 20px rgba(255,215,80,0.65);
      animation: pop .3s cubic-bezier(.4,1.6,.5,1); color: #ffd54a; }
    .dice-total .gold-part { color: #ffd54a; text-shadow: 0 0 14px #ffd54a; }

    /* The 3D cube itself */
    .die3d { position: relative; width: 100px; height: 100px;
      transform-style: preserve-3d;
      transform: rotateX(-20deg) rotateY(20deg);
      transition: transform 1.4s cubic-bezier(.22,.85,.25,1);
      filter: drop-shadow(0 12px 14px rgba(0,0,0,0.55)); }
    .dice-stage.dual .die3d { width: 90px; height: 90px; }
    .die3d .face { position: absolute; inset: 0;
      background: linear-gradient(160deg, #fafafa 0%, #d4d4d4 60%, #b0b0b0 100%);
      border: 2px solid rgba(0,0,0,0.15); border-radius: 14px;
      box-shadow: inset 0 0 18px rgba(0,0,0,0.18), inset 0 4px 0 rgba(255,255,255,0.6);
      backface-visibility: hidden; }
    .die3d.gold .face {
      background: linear-gradient(160deg, #ffe98a 0%, #ffd54a 50%, #d99a1a 100%);
      border-color: rgba(120,70,0,0.4);
      box-shadow: inset 0 0 22px rgba(170,90,0,0.4), inset 0 4px 0 rgba(255,255,200,0.7); }
    /* Position each face on the cube. Z translation puts it on the right side. */
    .die3d .f1 { transform: translateZ(50px); }                    /* front  */
    .die3d .f6 { transform: rotateY(180deg) translateZ(50px); }    /* back   */
    .die3d .f2 { transform: rotateY( 90deg) translateZ(50px); }    /* right  */
    .die3d .f5 { transform: rotateY(-90deg) translateZ(50px); }    /* left   */
    .die3d .f3 { transform: rotateX( 90deg) translateZ(50px); }    /* top    */
    .die3d .f4 { transform: rotateX(-90deg) translateZ(50px); }    /* bottom */
    .dice-stage.dual .die3d .f1 { transform: translateZ(45px); }
    .dice-stage.dual .die3d .f6 { transform: rotateY(180deg) translateZ(45px); }
    .dice-stage.dual .die3d .f2 { transform: rotateY( 90deg) translateZ(45px); }
    .dice-stage.dual .die3d .f5 { transform: rotateY(-90deg) translateZ(45px); }
    .dice-stage.dual .die3d .f3 { transform: rotateX( 90deg) translateZ(45px); }
    .dice-stage.dual .die3d .f4 { transform: rotateX(-90deg) translateZ(45px); }
    /* Pips (dots) */
    .die3d .pip { position: absolute; width: 16px; height: 16px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #555 0%, #111 70%);
      transform: translate(-50%, -50%);
      box-shadow: inset 0 -2px 2px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.2); }
    .die3d.gold .pip {
      background: radial-gradient(circle at 35% 35%, #5a2a00 0%, #1a0a00 70%); }
    .dice-stage.dual .die3d .pip { width: 14px; height: 14px; }
    /* Brief rolling shake — class is added then removed in next frame as a marker */
    .die3d.rolling { transition: none; }

    /* ===== Raft Battle wrapper — matches the pirate/board aesthetic ===== */
    .rb-back { position: fixed; inset: 0; z-index: 60;
      display: flex; flex-direction: column;
      background: linear-gradient(180deg, #0a1830 0%, #051022 60%, #020812 100%);
      color: #fff; animation: fadeIn .25s ease; user-select: none; overflow: hidden;
      padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    .rb-back::before { content: ""; position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,200,90,0.10), transparent 35%),
        radial-gradient(circle at 80% 90%, rgba(80,160,255,0.10), transparent 40%);
      z-index: 0; }
    .rb-header { position: relative; z-index: 2; padding: 10px 14px 6px;
      display: flex; align-items: center; justify-content: center; gap: 10px; }
    .rb-header .rb-title { font-size: 17px; font-weight: 900; letter-spacing: 0.8px;
      text-shadow: 0 2px 0 #000, 0 0 14px rgba(255,200,90,0.45);
      display: flex; align-items: center; gap: 8px; }
    .rb-vs { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 13px; }
    .rb-vs .chip { padding: 4px 10px; border-radius: 999px;
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; gap: 6px; }
    .rb-vs .chip .dot { width: 10px; height: 10px; border-radius: 50%;
      background: var(--pcol); box-shadow: 0 0 8px var(--pcol); }
    .rb-vs .x { opacity: 0.6; }
    .rb-canvas-wrap { flex: 1; position: relative; z-index: 1;
      margin: 4px 8px; border-radius: 14px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 10px 30px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(255,255,255,0.05); }
    .rb-canvas-wrap iframe { display: block; position: absolute; inset: 0;
      width: 100%; height: 100%; border: 0; background: #0a1830; }
    .rb-bar { position: relative; z-index: 2;
      padding: 10px 12px max(10px, env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.75));
      display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
      border-top: 1px solid rgba(255,255,255,0.1); }
    .rb-bar .lbl { color: #fff; font-weight: 800; align-self: center;
      font-size: 14px; opacity: 0.9; margin-right: 4px; }
    .rb-bar .btn-win { padding: 11px 18px; border-radius: 999px;
      border: 2px solid #fff; color: #fff; font-weight: 900; cursor: pointer;
      font-size: 14px; -webkit-tap-highlight-color: transparent;
      background: var(--pcol);
      box-shadow: 0 4px 0 rgba(0,0,0,0.35), 0 0 14px var(--pcol);

    /* ===== Krokodil — vertical mouth, teeth around perimeter ===== */
    .kroko-back { position: fixed; inset: 0; z-index: 60; background: #000;

      color: #fff; animation: fadeIn .25s ease; user-select: none; overflow: hidden; }
    .kroko-head { text-align: center; padding: 4px 8px 6px; position: relative; z-index: 3; }
    .kroko-head h2 { margin: 0; font-size: 18px; font-weight: 900; opacity: 0.85; }

      border-radius: 18% / 8%;

    @keyframes krokoShake {

      box-shadow: inset 0 -2px 2px rgba(0,0,0,0.5); }
    .kroko-mouth { position: absolute; left: 8%; right: 8%; top: 12%; bottom: 8%;

      border-radius: 50% / 48%;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.85); overflow: hidden;
      transition: filter 0.3s ease; }
    .kroko-mouth.chomp { filter: brightness(1.5) saturate(1.4); }
    .kroko-teeth { position: absolute; inset: 0; pointer-events: none; }
    .tooth { position: absolute; width: 11%; aspect-ratio: 0.55 / 1; left: 50%; top: 50%;
      cursor: pointer; pointer-events: auto; -webkit-tap-highlight-color: transparent;
      transition: transform 0.18s cubic-bezier(.4,1.8,.6,1);
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6));
      transform-origin: 50% 0%; }
    .tooth::after { content: ''; position: absolute; inset: -8px; }
    .tooth::before { content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, #fffaee 0%, #ddd1b8 60%, #b8a98a 100%);
      clip-path: polygon(50% 100%, 0 8%, 50% 0, 100% 8%);
      border-radius: 4px 4px 50% 50%; }
    .tooth.pressed { opacity: 0.25; transform: var(--pos) scale(0.5) !important; pointer-events: none; }
    .tooth.bite::before { background: linear-gradient(180deg, #ff5050 0%, #aa1010 100%);

    @keyframes bitePulse { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.8); } }
    .kroko-foot { display: flex; gap: 10px; justify-content: center;

    /* ===== Paddle Duel — 1v1 split-screen pong ===== */

    /* ===== Tappy Bird — pass-and-play flappy ===== */
    .tb-back { position: fixed; inset: 0; z-index: 60; background: #4ec0ca;

    .tb-back .btn-pill { min-height: 52px; padding: 0 22px; border-radius: 999px;

      -webkit-tap-highlight-color: transparent; }

    /* ===== Volcano Hop — pick-a-platform, wrong = lightning ===== */
    .vh-back { position: fixed; inset: 0; z-index: 60; overflow: hidden; user-select: none;
      display: flex; flex-direction: column; color: #fff; animation: fadeIn .25s ease;
      background:
        radial-gradient(ellipse at 50% 110%, #ff5a1f 0%, #aa1a08 22%, #2a0a14 55%, #0a0612 100%);
      touch-action: manipulation; }
    .vh-back::before { content:""; position: absolute; inset: -10%; pointer-events: none;
      background: radial-gradient(circle at 20% 30%, rgba(255,180,80,0.15), transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(255,80,40,0.18), transparent 50%);
      animation: vh-heat 8s ease-in-out infinite alternate; }
    @keyframes vh-heat { from { opacity: 0.6; } to { opacity: 1; } }
    .vh-header { position: relative; z-index: 2; padding: 14px 16px 4px; text-align: center; }

      transform-style: preserve-3d; transform: rotateX(8deg); }
    .vh-plat { position: relative; width: clamp(70px, 22vw, 130px); aspect-ratio: 1.1 / 1;

      box-shadow: 0 12px 0 #2a1006, 0 18px 30px rgba(0,0,0,0.6),

      color: #ffd54a; text-shadow: 0 3px 0 #000; cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease;
      -webkit-tap-highlight-color: transparent; }
    .vh-plat::before { content: ""; position: absolute; inset: 6px 6px auto 6px; height: 14px;
      background: linear-gradient(180deg, #ff8c3a 0%, #c84410 100%);
      border-radius: 12px 12px 4px 4px;
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.5), 0 0 14px rgba(255,140,40,0.5); }
    .vh-plat::after { content: ""; position: absolute; bottom: -14px; left: 50%;
      width: 70%; height: 14px; transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(0,0,0,0.55), transparent 70%); filter: blur(2px); }
    .vh-plat:hover { transform: translateY(-4px); }
    .vh-plat:active { transform: translateY(2px); }

                  inset 0 2px 0 rgba(255,180,100,0.4); }

      100% { transform: translateY(-12px); box-shadow: 0 0 0 4px #76ff7a, 0 0 30px #76ff7a; } }
    .vh-plat.crumble { animation: vh-crumble 0.7s ease forwards; }
    @keyframes vh-crumble {
      0% { transform: translateY(0); opacity: 1; }
      30% { transform: translateY(10px) rotate(-4deg); }
      100% { transform: translateY(140px) rotate(12deg) scale(0.6); opacity: 0; }
    }
    .vh-tokens { position: absolute; inset: 0; pointer-events: none; }
    .vh-token { position: absolute; width: 36px; height: 36px; border-radius: 50%;
      background: var(--pcol); border: 3px solid #fff;
      box-shadow: 0 6px 0 rgba(0,0,0,0.4), 0 0 18px rgba(0,0,0,0.4);
      transform: translate(-50%, -50%); transition: left 0.5s ease, top 0.5s ease, opacity 0.5s ease;
      display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900;
      color: #fff; text-shadow: 0 1px 0 rgba(0,0,0,0.6); }

      50% { transform: translate(-50%, 60%) scale(0.8); }
      100% { transform: translate(-50%, 200%) scale(0.4); opacity: 0; } }
    .vh-cloud { position: absolute; left: 50%; bottom: -120px; transform: translateX(-50%);
      width: 80%; height: 130px; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse, #3a3550 30%, #1a1828 70%, transparent 100%);
      border-radius: 50%; opacity: 0; transition: opacity 0.3s, bottom 0.4s; }
    .vh-cloud.show { opacity: 1; bottom: -40px; }
    .vh-cloud.zap::after { content: "⚡"; position: absolute; left: 50%; top: 50%;
      transform: translate(-50%,-50%); font-size: 80px; color: #ffe54a;
      text-shadow: 0 0 30px #fff, 0 0 60px #ffe54a;
      animation: vh-zap 0.5s ease; }
    @keyframes vh-zap { 0% { opacity: 0; transform: translate(-50%,-50%) scale(0.5); }

      100% { opacity: 0; transform: translate(-50%,-50%) scale(1); } }
    .vh-actions { position: relative; z-index: 3; padding: 12px 16px 18px; text-align: center;
      display: flex; justify-content: center; gap: 10px; }
    .vh-actions .btn-pill { min-height: 52px; padding: 0 26px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.25); background: rgba(0,0,0,0.45);
      color: #fff; font-weight: 800; font-size: 16px; cursor: pointer; }
    .vh-actions .btn-pill.gold { background: linear-gradient(180deg, #ffd54a, #ff9a1a);
      color: #2a1a00; border-color: rgba(255,215,80,0.6); box-shadow: 0 4px 0 #b56a00; }

    .vh-pass { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);

<!-- Game UI mount point — populated by the module script after the scene is ready -->
<div id="game-ui"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
  }

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'OrbitControls';

/* ============================================================
   VOLKAAN EILAND — Wii Party stijl
   ============================================================
   Architectuur (van groot naar klein):
     1.  Renderer / Camera / Controls
     2.  Toon-shading helpers (gradient ramp + zwarte outlines)
     3.  Gedeelde materialen & geometrieën
     4.  Water laag (diep + ondiep + foam ringen + sparkles)
     5.  Eilanden (hoofdeiland + satellieten, deformed cylinders)
     6.  Vulkaan (cone + crater + lava + scheuren + rook)
     7.  Houten bruggen tussen eilanden
     8.  Bordspel pad (Catmull-Rom curve, 6 kleur-typen)
     9.  Decoratie (palmen, bushes, bloemen, gras, tiki, rotsen)
    10.  Atmosphere (wolken, vogels, pollen, zon glow)
    11.  Animatie loop (camera idle-rotate, water, lava, vlammen)
   ============================================================ */


/* ─────────────────────────────────────────────
   1. SCENE / RENDERER / CAMERA / CONTROLS
   ───────────────────────────────────────────── */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fd9ff);
scene.fog = new THREE.Fog(0xbfe6ff, 55, 140);

const camera = new THREE.PerspectiveCamera(
    42,
    window.innerWidth / window.innerHeight,
    0.1,
    400
);
camera.position.set(34, 26, 34);

const renderer = new THREE.WebGLRenderer({
    antialias: true,
    powerPreference: "high-performance"
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 22;
controls.maxDistance = 70;
controls.maxPolarAngle = Math.PI / 2.1;  // never below water
controls.minPolarAngle = Math.PI / 6;
controls.target.set(0, 8, 0);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.35;

// pause auto-rotate while the user is interacting, resume after idle
let idleTimer = null;
controls.addEventListener('start', () => {
    controls.autoRotate = false;
    if (idleTimer) clearTimeout(idleTimer);
});
controls.addEventListener('end', () => {
    if (idleTimer) clearTimeout(idleTimer);
    idleTimer = setTimeout(() => controls.autoRotate = true, 4000);
});


/* ─────────────────────────────────────────────
   2. TOON SHADING HELPERS
   ───────────────────────────────────────────── */

function makeToonGradient() {
    // 5 stops → chunky cell-shaded look
    const colors = new Uint8Array([55, 130, 195, 230, 255]);
    const t = new THREE.DataTexture(colors, colors.length, 1, THREE.RedFormat);
    t.needsUpdate = true;
    return t;
}
const toon = makeToonGradient();

// Inverse-hull outline trick: duplicate mesh, scale slightly larger, render backfaces in black.
function addOutline(mesh, scale = 1.05, color = 0x101820) {
    const outline = new THREE.Mesh(
        mesh.geometry,
        new THREE.MeshBasicMaterial({ color, side: THREE.BackSide })
    );
    outline.scale.multiplyScalar(scale);
    outline.renderOrder = -1;
    mesh.add(outline);
    return outline;
}


/* ─────────────────────────────────────────────
   3. SHARED MATERIALS
   ───────────────────────────────────────────── */

const MAT = {
    sand:      new THREE.MeshToonMaterial({ color: 0xf4dc95, gradientMap: toon }),
    sandWet:   new THREE.MeshToonMaterial({ color: 0xd9be7a, gradientMap: toon }),
    grass:     new THREE.MeshToonMaterial({ color: 0x6dcf5a, gradientMap: toon }),
    grassDark: new THREE.MeshToonMaterial({ color: 0x3fa84a, gradientMap: toon }),
    cliff:     new THREE.MeshToonMaterial({ color: 0x8a6c4f, gradientMap: toon, flatShading: true }),
    cliffDark: new THREE.MeshToonMaterial({ color: 0x624936, gradientMap: toon, flatShading: true }),
    rock:      new THREE.MeshToonMaterial({ color: 0x7a7783, gradientMap: toon, flatShading: true }),
    rockDark:  new THREE.MeshToonMaterial({ color: 0x4a4750, gradientMap: toon, flatShading: true }),
    wood:      new THREE.MeshToonMaterial({ color: 0x8d5a30, gradientMap: toon }),
    woodLight: new THREE.MeshToonMaterial({ color: 0xb87a45, gradientMap: toon }),
    leaf:      new THREE.MeshToonMaterial({ color: 0x2fb244, gradientMap: toon }),
    leafLight: new THREE.MeshToonMaterial({ color: 0x6fdd58, gradientMap: toon }),
    trunk:     new THREE.MeshToonMaterial({ color: 0x8b5a2b, gradientMap: toon }),
    flame:     new THREE.MeshBasicMaterial({ color: 0xff9a1a }),
    lava:      new THREE.MeshToonMaterial({ color: 0xff5a00, emissive: 0xff2200, emissiveIntensity: 1.0, gradientMap: toon }),
    lavaBright:new THREE.MeshBasicMaterial({ color: 0xffd14d }),
    foam:      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.72, side: THREE.DoubleSide, depthWrite: false }),
    waterDeep: new THREE.MeshBasicMaterial({ color: 0x0d4d6a }),
    water:     new THREE.MeshToonMaterial({ color: 0x36b5d8, gradientMap: toon, transparent: true, opacity: 0.92 }),
    cloud:     new THREE.MeshToonMaterial({ color: 0xffffff, gradientMap: toon }),
};

// flower palette for variety
const FLOWER_COLORS = [0xff4d6d, 0xffd166, 0xff8fab, 0xffffff, 0xb084ff, 0xff6e3b];


/* ─────────────────────────────────────────────
   4. LIGHTING — soft, cheerful, no harsh shadows
   ───────────────────────────────────────────── */

scene.add(new THREE.HemisphereLight(0xfff6dc, 0x4da6ff, 1.0));
scene.add(new THREE.AmbientLight(0xfff1d4, 0.55));

const sun = new THREE.DirectionalLight(0xfff6d8, 1.9);
sun.position.set(28, 48, 22);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);  // mobile-friendly
sun.shadow.camera.left = -42;
sun.shadow.camera.right = 42;
sun.shadow.camera.top = 42;
sun.shadow.camera.bottom = -42;
sun.shadow.camera.near = 5;
sun.shadow.camera.far = 120;
sun.shadow.normalBias = 0.05;
sun.shadow.radius = 4;
scene.add(sun);

// warm fill from the volcano direction
const volcanoGlow = new THREE.PointLight(0xff5500, 2.5, 25);
volcanoGlow.position.set(0, 11.5, 0);
scene.add(volcanoGlow);


/* ─────────────────────────────────────────────
   5. WATER — deep layer + animated shoreline + sparkles
   ───────────────────────────────────────────── */

// (a) deep dark layer underneath – fake depth gradient
const deepWater = new THREE.Mesh(
    new THREE.PlaneGeometry(260, 260),
    MAT.waterDeep
);
deepWater.rotation.x = -Math.PI / 2;
deepWater.position.y = -1.6;
deepWater.receiveShadow = true;
scene.add(deepWater);

// (b) animated turquoise surface
const waterGeo = new THREE.PlaneGeometry(220, 220, 100, 100);
const water = new THREE.Mesh(waterGeo, MAT.water);
water.rotation.x = -Math.PI / 2;
water.position.y = 0.05;
scene.add(water);

// (c) sparkle Points scattered on the surface
const SPARKLE_COUNT = 140;
const sparkleGeo = new THREE.BufferGeometry();
const sparklePos = new Float32Array(SPARKLE_COUNT * 3);
const sparklePhase = [];
for (let i = 0; i < SPARKLE_COUNT; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = 14 + Math.random() * 70;
    sparklePos[i * 3]     = Math.cos(a) * r;
    sparklePos[i * 3 + 1] = 0.18;
    sparklePos[i * 3 + 2] = Math.sin(a) * r;
    sparklePhase.push(Math.random() * Math.PI * 2);
}
sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePos, 3));
const sparkleMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.35,
    transparent: true,
    opacity: 0.95,
    depthWrite: false,
    sizeAttenuation: true,
});
const sparkles = new THREE.Points(sparkleGeo, sparkleMat);
scene.add(sparkles);


/* ─────────────────────────────────────────────
   6. ISLAND TERRAIN — organic stacked plateaus
   ───────────────────────────────────────────── */

// deform a cylinder geometry radially using stable angular noise → chunky natural silhouette
function deformCylinder(geo, amount = 0.5) {
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const z = pos.getZ(i);
        const r = Math.sqrt(x * x + z * z);
        if (r > 0.1) {
            const a = Math.atan2(z, x);
            const n = (Math.sin(a * 3) * 0.5 + Math.cos(a * 5) * 0.3 + Math.sin(a * 7 + 1.2) * 0.2);
            const newR = r + n * amount;
            pos.setX(i, Math.cos(a) * newR);
            pos.setZ(i, Math.sin(a) * newR);
        }
    }
    geo.computeVertexNormals();
    return geo;
}

// foam ring around an island (semi-transparent white)
function addFoamRing(parent, innerR, outerR, segments = 48) {
    const ring = new THREE.Mesh(
        new THREE.RingGeometry(innerR, outerR, segments),
        MAT.foam.clone()
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.12;
    parent.add(ring);
    return ring;
}

const animatedFoam = [];  // pulsed in the animation loop

// ── MAIN ISLAND ─────────────────────────────────────────
const mainIsland = new THREE.Group();
scene.add(mainIsland);

// underwater rocky base – wide, dark
const baseGeo = deformCylinder(new THREE.CylinderGeometry(13, 16, 4, 22), 0.9);
const base = new THREE.Mesh(baseGeo, MAT.cliffDark);
base.position.y = -1.4;
base.receiveShadow = true;
mainIsland.add(base);

// sandy beach
const beachGeo = deformCylinder(new THREE.CylinderGeometry(11.5, 13, 1.4, 22), 0.6);
const beach = new THREE.Mesh(beachGeo, MAT.sand);
beach.position.y = 0.65;
beach.castShadow = true;
beach.receiveShadow = true;
mainIsland.add(beach);
addOutline(beach, 1.015);

// foam ring just outside the beach
animatedFoam.push(addFoamRing(mainIsland, 11.5, 13.6));

// lower grass plateau (large)
const grass1Geo = deformCylinder(new THREE.CylinderGeometry(9, 10.5, 2.2, 20), 0.55);
const grass1 = new THREE.Mesh(grass1Geo, MAT.grass);
grass1.position.set(-0.4, 1.9, 0.3);
grass1.castShadow = true;
grass1.receiveShadow = true;
mainIsland.add(grass1);
addOutline(grass1, 1.015);

// middle grass terrace (offset – asymmetry!)
const grass2Geo = deformCylinder(new THREE.CylinderGeometry(6.5, 7.2, 1.8, 18), 0.45);
const grass2 = new THREE.Mesh(grass2Geo, MAT.grass);
grass2.position.set(0.8, 3.7, -0.6);
grass2.castShadow = true;
grass2.receiveShadow = true;
mainIsland.add(grass2);
addOutline(grass2, 1.018);

// upper grass terrace (smaller, base of volcano)
const grass3Geo = deformCylinder(new THREE.CylinderGeometry(4.6, 5.2, 1.4, 16), 0.35);
const grass3 = new THREE.Mesh(grass3Geo, MAT.grassDark);
grass3.position.set(-0.2, 5.2, 0.2);
grass3.castShadow = true;
grass3.receiveShadow = true;
mainIsland.add(grass3);
addOutline(grass3, 1.02);

// thin cliff bands between terraces (brown rim visible)
function cliffBand(radiusTop, radiusBot, height, y, deform = 0.4) {
    const g = deformCylinder(new THREE.CylinderGeometry(radiusTop, radiusBot, height, 18), deform);
    const m = new THREE.Mesh(g, MAT.cliff);
    m.position.y = y;
    m.castShadow = true;
    m.receiveShadow = true;
    mainIsland.add(m);
    return m;
}
cliffBand(10.5, 11.5, 0.6, 1.4);
cliffBand(7.2, 9.0, 0.6, 2.9);

function makeSatelliteIsland(x, z, radiusScale = 1, rotation = 0) {

        MAT.cliffDark

        deformCylinder(new THREE.CylinderGeometry(baseR1 - 0.3, baseR1 + 0.2, 1.0, 16), 0.4),

    );
    gr.position.y = 1.7;

    gr.receiveShadow = true;
    g.add(gr);
    addOutline(gr, 1.018);

const crackMat = new THREE.MeshBasicMaterial({ color: 0xff4400 });
function makeCrack(angle, length, startY, segments = 4) {
    const g = new THREE.Group();
    for (let i = 0; i < segments; i++) {
        const t = i / segments;
        // radius interpolates with the cone (top r=1.6, bot r=3.2; cone spans y 5.9 → 12.4)
        const localY = startY - t * length;
        const heightFrac = 1 - (localY - 5.9) / 6.5;  // 0 top, 1 bottom
        const radius = 1.65 + heightFrac * 1.6 + 0.04;
        const seg = new THREE.Mesh(
            new THREE.PlaneGeometry(0.22 + Math.random() * 0.1, length / segments * 1.15),
            crackMat
        );
        const a = angle + (Math.sin(i * 1.7) * 0.06);
        seg.position.set(Math.cos(a) * radius, localY - length / segments / 2, Math.sin(a) * radius);
        seg.lookAt(seg.position.x * 2.2, seg.position.y, seg.position.z * 2.2);
        g.add(seg);
    }
    volcano.add(g);
    return g;
}

function makeBridge(from, to, width = 1.3, withRails = true) {
    const g = new THREE.Group();
    const dir = new THREE.Vector3().subVectors(to, from);
    const len = dir.length();
    const numPlanks = Math.max(3, Math.floor(len / 0.55));

    // central walkway line
    const walkway = new THREE.Mesh(
        new THREE.BoxGeometry(width, 0.18, len),
        MAT.woodLight
    );
    const mid = new THREE.Vector3().lerpVectors(from, to, 0.5);
    walkway.position.copy(mid);
    walkway.lookAt(to.x, mid.y, to.z);
    walkway.castShadow = true;
    walkway.receiveShadow = true;
    g.add(walkway);

    // plank stripes on top (decorative)
    for (let i = 0; i < numPlanks; i++) {
        const t = (i + 0.5) / numPlanks;
        const plank = new THREE.Mesh(
            new THREE.BoxGeometry(width * 1.02, 0.08, 0.35),
            MAT.wood
        );
        const pos = new THREE.Vector3().lerpVectors(from, to, t);
        plank.position.copy(pos);
        plank.position.y += 0.11;
        plank.lookAt(to.x, plank.position.y, to.z);
        g.add(plank);
    }

    // rope-style railings
    if (withRails) {
        const perp = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();
        for (const side of [-1, 1]) {
            const rail = new THREE.Mesh(
                new THREE.CylinderGeometry(0.04, 0.04, len, 6),
                MAT.wood
            );
            rail.position.copy(mid).addScaledVector(perp, side * width / 2);
            rail.position.y += 0.45;
            rail.lookAt(rail.position.x + dir.x, rail.position.y, rail.position.z + dir.z);
            rail.rotateX(Math.PI / 2);
            g.add(rail);
            // little posts every plank
            for (let i = 0; i < numPlanks; i += 2) {
                const t = (i + 0.5) / numPlanks;
                const post = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.05, 0.05, 0.6, 6),
                    MAT.wood
                );
                post.position.copy(new THREE.Vector3().lerpVectors(from, to, t))
                    .addScaledVector(perp, side * width / 2);
                post.position.y += 0.25;
                g.add(post);
            }
        }
    }

    scene.add(g);
    return g;
}

const NUM_TILES = 56;  // re-tuned so tile spacing reads as one step apart
const tiles = [];

// ── Tile type system ── (Wii Party Volcano Island inspired)
//   Special tiles placed at fixed indices for predictability.
//   Filler tiles become +/-/drink action tiles instead of doing nothing.
const SPECIAL_TILES = {
    15: 'bluestatue',   // mid-game jackpot — huge boost
    19: 'tornado',      // pick a victim, blow them back
    23: 'ufo',          // swap places with another player
    30: 'skull',        // fall into the volcano!
    32: 'bluestatue',   // second jackpot
    37: 'tornado',
    43: 'ufo',
    47: 'redstatue',    // late-game cruel knockback
};

function tileTypeFor(i) {
    if (i === 0)                          return 'start';
    if (i >= NUM_TILES - 6 && i < NUM_TILES - 1) return 'lava';
    if (SPECIAL_TILES[i])                 return SPECIAL_TILES[i];
    // Chwazi stays its own thing — different mechanic (random drinker).
    if (i > 0 && i % 9 === 0)             return 'chwazi';
    // All other minigame tiles (formerly krokodil/paddle/tappy/volcanoHop) now
    // funnel into a single 'mystery' tile that spins a wheel to pick the
    // minigame. The old modulo positions are merged so the board stays varied.
    if (i > 0 && (i % 13 === 0 || i % 11 === 0 || i % 7 === 0 || i % 17 === 0)) return 'mystery';
    // Convert "filler" tiles into action tiles based on a stable hash:
    const r = (Math.sin(i * 9.13) * 0.5 + 0.5);
    if (r < 0.40)                         return 'plus';   // blue → lucky +2
    else if (r < 0.72)                    return 'minus';  // red  → unlucky -2
    else                                  return 'drink';  // green → cheers tile
}

const TILE_TYPE_TO_MAT = {
    'start':       TILE_MATS.green,
    'lava':        TILE_MATS.lava,
    // Legacy tile types — kept in case the board generator is ever reverted.
    'krokodil':    TILE_MATS.purple,
    'chwazi':      TILE_MATS.yellow,
    'volcanoHop':  TILE_MATS.teal,
    'tappy':       TILE_MATS.pink,
    'paddle':      TILE_MATS.cyan,
    // New universal minigame tile.
    'mystery':     TILE_MATS.mystery,
    'plus':        TILE_MATS.blue,
    'minus':       TILE_MATS.red,
    'drink':       TILE_MATS.green,
    'bluestatue':  TILE_MATS.bluestatue,

    'ufo':         TILE_MATS.ufo,

};

function makePalm(x, y, z, scale = 1, tilt = 0) {
    const g = new THREE.Group();

    // curved trunk (3 segments stacked with slight bend)
    for (let i = 0; i < 4; i++) {
        const seg = new THREE.Mesh(
            new THREE.CylinderGeometry(0.28 - i * 0.04, 0.35 - i * 0.04, 1.1, 8),

        seg.position.set(Math.sin(i * 0.4) * 0.15, 0.55 + i * 1.0, Math.cos(i * 0.4) * 0.05);
        seg.rotation.z = (i - 1) * 0.08;
        seg.castShadow = true;
        g.add(seg);
    }

    // crown of fronds (cones flattened into leaves)
    const crown = new THREE.Group();
    crown.position.y = 4.4;
    for (let i = 0; i < 7; i++) {
        const frond = new THREE.Mesh(
            new THREE.ConeGeometry(0.35, 2.4, 4),
            i % 2 ? MAT.leaf : MAT.leafLight
        );
        const a = (Math.PI * 2 / 7) * i;
        frond.position.set(Math.cos(a) * 1.0, 0.1, Math.sin(a) * 1.0);
        frond.rotation.z = Math.PI / 2;
        frond.rotation.y = -a;
        frond.rotation.x = -0.4;
        frond.scale.set(1, 1, 0.3);
        frond.castShadow = true;
        crown.add(frond);

    // few coconuts

        const coco = new THREE.Mesh(

    g.rotation.y = Math.random() * Math.PI * 2;

const _m = new THREE.Matrix4();
const _q = new THREE.Quaternion();
const _p = new THREE.Vector3();
const _s = new THREE.Vector3();

function scatterOnIsland(count, callback, includeSatellites = true) {
    let i = 0;
    while (i < count) {
        // pick an island slot
        let target;
        if (includeSatellites && Math.random() < 0.35) {
            target = satellites[Math.floor(Math.random() * satellites.length)];
            const a = Math.random() * Math.PI * 2;
            const r = Math.random() * target.radius * 0.85;
            _p.set(target.x + Math.cos(a) * r, target.topY - 0.5, target.z + Math.sin(a) * r);
        } else {
            // main island, choose terrace
            const lvl = Math.random();
            let radius, y;
            if (lvl < 0.4) { radius = 8 + Math.random() * 2; y = 1.4; }
            else if (lvl < 0.75) { radius = 4 + Math.random() * 4; y = 2.9; }
            else { radius = 1.5 + Math.random() * 3; y = 4.6; }
            const a = Math.random() * Math.PI * 2;
            _p.set(Math.cos(a) * radius, y, Math.sin(a) * radius);
        }
        if (callback(_p, i)) i++;
    }
}

/* ─────────────────────────────────────────────
   12. ANIMATION LOOP
   ───────────────────────────────────────────── */

const clock = new THREE.Clock();
const _wv = new THREE.Vector3();

// pre-compute initial water positions (so we don't accumulate noise)
const waterInitialZ = new Float32Array(waterGeo.attributes.position.count);
{
    const p = waterGeo.attributes.position;
    for (let i = 0; i < p.count; i++) waterInitialZ[i] = p.getZ(i);
}

function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();

    controls.update();

    // ── water surface waves ──
    const wpos = waterGeo.attributes.position;
    for (let i = 0; i < wpos.count; i++) {
        const x = wpos.getX(i);
        const y = wpos.getY(i);
        const z =
            Math.sin(x * 0.22 + time * 1.1) * 0.32 +
            Math.cos(y * 0.27 + time * 1.4) * 0.28 +
            Math.sin((x + y) * 0.5 + time * 2.3) * 0.10;
        wpos.setZ(i, z);
    }
    wpos.needsUpdate = true;

    // ── sparkle pulsing (opacity oscillation) ──
    sparkleMat.opacity = 0.55 + Math.sin(time * 4) * 0.4;
    sparkles.rotation.y = time * 0.02;

    // ── animated foam rings (opacity pulse) ──
    for (let i = 0; i < animatedFoam.length; i++) {
        const f = animatedFoam[i];
        f.material.opacity = 0.55 + Math.sin(time * 1.5 + i * 0.7) * 0.18;
        const s = 1 + Math.sin(time * 1.2 + i * 0.5) * 0.015;
        f.scale.set(s, s, s);
    }

    // ── lava pulse ──
    MAT.lava.emissiveIntensity = 0.85 + Math.sin(time * 4) * 0.35;
    volcanoGlow.intensity = 2.2 + Math.sin(time * 3.2) * 0.7;
    crackMat.color.setHSL(0.06, 1.0, 0.5 + Math.sin(time * 5) * 0.1);

    // ── smoke rising ──
    for (const s of smokeParticles) {
        const t = (time * s.speed + s.phase) % 4;       // 0..4 lifespan
        const lifeT = t / 4;                              // 0..1
        s.mesh.position.set(
            Math.sin(time * 0.7 + s.phase) * 0.6 + s.drift,
            12.8 + lifeT * 4.4,
            Math.cos(time * 0.7 + s.phase) * 0.6
        );
        s.mesh.material.opacity = 0.55 * (1 - lifeT);
        const sc = 0.6 + lifeT * 1.8;
        s.mesh.scale.set(sc, sc, sc);
    }

    // ── tile bounce + glow pulse ──
    for (const t of tiles) {
        if (t.isSummit) {
            // gold winner platform: bigger float, slow rotation, spinning star
            const bob = Math.sin(time * 1.4) * 0.18;
            t.mesh.position.y = t.baseY + bob;
            t.mesh.rotation.y = time * 0.4;
            if (t.starGroup) {
                t.starGroup.rotation.y = time * 2.0;
                t.starGroup.rotation.x = Math.sin(time * 1.3) * 0.2;
                t.starGroup.position.y = 1.25 + Math.sin(time * 1.8) * 0.12;
            }
        } else if (t.isDanger) {
            // satellite punishment tile: slow bob + slight tilt
            const bounce = Math.sin(time * 1.8 + t.phase) * 0.08;
            t.mesh.position.y = t.baseY + bounce;
            t.mesh.rotation.y = Math.sin(time * 0.5 + t.phase) * 0.15;
        } else {
            // regular path tile: small bounce + breathing scale
            const bounce = Math.sin(time * 2 + t.phase) * 0.06;
            t.mesh.position.y = t.baseY + bounce + 0.06;
            const s = 1 + Math.sin(time * 1.8 + t.phase) * 0.04;
            t.mesh.scale.set(s, 1, s);
        }
        // Animate decoration meshes on special tiles
        if (t.bobMesh) {
            const baseY = t.bobMesh.userData.baseY ?? (t.bobMesh.userData.baseY = t.bobMesh.position.y);
            if (t.type === 'tornado') {
                // spin like a tornado
                t.bobMesh.rotation.y = time * 5.0;
                t.bobMesh.position.y = baseY + Math.sin(time * 3 + t.phase) * 0.08;
            } else if (t.type === 'ufo') {
                // hover and slowly rotate
                t.bobMesh.rotation.y = time * 1.5;
                t.bobMesh.position.y = baseY + Math.sin(time * 2 + t.phase) * 0.18;
            } else if (t.type === 'bluestatue' || t.type === 'redstatue') {
                // bob and slow rotate
                t.bobMesh.position.y = baseY + Math.sin(time * 2.5 + t.phase) * 0.15;
                t.bobMesh.rotation.y = time * 0.8;
            } else if (t.type === 'skull') {
                // ominous small bob
                t.bobMesh.position.y = baseY + Math.sin(time * 1.5 + t.phase) * 0.04;
                t.bobMesh.rotation.y = Math.sin(time * 0.6) * 0.4;
            } else {
                // plus/minus/drink — soft bob
                t.bobMesh.position.y = baseY + Math.sin(time * 3 + t.phase) * 0.10;
            }
        }
    }
    // floating warning markers on danger tiles spin around their tile
    for (const m of dangerMarkers) {
        m.rotation.y = time * 2.5;
        m.rotation.x = time * 1.7;
    }

    // shared emissive pulse per tile color
    const e = 0.4 + Math.sin(time * 2.5) * 0.2;
    TILE_MATS.blue.emissiveIntensity   = e * 0.9;
    TILE_MATS.red.emissiveIntensity    = e * 0.9;
    TILE_MATS.green.emissiveIntensity  = e * 0.9;
    TILE_MATS.purple.emissiveIntensity = 0.55 + Math.sin(time * 3.5) * 0.3;
    TILE_MATS.yellow.emissiveIntensity = 0.55 + Math.sin(time * 4)   * 0.3;
    TILE_MATS.lava.emissiveIntensity   = 0.85 + Math.sin(time * 5)   * 0.35;
    TILE_MATS.cyan.emissiveIntensity   = 0.55 + Math.sin(time * 3.2) * 0.3;
    TILE_MATS.pink.emissiveIntensity   = 0.55 + Math.sin(time * 3.8) * 0.3;
    TILE_MATS.teal.emissiveIntensity   = 0.55 + Math.sin(time * 4.4) * 0.3;
    TILE_MATS.bluestatue.emissiveIntensity = 0.9 + Math.sin(time * 4.0) * 0.4;
    TILE_MATS.redstatue.emissiveIntensity  = 0.9 + Math.sin(time * 4.2) * 0.4;
    TILE_MATS.ufo.emissiveIntensity        = 0.7 + Math.sin(time * 3.6) * 0.3;
    TILE_MATS.tornado.emissiveIntensity    = 0.5 + Math.sin(time * 6.0) * 0.25;
    TILE_MATS.skull.emissiveIntensity      = 0.15 + Math.sin(time * 1.2) * 0.10;
    // gold + danger material pulses
    goldMat.emissiveIntensity   = 0.7 + Math.sin(time * 2.5) * 0.35;
    dangerMat.emissiveIntensity = 0.65 + Math.sin(time * 3.5) * 0.35;

    // ── palm tree swaying ──
    for (const p of palms) {
        p.crown.rotation.z = Math.sin(time * 1.3 + p.phase) * p.windAmp;
        p.crown.rotation.x = Math.cos(time * 1.1 + p.phase) * p.windAmp * 0.6;
    }

    // ── tiki flames flicker ──
    for (const tk of tikis) {
        const f = 0.85 + Math.sin(time * 18 + tk.phase) * 0.12 + Math.random() * 0.05;
        tk.flame.scale.set(f, f * (1 + Math.sin(time * 12 + tk.phase) * 0.15), f);
        tk.light.intensity = 0.4 + Math.sin(time * 15 + tk.phase) * 0.2;
    }

    // ── clouds drifting + slow rotate ──
    for (const c of clouds) {
        c.group.position.x = c.baseX + Math.sin(time * 0.08 + c.phase) * 4;
        c.group.position.y += Math.sin(time * 0.4 + c.phase) * 0.003;
        c.group.rotation.y += c.drift * 0.04;
    }

    // ── birds flying in lazy circles ──
    for (const b of birds) {
        const a = time * b.speed + b.phase;
        b.mesh.position.set(
            Math.cos(a) * b.radius,
            b.height + Math.sin(a * 1.5) * 1.2,
            Math.sin(a) * b.radius
        );
        b.mesh.rotation.y = -a + Math.PI / 2;
        // flap wings via Y-scale
        b.mesh.scale.y = 1 + Math.sin(time * 8 + b.flapPhase) * 0.6;
    }

    // ── pollen drifting ──
    const pp = pollen.geometry.attributes.position;
    for (let i = 0; i < POLLEN_COUNT; i++) {
        const d = pollenData[i];
        pp.setY(i, d.baseY + Math.sin(time * d.speed + d.phase) * 1.2);
        pp.setX(i, pp.getX(i) + Math.sin(time * 0.3 + d.phase) * 0.01);
    }
    pp.needsUpdate = true;

    // ── sun glow shimmer ──
    sunGlow.scale.setScalar(1 + Math.sin(time * 1.5) * 0.04);

    // ── game tokens idle bob (set by game layer below) ──
    if (typeof window.__deGameHook === 'function') window.__deGameHook(time);

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Apply the difficulty multiplier to a drink amount (always rounds up, min 1)
function slokken(base) {
    const m = DIFFICULTY_CONFIGS[G.difficulty]?.drinkMult ?? 1;

}

// ── 3D player tokens (chess-piece-ish: cone on a disc with a sphere head) ──
const tokenGroup = new THREE.Group();

function makePlayerToken(colorHex) {
    const g = new THREE.Group();
    const colMat   = new THREE.MeshToonMaterial({ color: colorHex, gradientMap: toon, emissive: colorHex, emissiveIntensity: 0.25 });
    const darkMat  = new THREE.MeshToonMaterial({ color: 0x101820, gradientMap: toon });

    // base disc
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.5, 0.18, 18), darkMat);
    base.position.y = 0.09; base.castShadow = true; g.add(base);

    // body cone
    const body = new THREE.Mesh(new THREE.ConeGeometry(0.36, 1.0, 16), colMat);
    body.position.y = 0.68; body.castShadow = true; g.add(body);

    // head sphere
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 14, 12), colMat);
    head.position.y = 1.32; head.castShadow = true; g.add(head);

    // white outline (back-side trick) on body+head for cartoon pop
    const outlineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.BackSide });
    const bodyOut = new THREE.Mesh(body.geometry, outlineMat); bodyOut.scale.set(1.12,1.06,1.12); body.add(bodyOut);
    const headOut = new THREE.Mesh(head.geometry, outlineMat); headOut.scale.setScalar(1.12); head.add(headOut);

    tokenGroup.add(g);
    return g;
}

// place tokens on a tile, fanned out so they don't perfectly overlap
function layoutTokensOnTile(tileIdx) {
    const occupants = G.players.filter(p => p.tileIdx === tileIdx);
    occupants.forEach((p, i) => {
        const base = tileWorldPos[tileIdx];
        const angle = (i / Math.max(1, occupants.length)) * Math.PI * 2;
        const r = occupants.length > 1 ? 0.32 : 0;
        const target = new THREE.Vector3(
            base.x + Math.cos(angle) * r,
            base.y + 0.25,
            base.z + Math.sin(angle) * r
        );
        // if currently animating, the loop owns the position
        if (!p._animating) p.token.position.copy(target);
        p._restTarget = target;
    });
}

// animate token tile-by-tile along the path; camera does a 3rd-person follow
function moveTokenAlong(player, steps, onDone) {
    player._animating = true;
    const prevAuto = controls.autoRotate;
    controls.autoRotate = false;

    // snapshot the orbit camera so we can ease back to it when done
    const savedCamPos = camera.position.clone();
    const savedTarget = controls.target.clone();

    // POV follow tuning
    const FOLLOW_DIST = 5.2;   // how far behind the pawn
    const FOLLOW_HEIGHT = 3.2; // how high above the pawn
    const TARGET_AHEAD = 1.4;  // look slightly ahead of the pawn along travel dir

    let stepsLeft = steps;
    const startTile = player.tileIdx;

    // pre-compute the easing into POV on the first step, out of POV on the last
    const stepOne = () => {
        if (stepsLeft <= 0) {
            // ease camera back to its normal orbit pose
            const easeBackFrom = camera.position.clone();
            const easeBackTargetFrom = controls.target.clone();
            const finalTile = tileWorldPos[player.tileIdx].clone();
            const restoreStart = performance.now();
            const restoreDur = 600;
            const easeBack = (now) => {
                const k = Math.min(1, (now - restoreStart) / restoreDur);
                const e = k < 0.5 ? 2*k*k : 1 - Math.pow(-2*k + 2, 2)/2;
                camera.position.lerpVectors(easeBackFrom, savedCamPos, e);
                // target lands on the final tile (more natural than the original)
                controls.target.lerpVectors(easeBackTargetFrom, finalTile, e);
                if (k < 1) requestAnimationFrame(easeBack);
                else {
                    player._animating = false;
                    layoutTokensOnTile(player.tileIdx);
                    controls.target.copy(finalTile);
                    controls.autoRotate = prevAuto;
                    onDone && onDone();
                }
            };
            requestAnimationFrame(easeBack);
            return;
        }
        const next = Math.min(player.tileIdx + 1, TILE_COUNT - 1);
        const prev = player.tileIdx;
        const from = player.token.position.clone();
        const target = tileWorldPos[next].clone();
        target.y += 0.25;

        // direction along which the pawn is travelling this hop
        const travelDir = new THREE.Vector3().subVectors(target, from);
        travelDir.y = 0;
        if (travelDir.lengthSq() < 1e-4) travelDir.set(0, 0, 1);
        travelDir.normalize();
        // direction of the NEXT hop (for smoother look-ahead at end of hop)
        const after = tileWorldPos[Math.min(next + 1, TILE_COUNT - 1)];
        const nextDir = new THREE.Vector3().subVectors(after, tileWorldPos[next]);
        nextDir.y = 0;
        if (nextDir.lengthSq() < 1e-4) nextDir.copy(travelDir);
        nextDir.normalize();

        const camStart = camera.position.clone();
        const tgtStart = controls.target.clone();

        const isFirstHop = (stepsLeft === steps);
        const startTimestamp = performance.now();
        const dur = isFirstHop ? 420 : 320;  // first hop slightly longer to ease into POV
        const arcH = 0.9;

        const tick = (now) => {
            const k = Math.min(1, (now - startTimestamp) / dur);
            const ease = 1 - Math.pow(1 - k, 2.5);

            // pawn motion
            player.token.position.lerpVectors(from, target, ease);
            player.token.position.y += Math.sin(k * Math.PI) * arcH;

            // pawn-following camera
            // blend travel direction → next hop's direction near the end of this hop
            const dirBlend = travelDir.clone().lerp(nextDir, k * 0.6);
            dirBlend.normalize();

            const pawnPos = player.token.position;
            const desiredCam = new THREE.Vector3(
                pawnPos.x - dirBlend.x * FOLLOW_DIST,
                pawnPos.y + FOLLOW_HEIGHT,
                pawnPos.z - dirBlend.z * FOLLOW_DIST
            );
            const desiredTgt = new THREE.Vector3(
                pawnPos.x + dirBlend.x * TARGET_AHEAD,
                pawnPos.y + 0.6,
                pawnPos.z + dirBlend.z * TARGET_AHEAD
            );

            if (isFirstHop) {
                // ease IN to POV from the orbit pose
                camera.position.lerpVectors(camStart, desiredCam, ease);
                controls.target.lerpVectors(tgtStart, desiredTgt, ease);
            } else {
                // already in POV — smooth chase
                camera.position.lerp(desiredCam, 0.18);
                controls.target.lerp(desiredTgt, 0.22);
            }

            if (k < 1) requestAnimationFrame(tick);
            else {
                player.tileIdx = next;
                stepsLeft--;
                setTimeout(stepOne, 60);
            }
        };
        requestAnimationFrame(tick);
    };
    stepOne();
}

// Move a token by N tiles (positive=forward, negative=backward), arc-hop style.
// Skips all "landed on tile" events — used for tornado/statue/UFO effects.
function moveTokenBy(player, deltaTiles, onDone) {
    if (deltaTiles === 0) { onDone && onDone(); return; }
    player._animating = true;
    const direction = Math.sign(deltaTiles);
    let stepsLeft = Math.abs(deltaTiles);

    const stepOne = () => {
        if (stepsLeft <= 0) {
            player._animating = false;
            layoutTokensOnTile(player.tileIdx);
            onDone && onDone();
            return;
        }
        const next = Math.max(0, Math.min(TILE_COUNT - 1, player.tileIdx + direction));
        if (next === player.tileIdx) {
            // can't go further
            stepsLeft = 0;
            setTimeout(stepOne, 60);
            return;
        }
        const from = player.token.position.clone();
        const target = tileWorldPos[next].clone();
        target.y += 0.25;
        const startTime = performance.now();
        const dur = 280;
        const arcH = 1.1;
        const tick = (now) => {
            const k = Math.min(1, (now - startTime) / dur);
            const ease = 1 - Math.pow(1 - k, 2.5);
            player.token.position.lerpVectors(from, target, ease);
            player.token.position.y += Math.sin(k * Math.PI) * arcH;
            if (k < 1) requestAnimationFrame(tick);
            else {
                player.tileIdx = next;
                stepsLeft--;
                setTimeout(stepOne, 60);
            }
        };
        requestAnimationFrame(tick);
    };
    stepOne();
}

// Instant teleport (for UFO swap)
function teleportTokenTo(player, tileIdx) {
    player.tileIdx = Math.max(0, Math.min(TILE_COUNT - 1, tileIdx));
    const pos = tileWorldPos[player.tileIdx].clone();
    pos.y += 0.25;
    player.token.position.copy(pos);
    layoutTokensOnTile(player.tileIdx);
}

const ui = document.getElementById('game-ui');
function el(tag, props={}, children=[]) {
    const n = document.createElement(tag);
    for (const k in props) {
        if (k === 'style') Object.assign(n.style, props[k]);
        else if (k === 'on') for (const ev in props.on) n.addEventListener(ev, props.on[ev]);
        else if (k in n) n[k] = props[k];
        else n.setAttribute(k, props[k]);
    }
    for (const c of [].concat(children)) n.append(c?.nodeType ? c : document.createTextNode(c));
    return n;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

// ═══ SVG PART RENDERERS ═══════════════════════════════════════════════════
// All parts return an SVG fragment string. The viewBox is 200x260, with the
// head centered at (100, 92) in a ~120px-tall region (y=30..150). Body sits
// below from y=160..255.

// ── FACE shapes ─────────────────────────────────────────────────────────
function renderFace(shape, skin) {
    const stroke = `stroke="#1a1010" stroke-width="3" stroke-linejoin="round"`;
    switch (shape) {
        case 'round':   return `<ellipse cx="100" cy="92" rx="56" ry="62" fill="${skin}" ${stroke}/>`;
        case 'oval':    return `<ellipse cx="100" cy="92" rx="48" ry="66" fill="${skin}" ${stroke}/>`;
        case 'square':  return `<path d="M 48,60 Q 48,38 70,38 L 130,38 Q 152,38 152,60 L 152,130 Q 152,152 130,152 L 70,152 Q 48,152 48,130 Z" fill="${skin}" ${stroke}/>`;
        case 'heart':   return `<path d="M 100,158 Q 44,138 44,80 Q 44,38 76,38 Q 92,38 100,55 Q 108,38 124,38 Q 156,38 156,80 Q 156,138 100,158 Z" fill="${skin}" ${stroke}/>`;
        case 'long':    return `<ellipse cx="100" cy="95" rx="46" ry="70" fill="${skin}" ${stroke}/>`;
        case 'chubby':  return `<ellipse cx="100" cy="94" rx="64" ry="58" fill="${skin}" ${stroke}/>`;
        case 'pointed': return `<path d="M 100,162 Q 48,148 48,80 Q 48,32 100,32 Q 152,32 152,80 Q 152,148 100,162 Z" fill="${skin}" ${stroke}/>`;
        case 'diamond': return `<path d="M 100,32 L 156,92 L 100,158 L 44,92 Z" fill="${skin}" ${stroke}/>`;
        // ── nieuwe vormen ──
        case 'triangle':return `<path d="M 100,158 Q 38,130 42,75 Q 50,32 100,32 Q 150,32 158,75 Q 162,130 100,158 Z" fill="${skin}" ${stroke}/>`;
        case 'narrow':  return `<ellipse cx="100" cy="92" rx="42" ry="64" fill="${skin}" ${stroke}/>`;
        case 'wide_jaw':return `<path d="M 56,55 Q 56,38 74,38 L 126,38 Q 144,38 144,55 Q 162,90 154,135 Q 140,160 100,160 Q 60,160 46,135 Q 38,90 56,55 Z" fill="${skin}" ${stroke}/>`;
        case 'soft':    return `<path d="M 50,72 Q 50,40 80,40 L 120,40 Q 150,40 150,72 L 150,128 Q 150,156 120,156 L 80,156 Q 50,156 50,128 Z" fill="${skin}" ${stroke}/>`;
        case 'angular': return `<path d="M 100,30 L 156,72 L 152,108 L 132,150 Q 100,162 68,150 L 48,108 L 44,72 Z" fill="${skin}" ${stroke}/>`;
        case 'baby':    return `<ellipse cx="100" cy="98" rx="58" ry="58" fill="${skin}" ${stroke}/>`;
        default:        return renderFace('round', skin);
    }
}

// ── EYES (always returns both eyes mirrored around x=100) ──────────────
function renderEyes(shape, color) {
    const xL = 76, xR = 124, y = 90;
    const stk = `stroke="#1a1010" stroke-width="2.5" stroke-linejoin="round"`;
    const eye = (x) => {
        switch (shape) {
            case 'normal':
                return `<g><ellipse cx="${x}" cy="${y}" rx="9" ry="11" fill="#fff" ${stk}/>
                    <circle cx="${x}" cy="${y+1}" r="5.5" fill="${color}"/>
                    <circle cx="${x}" cy="${y+1}" r="2.5" fill="#1a1010"/>
                    <circle cx="${x-1.5}" cy="${y-1.5}" r="1.8" fill="#fff"/></g>`;
            case 'big':
                return `<g><ellipse cx="${x}" cy="${y}" rx="12" ry="14" fill="#fff" ${stk}/>
                    <circle cx="${x}" cy="${y+2}" r="8" fill="${color}"/>
                    <circle cx="${x}" cy="${y+2}" r="4" fill="#1a1010"/>
                    <circle cx="${x-2}" cy="${y-2}" r="2.5" fill="#fff"/>
                    <circle cx="${x+3}" cy="${y+4}" r="1.2" fill="#fff"/></g>`;
            case 'sleepy':
                return `<g><path d="M ${x-10},${y} Q ${x},${y-4} ${x+10},${y} L ${x+10},${y+4} Q ${x},${y+8} ${x-10},${y+4} Z" fill="#fff" ${stk}/>
                    <path d="M ${x-10},${y} Q ${x},${y-3} ${x+10},${y}" fill="none" stroke="#1a1010" stroke-width="2.5"/>
                    <circle cx="${x}" cy="${y+4}" r="3.5" fill="${color}"/></g>`;
            case 'wink':
                if (x === xL) {
                    return `<path d="M ${x-10},${y+1} Q ${x},${y-5} ${x+10},${y+1}" fill="none" stroke="#1a1010" stroke-width="3" stroke-linecap="round"/>`;
                }
                return `<g><ellipse cx="${x}" cy="${y}" rx="9" ry="11" fill="#fff" ${stk}/>
                    <circle cx="${x}" cy="${y+1}" r="5.5" fill="${color}"/>
                    <circle cx="${x}" cy="${y+1}" r="2.5" fill="#1a1010"/>
                    <circle cx="${x-1.5}" cy="${y-1.5}" r="1.8" fill="#fff"/></g>`;
            case 'star':
                return `<g><ellipse cx="${x}" cy="${y}" rx="10" ry="12" fill="#fff" ${stk}/>
                    <path d="M ${x},${y-6} L ${x+1.7},${y-2} L ${x+6},${y-1} L ${x+2.6},${y+2} L ${x+3.7},${y+6} L ${x},${y+3.5} L ${x-3.7},${y+6} L ${x-2.6},${y+2} L ${x-6},${y-1} L ${x-1.7},${y-2} Z" fill="${color}"/></g>`;
            case 'dot':
                return `<circle cx="${x}" cy="${y+2}" r="4.5" fill="#1a1010"/>`;
            case 'closed':
                return `<path d="M ${x-9},${y+3} Q ${x},${y-6} ${x+9},${y+3}" fill="none" stroke="#1a1010" stroke-width="3" stroke-linecap="round"/>`;
            case 'square':
                return `<g><rect x="${x-9}" y="${y-9}" width="18" height="18" rx="2" fill="#fff" ${stk}/>
                    <rect x="${x-4}" y="${y-4}" width="8" height="8" fill="${color}"/>
                    <rect x="${x-1}" y="${y-1}" width="3" height="3" fill="#1a1010"/></g>`;
            case 'sparkle':
                return `<g><ellipse cx="${x}" cy="${y}" rx="11" ry="13" fill="#fff" ${stk}/>
                    <circle cx="${x}" cy="${y+2}" r="6.5" fill="${color}"/>
                    <circle cx="${x}" cy="${y+2}" r="3" fill="#1a1010"/>
                    <ellipse cx="${x-2.5}" cy="${y-2}" rx="3" ry="2" fill="#fff" transform="rotate(-30 ${x-2.5} ${y-2})"/>
                    <circle cx="${x+3}" cy="${y+4}" r="1.5" fill="#fff"/></g>`;
            case 'tired':
                return `<g><path d="M ${x-10},${y-2} Q ${x},${y+4} ${x+10},${y-2}" fill="none" stroke="#1a1010" stroke-width="3" stroke-linecap="round"/>
                    <circle cx="${x}" cy="${y+1}" r="2.5" fill="#1a1010"/></g>`;
            // ── feminine / glamour eyes ──
            case 'lashed':
                return `<g><ellipse cx="${x}" cy="${y}" rx="9" ry="11" fill="#fff" ${stk}/>
                    <circle cx="${x}" cy="${y+1}" r="5.5" fill="${color}"/>
                    <circle cx="${x}" cy="${y+1}" r="2.5" fill="#1a1010"/>
                    <circle cx="${x-1.5}" cy="${y-1.5}" r="1.8" fill="#fff"/>
                    <path d="M ${x-9},${y-10} L ${x-12},${y-15} M ${x-4},${y-11} L ${x-5},${y-17} M ${x+1},${y-11} L ${x+1},${y-17} M ${x+6},${y-11} L ${x+8},${y-16} M ${x+10},${y-9} L ${x+13},${y-13}" stroke="#1a1010" stroke-width="2" stroke-linecap="round"/></g>`;
            case 'glamour':
                return `<g><ellipse cx="${x}" cy="${y+1}" rx="12" ry="13" fill="#fff" ${stk}/>
                    <circle cx="${x}" cy="${y+2}" r="7" fill="${color}"/>
                    <circle cx="${x}" cy="${y+2}" r="3" fill="#1a1010"/>
                    <ellipse cx="${x-2}" cy="${y-1}" rx="2.5" ry="2" fill="#fff"/>
                    <path d="M ${x-11},${y-9} C ${x-13},${y-15} ${x-7},${y-15} ${x-5},${y-12} L ${x-3},${y-15} L ${x+1},${y-15} L ${x+4},${y-13} C ${x+7},${y-15} ${x+11},${y-14} ${x+13},${y-10}" fill="#1a1010" stroke="#1a1010" stroke-width="1.5"/>
                    <path d="M ${x-10},${y+8} Q ${x-7},${y+13} ${x-3},${y+10} M ${x-1},${y+10} Q ${x+2},${y+13} ${x+5},${y+10}" fill="none" stroke="#1a1010" stroke-width="1.5" stroke-linecap="round"/></g>`;
            case 'cute_lashed':
                return `<g><path d="M ${x-9},${y+2} Q ${x},${y-6} ${x+9},${y+2}" fill="none" stroke="#1a1010" stroke-width="3" stroke-linecap="round"/>
                    <path d="M ${x-9},${y+2} L ${x-12},${y-2} M ${x-2},${y-3} L ${x-3},${y-7} M ${x+3},${y-3} L ${x+4},${y-7} M ${x+9},${y+2} L ${x+12},${y-2}" stroke="#1a1010" stroke-width="1.8" stroke-linecap="round"/>
                    <circle cx="${x-2}" cy="${y-2}" r="1.8" fill="${color}"/></g>`;
            case 'eyeliner':
                return `<g><ellipse cx="${x}" cy="${y}" rx="10" ry="10" fill="#fff" ${stk}/>
                    <circle cx="${x}" cy="${y+1}" r="6" fill="${color}"/>
                    <circle cx="${x}" cy="${y+1}" r="2.8" fill="#1a1010"/>
                    <circle cx="${x-1.5}" cy="${y-1.5}" r="1.8" fill="#fff"/>
                    <path d="M ${x-11},${y-3} Q ${x-2},${y-11} ${x+11},${y-6} L ${x+15},${y-9} L ${x+11},${y-4} Q ${x-2},${y-9} ${x-10},${y-1} Z" fill="#1a1010"/></g>`;
            default:
                return renderEyes('normal', color);
        }
    };
    return eye(xL) + eye(xR);
}

// ── BROWS ──────────────────────────────────────────────────────────────
function renderBrows(shape, color) {
    if (shape === 'none') return '';
    const xL = 76, xR = 124, y = 70;
    const stk = `stroke="${color}" stroke-width="4.5" stroke-linecap="round" fill="none"`;
    const brow = (x, mirrored = false) => {
        const m = mirrored ? -1 : 1;
        switch (shape) {
            case 'flat':      return `<line x1="${x-10}" y1="${y}" x2="${x+10}" y2="${y}" ${stk}/>`;
            case 'arched':    return `<path d="M ${x-10},${y+2} Q ${x},${y-4} ${x+10},${y+2}" ${stk}/>`;
            case 'angry':     return `<line x1="${x-10}" y1="${y-2 + m*2}" x2="${x+10}" y2="${y+2 - m*2}" ${stk}/>`;
            case 'surprised': return `<path d="M ${x-10},${y+4} Q ${x},${y-8} ${x+10},${y+4}" ${stk}/>`;
            case 'thick':     return `<path d="M ${x-11},${y} Q ${x},${y-3} ${x+11},${y}" stroke="${color}" stroke-width="7" stroke-linecap="round" fill="none"/>`;
            case 'thin':      return `<line x1="${x-9}" y1="${y}" x2="${x+9}" y2="${y}" stroke="${color}" stroke-width="2" stroke-linecap="round"/>`;
            case 'wavy':      return `<path d="M ${x-10},${y} Q ${x-5},${y-3} ${x},${y} T ${x+10},${y}" ${stk}/>`;
            default:          return '';
        }
    };
    return brow(xL, false) + brow(xR, true);
}

// ── NOSE ───────────────────────────────────────────────────────────────
function renderNose(shape, skin) {
    if (shape === 'none') return '';
    const stk = `stroke="#1a1010" stroke-width="2" stroke-linecap="round" fill="none"`;
    const shadow = `fill="rgba(0,0,0,0.12)"`;
    switch (shape) {
        case 'small':   return `<circle cx="100" cy="108" r="2.5" fill="#1a1010"/>`;
        case 'button':  return `<path d="M 96,108 Q 100,114 104,108" ${stk}/>`;
        case 'wide':    return `<path d="M 91,108 Q 100,116 109,108" stroke="#1a1010" stroke-width="2.5" stroke-linecap="round" fill="none"/>`;
        case 'long':    return `<path d="M 100,98 L 99,110 Q 100,116 101,110 Z" ${shadow} stroke="#1a1010" stroke-width="1.5"/>`;
        case 'pointy':  return `<path d="M 100,98 L 96,112 Q 100,114 104,112 Z" fill="${skin}" stroke="#1a1010" stroke-width="2" stroke-linejoin="round"/>`;
        default:        return '';
    }
}

// ── MOUTH ──────────────────────────────────────────────────────────────
function renderMouth(shape) {
    const stk = `stroke="#1a1010" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"`;
    const y = 128;
    switch (shape) {
        case 'smile':   return `<path d="M 86,${y} Q 100,${y+12} 114,${y}" ${stk}/>`;
        case 'grin':    return `<path d="M 82,${y-2} Q 100,${y+14} 118,${y-2} L 116,${y-2} Q 100,${y+8} 84,${y-2} Z" fill="#fff" stroke="#1a1010" stroke-width="3" stroke-linejoin="round"/>
                                <line x1="100" y1="${y-1}" x2="100" y2="${y+6}" stroke="#1a1010" stroke-width="1.5"/>`;
        case 'neutral': return `<line x1="88" y1="${y+2}" x2="112" y2="${y+2}" ${stk}/>`;
        case 'open':    return `<ellipse cx="100" cy="${y+3}" rx="8" ry="9" fill="#5a1822" stroke="#1a1010" stroke-width="2.5"/>`;
        case 'smirk':   return `<path d="M 88,${y+4} Q 100,${y+10} 112,${y-2}" ${stk}/>`;
        case 'tongue':  return `<path d="M 84,${y-2} Q 100,${y+14} 116,${y-2}" fill="#5a1822" stroke="#1a1010" stroke-width="2.5" stroke-linejoin="round"/>
                                <ellipse cx="100" cy="${y+8}" rx="6" ry="4" fill="#ff7a90"/>`;
        case 'o':       return `<circle cx="100" cy="${y+2}" r="5" fill="#5a1822" stroke="#1a1010" stroke-width="2.5"/>`;
        case 'frown':   return `<path d="M 86,${y+8} Q 100,${y-4} 114,${y+8}" ${stk}/>`;
        case 'kiss':    return `<g><ellipse cx="100" cy="${y+2}" rx="4" ry="5" fill="#ff7a90" stroke="#1a1010" stroke-width="2"/>
                                <ellipse cx="100" cy="${y}" rx="2.5" ry="1.5" fill="#ff4d70"/></g>`;
        case 'tooth':   return `<path d="M 86,${y} Q 100,${y+12} 114,${y}" ${stk}/>
                                <rect x="94" y="${y+5}" width="6" height="8" rx="1" fill="#fff" stroke="#1a1010" stroke-width="1.5"/>`;
        // ── lipstick variants (feminine) ──
        case 'lips_red':
            return `<g><path d="M 85,${y+1} Q 92,${y-4} 100,${y-1} Q 108,${y-4} 115,${y+1} Q 115,${y+5} 100,${y+8} Q 85,${y+5} 85,${y+1} Z" fill="#d92e3a" stroke="#1a1010" stroke-width="2"/>
                <path d="M 92,${y+1} Q 96,${y-2} 100,${y} Q 104,${y-2} 108,${y+1}" fill="none" stroke="#1a1010" stroke-width="1.5"/>
                <ellipse cx="98" cy="${y-1}" rx="2" ry="1" fill="#ff6e8a" opacity="0.7"/></g>`;
        case 'lips_pink':
            return `<g><path d="M 85,${y+1} Q 92,${y-4} 100,${y-1} Q 108,${y-4} 115,${y+1} Q 115,${y+5} 100,${y+8} Q 85,${y+5} 85,${y+1} Z" fill="#ff7a9e" stroke="#1a1010" stroke-width="2"/>
                <path d="M 92,${y+1} Q 96,${y-2} 100,${y} Q 104,${y-2} 108,${y+1}" fill="none" stroke="#1a1010" stroke-width="1.5"/>
                <ellipse cx="98" cy="${y-1}" rx="2.5" ry="1.2" fill="#ffb0c4" opacity="0.7"/></g>`;
        case 'soft_smile':
            return `<g><path d="M 88,${y+1} Q 100,${y+8} 112,${y+1}" stroke="#c84a6a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
                <path d="M 88,${y+1} Q 100,${y+5} 112,${y+1}" stroke="#1a1010" stroke-width="2" stroke-linecap="round" fill="none"/></g>`;
        case 'lips_full':
            return `<g><path d="M 82,${y} Q 90,${y-7} 100,${y-3} Q 110,${y-7} 118,${y} Q 118,${y+6} 100,${y+10} Q 82,${y+6} 82,${y} Z" fill="#c84a6a" stroke="#1a1010" stroke-width="2.5" stroke-linejoin="round"/>
                <path d="M 90,${y} Q 95,${y-3} 100,${y-1} Q 105,${y-3} 110,${y}" fill="none" stroke="#1a1010" stroke-width="1.5"/>
                <ellipse cx="98" cy="${y-3}" rx="3" ry="1.5" fill="#ff8aa6" opacity="0.6"/></g>`;
        default:        return renderMouth('smile');
    }
}

// ── HAIR (drawn behind the face for length, in front for top fringe) ──
// We return { back, front } so caller can layer them.
function renderHair(style, color) {
    const stk = `stroke="#1a1010" stroke-width="3" stroke-linejoin="round"`;
    const dark = darkenHex(color, 0.7);
    switch (style) {
        case 'bald':
            return { back: '', front: '' };
        case 'short_messy':
            return {
                back: '',
                front: `<path d="M 50,68 Q 46,28 100,28 Q 154,28 150,68 Q 142,40 124,38 Q 120,52 110,42 Q 100,54 90,42 Q 80,52 76,38 Q 58,40 50,68 Z" fill="${color}" ${stk}/>`
            };
        case 'short_neat':
            return {
                back: '',
                front: `<path d="M 48,72 Q 48,32 100,32 Q 152,32 152,72 Q 140,58 100,58 Q 60,58 48,72 Z" fill="${color}" ${stk}/>`
            };
        case 'side_part':
            return {
                back: '',
                front: `<path d="M 50,70 Q 50,30 100,30 Q 150,30 150,70 Q 138,52 110,50 Q 95,38 80,52 Q 60,54 50,70 Z" fill="${color}" ${stk}/>
                        <path d="M 88,32 Q 92,46 78,58 Q 70,52 78,42 Q 82,34 88,32 Z" fill="${dark}" stroke="none"/>`
            };
        case 'long_straight':
            return {
                back: `<path d="M 42,80 Q 42,30 100,30 Q 158,30 158,80 L 162,225 Q 130,235 100,235 Q 70,235 38,225 Z" fill="${color}" ${stk}/>`,
                front: `<path d="M 48,72 Q 50,38 100,38 Q 150,38 152,72 Q 140,56 100,56 Q 60,56 48,72 Z" fill="${color}" ${stk}/>`
            };
        case 'ponytail':
            return {
                back: `<path d="M 142,68 Q 168,90 162,140 Q 155,170 138,165 Q 144,140 140,90 Z" fill="${color}" ${stk}/>`,
                front: `<path d="M 50,70 Q 50,30 100,30 Q 150,30 150,70 Q 138,52 100,52 Q 62,52 50,70 Z" fill="${color}" ${stk}/>`
            };
        case 'pigtails':
            return {
                back: `<ellipse cx="40" cy="105" rx="14" ry="22" fill="${color}" ${stk}/>

        case 'bun':

                front: `<path d="M 50,70 Q 50,40 100,40 Q 150,40 150,70 Q 138,58 100,58 Q 62,58 50,70 Z" fill="${color}" ${stk}/>`

        case 'curly':
            return {

                       </g>`
            };
        case 'mohawk':

        case 'bowl':

        case 'afro':
            return {

        case 'spiky':

        // ── feminine additions ──

        case 'bob':

                front: `<path d="M 48,74 Q 50,32 100,32 Q 150,32 152,74 Q 140,56 100,56 Q 60,56 48,74 Z" fill="${color}" ${stk}/>`

        case 'space_buns':
            return {
