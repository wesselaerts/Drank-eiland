        el('div', { className: 'pos' }, `Tegel ${cur.tileIdx} / ${TILE_COUNT - 1}`),
    );
    card.append(av, txt);
    document.getElementById('round-pill').textContent = `Ronde ${G.round}`;
    refreshMinimap();
}

function playRaftBattle({ playerA, playerB, drinks = 4 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'rb-back' });

        // Header bar with title + VS chips matching player colors
        const header = el('div', { className: 'rb-header' });
        const titleEl = el('div', { className: 'rb-title' }, '🏴‍☠️ Raft Battle');
        const vs = el('div', { className: 'rb-vs' });
        const chipA = el('div', { className: 'chip', style: { '--pcol': playerA.color.css } });
        chipA.append(el('div', { className: 'dot' }), document.createTextNode(playerA.name));
        const xLbl = el('span', { className: 'x' }, 'vs');
        const chipB = el('div', { className: 'chip', style: { '--pcol': playerB.color.css } });
        chipB.append(el('div', { className: 'dot' }), document.createTextNode(playerB.name));
        vs.append(chipA, xLbl, chipB);
        header.append(titleEl, vs);

        // Iframe canvas in a framed wrap (not yet mounted — the iframe
        // only starts loading when it's appended to the document).
        const wrap = el('div', { className: 'rb-canvas-wrap' });
        const iframe = el('iframe', {
            allow: 'accelerometer; gyroscope; autoplay',
            scrolling: 'no' });
        wrap.append(iframe);

        // Manual-winner bar (still useful if the iframe doesn't auto-report)
        const bar = el('div', { className: 'rb-bar' });
        const lbl = el('div', { className: 'lbl' }, 'Wie heeft gewonnen?');
        const btnA = el('button', { className: 'btn-win', type: 'button',
            style: { '--pcol': playerA.color.css } }, playerA.name);
        const btnB = el('button', { className: 'btn-win', type: 'button',
            style: { '--pcol': playerB.color.css } }, playerB.name);
        const btnSkip = el('button', { className: 'btn-skip', type: 'button' }, 'Skip');
        const hint = el('div', { className: 'hint' },
            'Het spel stopt automatisch bij een knock-out — of tik hieronder.');
        bar.append(lbl, btnA, btnB, btnSkip, hint);

        back.append(header, wrap, bar);

        let done = false;
        async function finish(winner) {
            if (done) return;
            done = true;
            window.removeEventListener('message', onMsg);
            back.remove();
            if (winner) {
                const loser = winner === playerA ? playerB : playerA;
                await showModal({ emoji: '🏴‍☠️',
                    title: `${winner.name} wint Raft Battle!`,
                    body: [`${loser.name} drinkt ${drinks} 🍻`,
                        `${winner.name} krijgt 1 × gouden bonus-dobbelsteen 🎲💛`],
                    actions: [{ label: 'Klaar', value: true }] });
            }
            resolve(winner || null);
        }

        // Show a knock-out overlay on top of the iframe when the iframe
        // reports a winner. Auto-resolves after a short delay if the user
        // doesn't tap "Verder".
        function showKnockout(winner) {
            if (done) return;
            const ko = el('div', { className: 'rb-ko',
                style: { '--pcol': winner.color.css } });
            ko.append(
                el('h2', {}, `🥊 KNOCK-OUT! ${winner.name} wint!`),
                el('p', {}, `${(winner === playerA ? playerB : playerA).name} drinkt ${drinks} 🍻`),
                el('button', { className: 'btn-pill', type: 'button',
                    on: { click: () => finish(winner) } }, 'Verder'),
            );
            wrap.append(ko);
            // Auto-advance after 5s in case nobody taps
            setTimeout(() => finish(winner), 5000);
        }

        // Send the player config to the iframe. We do this both on load
        // and whenever the iframe says "hello", so the timing always works.
        function sendInit() {
            try {
                iframe.contentWindow.postMessage({
                    type: 'raft-init',
                    playerA: { name: playerA.name, color: playerA.color.css },
                    playerB: { name: playerB.name, color: playerB.color.css },
                }, '*');
            } catch (e) { /* cross-origin — ignore */ }
        }

        // Listen for messages from the iframe game.
        //   raft-hello   → the iframe just loaded; (re-)send init
        //   raft-ready   → the iframe got our config; we can trust it,
        //                  so hide the manual "Wie heeft gewonnen?" bar
        //   raft-knockout→ somebody lost all their hearts. Pause briefly
        //                  so the iframe's win animation plays, then
        //                  show our own KO overlay on top.
        function onMsg(ev) {
            if (ev.source !== iframe.contentWindow) return; // ignore other frames
            const d = ev && ev.data;
            if (!d || typeof d !== 'object') return;
            if (d.type === 'raft-hello') { sendInit(); return; }
            if (d.type === 'raft-ready') {
                // iframe confirmed it received our init; the manual
                // backup bar is no longer needed.
                bar.style.display = 'none';
                return;
            }
            if (d.type !== 'raft-knockout' && d.type !== 'knockout' && d.type !== 'raft:gameover') return;
            let winner = null;
            if (d.winner === 'A' || d.winner === 'a' || d.winner === 1) winner = playerA;
            else if (d.winner === 'B' || d.winner === 'b' || d.winner === 2) winner = playerB;
            else if (d.winnerName) {
                if (d.winnerName === playerA.name) winner = playerA;
                else if (d.winnerName === playerB.name) winner = playerB;
            }
            if (!winner) winner = Math.random() < 0.5 ? playerA : playerB; // fallback
            // Let the in-game celebration play for ~1.8s before our KO
            // overlay covers it (confetti, "X wins!" text, etc).
            setTimeout(() => showKnockout(winner), 1800);
        }
        window.addEventListener('message', onMsg);

        iframe.addEventListener('load', sendInit);

        // Everything is wired up — now mount the iframe and start loading.
        ui.append(back);
        iframe.src = 'raftwar.html';

        btnA.onclick = () => finish(playerA);
        btnB.onclick = () => finish(playerB);
        btnSkip.onclick = () => finish(null);
    });
}

// ── Pip layouts for each die face ──
const PIP_LAYOUTS = {
    1: [[50,50]],
    2: [[25,25],[75,75]],
    3: [[25,25],[50,50],[75,75]],
    4: [[25,25],[75,25],[25,75],[75,75]],
    5: [[25,25],[75,25],[50,50],[25,75],[75,75]],
    6: [[25,25],[75,25],[25,50],[75,50],[25,75],[75,75]],
};
// rotations that bring each face to the front (Z+)
const FACE_ROT = {
    1: [0, 0],         // f1 already at +Z
    6: [0, 180],       // f6 at -Z → rotate 180 around Y
    2: [0, -90],       // f2 at +X → rotate -90 around Y
    5: [0, 90],        // f5 at -X → rotate +90 around Y
    3: [-90, 0],       // f3 at +Y → rotate -90 around X
    4: [90, 0],        // f4 at -Y → rotate +90 around X
};
function makeDie3D(goldClass = false) {
    const die = el('div', { className: 'die3d' + (goldClass ? ' gold' : '') });
    for (let f = 1; f <= 6; f++) {
        const face = el('div', { className: 'face f' + f });
        for (const [x, y] of PIP_LAYOUTS[f]) {
            face.append(el('div', { className: 'pip', style: { left: x + '%', top: y + '%' } }));
        }
        die.append(face);
    }
    return die;
}
function spinDieTo(die, value, extraSpins = 4) {
    const [rx, ry] = FACE_ROT[value];
    const rxTotal = rx + 360 * extraSpins;
    const ryTotal = ry + 360 * (extraSpins + 1);
    // Two rAFs: first lets the browser register the starting transform,
    // then we set the final one so the CSS transition actually animates.
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            die.style.transform = `rotateX(${rxTotal}deg) rotateY(${ryTotal}deg)`;
        });
    });
}

// ── Dice roll using the aurum-dice physics iframe overlay ──
// The iframe is loaded fresh for each roll so its scene is cleanly disposed.
// Communication is via postMessage:
//   iframe → host:  'dice-ready', 'dice-result', 'dice-dismiss'
//   host  → iframe: 'dice-init', 'dice-roll'
function onRollDice() {
    if (G.phase !== 'idle') return;
    const player = G.players[G.turnIdx];

    // Skull-pit: skip a turn if player was punished
    if (player.skipNextTurn) {
        player.skipNextTurn = false;
        G.phase = 'event';
        showStamp({
            emoji: '🌋', big: 'IN DE VULKAAN!',
            sub: `${player.name} slaat deze beurt over`,
            palette: 'lava',
        }).then(() => {
            advanceTurn();
            G.phase = 'idle';
            const btn = document.getElementById('dice-btn');
            if (btn) { btn.disabled = false; btn.textContent = '🎲'; }
            refreshHUD();
        });
        return;
    }

    G.phase = 'rolling';
    const btn = document.getElementById('dice-btn');
    btn.disabled = true;
    const useBonus = (player.bonusDice || 0) > 0;
    const diceCount = useBonus ? 2 : 1;

    // Build the iframe overlay (semi-transparent table, host page peeks through)
    const back = el('div', { className: 'dice-iframe-back' });
    const headerBar = el('div', { className: 'dice-iframe-header' });
    const turnPill = el('div', { className: 'dice-iframe-pill', style: {
        '--pcol': player.color.css,
    }});
    turnPill.append(
        el('div', { className: 'dot' }),
        document.createTextNode(`${player.name} gooit${useBonus ? ' (met bonus 🎲💛)' : ''}`),
    );
    headerBar.append(turnPill);

    const iframe = el('iframe', {
        className: 'dice-iframe',
        allow: 'autoplay',
        scrolling: 'no',
    });
    // The iframe needs a transparent background — we set it via the `allow*`
    // attributes and via CSS on the iframe element below.
    back.append(headerBar, iframe);
    document.body.append(back);

    let done = false;
    let result = null;  // { total, values, doubles }

    function send(msg) {
        try { iframe.contentWindow.postMessage(msg, '*'); } catch(e) {}
    }

    function onMsg(ev) {
        if (ev.source !== iframe.contentWindow) return;
        const d = ev.data;
        if (!d || typeof d !== 'object') return;
        if (d.type === 'dice-ready') {
            // tell the iframe to set up the right number of dice for this roll
            send({
                type: 'dice-init',
                count: diceCount,
                hasGoldDie: useBonus,
                playerName: player.name,
            });
            // a beat for the dice to settle into idle pose, then roll
            setTimeout(() => send({ type: 'dice-roll' }), 350);
        } else if (d.type === 'dice-result') {
            result = d;
            // consume the bonus die after the roll
            if (useBonus && (player.bonusDice || 0) > 0) {
                player.bonusDice--;
                refreshHUD();
            }
            // mark doubles for the extra-roll logic later
            if (d.doubles) player.extraRoll = true;
        } else if (d.type === 'dice-dismiss') {
            finish();
        }
    }
    window.addEventListener('message', onMsg);

    async function finish() {
        if (done) return;
        done = true;
        window.removeEventListener('message', onMsg);

        // If somehow no result came back, fall back to a random roll
        if (!result) {
            const v1 = 1 + Math.floor(Math.random() * 6);
            const v2 = useBonus ? 1 + Math.floor(Math.random() * 6) : 0;
            result = { total: v1 + v2, values: useBonus ? [v1, v2] : [v1], doubles: useBonus && v1 === v2 };
            if (useBonus && (player.bonusDice || 0) > 0) { player.bonusDice--; refreshHUD(); }
            if (result.doubles) player.extraRoll = true;
        }

        let total = result.total;
        let eruptPenalty = 0;
        if (G.volcanoActive > 0) {
            eruptPenalty = 1;
            total = Math.max(1, total - 1);
        }

        // fade the iframe out
        back.style.transition = 'opacity 0.3s ease';
        back.style.opacity = '0';
        setTimeout(() => back.remove(), 300);

        // Show a short eruption-penalty stamp if applicable (click-to-continue)
        if (eruptPenalty) {
            await showStamp({
                emoji: '🌋', big: `−1 door uitbarsting`,
                sub: `Worp was ${result.total}, na vulkaan-straf: ${total}`,
                palette: 'lava',
            });
        }

        G.phase = 'moving';
        moveTokenAlong(player, total, () => onLandedOnTile(player));
    }

    iframe.src = 'dice-overlay.html';
}

// Helper used by skip-turn path and end of onLandedOnTile
function advanceTurn() {
    G.turnIdx = (G.turnIdx + 1) % G.players.length;
    if (G.turnIdx === 0) {
        G.round++;
        if (G.volcanoActive > 0) G.volcanoActive--;

}

// ── Chwazi finger chooser — picks a random player among those who put a finger down ──
function playChwazi({ title = 'Iemand drinkt!', subtitle = 'Alle spelers leggen één vinger op het scherm', drinks = 3 } = {}) {
    return new Promise(resolve => {
        const players = G.players;
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'chwazi-back' });
        const head = el('div', { className: 'chwazi-head' });
        head.append(
            el('h2', {}, title),
            el('div', { className: 'sub' }, subtitle)
        );
        const stage = el('div', { className: 'chwazi-stage' });
        const hint = el('div', { className: 'chwazi-hint' });
        hint.append(
            el('span', { className: 'big' }, '👆 Vingers op het scherm'),
            el('span', { className: 'small' }, `Iedere speler legt één vinger neer. Wacht tot er een wordt gekozen.`)
        );
        stage.append(hint);
        const result = el('div', { className: 'chwazi-result' });
        stage.append(result);
        const status = el('div', { className: 'chwazi-status' }, `0 / ${players.length} vingers`);
        const foot = el('div', { className: 'chwazi-foot' });
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        const pickNowBtn = el('button', { className: 'btn-pill gold', type: 'button' }, 'Kies nu');
        foot.append(skipBtn, pickNowBtn);
        back.append(head, stage, status, foot);
        ui.append(back);

        const fingers = new Map(); // id -> { el, x, y, playerIdx }
        let locked = false;
        let pickTimer = null;

        function rect() { return stage.getBoundingClientRect(); }

        function addFinger(id, clientX, clientY) {
            if (locked) return;
            if (fingers.size >= players.length) return;
            const r = rect();
            const x = clientX - r.left, y = clientY - r.top;
            const playerIdx = fingers.size; // order of touch = order of player
            const p = players[playerIdx];
            const f = el('div', { className: 'chwazi-finger' });
            f.style.setProperty('--ring', p.color.css);
            f.style.setProperty('--fill', p.color.css);
            f.style.left = x + 'px';
            f.style.top  = y + 'px';
            f.append(
                el('div', { className: 'ring' }),
                el('div', { className: 'fill' }),
                el('div', { className: 'label' }, String(playerIdx + 1))
            );
            stage.append(f);
            requestAnimationFrame(() => f.classList.add('in'));
            fingers.set(id, { el: f, x, y, playerIdx });
            updateStatus();
            schedulePick();
        }
        function moveFinger(id, clientX, clientY) {
            const f = fingers.get(id);
            if (!f || locked) return;
            const r = rect();
            f.x = clientX - r.left; f.y = clientY - r.top;
            f.el.style.left = f.x + 'px';
            f.el.style.top  = f.y + 'px';
        }
        function removeFinger(id) {
            const f = fingers.get(id);
            if (!f) return;
            if (locked) return; // keep visuals after pick
            f.el.remove();
            fingers.delete(id);
            // re-number remaining fingers to keep order
            [...fingers.values()].forEach((fi, i) => {
                fi.playerIdx = i;
                const p = players[i];
                fi.el.style.setProperty('--ring', p.color.css);
                fi.el.style.setProperty('--fill', p.color.css);
                fi.el.querySelector('.label').textContent = String(i + 1);
            });
            updateStatus();
            schedulePick();
        }
        function updateStatus() {
            hint.classList.toggle('hidden', fingers.size > 0);
            const n = fingers.size, need = players.length;
            if (n === 0) status.textContent = `0 / ${need} vingers`;
            else if (n < need) status.textContent = `${n} / ${need} vingers — wachten…`;
            else status.textContent = `${n} / ${need} vingers — kiezen in 1.5s…`;
        }
        function schedulePick() {
            clearTimeout(pickTimer);
            if (fingers.size === 0 || locked) return;
            const delay = fingers.size >= players.length ? 1500 : 2500;
            pickTimer = setTimeout(doPick, delay);
        }
        function doPick() {
            if (locked || fingers.size === 0) return;
            locked = true;
            const entries = [...fingers.values()];
            const winner = entries[Math.floor(Math.random() * entries.length)];
            entries.forEach(f => {
                if (f === winner) f.el.classList.add('winner');
                else f.el.classList.add('loser');
            });
            const winnerPlayer = players[winner.playerIdx];
            status.textContent = `🎯 Gekozen!`;
            result.style.setProperty('--gloW', winnerPlayer.color.css);
            result.append(
                el('div', { className: 'who', style: { color: winnerPlayer.color.css } }, winnerPlayer.name),
                el('div', { className: 'drinks' }, `drinkt ${drinks} 🍻`)
            );
            requestAnimationFrame(() => result.classList.add('show'));
            pickNowBtn.textContent = 'Verder';
            pickNowBtn.onclick = () => finish(winnerPlayer);
            skipBtn.style.display = 'none';
        }

        // Touch events
        stage.addEventListener('touchstart', e => {
            e.preventDefault();
            [...e.changedTouches].forEach(t => addFinger(t.identifier, t.clientX, t.clientY));
        }, { passive: false });
        stage.addEventListener('touchmove', e => {
            e.preventDefault();
            [...e.changedTouches].forEach(t => moveFinger(t.identifier, t.clientX, t.clientY));
        }, { passive: false });
        stage.addEventListener('touchend', e => {
            e.preventDefault();
            [...e.changedTouches].forEach(t => removeFinger(t.identifier));
        }, { passive: false });
        stage.addEventListener('touchcancel', e => {
            [...e.changedTouches].forEach(t => removeFinger(t.identifier));
        });
        // Mouse fallback for desktop testing — each click adds/removes a finger
        const MOUSE_ID = 'mouse';
        let mouseDown = false;
        stage.addEventListener('mousedown', e => {
            if (locked) return;
            if (fingers.has(MOUSE_ID + fingers.size)) return;
            const id = MOUSE_ID + Date.now();
            stage._lastMouseId = id;
            addFinger(id, e.clientX, e.clientY);
            mouseDown = true;
        });
        stage.addEventListener('mousemove', e => {
            if (!mouseDown || locked) return;
            moveFinger(stage._lastMouseId, e.clientX, e.clientY);
        });
        window.addEventListener('mouseup', () => { mouseDown = false; });

        function finish(winnerPlayer) {
            clearTimeout(pickTimer);
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(winnerPlayer); }, 300);
        }
        skipBtn.addEventListener('click', () => finish(null));
        pickNowBtn.addEventListener('click', () => {
            if (locked) return; // gets reassigned to "Verder" after pick
            if (fingers.size === 0) {
                // simulate one finger in the middle so a player still gets picked
                const r = rect();
                addFinger('auto', r.width / 2, r.height / 2);
                setTimeout(doPick, 400);
            } else {
                doPick();
            }
        });
    });
}

// ── Tappy Bird — pass-the-phone; each player plays once; highest score wins ──
function playTappyBird({ players = G.players, drinks = 2 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'tb-back' });
        const wrap = el('div', { className: 'tb-canvas-wrap' });
        const canvas = el('canvas');
        wrap.append(canvas);
        const hud = el('div', { className: 'tb-hud' });
        const hudName = el('div', { className: 'name' }, '');
        const hudScore = el('div', { className: 'score' }, '0');
        hud.append(hudName, document.createElement('br'), hudScore);
        wrap.append(hud);
        const overlay = el('div', { className: 'tb-overlay show' });
        wrap.append(overlay);
        back.append(wrap);
        ui.append(back);

        const ctx = canvas.getContext('2d');
        let W = 0, H = 0, dpr = window.devicePixelRatio || 1;
        function resize() {
            const r = wrap.getBoundingClientRect();
            W = r.width; H = r.height;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);

        let curIdx = 0;
        const scores = []; // {player, score}

        const state = { bird:{x:0,y:0,vy:0}, pipes:[], time:0, score:0, alive:false, started:false };
        const GRAV = 1700, FLAP = -520, PIPE_W = 64, GAP = 170, PIPE_INT = 1.55, SCROLL = 180;
        let groundOff = 0;

        function resetGame() {
            state.bird.x = W * 0.28; state.bird.y = H * 0.4; state.bird.vy = 0;
            state.pipes.length = 0; state.time = 0; state.score = 0; state.alive = true; state.started = false;
            hudScore.textContent = '0';
        }

        function flap() {
            if (!state.alive) return;
            state.started = true;
            state.bird.vy = FLAP;
        }
        // IMPORTANT: attach to canvas (not wrap) so taps on the overlay's
        // Start button don't get e.preventDefault()'d before iOS can
        // synthesize their click event. (This was the iPhone Safari bug.)
        canvas.addEventListener('touchstart', e => {
            if (overlay.classList.contains('show')) return; // let the button handle the tap
            e.preventDefault();
            flap();
        }, { passive: false });
        canvas.addEventListener('mousedown', e => { if (overlay.classList.contains('show')) return; flap(); });

        let last = 0, rafId = null;
        function tick(t) {
            if (!last) last = t;
            const dt = Math.min(50, t - last) / 1000;
            last = t;
            update(dt); draw();
            rafId = requestAnimationFrame(tick);
        }
        function update(dt) {
            if (!state.alive || !state.started) return;
            state.time += dt;
            // bird
            state.bird.vy += GRAV * dt;
            state.bird.y += state.bird.vy * dt;
            // pipes
            if (state.pipes.length === 0 || state.pipes[state.pipes.length-1].x < W - W*0.55) {
                const gapY = 80 + Math.random() * (H - 200 - GAP);
                state.pipes.push({ x: W + 20, gapY, passed: false });
            }
            for (const p of state.pipes) {
                p.x -= SCROLL * dt;
                if (!p.passed && p.x + PIPE_W < state.bird.x) {
                    p.passed = true;
                    state.score++;
                    hudScore.textContent = state.score;
                }
                // collide
                const inX = state.bird.x + 16 > p.x && state.bird.x - 16 < p.x + PIPE_W;
                const inY = state.bird.y - 14 < p.gapY || state.bird.y + 14 > p.gapY + GAP;
                if (inX && inY) die();
            }
            state.pipes = state.pipes.filter(p => p.x + PIPE_W > -10);
            // ground / ceiling
            if (state.bird.y > H - 50) { state.bird.y = H - 50; die(); }
            if (state.bird.y < 0) state.bird.y = 0;
            groundOff = (groundOff + SCROLL * dt) % 24;
        }
        function draw() {
            // sky gradient
            const g = ctx.createLinearGradient(0, 0, 0, H);
            g.addColorStop(0, '#70d6e0'); g.addColorStop(1, '#9ee5b0');
            ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
            // pipes
            for (const p of state.pipes) {
                ctx.fillStyle = '#5cb83a';
                ctx.fillRect(p.x, 0, PIPE_W, p.gapY);
                ctx.fillRect(p.x, p.gapY + GAP, PIPE_W, H - (p.gapY + GAP) - 40);
                ctx.fillStyle = '#3a8c25';
                ctx.fillRect(p.x - 4, p.gapY - 18, PIPE_W + 8, 18);
                ctx.fillRect(p.x - 4, p.gapY + GAP, PIPE_W + 8, 18);
            }
            // ground stripe
            ctx.fillStyle = '#deb887'; ctx.fillRect(0, H - 40, W, 40);
            ctx.fillStyle = '#a87a4a';
            for (let x = -groundOff; x < W; x += 24) ctx.fillRect(x, H - 40, 12, 6);
            // bird
            const p = players[curIdx];
            const angle = Math.max(-0.5, Math.min(1.0, state.bird.vy / 600));
            ctx.save();
            ctx.translate(state.bird.x, state.bird.y);
            ctx.rotate(angle);
            ctx.fillStyle = p.color.css;
            ctx.beginPath(); ctx.ellipse(0, 0, 18, 14, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(7, -4, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(8, -4, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ffaa20';
            ctx.beginPath(); ctx.moveTo(13, 0); ctx.lineTo(22, 1); ctx.lineTo(13, 4); ctx.fill();
            ctx.restore();
        }

        function die() {
            if (!state.alive) return;
            state.alive = false;
            scores.push({ player: players[curIdx], score: state.score });
            setTimeout(showAfter, 700);
        }

        function showStartFor(p) {
            overlay.innerHTML = '';
            overlay.append(
                el('h2', { style: { color: p.color.css } }, `Geef telefoon aan ${p.name}`),
                el('p', {}, 'Tik om te flappen. Ontwijk de buizen — wie het verste komt wint.'),
                el('button', { className: 'btn-pill gold', on: { click: () => {
                    overlay.classList.remove('show');
                    resetGame();
                } } }, '▶ Ik ben er klaar voor'),
            );
            overlay.classList.add('show');
            hudName.textContent = p.name;
            hudName.style.background = p.color.css;
            hudScore.textContent = '0';
        }

        function showAfter() {
            if (curIdx < players.length - 1) {
                curIdx++;
                showStartFor(players[curIdx]);
            } else {
                showFinal();
            }
        }

        function showFinal() {
            const sorted = [...scores].sort((a, b) => b.score - a.score);
            const top = sorted[0].score;
            const losers = sorted.filter(s => s.score < top);
            overlay.innerHTML = '';
            overlay.append(el('h2', {}, '🏆 Eindstand'));
            const board = el('div', { className: 'board' });
            sorted.forEach((s, i) => {
                const row = el('div', { className: 'row' + (s.score === top ? ' win' : ''),
                    style: { '--pcol': s.player.color.css } });
                row.append(
                    el('div', { className: 'dot' }),
                    el('div', { className: 'nm' }, `${i+1}. ${s.player.name}`),
                    el('div', { className: 'sc' }, String(s.score)),
                );
                board.append(row);
            });
            overlay.append(board);
            const ldsc = losers.length === 0 ? 'Iedereen gelijk — proost!' :
                `${losers.map(l => l.player.name).join(', ')} drinkt elk ${drinks} 🍻`;
            overlay.append(el('p', {}, ldsc));
            overlay.append(el('button', { className: 'btn-pill gold',
                on: { click: () => finish(sorted) } }, 'Verder'));
            overlay.classList.add('show');
        }

        function finish(sorted) {
            cancelAnimationFrame(rafId);
            window.removeEventListener('resize', resize);
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(sorted); }, 300);
        }

        rafId = requestAnimationFrame(tick);
        showStartFor(players[curIdx]);
    });
}

// ── Volcano Hop — secretly pick a platform; wrong = lightning, last standing wins ──
function playVolcanoHop({ players = G.players, drinks = 2 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'vh-back' });
        const header = el('div', { className: 'vh-header' });
        const title = el('div', { className: 'vh-title' }, '🌋 Volcano Hop');
        const sub = el('div', { className: 'vh-sub' }, 'Kies stiekem een platform');
        const chips = el('div', { className: 'vh-survivors' });
        header.append(title, sub, chips);
        const stage = el('div', { className: 'vh-stage' });
        const plats = el('div', { className: 'vh-platforms' });
        const tokens = el('div', { className: 'vh-tokens' });
        const cloud = el('div', { className: 'vh-cloud' });
        stage.append(plats, tokens, cloud);
        const actions = el('div', { className: 'vh-actions' });
        back.append(header, stage, actions);
        ui.append(back);

        let alive = [...players];
        const eliminated = [];
        let round = 0;

        function renderChips(currentP = null) {
            chips.innerHTML = '';
            for (const p of players) {
                const out = !alive.includes(p);
                const cur = p === currentP;
                const c = el('div', { className: 'vh-chip' + (out ? ' out' : '') + (cur ? ' cur' : ''),
                    style: { '--pcol': p.color.css } });
                c.append(el('div', { className: 'dot' }), document.createTextNode(p.name));
                chips.append(c);
            }
        }

        function clear() { plats.innerHTML = ''; tokens.innerHTML = ''; actions.innerHTML = ''; cloud.className = 'vh-cloud'; }

        function showPassScreen(text, sub2, btnLabel, onGo) {
            const pass = el('div', { className: 'vh-pass' });
            pass.append(
                el('h2', {}, text),
                el('p', {}, sub2 || ''),
                el('button', { className: 'btn-pill gold', on: { click: () => { pass.remove(); onGo(); } },
                    style: { minHeight: '52px', padding: '0 26px', borderRadius: '999px',
                        background: 'linear-gradient(180deg,#ffd54a,#ff9a1a)', color: '#2a1a00',
                        border: '1px solid rgba(255,215,80,0.6)', boxShadow: '0 4px 0 #b56a00',
                        fontWeight: '800', fontSize: '16px', cursor: 'pointer' } }, btnLabel || 'OK'),
            );
            stage.append(pass);
        }

        async function playRound() {
            round++;
            clear();
            const platCount = Math.max(2, Math.min(5, alive.length + 1));
            const safeIdx = Math.floor(Math.random() * platCount);
            const picks = new Map(); // player → platIdx

            // build platforms
            const platEls = [];
            for (let i = 0; i < platCount; i++) {
                const pl = el('div', { className: 'vh-plat' }, String(i + 1));
                pl.dataset.idx = i;
                plats.append(pl);
                platEls.push(pl);
            }

            sub.textContent = `Ronde ${round} — ${alive.length} spelers, ${platCount} platforms`;
            renderChips();

            // pass-and-pick for each alive player
            for (let pi = 0; pi < alive.length; pi++) {
                const p = alive[pi];
                await new Promise(r => {
                    showPassScreen(`Geef telefoon aan ${p.name}`,
                        'Kies stiekem 1 platform. Anderen mogen niet zien!',
                        'Ik ben er klaar voor', r);
                });
                renderChips(p);
                sub.textContent = `${p.name} kiest een platform…`;
                // wire clicks
                let picked = null;
                await new Promise(r => {
                    const onClick = (e) => {
                        const t = e.target.closest('.vh-plat');
                        if (!t) return;
                        const idx = +t.dataset.idx;
                        platEls.forEach(x => { x.classList.remove('picked'); x.style.setProperty('--pcol', p.color.css); });
                        t.classList.add('picked');
                        picked = idx;
                        confirmBtn.disabled = false;
                    };
                    plats.addEventListener('click', onClick);
                    const confirmBtn = el('button', { className: 'btn-pill gold',
                        on: { click: () => { plats.removeEventListener('click', onClick); actions.innerHTML = ''; r(); } } }, 'Bevestig');
                    confirmBtn.disabled = true;
                    actions.innerHTML = ''; actions.append(confirmBtn);
                });
                picks.set(p, picked);
                // hide pick before next player
                platEls.forEach(x => x.classList.remove('picked'));
            }

            // reveal
            await new Promise(r => {
                showPassScreen('Iedereen heeft gekozen!', 'Tijd voor de waarheid — welk platform is veilig?',
                    '🌋 Onthul!', r);
            });
            sub.textContent = 'Onthullen…';
            renderChips();

            // place tokens on chosen platforms
            for (const [p, idx] of picks) {
                const platRect = platEls[idx].getBoundingClientRect();
                const stageRect = stage.getBoundingClientRect();
                const tk = el('div', { className: 'vh-token',
                    style: { '--pcol': p.color.css,
                        left: (platRect.left - stageRect.left + platRect.width/2) + 'px',
                        top:  (platRect.top  - stageRect.top  + platRect.height/2 - 28) + 'px' } },
                    p.name.charAt(0).toUpperCase());
                tk.dataset.player = p.colorIdx;
                tokens.append(tk);
            }
            await sleep(700);

            // reveal: safe platform glows, others crumble
            platEls[safeIdx].classList.add('safe');
            const losers = [];
            const survivors = [];
            for (const [p, idx] of picks) {
                if (idx === safeIdx) survivors.push(p);
                else losers.push(p);
            }
            for (let i = 0; i < platEls.length; i++) {
                if (i !== safeIdx) platEls[i].classList.add('crumble');
            }
            // fall tokens that picked wrong
            if (losers.length) {
                cloud.classList.add('show');
                await sleep(350);
                for (const tk of tokens.querySelectorAll('.vh-token')) {
                    const cIdx = +tk.dataset.player;
                    const p = players.find(x => x.colorIdx === cIdx);
                    if (losers.includes(p)) tk.classList.add('fall');
                }
                await sleep(400);
                cloud.classList.add('zap');
                await sleep(700);
            } else {
                await sleep(600);
            }

            // update alive list
            for (const p of losers) {
                if (!eliminated.includes(p)) eliminated.push(p);
            }
            alive = survivors;

            // show round result
            await new Promise(r => {
                const labelTxt = losers.length === 0
                    ? `Iedereen veilig! Door naar ronde ${round + 1}`
                    : (losers.length === alive.length + losers.length
                        ? `Alles fout! Iedereen drinkt ${drinks} 🍻`
                        : `${losers.map(p => p.name).join(', ')} valt → drinkt ${drinks} 🍻`);
                showPassScreen(losers.length === 0 ? '🎉 Allemaal goed!' : '⚡ KZZZAP!', labelTxt,
                    alive.length <= 1 ? '🏆 Eindstand' : '▶ Volgende ronde', r);
            });
        }

        function showFinal() {
            clear();
            renderChips();
            const winner = alive[0];
            const board = el('div', { style: { padding: '20px', display: 'flex',
                flexDirection: 'column', alignItems: 'center', gap: '16px' } });
            if (winner) {
                board.append(
                    el('div', { style: { fontSize: '60px' } }, '🏆'),
                    el('div', { style: { fontSize: '28px', fontWeight: '900', color: winner.color.css,
                        textShadow: '0 2px 0 #000, 0 0 20px ' + winner.color.css } }, `${winner.name} wint!`),
                    el('div', { style: { fontSize: '16px', opacity: 0.85, textAlign: 'center', maxWidth: '280px' } },
                        `${eliminated.map(p => p.name).join(', ')} drinkt elk ${drinks} 🍻`),
                );
            } else {
                board.append(
                    el('div', { style: { fontSize: '60px' } }, '🌋'),
                    el('div', { style: { fontSize: '24px', fontWeight: '900' } }, 'Geen winnaar!'),
                    el('div', { style: { fontSize: '16px', opacity: 0.85, textAlign: 'center', maxWidth: '280px' } },
                        `Iedereen viel. Iedereen drinkt ${drinks} 🍻 extra`),
                );
            }
            stage.append(board);
            const finishBtn = el('button', { className: 'btn-pill gold',
                on: { click: () => {
                    back.style.transition = 'opacity 0.3s ease';
                    back.style.opacity = '0';
                    setTimeout(() => { back.remove(); resolve(winner || null); }, 300);
                } } }, 'Verder');
            actions.innerHTML = ''; actions.append(finishBtn);
        }

        async function loop() {
            while (alive.length > 1) {
                await playRound();
                if (alive.length === 0) break;
            }
            showFinal();
        }

        const sleep = ms => new Promise(r => setTimeout(r, ms));
        loop();
    });
}

// ── Paddle Duel — 1v1 split-screen pong, first to 3 points wins ──
function playPaddleDuel({ playerA, playerB, targetScore = 3, drinks = 4 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'pd-back' });
        back.style.setProperty('--colA', playerA.color.css);
        back.style.setProperty('--colB', playerB.color.css);

        const wrap = el('div', { className: 'pd-canvas-wrap' });
        const canvas = el('canvas');
        wrap.append(canvas);

        const lblTop = el('div', { className: 'pd-half-label top', style: { '--col': playerA.color.css } }, playerA.name);
        const lblBot = el('div', { className: 'pd-half-label bot', style: { '--col': playerB.color.css } }, playerB.name);
        const score = el('div', { className: 'pd-score' });
        const scoreTop = el('div', { className: 'num top', style: { '--colA': playerA.color.css } }, '0');
        const scoreBot = el('div', { className: 'num bot', style: { '--colB': playerB.color.css } }, '0');
        score.append(scoreTop, el('div', { className: 'dash' }, '·'), scoreBot);
        wrap.append(lblTop, lblBot, score);

        const overlay = el('div', { className: 'pd-overlay show' });
        const oTitle = el('h2', {}, 'Paddle Duel');
        const oText = el('p', {}, `${playerA.name} (boven) vs ${playerB.name} (onder). Sleep in je helft om te bewegen. Eerste bij ${targetScore} wint.`);
        const oBtn = el('button', { className: 'btn-pill gold' }, '▶ Start');
        const oSkip = el('button', { className: 'btn-pill' }, 'Skip');
        overlay.append(oTitle, oText, oBtn, oSkip);
        wrap.append(overlay);

        back.append(wrap);
        ui.append(back);

        const ctx = canvas.getContext('2d');
        let W = 0, H = 0, dpr = window.devicePixelRatio || 1;
        function resize() {
            const r = wrap.getBoundingClientRect();
            W = r.width; H = r.height;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);

        // Game state
        const PAD_W = 0.22, PAD_H = 14, BALL_R = 8;
        // Distance from the top/bottom edge of the canvas to the paddles.
        // Larger value = paddle moves away from the iPhone notch / home indicator.
        const PAD_INSET = 70;
        const state = {
            padA: 0.5, padB: 0.5, // x positions 0..1
            ballX: 0, ballY: 0, vx: 0, vy: 0,
            scoreA: 0, scoreB: 0,
            running: false, finished: false,
        };

        function resetBall(dir) {
            state.ballX = W / 2;
            state.ballY = H / 2;
            const ang = (Math.random() - 0.5) * 0.6 + (dir > 0 ? Math.PI / 2 : -Math.PI / 2);
            const sp = Math.min(W, H) * 0.55 / 1000; // px per ms baseline
            // We use px/sec in update loop. sp = 0.55 * dim per sec
            const speed = Math.min(W, H) * 0.55;
            state.vx = Math.cos(ang) * speed;
            state.vy = Math.sin(ang) * speed;
        }

        // Touch handling: split screen in half.
        // IMPORTANT: attach to canvas (not wrap) so taps on the overlay's
        // Start/Skip buttons don't get e.preventDefault()'d before iOS
        // can synthesize their click event. (This was the iPhone Safari bug.)
        const padTouch = { A: null, B: null }; // touchId per side
        function getRect() { return canvas.getBoundingClientRect(); }
        canvas.addEventListener('touchstart', e => {
            if (!state.running) return; // overlay is up — let the button receive its click
            const r = getRect();
            for (const t of e.changedTouches) {
                const y = t.clientY - r.top;
                if (y < H / 2 && padTouch.A === null) {
                    padTouch.A = t.identifier;
                    state.padA = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (t.clientX - r.left) / W));
                } else if (y >= H / 2 && padTouch.B === null) {
                    padTouch.B = t.identifier;
                    state.padB = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (t.clientX - r.left) / W));
                }
            }
            e.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchmove', e => {
            if (!state.running) return;
            const r = getRect();
            for (const t of e.changedTouches) {
                const x = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (t.clientX - r.left) / W));
                if (t.identifier === padTouch.A) state.padA = x;
                else if (t.identifier === padTouch.B) state.padB = x;
            }
            e.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchend', e => {
            for (const t of e.changedTouches) {
                if (t.identifier === padTouch.A) padTouch.A = null;
                if (t.identifier === padTouch.B) padTouch.B = null;
            }
            e.preventDefault();
        }, { passive: false });
        // Mouse fallback (desktop test) — drag in respective half
        let mouseDown = false, mouseSide = null;
        canvas.addEventListener('mousedown', e => {
            if (!state.running) return;
            const r = getRect();
            const y = e.clientY - r.top;
            mouseSide = y < H / 2 ? 'A' : 'B';
            mouseDown = true;
            const x = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (e.clientX - r.left) / W));
            if (mouseSide === 'A') state.padA = x; else state.padB = x;
        });
        canvas.addEventListener('mousemove', e => {
            if (!mouseDown) return;
            const r = getRect();
            const x = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (e.clientX - r.left) / W));
            if (mouseSide === 'A') state.padA = x; else state.padB = x;
        });
        window.addEventListener('mouseup', () => { mouseDown = false; });

        let last = 0, rafId = null;
        function tick(t) {
            if (!last) last = t;
            const dt = Math.min(50, t - last) / 1000;
            last = t;
            if (state.running && !state.finished) update(dt);
            draw();
            rafId = requestAnimationFrame(tick);
        }
        function update(dt) {
            state.ballX += state.vx * dt;
            state.ballY += state.vy * dt;
            // wall bounce
            if (state.ballX < BALL_R) { state.ballX = BALL_R; state.vx = Math.abs(state.vx); }
            if (state.ballX > W - BALL_R) { state.ballX = W - BALL_R; state.vx = -Math.abs(state.vx); }

            const padAx = state.padA * W;
            const padBx = state.padB * W;
            const padHalfW = (PAD_W * W) / 2;
            const PAD_Y_TOP = PAD_INSET;
            const PAD_Y_BOT = H - PAD_INSET;

            // top paddle (A) — when ball moving up
            if (state.vy < 0 && state.ballY - BALL_R <= PAD_Y_TOP + PAD_H/2 && state.ballY > PAD_Y_TOP - PAD_H) {
                if (Math.abs(state.ballX - padAx) <= padHalfW + BALL_R) {
                    state.ballY = PAD_Y_TOP + PAD_H/2 + BALL_R;
                    state.vy = Math.abs(state.vy) * 1.06;
                    state.vx += (state.ballX - padAx) / padHalfW * 120;
                }
            }
            // bottom paddle (B)
            if (state.vy > 0 && state.ballY + BALL_R >= PAD_Y_BOT - PAD_H/2 && state.ballY < PAD_Y_BOT + PAD_H) {
                if (Math.abs(state.ballX - padBx) <= padHalfW + BALL_R) {
                    state.ballY = PAD_Y_BOT - PAD_H/2 - BALL_R;
                    state.vy = -Math.abs(state.vy) * 1.06;
                    state.vx += (state.ballX - padBx) / padHalfW * 120;
                }
            }

            // out of bounds
            if (state.ballY < -20) {
                state.scoreB++;
                scoreBot.textContent = state.scoreB;
                if (state.scoreB >= targetScore) endGame(playerB, playerA);
                else resetBall(1);
            } else if (state.ballY > H + 20) {
                state.scoreA++;
                scoreTop.textContent = state.scoreA;
                if (state.scoreA >= targetScore) endGame(playerA, playerB);
                else resetBall(-1);
            }
        }
        function draw() {
            ctx.clearRect(0, 0, W, H);
            // centre line
            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 10]);
            ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
            ctx.setLineDash([]);
            // paddles
            const padHalfW = (PAD_W * W) / 2;
            ctx.fillStyle = playerA.color.css;
            ctx.shadowColor = playerA.color.css; ctx.shadowBlur = 16;
            roundRect(state.padA * W - padHalfW, PAD_INSET - PAD_H/2, padHalfW * 2, PAD_H, 6); ctx.fill();
            ctx.fillStyle = playerB.color.css;
            ctx.shadowColor = playerB.color.css;
            roundRect(state.padB * W - padHalfW, H - PAD_INSET - PAD_H/2, padHalfW * 2, PAD_H, 6); ctx.fill();
            ctx.shadowBlur = 0;
            // ball
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff'; ctx.shadowBlur = 18;
            ctx.beginPath(); ctx.arc(state.ballX, state.ballY, BALL_R, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }
        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        function endGame(winner, loser) {
            state.finished = true;
            state.running = false;
            overlay.innerHTML = '';
            overlay.append(
                el('h2', { style: { color: winner.color.css } }, `🏆 ${winner.name} wint!`),
                el('p', {}, `${loser.name} drinkt ${drinks} 🍻`),
                el('button', { className: 'btn-pill gold', on: { click: () => finish(loser) } }, 'Verder'),
            );
            overlay.classList.add('show');
        }
        function finish(loser) {
            cancelAnimationFrame(rafId);
            window.removeEventListener('resize', resize);
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(loser); }, 300);
        }

        oBtn.addEventListener('click', () => {
            overlay.classList.remove('show');
            resetBall(Math.random() < 0.5 ? 1 : -1);
            state.running = true;
        });
        oSkip.addEventListener('click', () => finish(null));

        rafId = requestAnimationFrame(tick);
    });
}

// ── Krokodil — Crocodile Dentist: tap teeth, one is "zere tand", chomp = af ──
function playKrokodil({ playerA, playerB, drinks = 4, teethCount = 18 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'kroko-back' });

        const head = el('div', { className: 'kroko-head' });
        const title = el('h2', {}, '🐊 Krokodil met kiespijn');
        const turnBox = el('div', { className: 'kroko-turn' });
        const turnLbl = el('span', { className: 'lbl' }, 'Beurt:');
        const turnDot = el('span', { className: 'dot' });
        const turnName = el('span', { className: 'name' });
        turnBox.append(turnLbl, turnDot, turnName);
        head.append(title, turnBox);

        const stage = el('div', { className: 'kroko-stage' });
        const croc = el('div', { className: 'kroko-croc' });
        const nose = el('div', { className: 'kroko-nose' });
        nose.append(el('span'), el('span'));
        const mouth = el('div', { className: 'kroko-mouth' });
        const teethWrap = el('div', { className: 'kroko-teeth' });
        mouth.append(teethWrap);
        croc.append(nose, mouth);
        stage.append(croc);

        const biteIdx = Math.floor(Math.random() * teethCount);
        const teeth = [];

        // Place teeth around an ellipse inside the mouth.
        // rx/ry in percent of the mouth element. We place each tooth at
        // (50% + rx*cos(a), 50% + ry*sin(a)), with transform-origin at the
        // outer end so the tooth points inward.
        for (let i = 0; i < teethCount; i++) {
            const a = (i / teethCount) * Math.PI * 2 - Math.PI / 2; // top-first
            const rx = 44, ry = 47;
            const x = 50 + rx * Math.cos(a);
            const y = 50 + ry * Math.sin(a);
            const rotDeg = (a * 180 / Math.PI) + 90; // tooth tip points to centre
            const t = el('div', { className: 'tooth' });
            const pos = `translate(-50%, 0) rotate(${rotDeg}deg)`;
            t.style.left = x + '%';
            t.style.top  = y + '%';
            t.style.setProperty('--pos', pos);
            t.style.transform = pos;
            t.addEventListener('click', () => tapTooth(i));
            teethWrap.append(t);
            teeth.push(t);
        }

        let turn = 0; // 0 = A, 1 = B
        let locked = false;

        function curPlayer() { return turn === 0 ? playerA : playerB; }
        function updateTurn() {
            const p = curPlayer();
            turnBox.style.setProperty('--pcol', p.color.css);
            turnName.textContent = p.name;
            passBtn.disabled = false;
            passBtn.textContent = '➡️ Volgende speler';
        }

        function tapTooth(idx) {
            if (locked) return;
            const t = teeth[idx];
            if (t.classList.contains('pressed') || t.classList.contains('bite')) return;
            if (idx === biteIdx) {
                locked = true;
                t.classList.add('bite');
                setTimeout(() => {
                    mouth.classList.add('chomp');
                    croc.classList.add('chomping');
                }, 200);
                const loser = curPlayer();
                setTimeout(() => showResult(loser), 1300);
            } else {
                t.classList.add('pressed');
                // current player keeps going; they pass with the button
            }
        }

        const foot = el('div', { className: 'kroko-foot' });
        const passBtn = el('button', { className: 'btn-pill gold', type: 'button' }, '➡️ Volgende speler');
        passBtn.addEventListener('click', () => {
            if (locked) return;
            turn = 1 - turn;
            updateTurn();
        });
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        skipBtn.addEventListener('click', () => finish(null));
        foot.append(passBtn, skipBtn);

        const result = el('div', { className: 'kroko-result' });
        function showResult(loser) {
            result.append(
                el('div', { className: 'chomp' }, 'AU! 🐊'),
                el('div', { className: 'who', style: { color: loser.color.css } }, `${loser.name} drukte de zere tand!`),
                el('div', { className: 'drinks' }, `Drink ${drinks} 🍻`),
                el('button', { className: 'btn-pill gold', type: 'button',
                    style: { marginTop: '14px' },
                    on: { click: () => finish(loser) } }, 'Verder'),
            );
            result.classList.add('show');
        }
        stage.append(result);

        back.append(head, stage, foot);
        ui.append(back);
        updateTurn();

        function finish(loser) {
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(loser); }, 300);
        }
    });
}

/* ============================================================
   Universal Minigame Picker — the "Mystery Wheel"
   ============================================================
   Used by the universal 'mystery' tile (which replaces all the
   per-minigame tiles on the board, except Chwazi). Returns the
   chosen minigame id ('krokodil','paddle','tappy','volcano',
   'raft','roulette','blackjack','hoofdsteden') or null if skipped.
   ============================================================ */
const MYSTERY_OPTIONS = [
    { id: 'krokodil',    emoji: '🐊', label: 'Krokodil',     color: '#b87aff' },
    { id: 'paddle',      emoji: '🏓', label: 'Paddle Duel',  color: '#4af2ff' },
    { id: 'tappy',       emoji: '🐦', label: 'Tappy Bird',   color: '#ff7ad6' },
    { id: 'volcano',     emoji: '🌋', label: 'Volcano Hop',  color: '#3aff9e' },
    { id: 'raft',        emoji: '🏴‍☠️', label: 'Raft Battle',  color: '#ff8a4a' },
    { id: 'roulette',    emoji: '🎰', label: 'Roulette',     color: '#ff3a3a' },
    { id: 'blackjack',   emoji: '🃏', label: 'Blackjack',    color: '#2a8a3a' },
    { id: 'hoofdsteden', emoji: '🏙️', label: 'Hoofdsteden',  color: '#5aaaff' },
];

function playMysteryWheel({ options = MYSTERY_OPTIONS, title = '🎡 Mystery Wheel', subtitle = 'Welke minigame wordt het?' } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'mw-back' });
        const header = el('div', { className: 'mw-header' });
        header.append(
            el('div', { className: 'mw-title' }, title),
            el('div', { className: 'mw-sub' }, subtitle),
        );

        const stage = el('div', { className: 'mw-stage' });
        const wrap = el('div', { className: 'mw-wheel-wrap' });
        const pointer = el('div', { className: 'mw-pointer' });
        const wheel = el('div', { className: 'mw-wheel' });
        const hub = el('div', { className: 'mw-hub' }, '🌋');

        const N = options.length;
        const segAngle = 360 / N;

        // Build the wheel as a single radial-gradient background of conic segments.
        // Then place each label inside its own rotated container.
        const stops = options.map((o, i) => {
            const from = i * segAngle;
            const to = (i + 1) * segAngle;
            return `${o.color} ${from}deg ${to}deg`;
        }).join(', ');
        wheel.style.background = `conic-gradient(${stops})`;

        for (let i = 0; i < N; i++) {
            const seg = el('div', { className: 'mw-seg' });
            // rotate the seg container so its label sits in the centre of its slice
            seg.style.transform = `rotate(${i * segAngle + segAngle / 2}deg)`;
            const lab = el('div', { className: 'label' });
            lab.append(
                el('span', { className: 'emo' }, options[i].emoji),
                document.createTextNode(options[i].label),
            );
            seg.append(lab);
            wheel.append(seg);
        }

        wrap.append(pointer, wheel, hub);
        stage.append(wrap);

        const foot = el('div', { className: 'mw-foot' });
        const spinBtn = el('button', { className: 'btn-pill gold', type: 'button' }, '🎡 Draai!');
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        foot.append(spinBtn, skipBtn);

        const result = el('div', { className: 'mw-result' });
        stage.append(result);

        back.append(header, stage, foot);
        ui.append(back);

        let spun = false;

        spinBtn.addEventListener('click', () => {
            if (spun) return;
            spun = true;
            spinBtn.disabled = true;
            skipBtn.disabled = true;

            // pre-pick the winner
            const winIdx = Math.floor(Math.random() * N);
            // the pointer sits at 12 o'clock (0deg, top). A segment with centre
            // at angle A points to 12 o'clock when the wheel is rotated by -A.
            // We add a chunk of full spins for drama and a tiny ±jitter so it
            // doesn't always stop dead centre on the line.
            const winCentre = winIdx * segAngle + segAngle / 2;
            const jitter = (Math.random() - 0.5) * (segAngle * 0.6);
            const spins = 5;  // full rotations
            const finalRot = spins * 360 - winCentre + jitter;
            wheel.style.transform = `rotate(${finalRot}deg)`;

            // when the CSS transition is done, show the result
            wheel.addEventListener('transitionend', function done() {
                wheel.removeEventListener('transitionend', done);
                const opt = options[winIdx];
                result.style.setProperty('--glo', opt.color);
                clear(result);
                result.append(
                    el('div', { className: 'ann' }, 'En het wordt…'),
                    el('div', { className: 'emo-big' }, opt.emoji),
                    el('div', { className: 'pick' }, opt.label),
                    el('button', { className: 'btn-pill gold', type: 'button',
                        style: { marginTop: '10px' },
                        on: { click: () => finish(opt.id) } }, '▶️ Start!'),
                );
                result.classList.add('show');
            }, { once: true });
        });

        skipBtn.addEventListener('click', () => finish(null));

        function finish(id) {
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(id); }, 300);
        }
    });
}

/* ============================================================
   Minigame 1 — Vulkaan Roulette
   ============================================================
   Solo gambling minigame. Flow:
     1. Player rolls a virtual 1-6 die (the "bet").
     2. Player picks Red, Black or Gold.
     3. Wheel spins and lands on a colour.
     4. Win:  +diceValue tiles forward (Gold pays ×3) + drink 1 (lucky tax).
        Loss: −diceValue tiles back + drink slokken(diceValue).
   Returns: { won: bool, color: 'red'|'black'|'gold', pick: ..., bet: 1-6,
              steps: number (signed, ±), drinks: number }
   ============================================================ */
function playVulcanoRoulette({ player, drinks = null } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'vr-back' });
        if (player?.color?.css) back.style.setProperty('--pcol', player.color.css);

        // Header
        const header = el('div', { className: 'vr-header' });
        const title = el('div', { className: 'vr-title' }, '🎰 Vulkaan Roulette');
        const sub = el('div', { className: 'vr-sub' }, 'Gooi de inzet, kies je kleur, laat de Vulkaangod beslissen!');
        const who = el('div', { className: 'vr-who' });
        who.append(
            el('span', { className: 'dot' }),
            el('span', { className: 'nm' }, player?.name || 'Speler'),
        );
        header.append(title, sub, who);

        const stage = el('div', { className: 'vr-stage' });
        const foot = el('div', { className: 'vr-foot' });
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        skipBtn.addEventListener('click', () => finish(null));
        foot.append(skipBtn);
        back.append(header, stage, foot);
        ui.append(back);

        // ── Phase 1: roll the bet die ──
        const betbox = el('div', { className: 'vr-betbox' });
        const betLbl = el('div', { className: 'lbl' }, 'Tik om de inzet te gooien');
        const die = el('div', { className: 'vr-die' }, '?');
        const rollBtn = el('button', { className: 'btn-pill gold', type: 'button' }, '🎲 Gooi de inzet');
        betbox.append(betLbl, die, rollBtn);
        stage.append(betbox);

        let bet = 0;
        let rolling = false;
        rollBtn.addEventListener('click', () => {
            if (rolling || bet) return;
            rolling = true;
            rollBtn.disabled = true;
            die.classList.add('rolling');
            let ticks = 0;
            const fakeRoll = setInterval(() => {
                die.textContent = String(1 + Math.floor(Math.random() * 6));
                ticks++;
                if (ticks > 18) {
                    clearInterval(fakeRoll);
                    bet = 1 + Math.floor(Math.random() * 6);
                    die.classList.remove('rolling');
                    die.textContent = String(bet);
                    setTimeout(() => phasePick(), 600);
                }
            }, 70);
        });

        function phasePick() {
            // Phase 2 — pick a colour. Keep the die visible (it's the bet).
            clear(stage);
            const pickbox = el('div', { className: 'vr-betbox' });
            pickbox.append(
                el('div', { className: 'lbl' }, `Inzet: ${bet} • Kies je kleur`),
                die,
            );
            const picks = el('div', { className: 'vr-picks' });
            const mkPick = (cls, emoji, lbl, odd) => {
                const b = el('button', { className: `vr-pick ${cls}`, type: 'button' });
                b.append(
                    el('div', { className: 'e' }, emoji),
                    el('div', { className: 't' }, lbl),
                    el('div', { className: 'o' }, odd),
                );
                b.addEventListener('click', () => phaseSpin(cls));
                return b;
            };
            picks.append(
                mkPick('red',   '🔴', 'Rood',  '×1'),
                mkPick('black', '⚫', 'Zwart', '×1'),
                mkPick('gold',  '🟡', 'Goud',  '×3'),
            );
            pickbox.append(picks);
            stage.append(pickbox);
        }

        function phaseSpin(pickColor) {
            // Phase 3 — build the wheel and spin.
            // 16-segment wheel: 7 red, 7 black, 2 gold (≈ 12.5% gold chance, 43.75% red, 43.75% black)
            clear(stage);
            const wrap = el('div', { className: 'vr-wheel-wrap' });
            const pointer = el('div', { className: 'vr-wpointer' });
            const wheel = el('div', { className: 'vr-wheel' });
            const hub = el('div', { className: 'vr-hub' }, '🌋');

            // Pattern: r b r b r b r g r b r b r b r g (16 segments)
            const segs = [];
            const pattern = ['red','black','red','black','red','black','red','gold',
                             'red','black','red','black','red','black','red','gold'];
            const colorMap = { red: '#c81030', black: '#1a1a1a', gold: '#ffaa1a' };
            const N = pattern.length;
            const segAngle = 360 / N;
            const stops = pattern.map((c, i) =>
                `${colorMap[c]} ${i * segAngle}deg ${(i + 1) * segAngle}deg`).join(', ');
            wheel.style.background = `conic-gradient(${stops})`;

            for (let i = 0; i < N; i++) {
                const s = el('div', { className: 'vr-wseg' });
                s.style.transform = `rotate(${i * segAngle + segAngle / 2}deg)`;
                const lab = pattern[i] === 'gold' ? '★' : (pattern[i] === 'red' ? '◆' : '◇');
                s.append(el('div', { className: 'lab' }, lab));
                wheel.append(s);
                segs.push(pattern[i]);
            }
            wrap.append(pointer, wheel, hub);
            stage.append(wrap);

            // Pick a random segment.
            const winIdx = Math.floor(Math.random() * N);
            const winColor = segs[winIdx];
            const winCentre = winIdx * segAngle + segAngle / 2;
            const jitter = (Math.random() - 0.5) * (segAngle * 0.55);
            const finalRot = 6 * 360 - winCentre + jitter;
            // Apply rotation on next frame so the transition fires.
            requestAnimationFrame(() => {
                wheel.style.transform = `rotate(${finalRot}deg)`;
            });

            wheel.addEventListener('transitionend', function done() {
                wheel.removeEventListener('transitionend', done);
                phaseResult(pickColor, winColor);
            }, { once: true });
        }

        function phaseResult(pickColor, winColor) {
            const res = el('div', { className: 'vr-result show' });
            let won = false;
            let steps = 0;
            let drinkN = 0;
            let bigTxt = '';
            let subTxt = '';
            let glo = '#ff7a1f';

            if (pickColor === winColor) {
                won = true;
                if (winColor === 'gold') {
                    steps = bet * 3;
                    drinkN = drinks ?? slokken(1);
                    bigTxt = `🌟 GOUD! +${steps}`;
                    subTxt = `${player.name} schiet ${steps} tegels vooruit! Iedereen anders drinkt ${slokken(2)} 🍻`;
                    glo = '#ffd54a';
                } else {
                    steps = bet;
                    drinkN = drinks ?? slokken(1);
                    bigTxt = `🎉 WINST! +${steps}`;
                    subTxt = `${player.name} mag ${steps} tegels vooruit. Lucky tax: drink ${drinkN} 🍻`;
                    glo = winColor === 'red' ? '#ff3a3a' : '#ffd54a';
                }
            } else {
                won = false;
                steps = -bet;
                drinkN = drinks ?? slokken(bet);
                bigTxt = `💥 VERLIES! ${steps}`;
                subTxt = `${player.name} valt ${bet} tegels terug en drinkt ${drinkN} 🍻`;
                glo = '#ff3a3a';
            }

            res.style.setProperty('--glo', glo);
            res.append(
                el('div', { className: 'big' }, bigTxt),
                el('div', { className: 'sub' }, subTxt),
                el('div', { className: 'sub', style: { fontSize: '13px', opacity: '0.7' } },
                    `(Inzet ${bet} • Gekozen ${pickColor === 'red' ? 'Rood' : pickColor === 'black' ? 'Zwart' : 'Goud'} • Bal ${winColor === 'red' ? 'Rood' : winColor === 'black' ? 'Zwart' : 'Goud'})`),
                el('button', { className: 'btn-pill gold', type: 'button',
                    style: { marginTop: '12px' },
                    on: { click: () => finish({ won, color: winColor, pick: pickColor, bet, steps, drinks: drinkN }) } },
                    'Verder'),
            );
            back.append(res);
        }

        function finish(payload) {
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(payload); }, 300);
        }
    });
}

/* ============================================================
   Minigame 2 — Blackjack van de Goden
   ============================================================
   Player (current) vs. the Vulkaan God (computer dealer).
   Standard 21-rules: Aces count as 1 or 11 (auto-best),
   face cards = 10, dealer hits until 17 (stands on soft 17).
   Returns: { won: bool, tie: bool, playerVal, dealerVal, drinks }
   ============================================================ */
function playGodBlackjack({ player, drinks = null } = {}) {
    return new Promise(resolve => {
        // ── Card deck ──
        const SUITS = [
            { s: '♠', red: false }, { s: '♣', red: false },
            { s: '♥', red: true  }, { s: '♦', red: true  },
        ];
        const RANKS = [
            { r: 'A', v: 11 }, { r: '2', v: 2 }, { r: '3', v: 3 }, { r: '4', v: 4 },
            { r: '5', v: 5 }, { r: '6', v: 6 }, { r: '7', v: 7 }, { r: '8', v: 8 },
            { r: '9', v: 9 }, { r: '10', v: 10 }, { r: 'J', v: 10 },
            { r: 'Q', v: 10 }, { r: 'K', v: 10 },
        ];

        function buildDeck() {
            const d = [];
            for (const s of SUITS) for (const r of RANKS) d.push({ ...s, ...r });
            // Fisher-Yates shuffle
            for (let i = d.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [d[i], d[j]] = [d[j], d[i]];
            }
            return d;
        }

        function handValue(hand) {
            // Sum, then demote aces from 11→1 while bust.
            let total = hand.reduce((s, c) => s + c.v, 0);
            let aces = hand.filter(c => c.r === 'A').length;
            while (total > 21 && aces > 0) { total -= 10; aces--; }
            return total;
        }
        function isBlackjack(hand) {
            return hand.length === 2 && handValue(hand) === 21;
        }

        const deck = buildDeck();
        const draw = () => deck.pop();
        const playerHand = [draw(), draw()];
        const dealerHand = [draw(), draw()];
        let playerStood = false;
        let dealerRevealed = false;
        let gameOver = false;

        // ── UI ──
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'bj-back' });
        if (player?.color?.css) back.style.setProperty('--pcol', player.color.css);

        const header = el('div', { className: 'bj-header' });
        header.append(
            el('div', { className: 'bj-title' }, '🃏 Blackjack van de Goden'),
            el('div', { className: 'bj-sub' }, 'Zo dicht mogelijk bij 21, niet eroverheen'),
        );

        const stage = el('div', { className: 'bj-stage' });

        // Dealer (god) side — top
        const godSide = el('div', { className: 'bj-side god' });
        const godName = el('div', { className: 'bj-name god' }, '🌋 Vulkaan God');
        const godHand = el('div', { className: 'bj-hand' });
        const godVal = el('div', { className: 'bj-val' }, '—');
        godSide.append(godName, godHand, godVal);

        // Player side — bottom
        const youSide = el('div', { className: 'bj-side you' });
        const youName = el('div', { className: 'bj-name you' }, player?.name || 'Speler');
        const youHand = el('div', { className: 'bj-hand' });
        const youVal = el('div', { className: 'bj-val' }, '—');
        youSide.append(youName, youHand, youVal);

        stage.append(godSide, youSide);

        // Foot — hit/stand
        const foot = el('div', { className: 'bj-foot' });
        const hitBtn = el('button', { className: 'btn-pill gold', type: 'button' }, '🎴 Hit');
        const standBtn = el('button', { className: 'btn-pill red', type: 'button' }, '✋ Stand');
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        foot.append(hitBtn, standBtn, skipBtn);
        back.append(header, stage, foot);
        ui.append(back);

        // ── Render ──
        function renderCard(c, hidden = false) {
            const div = el('div', { className: 'bj-card' + (hidden ? ' back' : (c.red ? ' red' : '')) });
            if (!hidden) {
                div.append(
                    el('div', { className: 'tl' }, [
                        document.createTextNode(c.r),
                        el('span', { className: 's' }, c.s),
                    ]),
                    el('div', { className: 'ctr' }, c.s),
                );
            }
            return div;
        }
        function render() {
            // Dealer
            clear(godHand);
            dealerHand.forEach((c, i) => {
                const hidden = !dealerRevealed && i === 1;
                godHand.append(renderCard(c, hidden));
            });
            const dv = dealerRevealed ? handValue(dealerHand) : dealerHand[0].v;
            godVal.textContent = dealerRevealed ? String(dv) : `${dv} + ?`;
            godVal.className = 'bj-val';
            if (dealerRevealed && dv > 21) godVal.classList.add('bust');
            if (dealerRevealed && isBlackjack(dealerHand)) godVal.classList.add('bj');

            // Player
            clear(youHand);
            playerHand.forEach(c => youHand.append(renderCard(c)));
            const pv = handValue(playerHand);
            youVal.textContent = String(pv);
            youVal.className = 'bj-val';
            if (pv > 21) youVal.classList.add('bust');
            if (isBlackjack(playerHand)) youVal.classList.add('bj');
        }
        render();

        // ── Game flow ──
        function checkBust() {
            if (handValue(playerHand) > 21) {
                playerStood = true;
                hitBtn.disabled = true; standBtn.disabled = true;
                setTimeout(() => endGame(), 600);
                return true;
            }
            return false;
        }

        hitBtn.addEventListener('click', () => {
            if (gameOver || playerStood) return;
            playerHand.push(draw());
            render();
            if (handValue(playerHand) >= 21) {
                if (!checkBust()) {
                    playerStood = true;
                    hitBtn.disabled = true; standBtn.disabled = true;
                    setTimeout(() => endGame(), 500);
                }
            }
        });
        standBtn.addEventListener('click', () => {
            if (gameOver || playerStood) return;
            playerStood = true;
            hitBtn.disabled = true; standBtn.disabled = true;
            endGame();
        });
        skipBtn.addEventListener('click', () => finish(null));

        // Edge case: opening blackjack
        if (isBlackjack(playerHand)) {
            playerStood = true;
            hitBtn.disabled = true; standBtn.disabled = true;
            setTimeout(() => endGame(), 700);
        }

        function endGame() {
            if (gameOver) return;
            // Reveal dealer's hole card with a beat
            dealerRevealed = true;
            render();
            // Dealer hits until ≥ 17 (stand on soft 17)
            function dealerStep() {
                const dv = handValue(dealerHand);
                if (dv < 17 && handValue(playerHand) <= 21) {
                    setTimeout(() => {
                        dealerHand.push(draw());
                        render();
                        dealerStep();
                    }, 500);
                } else {
                    setTimeout(() => decide(), 600);
                }
            }
            dealerStep();
        }

        function decide() {
            gameOver = true;
            const pv = handValue(playerHand);
            const dv = handValue(dealerHand);
            let outcome, bigTxt, subTxt, glo;

            // Player bust → loss
            if (pv > 21) {
                outcome = 'lose';
                bigTxt = '💥 BUST!';
                subTxt = `${player.name} schoot voorbij 21 (${pv}). De goden lachen.`;
                glo = '#ff3a3a';
            }
            // Dealer bust → win
            else if (dv > 21) {
                outcome = 'win';
                bigTxt = '🔥 DE GOD BUSTE!';
                subTxt = `Vulkaan God ging te ver (${dv}). ${player.name} wint!`;
                glo = '#ffd54a';
            }
            // Both 21 → could be tie or one blackjack
            else if (pv === dv) {
                outcome = 'tie';
                bigTxt = '🤝 GELIJK';
                subTxt = `Beiden ${pv}. De Vulkaangod schenkt vrede — niets gebeurt.`;
                glo = '#9fa3aa';
            }
            else if (pv > dv) {
                outcome = 'win';
                bigTxt = '🏆 WINST!';
                subTxt = `${pv} > ${dv}. ${player.name} verslaat de Vulkaangod!`;
                glo = '#ffd54a';
            }
            else {
                outcome = 'lose';
                bigTxt = '⚡ VERLIES';
                subTxt = `${pv} < ${dv}. De Vulkaangod wint.`;
                glo = '#ff3a3a';
            }

            const drinkN = drinks ?? slokken(4);
            const res = el('div', { className: 'bj-result show' });
            res.style.setProperty('--glo', glo);
            res.append(
                el('div', { className: 'big' }, bigTxt),
                el('div', { className: 'sub' }, subTxt),
                el('div', { className: 'sub', style: { fontSize: '14px', opacity: '0.78' } },
                    outcome === 'tie'
                        ? 'Geen straf, geen beloning.'
                        : (outcome === 'win'
                            ? `Kies straks een slachtoffer: ${drinkN} slokken + ${knockBy(3)} tegels achteruit.`
                            : `${player.name} drinkt zelf ${drinkN} 🍻 en valt ${knockBy(3)} tegels terug.`)),
                el('button', { className: 'btn-pill gold', type: 'button',
