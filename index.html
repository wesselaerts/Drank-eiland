                const row = el('div', { className: 'row' + (s.score === top ? ' win' : ''),
                    style: { '--pcol': s.player.color.css } });
                row.append(
                    el('div', { className: 'dot' }),
                    el('div', { className: 'nm' }, `${i+1}. ${s.player.name}`),
                    el('div', { className: 'sc' }, String(s.score)),
                );
                board.append(row);
            });
            overlay.append(board);
            const ldsc = losers.length === 0 ? 'Iedereen gelijk — proost!' :
                `${losers.map(l => l.player.name).join(', ')} drinkt elk ${drinks} 🍻`;
            overlay.append(el('p', {}, ldsc));
            overlay.append(el('button', { className: 'btn-pill gold',
                on: { click: () => finish(sorted) } }, 'Verder'));
            overlay.classList.add('show');
        }

        function finish(sorted) {
            cancelAnimationFrame(rafId);
            window.removeEventListener('resize', resize);
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(sorted); }, 300);
        }

        rafId = requestAnimationFrame(tick);
        showStartFor(players[curIdx]);
    });
}


/* ════════════════════════════════════════════════════════════════════
   playTappyBird — 3D in-scene Tappy Bird (PHASED, per-speler)
   ════════════════════════════════════════════════════════════════════
   Volledig in de Three.js bord-game scene. Een vogel in de kleur van
   de huidige speler vliegt door de lucht voor de vulkaan, langs paren
   van houten pilaren met groene caps. Elke speler krijgt één run;
   hoogste score wint, rest drinkt.

     INTRO          camera glijdt naar start-positie
     READY          "Geef telefoon aan [naam] — tap om te starten"
     FLYING         vogel vliegt, tap = flap, zwaartekracht = val
                    pilaren spawnen vooruit, score telt per pilaar
     DEAD           vogel valt met spin het water in
     RESULT         korte pauze, dan volgende speler of eindscherm
     GAMEOVER       ranking + drink-opdracht
   ════════════════════════════════════════════════════════════════════ */
function playTappyBird({ players = G.players, drinks = 2 } = {}) {
    return new Promise(resolveOuter => {
        // ════════════════════════════════════════════════════════
        //  A. SETUP
        // ════════════════════════════════════════════════════════
        const uiRoot = document.getElementById('game-ui');
        const hiddenChrome = hideMinigameChrome();
        const savedCam = {
            pos: camera.position.clone(),
            fov: camera.fov,
            target: controls.target.clone(),
            autoRotate: controls.autoRotate,
            enabled: controls.enabled,
        };
        controls.autoRotate = false;
        controls.enabled = false;
        camera.fov = 65;
        camera.updateProjectionMatrix();

        // ════════════════════════════════════════════════════════
        //  B. PHYSICS CONSTANTS
        // ════════════════════════════════════════════════════════
        const GRAVITY  = -24;
        const FLAP     = 9.2;
        // SPEED en GAP_H rampen geleidelijk op zodat het begin
        // makkelijker is en de moeilijkheid pas later toeneemt.
        const SPEED_MIN = 5.0;       // was 7.5 — rustigere start
        const SPEED_MAX = 9.5;       // einde — uitdagend
        const GAP_H_START = 5.2;     // was 4.2 — ruimer begin
        const GAP_H_END   = 3.7;     // einde — krapper
        const RAMP_SEC    = 30;      // seconden tot max moeilijkheid
        const PIPE_R   = 0.85;
        const PIPE_GAP = 9.0;
        const SKY_Y    = 16;
        const WATER_Y  = 1.0;
        const FLY_Z    = 28;

        // ════════════════════════════════════════════════════════
        //  C. VOGEL BOUWEN
        // ════════════════════════════════════════════════════════
        function makeBird(colorHex, avatar) {
            const grp = new THREE.Group();
            const colMat = new THREE.MeshToonMaterial({
                color: colorHex, gradientMap: toon,
                emissive: colorHex, emissiveIntensity: 0.25 });
            const beakMat = new THREE.MeshToonMaterial({
                color: 0xff9800, gradientMap: toon,
                emissive: 0xff6f00, emissiveIntensity: 0.15 });
            const body = new THREE.Mesh(
                new THREE.SphereGeometry(0.55, 18, 14), colMat);
            body.castShadow = true;
            grp.add(body);
            const belly = new THREE.Mesh(
                new THREE.SphereGeometry(0.42, 14, 10),
                new THREE.MeshToonMaterial({ color: 0xfff8e1, gradientMap: toon }));
            belly.position.set(0.05, -0.15, 0);
            belly.scale.set(0.85, 0.95, 1.0);
            grp.add(belly);
            const beak = new THREE.Mesh(
                new THREE.ConeGeometry(0.18, 0.38, 8), beakMat);
            beak.position.set(0.55, 0.02, 0);
            beak.rotation.z = -Math.PI / 2;
            beak.castShadow = true;
            grp.add(beak);
            for (const zSide of [0.32, -0.32]) {
                const eye = new THREE.Mesh(
                    new THREE.SphereGeometry(0.16, 10, 8),
                    new THREE.MeshBasicMaterial({ color: 0xffffff }));
                eye.position.set(0.26, 0.20, zSide);
                grp.add(eye);
                const pupil = new THREE.Mesh(
                    new THREE.SphereGeometry(0.085, 8, 6),
                    new THREE.MeshBasicMaterial({ color: 0x000000 }));
                pupil.position.set(0.38, 0.22, zSide * 1.05);
                grp.add(pupil);
            }
            const wing = new THREE.Mesh(
                new THREE.BoxGeometry(0.50, 0.10, 0.40), colMat);
            wing.position.set(-0.05, 0.05, 0);
            wing.castShadow = true;
            grp.add(wing);
            grp.userData.wing = wing;

            // ── Avatar haar + accessoire op de vogel ──
            // build3DAvatarHead bouwt een hele kop (sphere+features),
            // maar voor de vogel willen we ALLEEN het haar en de
            // accessoire — die zitten visueel op de bovenkant. We
            // pakken die parts uit een tijdelijke head-build en plakken
            // ze direct boven op de body sphere.
            // Trucje: addHair3D/addAccessory3D verwachten een
            // 'parent' group en de head-radius. We voeden ze met de
            // bird-group zelf en de bird-body radius (0.55). Door een
            // sub-group ertussen te stoppen kunnen we de positie en
            // schaal gemakkelijk fine-tunen.
            if (avatar) {
                const headBits = new THREE.Group();
                const HEAD_R = 0.55;     // matches body sphere radius
                if (avatar.hair && avatar.hair.style !== 'bald') {
                    addHair3D(headBits, avatar.hair, HEAD_R);
                }
                if (avatar.accessory && avatar.accessory !== 'none') {
                    addAccessory3D(headBits, avatar.accessory, HEAD_R);
                }
                // Verschuif het head-bits geheel een tikje omhoog en
                // naar achter, zodat haar/accessoire mooi op de
                // bovenkant van het lichaam zit en niet door de snavel
                // steekt.
                headBits.position.set(-0.05, 0.15, 0);
                headBits.scale.set(0.95, 0.95, 0.95);
                grp.add(headBits);
            }
            return grp;
        }

        // ════════════════════════════════════════════════════════
        //  D. PILAAR-PAAR BOUWEN
        // ════════════════════════════════════════════════════════
        function makePipePair(gapCenterY, gapH) {
            const grp = new THREE.Group();
            const trunkMat = new THREE.MeshToonMaterial({
                color: 0x6d4c41, gradientMap: toon,
                emissive: 0x3e2723, emissiveIntensity: 0.12 });
            const capMat = new THREE.MeshToonMaterial({
                color: 0x4caf50, gradientMap: toon,
                emissive: 0x2e7d32, emissiveIntensity: 0.18 });
            const gapTop = gapCenterY + gapH / 2;
            const gapBot = gapCenterY - gapH / 2;
            // Onder-pilaar
            const botH = Math.max(0.4, gapBot - WATER_Y);
            const bot = new THREE.Mesh(
                new THREE.CylinderGeometry(PIPE_R, PIPE_R, botH, 14), trunkMat);
            bot.position.y = WATER_Y + botH / 2;
            bot.castShadow = bot.receiveShadow = true;
            grp.add(bot);
            // Onder-cap
            const botCap = new THREE.Mesh(
                new THREE.CylinderGeometry(PIPE_R + 0.18, PIPE_R + 0.18, 0.35, 14), capMat);
            botCap.position.y = gapBot - 0.18;
            botCap.castShadow = true;
            grp.add(botCap);
            // Boven-pilaar
            const topH = Math.max(0.4, SKY_Y - gapTop);
            const top = new THREE.Mesh(
                new THREE.CylinderGeometry(PIPE_R, PIPE_R, topH, 14), trunkMat);
            top.position.y = gapTop + topH / 2;
            top.castShadow = top.receiveShadow = true;
            grp.add(top);
            // Boven-cap
            const topCap = new THREE.Mesh(
                new THREE.CylinderGeometry(PIPE_R + 0.18, PIPE_R + 0.18, 0.35, 14), capMat);
            topCap.position.y = gapTop + 0.18;
            topCap.castShadow = true;
            grp.add(topCap);
            grp.userData.gapCenterY = gapCenterY;
            grp.userData.gapTop = gapTop;
            grp.userData.gapBot = gapBot;
            grp.userData.passed = false;
            return grp;
        }

        // ════════════════════════════════════════════════════════
        //  E. STATE
        // ════════════════════════════════════════════════════════
        let curIdx = 0;
        const scores = [];
        let bird = null;
        const pipes = [];
        let birdX = 0, birdY = 0;
        let vy = 0;
        let alive = false;
        let score = 0;
        let phase = 'intro';
        let phaseT = 0;
        let pipeSpawnTimer = 0;
        let runTime = 0;             // seconden sinds deze speler startte
        const PIPE_SPAWN_X = 14;

        // ════════════════════════════════════════════════════════
        //  F. CAMERA — VAST zij-aanzicht, vogel altijd in het midden
        // ════════════════════════════════════════════════════════
        // De vogel beweegt zelf niet (birdX blijft 0). In plaats daarvan
        // bewegen de pilaren naar de vogel toe. De camera kijkt vanaf
        // dezelfde plek (perpendicular zij-aanzicht) — dat geeft een
        // klassieke Flappy Bird feel met de vogel pal in het midden.
        const CAM_FIXED = {
            pos: new THREE.Vector3(0, 7.5, FLY_Z + 22),
            tgt: new THREE.Vector3(0, 8.0, FLY_Z),
        };
        const camFrom = { pos: camera.position.clone(), tgt: controls.target.clone() };
        const camToObj = { pos: new THREE.Vector3(), tgt: new THREE.Vector3() };
        let camLerpT = 0;
        let camLerpDur = 0.8;
        function setCamTo(pos, tgt, dur) {
            camFrom.pos.copy(camera.position);
            camFrom.tgt.copy(controls.target);
            camToObj.pos.copy(pos);
            camToObj.tgt.copy(tgt);
            camLerpDur = dur;
            camLerpT = 0;
        }

        // ════════════════════════════════════════════════════════
        //  G. HUD
        // ════════════════════════════════════════════════════════
        const tbBack = el('div', { className: 'rb3-back' });
        const tbHit  = el('div', { className: 'rb3-hit' });
        tbBack.append(tbHit);
        const topBar = el('div', { className: 'rb3-top' });
        const titleChip = el('div', { className: 'rb3-wind' }, '🐤 Tappy Bird');
        const playerChip = el('div', { className: 'rb3-chip' });
        const playerDot = el('div', { className: 'dot' });
        const playerName = el('div', {}, '');
        playerChip.append(playerDot, playerName);
        const scoreChip = el('div', { className: 'rb3-chip',
            style: { '--pcol': '#ffd54a' } });
        const scoreLbl = el('div', {}, 'Score');
        const scoreVal = el('div', {
            style: { fontSize: '18px', marginLeft: '6px' } }, '0');
        scoreChip.append(scoreLbl, scoreVal);
        const rowTop = el('div', {
            style: { display: 'flex', gap: '10px', alignItems: 'center' }
        }, [playerChip, titleChip, scoreChip]);
        topBar.append(rowTop);
        const banner = el('div', { className: 'rb3-banner',
            style: { display: 'none' } });
        const botBar = el('div', { className: 'rb3-bot' });
        const tip = el('div', { className: 'rb3-tip' }, '');
        botBar.append(tip);
        const toast = el('div', { className: 'rb3-toast',
            style: { display: 'none' } });
        const skipBtn = makeMinigameSkip({
            onSkip: () => finish(null),
            winners: players.map(p => ({
                label: p.name, color: p.color.css,
                onPick: () => {
                    const sorted = players.map(pp => ({
                        player: pp, score: pp === p ? 999 : 0 }));
                    finish(sorted);
                },
            })),
        });
        skipBtn.classList.add('rb3-skip');
        const flash = el('div', { className: 'rb3-flash' });
        tbBack.append(topBar, banner, botBar, toast, skipBtn, flash);
        uiRoot.append(tbBack);

        function updatePlayerChip() {
            const p = players[curIdx];
            playerChip.style.setProperty('--pcol', p.color.css);
            playerDot.style.background = p.color.css;
            playerDot.style.boxShadow = '0 0 8px ' + p.color.css;
            playerName.textContent = p.name;
        }
        function setBanner(text, color) {
            if (!text) { banner.style.display = 'none'; return; }
            banner.style.display = 'block';
            banner.style.setProperty('--pcol', color || '#ffd54a');
            banner.innerHTML = text;
        }
        function setTip(text) { tip.textContent = text || ''; }
        function showToast(html, ms = 1400, color = '#ffd54a') {
            toast.innerHTML = html;
            toast.style.setProperty('--pcol', color);
            toast.style.display = 'block';
            clearTimeout(toast._t);
            toast._t = setTimeout(() => toast.style.display = 'none', ms);
        }

        // ════════════════════════════════════════════════════════
        //  H. RUN-LIFECYCLE
        // ════════════════════════════════════════════════════════
        function disposeMesh(m) {
            if (!m) return;
            m.geometry && m.geometry.dispose && m.geometry.dispose();
            if (m.material) {
                const ms = Array.isArray(m.material) ? m.material : [m.material];
                for (const mat of ms) mat.dispose && mat.dispose();
            }
        }
        function disposeGroup(g) { g.traverse(o => disposeMesh(o)); }

        function startRunFor(playerIdx) {
            curIdx = playerIdx;
            const p = players[curIdx];
            updatePlayerChip();
            scoreVal.textContent = '0';
            score = 0;
            if (bird) { scene.remove(bird); disposeGroup(bird); bird = null; }
            for (const pp of pipes) { scene.remove(pp); disposeGroup(pp); }
            pipes.length = 0;
            pipeSpawnTimer = 0;            // direct eerste pilaar
            runTime = 0;                   // ramp opnieuw vanaf nul
            bird = makeBird(p.color.hex, p.avatar);
            // Vogel staat altijd op (0, ?, FLY_Z); pilaren komen op
            // de vogel af door zelf naar -X te bewegen.
            birdX = 0;
            birdY = 8;
            vy = 0;
            bird.position.set(birdX, birdY, FLY_Z);
            scene.add(bird);
            setCamTo(CAM_FIXED.pos, CAM_FIXED.tgt, 0.7);
            phase = 'ready';
            phaseT = 0;
            alive = true;
            setBanner(`<small>BEURT</small><br>${p.name}`, p.color.css);
            setTip('Tik op het scherm om te vliegen — ontwijk de pilaren');
        }
        function flap() {
            if (!alive) return;
            if (phase === 'ready') {
                phase = 'flying';
                phaseT = 0;
                setBanner('', '');
                setTip('');
            }
            if (phase === 'flying') {
                vy = FLAP;
                if (bird && bird.userData.wing) {
                    bird.userData.wing.userData.flapT = 0;
                }
            }
        }
        function die() {
            if (!alive) return;
            alive = false;
            phase = 'dead';
            phaseT = 0;
            flash.classList.add('show');
            setTimeout(() => flash.classList.remove('show'), 300);
            showToast(`Score: ${score}`, 1600, players[curIdx].color.css);
            scores.push({ player: players[curIdx], score });
            setTimeout(() => {
                if (curIdx < players.length - 1) {
                    startRunFor(curIdx + 1);
                } else {
                    showFinal();
                }
            }, 1800);
        }
        function showFinal() {
            phase = 'gameover';
            const sorted = [...scores].sort((a, b) => b.score - a.score);
            const topScore = sorted[0].score;
            const losers = sorted.filter(s => s.score < topScore);
            const winnerName = sorted[0].player.name;
            setBanner(`🏆 ${winnerName} wint!`, sorted[0].player.color.css);
            const ko = el('div', { className: 'rb3-ko',
                style: { '--pcol': sorted[0].player.color.css } });
            ko.append(el('h2', {}, '🐤 Eindstand'));
            const list = el('div', {
                style: { display: 'flex', flexDirection: 'column', gap: '8px',
                    margin: '12px 0', width: '100%', maxWidth: '320px' } });
            sorted.forEach((s, i) => {
                const row = el('div', {
                    style: { display: 'flex', alignItems: 'center', gap: '10px',
                        padding: '8px 12px', borderRadius: '12px',
                        background: 'rgba(255,255,255,0.10)',
                        border: '2px solid ' + s.player.color.css,
                        opacity: s.score === topScore ? '1' : '0.7' } });
                row.append(
                    el('div', { style: { width: '12px', height: '12px',
                        borderRadius: '50%', background: s.player.color.css } }),
                    el('div', { style: { flex: '1', fontWeight: '800' } },
                        `${i+1}. ${s.player.name}`),
                    el('div', { style: { fontSize: '20px', fontWeight: '900',
                        color: s.player.color.css } }, String(s.score)),
                );
                list.append(row);
            });
            ko.append(list);
            const drinkMsg = losers.length === 0 ? 'Iedereen gelijk — proost!' :
                `${losers.map(l => l.player.name).join(', ')} drinkt elk ${drinks} 🍻`;
            ko.append(el('p', {}, drinkMsg));
            ko.append(el('button', { className: 'btn-pill', type: 'button',
                on: { click: () => finish(sorted) } }, 'Verder'));
            tbBack.append(ko);
            setTimeout(() => finish(sorted), 8000);
        }

        // ════════════════════════════════════════════════════════
        //  I. INPUT
        // ════════════════════════════════════════════════════════
        tbHit.addEventListener('touchstart', e => {
            e.preventDefault();
            flap();
        }, { passive: false });
        tbHit.addEventListener('click', () => flap());

        // ════════════════════════════════════════════════════════
        //  J. COLLISION
        // ════════════════════════════════════════════════════════
        function checkCollision() {
            if (birdY <= WATER_Y || birdY >= SKY_Y) return true;
            const BIRD_R = 0.55;
            for (const p of pipes) {
                const dx = birdX - p.position.x;
                if (Math.abs(dx) < PIPE_R + BIRD_R) {
                    if (birdY > p.userData.gapTop - BIRD_R ||
                        birdY < p.userData.gapBot + BIRD_R) {
                        return true;
                    }
                }
            }
            return false;
        }

        // ════════════════════════════════════════════════════════
        //  K. ANIMATIE-HOOK
        // ════════════════════════════════════════════════════════
        const PREV_HOOK = window.__deGameHook;
        let lastT = 0;
        window.__deGameHook = (time) => {
            const dt = lastT ? Math.min(0.05, time - lastT) : 0;
            lastT = time;
            phaseT += dt;
            // Camera lerp (alleen tussen runs)
            if (camLerpT < 1) {
                camLerpT = Math.min(1, camLerpT + dt / camLerpDur);
                const k = camLerpT;
                const e = k < 0.5 ? 4*k*k*k : 1 - Math.pow(-2*k+2, 3) / 2;
                camera.position.lerpVectors(camFrom.pos, camToObj.pos, e);
                controls.target.lerpVectors(camFrom.tgt, camToObj.tgt, e);
                camera.lookAt(controls.target);
            }
            // Vogel-fysica — alleen verticaal (vogel blijft op x=0)
            if (phase === 'flying' && alive && bird) {
                runTime += dt;
                // Difficulty ramp: 0 = makkelijk begin, 1 = max moeilijk.
                // Smoothstep voor zachte overgang.
                const k = Math.min(1, runTime / RAMP_SEC);
                const rampT = k * k * (3 - 2 * k);      // smoothstep
                const curSpeed = SPEED_MIN + (SPEED_MAX - SPEED_MIN) * rampT;
                const curGapH  = GAP_H_START + (GAP_H_END - GAP_H_START) * rampT;
                const spawnInt = PIPE_GAP / curSpeed;
                vy += GRAVITY * dt;
                birdY += vy * dt;
                bird.position.y = birdY;
                bird.rotation.z = Math.max(-1.0, Math.min(0.5, vy * 0.10));
                // Wing-flap animatie
                if (bird.userData.wing) {
                    const w = bird.userData.wing;
                    if (w.userData.flapT == null) w.userData.flapT = 0.5;
                    w.userData.flapT = Math.min(0.5, w.userData.flapT + dt);
                    w.rotation.x = -Math.sin(w.userData.flapT * 18) * 0.8;
                }
                // Pilaren scrollen naar links (richting de vogel)
                for (const p of pipes) {
                    p.position.x -= curSpeed * dt;
                }
                // Spawn nieuwe pilaar elke spawnInt seconden
                pipeSpawnTimer += dt;
                if (pipeSpawnTimer >= spawnInt) {
                    pipeSpawnTimer -= spawnInt;
                    const gapY = 5 + Math.random() * 8;
                    const pair = makePipePair(gapY, curGapH);
                    pair.position.set(PIPE_SPAWN_X, 0, FLY_Z);
                    scene.add(pair);
                    pipes.push(pair);
                }
                // Score: pilaar die voorbij vogel komt
                for (const p of pipes) {
                    if (!p.userData.passed && p.position.x < birdX - PIPE_R) {
                        p.userData.passed = true;
                        score++;
                        scoreVal.textContent = String(score);
                    }
                }
                // Despawn pilaren ver achter de vogel
                for (let i = pipes.length - 1; i >= 0; i--) {
                    if (pipes[i].position.x < birdX - 12) {
                        scene.remove(pipes[i]); disposeGroup(pipes[i]);
                        pipes.splice(i, 1);
                    }
                }
                if (checkCollision()) die();
            }
            // Dood: vogel valt
            if (phase === 'dead' && bird) {
                vy += GRAVITY * dt * 0.7;
                birdY = Math.max(WATER_Y - 2, birdY + vy * dt);
                bird.position.y = birdY;
                bird.rotation.z += dt * 5;
            }
        };

        // ════════════════════════════════════════════════════════
        //  L. CLEANUP
        // ════════════════════════════════════════════════════════
        async function finish(sorted) {
            if (phase === 'done') return;
            phase = 'done';
            window.__deGameHook = PREV_HOOK;
            if (bird) { scene.remove(bird); disposeGroup(bird); bird = null; }
            for (const p of pipes) { scene.remove(p); disposeGroup(p); }
            pipes.length = 0;
            camera.fov = savedCam.fov;
            camera.position.copy(savedCam.pos);
            camera.updateProjectionMatrix();
            controls.target.copy(savedCam.target);
            controls.autoRotate = savedCam.autoRotate;
            controls.enabled = savedCam.enabled;
            camera.lookAt(controls.target);
            tbBack.remove();
            restoreMinigameChrome(hiddenChrome);
            resolveOuter(sorted || null);
        }

        // Start eerste speler
        startRunFor(0);
    });
}


// ── Volcano Hop — secretly pick a platform; wrong = lightning, last standing wins ──
function playVolcanoHop({ players = G.players, drinks = 2 } = {}) {
    return new Promise(resolveOuter => {
        // ════════════════════════════════════════════════════════
        //  VOLCANO HOP 3D — Lava Roulette boven de vulkaan
        // ════════════════════════════════════════════════════════
        //   Spelers kiezen om beurten stiekem een zwevend lava-
        //   platform HOOG boven de vulkaan-krater. Bij de onthulling
        //   stort één random platform de lava in — wie daarop staat
        //   drinkt en is uit. Laatste overlevende wint.
        // ════════════════════════════════════════════════════════

        // SETUP
        const hiddenChrome = hideMinigameChrome();
        const savedCam = {
            pos: camera.position.clone(),
            fov: camera.fov,
            target: controls.target.clone(),
            autoRotate: controls.autoRotate,
            enabled: controls.enabled,
        };
        controls.autoRotate = false;
        controls.enabled = false;
        camera.fov = 55;
        camera.updateProjectionMatrix();

        // Camera HOOG boven de vulkaan — platforms zweven nu rond
        // y=20 (ruim boven krater-top y=12.4)
        const VOLCANO_CAM = {
            pos: new THREE.Vector3(10, 30, 10),
            tgt: new THREE.Vector3(-0.2, 18, 0.2),
        };
        const camFrom = { pos: camera.position.clone(),
                          tgt: controls.target.clone() };
        let camLerpT = 0;
        const camLerpDur = 1.0;
        let camShakeT = 0;

        // 3D PLATFORMS
        const platformsGroup = new THREE.Group();
        scene.add(platformsGroup);
        const platforms3D = [];
        const tokens3D = [];

        const VOL_X = -0.2, VOL_Z = 0.2;
        const RING_R = 5.5;        // grotere ring voor proportie op hoogte
        const PLAT_Y = 20;         // platforms hoog boven krater (12.4)

        function makeNumberSprite(n) {
            const cvs = document.createElement('canvas');
            cvs.width = 128; cvs.height = 128;
            const ctx = cvs.getContext('2d');
            ctx.fillStyle = '#ffd54a';
            ctx.font = 'bold 90px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 12;
            ctx.fillText(String(n), 64, 64);
            const tex = new THREE.CanvasTexture(cvs);
            const mat = new THREE.SpriteMaterial({
                map: tex, transparent: true,
                depthTest: false, depthWrite: false });
            const sp = new THREE.Sprite(mat);
            sp.scale.set(1.1, 1.1, 1.1);
            return sp;
        }

        function buildPlatforms(count) {
            for (const p of platforms3D) {
                platformsGroup.remove(p);
                p.traverse(c => {
                    if (c.geometry) c.geometry.dispose();
                    if (c.material) c.material.dispose();
                });
            }
            platforms3D.length = 0;

            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2 - Math.PI / 2;
                const x = VOL_X + Math.cos(angle) * RING_R;
                const z = VOL_Z + Math.sin(angle) * RING_R;

                const grp = new THREE.Group();
                const stone = new THREE.Mesh(
                    deformCylinder(
                        new THREE.CylinderGeometry(0.9, 1.05, 0.5, 14), 0.2),
                    new THREE.MeshToonMaterial({
                        color: 0x6d4c2a, gradientMap: toon,
                        emissive: 0xff5500, emissiveIntensity: 0.12,
                    }));
                stone.castShadow = true;
                grp.add(stone);
                addOutline(stone, 1.04);
                // Lava-glow ring eronder
                const glow = new THREE.Mesh(
                    new THREE.RingGeometry(1.0, 1.35, 18),
                    new THREE.MeshBasicMaterial({
                        color: 0xff7a1f, transparent: true, opacity: 0.55,
                        side: THREE.DoubleSide,
                        depthWrite: false }));
                glow.rotation.x = -Math.PI / 2;
                glow.position.y = -0.23;
                grp.add(glow);
                // Nummer-sprite boven het platform
                const numSp = makeNumberSprite(i + 1);
                numSp.position.set(0, 0.95, 0);
                numSp.renderOrder = 2;
                grp.add(numSp);

                grp.position.set(x, PLAT_Y, z);
                grp.userData.idx = i;
                grp.userData.basePos = grp.position.clone();
                grp.userData.bobPhase = i * 0.4;
                grp.userData.stoneMat = stone.material;
                grp.userData.glowMat = glow.material;
                platformsGroup.add(grp);
                platforms3D.push(grp);
            }
        }

        function buildTokenOnPlatform(p, platIdx) {
            const plat = platforms3D[platIdx];
            // Bouw een ECHTE pawn (zelfde cone-body + avatar-head als op het
            // hoofdbord) i.p.v. een simpele bal — zo zie je duidelijk welk
            // poppetje van welke speler op welke steen staat.
            //   makePlayerAvatarToken voegt 'm standaard aan het globale
            //   tokenGroup toe; we hangen 'm hier om naar platformsGroup.
            const tokenGrp = makePlayerAvatarToken(p.color.hex, p.avatar);
            if (tokenGrp.parent) tokenGrp.parent.remove(tokenGrp);
            platformsGroup.add(tokenGrp);
            tokenGrp.scale.setScalar(0.85);   // iets compacter voor de platforms
            tokenGrp.position.set(plat.position.x,
                plat.position.y + 0.25, plat.position.z);
            tokenGrp.userData.baseY = tokenGrp.position.y;
            tokenGrp.userData.bobPhase = Math.random() * Math.PI * 2;
            tokenGrp.userData.platIdx = platIdx;
            tokenGrp.userData.player = p;
            tokenGrp.userData.yOffset = 0.25;   // pawn-basis op platform-top
            tokens3D.push(tokenGrp);
            return tokenGrp;
        }

        function clearTokens() {
            for (const t of tokens3D) {
                platformsGroup.remove(t);
                t.traverse(c => {
                    if (c.geometry) c.geometry.dispose();
                    if (c.material) c.material.dispose();
                });
            }
            tokens3D.length = 0;
        }

        function destroyPlatform(idx) {
            return new Promise(res => {
                const plat = platforms3D[idx];
                const startY = plat.position.y;
                const startTime = performance.now();
                const dur = 600;           // veel sneller (was 1500)
                const fallingTokens = tokens3D.filter(t =>
                    t.userData.platIdx === idx);
                fallingTokens.forEach(t => {
                    t.userData.fallStartY = t.position.y;
                });
                const step = () => {
                    const t = Math.min(1, (performance.now() - startTime) / dur);
                    const fall = t * t * 24;     // grotere val (hoger startpunt)
                    plat.position.y = startY - fall;
                    plat.rotation.x = t * 2;
                    plat.rotation.z = t * 1.3;
                    if (plat.userData.stoneMat) {
                        plat.userData.stoneMat.transparent = true;
                        plat.userData.stoneMat.opacity = Math.max(0, 1 - t * 1.3);
                    }
                    if (plat.userData.glowMat) {
                        plat.userData.glowMat.opacity = 0.55 * Math.max(0, 1 - t * 1.3);
                    }
                    fallingTokens.forEach(tk => {
                        tk.position.y = tk.userData.fallStartY - fall;
                        tk.rotation.z = t * 3;
                        tk.traverse(c => {
                            if (c.material) {
                                c.material.transparent = true;
                                c.material.opacity = Math.max(0, 1 - t * 1.3);
                            }
                        });
                    });
                    if (t < 1) requestAnimationFrame(step);
                    else res();
                };
                step();
            });
        }

        // ANIMATION HOOK
        const PREV_HOOK = window.__deGameHook;
        let lastT = 0;
        window.__deGameHook = (time) => {
            const dt = lastT ? Math.min(0.05, time - lastT) : 0;
            lastT = time;
            if (camLerpT < 1) {
                camLerpT = Math.min(1, camLerpT + dt / camLerpDur);
                const e = 1 - Math.pow(1 - camLerpT, 3);
                camera.position.lerpVectors(camFrom.pos, VOLCANO_CAM.pos, e);
                controls.target.lerpVectors(camFrom.tgt, VOLCANO_CAM.tgt, e);
            }
            if (camShakeT > 0) {
                camera.position.x += (Math.random() - 0.5) * camShakeT;
                camera.position.y += (Math.random() - 0.5) * camShakeT;
                camera.position.z += (Math.random() - 0.5) * camShakeT;
                camShakeT *= 0.92;
                if (camShakeT < 0.01) camShakeT = 0;
            }
            camera.lookAt(controls.target);
            // Platform bob
            for (const plat of platforms3D) {
                const u = plat.userData;
                if (u.basePos && u.bobPhase !== undefined) {
                    plat.position.y = u.basePos.y +
                        Math.sin(time * 1.5 + u.bobPhase) * 0.10;
                }
            }
            // Token bob volgt platform
            for (const t of tokens3D) {
                const u = t.userData;
                if (u.baseY !== undefined && u.bobPhase !== undefined) {
                    const plat = platforms3D[u.platIdx];
                    if (plat) {
                        // yOffset is gezet door buildTokenOnPlatform (0.25 voor
                        // de pawn-basis op platform-top).
                        const off = u.yOffset !== undefined ? u.yOffset : 0.62;
                        t.position.y = plat.position.y + off +
                            Math.sin(time * 2.5 + u.bobPhase) * 0.05;
                    }
                }
            }
        };

        // STATE
        let alive = [...players];
        const eliminated = [];
        let round = 0;

        // HUD overlay
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'vh-back' });
        const header = el('div', { className: 'vh-header' });
        const title = el('div', { className: 'vh-title' }, '🌋 Volcano Hop');
        const sub = el('div', { className: 'vh-sub' }, 'Kies een lava-steen boven de krater');
        const chips = el('div', { className: 'vh-survivors' });
        header.append(title, sub, chips);
        const stage = el('div', { className: 'vh-stage' });
        const result = el('div', { className: 'vh-result' });
        result.append(el('div', { className: 'txt' }));
        stage.append(result);
        const foot = el('div', { className: 'vh-foot' });
        const stones = el('div', { className: 'vh-stones' });
        const actionsRow = el('div', {
            style: { display: 'flex', gap: '10px', justifyContent: 'center' }
        });
        foot.append(stones, actionsRow);
        back.append(header, stage, foot);
        ui.append(back);

        function renderChips(currentP = null) {
            chips.innerHTML = '';
            for (const p of players) {
                const out = !alive.includes(p);
                const cur = p === currentP;
                const c = el('div', {
                    className: 'vh-chip' + (out ? ' out' : '') + (cur ? ' cur' : ''),
                    style: { '--pcol': p.color.css }
                });
                c.append(el('div', { className: 'dot' }),
                    document.createTextNode(p.name));
                chips.append(c);
            }
        }

        function showResultText(text) {
            const txt = result.querySelector('.txt');
            txt.textContent = text;
            requestAnimationFrame(() => result.classList.add('show'));
            return new Promise(r => setTimeout(() => {
                result.classList.remove('show');
                r();
            }, 1800));
        }

        function showPassScreen(text, subtitle, btnLabel) {
            return new Promise(r => {
                const pass = el('div', { className: 'vh-pass' });
                pass.append(
                    el('h2', {}, text),
                    el('p', {}, subtitle || ''),
                    el('button', { className: 'btn-pill gold',
                        on: { click: () => { pass.remove(); r(); } },
                        style: { minHeight: '52px', padding: '0 26px',
                                 borderRadius: '999px',
                                 background: 'linear-gradient(180deg,#ffd54a,#ff9a1a)',
                                 color: '#2a1a00', border: '1px solid rgba(255,215,80,0.6)',
                                 boxShadow: '0 4px 0 #b56a00',
                                 fontWeight: '800', fontSize: '16px',
                                 cursor: 'pointer' } }, btnLabel || 'OK'),
                );
                stage.append(pass);
            });
        }

        function renderStoneButtons(count) {
            stones.innerHTML = '';
            const btns = [];
            for (let i = 0; i < count; i++) {
                const btn = el('button', { className: 'vh-stone-btn' },
                    String(i + 1));
                btn.dataset.idx = i;
                stones.append(btn);
                btns.push(btn);
            }
            return btns;
        }

        function highlightPlatform(idx, color) {
            const plat = platforms3D[idx];
            if (!plat) return;
            const hex = parseHexColor(color);
            plat.userData.stoneMat.emissive.setHex(hex);
            plat.userData.stoneMat.emissiveIntensity = 0.7;
            plat.userData.glowMat.color.setHex(hex);
            plat.userData.glowMat.opacity = 0.9;
        }
        function dimPlatform(idx) {
            const plat = platforms3D[idx];
            if (!plat) return;
            plat.userData.stoneMat.emissive.setHex(0xff5500);
            plat.userData.stoneMat.emissiveIntensity = 0.12;
            plat.userData.glowMat.color.setHex(0xff7a1f);
            plat.userData.glowMat.opacity = 0.55;
        }

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        async function playRound() {
            round++;
            const platCount = Math.max(2, Math.min(7, alive.length + 1));
            buildPlatforms(platCount);
            clearTokens();
            sub.textContent =
                `Ronde ${round} — ${alive.length} spelers, ${platCount} stenen`;
            renderChips();

            const picks = new Map();
            for (const p of alive) {
                await showPassScreen(`Geef telefoon aan ${p.name}`,
                    'Tik stiekem op een lava-steen. Anderen mogen niet kijken!',
                    'Ik ben er klaar voor');
                renderChips(p);
                sub.textContent = `${p.name}, kies een steen…`;
                const btns = renderStoneButtons(platCount);
                let picked = null;
                const confirmBtn = el('button', { className: 'btn-pill gold',
                    style: { minHeight: '48px', padding: '0 22px',
                             borderRadius: '999px',
                             background: 'linear-gradient(180deg,#ffd54a,#ff9a1a)',
                             color: '#2a1a00',
                             border: '1px solid rgba(255,215,80,0.6)',
                             boxShadow: '0 4px 0 #b56a00',
                             fontWeight: '800', fontSize: '16px',
                             cursor: 'pointer' } }, 'Bevestig');
                confirmBtn.disabled = true;
                actionsRow.innerHTML = '';
                actionsRow.append(confirmBtn);
                // Helper om tijdelijke pawn (tijdens pick-fase) op te ruimen
                const disposeTempPawn = (pwn) => {
                    platformsGroup.remove(pwn);
                    pwn.traverse(c => {
                        if (c.geometry) c.geometry.dispose();
                        if (c.material) c.material.dispose();
                    });
                    const ti = tokens3D.indexOf(pwn);
                    if (ti !== -1) tokens3D.splice(ti, 1);
                };

                let pickedPawn = null;     // 3D pawn voor de current picker
                await new Promise(r => {
                    btns.forEach((btn, idx) => {
                        btn.addEventListener('click', () => {
                            btns.forEach(b => {
                                b.classList.remove('picked');
                                b.style.setProperty('--pcol', p.color.css);
                            });
                            for (let i = 0; i < platCount; i++) dimPlatform(i);
                            btn.classList.add('picked');
                            highlightPlatform(idx, p.color.hex);
                            picked = idx;
                            confirmBtn.disabled = false;
                            // Plaats het 3D pionnetje op het gekozen platform.
                            // Bij wisselen van keuze: verplaats (oude weg).
                            if (pickedPawn) disposeTempPawn(pickedPawn);
                            pickedPawn = buildTokenOnPlatform(p, idx);
                        });
                    });
                    confirmBtn.addEventListener('click', () => {
                        if (picked === null) return;
                        r();
                    });
                });
                // Na confirm: verwijder de tijdelijke pawn zodat de volgende
                // speler een schoon bord ziet. Tijdens REVEAL worden alle
                // pawns opnieuw geplaatst voor de eruptie.
                if (pickedPawn) disposeTempPawn(pickedPawn);
                picks.set(p, picked);
                for (let i = 0; i < platCount; i++) dimPlatform(i);
                stones.innerHTML = '';
                actionsRow.innerHTML = '';
            }

            // REVEAL
            await showPassScreen('Iedereen heeft gekozen!',
                'Welke steen overleeft de eruptie?',
                '🌋 Onthul!');
            sub.textContent = 'De vulkaan rommelt…';
            renderChips();
            stones.innerHTML = '';

            for (const [p, idx] of picks) {
                buildTokenOnPlatform(p, idx);
            }
            await sleep(800);

            const fallIdxs = [];
            {
                // Pak 50% van de platforms, naar boven afgerond. Met platCount=4
                // → 2 platforms vallen. Met platCount=7 → 4 vallen. Altijd minstens
                // 1 platform overleeft (ceil(N/2) ≤ N voor alle N ≥ 1).
                const flipCount = Math.ceil(platCount / 2);
                const pool = Array.from({ length: platCount }, (_, i) => i);
                for (let i = pool.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [pool[i], pool[j]] = [pool[j], pool[i]];
                }
                fallIdxs.push(...pool.slice(0, flipCount));
            }
            // Markeer ALLE vallende platforms rood vóór de eruptie
            for (const idx of fallIdxs) {
                const plat = platforms3D[idx];
                plat.userData.stoneMat.emissive.setHex(0xff2200);
                plat.userData.stoneMat.emissiveIntensity = 1.4;
                plat.userData.glowMat.color.setHex(0xff2200);
                plat.userData.glowMat.opacity = 1;
            }
            camShakeT = 0.35;
            await showResultText('💥 ERUPTIE!');
            // Vernietig alle vallende platforms TEGELIJK (parallel)
            await Promise.all(fallIdxs.map(idx => destroyPlatform(idx)));

            const losers = [];
            const survivors = [];
            for (const [p, idx] of picks) {
                if (fallIdxs.includes(idx)) losers.push(p);
                else survivors.push(p);
            }
            for (const p of losers) {
                if (!eliminated.includes(p)) eliminated.push(p);
            }
            alive = survivors;

            renderChips();
            const labelTxt = losers.length === 0
                ? `Iedereen veilig! Door naar ronde ${round + 1}`
                : `${losers.map(p => p.name).join(', ')} drinkt ${drinks} 🍻`;
            await showPassScreen(losers.length === 0 ? '🎉 Allemaal goed!'
                                                     : '⚡ KZZZAP!',
                labelTxt,
                alive.length <= 1 ? '🏆 Eindstand' : '▶ Volgende ronde');
        }

        function finish(winner) {
            scene.remove(platformsGroup);
            platformsGroup.traverse(c => {
                if (c.geometry) c.geometry.dispose();
                if (c.material) {
                    if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
                    else c.material.dispose();
                }
            });
            window.__deGameHook = PREV_HOOK;
            camera.fov = savedCam.fov;
            camera.position.copy(savedCam.pos);
            camera.updateProjectionMatrix();
            controls.target.copy(savedCam.target);
            controls.autoRotate = savedCam.autoRotate;
            controls.enabled = savedCam.enabled;
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => {
                back.remove();
                restoreMinigameChrome(hiddenChrome);
                resolveOuter(winner || null);
            }, 300);
        }

        function showFinal() {
            stones.innerHTML = '';
            actionsRow.innerHTML = '';
            renderChips();
            const winner = alive[0];
            const board = el('div', {
                style: { padding: '20px', display: 'flex',
                         flexDirection: 'column', alignItems: 'center',
                         gap: '14px' }
            });
            if (winner) {
                board.append(
                    el('div', { style: { fontSize: '60px' } }, '🏆'),
                    el('div', { style: { fontSize: '28px', fontWeight: '900',
                                          color: winner.color.css,
                                          textShadow: '0 2px 0 #000, 0 0 20px '
                                                    + winner.color.css } },
                        `${winner.name} wint!`),
                    el('div', { style: { fontSize: '16px', opacity: 0.85,
                                          textAlign: 'center', maxWidth: '280px' } },
                        eliminated.length
                            ? `${eliminated.map(p => p.name).join(', ')} drinkt elk ${drinks} 🍻`
                            : 'Iedereen heeft het overleefd! 🎉'),
                );
            } else {
                board.append(
                    el('div', { style: { fontSize: '60px' } }, '🌋'),
                    el('div', { style: { fontSize: '24px', fontWeight: '900' } },
                        'Geen winnaar!'),
                    el('div', { style: { fontSize: '16px', opacity: 0.85,
                                          textAlign: 'center', maxWidth: '280px' } },
                        `Iedereen viel. Iedereen drinkt ${drinks} 🍻 extra`),
                );
            }
            stage.append(board);
            const finishBtn = el('button', { className: 'btn-pill gold',
                style: { minHeight: '52px', padding: '0 26px',
                         borderRadius: '999px',
                         background: 'linear-gradient(180deg,#ffd54a,#ff9a1a)',
                         color: '#2a1a00',
                         border: '1px solid rgba(255,215,80,0.6)',
                         boxShadow: '0 4px 0 #b56a00',
                         fontWeight: '800', fontSize: '16px',
                         cursor: 'pointer' },
                on: { click: () => finish(winner) }
            }, 'Verder');
            actionsRow.append(finishBtn);
        }

        async function loop() {
            while (alive.length > 1) {
                await playRound();
                if (alive.length === 0) break;
            }
            showFinal();
        }
        loop();
    });
}

// ── Paddle Duel — 1v1 split-screen pong, first to 3 points wins ──
function playPaddleDuel({ playerA, playerB, targetScore = 3, drinks = 4 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        // ── 3D SCENE INTEGRATIE ─────────────────────────────────
        // Verberg al het bord-game UI rommel + home overlay zodat
        // de 3D vulkaan-scene puur als achtergrond zichtbaar is.
        const hiddenChrome = hideMinigameChrome();
        // Camera-snapshot zodat we 'm na de game terug kunnen zetten.
        const savedCam = {
            pos: camera.position.clone(),
            fov: camera.fov,
            target: controls.target.clone(),
            autoRotate: controls.autoRotate,
            enabled: controls.enabled,
        };
        controls.autoRotate = false;
        controls.enabled = false;
        camera.fov = 55;
        camera.updateProjectionMatrix();
        // Beweeg de camera HOOG boven de vulkaan, lichte hoek voor
        // perspectief — daardoor ziet het er uit alsof je de paddle-
        // duel ver boven het eiland speelt. We doen dit met een korte
        // soepele transitie via __deGameHook zodat het niet schokt.
        const TOP_CAM_POS = new THREE.Vector3(0, 95, 28);
        const TOP_CAM_TGT = new THREE.Vector3(0, 0, 0);
        const camFrom = { pos: camera.position.clone(), tgt: controls.target.clone() };
        const camTo = { pos: TOP_CAM_POS, tgt: TOP_CAM_TGT };
        let camLerpT = 0;
        const camLerpDur = 0.9;
        const PREV_HOOK = window.__deGameHook;
        window.__deGameHook = (time) => {
            if (camLerpT < 1) {
                const dt = 0.016;     // ~60fps assumed; lerp is robust
                camLerpT = Math.min(1, camLerpT + dt / camLerpDur);
                const k = camLerpT;
                const e = k < 0.5 ? 4*k*k*k : 1 - Math.pow(-2*k+2, 3) / 2;
                camera.position.lerpVectors(camFrom.pos, camTo.pos, e);
                controls.target.lerpVectors(camFrom.tgt, camTo.tgt, e);
            } else {
                camera.position.copy(camTo.pos);
                controls.target.copy(camTo.tgt);
            }
            camera.lookAt(controls.target);
        };

        const back = el('div', { className: 'pd-back' });
        back.style.setProperty('--colA', playerA.color.css);
        back.style.setProperty('--colB', playerB.color.css);

        const wrap = el('div', { className: 'pd-canvas-wrap' });
        const canvas = el('canvas');
        wrap.append(canvas);

        const lblTop = el('div', { className: 'pd-half-label top', style: { '--col': playerA.color.css } }, playerA.name);
        const lblBot = el('div', { className: 'pd-half-label bot', style: { '--col': playerB.color.css } }, playerB.name);
        const score = el('div', { className: 'pd-score' });
        const scoreTop = el('div', { className: 'num top', style: { '--colA': playerA.color.css } }, '0');
        const scoreBot = el('div', { className: 'num bot', style: { '--colB': playerB.color.css } }, '0');
        score.append(scoreTop, el('div', { className: 'dash' }, '·'), scoreBot);
        wrap.append(lblTop, lblBot, score);

        const overlay = el('div', { className: 'pd-overlay show' });
        const oTitle = el('h2', {}, 'Paddle Duel');
        const oText = el('p', {}, `${playerA.name} (boven) vs ${playerB.name} (onder). Sleep in je helft om te bewegen. Eerste bij ${targetScore} wint.`);
        const oBtn = el('button', { className: 'btn-pill gold' }, '▶ Start');
        const oSkip = el('button', { className: 'btn-pill' }, 'Skip');
        overlay.append(oTitle, oText, oBtn, oSkip);
        wrap.append(overlay);

        back.append(wrap);
        ui.append(back);

        const ctx = canvas.getContext('2d');
        let W = 0, H = 0, dpr = window.devicePixelRatio || 1;
        function resize() {
            const r = wrap.getBoundingClientRect();
            W = r.width; H = r.height;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);

        // Game state
        const PAD_W = 0.22, PAD_H = 14, BALL_R = 8;
        // Distance from the top/bottom edge of the canvas to the paddles.
        // Larger value = paddle moves away from the iPhone notch / home indicator.
        const PAD_INSET = 70;
        // ── Difficulty tuning (Paddle Duel) ─────────────────────────────
        // INIT_SP_MULT  : startsnelheid als fractie van min(W,H) per sec.
        //                 Hoger = vanaf het begin sneller.
        // PADDLE_BOOST  : versnelling per paddle-hit (geldt op zowel vx als vy).
        //                 1.20 = +20% per rally → het ramp gaat HARD omhoog.
        // WALL_BOOST    : kleine versnelling per zijwand-bounce, zodat de bal
        //                 niet "afremt" door de muren (zoals gevraagd).
        // STEER_PX      : zijspin op basis van waar de bal de paddle raakt.
        // MIN_VY_RATIO  : minimum verticale component t.o.v. totale snelheid.
        //                 Voorkomt dat de bal horizontaal vast komt te zitten
        //                 tussen de zijwanden zonder ooit een paddle te halen.
        // MAX_SP_MULT   : harde plafond zodat de bal nooit door een paddle
        //                 heen tunnelt (extra naast sub-stepping hieronder).
        const INIT_SP_MULT  = 0.78;   // was 1.05 — rustigere start
        const PADDLE_BOOST  = 1.15;   // was 1.20 — geleidelijkere opbouw
        const WALL_BOOST    = 1.04;
        const STEER_PX      = 200;
        const MIN_VY_RATIO  = 0.5;
        const MAX_SP_MULT   = 4.0;
        const state = {
            padA: 0.5, padB: 0.5, // x positions 0..1
            ballX: 0, ballY: 0, vx: 0, vy: 0,
            scoreA: 0, scoreB: 0,
            running: false, finished: false,
        };

        function resetBall(dir) {
            state.ballX = W / 2;
            state.ballY = H / 2;
            // Smaller angle spread so the ball heads quickly at the paddles.
            const ang = (Math.random() - 0.5) * 0.5 + (dir > 0 ? Math.PI / 2 : -Math.PI / 2);
            const speed = Math.min(W, H) * INIT_SP_MULT;
            state.vx = Math.cos(ang) * speed;
            state.vy = Math.sin(ang) * speed;
        }

        // Touch handling: split screen in half.
        // IMPORTANT: attach to canvas (not wrap) so taps on the overlay's
        // Start/Skip buttons don't get e.preventDefault()'d before iOS
        // can synthesize their click event. (This was the iPhone Safari bug.)
        const padTouch = { A: null, B: null }; // touchId per side
        function getRect() { return canvas.getBoundingClientRect(); }
        canvas.addEventListener('touchstart', e => {
            if (!state.running) return; // overlay is up — let the button receive its click
            const r = getRect();
            for (const t of e.changedTouches) {
                const y = t.clientY - r.top;
                if (y < H / 2 && padTouch.A === null) {
                    padTouch.A = t.identifier;
                    state.padA = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (t.clientX - r.left) / W));
                } else if (y >= H / 2 && padTouch.B === null) {
                    padTouch.B = t.identifier;
                    state.padB = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (t.clientX - r.left) / W));
                }
            }
            e.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchmove', e => {
            if (!state.running) return;
            const r = getRect();
            for (const t of e.changedTouches) {
                const x = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (t.clientX - r.left) / W));
                if (t.identifier === padTouch.A) state.padA = x;
                else if (t.identifier === padTouch.B) state.padB = x;
            }
            e.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchend', e => {
            for (const t of e.changedTouches) {
                if (t.identifier === padTouch.A) padTouch.A = null;
                if (t.identifier === padTouch.B) padTouch.B = null;
            }
            e.preventDefault();
        }, { passive: false });
        // Mouse fallback (desktop test) — drag in respective half
        let mouseDown = false, mouseSide = null;
        canvas.addEventListener('mousedown', e => {
            if (!state.running) return;
            const r = getRect();
            const y = e.clientY - r.top;
            mouseSide = y < H / 2 ? 'A' : 'B';
            mouseDown = true;
            const x = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (e.clientX - r.left) / W));
            if (mouseSide === 'A') state.padA = x; else state.padB = x;
        });
        canvas.addEventListener('mousemove', e => {
            if (!mouseDown) return;
            const r = getRect();
            const x = Math.max(PAD_W/2, Math.min(1 - PAD_W/2, (e.clientX - r.left) / W));
            if (mouseSide === 'A') state.padA = x; else state.padB = x;
        });
        window.addEventListener('mouseup', () => { mouseDown = false; });

        let last = 0, rafId = null;
        function tick(t) {
            if (!last) last = t;
            const dt = Math.min(50, t - last) / 1000;
            last = t;
            if (state.running && !state.finished) update(dt);
            draw();
            rafId = requestAnimationFrame(tick);
        }
        function update(dt) {
            // ── Sub-stepping ──
            // At very high speeds (after several rally hits) the ball could
            // travel more than its own radius in a single frame and tunnel
            // straight through a paddle. We split each frame into N steps
            // such that the ball never moves more than ~BALL_R per step.
            const sp = Math.hypot(state.vx, state.vy);
            const maxStep = Math.max(2, BALL_R * 0.8);
            const steps = Math.max(1, Math.ceil(sp * dt / maxStep));
            const sdt = dt / steps;
            for (let s = 0; s < steps; s++) {
                if (state.finished) return;
                if (!substep(sdt)) return; // returns false when a point was scored
            }
        }
        // One physics sub-step. Returns false if a goal was scored (so the
        // outer loop bails out instead of running more sub-steps on the
        // already-reset ball).
        function substep(dt) {
            state.ballX += state.vx * dt;
            state.ballY += state.vy * dt;
            // ── wall bounce (side walls) — small speed-up, never slow-down ──
            let hitWall = false;
            if (state.ballX < BALL_R)       { state.ballX = BALL_R;       state.vx =  Math.abs(state.vx); hitWall = true; }
            if (state.ballX > W - BALL_R)   { state.ballX = W - BALL_R;   state.vx = -Math.abs(state.vx); hitWall = true; }
            if (hitWall) {
                state.vx *= WALL_BOOST;
                state.vy *= WALL_BOOST;
                clampSpeed();
            }

            const padAx = state.padA * W;
            const padBx = state.padB * W;
            const padHalfW = (PAD_W * W) / 2;
            const PAD_Y_TOP = PAD_INSET;
            const PAD_Y_BOT = H - PAD_INSET;

            // top paddle (A) — when ball moving up
            if (state.vy < 0 && state.ballY - BALL_R <= PAD_Y_TOP + PAD_H/2 && state.ballY > PAD_Y_TOP - PAD_H) {
                if (Math.abs(state.ballX - padAx) <= padHalfW + BALL_R) {
                    state.ballY = PAD_Y_TOP + PAD_H/2 + BALL_R;
                    state.vy = Math.abs(state.vy);
                    state.vx *= PADDLE_BOOST;
                    state.vy *= PADDLE_BOOST;
                    state.vx += (state.ballX - padAx) / padHalfW * STEER_PX;
                    enforceMinVy();
                    clampSpeed();
                }
            }
            // bottom paddle (B)
            if (state.vy > 0 && state.ballY + BALL_R >= PAD_Y_BOT - PAD_H/2 && state.ballY < PAD_Y_BOT + PAD_H) {
                if (Math.abs(state.ballX - padBx) <= padHalfW + BALL_R) {
                    state.ballY = PAD_Y_BOT - PAD_H/2 - BALL_R;
                    state.vy = -Math.abs(state.vy);
                    state.vx *= PADDLE_BOOST;
                    state.vy *= PADDLE_BOOST;
                    state.vx += (state.ballX - padBx) / padHalfW * STEER_PX;
                    enforceMinVy();
                    clampSpeed();
                }
            }

            // out of bounds
            if (state.ballY < -20) {
                state.scoreB++;
                scoreBot.textContent = state.scoreB;
                if (state.scoreB >= targetScore) endGame(playerB, playerA);
                else resetBall(1);
                return false;
            } else if (state.ballY > H + 20) {
                state.scoreA++;
                scoreTop.textContent = state.scoreA;
                if (state.scoreA >= targetScore) endGame(playerA, playerB);
                else resetBall(-1);
                return false;
            }
            return true;
        }
        // Keep the ball heading vertically enough to actually challenge the
        // paddles, instead of ping-ponging horizontally between the side walls.
        function enforceMinVy() {
            const tot = Math.hypot(state.vx, state.vy);
            if (tot < 1) return;
            const ratio = Math.abs(state.vy) / tot;
            if (ratio < MIN_VY_RATIO) {
                const sgnY = state.vy === 0 ? 1 : Math.sign(state.vy);
                const sgnX = state.vx === 0 ? 1 : Math.sign(state.vx);
                const newVy = tot * MIN_VY_RATIO * sgnY;
                const newVx = sgnX * Math.sqrt(Math.max(0, tot * tot - newVy * newVy));
                state.vy = newVy;
                state.vx = newVx;
            }
        }
        function clampSpeed() {
            const MAX = Math.min(W, H) * MAX_SP_MULT;
            const tot = Math.hypot(state.vx, state.vy);
            if (tot > MAX) {
                state.vx *= MAX / tot;
                state.vy *= MAX / tot;
            }
        }
        function draw() {
            ctx.clearRect(0, 0, W, H);
            // centre line
            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 10]);
            ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
            ctx.setLineDash([]);
            // paddles
            const padHalfW = (PAD_W * W) / 2;
            ctx.fillStyle = playerA.color.css;
            ctx.shadowColor = playerA.color.css; ctx.shadowBlur = 16;
            roundRect(state.padA * W - padHalfW, PAD_INSET - PAD_H/2, padHalfW * 2, PAD_H, 6); ctx.fill();
            ctx.fillStyle = playerB.color.css;
            ctx.shadowColor = playerB.color.css;
            roundRect(state.padB * W - padHalfW, H - PAD_INSET - PAD_H/2, padHalfW * 2, PAD_H, 6); ctx.fill();
            ctx.shadowBlur = 0;
            // ball
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff'; ctx.shadowBlur = 18;
            ctx.beginPath(); ctx.arc(state.ballX, state.ballY, BALL_R, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }
        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        function endGame(winner, loser) {
            state.finished = true;
            state.running = false;
            overlay.innerHTML = '';
            overlay.append(
                el('h2', { style: { color: winner.color.css } }, `🏆 ${winner.name} wint!`),
                el('p', {}, `${loser.name} drinkt ${drinks} 🍻`),
                el('button', { className: 'btn-pill gold', on: { click: () => finish(loser) } }, 'Verder'),
            );
            overlay.classList.add('show');
        }
        function finish(loser) {
            cancelAnimationFrame(rafId);
            window.removeEventListener('resize', resize);
            // 3D scene herstellen
            window.__deGameHook = PREV_HOOK;
            camera.fov = savedCam.fov;
            camera.position.copy(savedCam.pos);
            camera.updateProjectionMatrix();
            controls.target.copy(savedCam.target);
            controls.autoRotate = savedCam.autoRotate;
            controls.enabled = savedCam.enabled;
            camera.lookAt(controls.target);
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => {
                back.remove();
                restoreMinigameChrome(hiddenChrome);
                resolve(loser);
            }, 300);
        }

        oBtn.addEventListener('click', () => {
            overlay.classList.remove('show');
            resetBall(Math.random() < 0.5 ? 1 : -1);
            state.running = true;
        });
        oSkip.addEventListener('click', () => finish(null));

        rafId = requestAnimationFrame(tick);
    });
}

// ── Krokodil — Crocodile Dentist: tap teeth, one is "zere tand", chomp = af ──
function playKrokodil({ playerA, playerB, drinks = 4, teethCount = 18 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        // ── 3D SCENE INTEGRATIE ─────────────────────────────────
        // Vulkaan-eiland scene wordt zichtbaar achter de krokodil
        // graphic. Camera schuift naar een laag wateroppervlak shot
        // met de vulkaan in de verte — krijgt zo een dreigende
        // "lagune" sfeer die past bij het krokodil-thema.
        const hiddenChrome = hideMinigameChrome();
        const savedCam = {
            pos: camera.position.clone(),
            fov: camera.fov,
            target: controls.target.clone(),
            autoRotate: controls.autoRotate,
            enabled: controls.enabled,
        };
        controls.autoRotate = false;
        controls.enabled = false;
        camera.fov = 55;
        camera.updateProjectionMatrix();
        // Laag-bij-water shot, vulkaan op afstand
        const KROKO_CAM_POS = new THREE.Vector3(30, 3, 48);
        const KROKO_CAM_TGT = new THREE.Vector3(0, 10, 0);
        const camFrom = { pos: camera.position.clone(), tgt: controls.target.clone() };
        const camTo = { pos: KROKO_CAM_POS, tgt: KROKO_CAM_TGT };
        let camLerpT = 0;
        const camLerpDur = 0.9;
        const PREV_HOOK = window.__deGameHook;
        window.__deGameHook = (time) => {
            if (camLerpT < 1) {
                const dt = 0.016;
                camLerpT = Math.min(1, camLerpT + dt / camLerpDur);
                const k = camLerpT;
                const e = k < 0.5 ? 4*k*k*k : 1 - Math.pow(-2*k+2, 3) / 2;
                camera.position.lerpVectors(camFrom.pos, camTo.pos, e);
                controls.target.lerpVectors(camFrom.tgt, camTo.tgt, e);
            } else {
                camera.position.copy(camTo.pos);
                controls.target.copy(camTo.tgt);
            }
            camera.lookAt(controls.target);
        };

        const back = el('div', { className: 'kroko-back' });

        const head = el('div', { className: 'kroko-head' });
        const title = el('h2', {}, '🐊 Krokodil met kiespijn');
        const turnBox = el('div', { className: 'kroko-turn' });
        const turnLbl = el('span', { className: 'lbl' }, 'Beurt:');
        const turnDot = el('span', { className: 'dot' });
        const turnName = el('span', { className: 'name' });
        turnBox.append(turnLbl, turnDot, turnName);
        head.append(title, turnBox);

        const stage = el('div', { className: 'kroko-stage' });
        const croc = el('div', { className: 'kroko-croc' });
        const nose = el('div', { className: 'kroko-nose' });
        nose.append(el('span'), el('span'));
        const mouth = el('div', { className: 'kroko-mouth' });
        const teethWrap = el('div', { className: 'kroko-teeth' });
        mouth.append(teethWrap);
        croc.append(nose, mouth);
        stage.append(croc);

        const biteIdx = Math.floor(Math.random() * teethCount);
        const teeth = [];

        // Place teeth around an ellipse inside the mouth.
        // rx/ry in percent of the mouth element. We place each tooth at
        // (50% + rx*cos(a), 50% + ry*sin(a)), with transform-origin at the
        // outer end so the tooth points inward.
        for (let i = 0; i < teethCount; i++) {
            const a = (i / teethCount) * Math.PI * 2 - Math.PI / 2; // top-first
            const rx = 44, ry = 47;
            const x = 50 + rx * Math.cos(a);
            const y = 50 + ry * Math.sin(a);
            const rotDeg = (a * 180 / Math.PI) + 90; // tooth tip points to centre
            const t = el('div', { className: 'tooth' });
            const pos = `translate(-50%, 0) rotate(${rotDeg}deg)`;
            t.style.left = x + '%';
            t.style.top  = y + '%';
            t.style.setProperty('--pos', pos);
            t.style.transform = pos;
            t.addEventListener('click', () => tapTooth(i));
            teethWrap.append(t);
            teeth.push(t);
        }

        let turn = 0; // 0 = A, 1 = B
        let locked = false;

        function curPlayer() { return turn === 0 ? playerA : playerB; }
        function updateTurn() {
            const p = curPlayer();
            turnBox.style.setProperty('--pcol', p.color.css);
            turnName.textContent = p.name;
            passBtn.disabled = false;
            passBtn.textContent = '➡️ Volgende speler';
        }

        function tapTooth(idx) {
            if (locked) return;
            const t = teeth[idx];
            if (t.classList.contains('pressed') || t.classList.contains('bite')) return;
            if (idx === biteIdx) {
                locked = true;
                t.classList.add('bite');
                setTimeout(() => {
                    mouth.classList.add('chomp');
                    croc.classList.add('chomping');
                }, 200);
                const loser = curPlayer();
                setTimeout(() => showResult(loser), 1300);
            } else {
                t.classList.add('pressed');
                // current player keeps going; they pass with the button
            }
        }

        const foot = el('div', { className: 'kroko-foot' });
        const passBtn = el('button', { className: 'btn-pill gold', type: 'button' }, '➡️ Volgende speler');
        passBtn.addEventListener('click', () => {
            if (locked) return;
            turn = 1 - turn;
            updateTurn();
        });
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        skipBtn.addEventListener('click', () => finish(null));
        foot.append(passBtn, skipBtn);

        const result = el('div', { className: 'kroko-result' });
        function showResult(loser) {
            result.append(
                el('div', { className: 'chomp' }, 'AU! 🐊'),
                el('div', { className: 'who', style: { color: loser.color.css } }, `${loser.name} drukte de zere tand!`),
                el('div', { className: 'drinks' }, `Drink ${drinks} 🍻`),
                el('button', { className: 'btn-pill gold', type: 'button',
                    style: { marginTop: '14px' },
                    on: { click: () => finish(loser) } }, 'Verder'),
            );
            result.classList.add('show');
        }
        stage.append(result);

        back.append(head, stage, foot);
        ui.append(back);
        updateTurn();

        function finish(loser) {
            // 3D scene herstellen
            window.__deGameHook = PREV_HOOK;
            camera.fov = savedCam.fov;
            camera.position.copy(savedCam.pos);
            camera.updateProjectionMatrix();
            controls.target.copy(savedCam.target);
            controls.autoRotate = savedCam.autoRotate;
            controls.enabled = savedCam.enabled;
            camera.lookAt(controls.target);
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => {
                back.remove();
                restoreMinigameChrome(hiddenChrome);
                resolve(loser);
            }, 300);
        }
    });
}

/* ════════════════════════════════════════════════════════════════════
   1. De Hete Lavasteen — Hot Potato
   ════════════════════════════════════════════════════════════════════
   State machine:
     START       — eerste speler vasthoudt, knop "Geef door"
     PASSING     — taps wisselen speler; verborgen timer telt door
     EXPLODE     — timer eindigt, huidige speler verliest
                   visueel: rook + boom + result-card → resolve()
   ════════════════════════════════════════════════════════════════════ */
function playHeteLavasteen({ players = G.players, drinks = 4 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'lava-back' });
        const head = el('div', { className: 'lava-head' });
        head.append(el('h2', {}, '🌋 De Hete Lavasteen'));
        // Speler-badge
        const turn = el('div', { className: 'lava-turn' });
        const turnDot = el('span', { className: 'dot' });
        const turnName = el('span', { className: 'name' });
        turn.append(el('span', { style: { fontSize: '13px', opacity: '0.7' } }, 'Vasthoudt:'),
                    turnDot, turnName);
        head.append(turn);
        // Stage met de steen
        const stage = el('div', { className: 'lava-stage' });
        const rock = el('div', { className: 'lava-rock' });
        rock.style.setProperty('--heat', '0');
        stage.append(rock);
        // Tap-knop (zit absoluut in de stage)
        const tap = el('button', { className: 'lava-tap', type: 'button' }, 'Geef door 👆');
        stage.append(tap);
        // Subtle hint onderaan
        const tip = el('div', { style: {
            textAlign: 'center', fontSize: '13px', opacity: '0.65', padding: '6px 14px' } },
            "Tik om de telefoon door te geven. Wie 'm vasthoudt als de steen ontploft, drinkt.");
        back.append(head, stage, tip);
        ui.append(back);

        // ── STATE ──
        let curIdx = 0;
        // Verborgen timer 8-16 seconden (escaleert visueel naar het einde)
        const TOTAL_MS = 8000 + Math.random() * 8000;
        const startedAt = performance.now();
        let phase = 'passing';     // passing | exploded | done
        let rafId = 0;

        function setPlayer(i) {
            curIdx = i;
            const p = players[curIdx];
            turnDot.style.background = p.color.css;
            turnDot.style.boxShadow = '0 0 8px ' + p.color.css;
            turnName.style.color = p.color.css;
            turnName.textContent = p.name;
            turn.style.setProperty('--pcol', p.color.css);
        }
        setPlayer(0);

        function tick() {
            if (phase !== 'passing') return;
            const elapsed = performance.now() - startedAt;
            const ratio = Math.min(1, elapsed / TOTAL_MS);
            rock.style.setProperty('--heat', ratio.toFixed(3));
            if (elapsed >= TOTAL_MS) {
                explode();
            } else {
                rafId = requestAnimationFrame(tick);
            }
        }
        function passToNext() {
            if (phase !== 'passing') return;
            setPlayer((curIdx + 1) % players.length);
            // Tactiele tap feedback — kleine puls
            tap.style.transform = 'translateX(-50%) scale(0.92)';
            setTimeout(() => { tap.style.transform = ''; }, 100);
        }
        function explode() {
            if (phase !== 'passing') return;
            phase = 'exploded';
            const loser = players[curIdx];
            // Visuele klap
            const boom = el('div', { className: 'lava-explosion' });
            stage.append(boom);
            rock.style.opacity = '0';
            rock.style.transform = 'scale(0)';
            rock.style.transition = 'all 0.3s ease-out';
            tap.style.display = 'none';
            // Resultaat-card
            setTimeout(() => {
                boom.remove();
                const result = el('div', { className: 'lava-result',
                    style: { '--pcol': loser.color.css } });
                result.append(
                    el('h2', {}, '💥 BOEM!'),
                    el('p', {}, `${loser.name} houdt 'm vast`),
                    el('p', { style: { fontSize: '18px', marginTop: '8px', fontWeight: '900' } },
                        `${drinks} slokken 🍻`),
                );
                stage.append(result);
                setTimeout(() => finish(loser), 2400);
            }, 600);
        }
        function finish(loser) {
            if (phase === 'done') return;
            phase = 'done';
            cancelAnimationFrame(rafId);
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(loser); }, 300);
        }
        tap.addEventListener('click', passToNext);
        tap.addEventListener('touchstart', e => { e.preventDefault(); passToNext(); },
            { passive: false });
        rafId = requestAnimationFrame(tick);
    });
}


/* ════════════════════════════════════════════════════════════════════
   2. De Kano Race — split-screen tap race
