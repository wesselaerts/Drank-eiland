/* ─────────────────────────────────────────────
   10. DECORATION — palms, bushes, flowers, grass, tiki
   ───────────────────────────────────────────── */

// ── Palm trees with swaying animation ──
const palmGroup = new THREE.Group();
scene.add(palmGroup);
const palms = [];

function makePalm(x, y, z, scale = 1, tilt = 0) {
    const g = new THREE.Group();

    // curved trunk (3 segments stacked with slight bend)
    for (let i = 0; i < 4; i++) {
        const seg = new THREE.Mesh(
            new THREE.CylinderGeometry(0.28 - i * 0.04, 0.35 - i * 0.04, 1.1, 8),
            MAT.trunk
        );
        seg.position.set(Math.sin(i * 0.4) * 0.15, 0.55 + i * 1.0, Math.cos(i * 0.4) * 0.05);
        seg.rotation.z = (i - 1) * 0.08;
        seg.castShadow = true;
        g.add(seg);
    }

    // crown of fronds (cones flattened into leaves)
    const crown = new THREE.Group();
    crown.position.y = 4.4;
    for (let i = 0; i < 7; i++) {
        const frond = new THREE.Mesh(
            new THREE.ConeGeometry(0.35, 2.4, 4),
            i % 2 ? MAT.leaf : MAT.leafLight
        );
        const a = (Math.PI * 2 / 7) * i;
        frond.position.set(Math.cos(a) * 1.0, 0.1, Math.sin(a) * 1.0);
        frond.rotation.z = Math.PI / 2;
        frond.rotation.y = -a;
        frond.rotation.x = -0.4;
        frond.scale.set(1, 1, 0.3);
        frond.castShadow = true;
        crown.add(frond);
    }
    // few coconuts
    for (let i = 0; i < 3; i++) {
        const a = i * 2.1;
        const coco = new THREE.Mesh(
            new THREE.SphereGeometry(0.22, 8, 6),
            MAT.trunk
        );
        coco.position.set(Math.cos(a) * 0.4, -0.1, Math.sin(a) * 0.4);
        crown.add(coco);
    }
    g.add(crown);

    g.position.set(x, y, z);
    g.rotation.z = tilt;
    g.rotation.y = Math.random() * Math.PI * 2;
    g.scale.setScalar(scale);
    palmGroup.add(g);
    palms.push({
        group: g,
        crown,
        phase: Math.random() * Math.PI * 2,
        windAmp: 0.04 + Math.random() * 0.03,
    });
}

// palms along the main island's beach + grass terraces
for (let i = 0; i < 9; i++) {
    const a = (Math.PI * 2 / 9) * i + 0.3;
    const r = 9.2 + Math.random() * 1.2;
    makePalm(Math.cos(a) * r, 1.4, Math.sin(a) * r, 0.85 + Math.random() * 0.3, (Math.random() - 0.5) * 0.1);
}
// a few on the grass terraces
for (let i = 0; i < 5; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = 3 + Math.random() * 3.5;
    makePalm(Math.cos(a) * r, 2.8, Math.sin(a) * r, 0.7 + Math.random() * 0.25, (Math.random() - 0.5) * 0.1);
}
// satellites get 2-3 palms each
for (const sat of satellites) {
    const palmCount = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < palmCount; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = sat.radius * 0.55;
        makePalm(
            sat.x + Math.cos(a) * r,
            1.4,
            sat.z + Math.sin(a) * r,
            0.7 + Math.random() * 0.3,
            (Math.random() - 0.5) * 0.1
        );
    }
}


/* ─────────────────────────────────────────────
   7b. BOWLING EILAND — apart tropisch eiland in zee
   ─────────────────────────────────────────────
   Een los klein eilandje verder oostwaarts in zee, los van het
   hoofdeiland. De bowling-baan loopt OOST→WEST zodat de speler
   vanaf het oosten naar het westen werpt en in beeld het vulkaan-
   eiland in de verte als achtergrond ziet.

   Layout (van boven gezien):
       [pinnen]──[wooden alley]──[bowler]
       west                          oost
       (richting hoofdeiland)        (camera kant)
   ───────────────────────────────────────────── */
const BOWL = {
    cx: 82, cz: 0,
    alleyW: 2.4,             // smaller (was 3.0) — minder forgiving aim
    alleyL: 30,              // langere baan
    alleyTopY: 1.25,
    alleyH:    0.15,
    gutterW:   0.65,
    gutterTopY: 1.10,
    gutterH:    0.10,
    sandTopY:  1.05,
    waterY:    0.05,
    pinBaseY:  1.25,
    pinRad:    0.20,
    pinH:      0.65,
    ballRad:   0.32,
    pinSpacing: 0.55,
};
const bowlingPins = [];
// Bowling-apparatus is een aparte group die we tijdens het bowling-
// spel zichtbaar maken en daarna weer verbergen. Het ZAND-eiland
// blijft permanent staan (zandblobs, palmen, gras, rotsen) zodat
// we het in de toekomst kunnen hergebruiken voor andere minigames.
let bowlingApparatus = null;

(function buildBowlingIsland() {
    // ── PERMANENT EILAND ──────────────────────────────────────
    // Sand, rocks, foam, palms, grass — alles wat NIET met bowling
    // te maken heeft maar het eiland-decor vormt.
    const grp = new THREE.Group();
    scene.add(grp);

    // 1. Onderwater rotsbasis
    function rockBlob(x, z, r1, r2, h, y) {
        const m = new THREE.Mesh(
            deformCylinder(new THREE.CylinderGeometry(r1, r2, h, 16), 0.7),
            MAT.cliffDark);
        m.position.set(x, y, z);
        m.receiveShadow = true;
        grp.add(m);
        return m;
    }
    rockBlob(BOWL.cx - 9, 0,  7.5, 9.0, 3.0, -1.1);
    rockBlob(BOWL.cx,     0,  8.5, 10.0, 3.0, -1.1);
    rockBlob(BOWL.cx + 12, 0,  7.5, 9.0, 3.0, -1.1);    // verder oost voor langere baan

    // 2. Zand-blobs — breder eiland zodat langere baan past
    function sandBlob(x, z, r1, r2, h = 1.2, y = 0.45, deform = 0.50) {
        const m = new THREE.Mesh(
            deformCylinder(new THREE.CylinderGeometry(r1, r2, h, 18), deform),
            MAT.sand);
        m.position.set(x, y, z);
        m.castShadow = true; m.receiveShadow = true;
        grp.add(m);
        return m;
    }
    const sandW = sandBlob(BOWL.cx - 9, 0,    7.5, 9.5);
    addOutline(sandW, 1.018);
    const sandM = sandBlob(BOWL.cx,     -0.5, 8.0, 10.0);
    addOutline(sandM, 1.020);
    // Oost-blob verder oost zodat de langere baan + camera + gras
    // allemaal stevig op grond staan
    const sandE = sandBlob(BOWL.cx + 12, 0.5,  7.5, 9.5);
    addOutline(sandE, 1.018);
    sandBlob(BOWL.cx - 6,  -7.5, 2.7, 3.1, 0.95, 0.40, 0.65);
    sandBlob(BOWL.cx - 4,   7.5, 2.9, 3.3, 0.95, 0.40, 0.60);
    sandBlob(BOWL.cx + 4,  -7.5, 2.5, 2.9, 0.90, 0.40, 0.70);
    sandBlob(BOWL.cx + 6,   7.5, 2.7, 3.1, 0.95, 0.40, 0.60);
    sandBlob(BOWL.cx + 13, -2.5, 2.2, 2.6, 0.85, 0.40, 0.65);

    // 3. Grasplek (decor) — PLAT zodat de bowlingbaan eroverheen
    //    kan lopen tijdens het spel. Hoogte 0.03 zodat de gras-top
    //    op y=1.08 zit — duidelijk ONDER de gutter top (y=1.10)
    //    en de alley top (y=1.25). Geen z-fighting.
    const grassMound = new THREE.Mesh(
        deformCylinder(new THREE.CylinderGeometry(3.8, 4.5, 0.03, 14), 0.30),
        MAT.grass);
    grassMound.position.set(BOWL.cx + 14, 1.065, 0);    // top y=1.08
    grassMound.castShadow = true; grassMound.receiveShadow = true;
    grp.add(grassMound);
    addOutline(grassMound, 1.012);

    // 4. Foam-ringen langs de waterlijn (animated)
    const foamW = addFoamRing(grp, 7.7, 9.2);
    foamW.position.set(BOWL.cx - 9, 0.12, 0); animatedFoam.push(foamW);
    const foamM = addFoamRing(grp, 8.2, 9.9);
    foamM.position.set(BOWL.cx, 0.12, -0.5); animatedFoam.push(foamM);
    const foamE = addFoamRing(grp, 7.7, 9.2);
    foamE.position.set(BOWL.cx + 12, 0.12, 0.5); animatedFoam.push(foamE);

    // 5. Palmen ALLEEN aan buitenrand (ver van POV-cone)
    makePalm(BOWL.cx - 7, 1.40, -8.5, 0.85, 0.15);
    makePalm(BOWL.cx - 5, 1.40,  9.0, 0.90, -0.18);
    makePalm(BOWL.cx,     1.40, -9.0, 0.95, 0.20);
    makePalm(BOWL.cx + 1, 1.40,  8.5, 0.85, -0.15);
    makePalm(BOWL.cx + 4, 1.40, -8.5, 0.80, 0.22);
    makePalm(BOWL.cx + 6, 1.40,  9.0, 0.90, -0.20);

    // Bushes — losse decoratie
    const bushMat = new THREE.MeshToonMaterial({
        color: 0x4a8a3a, gradientMap: toon });
    for (const [bxOff, bz] of [[-6, -6.5], [-3, 6.5], [4, -6.5],
                               [7, 6.0], [13, -3.0], [13, 3.0]]) {
        // Gras is nu plat, dus alle bushes op zelfde hoogte
        const bush = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 10, 8), bushMat);
        bush.scale.set(1.2, 0.8, 1.2);
        bush.position.set(BOWL.cx + bxOff, 1.35, bz);
        bush.castShadow = true;
        grp.add(bush);
    }

    // ── BOWLING APPARATUS (verbergbare group) ─────────────────
    // Alle bowling-specifieke geometrie. Verborgen by default —
    // wordt zichtbaar als playBowling start, weg na finish.
    bowlingApparatus = new THREE.Group();
    bowlingApparatus.visible = false;
    scene.add(bowlingApparatus);

    // Houten bowling-baan (LANGER nu, 22 units ipv 14)
    const alleyMat = new THREE.MeshToonMaterial({
        color: 0xd4a86a, gradientMap: toon,
        emissive: 0x6d4c2a, emissiveIntensity: 0.05,
    });
    const alley = new THREE.Mesh(
        new THREE.BoxGeometry(BOWL.alleyL, BOWL.alleyH, BOWL.alleyW),
        alleyMat);
    alley.position.set(BOWL.cx, BOWL.alleyTopY - BOWL.alleyH / 2, BOWL.cz);
    alley.castShadow = true; alley.receiveShadow = true;
    bowlingApparatus.add(alley);

    const sideWallMat = new THREE.MeshToonMaterial({
        color: 0x6d4c2a, gradientMap: toon });
    for (const zSide of [-1, 1]) {
        const wall = new THREE.Mesh(
            new THREE.BoxGeometry(BOWL.alleyL + 0.02, BOWL.alleyH, 0.04),
            sideWallMat);
        wall.position.set(BOWL.cx,
            BOWL.alleyTopY - BOWL.alleyH / 2,
            BOWL.cz + zSide * (BOWL.alleyW / 2 + 0.02));
        bowlingApparatus.add(wall);
    }

    const lineMat = new THREE.MeshToonMaterial({ color: 0x6d4c2a, gradientMap: toon });
    for (let i = -2; i <= 2; i++) {
        if (i === 0) continue;
        const line = new THREE.Mesh(
            new THREE.BoxGeometry(BOWL.alleyL, 0.005, 0.04),
            lineMat);
        line.position.set(BOWL.cx, BOWL.alleyTopY + 0.005,
            BOWL.cz + i * (BOWL.alleyW / 5));
        bowlingApparatus.add(line);
    }

    // Gutters
    const gutterMat = new THREE.MeshToonMaterial({
        color: 0x5a3a1a, gradientMap: toon,
        emissive: 0x1a0a05, emissiveIntensity: 0.05 });
    for (const zSide of [-1, 1]) {
        const gutter = new THREE.Mesh(
            new THREE.BoxGeometry(BOWL.alleyL, BOWL.gutterH, BOWL.gutterW),
            gutterMat);
        gutter.position.set(BOWL.cx,
            BOWL.gutterTopY - BOWL.gutterH / 2,
            BOWL.cz + zSide * (BOWL.alleyW / 2 + BOWL.gutterW / 2));
        gutter.castShadow = true; gutter.receiveShadow = true;
        bowlingApparatus.add(gutter);
        const wall = new THREE.Mesh(
            new THREE.BoxGeometry(BOWL.alleyL + 0.02, BOWL.alleyH, 0.04),
            sideWallMat);
        wall.position.set(BOWL.cx, BOWL.alleyTopY - BOWL.alleyH / 2,
            BOWL.cz + zSide * (BOWL.alleyW / 2 + BOWL.gutterW + 0.02));
        bowlingApparatus.add(wall);
    }

    // 10 Pinnen — pin 1 vooraan (oost-kant, dichtst bij speler)
    const pinBodyMat = new THREE.MeshToonMaterial({
        color: 0xfff5e0, gradientMap: toon,
        emissive: 0xc89a4a, emissiveIntensity: 0.10,
    });
    const stripeMat = new THREE.MeshToonMaterial({
        color: 0xd03030, gradientMap: toon,
    });
    function makePin() {
        const g = new THREE.Group();
        const body = new THREE.Mesh(
            new THREE.CylinderGeometry(0.13, 0.20, 0.50, 14), pinBodyMat);
        body.position.y = 0.25;
        body.castShadow = true;
        g.add(body);
        const neck = new THREE.Mesh(
            new THREE.SphereGeometry(0.13, 10, 8), pinBodyMat);
        neck.position.y = 0.50;
        g.add(neck);
        const head = new THREE.Mesh(
            new THREE.SphereGeometry(0.155, 12, 10), pinBodyMat);
        head.position.y = 0.58;
        head.castShadow = true;
        g.add(head);
        const stripe = new THREE.Mesh(
            new THREE.CylinderGeometry(0.165, 0.165, 0.05, 12), stripeMat);
        stripe.position.y = 0.43;
        g.add(stripe);
        return g;
    }
    const triangle = [
        [0, 0],
        [-0.5, 1], [0.5, 1],
        [-1, 2], [0, 2], [1, 2],
        [-1.5, 3], [-0.5, 3], [0.5, 3], [1.5, 3],
    ];
    const triangleStartX = BOWL.cx - BOWL.alleyL / 2 + 3.5;
    for (let i = 0; i < triangle.length; i++) {
        const [xOff, zOff] = triangle[i];
        const pin = makePin();
        const px = triangleStartX - zOff * BOWL.pinSpacing * 0.95;
        const pz = BOWL.cz + xOff * BOWL.pinSpacing;
        pin.position.set(px, BOWL.pinBaseY, pz);
        pin.userData.basePos = pin.position.clone();
        pin.userData.baseQuat = pin.quaternion.clone();
        pin.userData.fallen = false;
        pin.userData.pinNum = i + 1;
        bowlingApparatus.add(pin);
        bowlingPins.push(pin);
    }
})();


/* ─────────────────────────────────────────────
   7c. MYSTERY WHEEL — bamboo strand-kraam op Bowl Eiland
   ─────────────────────────────────────────────
   Een echt 3D draaibord in een bamboe kraam, op het OOSTELIJKE
   deel van Bowl Eiland. Camera vliegt vanaf oost (zee-kant) naar
   west zodat Volkaan Eiland in de verte achter het rad zichtbaar
   is. Het hele apparaat is verborgen tot playMysteryWheel het
   activeert, en wordt weer onzichtbaar na de minigame.

   Structure:
     mysteryStall          (Group) — alle bamboe + dak + sign + axle
     ├─ posts (4×)         vertikale bamboe palen
     ├─ beams              horizontale dwarsbalken bovenaan
     ├─ thatched roof      dubbele schuine "rieten" panelen + nokbalk
     ├─ backboard          paneel achter het rad
     ├─ counter            bamboe toonbank vooraan
     ├─ sign               "MYSTERY WHEEL" bord
     ├─ axle               horizontale as door rad
     ├─ pointer (vast)     gouden pijl bovenaan, niet draaiend
     └─ mysteryWheelSpin   (Group) — alleen DIT roteert om wereld-X
        ├─ disc back       achterkant (donker hout)
        ├─ rim             rand-cilinder (donker)
        ├─ disc front      schijf met segment-textuur (rebuilt per opties)
        ├─ pegs (N×)       kleine cilinders op rim (op segment-randen)
        └─ hub             gouden naaf met 🌋 emoji
   ───────────────────────────────────────────── */
const MWHEEL = {
    cx:     BOWL.cx + 6,    // 88 — iets oost van bowling-centrum
    cz:     BOWL.cz,
    floorY: BOWL.sandTopY,  // staat op het zand, top y=1.05
    wheelY: 2.75,           // wereld-Y van de as = midden van postH/2
    radius: 2.1,            // groter (was 1.8) — meer "wow" in beeld
    thick:  0.18,
    postH:  5.5,            // hoger (was 4.6) — rad past nu mooi onder dak
    stallW: 4.0,            // depth X-axis (was 5.2) — kleiner OK
    stallD: 5.8,            // width Z-axis (was 3.2) — moet > 3.6 (rad-diameter)
    pegRad: 0.07,
    pegLen: 0.22,
};

// Module-level state — lazy gebouwd bij eerste playMysteryWheel call.
let mysteryStall = null;          // outer group (alles)
let mysteryWheelSpin = null;      // inner group dat roteert om X-as
let mysteryWheelFaceMeshes = [];  // wedges + labels + pegs — wegooien als opties veranderen
let mysteryWheelOptionsKey = '';  // cache-sleutel voor opties (vermijd onnodige rebuilds)

/* makeBambooPost — 1 bamboo paal als Group met ringen */
function makeBambooPost(height) {
    const g = new THREE.Group();
    const lightMat = new THREE.MeshToonMaterial({
        color: 0xd4b06a, gradientMap: toon });
    const darkMat = new THREE.MeshToonMaterial({
        color: 0x8a6428, gradientMap: toon });
    const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.13, 0.15, height, 10), lightMat);
    pole.position.y = height / 2;
    pole.castShadow = true;
    pole.receiveShadow = true;
    g.add(pole);
    addOutline(pole, 1.03);
    const nodes = 5;
    for (let i = 1; i <= nodes; i++) {
        const ring = new THREE.Mesh(
            new THREE.CylinderGeometry(0.16, 0.16, 0.07, 12), darkMat);
        ring.position.y = (height / (nodes + 1)) * i;
        g.add(ring);
    }
    return g;
}

/* makeBambooBeam — horizontale balk tussen twee 2D punten (x,z) op hoogte y */
function makeBambooBeam(x1, z1, x2, z2, y, radius = 0.12) {
    const dx = x2 - x1, dz = z2 - z1;
    const len = Math.hypot(dx, dz);
    const mat = new THREE.MeshToonMaterial({
        color: 0xc89e58, gradientMap: toon });
    const m = new THREE.Mesh(
        new THREE.CylinderGeometry(radius, radius, len, 8), mat);
    m.castShadow = true;
    m.position.set((x1 + x2) / 2, y, (z1 + z2) / 2);
    m.rotation.z = Math.PI / 2;
    m.rotation.y = -Math.atan2(dz, dx);
    return m;
}

/* makeMysterySignTexture — houten bord met "MYSTERY WHEEL" tekst */
function makeMysterySignTexture() {
    const W = 1024, H = 256;
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#c89456');
    grad.addColorStop(1, '#8e6028');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#3a2410';
    ctx.lineWidth = 14;
    ctx.strokeRect(7, 7, W - 14, H - 14);
    // houtnerf
    ctx.strokeStyle = 'rgba(50,30,10,0.25)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.moveTo(40, 30 + i * 40);
        ctx.bezierCurveTo(W * 0.3, 20 + i * 40, W * 0.7, 40 + i * 40, W - 40, 30 + i * 40);
        ctx.stroke();
    }
    ctx.font = 'bold 110px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff7e0';
    ctx.strokeStyle = '#2a1800';
    ctx.lineWidth = 10;
    ctx.lineJoin = 'round';
    ctx.strokeText('🎡 MYSTERY WHEEL', W / 2, H / 2);
    ctx.fillText('🎡 MYSTERY WHEEL', W / 2, H / 2);
    const tex = new THREE.CanvasTexture(c);
    tex.anisotropy = 4;
    return tex;
}

/* makeMysteryWheelFaceTexture — tekent het rad-vlak (wedges + labels)
   op een vierkant canvas dat we als textuur op de front-disc gebruiken.

   CONVENTIES (zie ook winnerIndex):
   - Canvas (0,0) = links-boven, Y groeit naar BENEDEN.
   - Het rad wordt op een CircleGeometry gemapd, met mesh.rotation.y=+π/2
     zodat zijn normaal langs wereld +X (oost, richting camera) wijst.
   - Daarmee komt canvas TOP (Y=0) overeen met wereld TOP (+Y), en
     canvas RIGHT (X=W) met viewer's RIGHT (= wereld -Z). Geen mirror.
   - Segment i is GECENTREERD op canvas hoek α_i = -π/2 + i*segAng
     en strekt van α_i - segAng/2 tot α_i + segAng/2.
     (α=-π/2 = canvas TOP; canvas hoek toeneemt = visual CW.)
   - Bij rotation.x = 0 zit segment 0's CENTRUM dus precies onder de
     pijl bovenaan.
*/
function makeMysteryWheelFaceTexture(options) {
    const SZ = 1024;
    const c = document.createElement('canvas');
    c.width = SZ; c.height = SZ;
    const ctx = c.getContext('2d');
    const cx = SZ / 2, cy = SZ / 2;
    const R  = SZ / 2 - 8;
    const N  = options.length;
    const segAng = (Math.PI * 2) / N;

    // Helper: brighten een hex-kleur met factor (default +22%)
    // Behoudt de tint maar maakt 'm levendiger.
    function brighten(hex, factor = 1.22) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgb(${Math.min(255, Math.round(r * factor))},`
             + `${Math.min(255, Math.round(g * factor))},`
             + `${Math.min(255, Math.round(b * factor))})`;
    }

    ctx.clearRect(0, 0, SZ, SZ);

    ctx.beginPath();
    ctx.arc(cx, cy, R + 4, 0, Math.PI * 2);
    ctx.fillStyle = '#2a1a08';
    ctx.fill();

    // ── WEDGES ──
    for (let i = 0; i < N; i++) {
        const aMid = -Math.PI / 2 + i * segAng;
        const aStart = aMid - segAng / 2;
        const aEnd   = aMid + segAng / 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, R, aStart, aEnd, false);
        ctx.closePath();
        // Brightened segment-kleur voor meer levendigheid
        ctx.fillStyle = brighten(options[i].color);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.55)';
        ctx.lineWidth = 4;
        ctx.stroke();
        // Lichtere glans-overlay (minder donker aan de rand)
        // Voorheen: 0.25 / 0.05 / 0.18-DARK. Nu: meer white, minder
        // dark, dus de wedges blijven hun helle kleur tonen.
        const radial = ctx.createRadialGradient(cx, cy, R * 0.15, cx, cy, R);
        radial.addColorStop(0,    'rgba(255,255,255,0.32)');
        radial.addColorStop(0.55, 'rgba(255,255,255,0.12)');
        radial.addColorStop(1,    'rgba(0,0,0,0.08)');
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, R, aStart, aEnd, false);
        ctx.closePath();
        ctx.fillStyle = radial;
        ctx.fill();
    }

    // ── LABELS (emoji + tekst, geroteerd zodat het radiaal leest) ──
    for (let i = 0; i < N; i++) {
        const aMid = -Math.PI / 2 + i * segAng;
        const labR = R * 0.62;
        const lx = cx + labR * Math.cos(aMid);
        const ly = cy + labR * Math.sin(aMid);
        ctx.save();
        ctx.translate(lx, ly);
        // canvas-rotatie: positieve hoek = visual CW.
        // We willen dat de tekst van "binnen" naar "buiten" leest, met de
        // bodem van de letters naar het CENTRUM. Bij segment 0 (top) is
        // aMid = -π/2; tekst moet horizontaal staan. ctx.rotate(aMid + π/2)
        // geeft daar 0. Bij segment rechts (aMid = 0) krijgen we π/2 →
        // tekst leest naar beneden vanaf rechts (= van buiten naar binnen
        // gelezen, "voor de kijker rechts" tilt-head-rechts). Klassieke
        // prijzenrad look.
        ctx.rotate(aMid + Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // EMOJI (groter, boven het label)
        ctx.font = 'bold 72px "Apple Color Emoji", "Segoe UI Emoji", system-ui, sans-serif';
        ctx.fillStyle = '#ffffff';
        ctx.strokeStyle = 'rgba(0,0,0,0.85)';
        ctx.lineWidth = 5;
        ctx.lineJoin = 'round';
        // emoji vertikaal iets richting buitenrand
        ctx.strokeText(options[i].emoji, 0, -R * 0.18);
        ctx.fillText(options[i].emoji, 0, -R * 0.18);
        // LABEL TEKST onder de emoji
        ctx.font = 'bold 34px system-ui, -apple-system, sans-serif';
        ctx.fillStyle = '#ffffff';
        ctx.strokeStyle = 'rgba(0,0,0,0.9)';
        ctx.lineWidth = 6;
        ctx.strokeText(options[i].label, 0, R * 0.10);
        ctx.fillText(options[i].label, 0, R * 0.10);
        ctx.restore();
    }

    // dunne donkere rand om hele schijf (visuele afsluiting)
    ctx.beginPath();
    ctx.arc(cx, cy, R - 2, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.lineWidth = 6;
    ctx.stroke();

    const tex = new THREE.CanvasTexture(c);
    tex.anisotropy = 4;
    return tex;
}

/* buildMysteryStallOnce — bouwt alle PERMANENTE delen van de kraam
   (palen, dak, sign, axle, pointer, backboard, counter, achter-disc,
   rim) één keer. Het rad-vlak (wedges + labels + pegs + hub) wordt
   los gebouwd door applyMysteryOptionsToWheel(). */
function buildMysteryStallOnce() {
    if (mysteryStall) return;

    const stall = new THREE.Group();
    stall.position.set(MWHEEL.cx, MWHEEL.floorY, MWHEEL.cz);
    stall.visible = false;
    scene.add(stall);
    mysteryStall = stall;

    const halfW = MWHEEL.stallW / 2;
    const halfD = MWHEEL.stallD / 2;
    const topY  = MWHEEL.postH;

    // ── 4 hoekpalen ──
    for (const [px, pz] of [[-halfW, -halfD], [-halfW, halfD],
                            [ halfW, -halfD], [ halfW,  halfD]]) {
        const post = makeBambooPost(MWHEEL.postH);
        post.position.set(px, 0, pz);
        stall.add(post);
    }

    // ── Bovenbalken (frame onder dak) ──
    stall.add(makeBambooBeam(-halfW, -halfD,  halfW, -halfD, topY));   // front (oost)
    stall.add(makeBambooBeam(-halfW,  halfD,  halfW,  halfD, topY));   // back
    stall.add(makeBambooBeam(-halfW, -halfD, -halfW,  halfD, topY));   // west zijkant
    stall.add(makeBambooBeam( halfW, -halfD,  halfW,  halfD, topY));   // oost zijkant

    // ── Schuin "rieten" dak (twee panelen + nokbalk) ──
    //    De ridge loopt nu langs Z-as (de lange kant van de stall).
    //    Twee panelen die naar oost en west aflopen.
    const thatchDarkMat = new THREE.MeshToonMaterial({
        color: 0x7a5520, gradientMap: toon });
    const thatchLightMat = new THREE.MeshToonMaterial({
        color: 0xa68238, gradientMap: toon });
    const roofGeo = new THREE.BoxGeometry(halfW + 0.35, 0.14, MWHEEL.stallD + 0.7);
    const roofE = new THREE.Mesh(roofGeo, thatchDarkMat);
    roofE.position.set(halfW * 0.5, topY + 0.62, 0);
    roofE.rotation.z = -Math.PI / 7;
    roofE.castShadow = true;
    stall.add(roofE);
    addOutline(roofE, 1.012);
    const roofW = new THREE.Mesh(roofGeo, thatchDarkMat);
    roofW.position.set(-halfW * 0.5, topY + 0.62, 0);
    roofW.rotation.z = Math.PI / 7;
    roofW.castShadow = true;
    stall.add(roofW);
    addOutline(roofW, 1.012);
    // Nokbalk (langs Z-as, de lange kant)
    const ridge = new THREE.Mesh(
        new THREE.CylinderGeometry(0.10, 0.10, MWHEEL.stallD + 0.8, 8),
        new THREE.MeshToonMaterial({ color: 0x5a3f18, gradientMap: toon }));
    ridge.rotation.x = Math.PI / 2;
    ridge.position.set(0, topY + 1.05, 0);
    ridge.castShadow = true;
    stall.add(ridge);
    // Lichte riet-strepen op de panelen (langs Z-as)
    for (const xSide of [-1, 1]) {
        const stripe = new THREE.Mesh(
            new THREE.BoxGeometry(0.16, 0.05, MWHEEL.stallD + 0.5),
            thatchLightMat);
        stripe.position.set(xSide * halfW * 0.35, topY + 0.55 + 0.04, 0);
        stripe.rotation.z = xSide < 0 ? Math.PI / 7 : -Math.PI / 7;
        stall.add(stripe);
    }

    // ── Backboard verwijderd: kraampje is nu open, hoofdeiland +
    //    lucht zijn zichtbaar als achtergrond achter het rad ──

    // ── Counter (bamboe toonbank vóór de kraam — op oost-zijde,
    //    tussen camera en rad). Hangt iets BUITEN de stall. ──
    const counterMat = new THREE.MeshToonMaterial({
        color: 0xa67838, gradientMap: toon });
    const counter = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 0.18, MWHEEL.stallD - 0.4),
        counterMat);
    counter.position.set(halfW + 0.35, 0.95, 0);
    counter.castShadow = true;
    counter.receiveShadow = true;
    stall.add(counter);
    addOutline(counter, 1.012);
    for (const zSide of [-1, 1]) {
        const leg = new THREE.Mesh(
            new THREE.CylinderGeometry(0.07, 0.07, 0.95, 8), counterMat);
        leg.position.set(halfW + 0.35, 0.47, zSide * (halfD - 0.4));
        stall.add(leg);
    }

    // ── Sign-bord boven dak (steekt OOST uit, richting camera) ──
    const signMat = new THREE.MeshBasicMaterial({
        map: makeMysterySignTexture(), transparent: false });
    const sign = new THREE.Mesh(
        new THREE.PlaneGeometry(3.9, 0.95), signMat);
    sign.position.set(halfW * 0.5 + 0.4, topY + 1.85, 0);
    // Plane default normal = +Z. Roteer Y=π/2 zodat normal langs +X
    // (richting camera). Daarna kleine Z-tilt voor het "hangen".
    sign.rotation.y = Math.PI / 2;
    sign.rotation.z = -Math.PI / 9;
    stall.add(sign);
    for (const zs of [-1, 1]) {
        const stick = new THREE.Mesh(
            new THREE.CylinderGeometry(0.05, 0.05, 1.6, 6),
            new THREE.MeshToonMaterial({ color: 0xc89456, gradientMap: toon }));
        stick.position.set(halfW * 0.5 + 0.4 - 0.4, topY + 1.0, zs * 1.9);
        stick.rotation.x = zs * 0.08;
        stall.add(stick);
    }

    // ── Axle (horizontaal langs wereld-X, ACHTER het rad-vlak)
    //    nu op z=0 (gecentreerd in stall) ──
    const axleMat = new THREE.MeshToonMaterial({
        color: 0x3a2810, gradientMap: toon,
        emissive: 0x1a1208, emissiveIntensity: 0.2 });
    const axleLen = 1.2;
    const axle = new THREE.Mesh(
        new THREE.CylinderGeometry(0.09, 0.09, axleLen, 10), axleMat);
    axle.rotation.z = Math.PI / 2;
    axle.position.set(0, MWHEEL.wheelY, 0);    // z=0 — center
    axle.castShadow = true;
    stall.add(axle);
    const axleCap = new THREE.Mesh(
        new THREE.SphereGeometry(0.13, 12, 10),
        new THREE.MeshToonMaterial({ color: 0xffd54a, gradientMap: toon,
            emissive: 0x885500, emissiveIntensity: 0.4 }));
    axleCap.position.set(axleLen / 2 - 0.05, MWHEEL.wheelY, 0);
    stall.add(axleCap);

    // ── Pointer (vast, gouden pijl bovenaan, ook gecentreerd) ──
    const pointerMat = new THREE.MeshToonMaterial({
        color: 0xffd54a, gradientMap: toon,
        emissive: 0x885500, emissiveIntensity: 0.55 });
    const pointer = new THREE.Mesh(
        new THREE.ConeGeometry(0.18, 0.42, 4), pointerMat);
    pointer.rotation.x = Math.PI;
    pointer.rotation.y = Math.PI / 4;
    pointer.position.set(0, MWHEEL.wheelY + MWHEEL.radius + 0.18, 0);
    pointer.castShadow = true;
    stall.add(pointer);
    addOutline(pointer, 1.08);
    const pointerBall = new THREE.Mesh(
        new THREE.SphereGeometry(0.13, 12, 10), pointerMat);
    pointerBall.position.set(0, MWHEEL.wheelY + MWHEEL.radius + 0.45, 0);
    stall.add(pointerBall);

    // ── Spin-group: gecentreerd in stall (z=0) ──
    const spin = new THREE.Group();
    spin.position.set(0, MWHEEL.wheelY, 0);    // z=0 — center
    stall.add(spin);
    mysteryWheelSpin = spin;

    // Achterkant van rad (permanent — niet opties-afhankelijk)
    const backDiscMat = new THREE.MeshToonMaterial({
        color: 0x5a3a18, gradientMap: toon });
    const backDisc = new THREE.Mesh(
        new THREE.CircleGeometry(MWHEEL.radius, 64), backDiscMat);
    backDisc.rotation.y = -Math.PI / 2;
    backDisc.position.x = -MWHEEL.thick / 2;
    spin.add(backDisc);

    // Rim (open cilinder rond rad) — donker hout
    const rimMat = new THREE.MeshToonMaterial({
        color: 0x3a2410, gradientMap: toon });
    const rim = new THREE.Mesh(
        new THREE.CylinderGeometry(MWHEEL.radius * 1.02,
                                    MWHEEL.radius * 1.02,
                                    MWHEEL.thick, 64, 1, true),
        rimMat);
    rim.rotation.z = Math.PI / 2;
    spin.add(rim);

    // Gouden naaf in midden (permanent — niet opties-afhankelijk)
    const hubMat = new THREE.MeshToonMaterial({
        color: 0xffd54a, gradientMap: toon,
        emissive: 0xb86c00, emissiveIntensity: 0.5 });
    const hub = new THREE.Mesh(
        new THREE.CylinderGeometry(MWHEEL.radius * 0.18,
                                    MWHEEL.radius * 0.18,
                                    MWHEEL.thick + 0.04, 24),
        hubMat);
    hub.rotation.z = Math.PI / 2;
    spin.add(hub);
    addOutline(hub, 1.06);
    // Mini-emoji op de naaf (canvas-sprite, blijft zichtbaar bij elke draai)
    const hubCanv = document.createElement('canvas');
    hubCanv.width = 256; hubCanv.height = 256;
    const hctx = hubCanv.getContext('2d');
    hctx.font = 'bold 180px "Apple Color Emoji", "Segoe UI Emoji", system-ui';
    hctx.textAlign = 'center';
    hctx.textBaseline = 'middle';
    hctx.fillText('🌋', 128, 138);
    const hubTex = new THREE.CanvasTexture(hubCanv);
    const hubFaceMat = new THREE.MeshBasicMaterial({
        map: hubTex, transparent: true });
    const hubFace = new THREE.Mesh(
        new THREE.CircleGeometry(MWHEEL.radius * 0.17, 24), hubFaceMat);
    hubFace.rotation.y = Math.PI / 2;
    hubFace.position.x = MWHEEL.thick / 2 + 0.003;
    spin.add(hubFace);
}

/* applyMysteryOptionsToWheel — herbouwt het rad-vlak voor de gegeven
   optie-lijst. Wedges/labels (canvas-texture op front-disc) + pegs op
   rim. Wordt elke playMysteryWheel-call aangeroepen, maar bewaakt
   redundante rebuilds via mysteryWheelOptionsKey. */
function applyMysteryOptionsToWheel(options) {
    if (!mysteryWheelSpin) return;
    // cache-check
    const key = options.map(o => o.id + ':' + o.color).join('|');
    if (key === mysteryWheelOptionsKey && mysteryWheelFaceMeshes.length > 0) {
        return;
    }
    mysteryWheelOptionsKey = key;

    // Verwijder oude meshes
    for (const m of mysteryWheelFaceMeshes) {
        mysteryWheelSpin.remove(m);
        if (m.geometry) m.geometry.dispose();
        if (m.material) {
            if (m.material.map) m.material.map.dispose();
            m.material.dispose();
        }
    }
    mysteryWheelFaceMeshes.length = 0;

    // Front-disc met canvas-texture
    // MeshBasicMaterial — geen licht-shading, dus kleuren komen
    // EXACT door zoals in de texture-canvas. ToonMaterial dimde
    // de kleuren door scene-lighting en gradient-banding.
    const faceTex = makeMysteryWheelFaceTexture(options);
    const faceMat = new THREE.MeshBasicMaterial({
        map: faceTex, transparent: true,
        side: THREE.FrontSide });
    const faceGeo = new THREE.CircleGeometry(MWHEEL.radius, 64);
    const faceDisc = new THREE.Mesh(faceGeo, faceMat);
    faceDisc.rotation.y = Math.PI / 2;            // normaal langs +X (oost)
    faceDisc.position.x = MWHEEL.thick / 2 + 0.002;
    faceDisc.castShadow = false;
    faceDisc.receiveShadow = false;
    mysteryWheelSpin.add(faceDisc);
    mysteryWheelFaceMeshes.push(faceDisc);

    // Pegs op rim (op segment-RANDEN — N stuks tussen N segmenten)
    const N = options.length;
    const segAng = (Math.PI * 2) / N;
    const pegMat = new THREE.MeshToonMaterial({
        color: 0xe6c98a, gradientMap: toon,
        emissive: 0x3a2a10, emissiveIntensity: 0.2 });
    for (let i = 0; i < N; i++) {
        // Peg op segment-RAND tussen segment i en (i-1) — die rand zit
        // op canvas-hoek α_i_start = -π/2 + i*segAng - segAng/2.
        // In wereld: positie op (0, sin(β), -cos(β)) waarbij β =
        // π/2 - (segment-start canvas hoek + π/2) = -segment_start_canvas
        // ... simpeler: bij rotation.x=0, pegs staan op vaste posities
        // rond de rim. We plaatsen ze op de RANDEN tussen segmenten:
        //   wereld hoek vanaf TOP (CW positief) = i*segAng (rand voor seg i)
        //   wereld positie (vóór spin) = (0, R*cos(α_w), R*sin(α_w)·(-1))
        // waarbij α_w = i*segAng. Maar omdat spin op rotation.x werkt en
        // pegs in mysteryWheelSpin zitten, gebruiken we LOCAL coords:
        //   local pos vóór spin == wereld pos vóór spin
        const aFromTop = i * segAng;  // CW vanaf top
        const py = Math.cos(aFromTop) * (MWHEEL.radius - 0.02);
        const pz = Math.sin(aFromTop) * (MWHEEL.radius - 0.02);
        // bovenste peg (i=0) MOET op canvas TOP staan, NIET op een rand.
        // We willen pegs op de randen TUSSEN segmenten — die zitten op
        // canvas-hoek -π/2 ± segAng/2, dus aFromTop verschoven met halve
        // segment. Pas i*segAng aan naar (i+0.5)*segAng:
        const aRand = (i + 0.5) * segAng;
        const ry = Math.cos(aRand) * (MWHEEL.radius - 0.02);
        const rz = Math.sin(aRand) * (MWHEEL.radius - 0.02);
        const peg = new THREE.Mesh(
            new THREE.CylinderGeometry(MWHEEL.pegRad, MWHEEL.pegRad,
                                        MWHEEL.pegLen, 8), pegMat);
        peg.rotation.z = Math.PI / 2;          // as langs X (steekt vooruit)
        peg.position.set(MWHEEL.thick / 2 + MWHEEL.pegLen / 2 - 0.04,
                         ry, rz);
        peg.castShadow = true;
        mysteryWheelSpin.add(peg);
        mysteryWheelFaceMeshes.push(peg);
        // Vermijd unused-var warning (py/pz waren intermediate)

const _m = new THREE.Matrix4();
const _q = new THREE.Quaternion();
const _p = new THREE.Vector3();
const _s = new THREE.Vector3();

function scatterOnIsland(count, callback, includeSatellites = true) {
    let i = 0;
    while (i < count) {
        // pick an island slot
        let target;
        if (includeSatellites && Math.random() < 0.35) {
            target = satellites[Math.floor(Math.random() * satellites.length)];
            const a = Math.random() * Math.PI * 2;
            const r = Math.random() * target.radius * 0.85;
            _p.set(target.x + Math.cos(a) * r, target.topY - 0.5, target.z + Math.sin(a) * r);
        } else {
            // main island, choose terrace
            const lvl = Math.random();
            let radius, y;
            if (lvl < 0.4) { radius = 8 + Math.random() * 2; y = 1.4; }
            else if (lvl < 0.75) { radius = 4 + Math.random() * 4; y = 2.9; }
            else { radius = 1.5 + Math.random() * 3; y = 4.6; }
            const a = Math.random() * Math.PI * 2;
            _p.set(Math.cos(a) * radius, y, Math.sin(a) * radius);
        }
        if (callback(_p, i)) i++;
    }
}

    const sc = 0.75 + Math.random() * 0.7;
    _s.set(sc, sc * (0.7 + Math.random() * 0.4), sc);

/* ─────────────────────────────────────────────
   12. ANIMATION LOOP
   ───────────────────────────────────────────── */

const clock = new THREE.Clock();
const _wv = new THREE.Vector3();

// pre-compute initial water positions (so we don't accumulate noise)
const waterInitialZ = new Float32Array(waterGeo.attributes.position.count);
{
    const p = waterGeo.attributes.position;
    for (let i = 0; i < p.count; i++) waterInitialZ[i] = p.getZ(i);
}

function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();

    controls.update();

    // ── water surface waves ──
    const wpos = waterGeo.attributes.position;
    for (let i = 0; i < wpos.count; i++) {
        const x = wpos.getX(i);
        const y = wpos.getY(i);
        const z =
            Math.sin(x * 0.22 + time * 1.1) * 0.32 +
            Math.cos(y * 0.27 + time * 1.4) * 0.28 +
            Math.sin((x + y) * 0.5 + time * 2.3) * 0.10;
        wpos.setZ(i, z);
    }
    wpos.needsUpdate = true;

    // ── sparkle pulsing (opacity oscillation) ──
    sparkleMat.opacity = 0.55 + Math.sin(time * 4) * 0.4;
    sparkles.rotation.y = time * 0.02;

    // ── animated foam rings (opacity pulse) ──
    for (let i = 0; i < animatedFoam.length; i++) {
        const f = animatedFoam[i];
        f.material.opacity = 0.55 + Math.sin(time * 1.5 + i * 0.7) * 0.18;
        const s = 1 + Math.sin(time * 1.2 + i * 0.5) * 0.015;
        f.scale.set(s, s, s);
    }

    // ── lava pulse ──
    MAT.lava.emissiveIntensity = 0.85 + Math.sin(time * 4) * 0.35;
    volcanoGlow.intensity = 2.2 + Math.sin(time * 3.2) * 0.7;
    crackMat.color.setHSL(0.06, 1.0, 0.5 + Math.sin(time * 5) * 0.1);

    // ── smoke rising ──
    for (const s of smokeParticles) {
        const t = (time * s.speed + s.phase) % 4;       // 0..4 lifespan
        const lifeT = t / 4;                              // 0..1
        s.mesh.position.set(
            Math.sin(time * 0.7 + s.phase) * 0.6 + s.drift,
            12.8 + lifeT * 4.4,
            Math.cos(time * 0.7 + s.phase) * 0.6
        );
        s.mesh.material.opacity = 0.55 * (1 - lifeT);
        const sc = 0.6 + lifeT * 1.8;
        s.mesh.scale.set(sc, sc, sc);
    }

    // ── tile bounce + glow pulse ──
    for (const t of tiles) {
        if (t.isSummit) {
            // gold winner platform: bigger float, slow rotation, spinning star
            const bob = Math.sin(time * 1.4) * 0.18;
            t.mesh.position.y = t.baseY + bob;
            t.mesh.rotation.y = time * 0.4;
            if (t.starGroup) {
                t.starGroup.rotation.y = time * 2.0;
                t.starGroup.rotation.x = Math.sin(time * 1.3) * 0.2;
                t.starGroup.position.y = 1.25 + Math.sin(time * 1.8) * 0.12;
            }
        } else if (t.isDanger) {
            // satellite punishment tile: slow bob + slight tilt
            const bounce = Math.sin(time * 1.8 + t.phase) * 0.08;
            t.mesh.position.y = t.baseY + bounce;
            t.mesh.rotation.y = Math.sin(time * 0.5 + t.phase) * 0.15;
        } else {
            // regular path tile: small bounce + breathing scale
            const bounce = Math.sin(time * 2 + t.phase) * 0.06;
            t.mesh.position.y = t.baseY + bounce + 0.06;
            const s = 1 + Math.sin(time * 1.8 + t.phase) * 0.04;
            t.mesh.scale.set(s, 1, s);
        }
        // Animate decoration meshes on special tiles
        if (t.bobMesh) {
            const baseY = t.bobMesh.userData.baseY ?? (t.bobMesh.userData.baseY = t.bobMesh.position.y);
            if (t.type === 'tornado') {
                // spin like a tornado
                t.bobMesh.rotation.y = time * 5.0;
                t.bobMesh.position.y = baseY + Math.sin(time * 3 + t.phase) * 0.08;
            } else if (t.type === 'ufo') {
                // hover and slowly rotate
                t.bobMesh.rotation.y = time * 1.5;
                t.bobMesh.position.y = baseY + Math.sin(time * 2 + t.phase) * 0.18;
            } else if (t.type === 'bluestatue' || t.type === 'redstatue') {
                // bob and slow rotate
                t.bobMesh.position.y = baseY + Math.sin(time * 2.5 + t.phase) * 0.15;
                t.bobMesh.rotation.y = time * 0.8;
            } else if (t.type === 'skull') {
                // ominous small bob
                t.bobMesh.position.y = baseY + Math.sin(time * 1.5 + t.phase) * 0.04;
                t.bobMesh.rotation.y = Math.sin(time * 0.6) * 0.4;
            } else {
                // plus/minus/drink — soft bob
                t.bobMesh.position.y = baseY + Math.sin(time * 3 + t.phase) * 0.10;
            }
        }
    }
    // floating warning markers on danger tiles spin around their tile
    for (const m of dangerMarkers) {
        m.rotation.y = time * 2.5;
        m.rotation.x = time * 1.7;
    }

    // shared emissive pulse per tile color
    const e = 0.4 + Math.sin(time * 2.5) * 0.2;
    TILE_MATS.blue.emissiveIntensity   = e * 0.9;
    TILE_MATS.red.emissiveIntensity    = e * 0.9;
    TILE_MATS.green.emissiveIntensity  = e * 0.9;
    TILE_MATS.purple.emissiveIntensity = 0.55 + Math.sin(time * 3.5) * 0.3;
    TILE_MATS.yellow.emissiveIntensity = 0.55 + Math.sin(time * 4)   * 0.3;
    TILE_MATS.lava.emissiveIntensity   = 0.85 + Math.sin(time * 5)   * 0.35;
    TILE_MATS.cyan.emissiveIntensity   = 0.55 + Math.sin(time * 3.2) * 0.3;
    TILE_MATS.pink.emissiveIntensity   = 0.55 + Math.sin(time * 3.8) * 0.3;
    TILE_MATS.teal.emissiveIntensity   = 0.55 + Math.sin(time * 4.4) * 0.3;
    TILE_MATS.bluestatue.emissiveIntensity = 0.9 + Math.sin(time * 4.0) * 0.4;
    TILE_MATS.redstatue.emissiveIntensity  = 0.9 + Math.sin(time * 4.2) * 0.4;
    TILE_MATS.ufo.emissiveIntensity        = 0.7 + Math.sin(time * 3.6) * 0.3;
    TILE_MATS.tornado.emissiveIntensity    = 0.5 + Math.sin(time * 6.0) * 0.25;
    TILE_MATS.skull.emissiveIntensity      = 0.15 + Math.sin(time * 1.2) * 0.10;
    // gold + danger material pulses
    goldMat.emissiveIntensity   = 0.7 + Math.sin(time * 2.5) * 0.35;
    dangerMat.emissiveIntensity = 0.65 + Math.sin(time * 3.5) * 0.35;

    // ── palm tree swaying ──
    for (const p of palms) {
        p.crown.rotation.z = Math.sin(time * 1.3 + p.phase) * p.windAmp;
        p.crown.rotation.x = Math.cos(time * 1.1 + p.phase) * p.windAmp * 0.6;
    }

    // ── tiki flames flicker ──
    for (const tk of tikis) {
        const f = 0.85 + Math.sin(time * 18 + tk.phase) * 0.12 + Math.random() * 0.05;
        tk.flame.scale.set(f, f * (1 + Math.sin(time * 12 + tk.phase) * 0.15), f);
        tk.light.intensity = 0.4 + Math.sin(time * 15 + tk.phase) * 0.2;
    }

    // ── clouds drifting + slow rotate ──
    for (const c of clouds) {
        c.group.position.x = c.baseX + Math.sin(time * 0.08 + c.phase) * 4;
        c.group.position.y += Math.sin(time * 0.4 + c.phase) * 0.003;
        c.group.rotation.y += c.drift * 0.04;
    }

    // ── birds flying in lazy circles ──
    for (const b of birds) {
        const a = time * b.speed + b.phase;
        b.mesh.position.set(
            Math.cos(a) * b.radius,
            b.height + Math.sin(a * 1.5) * 1.2,
            Math.sin(a) * b.radius
        );
        b.mesh.rotation.y = -a + Math.PI / 2;
        // flap wings via Y-scale
        b.mesh.scale.y = 1 + Math.sin(time * 8 + b.flapPhase) * 0.6;
    }

    // ── pollen drifting ──
    const pp = pollen.geometry.attributes.position;
    for (let i = 0; i < POLLEN_COUNT; i++) {
        const d = pollenData[i];
        pp.setY(i, d.baseY + Math.sin(time * d.speed + d.phase) * 1.2);
        pp.setX(i, pp.getX(i) + Math.sin(time * 0.3 + d.phase) * 0.01);
    }
    pp.needsUpdate = true;

    // ── sun glow shimmer ──
    sunGlow.scale.setScalar(1 + Math.sin(time * 1.5) * 0.04);

    // ── game tokens idle bob (set by game layer below) ──
    if (typeof window.__deGameHook === 'function') window.__deGameHook(time);

    renderer.render(scene, camera);
}

// Apply the difficulty multiplier to a drink amount (always rounds up, min 1)
function slokken(base) {
    const m = DIFFICULTY_CONFIGS[G.difficulty]?.drinkMult ?? 1;
    return Math.max(1, Math.round(base * m));
}
// Same for knockback distance (min 1)
function knockBy(base) {
    const m = DIFFICULTY_CONFIGS[G.difficulty]?.knockMult ?? 1;
    return Math.max(1, Math.round(base * m));
}

// ── 3D player tokens (chess-piece-ish: cone on a disc with a sphere head) ──
const tokenGroup = new THREE.Group();
scene.add(tokenGroup);

function makePlayerToken(colorHex) {
    const g = new THREE.Group();
    const colMat   = new THREE.MeshToonMaterial({ color: colorHex, gradientMap: toon, emissive: colorHex, emissiveIntensity: 0.25 });
    const darkMat  = new THREE.MeshToonMaterial({ color: 0x101820, gradientMap: toon });

    // base disc
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.5, 0.18, 18), darkMat);
    base.position.y = 0.09; base.castShadow = true; g.add(base);

    // body cone
    const body = new THREE.Mesh(new THREE.ConeGeometry(0.36, 1.0, 16), colMat);
    body.position.y = 0.68; body.castShadow = true; g.add(body);

    // head sphere
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 14, 12), colMat);
    head.position.y = 1.32; head.castShadow = true; g.add(head);

    // white outline (back-side trick) on body+head for cartoon pop
    const outlineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.BackSide });
    const bodyOut = new THREE.Mesh(body.geometry, outlineMat); bodyOut.scale.set(1.12,1.06,1.12); body.add(bodyOut);
    const headOut = new THREE.Mesh(head.geometry, outlineMat); headOut.scale.setScalar(1.12); head.add(headOut);

    tokenGroup.add(g);
    return g;
}

// place tokens on a tile, fanned out so they don't perfectly overlap
function layoutTokensOnTile(tileIdx) {
    const occupants = G.players.filter(p => p.tileIdx === tileIdx);
    occupants.forEach((p, i) => {
        const base = tileWorldPos[tileIdx];
        const angle = (i / Math.max(1, occupants.length)) * Math.PI * 2;
        const r = occupants.length > 1 ? 0.32 : 0;
        const target = new THREE.Vector3(
            base.x + Math.cos(angle) * r,
            base.y + 0.25,
            base.z + Math.sin(angle) * r
        );
        // if currently animating, the loop owns the position
        if (!p._animating) p.token.position.copy(target);
        p._restTarget = target;
    });
}

// animate token tile-by-tile along the path; camera does a 3rd-person follow
function moveTokenAlong(player, steps, onDone) {
    player._animating = true;
    const prevAuto = controls.autoRotate;
    controls.autoRotate = false;

    // snapshot the orbit camera so we can ease back to it when done
    const savedCamPos = camera.position.clone();
    const savedTarget = controls.target.clone();

    // POV follow tuning
    const FOLLOW_DIST = 5.2;   // how far behind the pawn
    const FOLLOW_HEIGHT = 3.2; // how high above the pawn
    const TARGET_AHEAD = 1.4;  // look slightly ahead of the pawn along travel dir

    let stepsLeft = steps;
    const startTile = player.tileIdx;

    // pre-compute the easing into POV on the first step, out of POV on the last
    const stepOne = () => {
        if (stepsLeft <= 0) {
            // ease camera back to its normal orbit pose
            const easeBackFrom = camera.position.clone();
            const easeBackTargetFrom = controls.target.clone();
            const finalTile = tileWorldPos[player.tileIdx].clone();
            const restoreStart = performance.now();
            const restoreDur = 820;                            // was 600 — relaxter terug
            const easeBack = (now) => {
                const k = Math.min(1, (now - restoreStart) / restoreDur);
                // cubic-in-out: zachte start én zachte stop
                const e = k < 0.5
                    ? 4 * k * k * k
                    : 1 - Math.pow(-2*k + 2, 3) / 2;
                camera.position.lerpVectors(easeBackFrom, savedCamPos, e);
                controls.target.lerpVectors(easeBackTargetFrom, finalTile, e);
                if (k < 1) requestAnimationFrame(easeBack);
                else {
                    player._animating = false;
                    layoutTokensOnTile(player.tileIdx);
                    controls.target.copy(finalTile);
                    controls.autoRotate = prevAuto;
                    onDone && onDone();
                }
            };
            requestAnimationFrame(easeBack);
            return;
        }
        const next = Math.min(player.tileIdx + 1, TILE_COUNT - 1);
        const prev = player.tileIdx;
        const from = player.token.position.clone();
        const target = tileWorldPos[next].clone();
        target.y += 0.25;

        // direction along which the pawn is travelling this hop
        const travelDir = new THREE.Vector3().subVectors(target, from);
        travelDir.y = 0;
        if (travelDir.lengthSq() < 1e-4) travelDir.set(0, 0, 1);
        travelDir.normalize();
        // direction of the NEXT hop (for smoother look-ahead at end of hop)
        const after = tileWorldPos[Math.min(next + 1, TILE_COUNT - 1)];
        const nextDir = new THREE.Vector3().subVectors(after, tileWorldPos[next]);
        nextDir.y = 0;
        if (nextDir.lengthSq() < 1e-4) nextDir.copy(travelDir);
        nextDir.normalize();

        const camStart = camera.position.clone();
        const tgtStart = controls.target.clone();

        const isFirstHop = (stepsLeft === steps);
        const startTimestamp = performance.now();
        const dur = isFirstHop ? 540 : 360;   // was 420/320 — iets relaxter
        const arcH = 0.9;

        const tick = (now) => {
            const k = Math.min(1, (now - startTimestamp) / dur);
            // Cubic-in-out voor zachte start én zachte stop op de eerste hop
            // (entry into POV), simpele ease-out voor de vervolgstappen.
            const ease = isFirstHop
                ? (k < 0.5 ? 4*k*k*k : 1 - Math.pow(-2*k + 2, 3) / 2)
                : (1 - Math.pow(1 - k, 2.5));

            // pawn motion
            player.token.position.lerpVectors(from, target, ease);
            player.token.position.y += Math.sin(k * Math.PI) * arcH;

            // pawn-following camera
            // blend travel direction → next hop's direction near the end of this hop
            const dirBlend = travelDir.clone().lerp(nextDir, k * 0.6);
            dirBlend.normalize();

            const pawnPos = player.token.position;
            const desiredCam = new THREE.Vector3(
                pawnPos.x - dirBlend.x * FOLLOW_DIST,
                pawnPos.y + FOLLOW_HEIGHT,
                pawnPos.z - dirBlend.z * FOLLOW_DIST
            );
            const desiredTgt = new THREE.Vector3(
                pawnPos.x + dirBlend.x * TARGET_AHEAD,
                pawnPos.y + 0.6,
                pawnPos.z + dirBlend.z * TARGET_AHEAD
            );

            if (isFirstHop) {
                // ease IN to POV from the orbit pose
                camera.position.lerpVectors(camStart, desiredCam, ease);
                controls.target.lerpVectors(tgtStart, desiredTgt, ease);
            } else {
                // already in POV — soepele chase (lager = meer trailing/glide)
                camera.position.lerp(desiredCam, 0.13);   // was 0.18
                controls.target.lerp(desiredTgt, 0.17);   // was 0.22
            }

            if (k < 1) requestAnimationFrame(tick);
            else {
                player.tileIdx = next;
                stepsLeft--;
                setTimeout(stepOne, 60);
            }
        };
        requestAnimationFrame(tick);
    };
    stepOne();
}

// Move a token by N tiles (positive=forward, negative=backward), arc-hop style.
// Skips all "landed on tile" events — used for tornado/statue/UFO effects.
function moveTokenBy(player, deltaTiles, onDone) {
    if (deltaTiles === 0) { onDone && onDone(); return; }
    player._animating = true;
    const direction = Math.sign(deltaTiles);
    let stepsLeft = Math.abs(deltaTiles);

    const stepOne = () => {
        if (stepsLeft <= 0) {
            player._animating = false;
            layoutTokensOnTile(player.tileIdx);
            onDone && onDone();
            return;
        }
        const next = Math.max(0, Math.min(TILE_COUNT - 1, player.tileIdx + direction));
        if (next === player.tileIdx) {
            // can't go further
            stepsLeft = 0;
            setTimeout(stepOne, 60);
            return;
        }
        const from = player.token.position.clone();
        const target = tileWorldPos[next].clone();
        target.y += 0.25;
        const startTime = performance.now();
        const dur = 280;
        const arcH = 1.1;
        const tick = (now) => {
            const k = Math.min(1, (now - startTime) / dur);
            const ease = 1 - Math.pow(1 - k, 2.5);
            player.token.position.lerpVectors(from, target, ease);
            player.token.position.y += Math.sin(k * Math.PI) * arcH;
            if (k < 1) requestAnimationFrame(tick);
            else {
                player.tileIdx = next;
                stepsLeft--;
                setTimeout(stepOne, 60);
            }
        };
        requestAnimationFrame(tick);
    };
    stepOne();
}

// Instant teleport (for UFO swap)
function teleportTokenTo(player, tileIdx) {
    player.tileIdx = Math.max(0, Math.min(TILE_COUNT - 1, tileIdx));
    const pos = tileWorldPos[player.tileIdx].clone();
    pos.y += 0.25;
    player.token.position.copy(pos);
    layoutTokensOnTile(player.tileIdx);
}

// ════════════════════════════════════════════════════════════════
//  JAIL / BANANA BRIG PAWN MANAGEMENT
// ════════════════════════════════════════════════════════════════
//  Banana Brig satelliet staat op wereld (4, 0, -19) met grass-top
//  y=2.4. De stenen plateau zit op y=2.65, de bamboe-kooi op y=2.85
//  met radius 1.55 en hoogte 2.4 — binnenruimte ruim genoeg voor
//  meerdere pawns.
//
//  Een vastzittende speler's token gaat NAAR de jail-positie (binnen
//  de kooi), terwijl player.tileIdx blijft staan op de skull-tegel
//  waar 'ie verbannen werd. Bij ontsnappen vliegt de pawn terug naar
//  die tegel om vervolgens normaal te bewegen.
//
//  Bij meerdere gevangen spelers worden ze in een klein cirkeltje
//  binnen de kooi gerangschikt.
// ════════════════════════════════════════════════════════════════
const JAIL_WORLD_POS = new THREE.Vector3(4, 3.0, -19);

function jailPositionFor(player) {
    const jailed = G.players.filter(p => p.inPrison);
    const idx = jailed.indexOf(player);
    if (idx === -1 || jailed.length <= 1) return JAIL_WORLD_POS.clone();
    const angle = (idx / jailed.length) * Math.PI * 2;
    const r = 0.5;
    return new THREE.Vector3(
        JAIL_WORLD_POS.x + Math.cos(angle) * r,
        JAIL_WORLD_POS.y,
        JAIL_WORLD_POS.z + Math.sin(angle) * r,
    );
}

function layoutJailedTokens() {
    const jailed = G.players.filter(p => p.inPrison);
    jailed.forEach((p, idx) => {
        const angle = jailed.length <= 1 ? 0 : (idx / jailed.length) * Math.PI * 2;
        const r = jailed.length <= 1 ? 0 : 0.5;
        p.token.position.set(
            JAIL_WORLD_POS.x + Math.cos(angle) * r,
            JAIL_WORLD_POS.y,
            JAIL_WORLD_POS.z + Math.sin(angle) * r,
        );
    });
}

function animateTokenToJail(player, durMs = 800, arcH = 2.0) {
    return new Promise(resolve => {
        const startPos = player.token.position.clone();
        const endPos = jailPositionFor(player);
        const startTime = performance.now();
        const step = (now) => {
            const k = Math.min(1, (now - startTime) / durMs);
            const ease = 1 - Math.pow(1 - k, 2.5);
            player.token.position.lerpVectors(startPos, endPos, ease);
            player.token.position.y += Math.sin(k * Math.PI) * arcH;
            if (k < 1) requestAnimationFrame(step);
            else {
                player.token.position.copy(endPos);
                layoutJailedTokens();
                resolve();
            }
        };
        requestAnimationFrame(step);
    });
}

function animateTokenFromJail(player, durMs = 800, arcH = 2.0) {
    return new Promise(resolve => {
        const startPos = player.token.position.clone();
        const endPos = tileWorldPos[player.tileIdx].clone();
        endPos.y += 0.25;
        const startTime = performance.now();
        const step = (now) => {
            const k = Math.min(1, (now - startTime) / durMs);
            const ease = 1 - Math.pow(1 - k, 2.5);
            player.token.position.lerpVectors(startPos, endPos, ease);
            player.token.position.y += Math.sin(k * Math.PI) * arcH;
            if (k < 1) requestAnimationFrame(step);
            else {
                player.token.position.copy(endPos);
                layoutTokensOnTile(player.tileIdx);
                layoutJailedTokens();
                resolve();
            }
        };
        requestAnimationFrame(step);
    });
}

function lerpCameraTo(toPos, toTgt, durMs = 700) {
    return new Promise(resolve => {
        const fromPos = camera.position.clone();
        const fromTgt = controls.target.clone();
        const t0 = performance.now();
        const step = (now) => {
            const k = Math.min(1, (now - t0) / durMs);
            const e = k < 0.5 ? 4*k*k*k : 1 - Math.pow(-2*k+2, 3) / 2;
            camera.position.lerpVectors(fromPos, toPos, e);
            controls.target.lerpVectors(fromTgt, toTgt, e);
            if (k < 1) requestAnimationFrame(step);
            else resolve();
        };
        requestAnimationFrame(step);
    });
}

// Dramatische zoom op Banana Brig — voor POV op de gevangen speler
async function zoomCameraToJail(durMs = 700) {
    const camTo = new THREE.Vector3(
        JAIL_WORLD_POS.x + 4,
        JAIL_WORLD_POS.y + 3,
        JAIL_WORLD_POS.z + 5,
    );
    const tgtTo = new THREE.Vector3(
        JAIL_WORLD_POS.x,
        JAIL_WORLD_POS.y + 0.5,
        JAIL_WORLD_POS.z,
    );
    await lerpCameraTo(camTo, tgtTo, durMs);
}

// ── UI: helper ──
const ui = document.getElementById('game-ui');
function el(tag, props={}, children=[]) {
    const n = document.createElement(tag);
    for (const k in props) {
        if (k === 'style') Object.assign(n.style, props[k]);
        else if (k === 'on') for (const ev in props.on) n.addEventListener(ev, props.on[ev]);
        else if (k in n) n[k] = props[k];
        else n.setAttribute(k, props[k]);
    }
    for (const c of [].concat(children)) n.append(c?.nodeType ? c : document.createTextNode(c));
    return n;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

    const stk = `stroke="#1a1010" stroke-width="2.5" stroke-linejoin="round"`;
    const eye = (x) => {
        switch (shape) {
            case 'normal':
                return `<g><ellipse cx="${x}" cy="${y}" rx="9" ry="11" fill="#fff" ${stk}/>
                    <circle cx="${x}" cy="${y+1}" r="5.5" fill="${color}"/>
                    <circle cx="${x}" cy="${y+1}" r="2.5" fill="#1a1010"/>
                    <circle cx="${x-1.5}" cy="${y-1.5}" r="1.8" fill="#fff"/></g>`;
            case 'big':
                return `<g><ellipse cx="${x}" cy="${y}" rx="12" ry="14" fill="#fff" ${stk}/>
                    <circle cx="${x}" cy="${y+2}" r="8" fill="${color}"/>
                    <circle cx="${x}" cy="${y+2}" r="4" fill="#1a1010"/>
                    <circle cx="${x-2}" cy="${y-2}" r="2.5" fill="#fff"/>
                    <circle cx="${x+3}" cy="${y+4}" r="1.2" fill="#fff"/></g>`;
            case 'sleepy':
                return `<g><path d="M ${x-10},${y} Q ${x},${y-4} ${x+10},${y} L ${x+10},${y+4} Q ${x},${y+8} ${x-10},${y+4} Z" fill="#fff" ${stk}/>
                    <path d="M ${x-10},${y} Q ${x},${y-3} ${x+10},${y}" fill="none" stroke="#1a1010" stroke-width="2.5"/>
                    <circle cx="${x}" cy="${y+4}" r="3.5" fill="${color}"/></g>`;
            case 'wink':
                if (x === xL) {
                    return `<path d="M ${x-10},${y+1} Q ${x},${y-5} ${x+10},${y+1}" fill="none" stroke="#1a1010" stroke-width="3" stroke-linecap="round"/>`;
                }
                return `<g><ellipse cx="${x}" cy="${y}" rx="9" ry="11" fill="#fff" ${stk}/>
                    <circle cx="${x}" cy="${y+1}" r="5.5" fill="${color}"/>
                    <circle cx="${x}" cy="${y+1}" r="2.5" fill="#1a1010"/>
                    <circle cx="${x-1.5}" cy="${y-1.5}" r="1.8" fill="#fff"/></g>`;
            case 'star':
                return `<g><ellipse cx="${x}" cy="${y}" rx="10" ry="12" fill="#fff" ${stk}/>
                    <path d="M ${x},${y-6} L ${x+1.7},${y-2} L ${x+6},${y-1} L ${x+2.6},${y+2} L ${x+3.7},${y+6} L ${x},${y+3.5} L ${x-3.7},${y+6} L ${x-2.6},${y+2} L ${x-6},${y-1} L ${x-1.7},${y-2} Z" fill="${color}"/></g>`;
            case 'dot':
                return `<circle cx="${x}" cy="${y+2}" r="4.5" fill="#1a1010"/>`;
            case 'closed':
                return `<path d="M ${x-9},${y+3} Q ${x},${y-6} ${x+9},${y+3}" fill="none" stroke="#1a1010" stroke-width="3" stroke-linecap="round"/>`;
            case 'square':
                return `<g><rect x="${x-9}" y="${y-9}" width="18" height="18" rx="2" fill="#fff" ${stk}/>
                    <rect x="${x-4}" y="${y-4}" width="8" height="8" fill="${color}"/>
                    <rect x="${x-1}" y="${y-1}" width="3" height="3" fill="#1a1010"/></g>`;
            case 'sparkle':
                return `<g><ellipse cx="${x}" cy="${y}" rx="11" ry="13" fill="#fff" ${stk}/>
                    <circle cx="${x}" cy="${y+2}" r="6.5" fill="${color}"/>
                    <circle cx="${x}" cy="${y+2}" r="3" fill="#1a1010"/>
                    <ellipse cx="${x-2.5}" cy="${y-2}" rx="3" ry="2" fill="#fff" transform="rotate(-30 ${x-2.5} ${y-2})"/>
                    <circle cx="${x+3}" cy="${y+4}" r="1.5" fill="#fff"/></g>`;
            case 'tired':
                return `<g><path d="M ${x-10},${y-2} Q ${x},${y+4} ${x+10},${y-2}" fill="none" stroke="#1a1010" stroke-width="3" stroke-linecap="round"/>
                    <circle cx="${x}" cy="${y+1}" r="2.5" fill="#1a1010"/></g>`;
            // ── feminine / glamour eyes ──
            case 'lashed':
                return `<g><ellipse cx="${x}" cy="${y}" rx="9" ry="11" fill="#fff" ${stk}/>
                    <circle cx="${x}" cy="${y+1}" r="5.5" fill="${color}"/>
                    <circle cx="${x}" cy="${y+1}" r="2.5" fill="#1a1010"/>
                    <circle cx="${x-1.5}" cy="${y-1.5}" r="1.8" fill="#fff"/>
                    <path d="M ${x-9},${y-10} L ${x-12},${y-15} M ${x-4},${y-11} L ${x-5},${y-17} M ${x+1},${y-11} L ${x+1},${y-17} M ${x+6},${y-11} L ${x+8},${y-16} M ${x+10},${y-9} L ${x+13},${y-13}" stroke="#1a1010" stroke-width="2" stroke-linecap="round"/></g>`;
            case 'glamour':
                return `<g><ellipse cx="${x}" cy="${y+1}" rx="12" ry="13" fill="#fff" ${stk}/>
                    <circle cx="${x}" cy="${y+2}" r="7" fill="${color}"/>
                    <circle cx="${x}" cy="${y+2}" r="3" fill="#1a1010"/>
                    <ellipse cx="${x-2}" cy="${y-1}" rx="2.5" ry="2" fill="#fff"/>
                    <path d="M ${x-11},${y-9} C ${x-13},${y-15} ${x-7},${y-15} ${x-5},${y-12} L ${x-3},${y-15} L ${x+1},${y-15} L ${x+4},${y-13} C ${x+7},${y-15} ${x+11},${y-14} ${x+13},${y-10}" fill="#1a1010" stroke="#1a1010" stroke-width="1.5"/>
                    <path d="M ${x-10},${y+8} Q ${x-7},${y+13} ${x-3},${y+10} M ${x-1},${y+10} Q ${x+2},${y+13} ${x+5},${y+10}" fill="none" stroke="#1a1010" stroke-width="1.5" stroke-linecap="round"/></g>`;
            case 'cute_lashed':
                return `<g><path d="M ${x-9},${y+2} Q ${x},${y-6} ${x+9},${y+2}" fill="none" stroke="#1a1010" stroke-width="3" stroke-linecap="round"/>
                    <path d="M ${x-9},${y+2} L ${x-12},${y-2} M ${x-2},${y-3} L ${x-3},${y-7} M ${x+3},${y-3} L ${x+4},${y-7} M ${x+9},${y+2} L ${x+12},${y-2}" stroke="#1a1010" stroke-width="1.8" stroke-linecap="round"/>
                    <circle cx="${x-2}" cy="${y-2}" r="1.8" fill="${color}"/></g>`;
            case 'eyeliner':
                return `<g><ellipse cx="${x}" cy="${y}" rx="10" ry="10" fill="#fff" ${stk}/>
                    <circle cx="${x}" cy="${y+1}" r="6" fill="${color}"/>
                    <circle cx="${x}" cy="${y+1}" r="2.8" fill="#1a1010"/>
                    <circle cx="${x-1.5}" cy="${y-1.5}" r="1.8" fill="#fff"/>
                    <path d="M ${x-11},${y-3} Q ${x-2},${y-11} ${x+11},${y-6} L ${x+15},${y-9} L ${x+11},${y-4} Q ${x-2},${y-9} ${x-10},${y-1} Z" fill="#1a1010"/></g>`;
            default:
                return renderEyes('normal', color);
        }
    };
    return eye(xL) + eye(xR);
}

// ── BROWS ──────────────────────────────────────────────────────────────
function renderBrows(shape, color) {
    if (shape === 'none') return '';
    const xL = 76, xR = 124, y = 70;
    const stk = `stroke="${color}" stroke-width="4.5" stroke-linecap="round" fill="none"`;
    const brow = (x, mirrored = false) => {
        const m = mirrored ? -1 : 1;
        switch (shape) {
            case 'flat':      return `<line x1="${x-10}" y1="${y}" x2="${x+10}" y2="${y}" ${stk}/>`;
            case 'arched':    return `<path d="M ${x-10},${y+2} Q ${x},${y-4} ${x+10},${y+2}" ${stk}/>`;
            case 'angry':     return `<line x1="${x-10}" y1="${y-2 + m*2}" x2="${x+10}" y2="${y+2 - m*2}" ${stk}/>`;
            case 'surprised': return `<path d="M ${x-10},${y+4} Q ${x},${y-8} ${x+10},${y+4}" ${stk}/>`;
            case 'thick':     return `<path d="M ${x-11},${y} Q ${x},${y-3} ${x+11},${y}" stroke="${color}" stroke-width="7" stroke-linecap="round" fill="none"/>`;
            case 'thin':      return `<line x1="${x-9}" y1="${y}" x2="${x+9}" y2="${y}" stroke="${color}" stroke-width="2" stroke-linecap="round"/>`;
            case 'wavy':      return `<path d="M ${x-10},${y} Q ${x-5},${y-3} ${x},${y} T ${x+10},${y}" ${stk}/>`;
            default:          return '';
        }
    };
    return brow(xL, false) + brow(xR, true);
}

// ── NOSE ───────────────────────────────────────────────────────────────
function renderNose(shape, skin) {
    if (shape === 'none') return '';
    const stk = `stroke="#1a1010" stroke-width="2" stroke-linecap="round" fill="none"`;
    const shadow = `fill="rgba(0,0,0,0.12)"`;
    switch (shape) {
        case 'small':   return `<circle cx="100" cy="108" r="2.5" fill="#1a1010"/>`;
        case 'button':  return `<path d="M 96,108 Q 100,114 104,108" ${stk}/>`;
        case 'wide':    return `<path d="M 91,108 Q 100,116 109,108" stroke="#1a1010" stroke-width="2.5" stroke-linecap="round" fill="none"/>`;
        case 'long':    return `<path d="M 100,98 L 99,110 Q 100,116 101,110 Z" ${shadow} stroke="#1a1010" stroke-width="1.5"/>`;
        case 'pointy':  return `<path d="M 100,98 L 96,112 Q 100,114 104,112 Z" fill="${skin}" stroke="#1a1010" stroke-width="2" stroke-linejoin="round"/>`;
        default:        return '';
    }
}

// ── MOUTH ──────────────────────────────────────────────────────────────
function renderMouth(shape) {
    const stk = `stroke="#1a1010" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"`;
    const y = 128;
    switch (shape) {
        case 'smile':   return `<path d="M 86,${y} Q 100,${y+12} 114,${y}" ${stk}/>`;
        case 'grin':    return `<path d="M 82,${y-2} Q 100,${y+14} 118,${y-2} L 116,${y-2} Q 100,${y+8} 84,${y-2} Z" fill="#fff" stroke="#1a1010" stroke-width="3" stroke-linejoin="round"/>
                                <line x1="100" y1="${y-1}" x2="100" y2="${y+6}" stroke="#1a1010" stroke-width="1.5"/>`;
        case 'neutral': return `<line x1="88" y1="${y+2}" x2="112" y2="${y+2}" ${stk}/>`;
        case 'open':    return `<ellipse cx="100" cy="${y+3}" rx="8" ry="9" fill="#5a1822" stroke="#1a1010" stroke-width="2.5"/>`;
        case 'smirk':   return `<path d="M 88,${y+4} Q 100,${y+10} 112,${y-2}" ${stk}/>`;
        case 'tongue':  return `<path d="M 84,${y-2} Q 100,${y+14} 116,${y-2}" fill="#5a1822" stroke="#1a1010" stroke-width="2.5" stroke-linejoin="round"/>

        case 'o':       return `<circle cx="100" cy="${y+2}" r="5" fill="#5a1822" stroke="#1a1010" stroke-width="2.5"/>`;
        case 'frown':   return `<path d="M 86,${y+8} Q 100,${y-4} 114,${y+8}" ${stk}/>`;
        case 'kiss':    return `<g><ellipse cx="100" cy="${y+2}" rx="4" ry="5" fill="#ff7a90" stroke="#1a1010" stroke-width="2"/>
                                <ellipse cx="100" cy="${y}" rx="2.5" ry="1.5" fill="#ff4d70"/></g>`;
        case 'tooth':   return `<path d="M 86,${y} Q 100,${y+12} 114,${y}" ${stk}/>

        // ── lipstick variants (feminine) ──
        case 'lips_red':

                <ellipse cx="98" cy="${y-1}" rx="2" ry="1" fill="#ff6e8a" opacity="0.7"/></g>`;
        case 'lips_pink':
            return `<g><path d="M 85,${y+1} Q 92,${y-4} 100,${y-1} Q 108,${y-4} 115,${y+1} Q 115,${y+5} 100,${y+8} Q 85,${y+5} 85,${y+1} Z" fill="#ff7a9e" stroke="#1a1010" stroke-width="2"/>
                <path d="M 92,${y+1} Q 96,${y-2} 100,${y} Q 104,${y-2} 108,${y+1}" fill="none" stroke="#1a1010" stroke-width="1.5"/>
                <ellipse cx="98" cy="${y-1}" rx="2.5" ry="1.2" fill="#ffb0c4" opacity="0.7"/></g>`;
        case 'soft_smile':
            return `<g><path d="M 88,${y+1} Q 100,${y+8} 112,${y+1}" stroke="#c84a6a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
                <path d="M 88,${y+1} Q 100,${y+5} 112,${y+1}" stroke="#1a1010" stroke-width="2" stroke-linecap="round" fill="none"/></g>`;
        case 'lips_full':
            return `<g><path d="M 82,${y} Q 90,${y-7} 100,${y-3} Q 110,${y-7} 118,${y} Q 118,${y+6} 100,${y+10} Q 82,${y+6} 82,${y} Z" fill="#c84a6a" stroke="#1a1010" stroke-width="2.5" stroke-linejoin="round"/>

// ── BLUSH / CHEEKS / FRECKLES ──────────────────────────────────────────
function renderBlush(kind) {
    if (!kind || kind === 'none') return '';
    const xL = 70, xR = 130, y = 112;   // cheek positions
    switch (kind) {
        case 'soft_pink':
            return `<g>
                <ellipse cx="${xL}" cy="${y}" rx="9" ry="5" fill="#ff9ec0" opacity="0.55"/>
                <ellipse cx="${xR}" cy="${y}" rx="9" ry="5" fill="#ff9ec0" opacity="0.55"/>
            </g>`;
        case 'pink':
            return `<g>
                <ellipse cx="${xL}" cy="${y}" rx="10" ry="6" fill="#ff7ab0" opacity="0.7"/>
                <ellipse cx="${xR}" cy="${y}" rx="10" ry="6" fill="#ff7ab0" opacity="0.7"/>
            </g>`;
        case 'red':
            return `<g>
                <circle cx="${xL}" cy="${y}" r="7" fill="#ff5a5a" opacity="0.78"/>
                <circle cx="${xR}" cy="${y}" r="7" fill="#ff5a5a" opacity="0.78"/>
            </g>`;
        case 'freckles':
            return `<g fill="#8a4a20">
                <circle cx="${xL-6}" cy="${y-4}" r="1.4"/>
                <circle cx="${xL+2}" cy="${y-2}" r="1.2"/>
                <circle cx="${xL-2}" cy="${y+3}" r="1.3"/>
                <circle cx="${xL+5}" cy="${y+5}" r="1.1"/>
                <circle cx="${xR+4}" cy="${y-4}" r="1.4"/>
                <circle cx="${xR-3}" cy="${y-1}" r="1.2"/>
                <circle cx="${xR+1}" cy="${y+4}" r="1.3"/>
                <circle cx="${xR-5}" cy="${y+5}" r="1.1"/>
                <circle cx="100" cy="${y-4}" r="1.2"/>
                <circle cx="96" cy="${y+2}" r="1"/>
                <circle cx="104" cy="${y+3}" r="1"/>
            </g>`;
        case 'stars':
            const star = (x, y, s = 1) => {
                const p = (a, r) => {
                    const ax = x + Math.cos(a) * r * s;
                    const ay = y + Math.sin(a) * r * s;
                    return `${ax.toFixed(1)},${ay.toFixed(1)}`;
                };
                const pts = [];
                for (let i = 0; i < 5; i++) {
                    pts.push(p(-Math.PI/2 + i * Math.PI * 0.4, 4));
                    pts.push(p(-Math.PI/2 + i * Math.PI * 0.4 + Math.PI*0.2, 1.7));
                }
                return `<polygon points="${pts.join(' ')}" fill="#ffd54a" stroke="#1a1010" stroke-width="1"/>`;
            };
            return `<g>${star(xL, y)}${star(xR, y)}</g>`;
        default: return '';
    }
}

// ── BODY (chibi torso) ─────────────────────────────────────────────────
function renderBody(shape, outfit, skin) {
    const stk = `stroke="#1a1010" stroke-width="3" stroke-linejoin="round"`;
    const w = shape === 'slim' ? 36 : shape === 'chunky' ? 62 : 48;
    // Neck
    const neck = `<path d="M ${100-10},148 L ${100-10},164 L ${100+10},164 L ${100+10},148 Z" fill="${skin}" stroke="#1a1010" stroke-width="2.5"/>`;
    // Torso (T-shirt shape with shoulders)
    const torso = `<path d="M ${100-w-8},180 L ${100-w},170 Q ${100-w+2},164 ${100-12},164 L ${100+12},164 Q ${100+w-2},164 ${100+w},170 L ${100+w+8},180 L ${100+w+4},196 L ${100+w-2},196 L ${100+w-2},250 Q ${100+w-2},258 ${100+w-10},258 L ${100-w+10},258 Q ${100-w+2},258 ${100-w+2},250 L ${100-w+2},196 L ${100-w-4},196 Z" fill="${outfit}" ${stk}/>`;
    // Arms (short stubs)
    const aL = `<ellipse cx="${100-w-6}" cy="200" rx="9" ry="14" fill="${skin}" stroke="#1a1010" stroke-width="2.5"/>`;
    const aR = `<ellipse cx="${100+w+6}" cy="200" rx="9" ry="14" fill="${skin}" stroke="#1a1010" stroke-width="2.5"/>`;
    return neck + torso + aL + aR;
}

// ── Utility: darken a hex color ───────────────────────────────────────
function darkenHex(hex, factor = 0.7) {
    const h = hex.replace('#', '');
    const r = parseInt(h.substring(0,2), 16);
    const g = parseInt(h.substring(2,4), 16);
    const b = parseInt(h.substring(4,6), 16);
    const out = (c) => Math.round(c * factor).toString(16).padStart(2,'0');
    return '#' + out(r) + out(g) + out(b);
}

// ═══ MAIN RENDERER ════════════════════════════════════════════════════════
// mode:
//   'full'    → head + body (viewBox 200x260)
//   'head'    → head only, slightly tighter framing (viewBox 200x180)
//   'square'  → head only, square viewBox 200x200 (good for canvas-texture)
function renderAvatarSVG(avatar, mode = 'full', extraAttrs = '') {
    if (!avatar) avatar = defaultAvatar(0);
    const a = avatar;
    const hair = renderHair(a.hair.style, a.hair.color);

    let viewBox, height;
    if (mode === 'head')       { viewBox = '20 0 160 180'; height = 180; }
    else if (mode === 'square'){ viewBox = '0 -10 200 200'; height = 200; }
    else                       { viewBox = '0 0 200 260'; height = 260; }

    const bodyLayer = (mode === 'full') ? renderBody(a.body, a.outfit, a.skin) : '';

    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}" preserveAspectRatio="xMidYMid meet" ${extraAttrs}>
        ${bodyLayer}
        ${hair.back}
        ${renderFace(a.face, a.skin)}
        ${renderBlush(a.blush)}
        ${renderBrows(a.brows.shape, a.brows.color)}
        ${renderEyes(a.eyes.shape, a.eyes.color)}
        ${renderNose(a.nose, a.skin)}
        ${renderMouth(a.mouth)}
        ${hair.front}
        ${renderAccessory(a.accessory)}
    </svg>`.replace(/\s+/g, ' ').trim();
}

// Render to a canvas (for THREE.CanvasTexture on the 3D board pawn)
function avatarToCanvas(avatar, size = 256) {
    return new Promise((resolve, reject) => {
        const svg = renderAvatarSVG(avatar, 'square', `width="${size}" height="${size}"`);
        const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.drawImage(img, 0, 0, size, size);
            URL.revokeObjectURL(url);
            resolve(canvas);
        };
        img.onerror = (e) => { URL.revokeObjectURL(url); reject(e); };
        img.src = url;
    });
}

// ═══ PERSISTENCE ══════════════════════════════════════════════════════════
const AVATAR_STORAGE_KEY = 'drank-eiland-avatars-v1';

function loadAvatars() {
    try {
        const raw = localStorage.getItem(AVATAR_STORAGE_KEY);
        if (!raw) return {};
        const data = JSON.parse(raw);
        if (!data || typeof data !== 'object') return {};
        return data;
    } catch (e) {
        return {};
    }
}
function saveAvatar(colorIdx, avatar) {
    try {
        const all = loadAvatars();
        all[colorIdx] = avatar;
        localStorage.setItem(AVATAR_STORAGE_KEY, JSON.stringify(all));
    } catch (e) {}
}
function loadAvatarForColor(colorIdx) {
    const all = loadAvatars();
    return all[colorIdx] || defaultAvatar(colorIdx);
}
