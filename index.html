   ════════════════════════════════════════════════════════════════════
   Top helft = playerA, bot helft = playerB. Tap = velocity boost.
   Velocity decays (water friction). Position += velocity * dt.
   Winnaar = eerste die finish bereikt.
   ════════════════════════════════════════════════════════════════════ */
function playKanoRace({ playerA, playerB, drinks = 4 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'kano-back' });
        // Zone bouwen helper
        function buildZone(player, klass) {
            const z = el('div', { className: 'kano-zone ' + klass });
            const island = el('div', { className: 'kano-island' });
            const finish = el('div', { className: 'kano-finish' });
            const boat = el('div', { className: 'kano-boat', 'data-c': '1' });
            boat.style.setProperty('--bcol', player.color.css);
            const name = el('div', { className: 'kano-name' }, player.name);
            name.style.setProperty('--pcol', player.color.css);
            const taps = el('div', { className: 'kano-taps' }, 'TAP!');
            const prog = el('div', { className: 'kano-progress' });
            const progBar = el('div');
            prog.append(progBar);
            progBar.parentElement.style.setProperty('--pcol', player.color.css);
            z.append(island, finish, boat, name, taps, prog);
            return { zone: z, boat, progBar };
        }
        const A = buildZone(playerA, 'top');
        const B = buildZone(playerB, 'bot');
        back.append(A.zone, B.zone);
        // Overlay
        const overlay = el('div', { className: 'kano-overlay show' });
        const oTitle = el('h2', {}, '🛶 Kano Race');
        const oText = el('p', {}, `${playerA.name} (boven) vs ${playerB.name} (onder). Tik zo snel mogelijk op JOUW helft! Eerste bij de finish wint.`);
        const oBtn = el('button', { className: 'btn-pill gold' }, '▶ Start');
        const oSkip = el('button', { className: 'btn-pill' }, 'Skip');
        overlay.append(oTitle, oText, oBtn, oSkip);
        back.append(overlay);
        ui.append(back);

        // ── STATE ──
        // pos = 0 (start) → 1 (finish). vel in pos-units/sec.
        // Eindzone: finish ligt op top:60px, kano start op bottom:80px.
        // We mappen pos:0 = bottom:80px en pos:1 = bottom: (zoneHeight - 100px) ~ finish.
        const state = {
            posA: 0, velA: 0, posB: 0, velB: 0,
            running: false, finished: false,
        };
        const TAP_BOOST = 0.060;     // 6% van afstand per tap (op vel)
        const FRICTION  = 0.985;     // exponentiele decay per ms (subtiel)
        const TAP_DECAY_MS = 16.67;
        let lastT = 0;
        let rafId = 0;
        let tapsA = 0, tapsB = 0;

        function updateVisual() {
            const aH = A.zone.clientHeight;
            const bH = B.zone.clientHeight;
            // Bot edge gaat van 80px (start) tot aH-90 (finish near top)
            // Maar A is geroteerd 180°, dus voor A werkt het visueel hetzelfde:
            // we zetten gewoon style.bottom op de boat.
            const aBot = 80 + (aH - 170) * state.posA;
            const bBot = 80 + (bH - 170) * state.posB;
            A.boat.style.bottom = aBot + 'px';
            B.boat.style.bottom = bBot + 'px';
            A.progBar.style.width = (state.posA * 100).toFixed(1) + '%';
            B.progBar.style.width = (state.posB * 100).toFixed(1) + '%';
        }
        function tick(t) {
            if (!state.running) return;
            const dt = lastT ? Math.min(0.05, (t - lastT) / 1000) : 0;
            lastT = t;
            // Friction (exponential)
            const friFac = Math.pow(FRICTION, dt * 60);
            state.velA *= friFac;
            state.velB *= friFac;
            // Apply velocity to position
            state.posA = Math.min(1, state.posA + state.velA * dt);
            state.posB = Math.min(1, state.posB + state.velB * dt);
            updateVisual();
            // Win conditie
            const aDone = state.posA >= 1;
            const bDone = state.posB >= 1;
            if (aDone || bDone) {
                state.finished = true;
                state.running = false;
                let winner, loser;
                if (aDone && bDone) {
                    // gelijkstand — degene met meeste taps wint? gebruik posA/posB extra
                    winner = tapsA >= tapsB ? playerA : playerB;
                    loser  = winner === playerA ? playerB : playerA;
                } else {
                    winner = aDone ? playerA : playerB;
                    loser  = aDone ? playerB : playerA;
                }
                showResult(winner, loser);
                return;
            }
            rafId = requestAnimationFrame(tick);
        }
        function showResult(winner, loser) {
            overlay.classList.add('show');
            overlay.replaceChildren(
                el('h2', { style: { color: winner.color.css } }, `🏆 ${winner.name} wint!`),
                el('p', {}, `${loser.name} drinkt ${drinks} slokken 🍻`),
                el('button', { className: 'btn-pill gold', type: 'button',
                    on: { click: () => finish(loser) } }, 'Klaar'),
            );
            setTimeout(() => finish(loser), 5000);
        }
        function finish(loser) {
            if (state.finished === 'closed') return;
            state.finished = 'closed';
            state.running = false;
            cancelAnimationFrame(rafId);
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(loser); }, 300);
        }

        // ── INPUT: tap-zones gescheiden ──
        function onTapA(e) { e.preventDefault(); if (!state.running) return;
            state.velA += TAP_BOOST; tapsA++; pulseBoat(A.boat); }
        function onTapB(e) { e.preventDefault(); if (!state.running) return;
            state.velB += TAP_BOOST; tapsB++; pulseBoat(B.boat); }
        function pulseBoat(b) {
            const cur = b.style.transform || 'translateX(-50%)';
            b.style.transform = 'translateX(-50%) scale(1.05)';
            setTimeout(() => { b.style.transform = ''; }, 60);
        }
        A.zone.addEventListener('touchstart', onTapA, { passive: false });
        B.zone.addEventListener('touchstart', onTapB, { passive: false });
        A.zone.addEventListener('mousedown', onTapA);
        B.zone.addEventListener('mousedown', onTapB);

        oBtn.addEventListener('click', () => {
            overlay.classList.remove('show');
            state.running = true;
            lastT = 0;
            rafId = requestAnimationFrame(tick);
        });
        oSkip.addEventListener('click', () => finish(null));
        updateVisual();
    });
}


/* ════════════════════════════════════════════════════════════════════
   3. Krabben Vangen — Whack-a-Mole crabs
   ════════════════════════════════════════════════════════════════════
   Per speler 30-seconden run. Krabben spawnen in willekeurige holes,
   blijven 0.7-1.4s, dan duiken ze weg. Tap = +1 score + zandwolk.
   Hoogste score wint.
   ════════════════════════════════════════════════════════════════════ */
function playKrabbenVangen({ players = G.players, drinks = 2 } = {}) {
    return new Promise(resolve => {
        // ══════════════════════════════════════════════════════════════
        //  KRABBEN VANGEN — 3D versie op bowl-eiland strand
        // ══════════════════════════════════════════════════════════════
        //  Zelfde regels als de 2D versie:
        //   • 30 sec per speler, 8 gaten
        //   • Spawn-interval 0.55s → 0.30s gedurende de ronde
        //   • Krab leeft 700-1400ms, tik = +1
        //   • Per speler een ronde, eindstand met losers drinken
        //  Maar nu: 3D scene op bowl-eiland, tap = raycast tegen krabben.
        // ══════════════════════════════════════════════════════════════

        // ── SETUP: chrome verbergen, camera bewaren ───────────────────
        const hiddenChrome = hideMinigameChrome();
        const savedCam = {
            pos: camera.position.clone(),
            fov: camera.fov,
            target: controls.target.clone(),
            autoRotate: controls.autoRotate,
            enabled: controls.enabled,
            enableDamping: controls.enableDamping,
        };
        controls.autoRotate = false;
        controls.enabled = false;
        controls.enableDamping = false;
        camera.fov = 58;
        camera.updateProjectionMatrix();

        // ── KRABBEN PIT locatie op bowl-eiland ────────────────────────
        //   Noord van de bowling alley (alley loopt z=-1.2…+1.2 langs X).
        //   Hier is een vrij stuk zand waar de 8 gaten in passen.
        const KRAB = {
            cx: BOWL.cx,                // 82
            cy: BOWL.sandTopY,          // 1.05
            cz: BOWL.cz + 5,            // 5 noord van alley-centrum
        };

        // ── 3D scene: zand-platform + 8 gaten + bord ──────────────────
        const krabbenGroup = new THREE.Group();
        scene.add(krabbenGroup);

        // Lichte zand-mound onder de gaten (subtiel verschil met de
        // omringende beach — geeft de speel-arena visuele identiteit)
        const sandMound = new THREE.Mesh(
            deformCylinder(
                new THREE.CylinderGeometry(3.0, 3.4, 0.18, 22), 0.10),
            new THREE.MeshToonMaterial({
                color: 0xe8b878, gradientMap: toon,
                emissive: 0x402810, emissiveIntensity: 0.04 }));
        sandMound.position.set(KRAB.cx, KRAB.cy + 0.09, KRAB.cz);
        sandMound.receiveShadow = true;
        krabbenGroup.add(sandMound);
        addOutline(sandMound, 1.005);

        // 8 gat-posities — 3-2-3 patroon (zoals 2D versie), maar nu
        // GEROTEERD: diepte langs X (richting volcano in -X), breedte
        // langs Z (loodrecht op camera-view). Speler kijkt vanaf oost
        // door pit heen richting hoofdeiland + vulkaan.
        const HOLE_OFFSETS = [
            { x: -1.6, z: -1.4 }, { x: -1.6, z:  0   }, { x: -1.6, z: +1.4 },  // verste rij (richting vulkaan)
            { x:  0,   z: -1.0 },                       { x:  0,   z: +1.0 },  // midden rij
            { x: +1.6, z: -1.4 }, { x: +1.6, z:  0   }, { x: +1.6, z: +1.4 },  // dichtsbij camera
        ];

        const holes3D = [];
        for (let i = 0; i < HOLE_OFFSETS.length; i++) {
            const ofs = HOLE_OFFSETS[i];
            const wx = KRAB.cx + ofs.x;
            const wy = KRAB.cy + 0.18;     // top van zand-mound
            const wz = KRAB.cz + ofs.z;

            const holeGrp = new THREE.Group();
            holeGrp.position.set(wx, wy, wz);

            // Lichte zand-ring rondom het gat
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(0.52, 0.72, 22),
                new THREE.MeshToonMaterial({
                    color: 0xc89856, gradientMap: toon,
                    side: THREE.DoubleSide }));
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = 0.012;
            holeGrp.add(ring);

            // Donker binnen-gat (de "diepe schaduw")
            const inner = new THREE.Mesh(
                new THREE.CircleGeometry(0.55, 22),
                new THREE.MeshBasicMaterial({ color: 0x0a0608 }));
            inner.rotation.x = -Math.PI / 2;
            inner.position.y = 0.005;
            holeGrp.add(inner);

            krabbenGroup.add(holeGrp);
            holes3D.push({
                worldX: wx, worldY: wy, worldZ: wz,
                group: holeGrp, busy: false,
            });
        }

        // Geen 3D bord-paaltje — past niet in portrait-FOV naast de
        // krabben-pit, en de HUD bovenin toont al "🦀 Krabben Vangen".

        // ── CRAB FACTORY: oblate body + ogen op stelen + scharen ──────
        function makeCrab() {
            const g = new THREE.Group();

            const matBody = new THREE.MeshToonMaterial({
                color: 0xff5a3a, gradientMap: toon,
                emissive: 0x501808, emissiveIntensity: 0.22 });
            const matLeg = new THREE.MeshToonMaterial({
                color: 0xc8482a, gradientMap: toon });

            // Plat, breed lichaam
            const bodyGeo = new THREE.SphereGeometry(0.40, 14, 10);
            // squash naar oblate vorm
            const bp = bodyGeo.attributes.position;
            for (let i = 0; i < bp.count; i++) {
                bp.setY(i, bp.getY(i) * 0.55);
                bp.setX(i, bp.getX(i) * 1.15);
            }
            bp.needsUpdate = true;
            bodyGeo.computeVertexNormals();
            const body = new THREE.Mesh(bodyGeo, matBody);
            body.position.y = 0.18;
            body.castShadow = true;
            g.add(body);
            addOutline(body, 1.05);

            // Twee ogen op stelen
            for (const side of [-1, 1]) {
                const stalk = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.04, 0.04, 0.18, 6),
                    matBody);
                stalk.position.set(side * 0.16, 0.36, -0.08);
                g.add(stalk);
                const eyeWhite = new THREE.Mesh(
                    new THREE.SphereGeometry(0.105, 10, 8),
                    new THREE.MeshBasicMaterial({ color: 0xffffff }));
                eyeWhite.position.set(side * 0.16, 0.48, -0.08);
                g.add(eyeWhite);
                const pupil = new THREE.Mesh(
                    new THREE.SphereGeometry(0.055, 8, 6),
                    new THREE.MeshBasicMaterial({ color: 0x101820 }));
                pupil.position.set(side * 0.16, 0.48, -0.165);
                g.add(pupil);
            }

            // Schaar-armen (links + rechts)
            for (const side of [-1, 1]) {
                const claw = new THREE.Group();
                claw.position.set(side * 0.38, 0.18, -0.18);

                const arm = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.07, 0.07, 0.25, 6),
                    matBody);
                arm.rotation.x = Math.PI / 2;
                arm.position.z = -0.13;
                claw.add(arm);

                const pincerBody = new THREE.Mesh(
                    new THREE.SphereGeometry(0.17, 12, 10),
                    matBody);
                pincerBody.scale.set(1.0, 0.6, 1.5);
                pincerBody.position.z = -0.32;
                claw.add(pincerBody);

                claw.rotation.y = side * -0.35;
                g.add(claw);
            }

            // Pootjes (4 paar mini-cylindertjes onder lichaam)
            for (const side of [-1, 1]) {
                for (let i = 0; i < 3; i++) {
                    const leg = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.035, 0.035, 0.18, 5),
                        matLeg);
                    const offX = side * (0.30 + i * 0.04);
                    const offZ = -0.12 + i * 0.10;
                    leg.position.set(offX, 0.10, offZ);
                    leg.rotation.z = side * 0.4;
                    g.add(leg);
                }
            }

            return g;
        }

        // ── UI overlay: HUD (chips) + transparant stage voor tap-area ──
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'krab-back is3d' });
        const head = el('div', { className: 'krab-head' });
        head.append(el('h2', {}, '🦀 Krabben Vangen'));
        const hud = el('div', { className: 'krab-hud' });
        const pChip = el('div', { className: 'krab-chip' });
        pChip.append(el('div', { className: 'lbl' }, 'Speler'));
        const pVal = el('div', { className: 'val' }, '–');
        pChip.append(pVal);
        const tChip = el('div', { className: 'krab-chip' });
        tChip.append(el('div', { className: 'lbl' }, 'Tijd'));
        const tVal = el('div', { className: 'val' }, '30');
        tChip.append(tVal);
        const sChip = el('div', { className: 'krab-chip' });
        sChip.append(el('div', { className: 'lbl' }, 'Score'));
        const sVal = el('div', { className: 'val' }, '0');
        sChip.append(sVal);
        hud.append(pChip, tChip, sChip);
        const stage = el('div', { className: 'krab-stage' });
        back.append(head, hud, stage);
        ui.append(back);

        // ── STATE ──
        const ROUND_MS = 30000;
        const scores = [];
        let curIdx = 0;
        let score = 0;
        let phase = 'intro';
        let phaseStart = 0;
        let crabSpawnTimer = 0;
        let crabSpawnInterval = 0.55;
        const activeCrabs = [];

        // ── RAYCASTER voor tap-detectie ──
        const raycaster = new THREE.Raycaster();
        const ndc = new THREE.Vector2();

        function onScenePointer(ev) {
            if (phase !== 'playing') return;
            // Voorkomen dat banner-buttons ook raycast triggeren
            if (ev.target && ev.target.closest('.krab-banner')) return;
            const x = ev.clientX !== undefined ? ev.clientX
                : (ev.touches && ev.touches[0] ? ev.touches[0].clientX : 0);
            const y = ev.clientY !== undefined ? ev.clientY
                : (ev.touches && ev.touches[0] ? ev.touches[0].clientY : 0);
            ndc.x = (x / window.innerWidth) * 2 - 1;
            ndc.y = -(y / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(ndc, camera);

            const allMeshes = [];
            activeCrabs.forEach(c => {
                if (c.hit || c.removing) return;
                c.group.traverse(o => {
                    if (o.isMesh && o.visible) allMeshes.push(o);
                });
            });
            const hits = raycaster.intersectObjects(allMeshes);
            if (hits.length === 0) return;

            // Loop omhoog tot we de crab-group vinden
            let target = hits[0].object;
            let foundCrab = null;
            while (target && !foundCrab) {
                for (const c of activeCrabs) {
                    if (c.group === target) { foundCrab = c; break; }
                }
                target = target.parent;
            }
            if (foundCrab) onHit(foundCrab);
        }
        stage.addEventListener('pointerdown', onScenePointer);

        // ── CAMERA LERP setup ──
        //   Beach-POV: oost van de krabben-pit op ongeveer ooghoogte
        //   (3.45 boven zand). Look-direction: westwaarts dwars over
        //   de pit richting hoofdeiland — de vulkaan blijft net in de
        //   bovenrand zichtbaar.
        //
        //   Geometrie-check (FOV=58, half-vert=29°):
        //   • cam (90, 4.5, 5) → tgt (82, 1.4, 5): pitch 21.2° down
        //   • vulkaan-piek wereld (~0, 12.4, 0): 26.3° vanaf look-dir
        //     → 91% van halve FOV richting top-edge = nét zichtbaar
        //   • verste hole (80.4, 1.23, ±6.4): 12.3° horizontal
        //     → binnen horizontale half-FOV (14.3° in portrait 0.46)
        const CAM_TGT = new THREE.Vector3(
            KRAB.cx, KRAB.cy + 0.35, KRAB.cz);
        const CAM_POS = new THREE.Vector3(
            KRAB.cx + 8, KRAB.cy + 3.45, KRAB.cz);
        const camFrom = {
            pos: camera.position.clone(),
            tgt: controls.target.clone(),
        };
        let camLerpT = 0;
        const camLerpDur = 0.9;

        // ── CRAB SPAWN / HIT / EXPIRE / REMOVE ──
        function spawnCrab() {
            const free = holes3D.filter(h => !h.busy);
            if (free.length === 0) return;
            const hole = free[Math.floor(Math.random() * free.length)];
            hole.busy = true;

            const crabGrp = makeCrab();
            const startY = hole.worldY - 0.5;     // verstopt onder zand
            const peakY  = hole.worldY + 0.05;    // net boven zand
            crabGrp.position.set(hole.worldX, startY, hole.worldZ);
            crabGrp.rotation.y = Math.random() * Math.PI * 2;
            krabbenGroup.add(crabGrp);

            activeCrabs.push({
                group: crabGrp, hole,
                spawnAt: performance.now(),
                popDur: 160,
                lifeMs: 700 + Math.random() * 700,
                startY, peakY,
                hit: false, removing: false,
            });
        }

        function onHit(c) {
            if (c.hit || phase !== 'playing') return;
            c.hit = true;
            c.removing = true;
            score++;
            sVal.textContent = String(score);
            // Squish + scale-out animatie
            const t0 = performance.now();
            const dur = 280;
            const startScale = c.group.scale.x;
            const step = () => {
                const k = Math.min(1, (performance.now() - t0) / dur);
                const s = startScale * (1 - k);
                c.group.scale.set(s * 1.3, s * 0.55, s * 1.3);
                c.group.position.y = c.peakY + (c.startY - c.peakY) * (k * k);
                c.group.rotation.z = k * 1.2;
                if (k < 1) requestAnimationFrame(step);
                else removeCrab(c);
            };
            step();
            // Zandwolk-puff bij het gat
            spawnSandDust(c.hole.worldX, c.hole.worldY + 0.05, c.hole.worldZ);
            // Trilling-feedback
            if (navigator.vibrate) {
                try { navigator.vibrate(15); } catch (e) {}
            }
        }

        function removeCrab(c) {
            c.removing = true;
            krabbenGroup.remove(c.group);
            c.group.traverse(o => {
                if (o.geometry) o.geometry.dispose();
                if (o.material) {
                    if (Array.isArray(o.material)) o.material.forEach(m => m.dispose());
                    else o.material.dispose();
                }
            });
            c.hole.busy = false;
            const idx = activeCrabs.indexOf(c);
            if (idx !== -1) activeCrabs.splice(idx, 1);
        }

        function expireCrab(c) {
            // Animeer naar beneden
            c.removing = true;
            const t0 = performance.now();
            const dur = 220;
            const startY = c.group.position.y;
            const step = () => {
                const k = Math.min(1, (performance.now() - t0) / dur);
                const e = 1 - Math.pow(1 - k, 2);
                c.group.position.y = startY + (c.startY - startY) * e;
                if (k < 1) requestAnimationFrame(step);
                else removeCrab(c);
            };
            step();
        }

        function spawnSandDust(x, y, z) {
            const dust = new THREE.Mesh(
                new THREE.RingGeometry(0.18, 0.55, 18),
                new THREE.MeshBasicMaterial({
                    color: 0xe6c890, transparent: true, opacity: 0.75,
                    side: THREE.DoubleSide, depthWrite: false }));
            dust.rotation.x = -Math.PI / 2;
            dust.position.set(x, y, z);
            krabbenGroup.add(dust);
            const t0 = performance.now();
            const dur = 450;
            const step = () => {
                const k = Math.min(1, (performance.now() - t0) / dur);
                const s = 1 + k * 1.4;
                dust.scale.set(s, s, s);
                dust.material.opacity = 0.75 * (1 - k);
                if (k < 1) requestAnimationFrame(step);
                else {
                    krabbenGroup.remove(dust);
                    dust.geometry.dispose();
                    dust.material.dispose();
                }
            };
            step();
        }

        // ── PHASE MACHINE ──
        function startRun(playerIdx) {
            curIdx = playerIdx;
            const p = players[curIdx];
            pVal.textContent = p.name;
            pVal.style.color = p.color.css;
            pChip.style.setProperty('--pcol', p.color.css);
            sVal.textContent = '0';
            tVal.textContent = '30';
            score = 0;
            // Cleanup
            for (let i = activeCrabs.length - 1; i >= 0; i--) {
                removeCrab(activeCrabs[i]);
            }
            holes3D.forEach(h => h.busy = false);
            // Banner
            const banner = el('div', { className: 'krab-banner',
                style: { '--pcol': p.color.css } });
            banner.append(
                el('h2', { style: { color: p.color.css } }, `${p.name}`),
                el('p', {}, 'Tik zoveel mogelijk krabben in 30 seconden'),
                el('button', { className: 'btn-pill gold', type: 'button',
                    style: { marginTop: '10px' },
                    on: { click: () => {
                        banner.remove();
                        phase = 'playing';
                        phaseStart = performance.now();
                        crabSpawnTimer = 0;
                        crabSpawnInterval = 0.55;
                    }} }, '▶ Start'),
            );
            stage.append(banner);
            phase = 'intro';
        }

        function endRun() {
            phase = 'between';
            scores.push({ player: players[curIdx], score });
            // Cleanup
            for (let i = activeCrabs.length - 1; i >= 0; i--) {
                removeCrab(activeCrabs[i]);
            }
            holes3D.forEach(h => h.busy = false);
            const p = players[curIdx];
            const banner = el('div', { className: 'krab-banner',
                style: { '--pcol': p.color.css } });
            banner.append(
                el('h2', {}, 'Klaar!'),
                el('div', { className: 'big',
                    style: { color: p.color.css } }, String(score)),
                el('p', {}, `krabben gevangen door ${p.name}`),
            );
            stage.append(banner);
            setTimeout(() => {
                banner.remove();
                if (curIdx < players.length - 1) startRun(curIdx + 1);
                else showFinal();
            }, 2200);
        }

        function showFinal() {
            phase = 'done';
            const sorted = [...scores].sort((a, b) => b.score - a.score);
            const topS = sorted[0].score;
            const winners = sorted.filter(s => s.score === topS);
            const losers  = sorted.filter(s => s.score < topS);
            const banner = el('div', { className: 'krab-banner',
                style: { '--pcol': winners[0].player.color.css } });
            const ranking = el('div', { style: {
                margin: '12px 0', display: 'flex', flexDirection: 'column', gap: '6px' } });
            sorted.forEach((s, i) => {
                ranking.append(el('div', { style: {
                    display: 'flex', justifyContent: 'space-between', gap: '12px',
                    padding: '6px 12px', borderRadius: '8px',
                    background: 'rgba(255,255,255,0.08)',
                    border: '1px solid ' + s.player.color.css,
                    opacity: s.score === topS ? '1' : '0.65' } },
                    el('span', {}, `${i+1}. ${s.player.name}`),
                    el('span', { style: { color: s.player.color.css, fontWeight: '900' } },
                        String(s.score)),
                ));
            });
            banner.append(
                el('h2', {}, '🏆 Eindstand'),
                ranking,
                el('p', {}, losers.length === 0 ? 'Gelijkspel — proost!' :
                    `${losers.map(l => l.player.name).join(', ')} drinkt elk ${drinks} 🍻`),
                el('button', { className: 'btn-pill gold', type: 'button',
                    style: { marginTop: '10px' },
                    on: { click: () => finish(sorted) } }, 'Klaar'),
            );
            stage.append(banner);
            setTimeout(() => finish(sorted), 8000);
        }

        function finish(sorted) {
            if (phase === 'closed') return;
            phase = 'closed';
            // 3D cleanup
            window.__deGameHook = PREV_HOOK;
            // Anim alle crabs weg
            for (let i = activeCrabs.length - 1; i >= 0; i--) {
                removeCrab(activeCrabs[i]);
            }
            scene.remove(krabbenGroup);
            krabbenGroup.traverse(o => {
                if (o.geometry) o.geometry.dispose();
                if (o.material) {
                    if (Array.isArray(o.material)) o.material.forEach(m => m.dispose());
                    else o.material.dispose();
                }
            });
            // Camera restore
            camera.fov = savedCam.fov;
            camera.updateProjectionMatrix();
            camera.position.copy(savedCam.pos);
            controls.target.copy(savedCam.target);
            controls.autoRotate = savedCam.autoRotate;
            controls.enabled = savedCam.enabled;
            controls.enableDamping = savedCam.enableDamping;
            controls.update();
            // UI fade-out
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => {
                back.remove();
                restoreMinigameChrome(hiddenChrome);
                resolve(sorted || null);
            }, 300);
        }

        // ── ANIMATION HOOK (camera lerp + crab pop + spawn + timer) ──
        const PREV_HOOK = window.__deGameHook;
        let lastT = 0;
        window.__deGameHook = (time) => {
            const now = performance.now() / 1000;
            const dt = lastT ? Math.min(0.05, now - lastT) : 0;
            lastT = now;

            // Camera lerp van saved-pos → krabben-pit view
            if (camLerpT < 1) {
                camLerpT = Math.min(1, camLerpT + dt / camLerpDur);
                const e = 1 - Math.pow(1 - camLerpT, 3);
                camera.position.lerpVectors(camFrom.pos, CAM_POS, e);
                controls.target.lerpVectors(camFrom.tgt, CAM_TGT, e);
                camera.lookAt(controls.target);
            }

            // Crab pop-up / wobble / dive
            const t = performance.now();
            for (let i = activeCrabs.length - 1; i >= 0; i--) {
                const c = activeCrabs[i];
                if (c.hit || c.removing) continue;
                const age = t - c.spawnAt;
                if (age < c.popDur) {
                    // Pop-up: ease-out
                    const k = age / c.popDur;
                    const e = 1 - Math.pow(1 - k, 3);
                    c.group.position.y = c.startY + (c.peakY - c.startY) * e;
                } else if (age < c.popDur + c.lifeMs) {
                    // At peak: subtiele wiebel + draaitje
                    const localAge = age - c.popDur;
                    c.group.position.y = c.peakY +
                        Math.sin(localAge * 0.012) * 0.04;
                    c.group.rotation.y += dt * 0.6;
                } else if (age < c.popDur + c.lifeMs + 220) {
                    // Dive-back
                    const k = (age - c.popDur - c.lifeMs) / 220;
                    const e = 1 - Math.pow(1 - k, 2);
                    c.group.position.y = c.peakY + (c.startY - c.peakY) * e;
                } else {
                    expireCrab(c);
                }
            }

            // Spawn & timer (alleen tijdens 'playing')
            if (phase === 'playing') {
                const elapsed = t - phaseStart;
                const remaining = Math.max(0, ROUND_MS - elapsed);
                tVal.textContent = Math.ceil(remaining / 1000).toString();
                // Spawn-ritme versnelt: 0.55s → 0.30s
                const t01 = Math.min(1, elapsed / ROUND_MS);
                crabSpawnInterval = 0.55 - t01 * 0.25;
                crabSpawnTimer += dt;
                while (crabSpawnTimer >= crabSpawnInterval) {
                    crabSpawnTimer -= crabSpawnInterval;
                    spawnCrab();
                }
                if (elapsed >= ROUND_MS) endRun();
            }
        };

        // ── KICKOFF ──
        startRun(0);
    });
}


/* ════════════════════════════════════════════════════════════════════
   4. Tiki Ritme — Simon Says met Tiki-maskers
   ════════════════════════════════════════════════════════════════════
   Per speler: sequence van Tiki-maskers herhalen. Elke ronde +1 lengte.
   Fout = einde voor deze speler, level = score.
   Hoogste level wint.
   ════════════════════════════════════════════════════════════════════ */
function playTikiRitme({ players = G.players, drinks = 3 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'tiki-back' });
        const head = el('div', { className: 'tiki-head' });
        head.append(el('h2', {}, '🗿 Tiki Ritme'));
        const status = el('div', { className: 'tiki-status' });
        const pChip = el('div', { className: 'tiki-chip' });
        pChip.append(el('div', { className: 'lbl' }, 'Speler'));
        const pVal = el('div', { className: 'val' }, '–');
        pChip.append(pVal);
        const lChip = el('div', { className: 'tiki-chip' });
        lChip.append(el('div', { className: 'lbl' }, 'Level'));
        const lVal = el('div', { className: 'val' }, '1');
        lChip.append(lVal);
        status.append(pChip, lChip);
        const tip = el('div', { className: 'tiki-tip' }, "Onthoud de volgorde en tik 'm terug");
        // 4 maskers
        const stage = el('div', { className: 'tiki-stage' });
        const COLORS = ['#a87a4a', '#c8501a', '#3a8a4a', '#a85aa8'];   // 4 base colors
        const SYMBOLS = ['🗿', '🗿', '🗿', '🗿'];
        const masks = [];
        for (let i = 0; i < 4; i++) {
            const m = el('div', { className: 'tiki-mask',
                'data-i': String(i),
                style: { '--litcol': COLORS[i] } }, SYMBOLS[i]);
            masks.push(m);
            stage.append(m);
        }
        back.append(head, status, tip, stage);
        ui.append(back);

        // ── STATE ──
        const sequences = [];          // {player, sequence: number[], level}
        let curIdx = 0;
        let curSeq = [];               // huidige sequence voor deze speler
        let level = 0;                 // hoeveel je succesvol terug hebt gespeeld
        let inputIdx = 0;              // waar staat de speler in zijn input
        let phase = 'intro';           // intro | showing | listening | failed | between | done
        let locked = false;            // taps geblokkeerd tijdens showing

        function setPlayer(i) {
            curIdx = i;
            const p = players[curIdx];
            pVal.textContent = p.name;
            pVal.style.color = p.color.css;
            pChip.style.setProperty('--pcol', p.color.css);
            lChip.style.setProperty('--pcol', p.color.css);
            curSeq = [];
            level = 0;
            lVal.textContent = '1';
        }
        function flashMask(i, dur = 500) {
            const m = masks[i];
            m.classList.add('lit');
            // Eenvoudig "sound" effect via WebAudio (sine-tone per index)
            playTone(220 + i * 80, dur);
            return new Promise(r => setTimeout(() => {
                m.classList.remove('lit');
                setTimeout(r, 120);
            }, dur));
        }
        let audioCtx = null;
        function playTone(freq, dur) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = 'triangle';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0, audioCtx.currentTime);
                g.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 0.03);
                g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur/1000);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + dur/1000 + 0.05);
            } catch (e) {}
        }
        async function showSequence() {
            phase = 'showing';
            locked = true;
            stage.classList.add('tiki-locked');
            tip.textContent = 'Kijk goed...';
            await new Promise(r => setTimeout(r, 600));
            for (const idx of curSeq) {
                await flashMask(idx, 460);
            }
            phase = 'listening';
            locked = false;
            stage.classList.remove('tiki-locked');
            inputIdx = 0;
            tip.textContent = 'Jouw beurt — tik in dezelfde volgorde';
        }
        function nextLevel() {
            // Voeg willekeurige tik toe
            curSeq.push(Math.floor(Math.random() * 4));
            lVal.textContent = String(curSeq.length);
            showSequence();
        }
        function onTap(i) {
            if (locked || phase !== 'listening') return;
            // Flash de getikte mask (zonder geluid om timing te houden)
            const m = masks[i];
            m.classList.add('lit');
            playTone(220 + i * 80, 220);
            setTimeout(() => m.classList.remove('lit'), 220);
            const expected = curSeq[inputIdx];
            if (i !== expected) {
                fail();
                return;
            }
            inputIdx++;
            if (inputIdx >= curSeq.length) {
                // Level klaar
                level = curSeq.length;
                tip.textContent = 'Goed!';
                setTimeout(nextLevel, 700);
            }
        }
        function fail() {
            phase = 'failed';
            locked = true;
            stage.classList.add('tiki-locked');
            playTone(120, 800);
            tip.textContent = '❌ Fout!';
            sequences.push({ player: players[curIdx], level });
            const p = players[curIdx];
            const banner = el('div', { className: 'tiki-banner',
                style: { '--pcol': p.color.css } });
            banner.append(
                el('h2', {}, `${p.name}`),
                el('div', { className: 'big' }, `Level ${level}`),
                el('p', {}, level === 0 ? 'Niet eens 1 onthouden... 😅' :
                            `${level} tikken in volgorde geweldig!`),
            );
            stage.append(banner);
            setTimeout(() => {
                banner.remove();
                if (curIdx < players.length - 1) {
                    setPlayer(curIdx + 1);
                    setTimeout(nextLevel, 400);
                } else {
                    showFinal();
                }
            }, 2200);
        }
        function showFinal() {
            phase = 'done';
            const sorted = [...sequences].sort((a, b) => b.level - a.level);
            const topL = sorted[0].level;
            const losers = sorted.filter(s => s.level < topL);
            const banner = el('div', { className: 'tiki-banner',
                style: { '--pcol': sorted[0].player.color.css } });
            const ranking = el('div', { style: {
                margin: '12px 0', display: 'flex', flexDirection: 'column', gap: '6px' } });
            sorted.forEach((s, i) => {
                ranking.append(el('div', { style: {
                    display: 'flex', justifyContent: 'space-between', gap: '12px',
                    padding: '6px 12px', borderRadius: '8px',
                    background: 'rgba(255,255,255,0.08)',
                    border: '1px solid ' + s.player.color.css,
                    opacity: s.level === topL ? '1' : '0.65' } },
                    el('span', {}, `${i+1}. ${s.player.name}`),
                    el('span', { style: { color: s.player.color.css, fontWeight: '900' } },
                        `lvl ${s.level}`),
                ));
            });
            banner.append(
                el('h2', {}, '🏆 Eindstand'),
                ranking,
                el('p', {}, losers.length === 0 ? 'Gelijkspel — proost!' :
                    `${losers.map(l => l.player.name).join(', ')} drinkt elk ${drinks} 🍻`),
                el('button', { className: 'btn-pill gold', type: 'button',
                    style: { marginTop: '10px' },
                    on: { click: () => finish(sorted) } }, 'Klaar'),
            );
            stage.append(banner);
            setTimeout(() => finish(sorted), 9000);
        }
        function finish(sorted) {
            if (phase === 'closed') return;
            phase = 'closed';
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(sorted || null); }, 300);
        }

        masks.forEach((m, i) => {
            m.addEventListener('touchstart', e => { e.preventDefault(); onTap(i); },
                { passive: false });
            m.addEventListener('mousedown', () => onTap(i));
        });

        // Start eerste speler
        setPlayer(0);
        setTimeout(nextLevel, 600);
    });
}


/* ════════════════════════════════════════════════════════════════════
   5. Brug Balans — gyroscoop balanceer-game
   ════════════════════════════════════════════════════════════════════
   Personage loopt automatisch over een brug. Telefoon-tilt (gamma) →
   helling van het personage. Buiten threshold = val in lava.
   Survival-time = score. Hoogste wint.
   ════════════════════════════════════════════════════════════════════ */
function playBrugBalans({ players = G.players, drinks = 3 } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'brug-back' });
        const head = el('div', { className: 'brug-head' });
        head.append(el('h2', {}, '⚖️ Brug Balans'));
        const hud = el('div', { className: 'brug-hud' });
        const pChip = el('div', { className: 'tiki-chip' });
        pChip.append(el('div', { className: 'lbl' }, 'Speler'));
        const pVal = el('div', { className: 'val' }, '–');
        pChip.append(pVal);
        const sChip = el('div', { className: 'tiki-chip' });
        sChip.append(el('div', { className: 'lbl' }, 'Tijd'));
        const sVal = el('div', { className: 'val' }, '0.0s');
        sChip.append(sVal);
        hud.append(pChip, sChip);
        const stage = el('div', { className: 'brug-stage' });
        const bridge = el('div', { className: 'brug-bridge' });
        const char = el('div', { className: 'brug-char' }, '🧗');
        const meter = el('div', { className: 'brug-tilt-meter' });
        const center = el('div', { className: 'center' });
        const pin = el('div', { className: 'pin' });
        meter.append(center, pin);
        stage.append(bridge, char, meter);
        back.append(head, hud, stage);
        ui.append(back);

        // ── STATE ──
        const RUN_MAX_MS = 45000;       // hard cap zodat het nooit oneindig duurt
        const THRESHOLD = 45;           // graden tilt → val
        const scores = [];              // {player, time}
        let curIdx = 0;
        let phase = 'permission';       // permission | ready | running | failed | between | done
        let gamma = 0;                  // huidige tilt (left-right)
        let leanAngle = 0;              // werkelijke karakter-helling (gladgemaakt)
        let runStart = 0;
        let lastEvent = 0;
        let rafId = 0;

        // ── DeviceOrientation ──
        function onOrient(e) {
            // gamma: left-right tilt, -90 → 90
            if (e.gamma != null) {
                gamma = Math.max(-90, Math.min(90, e.gamma));
                lastEvent = performance.now();
            }
        }
        async function requestGyroPermission() {
            // iOS Safari 13+: requestPermission() vereist user-gesture
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const res = await DeviceOrientationEvent.requestPermission();
                    if (res === 'granted') {
                        window.addEventListener('deviceorientation', onOrient);
                        return true;
                    }
                    return false;
                } catch (e) { return false; }
            } else {
                window.addEventListener('deviceorientation', onOrient);
                return true;
            }
        }
        function showPermission() {
            const card = el('div', { className: 'brug-perm' });
            card.append(
                el('h3', {}, '📱 Telefoon-sensor nodig'),
                el('p', {}, 'Brug Balans gebruikt de gyroscoop. Geef toestemming om door te gaan.'),
                el('button', { className: 'btn-pill gold', type: 'button',
                    on: { click: async () => {
                        const ok = await requestGyroPermission();
                        card.remove();
                        if (ok) {
                            phase = 'ready';
                            startRun(0);
                        } else {
                            // Geen permissie → skip
                            const c2 = el('div', { className: 'brug-perm' });
                            c2.append(
                                el('h3', {}, '⚠️ Geen toestemming'),
                                el('p', {}, 'Geen sensor-toegang. Minigame overgeslagen.'),
                                el('button', { className: 'btn-pill', type: 'button',
                                    on: { click: () => finish(null) } }, 'OK'),
                            );
                            stage.append(c2);
                        }
                    }} }, '✓ Toestaan'),
                el('button', { className: 'btn-pill', type: 'button',
                    on: { click: () => finish(null) } }, 'Skip'),
            );
            stage.append(card);
        }
        function startRun(i) {
            curIdx = i;
            const p = players[curIdx];
            pVal.textContent = p.name;
            pVal.style.color = p.color.css;
            pChip.style.setProperty('--pcol', p.color.css);
            sChip.style.setProperty('--pcol', p.color.css);
            // Reset character
            char.style.transform = 'translate(-50%, -50%) rotate(0deg)';
            char.style.left = '50%';
            char.style.opacity = '1';
            leanAngle = 0;
            // Banner
            const banner = el('div', { className: 'brug-banner',
                style: { '--pcol': p.color.css } });
            banner.append(
                el('h2', { style: { color: p.color.css } }, `${p.name}`),
                el('p', {}, 'Houd je telefoon zo recht mogelijk om de brug te overleven'),
                el('button', { className: 'btn-pill gold', type: 'button',
                    style: { marginTop: '10px' },
                    on: { click: () => {
                        banner.remove();
                        phase = 'running';
                        runStart = performance.now();
                        lastEvent = performance.now();
                    }} }, '▶ Start'),
            );
            stage.append(banner);
            phase = 'ready';
        }
        function endRun(survivedMs) {
            phase = 'between';
            scores.push({ player: players[curIdx], time: survivedMs });
            // Visual fail
            char.style.transition = 'all 0.6s ease-in';
            char.style.transform = `translate(-50%, 220%) rotate(${gamma > 0 ? 90 : -90}deg)`;
            char.style.opacity = '0';
            const p = players[curIdx];
            setTimeout(() => {
                const banner = el('div', { className: 'brug-banner',
                    style: { '--pcol': p.color.css } });
                banner.append(
                    el('h2', {}, 'Gevallen!'),
                    el('div', { className: 'big', style: { color: p.color.css } },
                        (survivedMs / 1000).toFixed(1) + 's'),
                    el('p', {}, `${p.name} overleefde`),
                );
                stage.append(banner);
                setTimeout(() => {
                    banner.remove();
                    char.style.transition = '';
                    if (curIdx < players.length - 1) startRun(curIdx + 1);
                    else showFinal();
                }, 2000);
            }, 600);
        }
        function showFinal() {
            phase = 'done';
            const sorted = [...scores].sort((a, b) => b.time - a.time);
            const topT = sorted[0].time;
            const losers = sorted.filter(s => s.time < topT);
            const banner = el('div', { className: 'brug-banner',
                style: { '--pcol': sorted[0].player.color.css } });
            const ranking = el('div', { style: {
                margin: '12px 0', display: 'flex', flexDirection: 'column', gap: '6px' } });
            sorted.forEach((s, i) => {
                ranking.append(el('div', { style: {
                    display: 'flex', justifyContent: 'space-between', gap: '12px',
                    padding: '6px 12px', borderRadius: '8px',
                    background: 'rgba(255,255,255,0.08)',
                    border: '1px solid ' + s.player.color.css,
                    opacity: s.time === topT ? '1' : '0.65' } },
                    el('span', {}, `${i+1}. ${s.player.name}`),
                    el('span', { style: { color: s.player.color.css, fontWeight: '900' } },
                        (s.time/1000).toFixed(1) + 's'),
                ));
            });
            banner.append(
                el('h2', {}, '🏆 Eindstand'),
                ranking,
                el('p', {}, losers.length === 0 ? 'Gelijkspel — proost!' :
                    `${losers.map(l => l.player.name).join(', ')} drinkt elk ${drinks} 🍻`),
                el('button', { className: 'btn-pill gold', type: 'button',
                    style: { marginTop: '10px' },
                    on: { click: () => finish(sorted) } }, 'Klaar'),
            );
            stage.append(banner);
            setTimeout(() => finish(sorted), 9000);
        }
        function finish(sorted) {
            if (phase === 'closed') return;
            phase = 'closed';
            cancelAnimationFrame(rafId);
            window.removeEventListener('deviceorientation', onOrient);
            back.style.transition = 'opacity 0.3s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(sorted || null); }, 300);
        }

        function tick() {
            rafId = requestAnimationFrame(tick);
            if (phase !== 'running') return;
            // Smooth lean naar gamma
            leanAngle += (gamma - leanAngle) * 0.25;
            // Pin in meter (gamma -45..45 → 0..100%)
            const pinPct = Math.max(0, Math.min(100, (gamma + THRESHOLD) / (2*THRESHOLD) * 100));
            pin.style.left = pinPct + '%';
            // Karakter rotatie + lichte horizontale wankel
            const lean = Math.max(-THRESHOLD * 1.2, Math.min(THRESHOLD * 1.2, leanAngle));
            const xOff = (lean / THRESHOLD) * 40;     // ±40px
            char.style.transform =
                `translate(calc(-50% + ${xOff}px), -50%) rotate(${lean.toFixed(1)}deg)`;
            // Tijd
            const elapsed = performance.now() - runStart;
            sVal.textContent = (elapsed / 1000).toFixed(1) + 's';
            // Check fail
            if (Math.abs(leanAngle) >= THRESHOLD || elapsed >= RUN_MAX_MS) {
                phase = 'failed';
                endRun(elapsed);
            }
            // Geen orientation events in 2 seconden? device draait misschien niet
            if (performance.now() - lastEvent > 2000 && elapsed > 1000) {
                // Negeer — kan gewoon stil houden zijn (ok)
            }
        }
        rafId = requestAnimationFrame(tick);
        showPermission();
    });
}


/* ════════════════════════════════════════════════════════════════════
   🎡 showTikiWheel — Volcano Verbanningen rad
   ════════════════════════════════════════════════════════════════════
   Toont een spinnend tiki-rad met 4 segmenten (1 per satelliet-eiland).
   Voor nu is enkel Banana Brig speelbaar; de andere 3 zijn "BINNENKORT".
   Returns: een Promise die resolved met de gekozen island-id, of null
   bij skip.
   ════════════════════════════════════════════════════════════════════ */
function showTikiWheel({ subtitle = '' } = {}) {
    return new Promise(resolve => {
        const ui = document.getElementById('game-ui');
        const back = el('div', { className: 'tw-back' });
        const title = el('div', { className: 'tw-title' });
        title.append(
            el('h2', {}, '🌋 VOLCANO VERBANNING'),
            el('p', {}, subtitle || 'De vulkaan kiest je lot…'),
        );
        const stage = el('div', { className: 'tw-stage' });
        const pointer = el('div', { className: 'tw-pointer' }, '🗿');
        const wheel = el('div', { className: 'tw-wheel' });
        const hub = el('div', { className: 'tw-hub' }, '🌋');

        // 4 segmenten — voor nu: Banana Brig speelbaar, rest binnenkort.
        // Volgorde komt overeen met de 4 conic-gradient kleuren:
        //   0° → 90°: rood   (BANANA BRIG)
        //   90° → 180°: blauw (BINNENKORT)
        //   180° → 270°: groen (BINNENKORT)
        //   270° → 360°: geel (BINNENKORT)
        // Het rad-segment dat de pointer raakt is degene boven (= centered
        // op 0deg na rotation). Onze pointer staat bovenaan, het 1e segment
        // (Banana Brig) is gecentreerd op 45deg in de gradient.
        const ISLANDS = [
            { id: 'bananabrig', label: '🍌', name: 'BANANA BRIG',  unlocked: true,  angle:  45 },
            { id: 'coming1',    label: '🌶️', name: 'BINNENKORT',  unlocked: false, angle: 135 },
            { id: 'coming2',    label: '❓',  name: 'BINNENKORT',  unlocked: false, angle: 225 },
            { id: 'coming3',    label: '🔒', name: 'BINNENKORT',  unlocked: false, angle: 315 },
        ];
        for (const isle of ISLANDS) {
            const seg = el('div', { className: 'tw-seg' + (isle.unlocked ? '' : ' locked') });
            seg.style.transform = `rotate(${isle.angle - 90}deg)`;
            seg.append(
                el('div', { className: 'label' }, isle.label),
                el('div', { className: 'name'  }, isle.name),
            );
            wheel.append(seg);
        }

        stage.append(pointer, wheel, hub);
        const result = el('div', { className: 'tw-result' });
        stage.append(result);

        const actions = el('div', { className: 'tw-actions' });
        const spinBtn = el('button', { className: 'btn-pill gold', type: 'button' }, '🎰 Draai het rad');
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        actions.append(spinBtn, skipBtn);

        back.append(title, stage, actions);
        ui.append(back);

        let spun = false;
        function spin() {
            if (spun) return; spun = true;
            spinBtn.disabled = true; spinBtn.style.opacity = '0.5';
            skipBtn.disabled = true; skipBtn.style.opacity = '0.5';

            // Voor nu: ALTIJD Banana Brig (de andere 3 zijn locked).
            // Pointer staat op 0° (boven). Een segment op `angle` valt
            // onder de pointer als het rad naar `-angle` draait.
            // We willen op Banana Brig (angle 45°) eindigen → eind-rotatie = -45° + N*360°.
            const target = ISLANDS[0];           // Banana Brig
            const finalAngle = -target.angle;
            const extraSpins = 5 + Math.floor(Math.random() * 3);   // 5..7 volledige rondes
            // Kleine willekeurige offset zodat hij niet altijd precies in het midden eindigt
            const jitter = (Math.random() - 0.5) * 16;              // ±8° binnen het segment
            const totalRotation = extraSpins * 360 + finalAngle + jitter;

            wheel.classList.add('spinning');
            wheel.style.transform = `rotate(${totalRotation}deg)`;

            // Tijdens spin: triller-haptic en zachte audio-tick
            if (navigator.vibrate) {
                try { navigator.vibrate([20, 60, 20, 60, 20, 60, 30, 80, 30, 100, 50, 200, 80]); } catch (e) {}
            }

            setTimeout(() => {
                result.textContent = `${target.label}  ${target.name}!`;
                result.classList.add('show');
                if (navigator.vibrate) {
                    try { navigator.vibrate([200, 60, 200]); } catch (e) {}
                }
                setTimeout(() => {
                    back.style.transition = 'opacity 0.3s ease';
                    back.style.opacity = '0';
                    setTimeout(() => { back.remove(); resolve(target.id); }, 320);
                }, 1500);
            }, 4600);
        }
        spinBtn.addEventListener('click', spin);
        skipBtn.addEventListener('click', () => {
            back.style.transition = 'opacity 0.25s ease';
            back.style.opacity = '0';
            setTimeout(() => { back.remove(); resolve(null); }, 270);
        });
    });
}


/* ============================================================
   Schnaps ruft an — "Schnaps is calling"
   ============================================================
   Fake iOS-style incoming call screen with the Nokia 3310
   ringtone (Gran Vals, Tárrega 1902). Used as:
     - a RANDOM in-game event (1-4× per game depending on difficulty),
       where accepting forces the player to drink and declining is
       called out as a "laffe Schnapsaffe" with a tile-knockback;
     - a STANDALONE home-screen toy (just for fun, no penalty).

   Ringer audio context, tune loop and vibrate are encapsulated
   inside the function so multiple calls don't clobber each other.
   ============================================================ */
function playSchnapsCall({ player = null, mode = 'standalone' } = {}) {
    return new Promise(resolve => {
        const inGame = mode === 'game';
        const ui = document.getElementById('game-ui');

        // ── Audio: Nokia tune (Gran Vals) ──
        let audioCtx = null;
        let tuneInterval = null;
        let vibLoop = null;

        function ensureAudio() {
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) { audioCtx = null; }
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume().catch(() => {});
            }
        }
        function playNokiaTune() {
            ensureAudio();
            if (!audioCtx) return;
            // tempo: ~160 BPM → 1/16 = 0.094s, 1/8 = 0.188s
            const s = 0.094, e = 0.188, L = 0.75;
            // Gran Vals — original 13-note phrase Nokia chose for their ringtone
            const seq = [
                [659.25, s], [587.33, s], [369.99, e], [415.30, e],
                [554.37, s], [493.88, s], [293.66, e], [329.63, e],
                [493.88, s], [440.00, s], [277.18, e], [329.63, e],
                [440.00, L],
            ];
            let t = audioCtx.currentTime;
            seq.forEach(([freq, dur]) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';      // classic 8-bit Nokia bleep
                osc.frequency.value = freq;
                const peak = 0.18;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(peak, t + 0.005);
                gain.gain.setValueAtTime(peak, t + dur - 0.015);
                gain.gain.linearRampToValueAtTime(0, t + dur);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(t); osc.stop(t + dur);
                t += dur;
            });
        }
        function tryVibrate() {
            if (!navigator.vibrate) return;
            const pattern = [400, 180, 400, 2000];
            try { navigator.vibrate(pattern); } catch(_){}
            vibLoop = setInterval(() => {
                if (!tuneInterval) { clearInterval(vibLoop); vibLoop = null; return; }
                try { navigator.vibrate(pattern); } catch(_){}
            }, 3000);
        }
        function startRinging() {
            playNokiaTune();
            // whole melody ≈ 2.3s, repeat every 3s
            tuneInterval = setInterval(playNokiaTune, 3000);
            tryVibrate();
        }
        function stopRinging() {
            if (tuneInterval) { clearInterval(tuneInterval); tuneInterval = null; }
            if (vibLoop)      { clearInterval(vibLoop);      vibLoop = null; }
            if (audioCtx) {
                try { audioCtx.close(); } catch(_){}
                audioCtx = null;
            }
            if (navigator.vibrate) { try { navigator.vibrate(0); } catch(_){} }
        }

        // ── DOM ──
        const back = el('div', { id: 'sk-back', className: 'visible' });
        if (player?.color?.css) back.style.setProperty('--pcol', player.color.css);

        const topInfo = el('div', { className: 'sk-topInfo' });
        topInfo.append(
            el('div', { className: 'sk-callType' }, 'mobiel'),
            el('div', { className: 'sk-callerName' }, 'Schnaps ruft an!!'),
        );
        if (inGame && player) {
            const chip = el('div', { className: 'sk-forPlayer' });
            chip.append(
                el('span', { className: 'dot' }),
                document.createTextNode(`voor ${player.name}`),
            );
            topInfo.append(chip);
        }
        // ── Beller-portret: in-game = speler's eigen avatar, standalone = 🥃 ──
        const avatar = el('div', { className: 'sk-avatar' });
        if (inGame && player?.avatar) {
            // Render speler avatar als achtergrond, met behoud van pulse-animatie
            avatar.style.padding = '0';
            avatar.style.overflow = 'hidden';
            avatar.innerHTML = renderAvatarSVG(player.avatar, 'square',
                'width="100%" height="100%"');
        } else {
            avatar.textContent = '🥃';
        }
        const actions = el('div', { className: 'sk-actions' });

        const declineBtn = el('button', { className: 'sk-action', type: 'button' });
        declineBtn.append(
            el('div', { className: 'sk-actionBtn sk-decline' }, '✕'),
            el('div', { className: 'sk-actionLabel' }, 'ablehnen'),
        );
        const acceptBtn = el('button', { className: 'sk-action', type: 'button' });
        acceptBtn.append(
            el('div', { className: 'sk-actionBtn sk-accept' }, '📞'),
            el('div', { className: 'sk-actionLabel' }, 'annehmen'),
        );
        actions.append(declineBtn, acceptBtn);

        back.append(topInfo, avatar, actions);

        // Strip any previous schnaps overlay from a previous run
        document.getElementById('sk-back')?.remove();
        document.getElementById('sk-result')?.remove();
        ui.append(back);

        startRinging();

        let settled = false;
        function showResult({ emoji, text, sub, subClass }) {
            const wrap = el('div', { id: 'sk-result', className: 'visible' });
            const card = el('div', { className: 'sk-resultCard' });
            card.append(
                el('div', { className: 'sk-resultEmoji' }, emoji),
                el('div', { className: 'sk-resultText' }, text),
            );
            if (sub) card.append(
                el('div', { className: 'sk-resultSub ' + (subClass || '') }, sub),
            );
            const closeBtn = el('button', { className: 'sk-resultClose', type: 'button' },
                'verder spelen');
            card.append(closeBtn);
            wrap.append(card);
            ui.append(wrap);

            return new Promise(r => {
                closeBtn.addEventListener('click', () => {
                    wrap.remove();
                    r();
                });
            });
        }

        async function finish(accepted) {
            if (settled) return;
            settled = true;
            stopRinging();
            back.remove();

            if (!inGame) {
                // Standalone — no penalties, no result modal needed.
                // (User asked specifically: no strafpunten displayed here.)
                resolve({ accepted });
                return;
            }

            // ── In-game outcome ──
            if (accepted) {
                // Felicitatie — the joke: you "win" by being a good German
                // drinker, but the prize is having to drink schnaps.
                const drinks = slokken(3);
                await showResult({
                    emoji: '🥃',
                    text:  'Schnapsen, ma!!',
                    sub:   `PROST! ${player.name} trinkt ${drinks} Schluck 🍻`,
                    subClass: 'good',
                });
                resolve({ accepted: true, drinks, knockback: 0 });
            } else {
                // Decline — shame + tegel knockback
                const stepsBack = knockBy(5);
                screenShake(400);
                await new Promise(r => moveTokenBy(player, -stepsBack, r));
                layoutTokensOnTile(player.tileIdx);
                refreshHUD();
                await showResult({
                    emoji: '🐒',
                    text:  'Laffe borrelaar!',
                    sub:   `−${stepsBack} Tegels für ${player.name}`,
                    subClass: 'bad',
                });
                resolve({ accepted: false, drinks: 0, knockback: stepsBack });
            }
        }

        acceptBtn.addEventListener('click', () => finish(true));
        declineBtn.addEventListener('click', () => finish(false));
    });
}

/* ============================================================
   Universal Minigame Picker — the "Mystery Wheel"
   ============================================================
   Used by the universal 'mystery' tile (which replaces all the
   per-minigame tiles on the board, except Chwazi). Returns the
   chosen minigame id ('krokodil','paddle','tappy','volcano',
   'raft','roulette','blackjack','hoofdsteden') or null if skipped.
   ============================================================ */
// Welke minigames worden door ALLE spelers tegelijk gespeeld?
// Die triggeren NIET meer via een tile op het bord, maar automatisch
// aan het einde van een ronde-blok (zie maybeRunAllPlayerRoundGame).
// Krab Vangen is uit BETA opgewaardeerd naar groeps-minigame; de
// andere BETA-spellen (lavasteen, tiki, brug) blijven alleen
// handmatig speelbaar via het minigame-menu.
const ALL_PLAYER_WHEEL_OPTIONS = [
    { id: 'tappy',   emoji: '🐦', label: 'Tappy Bird',  color: '#ff7ad6' },
    { id: 'volcano', emoji: '🌋', label: 'Volcano Hop', color: '#3aff9e' },
    { id: 'bowling', emoji: '🎳', label: 'Bowlspel',    color: '#1a7adb' },
    { id: 'krabben', emoji: '🦀', label: 'Krab Vangen', color: '#ff5a3a' },
];
const ALL_PLAYER_GAMES = ALL_PLAYER_WHEEL_OPTIONS.map(o => o.id);

const MYSTERY_OPTIONS = [
    { id: 'krokodil',    emoji: '🐊', label: 'Krokodil',     color: '#b87aff' },
    { id: 'paddle',      emoji: '🏓', label: 'Paddle Duel',  color: '#4af2ff' },
    { id: 'tappy',       emoji: '🐦', label: 'Tappy Bird',   color: '#ff7ad6' },
    { id: 'volcano',     emoji: '🌋', label: 'Volcano Hop',  color: '#3aff9e' },
    { id: 'raft',        emoji: '🏴‍☠️', label: 'Raft Battle',  color: '#ff8a4a' },
    { id: 'roulette',    emoji: '🎰', label: 'Roulette',     color: '#ff3a3a' },
    { id: 'blackjack',   emoji: '🃏', label: 'Blackjack',    color: '#2a8a3a' },
    { id: 'hoofdsteden', emoji: '🏙️', label: 'Hoofdsteden',  color: '#5aaaff' },
    { id: 'bowling',     emoji: '🎳', label: 'Bowlspel',     color: '#1a7adb' },
    { id: 'connect4',    emoji: '🟡', label: '4 op een Rij', color: '#ffcc1a' },
    // Kano Race blijft in de bordspel-pool (1v1 game)
    { id: 'kano',        emoji: '🛶', label: 'Kano Race',    color: '#5acdff' },
    // Lavasteen, Krabben, Tiki, Brug staan in BETA — alleen via
    // het minigame-menu speelbaar, niet via de Mystery Wheel.
];

function playMysteryWheel({ options = MYSTERY_OPTIONS, title = '🎡 Mystery Wheel', subtitle = 'Welke minigame wordt het?' } = {}) {
    return new Promise(resolve => {
        // ════════════════════════════════════════════════════════
        //  A. SETUP — chrome verbergen, camera bewaren, kraam bouwen
        // ════════════════════════════════════════════════════════
        const uiRoot = document.getElementById('game-ui');
        const hiddenChrome = hideMinigameChrome();
        const savedCam = {
            pos: camera.position.clone(),
            fov: camera.fov,
            target: controls.target.clone(),
            autoRotate: controls.autoRotate,
            enabled: controls.enabled,
            enableDamping: controls.enableDamping,
        };
        controls.autoRotate = false;
        controls.enabled = false;
        // BELANGRIJK: damping uitzetten. Met enableDamping=true blijft
        // OrbitControls.update() (die in de hoofd-render-loop wel
        // doorloopt voor de damping-tween) de camera-positie EELKE
        // FRAME terug-lerpen naar zijn interne sferische state. Dat
        // overschrijft mijn eigen camera.position/lookAt en zorgt
        // dat de camera nooit aankomt bij Bowl Eiland.
        controls.enableDamping = false;
        camera.fov = 50;
        camera.updateProjectionMatrix();

        // Bouw stall (1× lazy) + pas opties toe
        buildMysteryStallOnce();
        applyMysteryOptionsToWheel(options);
        if (mysteryWheelSpin) mysteryWheelSpin.rotation.x = 0;
        if (mysteryStall)     mysteryStall.visible = true;

        console.log('[MysteryWheel] stall built:', !!mysteryStall,
            'visible:', mysteryStall?.visible,
            'world pos:', mysteryStall?.position?.toArray?.(),
            'spin children:', mysteryWheelSpin?.children?.length);

        // ════════════════════════════════════════════════════════
        //  B. CAMERA — SNAP direct naar bestemming
        //
        //  wheelWorldY = floorY + wheelY = 1.05 + 2.75 = 3.80
        //  Camera staat oost van de stall, op iets hoger niveau dan
        //  de rad-as, en kijkt licht omlaag richting het rad-vlak.
        //  Y-offsets gekozen zodat polar angle binnen OrbitControls
        //  constraints valt (< π/2.1 ≈ 85.7°).
        // ════════════════════════════════════════════════════════
        const wheelWorldY = MWHEEL.floorY + MWHEEL.wheelY;
        const CAM_POS = new THREE.Vector3(
            MWHEEL.cx + 12.5, wheelWorldY + 2.0, MWHEEL.cz);
        const CAM_TGT = new THREE.Vector3(
            MWHEEL.cx - 9.5, wheelWorldY, MWHEEL.cz);

        camera.position.copy(CAM_POS);
        controls.target.copy(CAM_TGT);
        camera.lookAt(controls.target);
        // BELANGRIJK: na manueel zetten van camera.position MOET
        // controls.update() worden aangeroepen om OrbitControls'
        // interne spherical-state te syncen met de nieuwe positie.
        // Zonder deze call blijft 'ie soms aan de oude state hangen
        // en lijkt de camera niet te verplaatsen.
        // (https://threejs.org/docs/#examples/en/controls/OrbitControls)
        controls.update();

        console.log('[MysteryWheel] camera snapped to',
            CAM_POS.toArray(), 'looking at', CAM_TGT.toArray());

        // ════════════════════════════════════════════════════════
        //  C. DOM OVERLAY — transparant, alleen header + skip + tip
        //  + eind-resultaat (3D scène blijft zichtbaar achter)
        // ════════════════════════════════════════════════════════
        const back = el('div', { className: 'mw-back' });

        const header = el('div', { className: 'mw-header' });
        header.append(
            el('div', { className: 'mw-title' }, title),
            el('div', { className: 'mw-sub' }, subtitle),
        );

        // Stage = transparante swipe-vanger over de hele middenruimte
        const stage = el('div', { className: 'mw-stage' });

        // Tip onderaan (verdwijnt na eerste swipe)
        const tip = el('div', { className: 'mw-tip' },
            '↔ Veeg over het scherm om het rad te draaien');

        // Eind-resultaat banner (verborgen tot wheel stopt)
        const result = el('div', { className: 'mw-result' });

        // Footer met skip-knop
        const foot = el('div', { className: 'mw-foot' });
        const skipBtn = el('button', { className: 'btn-pill', type: 'button' }, 'Skip');
        foot.append(skipBtn);

        stage.append(tip, result);
        back.append(header, stage, foot);
        uiRoot.append(back);

        // ════════════════════════════════════════════════════════
        //  D. SPIN STATE — fysica van het 3D rad
        // ════════════════════════════════════════════════════════
        // angle (rad) = wheelSpin.rotation.x. Positieve waarden roteren
        // het rad CCW vanuit kamera-POV (top schuift naar viewer's LEFT).
        // We berekenen winnaar door angle modulo 2π → segment-index.
        let angle = 0;
        let angVel = 0;            // rad/sec
        const FRICTION_PER_FRAME = 0.985;
        const STOP_THRESHOLD = 0.15;   // rad/sec
        const MAX_ANG_VEL = 32;        // rad/sec cap
        let spinning = false;
        let spun = false;
        let winnerSettling = false;
        let snapStartAngle = 0;
        let snapTargetAngle = 0;
        let snapT = 0;
        const SNAP_DUR = 0.45;

        // Pointer-tracking
        let dragging = false;
        let dragPid = null;
        let lastX = 0;
        let lastT = 0;
        let velSamples = [];

        // ════════════════════════════════════════════════════════
        //  E. WINNER CALC
        // ════════════════════════════════════════════════════════
        // Bij rotation.x = 0 zit segment 0's centrum bovenaan (onder pointer).
        // Na rotatie θ verschuiven alle segmenten. Het segment onder de
        // pointer is degene waarvan het centrum nu op canvas-hoek -π/2+θ ligt.
        // Segment i centrum is op -π/2 + i*segAng. Dus i = round(θ/segAng)
        // mod N, half-adjusted via floor((θ+segAng/2)/segAng).
        function computeWinnerIdx(theta) {
            const N = options.length;
            const segAng = (Math.PI * 2) / N;
            let x = ((theta + segAng / 2) % (Math.PI * 2)
                     + (Math.PI * 2)) % (Math.PI * 2);
            return Math.floor(x / segAng) % N;
        }
        // Het EXACT centrum van segment i komt onder pointer bij
        // angle = i*segAng (mod 2π). Voor snap-to-center: vind het
        // dichtsbijzijnde i*segAng-multiple bij huidige angle.
        function nearestSegmentCenterAngle(theta, targetIdx) {
            const N = options.length;
            const segAng = (Math.PI * 2) / N;
            const targetMod = targetIdx * segAng;
            const k = Math.round((theta - targetMod) / (Math.PI * 2));
            return targetMod + k * (Math.PI * 2);
        }

        // ════════════════════════════════════════════════════════
        //  F. POINTER EVENTS — swipe op stage = spin
        // ════════════════════════════════════════════════════════
        // Horizontale swipe levert angular velocity op. Convention:
        // drag RIGHT (Δx > 0) → top van rad moet ook naar rechts bewegen
        // (CW in kamera-view) → NEGATIVE rotation.x increment → angVel < 0.
        // Sensitivity: ~ 220 pixels/sec drag = 1 rad/sec spin.
        const PIX_TO_RAD_PER_SEC = 1 / 220;

        function onPointerDown(e) {
            if (spun || winnerSettling) return;
            if (dragging) return;
            dragging = true;
            dragPid = e.pointerId;
            stage.classList.add('spinning');
            try { stage.setPointerCapture?.(e.pointerId); } catch (err) {}
            lastX = e.clientX;
            lastT = performance.now();
            velSamples = [];
            tip.classList.add('gone');
            e.preventDefault?.();
        }
        function onPointerMove(e) {
            if (!dragging || e.pointerId !== dragPid) return;
            const now = performance.now();
            const dx = e.clientX - lastX;
            const dt = (now - lastT) / 1000;
            if (dt > 0) {
                // Live update angle terwijl gebruiker sleept (geeft directe feedback)
                angle -= dx * PIX_TO_RAD_PER_SEC * 4;
                velSamples.push({ vx: dx / dt, t: now });
                while (velSamples.length > 1 && now - velSamples[0].t > 200) {
                    velSamples.shift();
                }
            }
            lastX = e.clientX;
            lastT = now;
            if (mysteryWheelSpin) mysteryWheelSpin.rotation.x = angle;
            e.preventDefault?.();
        }
        function onPointerUp(e) {
            if (!dragging || (e.pointerId !== dragPid && e.pointerId !== undefined)) return;
            dragging = false;
            stage.classList.remove('spinning');
            try { stage.releasePointerCapture?.(dragPid); } catch (err) {}
            dragPid = null;

            // Gemiddelde horizontale snelheid over laatste samples
            let avgVx = 0;
            if (velSamples.length > 0) {
                let sum = 0;
                for (const s of velSamples) sum += s.vx;
                avgVx = sum / velSamples.length;
            }
            // Convert px/s naar rad/s; minteken: drag rechts → CW = negative
            let v = -avgVx * PIX_TO_RAD_PER_SEC;

            // Boost als te traag
            if (Math.abs(v) < 4.5) {
                const dir = v >= 0 ? 1 : -1;
                v = dir * (5.5 + Math.random() * 4.5);
                if (Math.abs(avgVx) < 30) {
                    v = (Math.random() < 0.5 ? 1 : -1) * (6 + Math.random() * 4);
                }
            }
            v = Math.max(-MAX_ANG_VEL, Math.min(MAX_ANG_VEL, v));

            angVel = v;
            spinning = true;
            spun = true;
            skipBtn.disabled = true;
            e.preventDefault?.();
        }
        stage.addEventListener('pointerdown', onPointerDown);
        stage.addEventListener('pointermove', onPointerMove);
        stage.addEventListener('pointerup',   onPointerUp);
        stage.addEventListener('pointercancel', onPointerUp);

        skipBtn.addEventListener('click', () => {
            if (spun) return;
            finish(null);
        });

        // ════════════════════════════════════════════════════════
        //  G. ANIMATIE-LOOP — via __deGameHook (in main animate())
        // ════════════════════════════════════════════════════════
        //   BELANGRIJKE FIX: gebruik __deGameHook in plaats van een
        //   losse rAF. __deGameHook draait in de main animate() loop,
        //   NÁ controls.update() maar VÓÓR renderer.render(). Zo kan
        //   OrbitControls onze camera nooit overschrijven, en is de
        //   render altijd op de juiste positie. De vorige losse tick
        //   draaide NA renderer.render() en daardoor renderde de eerste
        //   frames met de oude (orbital) camera-positie.
        let alive = true;
        let lastFrameT = performance.now();
        const PREV_HOOK = window.__deGameHook;

        function smoothstep(t) { return t * t * (3 - 2 * t); }

        window.__deGameHook = (time) => {
            if (!alive) return;
            const now = performance.now();
            const dt = Math.min(0.05, (now - lastFrameT) / 1000);
            lastFrameT = now;

            // FORCE camera elke frame — draait na controls.update()
            // dus OrbitControls kan dit niet ongedaan maken.
            camera.position.copy(CAM_POS);
            controls.target.copy(CAM_TGT);
            camera.lookAt(controls.target);
